body:
  text: 太原白居易詩三目録病假中南亭閒望官舍小亭閒望和錢員外禁中夙興見示松聲禁中寓直夢遊仙遊寺秋山題楊穎士西亭秋遊原上閒居遊悟真寺詩朝囘遊城南舟行泛湓水晚望遊石門澗香鑪峯下新置草堂即事咏懐題於石上長慶二年七月自中書舍人出守杭州路次藍溪作自蜀江至洞庭湖口有感而作立春後五日別元九後咏所懐初與元九別後忽夢見之及寤而書適至兼寄桐花詩悵然感懐因以此寄秋江送客溪中早春渭村雨歸寄微之三首孟夏思渭村舊居寄舍弟南湖晚秋早秋晚望兼呈韋侍御司馬宅寄王質夫送客囘晚興東樓竹東坡種花二首步東坡竹窗
  hash: sha256:184e7872b3c0c85a29b6910a8b997e36d4425d462c27f4c434534ddca4ab9e26
