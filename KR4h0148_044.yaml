body:
  text: 太原白居易詩三目録病假中南亭間望官舍小亭間望和錢員外禁中夙興見示松聲禁中寓直夢遊仙遊寺秋山題楊穎士西亭秋遊原上間居遊悟真寺詩朝回遊城南舟行泛湓水晚望遊石門澗香爐峯下新置草堂即事咏懷題於石上長慶二年七月自中書舍人出守杭州路次藍溪作自蜀江至洞庭湖口有感而作立春後五日別元九後咏所懷初與元九別後忽夢見之及寤而書適至兼寄桐花詩悵然感懷因以此寄秋江送客溪中早春渭村雨歸寄微之三首孟夏思渭村舊居寄舍弟南湖晚秋早秋晚望兼呈韋侍御司馬宅寄王質夫送客回晚興東樓竹東坡種花二首步東坡竹窗
  hash: sha256:e6eea6eb77a7b28ab55af738aa6a5ca94c7177aa374ae1c7c775f2e51faea901
