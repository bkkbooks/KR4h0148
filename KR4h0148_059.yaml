body:
  text: 昌黎韓愈詩二赴江陵途中寄贈王二十補闕李十一拾遺李二十六員外翰林三學士孤臣昔放逐血泣追愆尤汗漫不省識恍如乘桴浮或自疑上疏上疏豈其由是年京師旱田畝少所收上憐民無食征賦半已休有司恤經費未免煩徴求富者既云急貧者固己流傳聞閭里間赤子棄渠溝持男易斗粟掉臂莫肻酬我時出衢路餓者何其稠親逢道邊死佇立久咿嚘歸舍不能食有如魚中鉤適會除御史誠當得言秋拜疏移閣門為忠寧自謀上陳人疾苦無令絶其喉下陳畿甸內根本理宜優積雪驗豐熟幸寬待蠶牟天子惻然感司空歎綢繆謂言即施設乃反遷炎州同官盡才俊偏善柳與劉或慮語言泄傳之落寃讎二子不宜爾將疑斷還不中使臨門遣頃刻不得留病妹卧牀褥分知隔明幽悲啼乞就别百請不頷頭弱妻抱稚子出拜忘慙羞僶俯不回顧行行詣連州朝為青雲士暮作白首囚商山季冬月冰凍絶行輈春風洞庭浪出沒驚孤舟逾嶺到所任低顔奉君侯酸寒何足道隨事生瘡疣遠地觸途異吏民似猿猴生獰多忿很辭舌紛嘲啁白日屋簷下雙鳴鬬鵂鶹有蛇類兩首有蟲羣飛游窮冬或搖扇盛夏或重裘颶起最可畏訇哮簸陵丘雷霆助光怪氣象難比侔癘疫忽潛遘十家無一瘳猜嫌動置毒對案輒懷愁前日遇恩赦私心喜還憂果然又羈縶不得歸鋤耰此府雄且大騰凌盡戈矛棲棲法曹掾何處事卑陬生平企仁義所學皆孔周早知大理官不列三后儔何況親犴獄敲搒發姦偷懸知失事勢恐自罹罝罘湘水清且急凉風日修修胡為首歸路旅泊尚夷猶昨者京師至嗣皇傳冕旒赫然下明詔首罪誅共吺復聞顛天輩峨冠進鴻疇班行再肅穆璜珮鳴琅璆佇繼貞觀烈邊封脫兜鍪三賢推侍從卓犖傾枚鄒高議參造化清文煥皇猷協心輔齊聖政理同毛輶小雅詠鳴鹿食蘋貴呦呦遺風邈不嗣豈憶嘗同稠失志早衰換前期擬蜉蝣自從齒牙缺始慕舌為柔因疾鼻又塞漸能等薰蕕深思罷官去畢命依松楸空懷焉能果但見嵗已遒殷湯閔禽獸解網祝蛛蝥雷煥掘寶劒寃氛銷斗牛兹道誠可尚誰能借前籌殷勤謝吾友明月非暗投此自陽山量移江陵而寄王涯李建李程意在牽復耳有求於人易涉貶屈而齒缺鼻塞等語借失志衰換寫意似有懲創然只以詼諧出之固知倔强猶昔不肻折却腰骨也意纒綿而詞悽婉神味極似小雅舊唐書愈轉監察御史德宗晚年宫市之弊愈嘗上章數千言極論之不聽怒貶為連州陽山令量移江陵府掾曹洪興祖曰貞元十九年公自博士拜監察御史是時有詔以旱饑蠲租之半有司徴愈急公與張署李方叔上疏言關中天下根本民急如是請寬民徭而免田租天子惻然卒為幸臣所讒貶連州陽山令幸臣李實也舊書云云疏今不傳則公之被黜坐論此兩事也方嵩卿曰公陽山之貶寄三學士詩叙述其詳而行狀但云為幸臣所惡出宰陽山神道碑亦只云因疏關中旱饑專政者惡之則其非為論宫市明矣然行狀且謂為幸臣所惡而公詩云或自疑上疏上疏豈其由則又未必皆上疏之罪也又曰同官盡才俊偏善柳與劉或慮語言泄傳之落寃讎又嶽陽樓詩云前年出官由此禍最無妄姦猜畏彈射斥逐恣欺誑是蓋為王叔文韋執誼等所排矣憶昨行云伾文未揃崖州熾雖得赦宥常愁猜是其為叔文等所排豈不明甚特無所歸咎駕其罪於上疏耳此日足可惜一首贈張籍此日足可惜此酒不足嘗捨酒去相語共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲往不得行思之不可見百端在中腸維時月魄死冬日朝在房驅馳公事退聞子適及城命車載之至引坐於中堂開懷聽其說往往副所望孔邱歿已遠仁義路久荒紛紛百家起詭怪相披猖長老守所聞後生習為常少知誠難得純粹古已亡譬彼植園木有根易為長留之不遣去館置城西㫄嵗時未云幾浩浩觀湖江衆夫指之笑謂我知不明兒童畏雷電魚鱉驚夜光州家舉進士選試繆所當馳辭對我䇿章句何煒煌相公朝服立工席歌鹿鳴禮終樂亦闋相拜送於庭之子去須臾赫赫流盛名竊喜復竊歎諒知有所成人事安可恆奄忽令我傷聞子高第日正從相公喪哀情逢吉語惝恍難為雙暮宿偃師西徒展轉在牀夜聞汴州亂繞壁行傍偟我時留妻子倉卒不及將相見不復期零落甘所丁驕女未絶乳念之不能忘忽如在我所耳若聞啼聲中途安得返一日不可更俄有東來說我家免罹殃乘船下汴水東去趨彭城從喪朝至洛還走不及停假道經盟津出入行澗岡日西入軍門羸馬顛且僵主人願少留延入陳壺觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脫身去决若驚鳬翔黃昏次泛水欲過無舟航號呼久乃至夜濟十里黃中流上灘灘沙水不可詳驚波暗合沓星宿爭翻芒轅馬蹢躅鳴左右泣僕童甲午憩時門臨泉窺鬭龍東西出陳許陂澤平茫茫道邊草木花紅紫相低昂百里不逢人角角雄雉鳴行行二月暮乃及徐南疆下馬步堤岸上船拜吾兄誰云經艱難百口無天殤僕射南陽公宅我睢水陽篋中有餘衣盎中有餘糧閉門讀書史窗戶忽已凉日念子來逰子豈知我情别離未為久辛苦多所經對食每不飽共言無倦聽連延三十日晨坐達五更我友二三子宦逰在西京東野窺禹穴李翺觀濤江蕭條千萬里會合安可逢淮之水舒舒楚山直叢叢子又捨我去我懷焉所窮男兒不再壯百歲如風狂高爵尚可求無為守一鄉追溯與籍結交之始至今日重逢别去而其中歷叙已之﨑嶇險難意境紆折時地分明摹刻不傳之情并覼縷不必詳之事倥偬雜沓真有波濤夜驚風雨驟至之勢若後人為之鮮不失之冗散者須玩其徑氣直達處數十句如一句尤須玩其通篇章法搏捖摻縱筆力如一髮引千鈞庶可神明於規矩之外六一詩話曰退之筆力無施不可而嘗以詩為文章末事故其詩曰多情懷酒伴餘事作詩人也然其資談笑助諧謔叙人情狀物態一寓於詩而曲盡其妙此在雄文大手固不足論而豫獨愛其工於用韻也蓋其得韻寬則波瀾橫溢泛入傍韻乍還乍離出入回合殆不可拘以常格如此日足可惜之類是也得韻窄則不復傍出而因難見巧愈險愈竒如病中贈張十八之類是也余嘗與聖俞論此謂譬如善馭良馬者通衢廣陌縱橫馳逐惟意所之至於水曲蟻封疾徐中節而不少蹉跌乃天下之至工也聖俞戲曰前史言退之為人木强若寬韻可自足而輒傍出窄韻難獨用而反不出豈非其拗强而然歟坐客皆為之笑也漁隱叢話曰唐子西謂退之作古詩有故避屬對者淮之水舒舒楚山直叢叢是也某氏曰按此篇押二光字二鳴字二更字二狂字胡仔謂退之好重疊用韻以盡巳之意蓋不恤其為病也容齊四筆曰退之此首贈張籍凡百四十句雜用東冬江陽庚青六韻及其亡也籍作詩祭之凡百六十六句用陽庚二韻其語鏗鏘震厲全倣韓體所謂乃出二侍女合彈琵琶箏者是也李光地曰首叙與籍相遇之初中言汴州之亂避難至徐復與籍相見而惜其去也按詩易書春秋及秦漢以上古文用韻東冬江為一部陽一部青一部庚則半入陽而半入青也蒸自為一部支微齊佳灰為一部而支韻字半入歌歌麻為一部而麻韻字半入虞魚虞為一部蕭肴豪尤為一部尤韻字又以其半入支與虞焉真文元寒刪先為一部侵覃鹽咸為一部此長洲顧寧人氏所區别凡十部以合古韻其援据詳明而證驗的確矣顧氏譏韓公不識古韻蓋謂此詩及元和聖德之類然顧氏之學以質於詩書古今合者為多至聲氣之元歌樂之用古人所以協律同文之本則似有未能明者蓋東冬江陽庚青蒸七韻原為一部以其元乃一氣所生而用之以叶歌曲則收聲必同故也真文元寒刪先及侵覃鹽咸皆然至支微齊魚虞歌麻諸韻又各部之根凡各部中字生音起韻皆從此而得應自為一部而通同之欲其源派分明故亦別為三部歌麻也魚虞也支微齊也然魚虞之韻能生蕭肴豪尤故蕭肴豪尤與魚虞同一收聲而可以通用支微齊能生佳灰故佳灰與支微齊同一收聲而可以通用也至歌麻與魚虞雖別部而尤相近蓋古人讀魚虞字皆如模字讀麻字皆如歌字緣歌模兩字相近其收聲亦頗同則魚虞可通於蕭肴豪尤者歌麻亦可通矣如東冬七韻真文六韻侵覃四韻雖亦支微魚虞齊歌麻所生然翻轉於齒舌唇鼻間而得之非喉音直切所生如蕭肴豪尤佳灰者比故各自為部而不可相通也退之此詩正用東冬等一部聖德詩則用歌魚虞尤等上聲一部謝自然詩則用真文等一部皆極本窮源得古韻之精意其學博而見卓矣且三代秦漢古書如此者頗衆苐主於先入則不察耳歐公以為有意泛入旁韻以見竒又或以為當以叶聲求之此固淺近之論而顧氏之顯為譏斥亦未免茍訾也顧嗣立曰洪興祖謂此詩雜用韻又疉用韻俞瑒云此詩用韻非雜也古庚陽二韻原自相通觀鹿鳴采芑之詩自見却非俗說通用轉用之例也其入東韻者桑中之詩亦然按少陵飲中八仙歌嘗疉用韻此詩中間叙次亦仿佛彭衙北征光景歸彭城天下兵又動太平竟何時訏謨者誰子無乃失所宜前年關中旱閭井多死飢去嵗東郡水生民為流尸上天不虛應禍福各有隨我欲進短策無由至彤墀刳肝以為紙瀝血以書辭上言陳堯舜下言引龍夔言詞多感激文字少葳蕤一讀己自怪再尋良自疑食芹雖云美獻御固巳癡緘封在骨髓耿耿空自竒昨者到京師屢陪高車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢吐徐徐俟其巇歸來戎馬間驚顧似羈雌連日或不語終朝見相欺乘閒輒騎馬茫茫詣空陂遇酒即酩酊君知我為誰憂時傷亂感憤無聊騎馬空陂不減途窮之哭周行俊異數語風刺微婉所謂中朝大官老於事詎肻感激徒媕婀也刳肝瀝血句從少陵鳯凰臺詩化出又庾信經藏碑有皮紙骨筆之句退之雖不喜用釋典然運化前人詞語自無嫌也醉贈張祕書人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上客及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒鶴避雞羣阿買不識字頗知書八分詩成使之寫亦足張吾軍所以欲得酒為文俟其醺酒味既泠洌酒氣又氛氲性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛長安衆富兒盤饌羅羶葷不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薰險語破鬼膽高詞嫓皇墳至寶不雕琢神功謝鋤耘方今向泰平元凱承華勛吾徒幸無事庶以窮朝曛石林詩話曰韓退之贈張籍云君詩多態度藹藹春空雲司空圖記戴叔倫語云詩人之辭如藍田日暖良玉生煙亦是形似之微妙者但學者不能味其言耳顧嗣立曰東野二句即薦士詩所謂敷柔肆紆餘與榮華肖天秀是也張籍二句即調張籍詩所謂騰身跨汗漫不著織女襄是也亡友犀月嘗謂東野文昌兩君所得極不相似而同為公所許足見公之才大可謂知言矣西清詩話曰張文潛云東坡嘗言退之詩長安衆富兒盤饌羅羶葷不解文字飲惟能醉紅裙疑若清苦自飾者至云艷姬踏筵舞清眸射劍㦸則知此老子箇中興復不淺文潛戲答曰愛文字飲者與俗人沽酒同科趙堯夫曰或問魯直阿買是退之何人答曰退之姪必有所據而云送惠師惠師浮屠者乃是不羈人十五愛山水超然謝朋親脫冠剪頭髮飛步遺蹤塵發跡入四明梯空上秋旻遂登天台望衆壑皆嶙峋夜宿最高頂舉頭看星辰光芒相照燭南北爭羅陳兹地絶翔走自然嚴且神微風吹木石彭湃聞韶鈞夜半起下視溟波銜日輪魚龍驚踊躍呌嘯成悲辛怪氣或紫赤敲磨共輪囷金鴉既騰翥六合俄清新嘗聞禹穴竒東去窺甌閩越俗不好古流傳失其真幽蹤邈難得聖路嗟長堙回臨浙江濤屹起高峨岷壯志死不息千年如隔晨是非竟何有棄去非吾倫凌江詣廬嶽浩蕩極逰巡崔崒沒雲表陂陀浸湖淪是時雨初霽懸瀑垂天紳前年往羅浮步戞南海漘大哉陽德盛榮茂恆留春鵬鶱墮長翮鯨戲側修鱗自來連州寺曾未到城闉日攜青雲客探勝窮崖濱太守邀不去羣官請徒頻囊無一金資翻謂富者貧昨日忽不見我令訪其鄰奔波自追及把手問所因顧我却興歎君寧異於民離合自古然辭別安足珍吾聞九疑好夙志今欲伸斑竹啼舜婦清湘沈楚臣衡山與洞庭此固道所循尋嵩方抵洛歷華遂之秦浮游靡定處偶往即通津吾言子當去子道非吾遵江魚不池活野鳥難籠馴吾非西方教憐子狂且醇吾嫉惰遊者憐子愚且諄去矣各異趣何為淚霑巾送靈師佛法入中國爾來六百年齊民逃賦役高士著幽禪官吏不之制紛紛聽其然耕桑日失𨽻朝署時遺賢靈師皇甫姓𦙍胄本蟬聯少小涉書史早能綴文篇中間不得意失跡成延遷逸志不拘教軒騰斷牽攣圍碁鬬白黑生死隨機權六博在一擲梟盧叱回旋戰時誰與敵浩汗橫戈鋋飲酒盡百􅊦嘲諧思逾鮮有時醉花月高唱清且綿四座咸寂默杳如奏湘絃尋勝不憚險黔江屢洄沿瞿塘五六月驚電讓歸船怒水忽中裂千尋墮幽泉環回勢益急仰見團團天投身豈得計性命甘徒捐浪沫蹙翻涌漂浮再生全同行二十人魂骨俱坑填靈師不掛懷冒涉道轉延開忠二州牧詩賦時多傳失職不把筆珠璣為君編强留費日月密席羅嬋娟昨者至林邑使君數開筵逐客三四公盈懷贈蘭荃湖游泛漭沆溪宴駐潺湲别語不許出行裾動遭牽鄰州競招請書札何翩翩十月下桂嶺乘寒恣窺緣落落王員外爭迎獲其先自從入賔館占吝久能專吾徒頗攜被接宿窮歡妍聽說兩京事分明皆眼前縱橫雜謡俗瑣屑咸羅穿材調真可惜朱丹在磨研方將斂之道且欲冠其顛韶陽李大守高步凌雲煙得客輒忘食開囊乞繒錢手持南曹叙字重青瑶鐫古氣參象繫高標推太𤣥維舟事干謁披讀頭風痊還如舊相識傾壺暢幽悁以此復留滯歸驂幾時鞭退之闢佛却頻作贈浮屠詩前篇但叙其放浪山水後篇則干謁飲博無所不有其所以稱浮屠者皆彼法之所戒良以不拘彼法乃始近於吾徒且欲人其人而已并未暇明先王之道以道之也二僧逰走諸方行止亦略相似而兩作各開生靣絶不雷同是其匠心布置處某氏曰按後漢明帝夢見金人問羣臣或曰西方有神名曰佛其形長丈六尺而金色於是遣使天竺問佛道法圖畫形象以歸其教因流入中國此詩據漢明帝時言之耳故其佛骨表云自後漢時流入中國又云漢明帝時始有佛法也漢武故事昆邪王殺休屠王來降得其金人之神置之甘泉宮則是佛入中國始自漢武至成哀間已有經矣杜致行守編亦曰漢武作昆明池掘地得黑灰東方朔云可問西域道人西域道人佛之徒也又開皇歷代三寶記云劉向稱豫覽典籍已見有經可知周時九流釋典秦雖爇除漢興復出則先漢之前逆至於周有佛有經其來也遠范曄胡以為明帝之時佛始入中國邪退之一世大儒非承襲謬誤者將由心惡其教不復詳考其源流所自耳縣齊有懷少小尚竒偉平生足悲咤猶嫌子夏儒肻學樊遲稼事業窺臯稷文章蔑曹謝濯纓起江湖綴珮雜蘭麝悠悠指長道去去策高駕誰為傾國媒自許連城價初隨計吏貢屢入澤宫射雖免十上勞何能一戰霸人情忌殊異世路多權詐蹉跎顔遂低摧折氣愈下冶長信非罪侯生或遭罵懷書出皇都銜淚渡清灞身將老寂寞志欲死閒暇朝食不盈腸冬衣才掩髂軍書既頻召戎馬乃連跨大梁從相公彭城赴僕射弓箭圍􅀈絲竹羅酒䏑兩府變荒凉三年就休假求官去東洛犯雪過西華塵埃紫陌春風雨靈臺夜名聲荷朋友援引乏姻婭雖陪彤庭臣詎縱青冥靶寒空聳危闕曉色曜修架捐軀辰在丁鎩翮時方䄍投荒誠職分領邑幸寬赦湖波翻日車嶺石拆天罅毒霧恆熏晝炎風每燒夏雷威固己加颶勢仍相借氣象杳難測聲音吁可怕夷言聽未慣越俗情猶乍指摘兩憎嫌睢盱互猜訝秪緣恩未報豈謂生足藉嗣皇新繼明率土日流化惟思滌瑕垢長去事桑柘斸嵩開雲扄壓潁抗風榭禾麥種滿地梨棗栽繞舍兒童稍長成雀鼠得驅嚇官租日輸納村酒時邀迓閒愛老農愚歸弄小女姹如今便可爾何用畢婚嫁仄韻排律名手所希似此組織精工頓挫悲壯在集中亦自成一格塵埃紫陌一聯與梅花灞水句同一風致顧嗣立曰公詩句句有來歷而能務去陳言者全在於反用如醉贈張祕書詩本用嵇紹鶴立雞羣語偏云張籍學古淡軒鶴避雞羣送文暢詩本用老杜每愁夜中自足蝎句偏云照壁喜見蝎薦士詩本用漢書強弩之末力不能入魯縞語偏云強箭射魯縞嶽廟詩本用謝靈運猿鳴誠知曙句偏云猿鳴鐘動不知曙此詩結語本用向平婚嫁畢事偏云如今便可爾何用畢婚嫁真令舊事翻新解得此祕則臭腐皆化為神奇矣某氏曰貞元十九年十二月公以監察御史上天旱人飢疏貶陽山令辰在丁謂上疏之日也陪杜侍御逰湘西兩寺獨宿有題一首因獻楊常侍長沙千里平勝地猶在險況當江濶處斗起勢匪漸深林高玲瓏青山上琬琰路窮臺殿闢佛事煥且儼剖竹走泉源開廊架崖廣是時秋之殘暑氣尚未斂羣行忘後先朋息棄拘檢客堂喜空凉華榻有清簟澗蔬煮蒿芹水果剝菱芡伊余夙所慕陪賞亦云忝幸逢車馬歸獨宿門不掩山樓黑無月漁火燦星㸃夜風一何喧杉檜屢磨颭猶疑在波濤怵惕夢成魘靜思屈原沈遠憶賈誼貶椒蘭爭妒忌絳灌共讒諂誰令悲生腸坐使淚盈臉翻飛乏羽翼指摘困瑕玷珥貂藩維重政化類分陜禮賢道何優奉巳事苦儉大厦棟方隆巨川楫行剡經營誠少暇逰宴固己歉旅程愧淹留徂嵗嗟荏苒平生每多感柔翰遇頻染展轉嶺猿鳴曙燈青睒睒從獨宿寫景生情先以客堂華榻引起猿鳴燈睒仍就獨宿上結章法一線嶽陽樓别竇司直洞庭九州間厥大誰與讓南匯羣崖水北注何奔放瀦為七百里吞納各殊狀自古澄不清環混無歸向炎風日搜攪幽怪多冗長軒然大波起宇宙隘而妨巍峩拔嵩華騰踔較健壯聲音一何宏轟輵車萬兩猶疑帝軒轅張樂就空曠蛟螭露筍簴縞練吹組帳鬼神非人世節奏頗跌踼陽施見誇麗隂閉感悽愴朝過宜春口極北缺堤障夜纜巴陵洲叢芮才可傍星河盡涵泳俯仰迷下上餘瀾怒不己喧聒鳴甕盎明登嶽陽樓輝煥朝日亮飛亷戢其威清晏息纎纊泓澄湛凝緑物影巧相况江豚時出戲驚波忽蕩漾時當冬之孟隙竅縮寒漲前臨指近岸側坐眇難望滌濯神魂醒幽懷舒以暢主人孩童舊握手乍欣悵憐我竄逐歸相見得無恙開筵交履舄爛漫倒家釀杯行無留停髙柱送清唱中盤進橙栗投擲傾脯醬歡窮悲心生婉孌不能忘念昔始讀書志欲干霸王屠龍破千金為藝亦云亢愛才不擇行觸事得讒謗前年出官由此禍最無妄公鄉採虛名擢拜識天仗姦猜畏彈射斥逐恣欺誑新恩移府庭逼側厠諸將于嗟苦駑緩但懼失宜當追思南渡時魚腹甘所葬嚴程迫風帆劈箭入高浪顛沈在須臾忠鯁誰復諒生還真可喜剋己自懲創庶從今日後粗識得與喪事多改前好趣有獲新尚誓耕十畝田不取萬乘相細君知蠶織稚子己能餉行當掛其冠生死君一訪寫景兩段陽開隂閉范希文嶽陽樓記似從此脫胎說文云芮芮草生貌又水涯也詩芮鞠之即箋水內曰芮水外曰鞠此云叢芮謂洲渚之地水草之間也俞瑒曰此詩前半首寫景後半首述事却用追思南渡時數語挽轉真有千鈞之力且有此一段才見前此鋪張非漫然也可見公布局運筆之妙送文暢師北逰昔在四門館晨有僧來謁自言本吳人少小學城闕己窮佛根源粗識事輗軏攣拘屈吾真戒轄思遠發薦紳秉筆徒聲譽耀前閥從求送行詩屢造忍顛蹶今成十餘卷浩汗羅斧鉞先生閟窮巷未得窺剞劂又聞識大道何路補剠刖出其囊中文滿聽實清越謂僧當少安草序頗排訐上論古之初所以施賞罰下開迷惑胸窙豁斸株橛僧時不聽瑩若飲水救暍風塵一出門時日多如髮三年竄荒嶺守縣坐深樾徴租聚異物詭製怛巾襪幽窮共誰語思想甚含噦昨來得京官照壁喜見蝎况逢舊親識無不比鶼蟨長安多門戶弔慶少休歇而能勤來過重惠安可揭當今聖政初恩澤完䎀狘胡為不自暇飄戾逐鸇鷢僕射領北門威德壓胡羯相公鎮幽都竹帛爛勳伐酒場舞閨姝獵騎圍邊月開張篋中寶自可得津筏從兹富裘馬寧復茹藜蕨余期報恩後謝病老耕垡庇身指蓬茅逞志縱獫猲僧還相訪來山藥煮可掘就北道主人作歆動語純是聲色貨利事昌黎胸次何等乃作此腐鼠之嚇耶緣其惡異學甚於鄙俗情也李光地曰先叙文暢求言而當日作序極陳古義以破其惑即今集中送文暢序是也中言被貶陽山自幸還見親識而僧之往來尤密後乃勸其逃墨來歸以詩文為緣足以自致且與為異日相從之約俞瑒曰公諸長篇用險韻都不傍借正所謂因難見巧不獨贈張十八一首也但江字韻為尤窄耳聞見録曰歐陽公於詩主退之不主子美劉仲原父每不然之公曰子美老夫清晨梳白頭𤣥都道士來相訪有俗氣退之决不道也仲原父曰亦退之昔在四門館晨有僧來謁之句之類公賞其辨樊汝霖曰蘇內翰聞騾䭾試筆余謫居黃州五年今日離泗州北行岸上騾䭾聲空籠意亦欣然蓋不聞此聲久矣退之照壁喜見蝎不虛語也又嶺南歸云己脫問鵩之變行有見蝎之喜皆取諸此答張徹辱贈不知報我歌爾其聆首叙始識靣次言後分形道途綿萬里日月垂十齡浚郊避兵亂睢岸連門停肝膽一古劒波濤兩浮萍漬墨竄舊史磨丹注前經義苑手祕寶文堂耳驚霆暄晨躡露舄暑夕眠風櫺結友子讓抗請師我慙丁初味猶噉蔗遂通斯建瓴搜竒日有富嗜善心無寧石梁平侹侹沙水光泠泠乘枯摘野豔沈細抽潛腥遊寺去陟巘尋徑返穿汀緣雲竹竦竦失路麻冥冥淫潦忽翻野平蕪眇開溟防泄塹夜塞懼衝城晝扃及去事戎轡相逢宴軍伶觥秋縱兀兀獵旦馳駉駉從賦始分手朝京忽同舲急時促暗棹戀月留虛亭畢事驅傳馬居安守窗螢梅花灞水别宫燭驪山醒省選逮投足鄉賔尚摧翎塵祛又一摻淚眥還雙熒洛邑得休告華山窮絶陘倚巖睨海浪引袖拂天星日駕此回轄金神所司刑泉紳拖修白石劍攢高青磴蘚澾拳局梯飈颭伶俜悔狂己咋指垂誡仍鐫銘峨豸忝備列伏蒲愧分涇微誠慕橫草瑣力摧撞筳疉雪走商嶺飛波航洞庭下險疑墮井守官類拘囹荒餐茹獠蠱幽夢感湘靈刺史肅著蔡吏人沸蝗螟㸃綴簿上字趨蹌閣前鈴賴其飽山水得以娛瞻聽紫樹雕斐亹碧流滴瓏玲映波鋪遠錦插地列長屏愁狖酸骨死怪花醉魂馨潛苞絳實坼幽乳翠毛零赦行五百里月變三十蓂漸階羣振鷺入學誨螟蛉蘋甘謝鳴鹿罍滿慙罄瓶冏冏抱瑚璉飛飛聯鶺鴒魚鬛欲脫背虬光先照硎豈獨出醜類方當動朝廷勤來得晤語勿憚宿寒㕔排律用拗體亦是變格調古而詞艷不徒叙致之工筆墨閒録曰劉僴云答張徹一詩尤竒麗梅花灞水一對極有風味顧嗣立曰此詩通首用對句而以生峭之筆行之便與律詩大别少陵橋陵詩便是此種隱居詩話曰李肇國史補載韓愈遊華山窮極幽險心悸目眩不能下發狂號哭投書與家人别華隂令百計取之方能下沈顔作聱書以為肇妄載豈有賢者輕命如此余觀退之贈張徹詩云洛邑得休告華山窮絶陘悔狂己咋指垂戒仍鐫銘則知肇記為信然而沈顔為妄辨也御選唐宋詩醇卷二十八
