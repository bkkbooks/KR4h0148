  text: 欽定四庫全書御選唐宋詩醇卷二十五
  hash: sha256:a5545a31613107b9c5ca899306c00d9382e145cf16e8b29d39dbf0c69ea05110
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_053-1a, image: WYG1448/WYG1448-0497a.png}
body:
  text: 太原白居易詩七秋池二首身間無所為心間無所思况當故園夜復此新秋池岸暗鳥栖後橋明月出時菱風香散漫桂露光參差靜境多獨得幽懷竟誰知悠然心中語自問來何遲朝衣薄且健晚簟清仍滑社近燕影稀雨餘蟬聲歇間中得詩境此境幽難説露荷珠自傾風竹玉相戛誰能一同宿共玩新秋月暑退早涼歸池邊好時節中隱大隱住朝市小隱入丘樊丘樊太冷落朝市大囂喧不如作中隱隱在留司官似出復似處非忙亦非間不勞心與力又免飢與寒終嵗無公事隨月有俸錢君若好登臨城南有秋山君若愛遊蕩城東有春園君若欲一醉時出赴賔筵洛中多君子可以恣歡言君若欲髙卧但自深掩關亦無車馬客造次到門前人生處一世其道難兩全賤即苦凍餒貴則多憂患唯此中隱士致身吉且安窮通與豐約正在四者間胸中無罣礙乃得此空明灑脫之境葺池上舊亭池月夜凄涼池風曉蕭颯欲入池上冬先葺園中閣向暖窗戶開迎寒簾幕合苔封舊瓦木水照新朱蠟軟火深土爐香醪小瓷榼中有獨宿翁一燈對一榻玩止水動者樂流水靜者樂止水利物不如流鑒形不如止凄清早霜降淅瀝微風起中面紅葉開四隅緑萍委廣狹八九丈灣環有涯涘淺深三四尺洞徹無表裏淨分鶴翹足澄見魚掉尾迎眸洗眼塵隔胸蕩心滓定將禪不别明與誠相似清能律貪夫淡可交君子豈唯空狎玩亦取相倫擬欲識靜者心心源只如此見理透體物精晉人無此分寸宋人無此灑脫聞崔十八宿豫新昌敝宅時豫亦宿崔家依仁新亭一宵偶同兩興暗合因而成詠聊以寫懷陋巷掩敝廬髙居敞華屋新昌七株松依仁萬莖竹松前月臺白竹下風池緑君向我齋眠我在君亭宿平生有微尚彼此多幽獨何必本主人兩心聊自足池上夜境晴空星月落池塘澄鮮淨緑表裏光露簟清瑩迎夜滑風襟瀟灑先秋涼無人驚處野禽下新睡覺時幽草香但問塵埃能去否濯纓何必問滄浪逰坊口懸泉偶題石上自注時為河南尹濟源山水好老尹知之久常日聽人言今秋入吾手孔山刀劔立沁水龍蛇走危磴上懸泉澄灣轉坊口虛明見深底淨緑無纎垢仙棹浪悠揚塵纓風斗藪巖寒松柏短石古莓苔厚錦座纓髙低翠屏張左右雖無安石妓不乏文舉酒談笑逐身來管絃隨事有時逄杖錫客或值垂綸叟相與淡忘歸自辰將及酉公門欲返駕溪路猶回首早晚重來逰心期罷官後中幅刻畫山水景致頗近選體起結香山本色詠興五首并序録三首七年四月豫罷河南府歸履道第廬舍自給衣儲自充無欲無營或歌或舞頽然自適蓋河洛間一幸人也遇興發詠偶成五章各以首句命為題目出府歸吾廬出府歸吾廬靜然安且逸更無客干謁時有僧問疾家僮十餘人櫪馬三四匹慵發經旬卧興來連日出出逰愛何處嵩碧伊瑟瑟况有清和天正當疏散日身間自為貴何必居榮秩心足即非貧豈唯金滿室吾觀權勢者苦以身徇物炙手外炎炎履氷中栗栗朝飢口忘味夕惕心憂失但有富貴名而無富貴實胸有真得信手拈來自饒天趣此種詩境的是從淵明脫化而出但不無繁簡古近之别必以字句形迹求之是耳食之見也池上有小舟池上有小舟舟中有胡牀牀前有新酒獨酌還獨嘗熏若春日氣皎如秋水光可洗機巧心可蕩塵垢腸岸曲舟行遲一曲進一觴未知幾曲醉醉入無何鄉夤緣潭島間水竹深青蒼身間心無事白日為我長我若未忘世雖間心亦忙世若未忘我雖退身難藏我今異于是身世交相忘四月池水滿四月池水滿龜遊魚躍出吾亦愛吾池池邊開一室人魚雖異族其樂歸于一且與爾為徒逍遙同過日爾無羡滄海蒲藻可委質吾亦忘青雲衡茅足容膝况吾與爾輩本非蛟龍匹假如雲雨來祗是池中物會心不逺熟讀蒙莊方有此悟境秋涼間卧殘暑晝猶長早涼秋尚嫩露荷散清香風竹含疏韻幽間竟日卧衰病無人問薄暮宅門前槐花深一寸嫩字竒當是從秋老想出却從未經人道代鶴我本海上鶴偶逄江南客感君一顧恩同來洛陽陌洛陽寡族類皎皎唯兩翼貌是天與髙色非日浴白主人誠可戀其奈軒庭窄飲啄雜雞羣年深損標格故鄉渺何處雲水重重隔誰念深籠中七換摩天翮比意深逺立秋夕有懷夢得露簟荻竹青風扇蒲葵輕一與故人别再見新蟬鳴是夕涼飈起間境入幽情回燈見棲鶴隔竹聞吹笙夜茶一兩杓秋吟三數聲所思渺千里雲水長洲城琢句清雅似王維秋日與張賔客舒著作同逰龍門醉中狂歌凡二百三十八字秋天髙髙秋光清秋風嫋嫋秋蟲鳴嵩峯餘霞錦綺卷伊水細浪鱗甲生洛陽間客知無數少出逰山多在城商嶺老人自追逐蓬丘逸士相逄迎南出鼎門十八里莊店邐迤橋道平不寒不熱好時節鞍馬穩快衣衫輕並轡踟蹰下西岸扣舷容與繞中汀開懷曠達無所繫觸目勝絶不可名荷衰欲黃荇猶緑魚樂自躍鷗不驚翠藻蔓長孔雀尾彩船櫓急寒雁聲家醖一壺白玉液野花數把黃金英晝逰四看西日暮夜話三及東方明暫停杯觴輟吟詠我有狂言君試聽丈夫一生有二志兼濟獨善難得并不能救療生民病即須洗濯塵土纓况吾頭白眼已暗終日戚促何所成不如展眉開口笑龍門醉卧香山行南池早春有懷朝逰北橋上晚憩南塘畔西日雪全銷東風氷盡泮篩篩魚尾掉瞥瞥鵝毛換泥暖草芽生沙虛泉脈散晴芳冒苔島宿潤侵蒲岸洛下日初長江南春欲半時光共拋擲人事堪嗟歎倚棹忽尋思去年池上伴妙于體物息心靜觀得之北窗三友今日北窗下自問何所為欣然得三友三友者為誰琴罷輒舉酒酒罷輒吟詩三友遞相引循環無已時一彈愜中心一詠暢四肢猶恐中有間以醉彌縫之豈獨吾拙好古人多若斯嗜詩有淵明嗜琴有啓期嗜酒有伯倫三人皆吾師或乏儋石儲或穿帶索衣絃歌復觴詠樂道知所歸三師去已逺髙風不可追三友逰甚熟無日不相隨左擲白玉巵右拂黃金徽興酣不疊紙走筆操狂詞誰能持此詞為我謝親知縱未以為是豈以我為非猶恐中有間以醉彌縫之濁醪妙理如是正從三日不飲覺形神不復相親語化出有三友便有三師涉筆成趣裴侍中晉公以集賢林亭即事詩二十六韻見贈猥蒙徴和才拙詞繁輒廣為五百言以伸酬獻三江路千里五湖天一涯何如集賢第中有平津池池勝主見覺景新人未知竹森翠琅玕水深洞琉璃水竹以為質質立而文隨文之者何人公來親指麾疏鑿出人意結搆得地宜虛襟一搜索勝概無遁遺因下張沼沚依髙築階基嵩峰見數片伊水分一支南溪修且直長波碧逶迤北館壯復麗倒影紅參差東島號晨光杲曜迎朝曦西嶺名夕陽杳曖留落暉前有水心亭動蕩架漣漪後有開闔堂寒溫變天時幽泉鏡泓澄怪石山攲危春葩雪漠漠夏果珠離離主人命方舟宛在水中坻親賔次第至酒樂前後施解纜始登泛山逰仍水嬉沿洄無滯礙向背窮幽竒瞥過逺橋下飄旋深澗陲管絃去縹眇羅綺來霏微棹風逐舞回梁塵隨歌飛宴餘日云暮醉客未放歸髙聲索彩箋大笑催金巵唱和筆走疾問答杯行遲一詠清兩耳一酣暢四肢主客忘貴賤不知俱是誰客有詩魔者吟哦不知疲乞公殘紙墨一掃狂歌詞維公社稷臣赫赫文武姿十授丞相印五建大將旗四朝致勛華一身冠臯夔去年才七十決赴懸車期公志不可奪君恩亦難違從容就中道俯僶來保釐貂蟬雖未脫鸞鳯已不羈歷徴今與古獨步無等夷陸賈功業少二疏官秩卑乘舟范蠡懼辟穀留侯飢豈若公今日身安家國肥羊祜在漢南空留峴首碑栁惲在江南祗賦汀洲詩謝安入東山但説攜蛾眉山簡醉髙陽唯聞倒接㒿豈如公今日餘力兼有之願公壽如山安樂長在兹願我比蒲稗永得相因依三江路千里至夏果珠離離詳敘林亭結搆之勝公來親指麾五句特筆提寫平章風月行所無事是大作用人間中經濟也主人命方舟至不知俱是誰極言宴飲之樂客有詩魔者至鸞鳯已不羈入到自已歷敘裴之功名出處數行一筆寫出歷徵今與古至餘力兼有之又歷舉古人作襯見其兼有衆美願公壽如山四句以祝頌意作結洋洋大篇一氣呵成又復莊重得體真絶大手筆亦惟度足以當之新唐書裴度傳度治第東都集賢里沼石林叢岑繚幽勝午橋作别墅具燠館涼臺號緑野堂激波其下度野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事晚歸香山寺因詠所懷我年日已老我身日已間間出都門望但見水與山關塞碧巖巖伊流清潺潺中有古精舍軒户無扃關岸草歇可藉徑蘿行可攀朝隨浮雲出夕與飛鳥還吾道本迂拙世途多險艱嘗聞嵇吕輩尤悔生疏頑巢悟入箕潁皓知返商巔豈唯樂肥遁聊復祛憂患吾亦從此去終老伊嵩間劇談録曰樂天為少傅分務洛師情興髙逸盧尚書簡辭有别墅近枕伊水冬日與羣從子姪同遊倚欄眺嵩洛俄而霰雪微下情興益髙因話亷察金陵常記江南煙水每見居人以葉舟浮泛就食菰米鱸魚近來思之如在心目良久忽見二人衣簔笠循岸而來牽引篷艇船頭覆青幕中有白衣人與衲僧偶坐船後有小竈安桐甑丱角童煮茗泝流過于檻前舟中吟嘯方酣問之乃是白傅與僧佛光自建春門往香山精舍此一段可謂天然圖畫洛陽有愚叟洛陽有愚叟白黑無分别浪迹雖似狂謀身亦不拙點檢盤中飯非精亦非糲點檢身上衣無餘亦無闕天時方得所不寒復不熱體氣正調和不飢仍不渴間將酒壺出醉向人家歇野食或烹鮮寓眠多擁褐抱琴榮啓樂荷鍤劉伶達放眼看青山任頭生白髮不知天地內更得幾年活從此到終身盡為間日月苕溪漁隱曰放眼看青山任頭生白髮其超放如此間居自題門前有流水牆上多髙樹竹徑繞荷池縈回百餘步波間戲魚鱉風靜下鷗鷺寂無城市喧渺有江湖趣吾廬在其上偃卧朝復暮洛下安一居山中亦慵去時逄過客愛問是誰家住此是白家翁閉門終老處菩提寺上方晚望香山寺寄舒員外晚登西寶剎晴望東精舍反照轉樓臺輝輝似圖畫氷浮水明滅雪壓松偃亞石閣僧上來雲汀雁飛下西京閙于市東洛間如社曾憶舊逰無香山明月夜真畫景畫家却無下筆處小臺新樹低如帳小臺平似掌六尺白藤牀一莖青竹杖風飄竹皮落苔印鶴迹上幽境與誰同間人自來往似王亦似韋池上作自注西溪南潭皆池中勝處也西溪風生竹森森南潭萍開水沉沉叢翠萬竿湘岸色空碧一泊松江心浦派縈回誤逺近橋島向背迷登臨澄瀾方丈若萬頃倒影咫尺如千尋泛然獨逰邈然坐坐念行心思古今莵裘不聞有泉沼西河亦恐無雲林豈如白翁退老地樹髙竹密池塘深華亭雙鶴白矯矯太湖四石青岑岑眼前盡日更無客膝上此時惟有琴洛陽冠蓋自相索誰肯來此同抽簪小閣間坐閣前竹蕭蕭閣下水潺潺拂簟卷簾坐清風生其間靜聞新蟬鳴逺見飛鳥還但有巾挂壁而無客叩關二疏返故里四老歸舊山吾亦適所願求間而得間起四句颯然而來紙上有聲逰平泉宴浥澗宿香山石樓贈座客逸少集蘭亭季倫宴金谷金谷太繁華蘭亭闕絲竹何如今日會浥澗平泉曲杯酒與管絃貧中隨分足紫鮮林筍嫩紅潤園桃熟采摘助盤筵芳滋盈口腹間吟暮雲碧醉藉春草緑舞妙豔流風歌清叩寒玉古詩惜晝短勸我令秉燭是夜勿言歸相攜石樓宿和夢得洛中早春見贈七韻衆皆賞春色君獨憐春意春意竟如何老夫知此味燭餘減夜漏衾暖添朝睡恬和臺上風虛潤池邊地開遲花養艷語懶鶯含思似訝隔年齋如勸迎春醉何日同宴逰心期二月二自注此日出齋故云開遲花養艷語懶鶯含思十字刻畫工絶寫春意變虛為實尤竒李盧二中丞各創山居俱誇勝絶然去城稍逺來往頗勞敝居新泉實在宇下偶題十五韻聊戲二君龍門蒼石壁李所有也浥澗碧潭水盧所有也各在一山隅迢迢幾十里清鏡碧屏風惜哉信為美愛而不得見亦與無相似聞君每來去矻矻事行李脂轄復裹糧心力頗勞止未如吾舍下石與泉甚邇鑿鑿復濺濺晝夜流不已洛石千萬拳襯波鋪錦綺海珉一兩片激瀨含宫徴緑宜春濯足淨可朝潄齒繞砌紫鱗遊拂簾白鳥起何言履道叟便是滄浪子君若趁歸程請君先到此願以潺湲聲洗君塵土耳夢上山自注時足疾未平夜夢上嵩山獨攜藜杖出千巖與萬壑逰覽皆周畢夢中足不病健似少年日既悟神返初依然舊形質始知形神內形病神無疾形神兩是幻夢寐俱非實晝行雖蹇澀夜步頗安逸晝夜既平分其間何得失一片悟境形病神無疾五字尤有至理錢塘湖春行孤山寺北賈亭西水面初平雲腳低幾處早鶯爭暖樹誰家新燕啄春泥亂花漸欲迷人眼淺草才能沒馬蹄最愛湖東行不足緑楊隂裏白沙堤西湖晚歸回望孤山寺贈諸客栁湖松島蓮花寺晚動歸橈出道場盧橘子低山雨重棕櫚葉戰水風涼煙波淡蕩搖空碧樓殿參差倚夕陽到岸請君回首望蓬萊宫在海中央句法挺健由字法生新也重字戰字搖字倚字俱下得警拔遂覺全首生動故曰鍊句不如鍊字杭州春望望海樓明照曙霞護江隄白踏晴沙濤聲夜入伍員廟栁色春藏蘇小家紅袖織綾誇柿蒂青旗酤酒趁梨花誰開湖寺西南路草緑裙腰一道斜入字藏字極寫望中之景落句結足春意汪立名曰按能改齋漫録云劉次莊樂府解題曰錢塘蘇小歌蘇小非唐人世見樂天夢得詩多稱詠遂謂之同時耳按郭茂倩所編引廣題曰蘇小小錢塘名娼也蓋南齊時人西陵在錢塘江之西故古詞云何處結同心西陵松柏下湖亭晚歸盡日湖亭卧心間事亦稀起因殘醉醒坐待晚涼歸松雨飄藤帽江風透葛衣栁堤行不厭沙軟絮霏霏孤山寺遇雨拂波雲色重灑葉雨聲繁水鷺雙飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留船在寺門餘杭形勝餘杭形勝四方無州傍青山縣枕湖繞郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇獨有使君年太老風光不稱白髭鬚江樓夕望招客海天東望夕茫茫山勢川形濶復長燈火萬家城四畔星河一道水中央風吹古木晴天雨月照平沙夏夜霜能就江樓銷暑否比君茅舍校清涼髙瞻逺矚坐馳可以役萬景他人有此眼力無此筆力江樓晚眺景物鮮竒吟玩成篇寄水部張籍員外淡煙疏雨間斜陽江色鮮明海氣涼蜃散雲收破樓閣虹殘水照斷橋梁風翻白浪花千片雁點青天字一行好著丹青圖畫取題詩寄與水曹郎起句便是極好畫景中四句四面摹寫總為鮮明二字設色落句以圖畫結足歸到寄詩之意篇法極緊晚興草淺馬翩翩新晴薄暮天栁條春拂面衫袖醉垂鞭立語花隄上行吟水寺前等間消一日不覺過三年春題湖上湖上春來似畫圖亂峯圍繞水平鋪松排山面千重翠月點波心一顆珠碧毯線頭抽早稻青羅裙帶展新蒲未能拋得杭州去一半勾留是此湖畫圖二字是詩眼下五句皆實寫畫圖中景以不舍意作結而曰一半勾留言外正有餘情别州民耆老遮歸路壺漿滿别筵甘棠無一樹那得淚澘然稅重多貧户農飢足旱田唯留一湖水與汝救凶年今春增築錢塘湖堤貯水以防天旱故云後四句經濟政績具見其中慈惠之意藹然言表必如此留心民事方許詩酒逰遨彼長日惟消一局棋者那得借口風流也西湖留别征途行色慘風煙祖帳離聲咽管絃翠黛不須留五馬皇恩只許住三年緑藤隂下鋪歌席紅藕花中泊妓船處處回頭盡堪戀就中難别是湖邊答微之誇越州州宅賀上人回得報書大誇州宅似仙居厭看馮翊風沙久喜見蘭亭煙景初日出旌旗生氣色月明樓閣在空虛知君暗數江南郡除却餘杭盡不如中二聨敘越州風景微之所誇也結句戲以折之樂天自誇也酬微之自注微之題云郡務稍簡因得整集舊詩并連綴刪削封章諫草繁委箱笥僅踰百軸偶成自歎兼寄樂天滿帙填箱唱和詩少年為戲老成悲聲聲麗曲敲寒玉句句妍辭綴色絲吟玩獨當明月夜傷嗟同是白頭時由來才命相磨折天遣無兒欲怨誰自注微之句云天遣兩家無嗣子欲將文字付誰人故以此答之陸龜蒙有云淫畋漁者謂之暴天物天物且不可暴又可抉摘削露其情狀乎天能不致罰耶長吉天東野窮玉溪生官不挂朝籍而死正坐是哉由此觀之元白之無後未必非天之致罰也玩落句意香山其自知之矣微之整集舊詩及文筆為百軸以七言長句寄樂天樂天次韻酬之餘思未盡加為六韻海內聲華併在身篋中文字絶無倫遙知獨對封章草忽憶同為獻納臣走筆往來盈卷軸除官遞互掌絲綸制從長慶詞髙古詩到元和體變新各有文姬才稚齒俱無通子繼餘塵琴書何必求王粲與女猶勝與外人答微之見寄自注時在郡樓對雪可憐風景浙東西先數餘杭次會稽禹廟未勝天竺寺錢湖不羡若耶溪擺塵野鶴春毛暖拍水沙鷗濕翅低更對雪樓君愛否紅欄碧甃點銀泥腹聨先將雪意寫透結句點出好景如畫得湖州崔十八使君書喜與杭越鄰郡因成長句代賀兼寄微之三郡何因此結緣貞元科第忝同年故情歡喜開書後舊事思量在眼前越國封疆吞碧海杭城樓閣入青煙吳興卑小君應屈為是蓬萊最後仙自注貞元初同登科崔君名最在後當時崔自詠云人間不會雲間事應笑蓬萊最後仙逐句相承篇法綿密却滅盡針線之迹由其律熟而氣厚也汪立名曰按紀事崔元亮刺湖州時白公刺杭元微之以觀察刺越有唱和詩號三州唱和集贈侯三郎中老愛東都好寄身足泉多竹少埃塵年豐最喜唯貧客秋冷先知是瘦人幸有琴書堪作伴苦無田宅可為鄰洛中縱未長居得且與田蘇逰過春善以文言道俗情本色語倍覺雅馴履道新居二十韻履道坊西角官河曲北頭林園四鄰好風景一家秋門閉深沉樹池通淺沮溝拔青松直上鋪碧水平流籬菊黃金合窗筠緑玉稠疑連紫陽洞似到白蘋洲僧至多同宿賔來輒少留豈無詩引興兼有酒銷憂移榻臨平岸攜茶上小舟果穿聞鳥啄萍破見魚逰地與塵相逺人將境共幽泛潭菱點鏡沉浦月生鈎厨曉煙孤起庭寒雨半收老飢初愛粥瘦冷早披裘洛下招新隱秦中忘舊逰辭章留鳯閣班籍寄龍樓病愜官曹靜間慚俸祿優琴書中有得衣食外何求濟世才無取謀身智不周應須共心語萬事一時休竟體穩洽拔青松直上一聨鍊句尤挺健夢行簡天氣妍和水色鮮間吟獨步小橋邊池塘草緑無佳句虛卧春窗夢阿憐習用語妙于點化渡淮淮水東南濶無風渡亦難孤煙生乍直逺樹望多圓春浪棹聲急夕陽帆影殘濤流宜映月今夜重吟看自到郡齋僅經旬日方專公務未及宴逰偷間走筆題二十四韻兼寄常州賈舍人湖州崔郎中仍呈吳中諸客渭北離鄉客江南守土臣涉途初改月入境已經旬甲郡標天下環封極海濵版圖十萬戶兵籍五千人自顧才能少何堪寵命頻冒榮慚印綬虛奬負絲綸候病須通脈防流要塞津救煩無若靜補拙莫如勤削使科條簡攤令賦役均以兹為報效安敢不躬親襦袴提于手韋弦佩在紳敢辭稱俗吏且願活疲民常未徴黃霸湖猶借寇恂愧無鐺腳政徒忝犬牙鄰制誥誇黃絹詩篇占白蘋銅符拋不得瓊樹見無因警寐鐘傳夜催衙鼓報晨唯知對胥吏未暇接親賔色變雲迎夏聲殘鳥過春麥風非逐扇梅雨異隨輪武寺山如故王樓月自新池塘間長草絲竹廢生塵暑遣燒神酎晴教曬舞茵待還公事了亦擬樂吾身中幅極盡理煩治劇之略蓋到郡經旬而規模已定矣一結即先憂後樂意乃知居易實具經世之才而當時未竟其用為可惜也分司以後時不可為不得已托詩酒以自娛耳救煩無若靜補拙莫如勤十字凡為守令者當録置座右故衫暗淡緋衫稱老身半披半曳出朱門袖中吳郡新詩本襟上杭州舊酒痕殘色過梅看向盡故香因洗嗅猶存曾經爛漫三年著欲棄空箱似少恩所詠止一衫而衫之色香襟袖衫之時地歲月歷歷清出并著衫之人身分性情亦曲曲傳出却又渾成尉貼無一點安排痕迹亦絶不假一字纎巧雕琢此香山擅場處李商隱輩豈能辦此泛太湖書事寄微之煙渚雲帆處處通飄然舟似入虛空玉杯淺酌巡初匝金管徐吹曲未終黃夾纈林寒有葉碧琉璃水淨無風避旗飛鷺翩翻白驚鼓跳魚撥刺紅澗雪壓多松偃蹇巖泉滴久石玲瓏書為故事留湖上吟作新詩寄浙東軍府威容從道盛江山氣色定知同報君一事君應羡五宿澄波皓月中病中多雨逄寒食水國多陰常懶出老夫饒病愛間眠三旬卧度鶯花月一半春消風雨天薄暮何人吹觱篥新晴幾處縛鞦韆綵繩芳樹長如舊唯是年年換少年頸聨何其藴藉宋人年年不帶看花眼不是愁中即病中之句便覺徑直少味重答劉和州自注來篇云蘇州刺史例能詩西掖吟來替左司又云若共吳王鬬百草不如唯是欠西施分無佳麗敵西施敢有文章替左司隨分笙歌聊自樂等間篇詠被人知花邊妓引尋香徑月下僧留宿劔池可惜當時好風景吳王應不解吟詩不敢替左司但可傲睨吳王即蘇軾云識字劣能欺項籍也城上夜宴留春不住登城望惜夜相將秉燭逰風月萬家河兩岸笙歌一曲郡西樓詩聽越客吟何苦酒被吳娃勸不休從道人生都是夢夢中歡笑亦勝愁六月三日夜聞蟬荷香清露墜栁動好風生微月初三夜新蟬第一聲乍聞愁北客靜聽憶東京我有竹林宅别來蟬再鳴不知池上月誰撥小船行一片空明詩境至此才許當一清字直是天分髙絶鈍根人何從學步晚起卧聽鼕鼕衙鼓聲起遲睡足長心情華簪脫後頭雖白堆案拋來眼校明間上籃輿乘興出醉回花舫信風行明朝更濯塵纓去聞道松江水最清河亭晴望九月八日風轉雲頭斂煙銷水面開晴虹橋影出秋雁櫓聲來郡靜官初罷鄉遙信未回明朝是重九誰勸菊花杯氣味近老杜夢蘇州水閣寄馮侍御揚州驛裏夢蘇州夢到花橋水閣頭覺後不知馮侍御此中昨夜共誰逰吳郡志戴顒宅北禪寺唐司勳郎中陸洟嘗居之有花橋水閣太湖石煙翠三秋色波濤萬古痕削成青玉片截斷碧雲根風氣通巖穴苔紋護洞門三峯具體小應是華山孫律法渾成腹聨刻畫絶警結句陡健有力祕省後廳槐花雨潤新秋地桐葉風翻欲夜天盡日後廳無一事白頭老監枕書眠寄殷協律自注多敘江南舊逰五嵗優遊同過日一朝消散似浮雲琴詩酒伴皆拋我雪月花時最憶君幾度聽雞歌白日亦曾騎馬詠紅裙吳娘暮雨蕭蕭曲自别江南更不聞無限感慨冶語更凄涼臨都驛答夢得六言二首揚子津頭月下臨都驛裏燈前昨日老于前日去年春似今年謝守歸為袐監馮公老作郎官前事不須問著新詩且更吟看節短音長春詞低花樹映小妝樓春入眉心兩點愁斜倚欄干背鸚鵡思量何事不回頭艷體妙于藴籍送敏中歸豳寧幕六十衰翁兒女悲傍人應笑爾應知弟兄垂老相逢日杯酒臨歡欲散時前路加餐須努力今宵盡醉莫推辭司徒知我難為别直過秋歸未訝遲情景一湧而出清空如話倍覺沉著深摯惻惻動人棣華雁影浮詞不掃自去池窗池晚蓮芳謝窗秋竹意深更無人作伴唯對一張琴送鶴與裴相臨别贈詩司空愛爾爾須知不信聽吟送鶴詩羽翮勢髙寧惜别稻粱恩厚莫愁飢夜棲少共雞爭樹曉浴先饒鳯占池穩上青雲勿回顧的應勝在白家時腹聨便是一生得力處豈徒贈鶴兼可風世正與送崔考功赴闕意同馮斑曰比興忠厚烏夜啼城上歸時晚庭前宿處危月明無葉樹霜滑有風枝啼澀飢喉咽飛低凍翅垂畫堂鸚鵡鳥冷暖不相知夜景刻畫極警一結托興尤深送東都留守令狐尚書赴任翠華黃屋未東巡碧洛青嵩付大臣地稱髙情多水竹山宜間望少風塵龍門即擬為逰客金谷先憑作主人歌酒家家花處處莫空管領上陽春汪立名曰按寶歷二年敬宗欲幸東都諫者皆不聽已使按修宫闕賴裴度婉言而罷明年為文宗太和元年令狐楚以三年春留守東都故公首句及此蓋文宗方勵精圖治盡反敬宗弊政未東巡之語有微辭焉想東逰五十韻并序太和三年春豫病免官後憶逰浙右數郡兼思到越一訪微之故兩浙之間一物以上想皆在目吟且成篇不能自休盈五百字亦猶孫興公想天台山而賦之也海內時無事江南嵗有秋生民皆樂業地主盡賢侯郊靜銷戎馬城髙逼斗牛平河七百里沃壤二三州坐有湖山趣行無風浪憂食寧妨解纜寢不廢乘流泉石諳天竺煙霞識虎丘餘芳認蘭澤遺詠思蘋洲菡萏紅塗粉菰蒲緑潑油鱗差漁戶舍綺錯稻田溝紫洞藏仙窟玄泉貯怪湫精神昂老鶴姿彩媚潛虯靜閲天工妙間窺物狀幽投竿出比目擲果下獼猴味苦蓮心小漿甜蔗節稠橘苞從自結藕孔是誰鎪逐日移潮信隨風變棹謳遞夫交烈火候吏次鳴騶梵塔形疑踊閶門勢欲浮客迎攜酒榼僧待置茶甌小宴間談笑初筵雅獻酬稍催朱蠟炬徐動碧牙籌圓盞飛蓮子長裾曵石榴柘枝隨畫鼓調笑從香毬幕揚雲飄檻簾褰月露鉤舞繁紅袖凝去聲歌切翠眉愁絃管寧容歇杯盤未許收良辰宜酩酊卒嵗好優遊膾縷鮮仍細蓴絲滑且柔飽餐為日計穩睡是身謀名愧空虛得官知止足休自嫌猶屑屑衆笑太悠悠物表疏形役人寰足悔尤蛾須逺燈燭兔勿近罝罘幻世春來夢浮生水上漚百憂中莫入一醉外何求未死凝王湛無兒老鄧攸蜀琴安膝上周易在牀頭去去無程客行行不繫舟勞君頻問訊勸我少淹留自注自此後並屬微之雲雨多分散關山苦阻修一吟江月别七見日星周珠玉傳新什鵷鸞念故儔懸旌心宛轉束楚意綢繆驛舫粧青雀官槽秣紫騮鏡湖期逺泛禹穴約冥搜預掃題詩壁先開望海樓飲思親履舄宿憶並衾裯志氣吾衰也風情子在不應須相見後别作一家逰洋洋纚纚一氣轉旋細意尉貼層次井然起伏照應極變化斷續之妙將至東都先寄令狐留守黃鳥無聲葉滿枝間吟想到洛城時惜逄金谷三春盡恨拜銅樓一月遲詩境忽來還自得醉鄉潛去與誰期東都添箇狂賔客先報壺觴風月知詩境忽來還自得蕭子顯所謂須其自來不以力搆也杜甫詩成覺有神亦是此意晚桃花一樹紅桃亞拂池竹遮松蔭晚開時非因斜日無由見不是間人豈得知寒地生材遺校易貧家養女嫁常遲春深欲落誰憐惜白侍郎來折一枝比意深婉總從一晚字生情寒地生材句自是主意以貧家養女句更切桃花故仍以上句作陪律法極細阿崔謝病卧東都羸然一老夫孤單同伯道遲暮過商瞿豈料鬢成雪方看掌弄珠已衰寧望有雖晚亦勝無蘭入前春夢桑懸昨日弧里閭多慶賀親戚共歡娛膩剃新胎髮香綳小繡襦玉芽開手爪酥顆點肌膚弓冶將傳汝琴書勿墜吾未能知壽夭何暇慮賢愚乳氣初離殼啼聲漸變雛何時能反哺供養白頭烏寫小兒初生端詳入細一結喜極不覺慮其將來軟語心酸逼真老人情景此種自讓香山獨步御選唐宋詩醇卷二十五
