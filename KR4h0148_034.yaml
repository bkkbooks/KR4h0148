front:
  text: 欽定四庫全書御選唐宋詩醇巻十六
  hash: sha256:78be776a0d2e8578a2c2e468b0fe2786fb4c8b2a23e1d7b7fbd224eaf8e2c6d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_034-1a, image: WYG1448/WYG1448-0347a.png}
body:
  text: 襄陽杜甫詩八目録涪江泛舟送韋班歸京春日梓州登樓郪城西原送李判官兄武判官弟赴成都府送路六侍御入朝望牛頭寺上兠率寺登牛頭山亭子陪李梓州王閬州蘇遂州李果州四使君登恵義寺涪城縣香積寺官閣戲題寄上漢中王倦夜對雨王命有感送元二適江左章梓州水亭翫月呈漢中王登髙遣憤送陵州路使君赴任西山三首絶句城上傷春五首放船奉待嚴大夫奉寄髙常侍將赴荆南寄别李劔州泛江陪王使君晦日泛江就黄家亭子春逺百舌地隅游子歸夢滕王亭子玉臺觀滕王亭子渡江送韋郎司直歸成都將赴成都草堂途中有作先寄嚴鄭公别房大尉墓自閬州領妻子却赴蜀山行三首山館倚杖登樓春歸歸雁贈王二十四侍御契四十韻寄董卿嘉榮十韻過故斛斯校書莊二首立秋雨院中有作奉和嚴鄭公軍城早秋院中晚晴懷西郭茅舎宿府遣悶奉呈嚴公二十韻送舍弟穎赴齊州奉觀嚴鄭公㕔事岷山沲江畫圖十韻正月三日歸溪上有作簡院内諸公春日江村絶句哭嚴僕射歸櫬渝州候嚴六侍御不到先下峽禹廟題忠州龍興寺所居院壁旅夜書懷十二月一日長江二首承聞故房相公靈櫬自閬州啓殯歸塟東都有作二首懷錦水居止子規立春漫成一絶老病南楚寄岑嘉州
  hash: sha256:0058abec264f85af8dd6a75516b632a125cb097362c30588b73cb9304fced08f
