  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_075-1a, image: WYG1448/WYG1448-0695c.png}
body:
  text: 眉山蘇軾詩五九日黄樓作去年重陽不可説南城夜半千漚發水穿城下作雷鳴泥滿城頭飛雨滑黄花白酒無人問日暮歸來洗鞾韈豈知還復有今年把琖對花容一呷莫嫌酒薄紅粉陋終勝泥中千柄鍤黄樓新成壁未乾清河巳落霜初殺朝來白露如細雨南山不見千尋刹樓前便作海茫茫樓下空聞櫓鴉軋薄寒中人老可畏熱酒澆腸氣先壓煙消日出見漁村逺水鱗鱗山齾齾詩人猛士雜龍虎自注坐客三十餘人多知名之士楚舞呉歌亂鵞鴨一杯相屬君勿辭此景何殊泛清霅去年今年雨夕晴朝各寫得淋漓盡致驅濤湧雲夐出千古王宗稷東坡先生年譜曰元豐元年改築徐州外小城迺即徐州城之東門為大樓堊以黄土名之曰黄樓以土實勝水故也子由作黄樓賦先生跋云元豐元年八月癸丑樓成九月庚辰大合樂以落之九日黄樓詩云去年重陽不可説南城夜半千漚發以去年九月大水未退故有是語次韻王鞏獨眠居士身心如稿木旅館孤眠體生粟誰能相思琢白玉服藥千朝償一宿天寒日短銀燈續欲徃從之車脱軸何人吹斷參差竹泗水茫茫鴨頭緑次韻僧潜見贈道人胸中水鏡清萬象起滅無逃形獨依古寺種秋菊要伴騷人餐落英人間底處有南北紛紛鴻鴈何曽㝠閉門坐穴一禪榻頭上嵗月空崢嶸今年偶出為求法欲與慧劍加礱硎雲衲新磨山水出霜髭不剪兒童驚公侯欲識不可得故知倚市無傾城秋風吹夢過淮水想見橘柚垂空庭故人各在天一角相望落落如晨星彭城老守何足顧棗林桑野相邀迎千山不憚荒店逺兩脚欲趁飛猱輕多生綺語磨不盡尚有宛轉詩人情猿吟鶴唳本無意不知下有行人行空堦夜雨自清絶誰使掩抑啼孤惸我欲仙山掇瑶草傾筐坐歎何時盈簿書鞭扑晝填委煮茗燒栗宜宵征乞取摩尼照濁水共㸔落月金盆傾潛雖詩僧而能明心寂守故此詩不甚稱其工詩特以次韻見贈之作宜及於詩但比之猿吟鶴唳想見其髙致至後有送參寥師一首專與説詩軾嘗以書告文同謂其詩句清絶與林逋上下而通了道義見之令人肅然此軾所為樂與從㳺而酬答歟冷齋夜話曰呉僧道潛有標置常自姑蘇歸西湖經臨平道中作詩東坡赴官錢塘過而見之大稱賞巳而相尋於西湖一見如舊相識及坡移守東徐潛往訪之館於逍遥堂士大夫爭識之百歩洪并引王定國訪余於彭城一日棹小舟與顔長道携盼英卿三子游泗水北上聖女山南下百歩洪吹笛飲酒乘月而歸余時以事不得往夜著羽衣佇立黄樓上相視而笑以為李太白死世間無此樂三百餘年矣定國既去逾月復與參寥師放舟洪下追懐曩㳺巳為陳迹喟然而歎故作二詩一以遺參寥一以寄定國且示顔長道舒堯文邀同賦云長洪斗落生跳波輕舟南下如投梭水師絶呌鳧鴈起亂石一線爭磋磨有如兎走鷹隼落駿馬下注千丈坡斷絃離柱箭脱手飛電過隙珠翻荷四山眩轉風掠耳但見流沫生千渦嶮中得樂雖一快何異水伯夸秋河我生乘化日夜逝坐覺一念逾新羅紛紛爭奪醉夢裏豈信荆棘埋銅駝覺來俯仰失千刼回視此水殊委蛇君㸔岸邉蒼石上古來篙眼如蜂窠但應此心無所住造物雖駛如吾何回船上馬各歸去多言譊譊師所呵用譬喻入詩文是軾所長此篇摹寫急浪輕舟竒勢迭出筆力破餘地亦真是險中得樂也後幅寛舒以飬氣猶時見警策容齋三筆曰韓蘇兩公為文章用譬喻處重複聨貫至有七八轉者韓公送石洪序云論人髙下事後當成敗若河决下流東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也盛山詩序云儒者之於患難其拒而不受於懐也若築河隄以障屋霤其容而消之也若水之於海氷之於夏日其翫而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲蘇公百歩洪詩云長虹斗落生跳波輕舟南下如投梭水師絶呌鳧鴈起亂石一線爭磋磨有如兎走鷹隼落駿馬下注千丈坡斷絃離柱箭脱手飛電過隙珠翻荷之類是也佳人未肎回秋波㓜輿欲語防飛梭輕舟弄水買一笑醉中盪槳肩相磨不學長安閭里俠貂裘夜走臙脂坡獨將詩句擬鮑謝渉江共採秋江荷不知詩中道何語但覺兩頰生微渦我時羽服黄樓上坐見織女初斜河歸來笛聲滿山谷明月正照金叵羅奈何捨我入塵土擾擾毛羣欺卧駝不念空齋老病叟退食誰與同委蛇時來洪上㸔遺迹忍見屐齒青苔窠詩成不覺雙淚下悲吟相對惟羊何欲遣佳人寄錦字夜寒手冷無人呵叠韻愈出愈竒百鍊剛化為繞指柔古今無敵手此篇與前篇合㸔益見其才大而肆容齋五筆曰白樂天為河南尹日有答舒員外云員外游香山寺數日不歸兼辱手書大誇勝事時正值坐衙慮囚之際走筆題長句以贈之歐陽公官洛陽與謝希深同游嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳歌妓至此勞之曰山行良勞當少留龍門賞雪府事簡無遽歸也王定國訪東坡於彭城游泗水南下百歩洪東坡以事不得徃既去逾月追憶作詩曰輕舟弄水買一笑醉中盪槳肩相摩歸來笛聲滿山谷明月正照金叵羅此三游之勝今之燕賔者寧復有之蓋亦值知巳也送參寥師上人學苦空百念巳灰冷劍頭惟一吷焦糓無新頴胡為逐吾軰文字爭蔚炳新詩如玉屑出語便清警退之論草書萬事未嘗屏憂愁不平氣一寓筆所騁頗怪浮屠人視身如丘井頽然寄淡泊誰與發豪猛細思乃不然真巧非幻影欲令詩語妙無厭空且静静故了羣動空故納萬境閲世走人間觀身卧雲嶺鹹酸雜衆好中有至味永詩法不相妨此語當更請取韓愈論髙閒上人草書之㫖而反其意以論詩正得詩法三昧者其後嚴羽遂專以禪喻詩至為分别宗乘此篇早巳為之㸃出光明王士禎嘗謂李杜如來禪蘇黄祖師禪不妄也夜過舒堯文戱作先生堂上霜月苦弟子讀書喧兩廡推門入室書縱横蠟紙燈籠晃雲母先生骨清少眠卧長夜黙坐數更鼓耐寒石研欲生氷得火銅缾如過雨郎君欲出先自贊坐客歛袵誰敢侮明朝阮籍過阿戎應作羲之羡懐祖寫教授情景逼當逼真然俗塵己去而千仞祈雪霧豬泉出城馬上作贈舒堯文三年走呉越踏遍千重山朝隨白雲去暮與棲鴉還翩如得木狖飛歩誰能攀一為符竹累坐老敲榜閒此行亦何事聊散腰腳頑浩蕩城西南亂山如玦環山下野人家桑柘雜榛菅嵗晏風日暖人牛相對閒薄雪不蓋土麥苖稀可刪願君發豪句嘲詼破天慳逺景近村歴歴在目何啻置身圖畫中臺頭寺歩月得人字風吹河漢掃微雲歩屧中庭月趁人浥浥爐香初泛夜離離花影欲揺春遥知金闕同清景想見氊車碾暗塵回首舊遊真是夢一簪華髪岸綸巾石林詩話曰詩下䨇字極難須使七言五言之間除去五言三字外精神興致全見於兩言方為工妙唐人記水田飛白鷺夏木囀黄鸝為李嘉祐詩摩詰竊取之非也此兩句好處正在添漠漠隂隂四字嘉祐本句但是詠景耳要之當令如老杜無邉落木蕭蕭下不盡長江衮衮來與江天漠漠鳥䨇去風雨時時龍一吟乃為超絶近世蘇子瞻浥浥爐香初泛夜離離花影欲揺春此可以追配前作也種松得徠字自注其四在懐古堂其六在石經院春風吹榆林亂莢飛作堆荒園一雨過戢戢千萬栽青松種不生百株望一枚一枚巳有餘氣壓千畆槐野人易斗粟云是魯徂徠魯人不知貴萬竈飛青煤束縛同一車胡為乎來哉泫然解其縛清泉洗浮埃枝傷葉尚困生意未肎回山僧老無子飬䕶如嬰孩坐待走龍蛇清隂滿南䑓孤根裂山石直幹排風雷我今百日客自注時去替不百日飬此千嵗材茯苓無消息雙鬢日夜摧古今一俛仰作詩寄餘哀青松本是難生而魯人又不知貴一枚之氣何時而伸詩中始如嬰孩之飬終成千嵗之材隐然儲才愛才一段真摯其所寓意者微矣以䨇刀遺子由子由有詩次其韻寳刀匣不見但見龍雀環何曽斬蛟蛇亦未切琅玕胡為穿窬軰見之要領寒吾刀不汝問有媿在其肝念此力自藏包之虎皮斑湛然如古井終嵗不復瀾不憂無所用憂在用者難佩之非其人匣中自長歎我老衆所易屢遭非意干惟有王元通堦庭秀芝蘭知子後必大故擇刀所便屠狗非不用一嵗六七刓欲試百鍊剛要須更泥蟠作詩銘其背以待知者㸔用王覽事作骨前路波翻雲騰曲折如意更無有一閒字虱其間烏臺詩案曰此詩胡為穿窬軰四句以詆當時邪佞之人耳月夜與客飲杏花下杏花飛簾散餘春明月入户尋幽人褰衣歩月踏花影炯如流水涵青蘋花間置酒清香發爭挽長條落香雪山城薄酒不堪飲勸君且吸杯中月洞簫聲斷月明中惟憂月落酒杯空明朝巻地春風惡但見緑葉栖殘紅清幽超逺乃所謂自然髙妙者方嶽妄以杏花影下著此為辱真是囈語深雪偶談曰坡公月夜與客飲酒杏花下詩流水青蘋之喻景趣盡矣前人未嘗道也獨杏花影下洞簫聲中着此句辱耳及志林所記徐州時冬夜解衣欲睡月色入户欣然起行念無與樂者遂至承天寺尋張懐民亦未寢相與歩於中庭庭下如積水空明水中荇藻交横盖竹栢影也何夜無月何處無竹栢但少閒人如吾兩人耳使施前句於斯時豈非稱歟志林曰僕在徐州王子立子敏皆舘於官舍而蜀人張師厚來過二生方年少吹洞簫飲酒杏花下明年余謫黄州對月獨飲嘗有詩云去年花落在徐州對月酣歌羙清夜蓋憶與二王飲時也答郡中同僚賀雨水旱行十年饑疫遍九土竒窮所向惡嵗嵗祈晴雨雖非為已求重請終愧古神鬼亦知我老病入腰膂何曽拜向人此意難不許重雲萋已合微潤先流礎蕭蕭止還作坐聼及三鼓天明將吏集泥土滿鞾屨登城望麰麥緑浪風掀舞愧我賢友生䧺篇鬭新語君㸔大熟嵗風雨占十五天地本無功祈禳何足数渡河不入境豈若無蝗虎而况刑白鵞下䇿君勿取天地本無功四句此議論絶正絶大然非一切諉之於數可以坐觀成敗也詩特論其大原而以下䇿自居志慙謝之意於答賀者體固應爾雙前段老病入腰膂何曽拜向人十字本是相連皆承知我二字説下而却以一句屬上一句屬下此如杜詩不薄今人愛古人乃是今人愛古人五字相連韓詩為此座上客及余各能文乃是為此座上客及余七字相連皆極句法變化之妙罷徐州往南京馬上走筆寄子由五首録二首吏民莫扳援歌管莫凄咽吾生如寄耳寧獨為此别别離隨處有悲惱縁愛結而我本無恩此涕誰為設紛紛等兒戲鞭證遭割截道邊雙石人幾見太守發有知當解笑撫掌冠纓絶父老何自來花枝褭長紅洗盞拜馬前請夀使君公前年無使君魚鼈化兒童舉鞭謝父老正坐使君窮窮人命分惡所向招災凶水來非吾過去亦非吾功截鐙留鞭扳轅擁路去任作疑愧之語不必賢者能道也首作之竒正在道邊䨇石人一轉雜以詼諧含藴靡盡次作使君問之父老答之使君復謝謝畢便住不増益一字章法古直非近時手筆所能舟中夜起微風蕭蕭吹菰蒲開門㸔雨月滿湖舟人水鳥兩同夢大魚驚竄如奔狐夜深人物不相管我獨形影相嬉娯暗潮生渚弔寒蚓落月挂桞㸔懸蛛此生忽忽憂患裏清境過眼能須臾鷄鳴鐘動百鳥散船頭擊鼓還相呼一片空明通神入悟情性所至妙不自尋遊惠山并引余昔為錢塘倅往來無錫未嘗不至惠山既去五年復為湖州與髙郵秦太虛杭僧參寥同至覽唐處士王武陵竇羣朱宿所賦詩愛其語清簡蕭然有出塵之姿追用其韻各賦三首夢裏五年過覺來雙鬢蒼還將塵土足一歩漪瀾堂俯窺松桂影仰見鴻鶴翔炯然肝肺間已作氷玉光虛明中有色清淨自生香還從世俗去永與世俗忘薄雲不遮山踈雨不濕人蕭蕭松徑滑䇿䇿芒鞵新嘉我二三子皎然無緇磷勝游豈殊昔清句仍絶塵弔古泣舊史疾讒歌小旻哀哉扶風子難與巢許鄰自注謂竇羣敲火發山泉烹茶避林樾明牕傾紫盞色味兩竒絶吾生眠食耳一飽萬想滅頗笑玉川子飢弄三百月豈如山中人睡起山花發一甌誰與共門外無來轍贈惠山僧惠表行遍天涯意未闌將心到處遣人安山中老宿依然在案上楞嚴已不㸔欹枕落花餘幾片閉門新竹自千竿客來茶罷空無有盧橘楊梅尚帶酸語經妙悟所謂羚羊挂角無迹可求者冷齋夜話曰東坡云淵明詩初㸔若散緩熟讀有竒趣如大匠運斤無斧鑿痕不知者疲精力至死不悟東坡作對如山中老宿依然在案上楞嚴已不看之類更無齟齬之態細味之對偶親的而字不露也此其得淵明之遺意耳客來茶罷空無有盧橘楊梅尚帶酸張嘉甫問東坡盧橘何種果類答曰枇杷是也又問何以驗之答曰事見相如賦嘉甫曰盧橘夏熟黄甘橙榛枇杷橪柿亭奈厚朴則盧橘果類賦不應四句重用應劭注曰伊尹書曰箕山之東青馬之所有盧橘常夏熟不據依何也東坡曰意不欲耳與秦太虛參寥㑹於松江而關彦長徐安中適至分韻得風字二首録一首呉越溪山興未窮又扶衰病過垂虹浮天自古東南水送客今朝西北風絶境自忘千里逺勝游難復五人同舟師不㑹留連意擬㸔斜陽萬頃紅端午遍逰諸寺得禪字肩輿任所適遇勝輒留連焚香引幽歩酌茗開淨筵微雨止還作小牕幽更妍盆山不見日草木自蒼然忽登最髙塔眼界窮大千卞峰照城郭震澤浮雲天深沈既可喜曠蕩亦所便幽尋未云畢墟落生晚煙歸來記所歴耿耿清不眠道人亦未寢孤燈同夜禪微雨小牕深沉可喜也卞峰震澤曠蕩所便也寓目輙書詳畧各盡其致東坡詩話曰僕為呉興有游飛英寺詩云微雨止還作小忩幽更妍盆山不見日草木自蒼然自非至呉越不見此境也和孫同年卞山龍洞禱晴呉興連月雨釡甑生魚蛙徃問卞山龍曷不安厥家梯空尚巉絶俯視驚谽谺神井湧雲盖隂崖垂蘚花交流百道泉赴谷走羣蛇不知落何處隠隠如繅車我來叩石户飛䑕翻白鴉寄語洞中龍睡味豈不嘉雨師少弭節雷師亦停撾積水得反壑稲苖出泥沙農夫免菜色龍亦飽豚豭㸔君擁黄紬髙卧放晚衙水光山色揺漾筆端通體作告龍之詞而以安厥家詰之以睡味勸之以飽豚豭利之語諧而肅李厚曰㸔君擁黄紬髙卧放晚衙文潞公為榆次縣令嘗題詩縣樓鼓云置向譙樓一任撾撾多撾少不知他如今幸有黄紬被努出頭來放早衙盖用本朝故事云與客遊道塲何山得鳥字清溪到山盡飛路盤空小紅亭與白塔隐見喬木杪中休得小菴孤絶寄雲表洞庭在北户雲水天𣺌𣺌菴僧俗縁盡淨業洗未了十年畫鵲竹益以詩自繞髙堂儼像設禪室各深窈奔泉何處來華屋過谿沼何山隔幽谷去路清且悄長松度翠蔓絶壁挂嗁鳥我友自杭來尚歎所歴少歸途風雨作一洗紅日燎俄驚萬竅號黑霧巻蓬蓼舟人紛變色坐羡輕鷗矯我獨喚酒杯醉死勝流殍書生例强很造物空煩擾更將掀舞勢把燭畫風篠羙人為破顔正似腰支嫋明朝更陳迹清景墮空杳作詩記餘歡萬古一昏曉集中登臨諸作無不名句紛披而意象各别此與前遊道塲山何山一詩既無一筆相犯篇中兩言畫竹文外曲致情徃興來泛舟城南㑹者五人分韻賦詩得人皆苦炎字四首城中樓閣似魚鱗不見清風起白蘋試選苕谿最深處仍呼我軰不羈人窺船野鶴何曽下見燭飛蟲空自馴遶郭荷花一千頃誰知六月下塘春施元之曰誰知六月下塘春今震澤以南派太湖之水亂苕霅二谿以通舟楫東盡呉興西盡餘杭名曰下塘苦熱誠知處處皆何當危坐學心齋海螯要共詩人把谿月行遭霧雨霾鄉國飄零斷書信弟兄流落隔江淮便應築室苕谿上荷葉遮門水浸堦紫蠏鱸魚賤如土得錢相付何曽數碧筩時作象鼻彎白酒微帶荷心苦運肘風生㸔斫鱠隨刀雪落驚飛縷不將醉語作新詩飽食應慙腹如鼓橋上遊人夜未厭共依水檻立風簷樓中煮酒初嘗芡月夜新粧半出簾南郭清游繼顔謝北牕歸卧等羲炎人間寒熱無窮事自笑疎頑不受痁境本平近賦出閒情四詩思如湧泉趣昭而理舉次韻李公擇梅花詩人固長貧日午飢未動偶然得一飽萬象困嘲弄尋花不論命愛雪長忍凍天公非不憐聽飽即喧閧君為三郡守所至滿賔從江湖常在眼詩酒事豪縱奉使今折磨清比於陵仲永懐茶山下擕妓修春貢更憶檻泉亭揷花雲髻重蕭然卧灊麓愁聽春禽哢忽見早梅花不飲但孤諷詩成獨寄我字字愈頭痛嗟君本侍臣筆橐從上雍脱鞾吟芍藥給札賦雲夢何人慰流落嘉蘤天為種杯傾笛中吟㡌拂果下鞚感時念羇旅此意吾儕共故山亦何有桐花集么鳯君亦憶匡廬歸掃藏書洞何當種此花各抱漢隂罋胸次鬱勃隨處激發其言感飢貧念羇旅似無當於梅花觸緒濡毫忽深感慨固知文必本於情也李氏山房藏書記曰余友李公擇少時讀書於廬山五老峰下白石菴之僧舍公擇既去而山中之人思之指其所居為李氏山房藏書凡九千餘巻公擇將以遺來者供其無窮之求是以不藏於家而藏於其所故居之僧舍此仁者之心也趙次公曰茶山春貢湖州事也張君房脞説云湖州長城縣啄木嶺金沙泉每嵗造茶之所與王郎昆仲及兒子邁遶城觀荷花登峴山亭晚入飛英寺分韻得月明星稀四首昨夜雨鳴渠曉來風襲月蕭然欲秋意谿水清可啜環城三十里處處皆佳絶蒲蓮浩如海時見舟一葉此間真避世青蒻低白髪相逄欲相問已逐驚鷗沒清風定何物可愛不可名所至如君子草木有嘉聲我行本無事孤舟任斜横中流自偃仰適與風相迎舉杯屬浩𣺌樂此兩無情歸來兩谿間雲水夜自明苕水如漢水鱗鱗鴨頭青呉興勝㐮陽萬瓦浮青㝠我非羊叔子愧此峴山亭悲傷意則同嵗月如流星從我兩王子髙鴻揷修翎湛軰何足道當以徳自銘吏民憐我懶鬭訟日已稀能為無事飲可作不夜歸復尋飛英遊盡此一寸暉撞鐘履聲集顛倒雲山衣我來無時節杖屨自推扉莫作使君㸔外似中已非此與人皆苦炎分韻詩體製不同而精爽入神虛明獨照並是杜詩所云炯如一段清水出萬壑置在迎風含露之玉壺者也與胡祠部游法華山陂湖欲盡山為界始見寒泉落髙派道人未放泉出山曲折虛堂瀉清快使君年老尚兒戱緑棹紅船舞澎湃一笑翻杯水濺帬餘歡濯足波生隘長松攙天龍起立蒼藤倒谷雲崩壊仰穿䝉宻得清曠一覽震澤吁可怪誰云四萬八千頃𣺌𣺌東盡日所曬歸途十里盡風荷清唱一聲聞露薤自注是日樂工有作此聲者嗟予少小慕真隠白髪青衫天所械忽聞佳士與名山何異枯腸便馬疥君猶鸞鶴偶飄墮六翮如雲豈長鎩不將新句紀兹逰恐負山中清淨債揚袂風山舉䄂隂澤曲折清快四字即可移以評此詩趙次公曰挽歌有蒿里薤露之曲言薤頭露也今先生却壓露薤字盖縁杜詩有盈筐承露薤句也趙閲道髙齋見公奔走謂公勞聞公隠退云公髙公心底處有髙下夢幻去來隨所遭不知髙齋竟何義此名之設縁吾曹公年四十已得道俗縁未盡餘伊臯功名富貴俱逆旅黄金知繫何人袍超然已了一大事掛冠而去真秋毫坐㸔猿猱落罝罔兩手未肎置所操乃知賢逹與愚陋豈直相去九牛毛長松百尺不自覺企而羡者蓬與蒿我欲贏糧徃問道未應舉臂辭盧敖奔走隠退二語道盡庸耳俗目矣超然已了一大事者謂與佛慧為友也長松百尺二句借比喻托出髙字與前不知髙齋竟何義句相呌應冷齋夜話曰趙閲道休官歸老三衢作髙齋居之與鍾山佛慧禪師為方外交趙䕫曰趙清獻公年未七十告老於朝不許請之不已元豐二年二月加太子少保致仕年七十二矣退居於衢有溪石松竹之勝東南髙士多從之遊朝廷有事郊廟再起公侍祠不至其子㞦通判温州從公㳺天台雁蕩呉越間榮之㞦提舉浙東西常平復侍公逰杭始公自杭致仕杭人留公不得行公曰六年當復來至是適六嵗矣杭人得公如見父母以疾還衢予以事繫御史臺獄獄吏稍見侵自度不能堪死獄中不得一别子由故作二詩授獄卒梁成以遺子由聖主如天萬物春小臣愚暗自亡身百年未滿先償債十口無歸更累人是處青山可埋骨他年夜雨獨傷神與君世世為兄弟又結來生未了因栢臺霜氣夜凄凄風動琅璫月向低夢遶雲山心似鹿魂飛湯火命如鷄眼中犀角真吾子身後牛衣愧老妻百嵗神遊定何處桐鄉知葬浙江西自注獄中聞杭湖間民為余作解厄道塲者累月故有此句此時已無復生全之望而詞不怨懟獨戀戀於兄弟之間預結來生詩意極痛切深厚軾有惠政於浙末以朱邑奉嘗桐鄉自喻固自信不疑也十二月二十八日䝉恩責授檢校水部員外郎黄州團練副使復用前韻百日歸期恰及春餘年樂事最闗身出門便旋風吹靣走馬聫翩鵲啅人卻對酒杯渾是夢試拈詩筆巳如神此災何必深追咎竊禄從來豈有因平生文字為吾累此去聲名不厭低塞上縱歸他日馬城東不鬬少年鷄休官彭澤貧無酒隐几維摩病有妻堪笑睢陽老從事為予投檄下江西自注子由聞予下獄乞以官爵贖予罪貶筠州監酒詩獄甫觧又矜詩筆如神殆是豪氣未盡除在次首特為詩筆如神下一轉語城中不鬭少年鷄進乎道矣行營雜録曰東坡直史館神宗朝以議新法不合補外李定之徒媒孽其詩文有訕上語下詔獄欲寘之死上獨庇之得出孫公談圃曰子瞻得罪時有朝士賣一詩䇿内有使墨君事者遂下獄李定何正臣劾其事以指斥論謂蘇曰學士數有名節何不與他招了蘇曰軾為人臣不敢萌此心却未知何人造此意一日禁中遣馮宗道按獄止貶黄州團練副史過淮朝離新息縣初亂一水碧暮宿淮南村已渡千山赤麏鼯號古戍霧雨暗破驛回頭梁楚郊永與中原隔黄州在何許想像雲夢澤吾生如寄耳初不擇所適但有魚與稲生理已自畢獨喜小兒子少小事安佚相從艱難中肝肺如鐵石便應與晤語何止寄衰疾自注時家在子由處獨與兒子邁南來不必作坐愁行嘆語但寫荒凉景色而遷謫之感已是凄然言下梅花二首春來幽谷水潺潺的皪梅花草棘間一夜東風吹石裂半隨飛雪渡闗山何人把酒慰深幽開自無聊落更愁幸有清谿三百曲不辭相送到黄州少年時嘗過一村院見壁上有詩云夜凉疑有雨院靜似無僧不知何人詩也宿黄州禪智寺寺僧皆不在夜半雨作偶記此詩故作一絶佛燈漸暗飢䑕出山雨忽來修竹鳴知是何人舊詩句已應知我此時情境真則情味自深欷歔欲絶壁上之詩乃潘閬所作潘閬夏日宿西禪寺題曰此地絶炎蒸深疑到不能夜凉知有雨院靜若無僧枕潤連雲榻牕明照佛燈浮生多賤骨時日恐難勝詩見宋文鑑今注蘇詩者多未引及此初到黄州自笑平生為口忙老來事業轉荒唐長江繞郭知魚羙好竹連山覺筍香逐客不妨員外置詩人例作水曹郎只慚無補絲毫事尚費官家壓酒嚢自注檢校官例折支多得退酒袋因江而知魚羙見竹而覺筍香確是初到情景員外水曹則新授頭銜也末句承腹聨説下亦是初任事之詞方回曰東坡元豐二年冬責授檢校水部員外郎黄州團練使本州安置明年二月到郡何遜張籍孟賔于三詩人皆水部定惠院寓居月夜偶出幽人無事不出門偶逐東風轉良夜參差玉宇飛木末繚繞香煙來月下江雲有態清自媚竹露無聲浩如瀉已驚弱栁萬絲垂尚有殘梅一枝亞清詩獨吟還自和白酒已盡誰能借不辭青春忽忽過但恐懽意年年謝自知醉耳愛松風㑹揀霜林結茅舍浮浮大甑長炊玉溜溜小糟如壓蔗飲中真味老更濃醉裏狂言醒可怕閉門謝客對妻子倒冠落佩從嘲罵清遊勝賞一徃作氣衆澄鮮之語忽念及懽意日謝又説到醉裏狂言醒可怕謫居中情緒若掲次韻前篇去年花落在徐州對月酣歌羙清夜自注去年花下對月與張君厚王子中兄弟飲酒作蘋字韻詩今年黄州見花發小院閉門風露下萬事如花不可期餘年似酒那禁瀉憶昔扁舟泝巴峽落帆樊口髙桅亞長江衮衮空自流白髪紛紛寧少借竟無五畆繼沮溺空有千篇凌鮑謝至今歸計負雲山未免孤衾眠客舍少年辛苦真食蓼老境安閒如啖蔗饑寒未至且安居憂患已空猶夢怕穿花踏月飲村酒免使醉歸官長罵字字鎔鍊而出食蓼啖蔗尤為見道之言次韻較原作為更創獲長慶因繼松陵倡和猶當遜謝何况餘子軾作王子立墓誌云子立子敏皆從余學於呉興學道日進東南之士稱之又云予得罪於呉興親戚故人皆驚散獨兩王子不去送予出郊曰死生禍福天也公其如天何返取予家致之南都二王於軾情分如此故切切念之非直以對月酣歌追懐勝遊已也安國寺尋春卧聞百舌呼春風起尋花栁村村同城南古寺修竹合小房曲檻欹深紅㸔花歎老憶年少對酒思家愁老翁病眼不羞雲母亂鬢絲强理茶烟中遥知二月王城外玉仙洪福花如海薄羅匀霧蓋新粧快馬爭風鳴雜珮玉川先生真可憐一生耽酒終無錢病過春風九十日獨抱添丁㸔花發尋春寫爛漫之景宜也乃因㸔花而嘆老因嘆老而憶年少又因對酒而思家因思家而愁老翁一句三折含毫邈然復齋漫録曰玉仙觀在京城東南宣化門七八里間仁宗時陳道士所修葺花木亭臺四時逰客不絶東坡詩所謂玉仙洪福花如海是也寓居定惠院之東雜花滿山有海棠一株土人不知貴也江城地瘴蕃草木只有名花苦幽獨嫣然一笑竹籬間桃李漫山總麤俗也知造物有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠䄂巻紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑先生食飽無一事散歩逍遥自捫腹不問人家與僧舍拄杖敲門㸔修竹忽逢絶艶照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不易到銜子飛來定鴻鵠天涯流落俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸朱唇二句繪其態林深二句傳其神雨中二句寫其韻不染鉛粉不渉描摹乃得是追魂攝魄之筆倘中無寫發但一味作嘆息流落之詞豈復有此容齋五筆曰白樂天琵琶行一篇直欲攄寫天涯淪落之恨爾東坡謫黄州賦定惠院海棠詩有陋邦何處得此花無乃好事移西蜀天涯流落俱可念為飲一尊歌此曲之句其意亦爾也或謂殊無一話一言與之相似是不然此真能用樂天之意者何必效常人章摹句寫而後已哉苕溪漁隐叢話曰此詩詞格超逸不復蹈襲前人元豐間東坡謫黄州寓居定惠院院之東小山上有海棠一株特繁茂每嵗盛開時必為携客置酒巳五醉其下矣故作此長篇平生喜為人寫盖人間刋石者自有五六本云軾平生得意詩也雨中㸔牡丹三首霧雨不成㸃映空疑有無時於花上見的皪走明珠秀色洗紅粉暗香生雪膚黄昏更蕭瑟頭重欲相扶明日雨當止晨光在松枝清寒入花骨肅肅初自持午景發濃艶一笑當及時依然暮還歛亦自惜幽姿幽姿不可惜後日東風起酒醒何所見金粉抱青子千花與百草共盡無妍鄙未忍汙泥沙牛酥煎落蘂首作句句有雨在次作言明日此作言後日又從雨中而想雨後之景層見疊出章法如列眉賀裳曰雨中㸔牡丹詩依然暮還歛亦自惜幽姿二句尤有雅人深致武昌銅劍歌并引供奉官鄭文嘗官於武昌江岸裂出古銅劍文得之以遺余冶鑄精巧非鍛冶所成者雨餘江清風巻沙雷公躡雲捕黄虵虵行空中如枉矢電光煜煜燒虵尾或投以塊鐙有聲雷飛上天虵入水水上青山如削鐵神物欲出山自裂細㸔兩脅生碧花猶是西江老蛟血蘇子得之何所為蒯侯弹鋏詠新詩君不見凌煙功臣長九尺腰間玉具髙拄頣文之竒偉恠譎固由才思天成然無根之談作者弗尚故世謂杜詩韓筆無一字無來歴也如此篇全是廣異記來加之鎔鍊遂成竒光異彩豈後人臆説者所能彷像其萬一廣異記曰唐開元末武勝之為宣州司士知靜江軍事忽然灘中見雷公踐微雲逐小黄蛇盤繞灘上靜江之夫戲以石投之中蛇鏗然作金聲雷公乃飛去使人徃視之得一銅劍有文曰許旌陽斬蛟第三劍云曉至巴口迎子由去年御史府舉動觸四壁幽幽百尺井仰天無一席隔牆聞歌呼自恨計之失留詩不忍寫苦淚漬紙筆餘生復何幸樂事有今日江流鏡靣淨烟雨輕羃羃孤舟如鳧鷖㸃破千頃碧聞君在磁湖欲見隔咫尺朝來好風色旗尾西北擲行當中流見笑眼清光溢此邦疑可老修竹帯泉石欲買柯氏林兹謀待君必元豐庚申五月轍來齊安故有迎之之作前半追憶在御史臺有授獄卒梁成以遺之之作不勝其戚後半則因其將至而預期㑹晤之樂不勝其懽却以餘生復何幸樂事有今日二句於中作轉軸敏妙絶倫與子由同遊寒谿西山散人出入無町畦朝遊湖北暮淮西髙安酒官雖未上兩腳垂欲穿塵泥與君聚散若雲雨共惜此日相提擕千揺萬兀到樊口一箭放溜先鳧鷖層層草木暗西嶺瀏瀏霜雪鳴寒谿空山古寺亦何有歸路萬頃青玻瓈我今漂泊等鴻鴈江南江北無常栖幅巾不礙過城市欲踏徑路開新蹊自注路有直入寒谿不過武昌者卻憂别後不忍到見子行迹空餘悽吾儕流落豈天意自坐迂濶非人擠行逄山水輙羞歎此去未免勤鹽虀何當一遇李八百自注李八百宅在筠州相哀白髪分刀圭軾以詩獄謫黄州轍亦謪筠州監鹽酒税相見宜不勝感愴者而詩云吾儕流落豈天意自坐迂濶非人擠詩人忠厚之㫖次韻子由病酒肺疾發憶子少年時肺病疲坐卧喊呀或終日勢若風雨過虛陽作浮漲客冷仍下墮妻孥恐悵望膾炙不登坐終年禁晚食半夜發清餓胃强鬲苦滿肺歛腹輒破三彭姿啖囓二䜿肎逋播寸田可治生誰勸耕黄稬自注新發方田謂黄稬為上膄探懐得真藥不待君臣佐初如雪花積漸作櫻桃大隔牆聞三嚥隐隐如轉磨自兹失故疾陽唱隂輙和神仙多歴試中路或坎坷平生不盡噐痛飲知無奈舊人眼看盡老伴餘幾個殘年一斗粟待子同舂簸云何不自珍醉病又一挫真源結梨棗世味等糠莝耕耘當待穫願子勤自課相將賦逺㳺仙語不用些少時病状曲述情形已乃幸其疾愈計及殘年老伴斗粟同舂意思無不盡矣醉病一挫陡然入題而以不自珍重一語歸咎之切切入情正月廿日徃岐亭郡人潘古郭三人送余於女王城東禪莊院十日春寒不出門不知江栁已揺村稍聞决决流氷谷盡放青青沒燒痕數畆荒園留我住半瓶濁酒待君温去年今日闗山路細雨梅花正斷魂一結含藴無窮彷彿少陵東閣官梅之作苕溪漁隐叢話曰東坡詩去年今日闗山路細雨梅花正斷魂韓子蒼詩云只度闗山魂已斷何須疎雨濕梅花此蓋反東坡之意但為闗山斷魂却無佳思也志林曰讀隋書地里志黄州乃永安郡今黄州東十五里許有永安城而俗謂之女王城其説甚鄙野御選唐宋詩醇巻三十六
