  text: 欽定四庫全書御選唐宋詩醇卷四十二
  hash: sha256:64ece58aa8f54786627e3c223cab90606a0ebfcd7873334438c1b24fc503c586
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_087-1a, image: WYG1448/WYG1448-0828c.png}
body:
  text: 山隂陸游詩一三百篇之後自楚騷漢魏六朝以至於唐而詩之變盡矣變有必極則所就亦以時異故宋人繼唐之後不規規模擬前人要以自成一家而止然其體製雖殊而波瀾未嘗二也耳食之流未窺古人門户於一代大家橫生訾議而不善學者又徒襲其聲貌亦兩失之矣宋自南渡以後必以陸游為冠當時稱大家者曰蕭楊范陸楊萬里則曰尤蕭范陸至劉克莊乃曰放翁學士似杜甫又曰南渡而下放翁故為一大宗朱子與徐賡載書放翁詩讀之爽然近代惟見此人為有詩人風致今諸家詩具在可與游匹者誰也觀游之生平有與杜甫類者少歷兵間晚棲農畝中間浮沉中外在蜀之日頗多其感激悲憤忠君愛國之誠一寓於詩酒酣耳熱趺蕩淋漓至於漁舟樵徑荼碗爐熏或雨或晴一草一木莫不著為咏歌以寄其意此與甫之詩何以異哉詩至萬首瑕瑜互見評者以為譬之深山大澤包含者多不暇剪除蕩滌非如守半畝之宮一木一石可屈指計數可謂知言矣若捐疵纇存英華略纎巧可喜之詞而發其閎深微妙之指何嘗不與李杜韓白諸家異曲同工可以配東坡而無愧者哉茲所存者僅逾二十之一直使天青木響水落石出其有以破拘士之見而守劍南門户者亦知所取則也夫寄酬曾學士學宛陵先生體比得書云所寓廣教僧舍有陸子泉每對之輒奉懷庭中下乾鵲門外傳逺書小印紅屈蟠兩端黃蠟塗開緘展矮紙滑細疑卵膚首言勞良苦後問逮妻孥中間勉以仕語意極勤渠字如老瘠竹墨淡行踈踈詩如古鼎篆可愛不可摹快讀醒人意垢癢逢爬梳細讀味益長炙轂出膏腴行吟坐卧看廢食至日晡想見落筆時萬象聽指呼亦知題詩處緑井石髮粗公間計有客煎茶置風爐倘公無客時濯纓亦足娛井名本季疵思人理豈無居然及賤子愧謝恩意殊幾時得從公舊學鋤荒蕪古文講聲形誤字辨魯魚時時酌井泉露芽奉瓢盂不知公許否因風報何如送曾學士赴行在二月侍燕觴紅杏寒未坼四月送入都杏子已可摘流年不貸人俯仰遂成昔事賢要及時感此我心惻欲書加餐字寄之西飛翮念公為民起我得怨乖隔遙遙跋前旌去去望車軛亭鄣鬱將暮落日淡陂澤敢忘國士風涕泣效臧獲敬輸千一慮或取二三䇿公歸對延英清問方側席民瘼公所知願言寫肝膈向來酷吏橫至今有遺螫織羅士破膽白著民碎魄詔書已屢下宿蠧或未革期公作醫和湯劑窮絡脉士生恨不用得位忍辭責併乞謝諸賢努力光竹帛前篇學宛陵此遂并近工部道義相朂辭意俱古唐書劉晏傳州縣取富人督漕挽謂之船頭主郵遞謂之捉驛稅外橫取謂之白著新夏感事百花過盡緑隂成漠漠爐香睡晚晴病起兼旬踈把酒山深四月始聞鶯近傳下詔通言路已卜餘年見太平聖主不忘初政美小儒惟有涕縱橫風調清蒼立言得體直是通達治理非尋常嘲風㺯月者比王士正曰劉公㦷論詩云七律較五律多二字耳其難什倍譬開硬弩袛到七分若到十分滿古今亦罕矣豫因思唐宋以來為此體者何翅千百人求其十分滿者唯杜甫李頎李商隱陸游及明之空同滄溟二李數家耳文集曾文清公志銘泰上懲秦士專政之後開言路奬孤直應詔論事者甚衆留題雲門草堂小住初為旬月期二年留滯未應非尋碑野寺雲生屨送客溪橋雪滿衣親滌硯池餘墨漬卧看爐靣散煙霏他年逰宦應無此早買漁蓑未老歸度浮橋至南臺客中多病廢登臨聞說南臺試一尋九軌徐行怒濤上千艘橫繫大江心寺樓鐘鼓催昏曉墟落雲煙自古今白髮未除豪氣在醉吹橫笛坐榕隂頷聨寫浮橋語頗偉麗五六雄渾中興象自逺有涵蓋一切之氣還縣霽色清和日已長綸巾蕭散意差强飛飛鷗鷺陂塘緑鬱鬱桑麻風露香南陌東村初過社輕裝小隊似還鄉哦詩忘却登車去枉是人言作吏忙三四間雅可愛畫手有不能寫處航海我不如列子神逰御天風尚應似安石悠然雲海中卧看十幅蒲彎彎若張弓潮來湧銀山忽復磨青銅飢鶻抗船舷大魚舞虛空流落何足道豪氣蕩肺胸歌罷海動色詩成天改容行矣跨鵬背弭節蓬萊宮東陽道中風欹烏帽送輕寒雨㸃春衫作碎斑小吏知人當著句先安筆硯對溪山送七兄赴揚州帥幕初報邊烽照石頭旋聞胡馬集瓜州諸公誰聽芻蕘䇿吾輩空懷畎畝憂急雪打窗心共碎危樓望逺涕俱流豈知今日淮南路亂絮飛花送客舟五句承上但覺忠憤填胸不復論其造句之警此子美嫡嗣他人不能到也以石芥送劉韶美禮部劉比釀酒徑甚因以為戲古人重改陽城驛吾輩欣聞石芥名風味可人終骨鯁尊前真見魯諸生草木名物見好賢之意風人微㫖可以風世厲俗元微之陽城驛詩商有陽城驛名同陽道州陽公沒已久感我淚交流祠曹諱羊祜此驛何不侔我欲避公諱名為避賢郵寄張真父舍人諸公方衮衮無地著斯人萬里䕫州守中朝禁省臣孤帆秋上峽五馬曉班春想見懷明主登臨白髮新病中簡仲彌性唐克明蘇訓直移疾還家暫曲肱依然耐久北窗燈心如澤國春歸雁身是雲堂旦過僧細雨佩壺尋廢寺夕陽下馬弔荒陵小留莫厭時追逐勝社年來冷欲氷原注三君皆有歸志故云晚泊慈姥磯下山斷峭崖立江空翠靄生漫多來往客不盡古今情月碎知流急風高覺笛清兒曹笑老子不睡待潮平格力殊健起勢尤為挺拔夜宿陽山磯將曉大雨北風甚徑俄頃行三百餘里遂抵雁翅浦五更顛風吹急雨倒海翻江洗殘暑白浪如山潑入船家人驚怖篙師舞此行十日苦滯留我亦蘆叢厭鳴櫓書生快意輕性命十丈蒲帆百夫舉星馳電騖三百里坡隴聨翩雜平楚船頭風浪聲愈厲助以長笛撾鼉鼓豈惟澎湃震山嶽直恐澒洞連后土起看草木盡南靡水鳥號鳴集洲渚稽首龍公謝風伯區區未濤煩神許應知老去負壯心戲遣窮途出豪語王士禎曰南渡惟陸務觀為大宗七言遜杜韓蘇黃諸大家正坐沈鬱頓挫少耳要非餘人所及送全州趙都曹霜桑無停聲脂車有行色正悲南浦秋又送清湘客啼飢兒頰紅待養親髮白努力事上官世路日已迫發端清妙後幅語帶憤激矣病中作豫章瀕大江氣候頗不令孟冬風薄人十室八九病外寒客肺胃下濕攻腳脛俗巫醫不藝嗚呼安託命我始屏藥囊治疾以清靜幻妄消六塵虛白全一性三日體遂輕成此不戰勝長年更事多苦語君試聽醉中歌吾少貧賤真臞儒貪食嗜味老不除折腰斂版日走趨歸來聊以醉自娛長瓶巨榼羅杯盂不須漁翁勸三閭牛尾膏美如凝酥猫頭輪囷欲専車黃雀萬里行頭顱白鵝作鮓天下無潯陽糖蟹徑尺餘吾州之蔊尤嘉蔬珍盤餖飣百味俱不但項臠與腹腴悠然一飽自笑愚顧為口腹勞形軀投劾行矣歸園廬莫厭糲飯嘗黃葅上已臨川道中二月六夜春水生陸子初有臨川行溪深橋斷不得渡城近卧聞吹角聲三月三日天氣新臨川道中愁殺人纎纎女手桑葉緑漠漠客舍桐花春平生怕路如怕虎幽居不省逰城府鶴軀苦瘦坐長飢龜息無聲惟默數如今自憐還自笑斂版低心事年少儒冠未恨終自誤刀筆最驚非素料五更欹枕一悽然夢裏扁舟水接天紅蕖緑芰梅山下白塔朱樓禹廟邊隨意隨意上漁舟幽尋不預謀清溪欣始泛野寺憶前逰豐嵗雞豚賤霜天柿栗稠餘生知有幾且置萬端憂起句之妙正以不著意得之逰山西村莫笑農家臘酒渾豐年留客足雞豚山重水復疑無路柳暗花明又一村簫鼓追隨春社近衣冠簡朴古風存從今若許閒乘月拄杖無時夜叩門有如彈丸脫手不獨善寫難狀之景雨霽出逰書事十日苦雨一日晴拂拭拄杖西村行清溝泠泠流水細好風習習吹衣輕四鄰蛙聲已閣閣兩岸柳色爭青青辛夷先開半委地海棠獨立方傾城春工遇物初不擇亦秀燕麥閉蕪菁薺花如雪又爛漫百草紅紫那知名小魚誰取置道側細柳穿頰危將烹欣然買放寄吾意草萊無地蘇疲氓閒閒即目有鳶飛魚躍之意末句一轉便追風人非大家烏能有此上虞逆旅見舊題嵗月感懷舴艋為家東復西今朝破曉下前溪青山缺處日初上孤店開時鶯亂啼倦枕不成千里夢壞墻閒覔十年題漆園傲吏猶非達物我區區豈足齊題十八學士圖隋日昏曀東來傾雷塘風吹草木腥平時但忌黑色兒不知乃有虬鬚生晉陽龍飛雲滃滃關洛萬里即日平東征歸來脫金甲天䇿開府延豪英琴書閒暇永清晝簪履光彩明華星高參伊呂列佐命下者才氣猶崢嶸但餘一恨到千載高陽繆公來竄名老奸得志國幾喪李氏誅徙連孤嬰向令亟念履霜戒危亂安得存勾萌衆賢一佞禍尚爾掩卷涕淚臨風橫自古知人不易一經指出便為炯戒此詩之有關政治者筆亦徑直無比唐書秦王使閻立本圖像文學禇亮為之贊題名爵里號十八學士圖夜聞松聲有感清晨放船落星石大風吹帆如箭激回頭已失廬山雲却上吳城觀落日夜深龍歸擘祠門入木數寸留爪㾗明朝就視心尚栗腥風卷地雷霆奔歸船買酒持自慰性命生平驚屢戲固知神怒有定時波紋蹙作魚鱗細如今衰病卧林坰霜覆茒簷月滿庭松聲驚破三更夢猶作當時風浪聽原注余丙戌七月自京口移官豫章冒風濤自星子解舟不半日至吳城山小龍廟十二月一日東風吹斗柄暖律變嚴凝草色迷殘燒溪流帶斷氷兒書春日榜女翦上元燈莫笑蒲龕睡山翁怯嵗增宿楓橋七年不到楓橋寺客枕依然半夜鐘風月未須輕感慨巴山此去尚千重所謂一畨拈起一畨新也雨中泊趙屯有感歸燕羈鴻共斷魂萩花楓葉泊孤村風吹暗浪重添纜雨送新寒半掩門魚市人煙橫慘淡龍祠蕭鼓閙黃昏此身且健無餘恨行路雖難莫更論潘問竒曰三四風景颯然五六亦稱入蜀記大風解船經皖口至趙屯未朝日已行百五十里而風益大乃泊夾中趙屯有戍兵亦小市聚也夜雨秋風秋風吹客檣節物嘆遐方嵗事忽云莫吾行殊未央霜清漢水緑日落楚山蒼此去三巴路無猿亦斷腸前四句疏宕五六撑拄得起結有餘力逼真盛唐格律重陽照江丹葉一林霜折得黃花更斷腸商略此時須痛飲細腰宮畔過重陽王士禎曰偶與友人論宋人絶句若放翁照江丹葉一林霜舟中一雨掃飛蠅江上荒城猿鳥悲諸篇皆可直追唐音入蜀記九日泊塔子磯求菊花於江上人家得數枝芬馥可愛為之頽然徑醉沙頭遊子行愈逺沙頭逢莫秋孫劉鼎足地荆益犬牙州鼓角風雲慘江湖日夜浮此生應衮衮高枕看東流雄渾悲壯直摩浣花之壘移船沙際舟銜尾相依作四鄰暮年多感慨分路亦酸辛折竹占行日吹簫賽水神無勞問亭驛久客自知津將離江陵莫莫過渡頭旦旦走隄上舟人與關吏見熟識顔狀癡頑久不去常恐遭誚讓昨日到檣竿今日聨百丈買薪備雨雪儲米滿瓶盎明當遂去此障袂先側望即今孟冬月波濤幸非壯潦收出竒石霧卷見叠嶂地嶮多崎嶇峽束少平曠從來樂山水臨老愈跌宕皇天憐其狂擇地令自放山花白似雪江水緑於釀竹枝本楚些妙句寄悽愴何當出清詩千古續遺唱入蜀記九月二十日倒檣竿立艫牀蓋上峽惟用艫及百丈不復張帆矣百丈以巨竹四破為之大如人臂豫所乘千六百斛船用艫六枝百丈兩車滄灘百夫正歡助鳴艫舟中對面不得語須㬰人散寂無譁惟聞百丈轉兩車嘔嘔啞啞車轉急舟人已在沙際立露斂蘆村落照紅雨餘漁舍炊煙濕故鄉回首已千山上峽初經第一灘少年亦慕宦逰樂投老方知行路難松滋小酌西逰六千里此地最凄凉騷客久埋骨巴歌猶斷腸風聲撼雲夢雪意接瀟湘萬古茫茫恨悠然付一觴五六翛然意逺兼有沈雄之氣孟浩然云獵響驚雲夢漁歌激楚詞妙處故應遜此晚泊松滋渡口小灘拍拍顱鷀飛深竹蕭蕭杜宇悲看鏡不堪衰病後繫船最好夕陽時生涯落魄惟耽酒客路蒼茫自咏詩莫問長安在何許亂山孤店是松滋繫舟下牢溪游三游洞二十八韻舊觀三峽圖常謂非人情意疑天壤間豈有此峥嶸畫師定戲耳聊欲窮丹青西游過沔鄂莽莽千里平昨日到峽州所見始可驚乃知畫非妄却恨筆未精及兹下牢戍峰嶂畢自呈下入裂坤軸高騫插青冥角勝多列峙擅美有孤撑或如釜上甑或如坐後屏或如倨而立或如喜而迎或深如螺房或踈如窗櫺峨巍冠冕古婀娜髻鬟傾其間絶出者虎搏蛟龍獰崩崖凛欲墮修梁架空橫懸瀑㵼無底終古何時盈幽泉莫知處但聞珩珮鳴怪怪與竒竒萬狀不可名久聞三游洞疾走忘病嬰竇穴初漆黑傴僂捫壁行方虞觸蟄蛇俯見一㸃明扶接困僮奴恍然出瓶罌穹穹厦屋寬滴乳成微泓題名歐與黃雲蒸蒼蘚平穿林走驚麕拂面逢飛鼪息倦盤石上拾樵置茶鐺長嘯畣谷響清吟和松聲辭卑不堪刻猶足寄友生語竒句老頗近昌黎視南山蓋具體而微爾秋風亭拜寇萊公遺像江上秋風宋玉悲長官手自葺茅茨人生窮達誰能料蠟淚成堆又一時感慨繫之其風調致佳王士禎曰詩意以蠟淚成堆為公貴後事按后山叢談所記則自其微時已然既為宰相乃所謂無地起樓臺相公也此萊公英雄本色所以不可及入蜀記巴東謁冦萊公祠登秋風亭下臨江山是日重隂微雪天氣飂飄復觀亭名使人悵然始有流落天涯之歎聞猿瘦盡腰圍不為詩良辰流落自成衰也知客裏偏多感誰料天涯有許悲漢塞角殘人不寐渭城歌罷客將離故應未抵聞猿恨况是巫山廟裏時排宕開闔波瀾無限格調自李商隱得之故自青出於藍瞿塘行四月欲盡五月來峽中水漲何雄哉浪花高飛暑路雪灘石怒轉晴天雷千艘萬舸不敢過篙工柂帥心膽破人人隂拱待勢衰誰敢輕行犯竒禍一朝時去不自由山腹空有沙㾗留君不見陸子嵗暮來䕫州嬰塘峽水平如油入蜀記入瞿塘峽兩壁對聳上入霄漢其平如削成仰視天如匹練然水已落峽中平如油盎踏磧鬼門關外逢人日踏磧千家萬家出竹枝慘戚雲不動劒器聨翩日將夕行人十有八九癭見怪何曾羞顧影江邊沽酒沙上卧峽口月出風吹醒人生未死信難知憔悴䕫州生鬢絲何日畫船搖桂楫西湖却賦探春詩鄉中每以寒食立夏之間省墳客䕫適逢此時悽然感懷手持緑酒酹蒼苔今嵗何由匹馬來清淚不隨春雨斷孤吟欲和暮猿哀皂貂破敝歸心切白髮凄凉老境催誓墓只思長不出松門日日手親開風雨中望峽口諸山竒甚戲作短歌白鹽赤甲天下雄拔地突兀摩蒼穹凜然猛士撫長劒空有豪健無雍容不令氣象少渟滀常恨天地無全功今朝忽悟始歎息妙處元在煙雨中太隂殺氣橫慘淡元化變態含空濛正如竒材遇事見平日乃與常人同安得朱樓高百尺看此疾雨吹橫風竒思橫出傑語迭見晚晴聞角有感暑雨初收白帝城小荷新竹夕陽明十年塵土青衫色萬里江山畫角聲零落親朋勞逺夢凄凉鄉社負歸耕議郎博士多新奏誰致當時魯二生游嘗與范成大論東坡遙知叔孫子已致魯諸生句謂為意深語緩此詩結意雖顯亦有不盡之致畏虎滑路滑如苔澀路澀若梯更堪都梁下一雪三日泥泥深尚云可委身餓虎蹊心寒道上跡魄碎茆葉低常恐不自免一死均豬雞老馬亦甚畏愶愶不敢嘶吾聞虎雖暴未嘗窺汝棲孤行莫不止取禍非排擠彼讒實有心平地生溝溪哀哉馬新息薏苡成珠犀得詩人激刺之㫖截然徑住彌健彌深鄰水延福寺早行化蝶方酣枕聞雞又著鞭亂山徐吐日積水逺生煙淹泊真衰矣登臨獨惘然桃花應笑客無酒到愁邊原注酒偶盡市酤不可飲著語之工視四更山吐月殘夜水明樓一警健一細緻大安病酒留半日王守復來招不往送酒解醒因小飲江月館江驛春酲半日留更煩送酒為扶頭柳花漠漠嘉陵岸别是天涯一假愁曉發金牛客枕何時穩匆匆又束裝快晴生馬影新暖坼花房沮水春流緑嶓山曉色蒼阿瞞狼狽地千古有遺傷原注自金牛以西皆明皇幸蜀路山南行我行山南已三日如繩大路東西出平川沃野望不盡麥隴青青桑鬱鬱地近函秦氣俗豪鞦韆蹴鞠分朋曹苜蓿連雲馬蹄健楊柳夾道車聲高古來歷歷興亡處舉目山川尚如故將軍堂上冷雲低丞相祠前春日暮國家四紀失中原師出江淮未易吞㑹看金鼓從天下却用關中作本根和高子長參議道中梁州四月晚鶯啼共憶扁舟罨畫溪莫作世間兒女態明年萬里駐安西翩翩有俠氣次韻張季長題龍洞我昔謁紫皇翳鳯驂虬龍俯不見塵世浩浩萬里空謫墮尚逺逰忽到漢始封西望接蜀道北顧連秦中壯哉形勝區有此蜿蜒宮雷霆自鞺鞳環玦亦璁瓏石屋如建章萬户交相通來者各有得盡取知無從憑高三嘆息自古幾英雄老我文字衰揮毫看諸公慨然逺望落想在耳目之外太息原注宿青山鋪作太息重太息吾行無終極氷霜迫殘嵗鳥獸號落日秋砧滿孤村枯葉擁破驛白頭鄉萬里墮此虎豹宅道邊新食人膏血染草棘平生鐵石心忘家恩報國即今冒九死家國兩無益中原久喪亂志士淚橫臆切勿輕書生上馬能擊賊閬中作殘年作客遍天涯下馬長亭便似家三疊凄凉渭城曲數枝閒淡閬中花襞箋授官相逢晚理鬢熏衣一笑譁俱是邯鄲枕中夢墜鞭不用憶京華逰錦屛山謁少陵祠堂城中飛閣連危亭處處軒窗臨錦屛涉江親到錦屛上却望城郭如丹青虛堂奉祠子杜子眉宇高寒照江水古來磨滅知幾人此老至今元不死山川寂寞客子迷草木搖落壯士悲文章垂世自一事忠義凛凛令人思夜歸沙頭雨如注北風吹船橫半渡亦知此老憤未平萬竅爭號泄悲怒傷今懷古懷抱略同愾焉寤歎如見其人亦以寫其胸臆耳歸次漢中境上雲棧屛山閲月逰馬蹄初喜踏梁州地連秦雍川原壯水下荆揚日夜流遺虜孱孱寧逺略孤臣耿耿獨私憂良時恐作他年恨大散關頭又一秋才氣慷慨不詭風人南沮水道中磑舍臨湍瀨罾船聚小潭山形寒漸瘦雪意莫方酣久客情懷惡頻來道路諳家山空悵望無夢到江南長木夜行抵金堆市夜行長木村重霧雜零雨溼螢粘野蔓寒犬吠雲塢道壞交細泉亭廢立遺堵時時過農家燈火照鳴杼嗟豫獨何事無嵗得安處即今窮谷中性命寄豹虎三更投小市買酒慰羈旅高詠東山詩悵望懷往古赴成都泛舟自三泉至益昌謀以明年下三峽詩酒清狂二十年又摩病眼看西川心如老驥常千里身似春蠶已再眠莫雪烏奴停醉帽秋風白帝放歸船飄零自是關天命錯被人呼作地仙頷聨自佳近人朱彞尊乃謂比興之體可以偶見托其相類之句以為前後稠叠何乃吹毛求疵王士正曰蜀道廣元縣蜀王弟葭萌所封古苴侯國城西二里有烏奴山陸游詩莫雪烏奴停醉帽秋風白帝放歸船是也雪晴行益昌道中頗有春意杜陵雁下嵗將殘匹馬西逰雪擁關憔悴敢忘雙闕路淹遲遍看兩川山春回柳眼梅鬚裏愁在鞭絲帽影間安得黃金成大藥為人千載駐頽顔劔門道中遇微雨衣上征塵雜酒㾗逺逰無處不消魂此身合是詩人未細雨騎驢入劔門盧世㴶曰筆墨之氣脫化殆盡劍門城北回望劍關諸峯青入雲漢感蜀亡事慨然有賦自昔英雄有屈信危機變化亦逡巡隂平窮寇非難禦如此江山坐付人劉禪庸主譙周庸臣七字中含多少感慨綿州魏城縣驛有羅江東詩云芳草有情皆礙馬好雲無處不遮樓戲用其韻老夫乘興忽西逰逺跨秦吳萬里秋尊酒登臨遍山寺歌辭散落滿江樓孤城木葉蕭蕭下古驛灘聲㶁㶁流未許詩人誇此地茂林修竹憶吾州東津嵗莫涪江水歸壑白沙渺然石犖角蜀天常燠少雪霜緑樹青林不搖落闌干詰曲臨官道煙靄參差望城郭打魚斫膾修故事豪竹哀絲奉歡樂樂莫樂於新相知美人一笑回春姿四方本是丈夫事安用一生無别離深情老筆視少陵二作雖未敢旗鼓中原亦當鴈行同時諸子豈敢望其項背東山今日之集何佳哉入關劇飲始此回登山正可小天下跨海何用尋蓬萊青天肯為陸子見姸日似趣梅花開有酒如浩緑可愛一醉直欲空千罍駝酥鵝黃出隴右熊肪玉白黔南來眼花耳熱不知夜但見銀燭高花摧京華故人死太半歡極往往潛生哀聊將豪縱壓憂患鼓吹動地聲如雷高風跨俗真骨凌霜高作也綿州録參㕔觀姜楚公畫鷹少陵為作詩者我來訪古涪之濱不辭百罔冀一真走馬朝秦海棕館斫膾夜醉魴魚津越王高樓亦已換俯仰今古堪悲辛督郵官舍最卑陋棟撓楹腐知幾春巋然此壁獨亡恙老槎徑翮完如新向來劫火何自免叱呵守護疑有神妖狐九尾穴國中共置不問如越秦天時此物合致用下韝指呼端在人會當原野灑毛血坐令萬里青煙塵老眼還憂不及見詩成肝膽空輪囷西郊尋梅西郊梅花矜絶艷走馬獨來看不厭似羞流落䝉市塵寧墮荒寒傍茆店翛然自是世外人過去生中差一念淺顰常鄙桃李學獨立不容鶯蝶覘山礬水仙晚角出大是春秋吳楚僭餘花豈無好顔色病在一俗無由砭朱欄玉砌渠有命斷橋流水君何缺嗟余相與頗同調身客劍南家在剡凄凉萬里歸無日蕭颯二毛衰有漸尚能作意晚相從爛醉不辭杯㶑灧因險出竒却不落小家數海棠原注范希元園誰道名花獨故宮原注謂故蜀燕王宮東城盛麗足爭雄橫陳錦障闌干外盡吸紅雲酒盞中貪看不辭持夜燭倚狂直欲擅春風拾遺舊咏悲零落瘦損腰圍擬未工原注老杜不應無海棠詩意其失傳爾孫勷曰末句妙於翻案如此著意自爾無陳非新驛舍見故屛風畫海棠有感厭煩只欲長靣壁此心安得頑如石杜門復出歎習氣止酒還開慙定力成都一月海棠開錦繡裹城迷巷陌燕宮最盛號花海霸國雄豪有遺迹猩紅鸚緑極天巧疊萼重跗眩朝日繁華一夢忽吹散閉眼細思猶歷歷憂樂相尋豈易知故人應記醉中詩夜闌風雨嘉州驛愁向屛風見折枝結尾㸃題含情無限通首俱成波瀾矣夜聞松聲有感與此同調蓋其作用熟也登荔枝樓平羌江水接天流凉入簾櫳已似秋喚作主人元是客知非吾土强登樓閒憑曲檻常忘去欲下危梯更小留公事無多厨釀美此身不負負嘉州原注薛能詩不負嘉州只負身凌雲醉歸作峨嵋月入平羌水歎息吾行俄至此謫仙一去五百年至今醉魂呼不起玻瓈春滿琉璃鍾原注玻璃春眉州酒名宦情苦薄酒興濃飲如長鯨渴赴海詩成放筆千觴空十年看盡人問事更覺麴生偏有味君不見蒲萄一斗換得西凉州不如將軍告身供一醉醉中感懷早嵗君王記姓名即今鷦􅀈客邊城青山猶是鵷行舊白髮新從劍外生古戍旌旗秋慘淡高城刁斗夜分明壯心未許全消盡醉聽檀槽出塞聲盧世㴶曰三四無限感慨玻璃江原注眉州共飲亭蓋取東坡共飲玻璃江之句追懷舊逰戲作以補西川樂府玻瓈江水千尺深不如江上離人心君行未過青衣縣妾心先到峨嵋隂金樽共釂不知曉月落煙渚天橫參車輪無角那得住馬蹄不方何處尋空憑尺素寄幽恨縱有緑綺誰知音愁來只欲掩屛睡無奈夢斷聞踈砧原注古樂府安得雙車輪一夜生四角唐人詩云長安塵土中馬蹄圖重重郎馬蹄不方何處認郎蹤清便宛轉别成風調視范成大作奚啻牀上下之别送客至江上多事經旬不出城今朝送客此閒行郊原逺帶新晴色人語中含樂嵗聲天際斂雲山盡出江流收漲水初平故園社友應惆悵五嵗無端棄耦耕如此頷聨較之繞郭烟嵐滿山樓閣以相誇耀者獨有雅人深致九月十六日夜夢駐軍河外遣使招降諸城覺而有感殺氣昏昏橫塞上東並黃河開玉帳晝飛羽檄下列城夜脫貂裘撫降將將軍櫪上汗血馬猛士腰間虎文韔階前白刃明如霜門外長㦸森相向朔風卷地吹急雪轉盼玉花深一丈誰言鐵衣冷徹骨感義懷恩如挾纊腥臊窟穴一洗空太行北嶽原無恙更呼斗酒作長歌要遣天山健兒唱成都行倚錦瑟擊玉壺吳中狂士逰成都成都海棠十萬株繁華盛麗天下無青絲金絡白雪駒日斜馳遣迎名姝燕脂褪盡見玊膚緑鬟半脫嬌不梳吳綾便面對客書斜行小草密復踈墨君秀潤瘦不枮風枝雨葉筆筆殊月浸羅襪清夜徂滿身花影醉索扶東來此歡墮空虛坐悲新霜㸃鬢鬚易求合浦千斛珠難覔錦江雙鯉魚一結見意詩體如是初寒江路常逢雨山城早得寒蘭凋初解佩菊老尚加餐原注嘉陽有崇蘭以八九月盛開節物知何負情懷自鮮歡浮生看已熟不必夢邯鄲木山枯楠千載遭風雷披枝折幹吁可哀輪囷無用天所赦秋水初落浮江來嵌空宛轉若耳鼻峭瘦拔起何崔嵬珠宮貝闕留不得忽出洲渚知誰推書窗正對雲洞啓叢菊初傍幽篁栽是間著汝頗宜稱摩挲朝莫真千回天公解事雨十日洗盡泥滓滋莓苔一丘一壑吾所許不須更慕明堂材十月一日浮橋成以故事宴客凌雲隂風吹雨白晝昏誰掃雲霧升朝暾三江水縮獻洲渚九頂秀色欲塞門西山下竹十萬箇江面便可馳車轅巷無居人亦何怪釋耒來看空山村竹枝宛轉秋猿苦桑落㶑灧春泉渾衆賓共醉忘燭跋一徑却下緣雲根走沙人語若朝巷爭橋炬火如星繁肩輿睡兀到東郭空有醉墨留衫㾗十年萬事俱變滅㸃檢自覺惟身存寒燈夜永照耿耿卧賦長句招羈魂觀大散關圖有感上馬擊狂胡下馬草軍書二十抱此志五十猶癯儒大散陳倉間山川鬱盤紆徑氣鍾義士可與共壯圖坡陀咸陽城秦漢之故都王氣浮夕靄宮室生春蕪安得從王師汛掃迎皇輿黃河與函谷四海通舟車士馬發燕趙布帛來青徐先當營七廟次第畫九衢偏師縛可汗傾都觀受俘上夀大安宮復如貞觀初丈夫畢此願死與螻蟻殊志大浩無期醉膽空滿軀忠憤蟠鬱自然形見無意於工而自工御選唐宋詩醇卷四十二
