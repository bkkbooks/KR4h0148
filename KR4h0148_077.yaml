front:
  text: 欽定四庫全書御選唐宋詩醇卷三十七
  hash: sha256:aeb6e65ee3de05c9dc138fb10c07a85fbfdd1a168ff309acd3596df042fa4687
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_077-1a, image: WYG1448/WYG1448-0716a.png}
body:
  text: 眉山蘇軾詩六東坡八首并引余至黃州二年日以困匱故人馬正卿哀豫乏食為於郡中請故營地數十畝使得躬耕其中地既久荒為茨棘瓦礫之場而嵗又大旱墾闢之勞筋力殆盡釋耒而歎乃作是詩自愍其勤庶幾來嵗之入以忘其勞焉廢壘無人顧頽垣滿蓬蒿誰能捐筋力嵗晚不償勞獨有孤旅人天窮無所逃端來拾瓦礫嵗旱土不膏﨑嶇草棘中欲刮一寸毛喟然釋耒歎我廩何時高荒田雖浪莽高庳各有適下隰種粳稌東原蒔棗栗江南有蜀士桑果已許乞好竹不難栽但恐鞭橫逸仍須卜佳處規以安我室家童燒枯草走報暗井出一飽未敢期瓢飲巳可必因耕田而及桑果竹木以至築室穿井各成幸願想見隨寓而安自昔有微泉來從逺嶺背穿城過聚落流惡壯蓬艾去為柯氏陂十畝魚蝦㑹嵗旱泉亦竭枯萍粘破塊昨夜南山雲雨到一犁外泫然尋故瀆知我理荒薈泥芹有宿根一寸嗟獨在雪芽何時動春鳩行可膾自注蜀人貴芹芽膾雜鳩肉為之種稻清明前樂事我能數毛空暗春澤針水聞好語自注蜀人以細雨為雨毛稻初生時農夫相語稻針出矣分秧及初夏漸喜風葉舉月明看露上一一珠垂縷秋來霜穗重顛倒相撑拄但聞畦隴間蚱蜢如風雨自注蜀中稻熟時蚱蜢羣飛田間如小蝗狀而不害稻新舂便入甑玉粒照筐筥我久食官倉紅腐等泥土行當知此味口腹吾已許悉數四時田事風霜月露宛轉關情王孟田家雜詩所未經道良農惜地力幸此十年荒桑柘未及成一麥庶可望投種未逾月覆塊已蒼蒼農父告我言勿使苖葉昌君欲富餅餌要須縱牛羊再拜謝苦言得飽不敢忘此首專言種麥述農父問答有情種棗期可剝種松期可斫事在十年外吾計亦巳慤十年何足道千載如風雹舊聞李衡奴此䇿疑可學我有同舍郎官居在灊嶽自注李公擇也遺我三寸甘照坐光卓犖百栽儻可致當及春氷渥想見竹籬間青黃垂屋角豈誠願學李衡亦因遺甘而懷李公擇耳預想到屋角青黃拙朴語益徴高曠潘子久不調沽酒江南村郭生本將種賣藥西市垣古生亦好事恐是押牙孫家有十畝竹無時容叩門我窮交舊絶三子獨見存從我於東坡勞餉同一飱可憐杜拾遺事與朱阮論吾師卜子夏四海皆弟昆自注潘名大臨字邠老滎陽人郭生名遘汾陽人古生名耕道新平人馬生本窮士從我二十年日夜望我貴求分買山錢我今反纍生借耕輟兹田刮毛龜背上何時得成氊可憐馬生癡至今夸我賢衆笑終不悔施一當獲千軾答秦太虛書曰所居對岸武昌山水佳絶有蜀人王生在邑中往往為風濤所隔不能即歸則王生能為殺雞炊黍至數日不厭又有潘生者作酒店樊口棹小舟徑至店下村酒亦自醇釅施元之曰先生儋耳手澤云杞人馬正卿作太學生清苦有氣節學者既不喜博士亦忌之余少時偶至其齊中書杜子美秋雨嘆壁上初無意也而正卿即日辭歸不復出至今白首窮餓守節如故詩中馬生即其人也江南有蜀士謂王文甫也文甫嘉州犍為縣人居於武昌容齊三筆曰蘇公責居黃州始自稱東坡居士詳考其意蓋專慕白樂天而然白公有東坡種花二詩云持錢買花樹城東坡上栽又云東坡春向暮樹木今何如又有步東坡詩云朝上東坡步夕上東坡步東坡何所愛愛此新成樹又有别東坡花樹詩云何處殷勤重回首東坡桃李種新成皆為忠州刺史時所作也蘇公在黃正與白公忠州相似因憶蘇詩如贈寫真李道士云他時要指集賢人知是香山老居士贈善相程傑云我似樂天君記取華顛賞遍洛陽春送程懿叔云我甚似樂天但無素與蠻入侍邇英云定是香山老居士世緣終淺道根深而跋曰樂天自江州司馬除忠州刺史旋以主客郎中知制誥遂拜中書舍人某雖不敢自比然謪居黃州起知文登召為儀曹遂忝侍從出處老少大略相似庶幾復享晚節閒適之樂去杭州云出處依稀似樂天敢將衰朽較前賢序曰平生自覺出處老少粗似樂天則公之所以景仰者不止一再言之非東坡之名偶爾暗合也姪安節逺來夜坐三首南來不覺嵗崢嶸坐撥寒灰聽雨聲遮眼文書元不讀伴人燈火亦多情嗟豫潦倒無歸日今汝蹉跎已半生免使韓公悲世事白頭還對短燈檠心衰靣改瘦崢嶸相見惟應識舊聲永夜思家在何處殘年知汝逺來情畏人默坐成癡鈍問舊驚呼半死生夢斷酒醒山雨絶笑看飢鼠上燈檠落第汝為中酒味吟詩我作忍飢聲便思絶粒真無䇿苦說歸田似不情腰下牛閒方解佩洲中奴長足為生大弨一㢮何緣彀已覺翻翻不受檠家常語愈淺愈真安節以下第來黃州大全集雜說有姪安節逺來飲酒樂甚以識一時盛事之言此三詩但作喟嘆未見其樂也然以謫居岑寂之中有骨肉逺來聚首秉燭寒宵絮語不倦悲之所發即其樂之所形此與冬至日贈安節詩所云詩成却超然老淚不成滴者情懷約略相似岐亭道上見梅花戲贈季常蕙死蘭枯菊亦摧返魂香入嶺頭梅數枝殘緑風吹盡一㸃芳心雀啅開野店初嘗竹葉酒江雲欲落豆秸灰行當更向叉頭見病起烏雲正作堆陳慥喜蓄聲妓此作體近香奩似有所指者故謂之戲贈軾與慥交好詩文無所拘忌若河東君秀英君之名因而流布非是輕薄為文正可見其忘形無間也方回曰一㸃芳心雀啅開此句最佳坡天人也作詩不拘法度而自有生意雀之為物嘗凍啅梅開本無情於梅下此語乃若不勝情者尾句蓋謂季常侍兒病起新粧行當於叉頭見此花欲其出以侑樽也豆秸灰出文酒清話王勉雪詩上天燒下豆秸灰烏李從教作白梅亦俚語世傳以為戲者苕溪漁隱叢話曰東坡云龍丘子自洛之蜀載二侍女戎裝駿馬至溪山佳處輒留數日見者以為異人後十年築室黃岡之北號靜菴居士作臨江仙贈之云細馬逺䭾雙侍女青巾玉帶紅靴溪山好處便為家誰知巴蜀路却是洛城花靣旋落英飛玉蕊人間春日初斜十年不見紫雲車龍丘新洞府鉛鼎飬丹砂龍丘子即陳季常也太守徐君猷通守孟亨之皆不飲酒以詩戲之孟嘉嗜酒桓溫笑徐邈狂言孟德疑公獨未知其趣爾臣今時復一中之風流自有髙人識通介寧隨薄俗移二子有靈應撫掌吾孫還有獨醒時因姓援古以著題古人所有也只詠孟嘉徐邈二人事承說到底章法獨創後人亦未見有效之者苕溪漁隱叢話曰此詩不止天生此對其全篇用事親切尤為可喜皆徐孟二人事也方回曰全用徐孟二人飲酒事以其泉下有靈却笑厥孫不飲善滑稽者次韻和王鞏六首録一首平生我亦輕餘子晚嵗人誰念此翁巧語屢曾遭薏苡廋詞聊復託芎藭子還可責同元亮妻卻差賢勝敬通若問我貧天所賦不因遷謫始囊空俯視一切交集百端起二句匪由作意所能得志林曰昔為鳯翔幕過長安見劉原父留吾劇飲數日酒酣謂吾曰昔陳季弼告陳元龍曰聞逺近之論謂明府驕而自矜元龍曰夫閨門雍穆有德有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清修疾惡有識有義吾敬趙元逹博聞强記竒逸卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉先主所敬如此何驕之有餘子瑣瑣亦安足録哉因仰天太息此亦原父之雅趣也吾後在黃州作詩云平生我亦輕餘子晚嵗人誰念此翁蓋記原父語也江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字縮頸夜眠如凍龜雪來惟有客先知江邉曉起浩無際樹杪風多寒更吹青山有似少年子一夕變盡滄浪髭方知陽氣在流水沙上盈尺江無澌隨風顛倒紛不擇下滿坑谷髙陵危江空野闊落不見入户但覺輕絲絲沾裳細看若刻鏤豈有一一天工為霍然一麾遍九野吁此權柄誰執持世間苦樂知有幾今我幸免沾膚肌山夫只見壓樵擔豈知帶酒飄歌兒天王臨軒喜有麥宰相獻壽嘉及時凍吟書生筆欲折夜織貧女寒無幃髙人著履踏冷冽飄拂巾帽真仙姿野僧斫路出門去寒液滿鼻清淋漓灑袍入䄂溼靴底亦有執版趨階墀舟中行客何所愛願得獵騎當風披草中咻咻有寒兔孤隼下擊千夫馳敲氷煮鹿最可樂我雖不飲强倒巵楚人自古好弋獵誰能往者我欲隨紛紜旋轉從滿靣馬上操筆為賦之巖壑高卑人物錯雜大處浩渺細處纎微無所不盡可抵一幅王維江干初雪圖六一詩話稱有進士許洞嘗㑹諸僧分題出一紙約曰不得犯此一字其字乃山水風雲竹石花草霜雪星日禽鳥之類諸僧皆閣筆廬陵集潁州雪詩其序則曰玉月梨梅練絮白舞鵝鶴等字皆請勿用禁體物語非是歐陽創之也特以潁州賔主一時之盛遂成佳話耳是日同至女王城作詩乃和前韻東風未肯入東門走馬還尋去嵗村人似秋鴻來有信事如春夢了無痕江城白酒三杯釅野老蒼顔一笑溫已約年年為此㑹故人不用賦招魂紅梅三首録一首怕愁貪睡獨開遲自恐氷容不入時故作小紅桃杏色尚餘孤瘦雪霜姿寒心未肯隨春態酒暈無端上玉肌詩老不知梅格在更看緑葉與青枝自注石曼卿紅梅詩云認桃無緑葉辨杏有青枝不著意紅字則泛衍然一落色相則又如塗塗附矣石延年句豈不精切而詩謂其不知梅格知此者可與言詩陳季常見過三首録二首仕宦常畏人退居還喜客君來輒館我未覺雞黍窄東坡有竒事已種十畝麥但得君眼青不辭奴飯白送君四十里只使一帆風江邉千樹桞落我酒杯中此行非逺别此樂固無窮但願長如此來往一生同寒食雨二首自我來黃州已過三寒食年年欲惜春春去不容惜今年又苦雨兩月秋蕭瑟卧聞海棠花泥汙燕脂雪暗中偷負去夜半真有力何殊病少年病起頭已白春江欲入户雨勢來不已小屋如漁舟濛濛水雲裏空庖煮寒菜破竈燒濕葦那知是寒食但感烏銜紙君門深九重墳墓在萬里也擬哭途窮死灰吹不起二詩後作尤精絶結四句固是長歌之悲起四句乃先極荒凉之境移村落小景以作官居情况大可想矣後人乃欲將此四句裁作絶句以爭勝王韋是乃見山忘道也賀裳曰黃州詩尤多不羈小屋如漁舟濛濛水雲裏一篇最為沈痛魚蠻子江淮水為田舟楫為室居魚蝦以為糧不耕自有餘異哉魚蠻子本非左袵徒連排入江住竹瓦三尺廬於焉長子孫戚施且侏儒擘水取魴鯉易如拾諸途破釡不著鹽雪鱗芼青蔬一飽便甘寢何異獺與狙人間行路難踏地出賦租不如魚蠻子駕浪浮空虛空虛未可知㑹當算舟車蠻子叩頭泣勿語桑大夫分明指新法病民出賦租者不如魚蠻之樂也忽又念及算舟車者筆下風生凛凛史記平凖書述卜式之言以結全篇曰烹𢎞羊天乃雨不更益一字而意已顯此詩結云蠻子叩頭泣勿語桑大夫亦不待明言其所以然可稱詩史弔李臺卿并引李臺卿字明仲廬州人貌陋甚性介不羣而博學彊記罕見其比好左氏有史學考正同異多所發明知天文律歷千載之日可坐數也軾謫居黃州臺卿為麻城主簿始識之既罷居於廬而曹光州演甫以書報其亡臺卿光州之妻黨也我初未識君人以君為笑垂頭老鸛雀煙雨霾七竅敝衣來過我危坐若持釣禇裒半靣新鬷茂一語妙徐徐步其瀾極望不可徼卻觀原嫵媚士固難輕料看書眼如月罅隙靡不照我老多遺忘得君如再少縱橫通雜藝甚博且知要所恨言無文至老幽不耀其生世莫識已死誰復弔作詩遺故人庶解俗子譙看書眼如月數語可謂心折膺服矣却先從人所共笑處為之寫生傳神可笑處實是可笑可敬處實是可敬寫來俱不遺餘力洵稱一人知已曹既見和復次其韻造物本兒嬉風噫雷雷笑誰令妄驚怪失七號萬竅人人走江湖一一操網釣偶然連六鼇便為此手妙空令任公子三嵗蹲海徼長貧固不辭一死實未料難將蓍草算除用佛眼照何人嗣家學恨子兒尚少嗟我與曹君衰老世不要空言今無救竒志後必耀吟君五字詩義重千金弔收藏慎勿出免使羣兒譙笑臺卿者多是偶然釣鼇之人此詩要不專為臺卿一人長太息也次韻孔毅父集古人句見贈五首録三首羡君戲集他人詩指呼市人如使兒天邉鴻鵠不易得便令作對隨家雞退之驚笑子美泣問君久假何時歸世間好句世人共明月自滿千家墀紫駝之峰人莫識雜以雞豚真可惜今君坐致五侯鯖盡是猩脣與熊白路旁拾得半段槍何必開爐鑄矛㦸用之如何在我耳入手當令君喪魄天下幾人學杜甫誰得其皮與其骨劃如太華當我前跛牂欲上驚崷崒名章俊語紛交衡無人巧㑹當時情前生子美只君是信手拈得俱天成集句詩創自北宋著於石延年而工於王安石至黃庭堅則目之為百家衣言如小兒文褓也是匪富有胸中豈能親切貫穿然終非詩家所貴觀此數詩所以譽之者至矣言外正自有意在王直方詩話曰荆公始為集句多者至數十韻往往對偶親於本詩蓋以誦古今人詩多或坐中率然而成始可以為貴也其後多有效之者孔毅父嘗集句贈東坡六年正月二十日復出東門仍用前韻亂山環合水侵門身在淮南盡處村五畝漸成終老計九重新掃舊巢痕豈惟見慣沙鷗熟已覺來多釣石溫長與東風約今日暗香先返玉梅魂詞㫖溫厚意味深長在集內近體詩中更上一層陸遊曰昔祖宗以三館飬士儲將相材及官制行罷三館而東坡蓋嘗直史館然自謫為散官削去史館之職久矣至於史館亦廢故云新掃舊巢痕其用事之嚴如此而鳯巢西隔九重門則又李義山詩也方回曰東坡初貶黃州之年即細雨梅花關山斷魂之時也次年正月二十日往岐亭見陳慥季常是以為女王城之詩又次年正月二十日與潘邠老等尋春是以有事如春夢了無痕之詩又次年正月二十日尚在黃州復出東門仍和此韻亂山環合四句謂元豐官制行罷廢祖宗館職立祕書省以正字校書郎等為差除資序而儲士之意淺矣觀此等語豈惟可以考大賢之出處亦可見時事之更張仁廟之所以遺燕安於後世者何其盛熙豐之政所以大有可恨者何其頓衰坡下句云豈惟見慣沙鷗熟已覺來多釣石溫又可痛坡翁一謫數年甘心於漁樵而忘返也南堂五首録一首掃地燒香閉閣眠簟紋如水帳如煙客來夢覺知何處挂起西忩浪接天邢居實曰東坡此詩嘗題於余扇山谷初讀以為是劉夢得所作齊安拾遺曰夏澳口之側本水驛有亭曰臨臯郡人以驛之髙坡上築南堂為先生遊息次韻孔毅父久旱巳而甚雨三首飢人忽夢飯甑溢夢中一飽百憂失只知夢飽本來空未悟真飢定何物我生無田食破硯爾來硯枯磨不出去年太嵗空在酉傍舍壺漿不容乞今年旱勢復如此嵗晚何以黔吾突青天蕩蕩呼不聞况欲稽首號泥佛罋中蜥蜴尤可笑跂跂脈脈何等秩隂陽有時雨有數民自天民天自恤我雖窮苦不如人要亦自是民之一形容雖是喪家狗未肯弭耳爭投骨倒冠落幘謝朋友獨與蚊雷共圭蓽故人嗔我不開門君視我門誰肯屈可憐明月如潑水夜半清光翻我室風從南來非雨候且為疲人洗蒸鬱褰裳一和快哉謡未暇飢寒念明日先將旱勢寫得淋漓極致以待下二章轉關反覆詳盡清絶滔滔呼作快哉謡不虛也去年東坡拾瓦磔自種黃桑三百尺今年刈草蓋雪堂日炙風吹靣如墨平生懶惰今始悔老大勤農天所直沛然例賜三尺雨造化無心恍難測四方上下同一雲甘霔不為龍所隔自注俗有分龍日蓬蒿下濕迎曉來燈火新凉催夜織老夫作罷得甘寢卧聼牆東人響屐奔流未已坑谷平折葦枯荷恣漂溺腐儒粗糲支百年力耕不受衆目憐破陂漏水不耐旱人力未至求天全㑹當作塘徑千步橫斷西北遮山泉四鄰相率助舉杵人人知我囊無錢明年共看决渠雨飢飽在我寧關天誰能伴我田間飲醉倒惟有支頭甎旱而得雨因雨而籌及於破陂之漏水思作塘以遮泉由去年今年而并預算明年絶不為愁霖計者三詩如各自成章乃正其神明於斷續合離之法東坡先生年譜曰元豐壬戌先生在黃州寓居臨臯亭就東坡築雪堂自號東坡居士以東坡圗考之自黃州門南至雪堂四百三十步堂以大雪中為之因繪雪於四壁之間無容隙其名蓋起於此先生自書東坡雪堂四字以榜之先生自臨臯遷雪堂在壬戌十月之後和孔毅父詩云去年太嵗空在酉乃指去年辛酉言之也天公號令不再出十日愁霖併為一君家有田水冒田我家無田憂入室不如西州楊道士萬里隨身惟兩膝沿流不惡泝亦佳一葉扁舟任飄突山芎麥麴都不用泥行露宿終無疾夜來飢腸如轉雷旅愁非酒不可開楊生自言識音律洞簫入手清且哀不須更待秋井塌見人白骨方銜杯前兩章言旱言雨已各詞意周浹此章言甚雨君家有田水冒田我家無田憂入室二句情狀已盡下只就楊道士為言與雨旱都不相值張弛無所不妙也楊萬里獨賞結二句不須更待秋井塌見人白骨方銜杯謂其用杜詩得翻案法抑亦末矣首作以飢人忽夢起以未暇飢寒念明日結次作云飢飽在我寧關天三作云夜來飢腸如轉雷微作呼應之語纓帶無痕施宿曰先生為楊道士書一帖云僕謫居黃岡綿竹武都山道士楊世昌子京自廬山來過余其人善畫山水能鼓琴曉星歷通知黃白藥術可謂藝矣又一帖云十月十五日夜與楊道士泛舟赤壁按次毅父韻第三首載西州楊道士凡數聨因此帖知為世昌詩中又言善吹洞簫其自廬山從公蓋壬戌之夏前赤壁賦云客有吹洞簫者殆是楊也初秋寄子由百川日夜逝物我相隨去惟有宿昔心依然守故處憶在懷逺驛閉門秋暑中藜羹對書史揮汗與子同西風忽凄厲落葉穿户牖子起尋夾衣感歎執我手朱顔不可恃此語君莫疑别離恐不免功名定難期當時巳悽斷况此兩衰老失塗既難追學道恨不早買田秋已議築室春當成雪堂風雨夜已作對牀聲五言轉韻能一氣旋折筆愈轉而情愈深味愈長此等詩他人不能為在集中亦惟與子由往復數章僅見之林子仁曰懷逺驛蓋先生與子由應制京師時嘗寓於此是嵗嘉祐五年也黃州東南三十里地名沙湖先生嘗買田其間故云買田秋已議和蔡景繁海州石室芙蓉仙人舊遊處自注石曼卿也蒼藤翠壁初無路戲將桃核裹黃泥石間散擲如風雨坐令空山作錦繡倚天照海花無數花間石室可容車流蘇寶蓋窺靈宇何年霹靂起神物玉棺飛出王喬墓當時醉卧動千日至今石縫餘糟醑山人一去五十年花老室空誰作主手植數松今偃蓋蒼髯白甲低瓊户我來取酒酹先生後車仍載胡琴女一聲氷鐵散巖谷海為瀾翻松為舞爾來心賞復何人持節中郎醉無伍獨臨斷岸呼出日紅波碧巘相吞吐徑尋我語覔餘聲拄杖彭鏗叩銅鼓長篇小字逺相寄一唱三歎神悽楚江風海雨入牙頰似聼石室胡琴語我今老病不出門海山巖洞知何許門外桃花自開落牀頭酒罋生塵土前年開閣放桞枝今年洗心參佛祖夢中舊事時一笑坐覺俯仰成今古願君不用刻此詩東海桑田真旦暮石延年通判海州使人以泥裹桃核彈擲山嶺之上一二嵗間花發滿山誠為勝舉詩援此說入自首句至蒼髯白甲低瓊户以上皆言石事繼述舊逰而以和詩之意終焉舒展舂容有大海回波生紫瀾之妙施元之曰蔡景繁名承禧臨川人中嘉祐進士第知雩都縣擢監察御史裏行後出為淮南轉運副使置使楚州東坡謪黃實在部內獨拳拳慰藉行部訪之東坡有答景繁帖云朐山臨海石室信如所諭前某嘗携家一遊時有胡琴婢就室中作濩索凉州凛然有氷車鐵馬之聲婢去久矣因公復起一念若果遊此必有新篇當破戒奉和也又云海上竒觀恨不與公同逰大篇或可追賦景繁往遊既賦詩坡為屬和前所述皆指石曼卿後車胡琴云云皆帖中語意又前年開閣云云即所謂婢去久矣因公復起一念用此帖為證而詩乃粲然小飲公瑾舟中青泥赤日午相烘走訪船窗栁影中輟我東坡無限睡賞君南浦不資風坐觀邸報談迂叟閒說滁山憶醉翁此去澄江三萬頃只應明月照還空自注鄧滁人也是日坐中觀邸報云叟入下省酒坐劇談嘯傲之概可想過江夜行武昌山上聞黃州鼓角清風弄水月銜山幽人夜渡吳王峴黃州鼓角亦多情送我南來不辭逺江南又聞出塞曲半雜江聲作悲健誰言萬方聲一概鼉憤龍愁為余變我記江邉枯桞樹未死相逄真識靣他年一葉泝江來還吹此曲相迎餞已去之地鼓角多情新至之處曲聲悲健妙是半雜江聲通彼我之懷覺行役宵中有聲有色自興國往筠宿石田驛南草五里野人舍溪上青山三百疊快馬輕衫來一抹倚山修竹有人家橫道清泉知我渴芒鞋竹杖自輕軟蒲薦松牀亦香滑夜深風露滿中庭惟有孤螢自開闔孤螢開闔之句較暗飛螢自照更泠然善也圓通禪院先君舊逰也四月二十日晚至宿焉明日忌日也乃手寫寶積獻蓋頌佛一偈以贈長老仙公仙撫掌笑曰昨夜夢寶蓋飛下著處輒出火豈此祥乎乃作是詩院有蜀僧宣逮事訥長老識先君云石耳峯頭路接天梵音堂下月臨泉此生初飲廬山水他日徒參雪竇禪䄂裏寶書猶未出夢中飛蓋已先傳何人更識嵇中散野鶴昻藏未是仙詩簡於題題中之意詩無剩語題外之意詩有餘情體贍律調咀味無盡題西林壁橫看成嶺側成峯逺近髙低各不同不識廬山真靣目只緣身在此山中能作如是語始是認取真靣目者妙髙峯三日不見而見之别峯與此參看黃庭堅曰此老人於般若橫說豎說了無剩語非其筆端有口亦安能吐此不傳之妙廬山二勝并引余遊廬山南北得十五六竒勝殆不可勝紀而懶不作詩獨擇其尤佳者作二首開先潄玉亭髙巖下赤日深谷來悲風劈開青玉峽飛出兩白龍亂沫散霜雪古潭搖青空餘流滑無聲快瀉雙石谼我來不忍去月出飛橋東蕩蕩白銀闕沉沉水精宫願隨琴髙生腳踏赤鯶公手持白芙渠跳下清泠中寫瀑布竒勢迭出曲盡其妙此巨靈開山手徐凝惡詩誠不足道耳廬山記曰山中瀑布十餘處香爐峰與雙劍峰在瀑布旁水源在五老峰頂西入康王谷為水簾東為開先之瀑布王注正訛曰開先潄玉亭王本訛作開元題下注云開元禪院舊傳梁昭明太子之居棲隱也唐𤣥宗即位始號開元有招隱橋𤣥宗所作按黃庭堅開先禪院修造記略曰南唐中主年少好文無經世意慕物外之名問舍五老峰下有野夫獻地買之萬金以為書堂及即位以為寺以野夫獻地為已有國之祥故名開先後遷洪都蓋嘗弭節故榻與畫像存焉又山志稱中主讀書臺在寺後世以為李後主者誤以為梁昭明者尤誤開先寺本末甚明無可疑者王本既訛開先為開元又訛南唐之𤣥宗為唐開元天寶之𤣥宗又云唐𤣥宗即位始號開元其杜撰蹖駁乃爾梅溪何至是想後人僞託耶栖賢三峽橋吾聞太山石積日穿線溜况此百雷霆萬世與石鬭深行九地底嶮出三峽右長輸不盡溪欲滿無底竇跳波翻潛魚震響落飛狖清寒入山骨草木盡堅瘦空濛烟靄閒澒洞金石奏彎彎飛橋出㶑㶑半月彀玉淵神龍近雨雹亂晴晝垂瓶得清甘可咽不可潄竒景以精理通之發為髙談結為幽艷絡繹間起使人應接不暇苕溪漁隱叢話曰三峽橋詩清寒入山骨草木盡堅瘦此等語精研絶韻真他人道不到也蘇轍棲賢僧堂記曰元豐三年余過廬山入棲賢谷谷中多大石岌嶪相倚水行石間其聲如雷霆又如干乘車行者震掉不能自持雖三峽之險不過也故橋曰三峽廬山前録曰過棲賢路稍﨑嶇然不妨觀山也約十餘里至三峽橋蘇黃門所記殆非誇詞自此行石衢至玉淵亭澗水披石陡落滙為龍湫雪濺雷吼不減三峽岐亭五首并引録三首元豐三年正月余始謫黃州至岐亭北二十五里山上有白馬青蓋來迎者則余故人陳慥季常也為留五日賦詩一篇而去明年正月復往見之季常使人勞余於中塗余久不殺恐季常之為余殺也則以前韻作詩為殺戒以遺季常自爾不復殺而岐亭之人多化之有不食肉者其後數往見之往必作詩詩必以前韻凡余在黃四年三往見季常季常七來見余蓋相從百餘日也七年四月余量移汝州自江淮徂雒送者皆止慈湖而季常獨至九江乃復用前韻通為五首以贈之昨日雲隂重東風融雪汁逺林草木暗近舍烟火濕下有隱君子嘯歌方自得知我犯寒來呼酒意頗急撫掌動鄰里繞村捉鵝鴨房櫳鏘器聲蔬果照巾羃久聞蔞蒿美初見新芽赤洗盞酌鵝黃磨刀削熊白須臾我徑醉坐睡落巾幘醒時夜向䦨唧唧銅瓶泣黃州豈云逺但恐朋友缺我當安所主君亦無此客朝來靜菴中惟見峰巒集從呼酒說到徑醉醉而復醒寫出嘯傲自適頽然兀然真不知何者是主何者是客詩人玉屑曰嘗論對偶如枸杞因吾有雞栖奈汝何蓋借枸杞以對雞栖冬溫蚊蚋在人逺鳬鴨亂人逺如鳬鴨然又直以字對而不對意此皆例子不可不知子瞻岐亭詩云洗盞酌鵝黃磨刀切熊白是用例者也我哀籃中蛤閉口護殘汁又哀網中魚開口吐微濕刳腸彼交病過分我何得相逢未寒溫相勸此最急不見盧懷慎蒸壺似蒸鴨坐客皆忍笑髠然發其羃不見王武子每食刀几赤琉璃載蒸㹠中有人乳白盧公信寒陋衰髮得滿幘武子雖豪華未死神已泣先生萬金璧護此一蟻缺一年如一夢百嵗真過客君無廢此篇嚴詩編杜集通篇俱為戒殺而作未死神已泣一語尤惻惻動人中用鄭餘慶事誤作盧懷慎藝苑雌黃指摘之然未足為此詩病也許顗詩話曰東坡贈季常詩戒其殺生末云君無廢此篇嚴詩編杜集謂嚴武也工部集中有武倡和數首枯松强鑽膏槁竹欲瀝汁兩窮相值遇相哀莫相濕不知我與君交逰竟何得心法幸相語頭然未為急願為穿雲鶻莫作將雛鴨我行及初夏煮酒映疏羃故鄉在何許西望千山赤兹逰定安歸東泛萬頃白一歡寧復再起舞花墮幘將行出苦語不用兒女泣吾非固多矣君豈無一缺各念别時言閉户謝衆客空堂淨掃地虛白道所集臨别互相勸勉匡其所不及不徒作依依戀戀之詞同心之言其誼古其情深矣緗素雜記曰世俗相傳古詩不必拘於用韻余謂不然如杜少陵早發射洪縣及字韻詩皆用緝字一韻未嘗用外韻也又觀東坡與陳季常汁字韻一篇詩而用六韻殊與老杜異其他側韻詩多如此以其名重當世無敢訾議苕溪漁隱叢話曰黃朝英之言非也老杜側韻詩何嘗不用外韻今若以一篇詩偶不用外韻遂為定格則老杜何以謂之能兼衆體也黃既不細考老杜諸詩又且輕議東坡尤為可笑郭祥正家醉畫竹石壁上郭作詩為謝且遺二古銅劍空腸得酒芒角出肝肺槎牙生竹石森然欲作不可回吐向君家雪色壁平生好詩仍好畫書墻涴壁長遭罵不瞋不罵喜有餘世間誰復如君者一雙銅劍秋水光兩首新詩爭劍芒劍在牀頭詩在手不知誰作蛟龍吼畫從醉出詩特為醉筆洗剔精神讀起四句森然動魄也句句巉絶在集中另闢一格龍尾硯歌并引余舊作鳯咮石硯銘其略云蘇子一見名鳯咮坐令龍尾差牛後已而求硯於歙歙人云子自有鳯咮何以此為蓋不能平也奉議郎方君彥德有龍尾大硯竒甚謂余若能作詩少解前語者當奉餉乃作此詩黃琮白琥天不惜顧恐貪夫死懷璧君看龍尾豈石材玉德金聲寓於石與天作石來幾時與人作硯初不辭詩成鮑謝石何與筆落鍾王硯不知錦茵玉匣俱塵垢搗練支牀亦何有况瞋蘇子鳯咮銘戲語相嘲作牛後碧天照水風吹雲明窗大几清無塵我生天地一閒物蘇子亦是支離人粗言細語都不擇春蚓秋蛇隨意畫願隨蘇子老東坡仁者不用生分别前用解嘲後更諷以通人之論雄恣逸態竒矯無前集中鳯咮硯三銘各以遒鍊為工不可無此作蕩潏之氣次韻杭人裴維甫餘杭門外葉飛秋尚記居人挽去舟一别臨平山上塔五年雲夢澤南州凄凉椘些緣吾發邂逅秦淮為子留寄謝西湖舊風月故應時許夢中逰同王勝之逰蔣山到郡席不暖居民空惘然好山無十里遺恨恐他年欲欵南朝寺同登北郭船朱門收畫㦸紺宇出青蓮自注荆公以宅為寺夾路蒼髯古迎人翠麓偏龍腰蟠故國鳥爪寄曽巔竹杪飛華屋松根泫細泉峰多巧障日江逺欲浮天略彴橫秋水浮屠插暮烟歸來踏人影雲細月娟娟次第寫景不必作崚嶒欎屈之勢而斫削精潔神彩欲飛不獨峰多江逺一聨差肩杜老西清詩話曰元豐中王荆公在金陵東坡自黃北遷日與公逰盡論古昔文字閒即俱味禪悅公嘆息謂人曰不知更幾百年方有如此人物東坡渡江至儀真賦此詩公亟取讀之至峰多巧障日江逺欲浮天乃撫几曰老夫平生作詩無此二句送沈逵赴廣南嗟我與君皆丙子四十九年窮不死君隨幕府戰西羌夜渡氷河斫雲壘飛塵漲天箭灑甲歸對妻孥真夢耳我謫黃岡四五年孤舟出沒煙波裏故人不復通問訊疾病飢寒疑死矣相逢握手一大笑白髮蒼顔略相似我方北渡脫重江君復南行輕萬里功名如幻何足計學道有牙真可喜句漏丹砂已付君汝陽罋盎吾何恥君歸趁我雞黍約買田築室從今始就兩人境遇不同處抒寫盡致而以道牙日就作無聊解脫之詞覺滿紙毫飛墨噴一時怡然氷釋豆粥君不見呼沱流澌車折軸公孫倉黃奉豆粥濕薪破竈自燎衣飢寒頓解劉文叔又不見金谷敲冰草木春帳下烹煎皆美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相纒心已醉身心顛倒自不知更識人間有真味豈如江頭千頃雪色蘆茅簷出沒晨煙孤地碓舂粳光似玉沙瓶煮豆軟如酥我老此身無著處賣書來問東家住卧聼雞鳴粥熟時蓬頭曳履君家去起伏開閣氣偉采竒青蓮無以過苕溪漁隱叢話曰東坡於飲食作詩賦以寫之往往皆臻其妙如老叨賦豆粥詩是也秦少游夢發殯而葬之者云是劉發之柩是嵗發首薦秦以詩賀之劉涇亦作因次其韻君看三代士執雉本以殺身為小補居官死職戰死綏夢尸得官真古語五行勝已斯為官官如草木吾如土仕而未祿猶賔客待以純臣蓋非古餽焉曰獻稱寡君豈比公卿相爾汝世衰道微士失已得喪悲歡反其故草袍蘆箠相嫵媚飲食嬉游事羣聚曲江船舫月燈毬是謂舞殯而歌墓看花走馬到東野餘子紛紛何足數二生年少兩豪逸詩酒不知軒冕苦故令將仕夢發棺勸子勿為官所腐塗車芻靈皆假設著眼細看君勿誤時來聊復一飛鳴進隱不須煩伍舉說得通透使人心融神釋凡經史傳記百家之言信手拈來無不貫穿協合前古詩人未嘗有此此所謂詩到蘇黃盡也徐大正閒軒冰蠶不知寒火鼠不知暑知閒見閒地已覺非閒侣君看東坡翁懶散誰比數形骸墮醉夢生事委塵土蚤眠不見燈晚食或欺午卧看氊取盜坐視麥漂雨語希舌頰强行少腰腳僂五年黃州城不踏黃州鼓人言我閒客置此閒處所問閒作何味如眼不自覩頗訝徐孝亷得閒能幾許介子願奉使翁歸備文武應緣不耐閒名字挂庭宇我詩為閒作更得不閒語君如汗血駒轉盼略燕椘莫嫌鑾輅重終勝鹽車苦為閒字下轉語轉轉無竭是問是答兩無縛脫以偈頌體入詩自雪堂始也施元之曰徐大正因其先君猷守黃州始從公游秦少游為作閒軒記髙郵陳直躬處士畫鴈二首野鴈見人時未起意先改君從何處看得此無人態無乃槁木形人禽兩自在北風振枯葦微雪落璀璀慘淡雲水昏晶熒沙礫碎弋人悵何慕一舉渺江海衆禽事紛爭野鴈獨閒潔徐行意自得俯仰若有節我衰寄江湖老伴雜鵝鴨作書問陳子曉景畫苕霅依依聚圓沙稍稍動斜月先鳴獨鼓翅吹亂蘆花雪色斯舉矣語隱而不發前作更從未起時見其意之先改後作又於安翔徐徊處見其意之自得詩中畫畫中詩二難併矣次韻王定國南遷回見寄土暈銅花蝕秋水要須悍石相礱砥十年冰蘗戰膏粱萬里煙波濯紈綺歸來詩思轉清激百丈空潭數魴鯉逝將桂浦擷蘭蓀不記槐堂收劍履卻思庾嶺今何在更說彭城真夢耳自注來詩述彭城舊遊君知先竭是甘井我願得全如苦李妄心不復九回腸至道終當三洗髓廣陵陽羡何足較自注余買田陽羡來詩以為不如廣陵只有無何真我里樂全老子今禪伯自注謂張安道也定國其壻掣電機鋒不容擬心通豈復問云何印可聊須答如是相逄為我話留滯桃花春漲孤舟起盤空硬語具體昌黎王定國詩集叙曰定國以余故得罪貶海上三年一子死貶所一子死於家定國亦病幾死余意其怨我甚不敢以書相聞而定國歸至江西以其嶺外所作詩數百首寄余皆清平豐融藹然有治世之音其言與志得道行者無異幽憂憤歎之作蓋亦有之矣特恐死嶺外而天子之恩不及報以忝其父祖耳孔子曰不怨天不尤人定國且不我怨而肯怨天乎余然後廢卷而嘆自恨其人之淺也墨莊漫録曰王定國寄詩於東坡答書云新詩篇篇皆竒老拙此回真不及矣窮人之具輒欲交割與公魏道輔見而笑曰定國亦難作交代只是且權攝耳御選唐宋詩醇卷三十七
