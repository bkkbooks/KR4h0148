  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_091-1a, image: WYG1448/WYG1448-0868a.png}
body:
  text: 山隂陸游詩三西巖翠屏閣把酒孤亭半日留西巖獨擅鶴山秋也知絶境終難賦且喜閒身得縱逰鶻起危巢時磔磔鹿鳴深澗暮呦呦人生適意方為樂甲第朱門秪自囚五六造語幽絶寂厯之境宛然在目雨中山行至松風亭忽澄霽煙雨千峰擁髻鬟忽看青嶂白雲間卷藏破墨營丘筆却展將軍著色山贈宋道人我不如昔人騎鶴上九天玉簡奏事虛皇前平生嗇養氣粗全兩腳馳走輕如煙鳥道懸崖忽飛鶱戲擲短劍聲鏗然轉盼跳下千仭淵已復取劔升層巔騰猿俊鶻爭後先飢食松花掬飛泉金骨緑髓漸凝堅口哦七字黃庭篇西來欲訪挾彈仙丹經劔訣更精研嗟哉一失五百年作詩付子勿妄傳獵罷夜飲示獨孤生白袍如雪寶刀橫醉上銀鞍身更輕帖草角鷹掀兔窟慿風羽箭作鴟鳴關河可使成南北豪傑誰堪共死生欲疏萬言投魏闕燈前攬筆涕先傾直從胸臆流出如聞撫髀之歎秋晚登城北門幅巾藜杖北城頭卷地西風滿眼愁一㸃烽傳散關信兩行雁帶杜陵秋山河興廢供搔首身世安危入倚樓橫槊賦詩非復昔夢魂猶繞古梁州神似少陵莫秋時序中年速風霜客路長孤愁巴月白清夢楚山蒼燈暗秋銜壁鐘疏夜殷床端居有微祿不敢恨殊方數日暄妍頗有春意豫閒居無日不出逰戲作小春花蕾索春饒已有暄風入紫貂村路雨晴鳩婦喜射場草緑雉媒驕苑邉結客飛金勒樓上誰家弄玉簫莫怪夕陽歸獨後早梅喚我度溪橋原注蜀宣華苑在摩訶池上江樓醉中作淋漓百榼宴江樓秉燭揮毫氣尚遒天上但聞星主酒人間寧有地埋憂生希李廣名飛將死慕劉伶贈醉侯戲語佳人頻一笑錦城已是六年留原注退之詩云越女一笑三年留曵䇿原注逰房園作慈竹蕭森拱廢臺醉歸曵䇿一徘徊紛紛落日牛羊下黯黯長空霰雪來三峽猿催清淚落雨京梅傍戰塵開客懷已是凄凉甚更聽城頭畫角哀觸緒即來自是此翁忠悃與杜陵無二賞其氣之蒼老謁漢昭烈惠陵及諸葛公祠宇雨止風益豪雪作雲不動凄凉漢陵廟衰草卧翁仲畫妓空笙竽土馬闕羈鞚壤沃黃犢耕柏密幽鳥哢尚想忠武公身任社稷重整整渭上營氣已無岐雍少須天意定破賊寧患衆興亡信有數星隕事可痛陵邉四五家茒竹居接棟手皸紙上箔原注居民皆以造紙為業醅熟酒鳴甕雖嗟生理微亦足逭飢凍劉葛固雄傑閲世均一夢論髙常近迂才大本難用九原不可作再拜臨風慟潘問竒曰事未必然聊為孔明吐氣大雪歌原注纍日作雪竟不成戲賦此篇長安城中三日雪潼關道上行人絶黃河鐵牛僵不動承露金盤凍將折虬鬚豪客狐白裘夜來醉眠寶叉樓五更未醒已上馬衝雪却作南山逰千年老虎獵不得一箭橫穿雪皆赤拿空爭死作雷吼震動山林裂崖石曵歸擁路千人觀髑髏作枕皮䝉鞍人間壯士有如此胡不來歸漢天子一腔豪氣千古竒文覺希逸雪賦直是兒女情多風雲氣少訪客至西郊摵摵敗葉飛黯黯寒雲低村墟與市里觸目一慘悽今日病體輕駕言適城西丹柿滿野店青帘出江隄獵騎載雉兔樵檐懸鶉雞居人各自得使我念故溪故溪不敢說况復朝金閨傷哉齧雪翁嵗晚猶牧羝下愚不自還大惑終身迷君恩何由報力耕愧黔黎夜寒清夜焚香讀楚詞寒侵貂褐歎吾衰輕氷滿研風聲急忽記山隂夜雪時故蜀别苑在成都西南十五六里梅至多有兩大樹夭驕若龍相傳謂之梅龍豫初至蜀嘗為作詩自此嵗常訪之今復賦一首丁酉十一月也昔年曽賦西郊梅茫茫去日如飛埃即今衰病百事懶陳迹未忘猶一來蜀王故苑犂已遍散落尚有千雪堆朱樓玉殿一夢破煙蕪牧笛遺民哀兩龍卧穩不飛去鱗甲脫落生莓苔精神最遇雪月見氣力苦戰氷霜開羈臣放士耿獨立淑姬靜女知誰媒摧傷雖多意愈厲直與天地爭春回蒼然老氣壓桃杏笑我白髮心尚孩微風故為作嫵媚一片吹入黃金罍詩以言情賦物而情不至不足以為詩羈臣放士耿獨立淑姬靜女知誰媒蓋亦黯然自傷矣閒意柴門雖設不曽開為怕人行損緑苔妍日漸催春意動好風時捲市聲來學經妻問生踈字嘗酒兒斟㶑灔杯安得小園寬半畝黃梅緑李一時栽書雨仲冬候始寒丙夜天正黑雨來挾風助吼擊不遺力聲如拔髙山勢若伐强國初憂老柏折遂恐石筍踣乾坤本無心百神各效職蛟龍鬬嵗暮豪橫理莫測農功幸已成龍怒亦㑹息屋漏何足言袖手姑默默信手拈來輒成竒語中間接筆尤為健絶暮冬夜宴官機錦茵金蹙鳯舞娃叉墮雙鬟重寶爐三尺香吐霧畫燭如椽風不動主人愛客情無已箏聲未斷歌聲起亦知百嵗等朝露便恐一歡成覆水爐紅酒緑春為回坐上梅花連夜開堂前只尺異氣候氷合平池霜壓階妙於諷諭風人之遺謁石犀廟閒過石犀祠登堂一歎欷江回陵谷變碑斷市朝非原注有王蜀時修廟碑銘荒圃連寒壠斜陽映夕霏興亡俱昨夢惆悵跨驢歸江上散步尋梅偶得絶句小南門原注萬里橋門一名小南門外野人家短短踈籬繚白沙紅稻不須鸚鵡啄清霜催放兩三花大醉梅花下走筆賦此閉門坐歎息不飲輒千日忽然酒興生一醉須一石擔頭花易老旗亭酒常窄出郊索一笑放浪謝形役把酒梅花下不覺日既夕花香襲襟袂歌聲上空碧我亦落烏巾倚樹吹玉笛人間竒事少頗謂三勍敵酒䦨江月上珠樹挂寒壁便疑從此仙朝市長掃迹醉歸亂一水頓與異境隔終當騎梅龍海上看春色原注梅龍蓋蜀苑中故物也風流清興如在目前廣都江上作微波不搖江纎雲不行天我來倚杖立天水相澄鮮平逺望不盡日落自生煙梅花耿獨立雪樹明前川好風吹我衣春色已粲然東村聞酒美買醉上漁船道室夜意寒泉潄酒醒午夜誦仙經茶鼎聲號蚓香盤火度螢齊心守𤣥牝閉目得黃寧寄語山中友因人送茯苓黃庭經何不食氣太和精故能不死入黃寧注即黃庭也城南王氏莊尋梅涸池積槁葉茒屋圍踈籬可憐庭中梅開盡無人知寂寞終自香孤貞見幽姿雪㸃滿緑苔零落尚爾奇我來不須晴微雨正相宜臨風兩愁絶日暮倚笻枝骨格不凡遊諸葛武侯書臺沔陽道中草離離卧龍往矣空遺祠當時典午稱猾賊氣喪不敢當王師定軍山前寒食路至今人祠丞相墓松風想像梁甫吟尚憶幡然畣三顧出師一表千載無逺比管樂蓋有餘世上俗儒寧辦此髙臺當日讀何書警䇿語故不在多眉州披風榭拜東坡先生遺像蜿蜒回顧山有情平鋪十里江無聲孕竒蓄秀當此地鬱然千載詩書城髙臺老仙誰所寫仰視眉宇寒崢嶸百年醉魂吹不醒飄飄風袖笻枝橫爾來逢迎厭俗子龍章鳯姿我眼明北扉南海均夢耳謫墮本自白玉京惜哉畫史未造極不作散髮騎長鯨故鄉歸來要有日安得春江變酒從公傾南定樓遇急雨行遍梁州到益州今年又作度瀘逰江山重復爭供眼風雨縱橫亂入樓人語朱離逢峒獠棹歌欵乃下吳舟天涯住穩歸心懶登覽茫然却欲愁屬對之妙神韻自然不可凑泊舟中對月百壺載酒遊凌雲醉中揮袖别故人依依向我不忍别誰似峨嵋半輪月月窺船窗挂凄冷欲到渝州酒初醒江空裊裊釣絲風人靜翩翩葛巾影哦詩不睡月滿船清寒入骨我欲仙人間更漏不到處時有沙禽背船去涪州道中逺客喜歸路清逰逾昔聞雨添山翠重舟壓浪花分洛叟經名世張侯勇冠軍原注郡境有伊川先生故居及張翼德祠懷人不可覿袖手對爐熏北巖原注有程正叔先生祠堂艤船涪州岸携兒北巖遊搖楫橫大江褰裳躡髙樓雨昏山半失江漲地欲浮老矣寧再來為作竟日留烏帽程丈人閉户本好修駭機一朝發議罪至竄投黨禁久不解胡塵暗神州修怨以稔禍哀哉誰始謀小人無逺略所懷在私讐後來其鑑兹賦詩識巖幽持論嚴正所見者大集中如此等作於君子小人之分判若黑白足以觀其所處矣忠州禹廟古郡巴蠻國空山夏禹祠鴉歸暗庭柏巫拜薦江蘺草蔓青緣壁苔㾗紫滿碑欲歸頻悵望回棹夕陽時雖非橘柚龍蛇之比亦老氣無敵龍興寺弔少陵先生寓居中原草草失承平戍火胡塵到兩京扈蹕老臣身萬里天寒來此聽江聲雙管齊下一寫兩枝張完臣曰草草二字狀盡衰世景象謂之咏少陵可謂之自咏亦可遊萬州岑公洞原注岑公隋時人居此二十年得道仙去大業征遼發閭左軍興書檄煎膏火此時也復有閒人自引巖泉拾山果後六百嵗吾來遊洞中正夏凄如秋乳石床平可坐卧水作珠簾月作鈎十年神遊八極表浮名坐覺秋豪小試問岑公迎我不鶴飛忽下青松杪萬州放船過下巖小留畫船四月滿旗風飲散匆匆鷁首東醉裏偏憐江水緑意中已想荔枝紅斷碑零落莓苔遍幽澗淙潺略約通一匹寧無好東絹慿誰畫此碧玲瓏楚城江上荒城猿鳥悲隔江便是屈原祠一千五百年間事只有灘聲似舊時王士禎曰歸州在江北山巔江南有楚臺山山上有楚王臺及舊秭歸城三閭大夫實産是鄉王龜齡詩城郭舊為䕫子國人民多是楚王孫陸放翁詩江上荒城猿鳥悲隔江便是屈原祠一千五百年間事只有灘聲似舊時何仲默詩古郡山頭數家住客舟江上一燈明竹枝慣聽巴人曲鳥道才通楚國程荒山寒日江聲怒號獨坐吟此數詩不必猿鳴三聲淚霑裳也張完臣曰聲味都盡而語氣不斷此之謂詩舟出下牢關大舸凌驚濤飛度青玉峽虛壁雲濛濛隂洞風颯颯拂天松蓋偃入水山腳插炎曦忽摧破亭午手忘箑懸知今夜喜月白宿沙夾曠哉七澤遊盟鷗不須㰱押韻皆穩峽口夜坐三峽至此窮兩壁猶峭立估船無時行婦盎有夜汲風生樹影動月碎水流急草根綴微露螢火飛熠熠吾行已四旬才抵楚西邑浩歌散鬱陶還舟覺衣濕初到荆州萬里泛仙槎歸來鬢未華蕭蕭沙市雨淡淡渚宫花斷岸添新漲髙城咽晚笳船窗一樽酒半醉落烏紗阻風沙市三日風萬鼓鳴船頭欲去不得發卧對青燈幽聽兒誦離騷可以散我愁微言入孤夢恍與屈宋遊睡起銅瓶響欣然喚茶甌吾道無淹速風伯非所尤小雨極凉舟中熟睡至夕舟中一雨掃飛蠅半脫綸巾卧翠藤清夢初回窗日晚數聲柔櫓下巴陵盧世㴶曰只末一句有多少藴含在嶽陽樓身如病鶴短趐翎雨雪飄灑號沙汀天風忽吹不得住東下巴峽泛洞庭軒皇張樂雖已矣此地至今朝百靈雄樓岌嶪鎮吳楚我來舉手捫天星帆檣才放已隱隱雲氣亂入何冥冥黿鼉出沒蛟鰐橫浪花遮盡君山青黃衫仙翁喜無恙袖劍近到城南亭眼前俗子敗人意安得與翁同醉醒黃鶴樓手把仙人緑玉枝吾行忽及早秋期蒼龍闕角歸何晚黃鶴樓中醉不知江漢交流波渺渺晉唐遺跡草離離平生最喜聽長笛裂石穿雲何處吹别出機軸邈然清敻結語運化入妙幾於滅盡針線之迹自雪堂登四望亭因厯訪蘇公遺迹至安國院我醉飛屐登孱顔柱杖出沒風煙間三山葱曨鮫鰐靜九關肅穆虎豹閒幾年金骨煉緑髓此日始得窮躋攀老仙歸侍紫皇案空有野水流淙潺蜿蜒翠阜圍緑野似嶺非嶺山非山向來龍蛇滿雪壁雷電下取何時還名花亦已天上去居人指似題詩處九十一翁不識公我抱此恨知無窮原注定惠院已廢海棠亦不復在安國老僧景滋年九十一自言東坡去黃後四年方生舟行蘄黃間雨霽得便風有感天青雲白十分晴帆飽舟輕盡日行江底魚龍貪晝睡淮南草木借秋聲好山縹渺何由住華髮蕭條只自驚莫怪時人笑踈懶宦情元不似詩情長風沙江水六月無津涯驚濤駭浪髙吹花櫓聲已出雁趐浦荻夾喜入長風沙長風自古三巴路檣竿參差雜煙樹南船北船各萬里凄凉小市相依住歌呼雜㳫燈火明黃昏風死浪亦平勞苦舟師剩沽酒安穩明朝到池口登賞心亭蜀棧秦關嵗月遒今年乘興却東遊全家穩下黃牛峽半醉來尋白鷺洲黯黯江雲瓜步雨蕭蕭木葉石城秋孤臣老抱憂時意欲請遷都涕已流將至京口卧聽金山古寺鐘三巴昨夢已成空船頭坎坎回帆鼓旗尾舒舒下水風城角危樓晴靄碧林間雙塔夕陽紅銅瓶愁汲中􅍽水不見茶山九十翁原注頃在京口嘗取中􅍽水寄曽文清公泝溪射的峰前禹廟東短蓬三扇卧衰翁閒携清聖濁賢酒重試朝南莫北風水落㾗留紅蓼節雨來聲滿緑蒲叢衝煙莫作匆匆去擬看溪丁下釣筒冬夜聞雁有感從軍昔戍南山邉傳烽直照東駱谷軍中罷戰壯士閒細草平郊恣馳逐洮州駿馬金絡頭梁州毬場日打毬玉杯傳酒和鹿血女真降虜彈箜篌大呼拔幟思野戰殺氣當年赤浮靣南遊蜀道已低摧猶據胡牀飛百箭豈知蹭蹬還江邉病臂不復能開弦夜聞雁聲起太息來時應過桑乾磧豪邁一往壓倒髙岑月夕開戶滿庭雪徐看知月明微風入叢竹復作雪來聲俗塵不待掃凛然肝肺清村深無漏鼓鶴唳報三更以雋語寫幽致列子御風泠然善也自雲門之陶山肩輿者失道行亂山中有茅舍小塘極幽邃求見主人不可意其隱者也陂池幽處有茅堂井臼蕭條草樹荒小鴨怯波時聚散病蔬傷蠧半青黃童兒衝雨收魚網婢子聞鐘上佛香我亦暮年思屏迹數椽何計得連牆園中雜書殘花委地筍掀泥香碗詩囊到處携幽夢欲成誰喚覺半忩斜日鷓鵠啼池亭夜賦池上小亭幽清宵秉燭遊荷盤時瀉露螢火早知秋有感嵗時速無聲河漢流殊方不堪住歸夢繞滄洲雙清堂夜賦陸子病少間獨卧溪上堂人靜魚自躍風定荷更香素月行中天流螢失孤光歸鳥飛有聲度此十里塘嗟我獨何事遲暮客異鄉太息搔短髮起視夜未央妙於體物流螢失孤光與螢火早知秋各有妙理風定荷更香風定池蓮自在香亦復各成妙句前後三詩不妨並存橋南納凉曳杖來追栁外凉畫橋南畔倚胡牀月明船笛參差起風定池蓮自在香半落星河知夜久無窮草樹覺城荒碧筒莫惜頽然醉人事還隨日出忙初秋夢故山覺而有作陂水白茫茫草煙濕霏霏牧童一聲笛落日無餘暉遙山已漸隱村巷亞竹扉老翁延我入苦謝柿栗微幸逢嵗有秋一醉君勿違念此動中懷命駕吾將歸别建安欹帽揚鞭晚出城驛亭燈火向人明多情葉上蕭蕭雨更把新凉送客行紫溪驛原注信州鉛山縣雲外丹青萬仞梯木隂合處子規啼嘉陵棧道吾能說略似黃亭到紫溪筆有天趣此作運化工部下篇又用太白皆極爐錘之妙月巖幾年不作月巖遊萬里重來已白頭雲外連娟何所似平羌江上半輪秋淡淡自合刻劃即失之矣聞雁過盡梅花把酒稀熏籠香冷換春衣秦關漢苑無消息又在江南送雁歸張完臣曰可謂深至春雨冬旱土不膏愛此春夜雨四郊農事興老稚迭歌舞相呼長沮耕分喜樊遲圃豐年已在目亭障靜桴鼓我歸未有期一官寄倉庾幸復寬簡書不敢恨羈旅平平寫去淡雅可愛豐年十字抵得一篇喜雨亭記南忩睡起夢中忘却在天涯一似當年錦里時狂倚寶筝歌白紵醉移銀燭寫烏絲酒來郫縣香初壓花送彭州露尚滋起坐南窗成絶嘆玉樓乾鵲誤歸期盧世㴶曰三四俊爽自是佳句晝漏迢迢暑氣清不妨小倦帶餘酲夢從隴客聲中斷愁向湘屏曲處生風度簾旌紅浪颭忩明香岫碧雲橫閒情賦罷慿誰寄悵望壺天白玉京感舊絶句鵝黃酒邉緑荔枝原注鵝黃廣漢酒名緑荔枝出叙州摩訶池上納凉時氷紈不畫驂鸞女却寫江南白紵辭盧世㴶曰有世外音響當於空際遇之夏日晝寢夢遊一院閴然無人簾影滿堂惟燕踏箏弦有聲覺而聞鐵鐸風響璆然殆所夢也邪因得絶句桐隂清潤雨餘天簷鐸搖風破晝眠夢到畫堂人不見一雙輕燕蹴箏弦書懷絶句不到天台三十年草菴猶記宿雲邉老僧曉出松門去手挈軍持取澗泉絶句源出樂府但取神韻趣在有意無意之間唐人推青蓮龍標二家擅場作者妙處深得風人之致視唐殆無愧色此不可以時代拘者也雨後極凉料簡篋中舊書有感日昳小雨不至晡雨雖未足凉有餘細泉泠泠咽幽竇清吹䇿䇿驚髙梧笠澤老翁病蘇醒欣然起理西齊書十年燈前手自校行間顛倒黃與朱區區朴學老自信要與萬卷歸林廬爾來世俗好變古鑿空飾詐無根株愀然撫几三太息力薄抱恨何由袪蘭臺漆書非已責且為籖幐除蠧魚秋夜湖海秋初到房櫳夜轉幽露濃驚鶴夢月冷伴蛩愁生計依微祿年光墮逺遊嚴灘已在眼早晚放孤舟原注去年欲自三衢州行泛七里瀨歸山隂今竟當為此行也雨夜庭院蕭條秋意深銅爐一炷海南沉幽人聽盡芭蕉雨獨與青燈話此心豐城髙安之間憩民家景趣幽邃為之慨然懷歸數家聚雲根細路入叢薄濺濺石渠水來往一略彴有無鄰里通笑語婦子樂濁醪時相就青蔬缺鹽酪日暮歸閉門績火星煜爚先期畢租稅老不入城郭嗟豫獨何事早插紅塵腳故山未成歸悵望有餘怍寄奉新髙令小雨催寒著客袍草行露宿敢辭勞嵗饑民食糟糠窄吏惰官倉鼠雀豪只要閭閻寬箠楚不須亭障肅弓刀九重屢下丁寧詔此責吾曹未易逃此真良二千石矣察吏恤災安民弭盜奉公任職八句中色色具到却一氣渾成不冗不腐風雅遺軌何可多得鶴林玉露載王十朋真德秀二詩命意雖同而氣格相去逺矣豫欲自嚴買船下七里灘謁嚴光祠而歸㑹灘淺陸行至桐廬始能泛江因得絶句桐廬縣前櫓聲急蒼煙茫茫白鳥雙亂山日落潮未落勝絶不減吳松江風格絶佳辛丑正月三日雪開嵗尚殘冬佳哉雪意濃潤歸千里麥聲亂五更鐘簾隙收初密牆隅積已重龍圍笑羔酒狐腋襲駝茸危檻臨欹竹幽窗聽墮松忽思西戍日慿堞待傳烽原注豫從戎日嘗大雪中登興元城上髙興亭待平安火至龍團笑羔酒用陶榖事妙於不覺雪霽歸湖上過千秋觀少留縱轡不嫌逺逢山猶一登夕陽陂渺渺殘雪塔層層折竹黃遮道飢烏下啄氷欲歸還小駐倚杖對崚嶒題山家壁山中無傳漏猿鳴知既夕芳藤上幽援素月照髙壁主人殊喜事歡若有夙昔稚子檠竹槃炊黍持餉客卜鄰雖未辦清嘯聊自適衰病久廢詩筆端歎荆棘憶昔憶昔浮江發劍南夕陽船尾每相銜楠陰暗處尋髙寺荔子紅時宿下巖原注髙寺在瀘州下巖在雲安軍硤口烹猪賽龍廟沙頭伐鼓挂風帆區區陳迹何由記惟有征塵尚滿衫秋夜秋氣侵帷夢不成一燈西壁翳還明風髙露井無桐葉雨急煙村有雁聲擊筑誰同燕市飲賃舂方作㑹稽行從來自許知何等堪歎江湖白髮生涼風又落南宫木老雁孤鳴漢北州不及頷聫之含藴九月三日泛舟湖中作兒童隨笑放翁狂又向湖邉上野航魚市人家滿斜日菊花天氣近新霜重重紅樹秋山晚獵獵青帘社酒香鄰曲莫辭同一醉十年客裏過重陽原注豫自庚寅至辛丑始見九日於故山新寒病怯新寒欲不禁南窗擁褐夜愔愔江湖跌宕送餘日書劍蕭條孤壯心杜曲新愁隨斷雁遼陽遺恨入踈砧此懷擬向何人說賴有昏燈伴苦吟湖村月夕客路風塵化素衣閒愁冉冉鬢成絲平生不負月明處神女廟前聞竹枝盧世㴶曰色相俱空橫塘橫塘南北埭西東拄杖飄然樂未窮農事漸興人滿野霜寒初重雁橫空參差樓閣髙城上寂厯村墟細雨中新買一蓑苔樣緑此生端欲伴漁翁原注是日偶買蓑衣甚妙蔬圃山翁老學圃自笑一何愚磽瘠財三畝勤劬賴兩奴正方畦畫局微潤土融酥翦闢荆榛盡鉏犁磊塊無過溝橫略彴聚甓起浮屠原注拾園中瓦礫作小塔隙地成瓜援餘功及芋區如絲細生菜似鴨爛蒸壺此事今真辦東歸不為鱸排比瑣事㸃染閒情雖云游戲亦斐亹可觀五雲門晚歸髙城帶逺林落日動寒砧行客自朝暮青山無古今衰遲慙逸氣憂患足危心溪迮滯歸艇何時春水深以髙韻勝置岱唐人集中不復可辨夜汲井水煮茶病起罷觀書袖手清夜永四鄰悄無語燈火正凄冷山童亦睡熟汲水自煎茗鏘然轆轤聲百尺鳴古井肺腑凜清寒毛骨亦蘇省歸來月滿廊惜踏踈梅影寄朱元晦提舉市聚蕭條極村墟凍餒稠勸分無積粟告糴未通流民望甚飢渴公行胡滯留徵科得寬否尚及麥禾秋惻然仁者之言四十字不愧古人羅大經謂文公於詩獨取放翁以其氣質渾厚殆未足以盡之宋史文公本傳淳熙七年浙東大饑易提舉浙東常平茶鹽事即日單車就道移書他郡募米商蠲其征北至部米已輻輳與僚屬鈎訪民隱至廢寢食雖深山窮谷拊存不遺事竣宰相王淮贊於上曰熹荒政乃行其所學民被實惠乍晴風日已和泛舟至扶桑埭徘徊西村久之十日風雨今日晴衰病忽減思閒行接䍦一幅煙霧薄舴艋八尺鳬鷖輕亭亭孤塔逺天碧曲曲深菴斜陽明數家茅屋門晝掩不聞人聲聞碓聲身似龎公不入城東阡南陌餞餘生新年倘有豐年喜買酒漁村看太平攜癭尊醉梅花下楠癭作尊容斗許擁腫輪囷元媚嫵肯從放翁來住山誰云置身不得所山房寂寞久不飲作意欲就梅花語我病鮮歡花更甚日暮凄凉泣殘雨人生萬事雲茫茫一醉常恐俗物妨正須仙人氷雪膚來伴老子鐵石腸花前起舞花底卧花影漸東山月墮癭尊未竭狂未休笑起題詩識吾過城西接待院後竹下作水邉小丘因古城上有巨竹數百箇一徑蛇蟠不容腳平處乃可十客坐裊裊共看風枝舞䔩䔩時聽春籜墮古佛不粧香火冷瘦僧如臘袈裟破門前西去長安路日夜舳艫銜尾過老夫本乏臺省姿且就清隂曲肱卧幽居春夜暮景催人雪鬢雙十年始復反吾邦雪逢佳月每避舍酒壓閒愁如受降三弄笛聲初到枕一枝梅影正橫窗要知清夢遊何許不釣桐江即錦江頸聫圓妙有彈丸脫手之樂晨起小雨濕清曉新鶯啼早春年光驚病眼節物屬閒身巴硤東連楚嶓山北控秦逺遊端可繼敢恨素衣塵春遊平生樂行役不耐常閉戶今朝新雨霽一笑整巾屨青猿導幽蹊春草伴微步雖云尊酒薄蔬果亦略具辛夷發髙枝楊栁吹墮絮行歌不知逺落日呼野渡橫林已棲鴉淺水猶立鷺歸來意頗豪古錦有新句八月十四日夜湖山觀月長空露洗玻璃碧紫金之盤徑三尺忽看擘地出人間桂樹扶踈如淡墨攬衣獨立鏡湖邉風露萬頃秋渺然開帆詎必入東海騎鯨便可追飛仙氷壺玉瀣侵骨冷醉看孤鸞舞清影夜䦨歸舍人已眠却倩天風為吹醒奇語得自眼前轉覺出人意表夜聞秋風感懷西風一夜號庭樹起攬戎衣淚濺襟殘角聲催關月墮斷鴻影隔塞雲深數篇零落從軍作一寸凄凉報國心莫倚壯圖思富貴英豪何限死山林草書歌傾家釀酒三千石閒愁萬斛酒不敵今朝醉眼爛巖電提筆四顧天地窄忽然揮掃不自知風雲入懷天借力神龍戰野昏霧腥竒鬼摧山太隂黑此時驅盡胸中愁槌牀大呌狂墮幘吳箋蜀素不快人付與髙堂三丈壁與醉後草書一篇各成竒致夜泊水村腰間羽箭久凋零太息燕然未勒銘老子猶堪絶大漠諸君何至泣新亭一身報國有萬死雙鬢向人無再青記取江湖泊船處卧聞新雁落寒汀率多胸臆兼有氣骨可為南渡君臣慨然太息自妙相歸將至杜浦堰舟中作斜陽發東郭初夜轉西城寺閣踈鐘動漁村逺火明蒼茫林靄滅撲漉水禽驚漸喜吾廬近遙聞過埭聲御選唐宋詩醇卷四十四
