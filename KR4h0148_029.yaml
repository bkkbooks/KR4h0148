front:
  text: 欽定四庫全書御選唐宋詩醇巻十三
  hash: sha256:da97fc9fc6bdfd7840a549d663ec5759ba836bc5fc1ef73348faf1765b30528f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_029-1a, image: WYG1448/WYG1448-0294c.png}
body:
  text: 襄陽杜甫詩五冬日洛城北謁𤣥元皇帝廟原注廟有吳道子畫五聖圖配極𤣥都閟慿虚禁籞長守祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣旁山河扶繡戸日月近雕梁仙李盤根大猗蘭奕葉光世家遺舊史道徳付今王畫手㸔前軰吳生逺擅塲森羅移地軸妙絶動宫牆五聖聫龍衮千宫列雁行冕旒俱秀發旌斾盡飛揚翠柏深留景紅梨迥得霜風筝吹玉柱露井凍銀牀身退卑周室經傳拱漢皇谷神如不死養拙更何鄉鉅麗冠冕得頌揚之體擬諸清廟明堂其氣象似之唐人崇祀老子事屬不經貽譏千古甫為當時之臣推崇固應如此其典重中帶飄逸精工中有排宕則大手異人處也陳師道曰叙述功徳反覆申意事核而理長李因篤曰此篇乃公開手長律鳯羽初舒九苞煥采宜其雄視一代也浦起龍曰典重髙華據事直書不參議論純是頌體錢箋語語指斥意非不善也但學者不善㑹之偏於譏刺一邉㸔去則失之逺矣唐書髙宗乾封元年幸亳州詣老君廟追尊為𤣥元皇帝開元二十九年制兩京諸州各置廟天寶元年置廟於天寧坊東都於積善坊臨淄舊邸二年改為太清宫東都曰太㣲宫投贈哥舒開府翰二十韻今代麒麟閣何人第一功君王自神武駕馭必英雄開府當朝傑論兵邁古風先鋒百勝在略地兩隅空青海無傳箭天山早挂弓廉頗仍走敵魏絳已和戎每惜河湟棄新兼節制通智謀垂睿想出入冠諸公日月低秦樹乾坤繞漢宫胡人愁逐北宛馬又從東受命邉沙逺歸來御席同軒墀曽寵鶴畋獵舊非熊茅土加名數山河誓始終䇿行遺戰伐契合動昭融勲業青㝠上交親氣槩中未為朱履客己見白頭翁壯節初題柱生涯獨轉蓬幾年春草歇今日暮途窮軍事留孫楚行間識吕䝉防身一長劔將欲倚崆峒胡應麟曰排律沈宋二氏藻贍精工太白右丞明秀髙爽然皆不過十韻且體在繩墨之中調非畦逕之外惟社陵大篇鉅什雄偉神奇如謁先主廟贈哥舒等作闔闢馳驟如飛龍行雲鱗鬛爪甲自中矩度又如淮隂用兵百萬掌握變化無方雖時有險樸無害大家上韋左相二十韻鳯厯軒轅紀龍飛四十春八荒開夀域一氣轉洪鈞霖雨思賢佐丹青憶老臣應圖求駿馬驚代得麒麟沙汰江河濁調和鼎鼐新韋賢初相漢范叔已歸秦盛業今如此傳經固絶倫豫樟深出地滄海濶無津北斗司喉舌東方領搢紳持衡留藻鑑聴履上星辰獨步才超古餘波徳照隣聰明過管輅尺牘倒陳遵豈是池中物由來席上珍廟堂知至理風俗盡還淳才傑俱登用愚䝉但隠淪長卿多病乆子夏索居頻回首驅流俗生涯似衆人巫咸不可問鄒魯莫容身感激時將晚蒼茫興有神為公歌此曲涕淚在衣巾沈徳潛曰從朝廷用人説起與前篇同是髙屋建瓴之法奉贈太常張卿二十韻方丈三韓外崑崙萬國西建標天地闊詣絶古今迷氣得神仙迥恩承雨露低相門清議衆儒術大名齊軒冕羅天闕琳琅識介珪伶官詩必誦䕫樂典猶稽健筆凌鸚鵡銛鋒瑩鸊鵜友于皆挺拔公望見端倪通籍踰青瑣亨衢照紫泥靈虬傳夕箭歸馬散霜啼能事聞重譯嘉謩及逺黎弼諧方一展班序更何躋適越空顛躓遊梁竟慘悽謬知終畫虎㣲分是醯雞萍泛無休日桃隂想舊蹊吹嘘人所羡騰躍事仍睽碧海真難涉青雲不可梯顧深慙鍜鍊才小辱提携檻束哀猿呌枝驚夜鵲棲幾時陪羽獵應指釣璜溪投贈詩皆工於發端此篇尤有氣象當是贈張垍者垍以尚主置宅禁中故假神仙之象以誦美之錢謙益引妙實真符之説謂中含諷刺不免穿鑿且與甫贈詩望薦之意不合奉贈鮮于京兆二十韻王國稱多士賢良復幾人異才應間出爽氣必殊倫始見張京兆宜居漢近臣驊騮開道路鵰鶚離風塵侯伯知何等文章實致身奮飛超等級容易失沉淪脱略磻溪釣操持郢匠斤雲霄今已逼台衮更誰親鳯穴雛皆好龍門客又新義聲紛感激敗績自逡巡途逺欲何向天髙難重陳學詩猶孺子鄉賦念嘉賔不得同晁錯吁嗟後郄詵計疎疑翰墨時過憶松筠獻納紆皇眷中間謁紫宸且隨諸彦集方覬薄才伸破膽遭前政隂謀獨秉鈞㣲生霑忌刻萬事益酸辛交合丹青地恩傾雨露辰有儒愁餓死早晚報平津甫之應詔而被黜獻賦而仍置皆李林甫為之相臣以進賢為職知人為務唐以詩賦取士而杜甫白衣古人所以感士不遇也隂謀忌刻冩出林甫奸狀彼讀駱賔王檄而曰宰相安得失此人者猶當媿之蔡夢弼曰時明皇詔天下有一藝詣闕就選李林甫恐士或斥已建言請委尚書先試問遂無一中者公應詔退下是為林甫所沮故下有破膽隂謀之語也王士禄曰計疎疑翰墨時過憶松筠語有餘味贈特進汝陽王二十韻特進羣公表天人夙徳升霜蹄千里駿風翮九霄鵬服禮求毫髪惟忠忘寢興聖情常有眷朝退若無慿仙醴來浮蟻奇毛或賜鷹清關塵不雜中使日相乘晩節嬉遊簡平居孝義稱自多親棣蕚誰敢問山陵學業醇儒富辭華哲匠能筆飛鸞聳立章罷鳳騫騰精理通談笑忘形向友朋寸長堪縷綣一諾豈驕矜已忝歸曹植何知對李膺招要恩屢至崇重力難勝披霧初歡夕髙秋爽氣澄樽罍臨極浦鳬雁宿張燈花月窮游宴炎天避鬱蒸硯寒金井水簷動玉壺氷瓢飲惟三逕巖棲在百層且持蠡測海况挹酒如澠鴻寶寧全秘丹梯庶可凌淮王門有客終不媿孫登胡應麟曰贈汝陽哥舒李白韋見素等作格調精嚴體骨勻稱每讀一篇無論其人履厯咸若指掌且形神意氣踴躍毫楮如周昉冩生太史序傳逼奪化工而杜從容聲律間尤為難事真古今絶詣也鄭駙馬宅宴洞中主家隂洞細烟霧留客夏簟清琅玕春酒盃濃琥珀薄氷漿椀碧瑪瑙寒悞疑茅堂過江麓已入風磴霾雲端自是秦樓壓鄭谷時聞雜佩聲珊珊拗體全用古調亦覺過苦正喜其蒼秀仇兆鰲曰頷聫叙事濃麗腹聫冩景蕭疎重題鄭氏東亭華亭入翠㣲秋日亂清暉崩石欹山樹清漣曵水衣紫鱗衝岸躍蒼隼䕶巢歸向晩尋征路殘雲傍馬飛題張氏隠居春山無伴獨相求伐木丁丁山更幽澗道餘寒厯冰雪石門斜日到林丘不貪夜識金銀氣逺害朝㸔麋鹿遊乗興杳然迷出處對君疑是泛虚舟善冩幽居之致㫖趣俱逺固不得以渉理路落言筌議之天寶初南曹小司冦舅於我太夫人堂下累土為山一匱盈尺以代彼朽木承諸焚香瓷甌甌甚安矣旁植慈竹葢茲數峰嶔岑嬋娟宛有塵外致乃不知興之所至而作是詩一匱功盈尺三峰意出羣望中疑在野幽處欲生雲慈竹春隂覆香爐曉勢分惟南將獻夀佳氣日氛氲李因篤曰三四承上虚狀二句體極生動龍門龍門横野㫁驛樹出城來氣色皇居近金銀佛寺開往還時屢改川水日悠哉相閲征途上生涯盡幾回奉寄河南韋尹丈人原注甫敝廬在偃師承韋公頻有訪問故有下句有客傳河尹逢人問孔融青囊仍隠逸章甫尚西東鼎食分門戸詞塲繼國風尊榮瞻地絶疎放憶途窮濁酒尋陶令丹砂訪葛洪江湖漂短褐霜雪滿飛蓬牢落乾坤大周流道術空謬慙知薊子真怯笑揚雄盤錯神明懼謳歌徳義豐尸鄉餘土室難説祝雞翁與任城許主簿遊南池秋水通溝洫城隅進小船晩涼㸔洗馬森木亂鳴蟬菱熟經時雨蒲荒八月天晨朝降白露遙憶舊青氊仇兆鰲曰公詩善記時節此詩晨朝降白露明日白露節也他詩露從今夜白今日白露節也登兖州城樓東郡趨庭日南樓縱目初浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘從來多古意臨眺獨躊蹰安雅妥帖杜律中最近人者故後人多摹此𣲖李夢陽曰疊景者意必二濶大者半必細此最律詩三昧如浮雲連海岱平野入青徐孤嶂秦碑在荒城魯殿餘前景寓目後景感懷也如詔從三殿去碑到百蠻開野館穠花發春帆細雨來前半闊大後半工細也唐法律甚嚴惟杜變化莫測亦惟杜趙汸曰公祖審言登襄陽城詩云旅客三秋至層城四望開楚山横地出漢水接天迴冠葢非新里章華只舊臺習池風景異歸路滿塵埃公此詩實本於其祖對雨書懷走邀許十一簿公東岳雲峰起溶溶滿太虚震雷翻幕鷰驟雨落河魚座對賢人酒門聴長者車相邀愧泥濘騎馬到堦除王士禄曰驟雨落河魚亦是即目妙境已上人茅齋已公茅屋下可以賦新詩枕簟入林僻茶𤓰留客遲江蓮揺白羽天棘蔓青絲空忝許詢軰難酬支遁詞房兵曹胡馬詩胡馬大宛名鋒稜瘦骨成竹批雙耳峻風入四蹄輕所向無空闊真堪託死生驍騰有如此萬里可横行孤情迥出健思潛搜相其氣骨亦可横行萬里此與畫鷹二篇真文家所謂沈著痛快者趙汸曰咏物詩戒粘皮帶骨此詩矯健豪縱飛行萬里之勢如在目中所謂索之於牝牡驪黄之外者區區模冩體貼以為咏物何足語此李因篤曰五六如咏良友大將此所謂沈雄畫鷹素練風霜起蒼鷹畫作殊􅑷身思狡兎側目似愁胡絛鏇光堪擿軒楹勢可呼何當擊凡鳥毛血灑平蕪王士禄曰命意精警句句不脱畫字朱鶴齡曰起句與縞素漠漠開風沙義同末因畫應而思真者之搏擊則進鵰賦意也仇兆鰲曰每咏一物必以全副精神入之故老筆蒼勁中時見靈氣飛舞過宋員外之問舊莊原注員外季弟執全吾見知于代故有下句宋公舊池館零落守陽阿枉道祗從入吟詩許更過淹留問耆老寂寞向山河更識將軍樹悲風日暮多夜宴左氏莊風林纎月落衣露浄琴張暗水流花徑春星帶草堂檢書燒燭短㸔劔引杯長詩罷聞吳詠扁舟意不忘冩景穠至結意亦逺杜律如此種氣骨有餘不乏風韻雖雅近王孟尤為盛唐髙步顧宸曰一章之中樂事皆具而時地景物重疊舖叙却渾然不見痕迹黄生曰夜景有月易佳無月難佳三四句無月時寫景語更精切送蔡希曽都尉還隴右因寄髙三十五書記原注時哥舒入奏勒蔡子先歸蔡子勇成癖彎弓西射胡健兒寧鬬死壯士恥為儒官是先鋒得材縁挑戰須身輕一鳥過槍急萬人呼雲幕隨開府春城赴上都馬頭金匼匝駞背錦糢糊咫尺雲山路歸飛青海隅上公猶寵錫突將且前驅漢使黄河逺涼州白麥枯因君問消息好在阮元瑜杜牧詩射鵰都尉萬人敵黑矟將軍一鳥輕雖本此詩然語意天然遜子美逺矣歐陽修曰陳舍人從易偶得杜集舊本文多脱誤送蔡都尉詩身輕一鳥其下脱一字陳公與數客各用一字補之或云疾或云落或云下莫能定後得一善本乃是過字陳歎服以為雖一字諸君亦不能到也春日憶李白白也詩無敵飄然思不羣清新庾開府俊逸鮑參軍渭北春天樹江東日暮雲何時一尊酒重與細論文李杜交誼於白集中論之詳矣此詩傅㑹尤多所謂以小人之心度君子之腹甫無是也頸聫遂為懷人粉本情景雙闗一何藴藉朱鶴齡曰公與太白皆學六朝前以李侯佳句比之隂鏗此又比之庾鮑葢舉生平所最慕者以相方也王安石謂少陵於李白僅比以庾鮑隂鏗則又下矣或遂以細論文譏其才疎此真瞽説公詩云頗學隂何苦用心又云庾信文章老更成公之推服諸家甚至則其推服太白為何如哉贈陳二補闕世儒多汨沒夫子獨聲名獻納開東觀君王問長卿早雕寒始急天馬老能行自到青㝠裏休㸔白髮生寄髙三十五書記歎息髙生老新詩日又多美名人不及佳句法如何主將収才子崆峒足凱歌聞君已朱紱且得慰蹉跎詩必有法古今通義子美最深於法嚴羽云少陵詩法如孫吳太白詩法如李廣是也送裴二虬作尉永嘉孤嶼亭何處天涯水氣中故人官就此絶境興誰同隠吏逢梅福遊山憶謝公扁舟吾已就把釣待秋風浦起龍曰起用倒勢如凌虚御風而來贈田九判官崆峒使節上青霄河隴降王欵聖朝宛馬總肥春苜蓿將軍只數漢嫖姚陳留阮瑀誰争長京兆田郎早見招麾下賴君才並入獨能無意向漁樵風格遒所謂神理縱横而凖繩最宻此種體製惟老杜擅長詩本望田薦已故宛馬句以比為賦微領此意五六語勢如轉丸珠仇兆鰲謂阮瑀為指髙適不為無見不徒送蔡都尉詩以阮比髙也贈獻納使起居田舍人獻納司存雨露邉地分清切任才賢舍人退食収封事宫女開函近御筵曉漏追趨青瑣闥晴忩㸃檢白雲篇揚雄更有河東賦唯待吹嘘送上天陪鄭廣文遊何將軍山林十首不識南塘路今知第五橋名園依緑水野竹上青霄谷口舊相得濠梁同見招平生為幽興未惜馬蹄遙古人紀游之作佇興而言興盡而止故有餘味而無長語此詩多至十首葢游宴既乆情景迭見故乃綜括始終分攄懷抱絶去羈束而自成阡陌若不經營而自行條理所謂言之不足故長言之反復咏歎以寄其情者也十首中風致蕭疎氣體深穏元亮之冲太冲之逸康樂之清明逺之俊彚而有之至其章法次序則大家結搆評者類能言之王嗣奭曰起句是十首起法末拈幽興為十首之綱百頃風潭上千章夏木清卑枝低結子接葉暗巢鸎鮮鯽銀絲鱠香芹碧澗羮翻疑柂樓底晚飯越中行蔡寛夫曰卑枝一聫乃疊韻對如樂天户大嫌甜酒才髙笑小詩要因其語意偶合輒成就之不以是為工也萬里戎王子何年别月支異花開絶域滋蔓匝清池漢使徒空到神農竟不知露翻兼雨打開拆日離披王士禄曰十首中宕此一首最見章法旁舍連髙竹疎籬帶晚花碾渦深沒馬藤蔓曲藏虵詞賦工無益山林跡未賖盡捻書籍賣來問爾東家剰水滄江破殘山碣石開緑垂風折笋紅綻雨肥梅銀甲彈筝用金魚換酒來興移無灑掃隨意坐莓苔王嗣奭曰散漫冩去無起束呼應另是一格亦縁十首自有大起結此首如中聫也風磴吹隂雪雲門吼瀑泉酒醒思卧簟衣冷欲裝綿野老來㸔客河魚不取錢只疑淳朴處自有一山川棘樹寒雲色茵陳春藕香脆添生菜美隂益食單涼野鶴清晨出山精白日藏石林蟠水府百里獨蒼蒼浦起龍曰野鶴一聫刻意生色憶過楊栁渚走馬定昆池醉把青荷葉狂遺白接䍦刺船思郢客解水乞吳兒坐對秦山晚江湖興頗隨牀上書連屋階前樹拂雲將軍不好武稚子總能文醒酒㣲風入聴詩静夜分絺衣挂蘿薜涼月白紛紛幽意忽不惬歸期無奈何出門流水注迴首白雲多自笑燈前舞誰憐醉後歌秪因與朋好風雨亦來過趙汸曰凡一題而賦數首者須首尾布置有起有結每章谷有主意無繁複不倫之失乃是家數觀此十章及後五章可見王嗣奭曰合觀十首分明一篇游記有首有尾中間或賦景或寫情經緯錯綜曲折變化用正用竒不可方物李因篤曰末章是十首結語老氣横空直使後五首可接重過何氏五首問訊東橋竹將軍有報書倒衣還命駕髙枕乃吾廬花妥鸎捎蝶溪喧獺趂魚重來休沐地真作野人居五首皆著意重過其大致疎落不復次第舖叙正所以别於前游此亦詩家之微指也盧元昌以野人居三字為諷當時第舍之侈又或以前第九首此第四首為諷明皇黷武將帥好兵前第三首為刺明皇任蕃將寵禄山無端牽引破碎支離黄庭堅謂棄其大㫖於所遇林泉人物草木魚蟲以為物物皆有所託如世間商度隠語者則子美之詩委地矣讀甫詩者當以為戒山雨樽仍在沙沉榻未移犬迎曽宿客鴉䕶落巢兒雲薄翠㣲寺天清皇子陂向來幽異極步屣過東籬李因篤曰五六宕開惟大家有此筆力落日平臺上春風啜茗時石欄斜㸃筆桐葉坐題詩翡翠鳴衣桁蜻蜓立釣絲自今幽興熟來往亦無期首篇五六及翡翠二句穠至中别有幽趣不減蟬噪林逾静鳥鳴山更幽也頗怪朝參懶應耽野趣長雨抛金鎻甲苔卧緑沉槍手自移蒲栁家纔足稻粱㸔君用幽意白日到羲皇到此應常宿相留可判年蹉跎暮容色悵望好林泉何日霑㣲禄歸山買薄田斯遊恐不遂把酒意茫然冬日有懷李白寂寞書齋裏終朝獨爾思更尋嘉樹傳不忘角弓詩短褐風霜入還丹日月遲未因乘興去空有鹿門期與亦有梁宋游相期拾瑤草正相照應贈翰林張四學士翰林逼華葢鯨力破滄溟天上張公子宫中漢客星賦詩拾翠殿佐酒望雲亭紫誥仍兼綰黄麻似六經内分金帶赤恩與荔枝青無復隨髙鳯空餘泣聚螢此生任春草垂老獨漂萍儻憶山陽㑹悲歌在一聴前幅工麗送張二十參軍赴蜀州因呈楊五侍御好去張公子通家别恨添兩行秦樹直萬㸃蜀山尖御史新驄馬參軍舊紫髯皇華吾善處於汝定無嫌陪諸貴公子丈八溝携妓納涼晚際遇雨二首落日放船好輕風生浪遲竹深留客處荷浄納涼時公子調氷水佳人雪藕絲片雲頭上黑應是雨催詩雨來霑席上風急打船頭越女紅裙濕燕姬翠黛愁纜侵堤栁繫幔巻浪花浮歸路翻蕭颯陂塘五月秋結皆入勝次作尤有逸致贈髙式顔昔别是何處相逢皆老夫故人還寂寞削跡共艱虞自失論文友空知賣酒壚平生飛動意見爾不能無深情髙調起句中無限蒼涼王士正曰篇中論文友指髙適適卒於永泰元年此詩當在改元之後故武衛將軍挽歌三首嚴警當寒夜前軍落大星壯夫思敢決哀詔惜精靈王者今無戰書生已勒銘封侯意疎濶編簡為誰青劉㑹孟曰詞意上下含蓄有美有恨舞劔過人絶鳴弓射獸能銛鋒行惬順猛噬失蹻騰赤羽千夫膳黄河十月氷横行沙漠外神速至今稱李因篤曰詩意沈雄悲壯足慰鬼雄此篇尤有生造之力哀挽青門去新阡絳水遥路人紛雨泣天意颯風飈部曲精仍鋭匈奴氣不驕無由覩雄略大樹日蕭蕭官定後戲贈原注時免河西尉為右衛率府兵曹不作河西尉淒涼為折腰老夫怕趨走率府且逍遙耽酒須㣲禄狂歌託聖朝故山歸興盡迴首向風飈九日藍田崔氏莊老去悲秋强自寛興來今日盡君歡羞將短髪還吹㡌笑倩旁人為正冠藍水逺從千澗落玊山髙並兩峰寒明年此㑹知誰健醉把茱茰子細㸔意頗頽唐筆則老健頸聫撐拄自是截斷衆流之句劉禹錫曰詩中用茱茰字者凡三人杜子美云醉把茱茰子細㸔王右丞云遍挿茱茰少一人朱倣云學他年少挿茱茰更三君所用子美為優陳師道曰頷聨文雅曠達不減昔人故謂詩非力學可致正須胸中度世耳崔氏東山草堂愛汝玉山草堂静髙秋爽氣相鮮新有時自發鐘磬響落日更見漁樵人盤剥白鴉谷口栗飯煮青泥坊底芹何為西莊王給事柴門空閉鏁松筠甫集特多抝律然其聲調自有一定之法如此詩及西岳崚嶒竦處尊錦官城西生事㣲掖垣竹埤梧十尋城尖徑仄旌斾愁諸篇以古調入律所謂蒼莽厯落中自成音節者然此及西岳篇収入律調為正法如後一篇八句全抝又抝體之變格不易學也若并不識七古聲調而以語抝體難矣他如澗道餘寒厯氷雪傳語風光共流轉及映堦碧草自春色九江日落醒何處諸聫乃單抝雙抝正法宋人胡仔謂平仄固有定體衆共守之然不若時用變體如兵之出竒變化無窮以驚世駭目王世懋則疑為變風變雅皆恍惚之語耳王嗣奭曰藍田詩悲壯東山詩渾成不煩繩削自有蕭散之致對雪戰哭多新鬼愁吟獨老翁亂雲低薄暮急雪舞迴風瓢棄樽無緑爐存火似紅數州消息㫁愁坐正書空月夜今夜鄜州月閨中只獨㸔遥憐小兒女未解憶長安香露雲鬟濕清輝玉臂寒何時倚虚幌雙照淚痕乾王士正曰不言思兒女情在言外浦起龍曰悲婉㣲至黄鶴曰天寶十五載八月公自鄜州赴行在為賊所得時身在長安家在鄜州故作是詩遣興驥子好男兒前年學語時問知人客姓誦得老夫詩世亂憐渠小家貧仰母慈鹿門携不遂雁足繫難期天地軍麾滿山河戰角悲儻歸免相失見日敢辭遲王嗣奭曰愛隔情深語寛心急春望國破山河在城春草木深感時花濺淚恨别鳥驚心烽火連三月家書抵萬金白頭搔更短渾欲不勝簪司馬光曰古人為詩貴於意在言外使人思而得之近世惟杜子美最得詩人之體如此詩言山河在明無餘物矣草木深明無人矣花鳥平時可娛之物見之而泣聞之而悲則時可知矣他皆類此不可徧舉憶幼子驥子春猶隔鶯歌煖正繁别離驚節換聰慧與誰論澗水空山道柴門老樹村憶渠愁只睡炙背俯晴軒喜達行在所三首西憶岐陽信無人遂却迴眼穿當落日心死著寒灰霧樹行相引蓮峰望忽開所親驚老瘦辛苦賊中來李因篤曰抗賊髙節而以老瘦辛苦四字櫽括之所謂藴藉也愁思胡笳夕淒涼漢苑春生還今日事間道暫時人司𨽻章仞覩南陽氣已新喜心飜倒極嗚咽淚霑巾劉㑹孟曰問道暫時人五字可傷即云旦暮人耳暫時更警死去慿誰報歸來始自憐猶瞻太白雪喜遇武功天影静千官裏心蘓七校前今朝漢社稷新數中興年肺腑流露不假雕飾論甫者謂其一飯不忘君況斯時情境乎所以冩欣喜處語極悲痛性情所至妙不自尋觀其真摯如此其生平大節可知矣趙汸曰題曰喜達行在所而詩多追説脱身歸順間關䟦涉之情狀所謂痛定思痛逾於在痛時也得家書去慿遊客寄來為附家書今日知消息他鄉且舊居熊兒幸無恙驥子最憐渠臨老羇孤極傷時㑹合疎二毛趨帳殿一命侍鸞輿北闕妖氛滿西郊白露初涼風新過雁秋雨欲生魚農事空山裏眷言終荷鋤入後清逸翛然意逺奉贈嚴八閣老扈聖登黄閣明公獨妙年蛟龍得雲雨鵰鶚在秋天客禮容疎放官曹可接聫新詩句句好應任老夫傳奉送郭中丞兼太僕卿充隴右節度使三十韻英乂詔發西山將秋屯隴右兵凄凉餘部曲燀赫舊家聲鵰鶚乘時去驊騮顧主鳴艱難須上䇿容易即前程斜日當軒葢髙風巻斾旌松悲天水冷沙亂雪山清和虜猶懷惠防邉不敢驚古來於異域鎮静示專征燕薊奔封豕周秦觸駭鯨中原何慘黷餘孽尚縱横箭入昭陽殿笳吟細栁營内人紅袖泣王子白衣行宸極祅星動園陵殺氣平空餘金捥出無復繐帷輕毁廟天飛雨焚宫火徹明罘罳朝共落棆桷夜同傾三月師逾整羣胡勢就烹瘡痍親接戰勇決冠垂成妙譽期元宰殊恩且列卿幾時迴節鉞戮力掃欃槍圭竇三千士雲梯七十城恥非齊説客秪似魯諸生通籍㣲班沗周行獨坐榮隨肩趨漏刻短髮寄簪纓徑欲依劉表還疑厭禰衡漸衰那此别忍淚獨含情廢邑狐狸語空村虎豹争人頻墜塗炭公豈忘精誠元帥調新律前軍壓舊京安邉仍扈從莫作後功名言有倫脊義歸忠愛昔謝安論毛詩以訏謨定命逺猷辰告為佳語此類篇章有其意矣王嗣奭曰本送郭之隴右而語意輕外重内亹亹而談正以感激中丞使知急也後云幾時回節鉞又云安邉仍扈從葢深以討賊大事望之矣送楊六判官使西蕃送逺秋風落西征海氣寒帝京氛祲滿人世别離難絶域遥懷怒和親願結歡勅書憐賛普兵甲望長安宣命前程急惟良待士寛子雲清自守今日起為官垂淚方投筆傷時即據鞍儒衣山鳥怪漢節野童㸔邉酒排金盞夷歌捧玊盤草輕蕃馬健雪重拂廬乾慎爾參籌畫從兹正羽翰歸來權可取九萬一朝摶仇兆鰲曰羅大經云子雲清自守今日起為官假雲對日兩句一意按元白劉賔客輩汝洛唱和集九日送人清秋方落㡌子夏正離羣假對之工本於杜句朱鶴齡曰舊唐書云至徳元載吐蕃遣使和親願助國討賊二載三月遣給事中南巨川報命楊葢贊巨川以行月天上秋期近人間月影清入河蟾不沒𢷬藥兎長生只益丹心苦能添白髮明干戈知滿地休照國西營晚行口號三川不可到歸路晚山稠落雁浮寒水饑烏集戍樓市朝今日異䘮亂幾時休逺媿梁江總還家尚黑頭盧元昌曰有春燕巢於林木之感行次昭陵舊俗疲庸主羣雄問獨夫䜟歸龍鳯質威定虎狼都天屬尊堯典神功恊禹謨風雲隨絶足日月繼髙衢文物多師古朝廷半老儒直詞寧戮辱賢路不﨑嶇徃者災猶降蒼生喘未蘓指麾安率土盪滌撫洪鑪壯士悲陵邑幽人拜鼎湖玉衣晨自舉鐵馬汗常趨松栢瞻虚殿塵沙立暝途寂寥開國日流恨滿山隅氣象嵬峩規模宏逺華茂典重之中有沉雄悲壯之概陸游所云清廟生民伯仲間也貞觀之治三代以後所僅見其行政用人納諌進賢亦非後代所及文物四句能舉其要不特此也明皇勵精為治開元政化上嫓太宗不能持盈保泰任用宵小蔽塞聰明以致天寶禍亂向非太宗之靈則唐室墟矣流離之餘徘徊瞻眺撫時傷往流恨山隅想開國之盛而所以致亂之故隠然言外深廣無端波瀾萬狀今古詩人絶無倫比甫祭房相文云培塿滿地崑崙無羣可取以評此詩許顗曰文物多師古四句見太宗智勇英特武定天下而能如此最盛徳也黄鶴曰按天寳五載詔天下通一藝者詣京師公自東都西歸應詔故道經昭陵也沈徳潛曰玊衣二句猶騷所云神之來兮夾兩旗言神靈陟降也重經昭陵草昧英雄起謳歌厯數歸風塵三尺劍社稷一戎衣翼亮貞文徳丕承戢武威聖圖天廣大宗祀日光輝陵寢盤空曲熊羆守翠㣲再窺松柏路還見五雲飛渾舉賛頌義無不包與前篇皆可直追三頌何景明曰用經史入詩絶不見斧鑿痕使他人道之未免拙滯鍾惺曰陵廟之作典古悲涼説功業無竹帛氣説神靈無松杉氣張逺曰末句即五陵佳氣無時無之意喜聞官軍已臨賊冦二十韻胡虜潛京縣官軍擁賊壕鼎魚猶假息穴蟻欲何逃帳殿羅𤣥冕轅門照白袍秦山當警蹕漢苑入旌旄路失羊腸險雲横雉尾髙五原空壁壘八水散風濤今日㸔天意遊魂貸爾曹乞降那更得尚詐莫徒勞元帥歸龍種司空握豹韜前軍蘓武節左將吕䖍刀兵氣回飛鳥威聲沒巨鼇戈鋋開雪色弓矢尚秋毫天步艱方盡時和運更遭誰云遺毒螫已是沃腥臊睿想丹墀近神行羽衛牢花門騰絶漠拓羯渡臨洮此輩感恩至羸俘何足操鋒先衣染血騎突劍吹毛喜覺都城動悲憐子女號家家賣釵釧只待獻春醪壯浪豪邁寫得喜字意出可作討賊檄文亦可作報㨗露布王嗣奭曰字字犀利句句雄壯真是筆掃千軍者唐書至徳二載九月丁亥廣平王俶將朔方等軍及回紇西域之衆十五萬發鳯翔壬寅至長安城西與賊將安守忠戰於香積寺北賊大敗張通儒走陜郡大軍入京師甲辰㨗書至鳯翔収京生意甘衰白天涯正寂寥忽聞哀痛詔又下聖明朝羽翼懷商老文思憶帝堯叨逢罪已日霑灑望青霄汗馬収宫闕春城鏟賊壕賞應歌杕杜歸及薦櫻桃雜虜横戈數功臣甲第髙萬方頻送喜無乃聖躬勞一喜一痛忠愛之誠藹然而見此始収兩京之作錢謙益語語文致喜為傅㑹而不覺其以後釋前為大謬也御選唐宋詩醇巻十三
