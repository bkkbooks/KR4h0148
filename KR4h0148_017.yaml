front:
  text: 欽定四庫全書御選唐宋詩醇卷七
  hash: sha256:68cd23973d372cc0f2fe0852dc182e218d081547ace00ed5beb856d837d2c5f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_017-1a, image: WYG1448/WYG1448-0173c.png}
body:
  text: 隴西李白詩七送楊山人歸嵩山我有萬古宅嵩陽玉女峰長留一片月挂在東溪松爾去掇仙草菖蒲花紫茸嵗晚或相訪青天騎白龍蟠逸氣於短言彌覺竒健劉辰翁曰超然天地間可以不死豈獨不經人道哉送殷淑痛飲龍笻下燈青月復寒醉歌驚白鷺半夜起沙灘送范山人歸泰山魯客抱白鶴别余往泰山初行若片雲杳在青崖間髙髙至天門日觀近可攀雲山望不及此去何時還送友人青山橫北郭白水繞東城此地一為别孤蓬萬里征浮雲逰子意落日故人情揮手自兹去蕭蕭班馬鳴首聨整齊承則流走而下頸聨健徑結有蕭散之致大匠運斤自成規矩沈德潜曰蘇李贈言多唏噓語無蹶蹙聲知古人之意在不盡矣太白猶不失斯㫖送友人入蜀見說蠶叢路﨑嶇不易行山從人面起雲傍馬頭生芳樹籠秦棧春流繞蜀城升沉應已定不必問君平此五律正宗也李夢陽曰叠景者意必二濶大者半必細極得詩家微指此詩頷聨承接次句語意竒險五六則穠纎矣頷聨極言蜀道之難五六又見風景可樂以慰征夫此兩意也一結翻案更饒勝致送張秀才謁髙中丞并序余時繫潯陽獄中正讀留侯傳秀才張孟熊藴滅胡之䇿將之廣陵謁髙中丞余嘉子房之風感激於斯人因作是詩以送之秦帝淪玉鏡留侯降氛氲感激黃石老經過滄海君壯士揮金槌報讐六國聞智勇冠終古蕭陳難與羣兩龍爭鬭時天地動風雲酒酣舞長劎倉卒解漢紛宇宙初倒懸鴻溝勢將分英謀信竒絶夫子揚清芬胡月入紫微三光亂天文髙公鎮淮海談笑却妖氛採爾幕中畫戡難光殊勳我無燕霜感玉石俱燒焚但灑一行淚臨岐竟何云餞校書叔雲少年費白日歌笑矜朱顔不知忽已老喜見春風還惜别且為歡裴回桃李間看花飲美酒聽鳥臨晴山向晚竹林寂無人空閉關落落有風致與諸公送陳郎將歸衡陽并序仲尼旅人文王明夷茍非其時聖賢低眉况僕之不肖者而遷逐枯槁固非其宜朝心不開暮髮盡白而登髙送逺使人增愁陳即將義風凜然英思逸發來下曹城之榻去邀才子之詩動清興於中流泛素波而徑去諸公仰望不及連章祖之序慚起豫輒冠名賢之首作者嗤我乃為撫掌之資乎衡山蒼蒼入紫冥下看南極老人星回飈吹散五峰雪往往飛花落洞庭氣清嶽秀有如此郎將一家拖金紫門前食客亂浮雲世人皆比孟嘗君江上送行無白璧臨岐惆悵若為分起擅勝勢賦得白鷺鷥送宋少府入三峽白鷺拳一足月明秋水寒人驚逺飛去直向使君灘竒思古調宣州謝朓樓餞别校書叔雲棄我去者昨日之日不可留亂我心者今日之日多煩憂長風萬里送秋雁對此可以酣髙樓蓬萊文章建安骨中間小謝又清發俱懷逸興壯思飛欲上青天覽日月抽刀斷水水更流舉杯銷愁愁更愁人生在世不稱意明朝散髮㺯扁舟遙情飈豎逸興雲飛杜甫所謂飄然思不羣者此矣千載而下猶見酒間岸異之狀真仙才也吳昌祺曰亦從明逺變化出來涇川送族弟錞涇川三百里若耶羞見之錦石照碧山兩邊白鷺鷥佳境千萬曲客行無歇時上有琴髙水下有陵陽祠仙人不見我明月空相知問我何事來盧敖結幽期蓬山振雄筆繡服揮清詞江湖發秀色草木含榮滋置酒送惠連吾家稱白眉愧無海嶠作敢闕河梁詩見爾復幾朝俄然告將離中流漾彩鷁列岸叢金羈歎息蒼梧鳯分棲瓊樹枝清晨各飛去飄落天南垂望極落日盡秋深暝猿悲寄情與流水但有長相思送崔氏昆季之金陵放歌倚東樓行子期曉發秋風渡江來吹落山上月主人出美酒滅燭延清光二崔向金陵安得不盡觴水客弄歸櫂雲帆卷輕霜扁舟敬亭下五兩先飄揚峽石入水花碧流日更長思君無嵗月西笑阻河梁筆情蕭爽自是太白本色登黃山凌歊臺送族弟漂陽尉濟充泛舟赴華隂得齊字鸞乃鳯之族翶翔紫雲霓文章輝五色雙在瓊樹棲一朝各飛去鳯與鸞俱啼炎赫五月中朱曦爍河堤爾從泛舟役使我心魂悽秦地無碧草南雲喧鼓鼙君王減玉膳早起思鳴雞漕引救關輔疲人免塗泥宰相作霖雨農夫得耕犂靜者伏草間羣才滿金閨空手無壯士窮居使人低送君登黃山長嘯倚天梯小舟若鳬雁大舟若鯨鯢開帆散長風舒卷與雲齊日入牛渚晦蒼然夕煙迷相思定何許杳在洛陽西起有竒氣說轉漕處見得關係鄭重數語內包括頗廣得古人贈言之義送别一段情景並到沈摯軒豁非大家未易有此送儲雍之武昌黃鶴西樓月長江萬里情春風三十度空憶武昌城送爾難為别銜杯惜未傾湖連張樂地山逐泛舟行諾為楚人重詩傳謝朓清滄浪吾有曲寄入櫂歌聲健筆凌空如列子御風而行泠然善也沈德潜曰以古風起法運作長律太白天才不拘繩墨乃爾早秋單父南樓酬竇公衡白露見日滅紅顔隨霜凋别君若俯仰春芳辭秋條泰山嵯峨夏雲在疑是白波漲東海散為飛雨川上來遙帷却卷清浮埃知君獨坐青軒下此時結念同所懷我閉南樓看道書幽簾清寂在仙居曾無好事來相訪賴爾髙文一起豫首尾辭義自相關照中間逸氣湧出海之波瀾山之嶙峋得不嘆為竒絶山中問答問余何意栖碧山笑而不答心自閒桃花流水窅然去别有天地非人間自是君身有仙骨世人那得知其故楊萬里曰此李白詩體也許顗曰賀知章呼太白為謫仙人余觀此詩信之矣答友人贈烏紗帽領得烏紗帽全勝白接䍦山人不照鏡稚子道相宜小有情致答長安崔少府叔封游終南翠微寺太宗皇帝金沙泉見寄河伯見海若傲然誇秋水小物昧逺圖寧知通方士多君紫霄意獨往蒼山裏地古寒雲深巖髙長風起初登翠微嶺復憩金沙泉踐苔朝霜滑㺯波夕月圓飲彼石下流結蘿宿溪烟鼎湖夢淥水龍駕空茫然早行子午關却登山路逺拂琴聽霜猿滅燭乃星飯人烟無明異鳥道絶往返攀崖倒青天下視白日晚既過石門隱還唱石潭歌涉雪搴紫芳濯纓想清波此人不可見此地君自過為余謝風泉其如幽意何神似謝靈運酬崔五郎中朔雲橫髙天萬里起秋色壯士心飛揚落日空歎息長嘯出原野凛然寒風生幸遭聖明時功業猶未成奈何懷良圗鬱悒獨愁坐杖䇿尋英豪立談乃知我崔公生民秀緬邈青雲姿制作恭造化託諷含神祇海嶽尚可傾吐諾終不移是時霜飈寒逸興臨華池起舞拂長劎四座皆揚眉因得窮歡情贈我以新詩又結汗漫期九垓逺相待舉身憩蓬壺濯足弄滄海從此凌倒景一去無時還朝逰明光宫暮入閶闔關但得把長袂何必嵩丘山吳昌祺曰起亦聳拔通首無軟語金門答蘇秀才君還石門日朱火始改木春草如有情山中尚含緑折芳愧遙憶永路當自朂逺見故人心平生以此足巨海納百川麟閣多才賢獻書入金闕酌醴奉瓊筵屢沗白雲唱恭聞黃竹篇恩光照拙薄雲漢希騰遷銘鼎倘云遂扁舟方渺然我留在金門君去卧丹壑未果三山期遙欣一丘樂𤣥珠寄象罔赤水非寥廓願狎東海鷗共營西山藥棲巖君寂滅處世余龍蠖良辰不同賞永日應閒居鳥吟簷間樹花落窗下書緣溪見緑篠隔岫窺紅蕖採薇行笑歌眷我情何已月出石鏡間松鳴風琴裏得心自虛妙外物空頽靡身世如兩忘從君老煙水寫閒居之況幽靜可愛入後頗窺道妙吐屬亦臻妙境答髙山人兼呈權顧二侯虹霓掩天光哲后起康濟應運生䕫龍開元掃氛翳太微廓金鏡端拱清遐裔輕塵集髙嶽虛㸃盛明意謬揮紫泥詔獻納青雲際讒惑英主心恩疏佞臣計倣徨庭闕下歎息光隂逝未作仲宣詩先流賈生涕挂帆秋江上不為雲羅制山海向東傾百川無盡勢我於鴟夷子相去千餘歲運濶英達稀同風遙執袂登艫望逺水忽見滄浪枻髙士何處來虛舟渺安繫衣貌本淳古文章多佳麗延引故鄉人風義未淪替顧侯逺語默權子識通蔽曾是無心雲俱為此留滯雙萍易飄轉獨鶴思凌厲明晨去瀟湘共謁蒼梧帝直寫胸懷一豁憤惋稍更騷人面目矣末路淒婉猶有楚調若其骨氣英特可以直追正始游南陽白水登石激作朝涉白水源暫與人俗疏島嶼佳境色江天涵清虛目送去海雲心閒逰川魚長歌盡落日乘月歸田廬赤石石壁諸作有此清境遊南陽清泠泉惜彼落日暮愛此寒泉清西輝逐流水蕩漾遊子情空歌望雲月曲盡長松聲尋魯城北范居士失道落蒼耳中見范置酒摘蒼耳作雁度秋色逺日靜無雲時客心不自得浩漫將何之忽憶范野人閒園養幽姿茫然起逸興但恐行來遲城壕失往路馬首迷荒陂不惜翠雲裘遂為蒼耳欺入門且一笑把臂君為誰酒客愛秋蔬山盤薦霜梨他筵不下筯此席忘朝飢酸棗垂北郭寒瓜蔓東籬還傾四五酌自詠猛虎詞近作十日歡逺為千載期風流自簸蕩謔浪偏相宜酣來上馬去却笑髙陽池鍾惺曰起得空逺若不著題然相關之妙在此談元春曰入門且一笑是失路真境逰泰山六首自注天寶元年四月從故鄉道上泰山四月上泰山石屏御道開六龍過萬壑澗谷隨縈回馬跡繞碧峰於今滿青苔飛流灑絶巘水急松聲哀北眺崿嶂竒傾崖向東摧洞門閉石扇地底興雲雷登髙望蓬瀛想象金銀臺天門一長嘯萬里清風來玉女四五人飄颻下九垓含笑引素手遺我流霞杯稽首再拜之自愧非仙才曠然小宇宙棄世何悠哉吳昌祺曰筆力矯健亦從景純遊仙來清曉騎白鹿直上天門山山際逢羽人方瞳好容顔捫蘿欲就語却掩青雲關遺我鳥跡書飄然落巖間其字乃上古讀之了不間感此三嘆息從師方未還琅琅數語真覺飄然欲仙風格最髙平明登日觀舉手開雲關精神四飛揚如出天地間黃河從西來窈窕入逺山憑崖攬八極目盡長空閒偶然值青童緑髮雙雲鬟笑我晚學仙蹉跎凋朱顔躊躇忽不見浩蕩難追攀白性本髙逸遇復偃蹇其胸中磊砢一於詩乎發之泰山觀日天下之竒故足以舒其曠渺而寫其塊壘不平之意是篇氣骨髙峻而無恢張之象後三篇狀景竒特而無刻削之迹蓋浩浩落落獨往獨來自然而成不假人力大家所以異人者在此若其體近遊仙則其寄興云爾清齊三千日裂素寫道經吟誦有所得衆神衛我形雲行信長風颯若羽翼生攀崖上日觀伏檻窺東溟海色動逺山天雞已先鳴銀臺出倒景白浪翻長鯨安得不死藥髙飛向蓬瀛日觀東北傾兩崖夾雙石海水落眼前天光遙空碧千峰爭攢聚萬壑絶凌歷緬彼鶴上仙去無雲中跡長松入雲漢逺望不盈尺山花異人間五月雪中白終當遇安期於此錬玉液朝飲王母池暝投天門關獨抱緑綺琴夜行青山間山明月露白夜靜松風歇仙人逰碧峰處處笙歌發寂靜娛清暉玉真連翠微想像鸞鳯舞飄颻龍虎衣捫天摘匏瓜恍惚不憶歸舉手弄清淺誤攀織女機明晨坐相失但見五雲飛宋史天文志匏瓜五星在離珠北天子果園也光明則嵗豐下終南山過斛斯山人宿置酒暮從碧山下山月隨人歸却顧所來徑蒼蒼橫翠微相擕及田家童稚開荆扉緑竹入幽徑青蘿拂行衣歡言得所憩美酒聊共揮長歌吟松風曲盡河星稀我醉君復樂陶然共忘機此篇及春日獨酌春日醉起言志等作逼真泉明遺韻鍾惺曰起似右丞曲盡星河稀寂然有景陪從祖濟南太守泛鵲山湖水入北湖去舟從南浦回遙看鵲山轉却似送人來宿鄭參卿山池爾恐碧草晚我畏朱顔移愁看楊花飛置酒正相宜歌聲送落日舞影回清池今夕不盡杯留歡更邀誰止是及時行樂之意而吐屬自饒情致游謝氏山亭淪老卧江海再歡天地清病閒久寂寞嵗物徒芬榮借君西池逰聊以散我情掃雪松下去捫蘿石道行謝公池塘上春草颯已生花枝拂人來山鳥向我鳴田家有美酒落日與之傾醉罷弄歸月遙欣稚子迎若非前段不能忘情却有春風舞雩氣象矣其澄淡處足兼韋栁把酒問月自注故人賈淳令豫問之青天有月來幾時我今停杯一問之人攀明月不可得月行却與人相隨皎如飛鏡臨丹闕緑烟滅盡清輝發但見宵從海上來寧知曉向雲間沒白兔搗藥秋復春嫦娥孤棲與誰鄰今人不見古時月今月曽經照古人古人今人若流水共看明月皆如此唯願當歌對酒時月光長照金樽裏竒思忽生曠懷如見共看明月皆如此令延之見之又當失笑金陵鳯凰臺置酒置酒延落景金陵鳯凰臺長波寫萬古心與雲俱開借問往昔時鳯凰為誰來鳯凰去已久正當今日回明君越羲軒天老坐三台豪士無所用彈絃醉金罍東風吹山花安可不盡杯六帝沒幽草深宫冥緑苔置酒勿復道歌鐘但相催意在語言之外其暢適處正是牢騷處耳眼前景意中事若隱若顯風人妙指陪侍郎叔遊洞庭醉後船上齊橈樂湖心泛月歸白鷗閒不去爭拂酒筵飛剗却君山好平鋪湘水流巴陵無限酒醉殺洞庭秋吳昌祺曰起是竒語如子美斫却月中桂也蕭士贇曰木華海賦鏟臨崖之阜陸夾陂潢而相浚首兩句意出於此鏟與剗義通杜亦曰意欲鏟叠嶂今韻引此詩於剗字之下夜泛洞庭尋裴侍御清酌日晚湘水緑孤舟無端倪明湖漲秋月獨泛巴陵西過憩裴逸人巖居陵丹梯抱琴出深竹為我彈鵾雞曲盡酒亦傾北窗醉如泥人生且行樂何必組與圭譬之於雲有無心出岫之意明湖漲秋月與月湧大江流同一寫景之妙張齊賢曰鵾雞曲名古琵琶絃用鵾雞筋陪族叔刑部侍郎曄及中書賈舍人至遊洞庭洞庭西望楚江分水盡南天不見雲日落長沙秋色逺不知何處弔湘君即目傷懷含情無限二十八字不減九辨之哀矣解者求之於形迹之間何以會其神韻哉敖英曰綴景宏濶有吞吐湖山之氣落句感慨之情深矣蔣仲舒曰與白雲明月弔湘娥恭看鍾惺曰末句正形容秋色逺耳勿誤認用湘君事南湖秋水夜無煙耐可乘流直上天且就洞庭賖月色將船買酒白雲邉鍾惺曰寫洞庭寥廓幻杳俱在言外洞庭湖西秋月輝瀟湘江北早鴻飛醉客滿船歌白苧不知霜露入秋衣唐汝詢曰秋月未沈晨雁已起舟中之客霜露入衣而不知豈真樂而忘返耶意必有不堪者在也帝子瀟湘去不還空餘秋草洞庭間淡掃明湖開玉鏡丹青畫出是君山登單父陶少府半月臺陶公有逸興不與常人俱築臺像半月回向髙城隅置酒望白雲商飈起寒梧秋山入逺海桑柘羅平蕪水色淥且明令人思鏡湖終當過江去愛此暫踟蹰襟懷髙曠人如其詩天台曉望天台鄰四明華頂髙百越門標赤城霞棲棲滄島月憑髙登逺覽直下見溟渤雲垂大鵬翻波動巨鼇沒風潮爭洶湧神怪何翕忽觀竒跡無倪好道心不歇攀條摘朱實服藥錬金骨安得生羽毛千春卧蓬闕焦山望寥山石壁望松寥宛然在碧霄安得五彩虹駕天作長橋仙人如愛我舉手來相招杜陵絶句髙登杜陵上北望五陵間秋水明落日流光滅逺山登太白峰西上太白峰夕陽窮登攀太白與我語為我開天關願乘泠風去直出浮雲間舉手可近月前行若無山一别武功去何時復見還亦率胸臆而出形容峰勢之髙竒語獨造秋日登揚州西靈塔寶塔凌蒼蒼登攀覽四荒頂髙元氣合標出海雲長萬象分空界三天接畫梁水搖金剎影日動火珠光鳥拂瓊簾度霞連繡栱張目隨征路斷心逐去帆揚露浴梧楸白霜催橘柚黃玉毫如可見於此照迷方聲色壯麗一經㸃入情景便覺通體皆靈此亦詩中之金針也吳昌祺曰凌字讀如凌隂字音此詩有似初唐非太白本色登瓦官閣晨登瓦官閣極眺金陵城鍾山對北户淮水入南榮漫漫雨花落嘈嘈天樂鳴兩廊振法鼓四角吟風筝杳出霄漢上仰攀日月行山空霸氣滅地古寒隂生寥廓雲海晚蒼茫宫觀平門餘閶闔字樓識鳯凰名雷作百山動神扶萬栱傾靈光何足貴長此鎮吳京山空地古一聨撐拄有力小謝和伏武昌詩無此傑句登梅岡望金陵贈族姪髙座寺僧中孚鍾山抱金陵霸氣昔騰發天開帝王居海色照空闕羣峰如逐鹿奔走相馳突江水九道來雲端遙明沒時遷大運去龍虎勢休歇我來屬天清登覽窮楚越吾宗挺禪伯特秀鸞鳯骨衆星羅青天明者獨有月冥居順生理草木不剪伐烟窗引薔薇石壁老野蕨吳風謝安屐白足傲履襪幾宿一下山蕭然忘干謁談經演金偈降鶴舞海雪時聞天香來了與世事絶佳遊不可得春風惜逺别賦詩留巖屏千載庶不滅登金陵鳯凰臺鳯凰臺上鳯凰遊鳯去臺空江自流吳宫花草埋幽徑晉代衣冠成古丘三山半落青天外二水中分白鷺洲總為浮雲能蔽日長安不見使人愁崔皓題詩黃鶴樓李白見之去不復作至金陵登鳯凰臺乃題此詩傳者以為擬崔而作理或有之崔詩直舉胸情氣體髙渾白詩寓目山河别有懷抱其言皆從心而發即景而成意象偶同勝境各擅論者不舉其髙情逺意而沾沾吹索於字句之間固已蔽矣至謂白實擬之以較勝負并謬為捶碎鶴樓等詩鄙陋之談不值一噱也蕭士贇曰此因懷古而動懷君之思抑亦自傷讒廢望帝鄉而不見乃觸景而生愁亦可哀也劉辰翁曰其開口雄偉脫落雕飾俱不論若無後兩句亦不必作出於崔皓而特勝之以此胡應麟曰崔作及此詩但略㸃題面未嘗題黃鶴鳯凰也神韻悠然絶去斧鑿宋元雖好用事亦間有一二未若近世之拘陸賈新語曰邪臣蔽賢猶浮雲之蔽日月也望廬山瀑布水二首西登香爐峰南見瀑布水挂流三百丈噴壑數十里歘如飛電來隱若白虹起初驚河漢落半灑雲天裏仰觀勢轉雄壯哉造化功海風吹不斷江月照還空空中亂潨射左右洗青壁飛珠散輕霞流沫沸穹石而我樂名山對之心益閒無論漱瓊液還得洗塵顔且諧宿所好永願辭人間五六以淺得工至海風吹不斷江月照還空可吟賞不置矣胡仔曰海風二句磊落清壯語簡而意盡日照香爐生紫烟遙看瀑布挂前川飛流直下三千尺疑是銀河落九天蘇軾曰僕初入廬山有以陳令舉廬山記見示者且行且讀見其中有徐凝和李白詩不覺失笑開元寺主求詩為作一絶云帝遣銀河一派垂古來惟有謫仙詞飛流濺沫知多少不為徐凝洗惡詩登廬山五老峰廬山東南五老峰青天削出金芙蓉九江秀色可攬結吾將此地巢雲松純用古調次句亦秀削天成江上望𤾂公山竒峰出竒雲秀木含秀氣清宴𤾂公山巉絶稱人意獨遊滄江上終日淡無味但愛兹嶺髙何由討靈異默然遙相許欲往心莫遂待吾還丹成投迹歸此地鸚鵡洲鸚鵡來過吳江水江上洲傳鸚鵡名鸚鵡西飛隴山去芳洲之樹何青青烟開蘭葉香風暖岸夾桃花錦浪生遷客此時徒極目長洲孤月向誰明偶書數語覺其對此茫茫百端交集矣劉辰翁曰猶是鳯臺餘韻情景覺稱此以正平弔正平者秋登巴陵望洞庭清晨登巴陵周覽無不極明湖映天光徹底見秋色秋色何蒼然際海俱澄鮮山青滅逺樹水緑無寒烟來帆出江中去鳥向日邊風清長沙浦山空雲夢田瞻光惜頽髮閲水悲徂年北渚既蕩漾東流自潺湲郢人唱白雪越女歌採蓮聽此更腸斷憑崖淚如泉寫望中景物與題相稱次聨即空水共澄鮮之意以下四聨極濶極切細意尉貼登覽中佳製也與夏十二登嶽陽樓樓觀嶽陽盡川逈洞庭開雁引愁心去山銜好月來雲間連下榻天上接行杯醉後涼風起吹人舞袖回登巴陵開元寺西閣贈衡嶽僧方外衡嶽有闡士五峰秀真骨見君萬里心海水照秋月大臣南溟去問道皆請謁灑以甘露言清涼潤肌髮明湖落天鏡香閣凌銀闕登眺餐惠風新花期啓發語言清妙如霏玉屑傳燈録慧可大師宴坐香山一日頭痛空中曰此乃換骨非常痛也師視其頂骨如五峰秀出矣與賈舍人至於龍興寺翦落梧桐枝望㴩湖剪落青梧枝㴩湖坐可窺雨洗秋山淨林光淡碧滋水閒明鏡轉雲繞畫屏移千古風流事名賢共此時秋登宣城謝朓北樓江城如畫裏山曉望晴空兩水夾明鏡雙橋落彩虹人煙寒橘柚秋色老梧桐誰念北樓上臨風懷謝公風神散朗五六寫出秋意鬱然蒼秀吳昌祺曰此種自堪把臂元暉沈德潛曰中間實寫處正是如畫望天門山天門中斷楚江開碧水東流至北回兩岸青山相對出孤帆一片日邊來對結另是一體詞調髙華言盡意不盡不得以半律議之胡應麟曰此及朝辭白帝等作俱極自然洵屬神品足以擅場一代過崔八丈水亭髙閣橫秀氣清幽併在君簷飛宛溪水窗落敬亭雲猿嘯風中斷漁歌月裏聞閒隨白鷗去沙上自為羣之廣陵宿常二南郭幽居緑水接柴門有如桃花源忘憂或假草滿院羅叢萱冥色湖上來微雨飛南軒故人宿茅宇夕鳥棲楊園還惜詩酒别深為江海言明朝廣陵道獨憶此傾樽中間氣味與王孟相近客中行蘭陵美酒鬱金香玉碗盛來琥珀光但使主人能醉客不知何處是他鄉太原早秋歲落衆芳歇時當大火流霜威出塞早雲色渡河秋夢繞邊城月心飛故國樓思歸若汾水無日不悠悠健舉之至行氣如虹唐汝詢曰唐人汾上作必用秋風辭太白曰雲色渡河秋便無溪徑奔亡道中渺渺望湖水青青蘆葉齊歸心落何處日沒大江西歇馬傍春草欲行逺道迷誰忍子歸鳥連聲向我啼荆門浮舟望蜀江春水月峽來浮舟望安極正是桃花流依然錦江色江色緑且明茫茫與天平逶迤巴山盡搖曳楚雲行雪照聚沙雁花飛出谷鶯芳洲却已轉碧樹森森迎流目浦烟夕揚帆海月生江陵識遙火應到渚宫城上三峽巫山夾青天巴水流若兹巴水忽可盡青天無到時三朝上黃牛三暮行太遲三朝又三暮不覺鬢成絲質處似古謡惟其所之皆可以相肖也爽直之氣自是本色田雯曰青蓮善用古樂府昔人曽言之如烏啼白門栁三朝見黃牛又春風復無情吹我夢魂散皆自古樂府來如李光弼將郭子儀軍旌旗改色又如禪僧拈佛祖語信口無非妙諦自巴東舟行經瞿唐峽登巫山最髙峰晚還題壁江行幾千里海月十五圓始經瞿唐峽遂步巫山巔巫山髙不窮巴國盡所歷日邉攀垂蘿霞外倚穹石飛步凌絶頂極目無纎烟却顧失丹壑仰觀臨青天青天若可捫銀漢去安在望雲知蒼梧記水辨瀛海周遊孤光晚歷覽幽意多積雪照空谷悲風鳴森柯歸途行欲曛佳趣尚未歇江寒早啼猿松暝已吐月月色何悠悠清猿響啾啾辭山不忍聽揮䇿還孤舟於敘次中見寄託詞意沉鬱蓋白當憂患之餘雖豪邁不減而懷抱可知故言多楚聲吟皆商調中間遙情忽往不勝魏闕之戀猿啼月上於邑誰語其所感深矣其詞斂而不肆讀者以意逆之可也早發白帝城朝辭白帝彩雲間千里江陵一日還兩岸猿聲啼不住輕舟已過萬重山順風揚帆瞬息千里但道得眼前景色便疑筆墨間亦有神助三四設色托起殊覺自在中流胡應麟曰古大家有齊名合德者當虛心易氣各舉所長偏重一隅便非論篤况以甲所獨工形乙所不經意何異寸木岑樓鈎金輿羽哉正如朝辭白帝乃太白絶中之絶出者而楊用修舉杜歌行中常語以當之然則秋興八首求之李集可盡得乎李杜二家其才本無優劣但工部體裁明密有法可尋青蓮興㑹標舉非學可至沈德潜曰入猿聲一句文勢不傷於直畫家布景設色每於此處用意秋下荊門霜落荆門江樹空布帆無恙挂秋風此行不為鱸魚鱠自愛名山入剡中輕秀運古入化絶妙好辭江行寄逺刳木出吳楚危槎百餘尺疾風吹片帆日暮千里隔别時酒猶在已為異鄉客思君不可得愁見江水碧字字真至情至而文亦至御選唐宋詩醇卷七
