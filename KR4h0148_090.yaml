  text: 欽定四庫全書御選唐宋詩醇巻四十四
  hash: sha256:fd187dff09102dea23d451868977f96ece96de9403a5f9eadc0a8cf742015edc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_090-1a, image: WYG1448/WYG1448-0864a.png}
body:
  text: 山隂陸游詩三目録西巖翠屏閣雨中山行至松風亭忽澄霽贈宋道人獵罷夜飲示獨孤生秋晚登城北門莫秋數日暄妍頗有春意予閒居無日不出遊戱作江樓醉中作曵䇿謁漢昭烈惠陵及諸葛公祠宇大雪歌訪客至西郊夜寒故蜀别苑在成都西南十五六里梅至多有兩大樹夭矯若龍相傳謂之梅龍予初至蜀嘗為作詩自此嵗常訪之今復賦一首丁酉十一月也閒意書雨莫冬夜宴謁石犀廟江上散步尋梅偶得絶句大醉梅花下走筆賦此廣都江上作道室夜意城南王氏莊尋梅遊諸葛武侯書臺眉州披風榭拜東坡先生遺像南定樓遇急雨舟中對月涪州道中北巖忠州禹廟龍興寺吊少陵先生寓居遊萬州岑公洞萬州放船過下巖小留楚城舟出下牢闗峽口夜坐初到荆州阻風小雨極涼舟中熟睡至夕岳陽樓黄鶴樓自雪堂登四望亭因厯訪蘇公遺跡至安國院舟行蘄黄間雨霽得便風有感長風沙登賞心亭將至京口泝谿冬夜聞雁有感月夕自雲門之陶山肩輿者失道行亂山中有茅舍小塘極幽邃求見主人不可意其隠者也園中雜書池亭夜賦雙清堂夜賦橋南納涼初秋夢故山覺而有作别建安紫谿驛月巖聞雁春雨南忩睡起感舊絶句夏日晝寢夢遊一院闃然無人簾影滿堂惟燕蹋筝弦有聲覺而聞鐵鐸風響璆然殆所夢也邪因得絶句書懷絶句雨後極涼料簡篋中舊書有感秋夜雨夜豐城髙安之間憇民家景趣幽䆳為之慨然懷歸寄奉新髙令予欲自嚴買船下七里灘謁嚴光祠而㑹歸灘淺陸行至桐廬始能泛江因得絶句辛丑正月三日雪雪霽歸湖上過千秋觀少留題山家壁憶昔秋夜九月三日泛舟湖中作新寒湖村月夕横塘蔬圃五雲門晩歸夜汲井水煮茶寄朱元晦提舉乍晴風日已和泛舟至扶桑埭徘徊西村乆之携癭尊醉梅花下城西接待院後竹下作幽居春夜晨起春遊八月十四日夜湖山觀月夜聞秋風感懷草書歌夜泊水村自妙相歸將至杜浦堰舟中作
