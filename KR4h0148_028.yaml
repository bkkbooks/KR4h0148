front:
  text: 欽定四庫全書御選唐宋詩醇巻十三
  hash: sha256:da97fc9fc6bdfd7840a549d663ec5759ba836bc5fc1ef73348faf1765b30528f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_028-1a, image: WYG1448/WYG1448-0292a.png}
body:
  text: 襄陽杜甫詩五目録冬日洛城北謁𤣥元皇帝廟投贈哥舒開府翰二十韻上韋左相二十韻奉贈太常張卿二十韻奉贈鮮于京兆二十韻贈特進汝陽王二十韻鄭駙馬宅宴洞中重題鄭氏東亭題張氏隠居天寶初南曹小司冦舅於我太夫人堂下累土為山一匱盈尺以代彼朽木承諸焚香瓷甌甌甚安矣旁植慈竹葢兹數峰􅋂岑嬋娟宛有塵外致乃不知興之所至而作是詩龍門奉寄河南韋尹大人與任城許主簿逰南池登兖州城樓對酒書懷走邀許十一簿公已上人茅齋房兵曹胡馬詩畫鷹過宋員外之問舊莊夜宴左氏莊送蔡希曽都尉還隴右因寄髙三十五書記春日憶李白贈陳二補闕寄髙三十五書記送裴二虬作尉永嘉贈田九判官贈獻納起居田舍人陪鄭廣文逰何將軍山林十首重過何氏五首冬日有懷李白贈翰林張四學士送張二十參軍赴蜀州因呈楊五侍御陪諸貴公子丈八溝携妓納凉晩際遇雨二首贈髙式顔故武衛將軍輓歌三首官定後戯贈九日藍田崔氏莊崔氏東山草堂對雪月夜遣興春望憶幼子喜達行在所三首得家書奉贈嚴八閣老奉送郭中丞兼太僕卿充隴右節度使三十韻送楊六判官使西畨月晩行口號行次昭陵重經昭陵喜聞官軍已臨賊冦二十韻収京
  hash: sha256:a4fe3d741270476187fd025cf76dd7a46375e057d500cad9bbcb3914450827a5
