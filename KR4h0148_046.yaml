  text: 太原白居易詩四目録江南遇天寶樂叟醉後走筆酬劉五主簿長句之贈兼簡張大賈二十四先輩昆季畫竹歌長恨歌琵琶引醉後狂言酬贈蕭殷二協律秋江晚泊代書詩一百韻寄微之和談校書秋夜感懷呈朝中親友感秋寄逺春題華陽觀縣西郊秋寄贈馬造早春獨遊曲江江南送北客因慿寄徐州兄弟書
