body:
  text: 眉山蘇軾詩七泗州南山監倉蕭淵東軒二首偶隨樵父採都梁自注南山名都梁山出都梁香故也竹屋松扉試乞漿但見東軒堪隱几不知公子是監倉溪中亂石墻垣古山下寒蔬七箸香我是江南舊遊客挂冠知有老蕭郎北望飛塵苦晝霾洗心聊復寄東齋珍禽聲好猶思越野橘香清未過淮有信微泉來逺嶺無心明月轉空階一官倉庾真堪老坐看松根落斷崖有幽邃之趣蕭條髙寄盡得風流前首結句用老蕭郎亦本香山能文好飲老蕭郎之句容齋引老元為例而不引此疏矣容齋三筆曰東坡賦詩用人姓名多以老字足成句蕭淵東軒云挂冠知有老蕭郎夀州龍潭云觀魚并記老莊周病不赴會云空對親舂老孟光看潮云猶似浮江老阿童贈黃山人云説禪長笑老浮屠元長老衲裙云乞與佯狂老萬回侍立邇英云定是香山老居士贈李道士云知是香山老居士蒜山亭云竒逸多聞老敬通汶公東堂云一帖空存老遂良次韻韶守云華髮蕭蕭老遂良遊羅浮云還須略報老同叔贈辨才云中有老法師寄子由云青山老從事贈眼醫云忘言老尊宿謝惠酒云青州老從事謝餉魚云誰似老方朔贈吳子野扇云得之老月師次韻李端叔云此是老牛戬是皆以為助語非真謂其老也大抵七言則於第五字用之五言則於第三字用之若其他錯出如再説走老瞞故人餘老龎老濞宫粧傳父祖便腹從人笑老韶老可能為竹寫真不知老奘幾時歸之類皆隨語勢而然白樂天云每被老元偷格律蓋亦有自來矣寄蘄簟與蒲傳正蘭溪美箭不成笛離離玉筯排霜脊千溝萬縷自生風入手未開先慘栗公家列屋間蛾眉珠簾不動花隂移霧帳銀牀初破睡牙籤玉局坐彈棊東坡病叟長羇旅凍卧飢吟似飢鼠倚賴春風洗破衾一夜雪寒披故絮火冷燈青誰復知孤舟兒女自嚘咿皇天何時反炎燠愧此八尺黃琉璃願君靜掃清香閣卧聽風漪聲滿榻習習還從兩腋生請公乘此朝閶闔蒲性奢靡故因寄簟而特作飢寒之語以諷之古人之誼也昔鄭羣當暑濕之時贈簟與昌黎而韓詩有倒身甘寢百疾愈却願天日恆炎曦之句妙想獨造此則當春寒之候寄簟與傳正乃云皇天何時反炎燠愧此八尺黃琉璃命筆略同然一則美其適用一則愧其無用雖脫胎仍是翻案也施元之曰蒲傳正名宗孟嘗以書寄東坡云晚年學道有所得坡答之曰聞所得甚髙然有二事特勸一曰慈二曰儉此詩云霧帳銀牀牙籖玉局亦可見其奉養矣贈眼醫王生彥若針頭如麥芒氣出如車軸間關絡脈中性命寄毛粟而况清淨眼內景含天燭琉璃貯沆瀣輕脆不任觸而子於其間來往施鋒鏃笑談紛自若觀者頸為縮運針如運斤去翳如拆屋常疑子善幻他技雜符祝子言吾有道此理君未矚形骸一塵垢貴賤兩草木世人方重外妄見瓦與玉而我初不知刺眼如刺肉君看目與翳是翳要非目目翳茍二物易分如麥菽寧聞老農夫去草更傷榖鼻端有餘地肝膽分楚蜀吾於五輪間蕩蕩見空曲如行九軌道並驅無擊轂空花誰開落明月自朏朒請問樂全堂忘言老尊宿自注彥若樂全先生門下醫也一意翻騰發難送解險語竒詞絡繹奔會令人可怖可喜忘其為有韻之文李之儀所謂極天地之變化者此種是也觀杭州鈐轄歐育刀劍戰袍青綾衲衫暖襯甲紅線勒帛光繞脅秃襟小袖雕鶻盤大刀長劍龍蛇柙兩軍鼓譟屋瓦墜紅塵白羽紛相雜將軍恩重此身輕笑履鋒鋩如一插書生只肯坐帷幄談笑毫端弄生殺呌呼擊鼓催上竿猛士應憐小兒黠試問黃河夜偷渡掠面驚沙寒霎霎何如大艦日髙眠一枕清風過苕霅將軍輕履鋒鋩而書生帷幄談笑似為文史牽掣深其扼腕者黃河驚沙掠面不如苕霅一枕清風豈誠間寂為髙乃其歎息痛恨之至也筆力崷崒殆如刃發於硎王伯揚所藏趙昌花四首梅花南行渡關山沙水清練練行人已愁絶日暮集微霰殷勤小梅花髣佛吳姬面暗香隨我去回首驚千片至今開畫圖老眼淒欲泫幽懷不可寫歸夢君家倩黃蔡弱質困夏永竒姿蘇曉涼低昻黃金杯照曜初日光檀心自成暈翠葉森有芒古來寫生人妙絶誰似昌晨粧與午醉真態含隂陽君看此花枝中有風露香芙蓉清飇已拂林積水漸收潦溪邉野芙蓉花水相媚好坐看池蓮盡獨伴霜菊稿幽姿強一笑莫景迫摧倒淒涼似貧女嫁晚驚衰早誰寫少年容樵人劍南老於衰落處寫其丰韻貧女之喻凄然感懷山荼蕭蕭南山松黃葉隕徑風誰憐兒女花散火氷雪中能傳嵗寒姿古來惟丘翁趙叟得其妙一洗膠粉空掌中調丹砂染此鶴頂紅何須誇落墨獨賞江南工書林逋詩後吳儂生長湖山曲呼吸湖光飲山緑不論世外隱君子傭奴販婦皆氷玉先生可是絶俗人神清骨冷無由俗我不識君曽夢見瞳子瞭然光可燭遺篇妙字處處有步繞西湖看不足詩如東野不言寒書似西臺差少肉平生髙節已難繼將死微言猶可録自言不作封禪書更肯悲吟白頭曲我笑吳人不好事好作祠堂傍修竹不然配食水仙王一盞寒泉薦秋菊將以稱美林逋乃至謂吳儂之傭販皆如氷玉深一層説入而林之神清骨冷其為髙節難繼處不待羅縷矣軾論文章嘗有郊寒島瘦之目其讀孟郊詩有云何苦將兩耳聽此寒蟲號又嘗論西臺御史李建中之書以為雖可愛終可鄙雖可鄙終不可棄若此篇所言則謂其詩如東野而不能至於寒書似西臺而又不嫌於肉是兼有孟李之所長盡去孟李之所短也後人多於西臺句誤會其意此未深考耳歸田録曰處士林逋居於杭州西湖之孤山逋工書畫善為詩如草泥行郭索雲木呌鈎輈頗為士大夫所稱又梅花詩云踈影橫斜水清淺暗香浮動月黃昏評詩者謂前世詠梅者多矣未有此句也又其臨終為句云茂陵他日求遺草猶喜初無封禪書尤為人稱誦自逋之後湖山寂寞未有繼者香祖筆記曰郎瑛七修類纂舉東坡跋林和靖詩詩如東野不言寒書似西臺差少肉以西臺為南唐李建中謬甚南唐太弟太傅李建勳非建中也建中宋初人為西京御史故稱西臺其書與楊風子先後齊名蘇黃常稱之郎未知耶溪隂堂白水滿時雙鷺下緑槐髙處一蟬吟酒醒門外三竿日卧看溪南十畝隂髙齋詩話曰子美詩曰兩箇黃鸝鳴翠栁一行白鷺上青天窗含西嶺千秋雪門泊東吳萬里船東坡題真州范氏溪堂詩蓋用老杜詩意也送穆越州江海相忘十五年羡公松柏蔚蒼顔四朝耆舊氷霜後兩郡風流水石間舊政猶傳蜀父老先聲已振越溪山樽前俱是蓬萊守莫放髙樓雪月間趙次公曰蓬萊守蓋穆既守越而先生將守登越謂之蓬萊者元微之守越以州宅誇白樂天詩云我是玉皇香案吏謫居猶得在蓬萊今越州有蓬萊閣及以酒名也登州有萊山倚郭乃蓬萊縣故越登皆可稱蓬萊守金山妙髙臺我欲乘飛車東訪赤松子蓬萊不可到弱水三萬里不如金山去清風半帆耳中有妙髙臺雲峯自孤起仰觀初無路誰信平如砥臺中老比丘碧眼照窗几巉巉玉為骨凛凛霜入齒機鋒不可觸千偈如翻水何須尋德雲即此比丘是長生未暇學請學長不死若先談妙髙之勝而别稱赤松蓬萊以作波瀾便是人人意中所有妙在於未入題之前作破空而來之勢逺望嵾嵾若攢圖之托霄上贈杜介并引元豐八年七月二十五日杜幾先自浙東還與余相遇於金山話天台之異以詩贈之我夢遊天台橫空石橋小秋風吹菵露翠濕香嫋嫋應真飛錫過絶澗度雲鳥舉意欲從之翛然已松杪微言粲珠玉未説意先了覺來如墮空耿耿窗戶曉羣生陷迷網獨達從古少杜叟子何人長嘯萬物表妻孥空四壁振策念輕矯遂為赤城遊飛步凌縹眇問禪不歸舍屢為瓠壺繞何人識此志佛眼自照瞭我夢君見之卓爾非魔嬈仙葩發茗碗翦刻分葵蓼從今更不出閉户間騕裊時從佛頂巖馳下雙蓮沼不述杜介之話而自述夢遊使實境從空中出筆端玲瓏縹眇不落塵凡趙次公曰仙葩發茗碗翦刻分葵蓼此言其所點茶之詳也先生十八羅漢頌後跋云軾家藏十六羅漢像每設茶供則化為白乳或凝為花木桃李芍藥僅可指名送楊傑并引無為子嘗奉使登太山絶頂雞一鳴見日出又嘗以事過華山重九日飲酒蓮花峰上今乃奉詔與髙麗僧統遊錢塘皆以王事而從方外之樂善哉未曽有也作是詩以送之天門夜上賓出日萬里紅波半天赤歸來平地看跳丸一點黃金鑄秋橘太華峰頭作重九天風吹灧黃花酒浩歌馳下腰帶鞓醉舞崩崖一揮手神遊八極萬緣虛下視蚊雷隱汙渠大千一息八十返笑厲東海騎鯨魚三韓王子西求法鑿齒彌天兩勍敵過江風急浪如山寄語舟人好看客直敘三事奔蕩之音鬱為壯偉昔李白登華山落雁峰曰恨不携謝朓驚人詩來搔首問青天此詩竒勝亦真足與泰華爭巍峩矣趙夔曰元祐二年髙麗僧義天航海間道至明州傳云義天棄王位出家上疏乞遍厯叢林問法受道有詔朝奉郎楊傑次公館伴所至吳中諸剎皆迎餞如王臣禮次韻送徐大正自注嘗與余約卜鄰於江淮間將赴登州同舟至山陽以詩見送留别别時酒盞照燈花知我歸期漸有涯去嵗渡江萍似斗今年並海棗如瓜多情明月邀君共無價青山為我賒千首新詩一竿竹不應空釣漢江槎因有卜鄰之約故曰無價青山為我賒因與同舟故曰多情明月邀君共運實於虛鈎綿秀絶楊康功有石狀如醉道士為賦此詩楚山固多猿青者黠而夀化為狂道士山谷恣騰蹂誤入華陽洞竊飲茅君酒君命囚巖間巖石為械杻松根絡其足藤蔓縛其肘蒼苔睬其目叢棘哽其口三年化為石堅瘦敵瓊玖無復號雲聲空餘舞杯手樵夫見之笑抱賣易升斗楊公海中仙世俗那得友海邊逢姑射一笑微俯首胡不載之歸用此頑且醜求詩紀其異本末得細剖吾言豈妄云得之亡是叟猿化石石化道士都是課虛責有此特偶爾以文為戲非武昌銅劍歌等可比也故結出吾言豈妄云得之亡是叟見所謂妄者乃不妄不妄者乃妄耳吕氏童蒙訓曰此詩窮極思致出新意於法表前賢所未到然學者專力於此則亦失古人作詩之意韓駒曰東坡作文如天花變現初無根葉不可揣測如作醉石道士詩共二十八句却二十六句作假説惟用兩句收拾及作鶴嘆則又替鶴分明海市并引豫聞登州海市舊矣父老云常出於春夏今嵗晚不復見矣豫到官五日而去以不見為恨禱於海神廣德王之廟明日見焉乃作此詩東方雲海空復空羣仙出沒空明中蕩搖浮世生萬象豈有貝闕藏珠宫心知所見皆幻影敢以耳目煩神工嵗寒水冷天地閉為我起蟄鞭魚龍重樓翠阜出霜曉異事驚倒百嵗翁人間所得容力取世外無物誰為雄率然有請不我拒信我人厄非天窮潮陽太守南遷歸喜見石廪堆祝融自言正直動山鬼豈知造物哀龍鍾信眉一笑豈易得神之報汝亦已豐斜陽萬里孤鳥沒但見碧海磨青銅新詩綺語亦安用相與變滅隨東風海市只是重樓翠阜此固不盡形容亦正不能形容也從未見之前既見之後與嵗晚得見之異結撰至思煒煒精光欲奪人目文昌雜録曰余見光祿卿解賔王説登州每晴霽煙霧中有城闕樓閣人物車馬雞犬往來之狀彼人謂之海市過萊州雪後望三山東海如碧環西北卷登萊雲光與天色直到三山回我行適冬仲薄雪收浮埃黃昏風絮定半夜扶桑開參差太華頂出沒雲濤堆安期與羡門乘龍安在哉茂陵秋風客勸爾麾一杯帝鄉不可期楚些招歸來次韻胡完夫青衫别淚尚斕斑十載江湖困抱關老去上書還北闕朝來拄笏看西山相從杯酒形骸外笑説平生醉夢間萬事會須咨伯始白頭容我占清間送范純粹守慶州才大古難用論髙常近迂君看趙魏老乃為滕大夫浮雲無根蒂黃潦能須臾知經幾成敗得見真賢愚羽旄照城闕談笑安隔隅當年老使君赤手降於菟諸郎更何事折箠鞭其雛吾知鄧平叔不鬭月支胡舊德之思良友之誼勤勤懇懇意餘於詞施元之曰范純粹字德孺文正公之季子哲宗即位以直龍圖閣京東轉運副使代其兄忠宣公守慶請棄所侵西夏地曰爭地未棄則邊隙無時可除於是還四寨而夏人服此詩言文正公在仁宗時李元昊叛命訖以計降之德孺守慶州竟如先生所期云惠崇春江晚景二首録一首竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時苕溪漁隱叢話曰東坡題惠崇畫詩此正是二月景致是時河豚已盛矣欲上之語似乎未穩圖畫見聞志曰建陽僧惠崇尤工小景為寒汀逺渚蕭灑虛曠之象人所難到清波雜志曰崇非但能詩畫亦有名世謂惠崇小景者是也次韻完夫再贈之什某已卜居毗陵與完夫有廬里之約云栁絮飛時笋籜斑風流二老對開關雪芽為我求陽羡乳水君應餉惠山竹簟水風眠晝永玉堂制草落人間應容緩急煩閭里桑柘聊同十畝間軾始因免汝州居住而居宜興其後海外北還無以為歸復暫至常州才兩月而已是詩應作於元豐乙丑春放歸陽羡之時故以栁絮飛時發興其住常州亦止兩月餘閭里之約蓋終不遂其樂也次韻朱光庭初夏朝罷人人識鄭崇直聲如在履聲中卧聞疏響梧桐雨獨詠微涼殿閣風諫苑君方續承業醉鄉我欲訪無功陶然一枕誰呼覺牛蟻初除病後聰唐人傳誦之語一經裁剪對仗輒覺别調氛氲藝苑雌黃曰陳輔之以新唐書改栁公權殿閣生微涼為殿桷生餘涼此兩字有功於修詞豫謂輔之此語無甚意義今世所傳多只用公權舊語故東坡詩云獨詠微涼殿閣風不聞有殿桷餘涼之説困學紀聞曰諌苑君方續承業隋樂運字承業録夏殷以來諌爭事名諌苑文帝覽而嘉焉注謂南史李承業作諌苑誤矣送賈訥倅眉二首録一首老翁山下玉淵回手植青松三萬栽父老得書知我在蓬蒿親手為君開試看一一龍蛇舞更聽蕭蕭風雨哀便與甘棠同不翦蒼髯白甲待歸來自注先君葬於蟇頥山之東二十餘里地名老翁泉君許為一往感嘆之深故及之為情造文通篇獨就青松回環往復語淺而思深題文與可墨竹并引故人文與可為道師王執中作墨竹且謂執中勿使他人書字待蘇子瞻來令作詩其側與可既沒八年而軾始還朝見之乃賦一詩斯人定何人遊戲得自在詩鳴草聖餘兼入竹三昧時時出木石荒怪軼象外舉世知珍之賞會獨余最知音古難合奄忽不少待誰云生死隔相見如龔隗集中有書文與可墨竹絶句序曰與可有四絶詩一楚辭二草書三畫四與可嘗云世無知我者惟子瞻一見識吾妙處而詩有空遺運斤質却弔斷絃人之句蓋作於為王執中題畫之前一年其作墨君堂記謂與可能以墨象君之形容作堂以居君而屬余為文以頌君德又稱其畫竹之工以為與可獨能得君之深而知君之所以賢雍容談笑揮灑奮迅而盡君之德稚壯枯老之容披折偃仰之勢風雪凌厲以觀其操崖石犖確以致其節得志遂茂而不驕不得志瘁瘠而不辱羣居不倚獨立不懼與可之於君可謂得其情而盡其性矣由此文觀之軾自謂賞會獨余最者良非虛語而文同必待軾來令作詩其側亦見知已惟此一人豈特筆墨相推重已哉武昌西山并引嘉祐中翰林學士承旨鄧公聖求為武昌令常遊寒溪西山山中人至今能言之軾謫居黃岡與武昌相望亦常往來溪山間元祐元年十一月二十九日考試館職與聖求會宿玉堂偶話舊事聖求嘗作元次山窪樽銘刻之巖石因為此詩請聖求同賦當以遺邑人使刻之銘側春江渌漲蒲萄醅武昌官栁知誰栽憶從樊口載春酒步上西山尋野梅西山一上十五里風駕兩腋飛崔嵬同遊困卧九曲嶺褰衣獨到吳王臺中原北望在何許但見落日低黃埃歸來解劍亭前路蒼崖半入雲濤堆浪翁醉處今尚在石臼杯飲無樽罍爾來古意誰復嗣公有妙語留山隈至今好事除草棘常恐野火燒蒼苔當時相望不可見玉堂正對金鑾開豈知白首同夜直卧看椽燭髙花摧江邉曉夢忽驚斷銅鐶玉鎖鳴春雷山人帳空猿鶴怨江湖水生鴻鴈來請公作詩遺父老往和萬壑松風哀述舊遊則中原迷於落日敘會宿則曉夢驚於江邊連互鈎貫情文相生健筆圓機開出劍南一派趙令晏崔白大圖幅徑三丈扶桑大繭如甕盎天女織綃雲漢上往來不遣鳳銜梭誰能鼓臂投三丈人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪橫江梅畫堂粉壁翻雲幕十里江天無處著好卧元龍百尺樓笑看江水拍天流有蔚然之光有蒼然之色有鏗然之韻不徒為是大言炎炎藝苑雌黃曰吟詩喜作豪句須不畔於理方善如東坡觀崔白驟雨圖扶桑大繭如甕盎四句此語豪而甚工石敏若咏雪詩有燕南雪花大於掌氷柱懸簷一千丈之語豪則豪矣然安得爾髙屋耶苕溪漁隱叢話曰東坡集載此詩是題趙令晏崔白大圖幅徑三丈故云往來不遣鳳銜梭誰能鼓臂投三丈可謂善造語能形容者也畫品中止有李營丘驟雨圖從無崔白者兼東坡此詩又云風蒲半折寒雁起竹間的皪橫江梅乃是崔白冬景圖藝苑以為驟雨圖誤矣次韻劉貢父西省種竹要知西掖承平事記取劉郎種竹初舊德終呼名字外後生誰續笑談餘自注昔李公擇種竹館中戲語同舍後人指此竹必云李文正手植貢父笑曰文正不獨繫筆亦知種竹耶時有筆工李文正成隂障日行當見取笋供庖計已疏白首林間望天上平安時報故人書軾以去嵗春夏侍立邇英而秋冬之交子由相繼入侍次韻絶句四首各述所懷録二首曈曈日腳曉猶清細細槐花暖自零坐閲諸公半廊廟自注僕射李公門下韓公右丞劉公皆自講席大用時看黃色起天庭微生偶脫風波地晚嵗猶存鐵石心定是香山老居士世緣終淺道根深自注樂天自江州司馬除忠州刺史旋以主客郎中知制誥遂拜中書舍人軾雖不敢自比然謫居黃州起知文登召為儀曹遂忝侍從出處老少大略相似庶幾復享此翁晚節間適之樂焉俯仰今昔有激昂頽波之情郭熙畫秋山平逺自注文潞公為跋尾玉堂晝掩春日間中有郭熙畫春山鳴鳩乳燕初睡起白波青嶂非人間離離短幅開平逺漠漠疏林寄秋晚恰似江南送客時中流回頭望雲巘伊川佚老鬢如霜卧看秋山思洛陽為君紙尾作行草炯如嵩洛浮秋光我從公遊如一日不覺青山映黃髮為畫龍門八節灘待向伊川買泉石秋山平逺只是離離短幅四句却先以玉堂之春江曉景為秋山先導復因文彥博跋尾致其纒綿鄭重之情而熙畫之入妙已不待更加讚嘆矣蔡居厚詩話曰學士院舊與宣徽院相鄰今門下後省乃其故地玉堂兩壁有巨然畫山董羽水宋宣獻公為學士時燕穆之復為六幅山水屏寄之遂置於中間元豐末既修兩後省遂移院於今樞密院之後今玉堂中屏乃待詔郭熙所作春江曉景禁中官局多熙筆迹而此屏獨深妙意若欲追配前人者蘇儋州嘗賦詩云玉堂晝掩春日間中有郭熙畫春山今遂為玉堂一佳物也次韻張昌言喜雨千里黃流失故居年來赤地到青徐遙聞爭誦十行詔無異親巡六尺輿精貫天人一言足雲興嶽瀆萬靈趨愛君誰似元和老賀雨詩成即諫書寓諷於頌又援古為説真能以三百篇諫者白居易元和三年賀雨詩曰君以明為聖臣以直為忠敢賀有其始亦願有其終書朝補之所藏與可畫竹三首録二首與可畫竹時見竹不見人豈獨不見人塔然遺其身其身與竹化無窮出清新莊周世無有誰知此凝神若人今已無此竹寧復有那將春蚓筆畫作風中栁君看斷崖上瘦節蛟蛇走何時此霜竿復入江湖手讀其身與竹化一語覺墨君堂記為繁次作見畫而思其人却因人亡而歎其畫不復得珍惜之至李衎畫竹譜曰文湖州教東坡訣云竹之始生一寸之萌耳而節葉具焉自蜩腹蛇跗至於劍拔十尋者生而有之也今畫竹者乃節節而為之葉葉而纍之豈復有竹乎故畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣坡云與可之教豫如此豫不能然也夫既心識所以然而不能然者內外不一心手不相應不學之過也且坡公尚以為不能然者不學之過况後之人乎書李世南所畫秋景二首録一首野竹參差落漲痕疏林欹倒出霜根扁舟一棹歸何處家在江南黃葉村書鄢陵王主簿所畫折枝二首論畫以形似見與兒童鄰賦詩必此詩定非知詩人詩畫本一律天工與清新邉鸞雀寫生趙昌花傳神如何此兩幅疏淡含精勻誰言一點紅解寄無邊春瘦竹如幽人幽花如處女低昻枝上雀搖蕩花間雨雙翎決將起衆葉紛自舉可憐採花蜂清蜜寄兩股若人富天巧春色入毫楮懸知君能詩寄聲求妙語軾嘗言善畫者畫意不畫形善詩者道意不道名語本歐陽古畫畫意不畫形梅詩詠物無詠情之句若此詩言詩畫一律又與軾他詩所云韓生畫馬真是馬蘇子作詩如見畫以及少陵翰墨無形畫韓幹丹青不語詩等句互相印可然彼猶曰此詩此畫誰當看又曰此畫此詩今已矣嘆索解人不得也豈若此詩直以詩畫三昧舉示來哲乎次首言竹言花言雀言蜂又言花之枝花之葉花間之雨雀之翎蜂之蜜濃淡淺深得意兼能得格王直方詩話曰論畫以形似六句若論詩畫於此盡矣每誦數過殆欲常以為法也漫叟詩話曰世有青襟集一編以授學徒可以諭蒙若天詩云戴盆徒仰止測管詎知之席詩云孔堂曾子避漢殿戴馮重可謂著題乃東坡所謂賦詩必此詩也吕氏蒙童訓曰東坡詩云賦詩必此詩定非知詩人此或一道也魯直作詠物詩曲當其理如猩猩筆詩平生幾兩屐身後五車書其必此詩哉故李誠之待制六丈挽詞青青一寸松中有梁棟姿天驥墮地走萬里端可期世無阿房宫下建五丈旗又無穆天子西征燕瑶池才大古難用老死亦其宜丈夫恐不免豈患莫已知公如松與驥少小稱偉竒俯仰自廊廟笑談無羌夷清朝竟不用白首仍憂時願斬橫行將請烹乾沒兒言雖不見省坐折姦雄窺嗟我去公久江湖生白髭歸來耆舊盡零落存者誰比公嵇中散龍性不可羈疑公李北海慷慨多雄詞淒涼五君詠沉痛八哀詩邪正久乃明人今屬公思九原不可作千古有餘悲比之於物則松也驥也擬之於人則嵇康也李雍也然而其身不見用其言不見行而死則其宜矣明白道出那得不千古餘悲九月十五日邇英講論語終篇賜執政講讀史官燕於東宫又遣中使就賜御書詩各一首臣軾得紫薇花絶句其詞云絲綸閣下文書靜鐘鼓樓中刻漏長獨坐黃昏誰是伴紫薇花對紫薇郎翌日各以表謝又進詩一篇臣軾詩云繡裳畫衮雲垂地不作成王剪桐戲日髙黃繖下西清風動槐龍舞交翠自注邇英閣前有雙槐樛然屬地如龍形壁中蠧簡今千年漆書科斗光射天諸儒不復憂吻燥東宫賜酒如流泉酒酣復拜千金賜一紙驚鸞回鳳字蒼顔白髮便生光袖有驪珠三十四自注臣所賜書并題目及臣姓名凡三十四字歸來車馬已喧闐爭看銀鈎墨色鮮人間一日傳萬口喜見雲章第一篇自注上前此未嘗以御書賜羣臣玉堂晝掩文書靜鈴索不搖鐘漏永莫言弄筆數行書須信時平由主聖犬羊散盡沙漠空捷烽夜到甘泉宫似聞指揮築上郡已覺談笑無西戎自注時熙河新獲鬼章是日涇原復奏夏賊數十萬人遁去文思天子師文母終閉玉關辭馬武小臣願對紫薇花試草尺書招贊普自注按唐制翰林學士帶知制誥許綴中書舍人班今臣以知制誥待罪禁林故得以紫薇為故事敘記恩私切合時事無不莊雅有體爛漫之才又於此等詩見其誠敬之學資治通鑑曰元祐二年秋宴近臣於資善堂出所書唐人詩分賜邵長蘅曰按年譜先生以元祐元年自中書舍人為翰林學士知制誥二年兼侍讀通典唐置中書舍人六人其內一人知制誥天寶元年改中書為紫薇省舍人曰紫薇郎獲鬼章二十韻青唐有逋冦白首已窮妖竊據臨洮郡潛通講渚橋廟謀周召虎邊帥漢班超堅壘千兵破連航一炬燒擒姦從窟穴奏捷上煙霄詭異人圖像歡娛路載謡千誅非一事伐叛自先朝取道經陵寢前期告廟祧西來聞幾日面縛見今朝二聖臨雲陛千官溢海潮載囚車轣轆失主馬蕭條橫拜如蹲犬胡裝尚衣貂理卿辭具服譯長舌初調緩死恩殊厚求生尾屢搖慈仁逢太母寬厚戴唐堯赤手真擒虎和羮未賜梟藁街虛授首東市偶全腰困獸何須殺遺雛或可招威聲西振夏武節北通遼帝道有強弱天時或長消羌情防報復軍勝忌矜驕慎重關西將竒功勿再要鬼章之獲在元祐二年本集內奏議有論擒獲鬼章稱賀太速劄子又因擒鬼章論西羌夏人事宜劄子又乞詔邊吏無進取及論鬼章事宜劄子又乞約鬼章討阿里骨劄子大旨欲使其部族與溫溪心斂氊等合以討阿里骨而納趙純忠然後許其請命自新而深以將驕卒惰後無以使為可慮此詩先陳偏師獨克俘獲醜虜之功繼述請命乞憐之狀終稱放還不殺之德至其歸宿乃曰羌情防報復則固後兩劄子意也曰軍勝忌矜驕則又前兩劄子意也而又申言之曰慎重關西將竒功勿再要其所以為緝治邊防整肅驕慢計者剴切周詳誠一不二如此軾因擒鬼章論西羌夏人事宜劄子曰夫阿里骨董氊之賊臣也挾契丹公主以弒其君之二妻董氊死匿喪不發逾年衆定乃詐稱嗣子偽書鬼章溫溪心等名以請於朝當時執政若且令邊臣審問鬼章等以阿里骨當立不立若朝廷從汝請遂授節鉞阿里骨直汝主矣汝能臣之如董氊乎若此等無詞則是諸羌心服既立之後必能統一都部吾又何求若其不服則釁端自彼爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近上使額命之鬼章等各得所欲宜亦無患當時執政不深慮此專以省事為安因其妄請便授節鉞阿里骨自知不當立而憂鬼章之討也故欲借力於西夏以自重於是始有解仇結好之謀而鬼章亦不平朝廷之以賊臣君我也故怒而盜邊夏人知諸羌之叛也故起而和之此臣所謂前後致冦之由明主不可以不知者也宋史阿里骨傳曰董氊病革召諸酋領至青唐謂曰吾一子已死惟阿里骨母嘗事我我視之如子今將以種落付之諸酋聽命既嗣事遣使修貢元祐元年封寧塞郡公二年遂逼鬼章使率衆拒洮州羌結藥密者使所部怯陵來告里骨執怯陵結藥密懼携妻子南歸鬼章又使其子結咓齪入冦八月鬼章就擒檻送京師尋赦之聽招其子以自贖元祐三年里骨奉表謝罪詔西河無復出兵許貢奉如故鬼章死詔焚付其骨和王晉卿并引元豐二年豫得罪貶黃州而駙馬都尉王銑亦坐纍逺謫不相聞者七年豫既召用而銑亦還朝相見殿門外感歎之餘作詩相屬詞雖不甚工然託物悲慨厄窮而不怨泰而不驕憐其貴公子有志如此故和其韻欲使銑姓名附見豫詩集中然亦不以示銑也銑字晉卿功臣全斌之後云先生飲東坡獨舞無所屬當時挹明月對影三人足醉眠草棘間蟲虺莫豫毒醒來送歸鴈一寄千里目悵然懷公子旅食久不玉欲書加餐字逺託西飛鵠謂言相濡沫未足寄溝瀆吾生如寄耳何者為禍福不如兩相忘昨夢那可逐上書得自便歸老湖山曲躬耕二頃田自種十年木豈知垂老眼對此金蓮燭公子亦生還仍分刺史竹賢愚有定分尊俎守尸祝文章何足云執技等醫卜朝廷方西顧羌鹵驕未伏遙知重陽酒白羽落黃菊羡君真將家浮面氣可掬何當請長纓一戰河湟復似不經意而出然句如堅城而氣極和厚蓋其老年詩境漸造平淡如此劉克莊西園雅集圖跋曰本朝戚畹惟李端願王晉卿二駙馬好文喜士世傳孫巨源三通鼓眉山公金叉墜之詞想見一時風流醖藉未幾烏臺鞫詩案賔主俱謫邵長蘅曰唐書令狐綯為學士承旨夜對禁中撤金蓮花炬送還院按先生時為學士嘗召對便殿宣仁撤御前金蓮燭送歸院或即自述其事歟次韻劉貢父叔姪扈駕玉堂孤坐不勝清長羡枚鄒接長卿只許隔墻聞置酒時因議事得聨名機雲似我多遺俗廣受如君不治生共託屬車塵土後釣天一餉夢中榮和子由除夜元日省宿致齋三首江湖流落豈關天禁省相望亦偶然等是新年未相見此身應坐不歸田白髮蒼顔五十三家人遙遣試春衫朝回兩袖天香滿頭上銀幡笑阿咸當年踏月走東風坐看春闈鎖醉翁白髮門生幾人在卻將新句調兒童次韻黃魯直畫馬試院中作少年鞍馬勤逺行卧聞齕草風雨聲見此忽思短策橫十年髀肉磨欲透那更陪君作詩瘦不如芋魁歸飯豆門前欲嘶御史驄詔恩三日休老翁羡君懷中雙橘紅自注黃有老母此格乃禁臠所謂促句換韻者唐詩惟岑參有之後人遂以此為岑嘉州體要其源固出於秦碑也是須適然得之不由作意令轉換承接不可增減方稱入妙此篇次韻自然又且竒氣勃窣實較黃庭堅原唱為更勝余與李豸方叔相知久矣領貢舉事而李不得第愧甚作詩送之與君相從非一日筆勢翩翩疑可識平生謾説古戰場過眼終迷日五色我慙不出君大笑行止皆天子何責青袍白紵五千人知子無怨亦無德買羊沽酒謝玉川為我醉倒春風前歸家但草凌雲賦我相夫子非臞仙養疴漫筆之語似不足取信觀詩中筆勢翩翩疑可識一句可證以軾正人豈肯於糊名易書之時暗通關節以示恩者乎委之於天而勉之以無怨且期之以夫子非臞仙切磋之誼愛戀之忱不當如是耶養疴漫筆曰元祐中東坡知貢舉李方叔就試將鎖院坡緘封一簡令叔黨持與方叔值方叔出其僕受簡置几上有頃章子厚二子曰持曰援者來取簡竊觀乃揚雄優於劉向論一篇二章驚喜携之以去方叔歸求簡不得知為二章所竊悵惋不敢言已而果出此題二章皆模倣坡作方叔幾於閣筆及拆號坡意魁必方叔也乃章援第十名文意與魁相似乃章持坡失色二十名間一卷頗竒坡謂同列曰此必方叔視之乃葛敏修而方叔竟下第坡出院聞其故大嘆恨作詩送其歸所謂平生漫説古戰場過眼空迷日五色者是也慶源宣義王丈以纍舉得官為洪雅主簿雅州户掾遇吏民如家人人安樂之既謝事居眉之青神瑞草橋放懷自得有書來求紅帶既以遺之且作詩為戲請黃魯直秦少遊各為賦一首為老人光華青山半作霜葉枯遇民如兒吏如奴吏民莫作官長看我是識字耕田夫妻啼兒號刺史怒時有野人來挽須拂衣自注下下考芋魁飯豆吾豈無歸來瑞草橋邊路獨遊還佩平生壺慈姥巖前自喚渡青衣江畔人爭扶今年蠶市數州集中有遺民懷袴襦邑中之黔相指似白髯紅帶老不癯我欲西歸卜鄰舍隔墻拊掌容歌呼不學山王乘駟馬回頭空指黃公壚分明表出陽城何易于一輩人物非此筆力莫能傳其人王直方詩話曰與王慶源詩起六句山谷云庭堅最愛此數韻林子仁曰謹按蘇叔黨所作王元直墓表云初季父慶源官於雅州以論事不合取官長怒即謝病去詩中云刺史怒指此送錢穆父出守越州二首簿書常苦百憂集樽酒今應一笑開京兆從教思廣漢會稽聊喜得方回若耶溪水雲門寺賀監荷花空自開我恨今猶在泥滓勸君莫棹酒船回錢協出守越州因坐奏獄空不實亦由與安石輩不相能故前作以趙廣漢郗愔為比次作點竄李詩語無窮清新卧病逾月請郡不許復直玉堂十一月一日鎖院是日苦寒詔賜官燭法酒書呈同院微霰疏疏點玉堂詞頭夜下攬衣忙分光玉燭星辰爛拜賜宫壺雨露香醉眼有花書字大老人無睡漏聲長何時郤逐桑榆暖社酒寒燈樂未央方回曰中四句氣焰逼人木山并引吾先君子嘗蓄木山三峰且為之記與詩詩人梅二丈聖俞見而賦之今三十年矣而猶子千乘又得五峰益竒因次聖俞韻使并刻之其側木生不願回萬牛願終天年仆沙洲時來幸逢河伯秋掀然見怪推不流蓬婆雪嶺巧雕鎪蟄蟲行蟻為豪酋阿咸大膽忽持去河伯好事不汝尤城中古沼浸坤軸一林瘦竹吾菟裘二頃良田不難買三年榿木行可槱會將白髮對蒼巘魯人不厭東家丘次梅詩韻即效其體格炯炯清立藝苑雌黃曰木山詩三年榿木行可槱榿字人少有識者遍尋字書亦皆無之蜀中多此木詢之蜀人則相傳以為區宜切按杜陵有覔榿木詩云飽聞榿木三年大注蜀人以榿為薪三年可燒又堂成詩云榿林礙日吟風葉注榿木下材止可充薪而已惟蜀地最宜種送千乘千能兩姪還鄉治生不求富讀書不求官譬如飲不醉陶然有餘歡君看龎德公白首終泥蟠豈無子孫念顧獨遺以安鹿門上冡回牀下拜龍鸞躬耕竟不起耆舊節獨完念汝少多難氷雪落綺紈五子如一人奉養真色難烹雞獨饋母自饗苜蓿槃口腹雖纍人寧我食無肝西來四千里敝袍不言寒秀眉似我兄亦復心間寬忽然捨我去嵗晚留餘酸我豈軒冕人青雲意先闌汝歸蒔松菊環以青琅玕榿隂三年成可以挂吾冠清江入城郭小圃生微瀾相從結茅舍曝背談金鑾一篇大旨起四句道盡預想歸田之樂説到曝背談金鑾津津有味御選唐宋詩醇卷三十八
