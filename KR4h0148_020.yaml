front:
  text: 欽定四庫全書御選唐宋詩醇卷九
  hash: sha256:68f416cf60affc5ec879e397f6ef71c452a40161cf39f9330a69b6703a71652e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_020-1a, image: WYG1448/WYG1448-0207c.png}
body:
  text: 襄陽杜甫詩一目録奉贈韋左丞丈二十二韻送髙三十五書記贈李白遊龍門奉先寺望嶽陪李北海宴歷下亭登歷下古城員外新亭玄都壇歌貧交行兵車行髙都護驄馬行天育驃騎歌白絲行醉時歌醉歌行贈衛八處士同諸公登慈恩寺塔示從孫濟送孔巢父謝病歸逰江東兼呈李白飲中八仙歌曲江麗人行樂逰園歌渼陂行奉同郭給事湯東靈湫作夜聽許十損誦詩愛而有作沙苑行驄馬行自京赴奉先縣詠懷五百字奉先劉少府新畫山水障歌白水縣崔少府十九翁髙齋三十韻三川觀水漲二十韻悲陳陶悲青坂哀江頭哀王孫大雲寺贊公房蘇端薛復筵簡薛華醉歌晦日尋崔戢李封
  hash: sha256:1613d46f5e65b73224f5ae99bc8879367e035dba9dc9b408c35b89d561528369
