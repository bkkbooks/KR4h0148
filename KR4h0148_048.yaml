front:
  text: 欽定四庫全書御選唐宋詩醇卷二十三
  hash: sha256:95dc26794b90c166ac927bea4d478f9889716f12ec7eea574ce6f429b5e1ad74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_048-1a, image: WYG1448/WYG1448-0461a.png}
body:
  text: 太原白居易詩五目録賦得古原草送别旅次景空寺宿幽上人院同李十一醉憶元九同錢員外禁中夜直禁中夜作書與元九八月十五日夜禁中獨直對月憶元九八月十五日夜聞崔大員外翰林獨直對酒玩月因懷禁中清景偶題是詩村夜聞蟲王昭君題盧祕書夏日新栽竹二十韻欲與元八卜鄰先有是贈題王侍御池亭贈楊祕書巨源燕子樓三首襄陽舟夜江夜舟行浦中夜泊舟中讀元九詩嵗晚旅望望江州東南行一百韻寄通州元九侍御澧州李十一舍人果州崔二十二使君開州韋大員外庾三十二補闕杜十四拾遺李二十助教員外竇七校書初到江州寄翰林張李杜三學士庾樓曉望春末夏初閒遊江郭二首題元八溪居江樓早秋送客之湖南百花亭晚望夜歸西樓庾樓新嵗上香爐峯早發楚城驛建昌江香爐峯下新卜山居草堂初成偶題東壁重題編集拙詩成一十五卷因題卷末戲贈元九李二十湖上閒望江樓夜吟元九律詩成三十韻送客春遊嶺南二十韻得行簡書聞欲下峽先以此寄南湖早春題韋家泉池㸃額魚夜送孟司功湖亭與行簡宿贈江客潯陽秋懷贈許明府題遺愛寺前溪松聞楊十二新拜省郎遙以詩賀送韋侍御量移金州司馬江西裴常侍以優禮見待又䝉贈詩輒叙鄙誠用伸感謝别草堂行次夏口先寄李大夫重贈李大夫
  hash: sha256:e52fb1f339998f5d41d9d004c49a630619b43bd5b8b61abdea51579888080f10
