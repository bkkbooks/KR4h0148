front:
  text: 欽定四庫全書御選唐宋詩醇巻三十七
  hash: sha256:e89165acad400f0f01c7ef1315c19ab35862cc816c654435842366696053da0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_076-1a, image: WYG1448/WYG1448-0714a.png}
body:
  text: 眉山蘇軾詩六目録東坡八首姪安節逺來夜坐三首岐亭道上見梅花戱贈季常太守徐君猷通守孟亨之皆不飲酒以詩戱之次韻和王鞏六首録一首江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字是日同至女王城作詩乃和前韻紅梅三首録一首陳季常見過三首録二首寒食雨二首魚蠻子弔李臺卿曹既見和復次其韻次韻孔毅父集古人句見贈五首録三首六年正月二十日復出東門仍用前韻南堂五首録一首次韻孔毅父久旱已而甚雨三首初秋寄子由和蔡景繁海州石室小飲公瑾舟中過江夜行武昌山上聞黄州鼓角自興國徃筠宿石田驛南廿五里野人舍圓通禪院先君舊遊也四月二十日晚至宿焉明日忌日也乃手寫寳積獻葢頌佛一偈以贈長老僊公僊撫掌笑曰昨夜夢寳葢飛下著處輒出火豈此祥乎乃作是詩院有蜀僧宣逮事訥長老識先君云題西林壁廬山二勝開先潄玉亭栖賢三峽橋岐亭五首録三首郭祥正家醉畫竹石壁上郭作詩為謝且遺二古銅劍龍尾硯歌次韻杭人裴維甫同王勝之游蔣山送沈逵赴廣南豆粥秦少游夢發殯而葬之者云是劉發之柩是嵗發首薦秦以詩賀之劉涇亦作因次其韻徐大正閒軒髙郵陳直躬處士畫鴈二首次韻王定國南遷回見寄
  hash: sha256:c1542e3a896e26ef4c5e71696eb63dcedf87fe5d3dbee4d6cf9aa336e4d3b430
