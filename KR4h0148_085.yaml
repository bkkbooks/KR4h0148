  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_085-1a, image: WYG1448/WYG1448-0804c.png}
body:
  text: 眉山蘇軾詩十同正輔表兄游白水山偉哉造物真豪縱攫土搏沙為此弄擘開翠峽走雲雷截破奔流作潭洞因隨化人履巨迹得與仙兄攝飛鞚曵杖不知巖谷深穿雲但覺衣裘重坐看驚鳥救霜葉知有老蛟蟠石甕金沙玉礫粲可數古鏡寶奩寒不動念兄獨立與世疏絶境難到惟我共永辭角上兩蠻觸一洗胸中九雲夢浮來山髙回望失武陵路絶無人送筠籃擷翠爪甲香素綆分碧銀瓶凍歸路霏霏湯浴暗野堂活活神泉湧解衣浴此無垢人身輕可試雲間鳳直從瀑布發處寫到波平水靜與前佛跡巖詩别是一般境象遊跡不同詩亦隨異可知純唱髙蹤不由强索而得與正輔遊香積寺越山少松竹常苦野火厄此峰獨蒼然感荷佛祖力茯苓無人採千嵗化琥珀幽光發中夜見者惟木客我豈無長鑱真贋苦難識靈苖與毒草疑似在毫髮把玩竟不食棄置長太息山僧類有道辛苦嘗谷汲我慙作機舂鑿破混沌穴幽尋恐不繼書板記嵗月真贋疑似之難辨偶借採藥以發長歎其感人者微矣次韻正輔同遊白水山祗知楚越為天涯不知肝膽非一家此身如線自縈繞左旋右轉隨繅車誤拋山林入朝市平地咫尺千褒斜欲從稚川隱羅浮先與靈運開永嘉首參虞舜欵韶石次謁六祖登南華仙山一見五色羽雪樹兩摘南枝花赤魚白蟹箸屢下黃柑緑橘籩常加糖霜不待蜀客寄荔支莫信閩人誇恣傾白蜜收五稜細斸黃土栽三丫自注正輔分人參歸種韶陽來詩本用䃁字惠州無書不見此字所出故且從木奉和朱明洞裏得靈草翩然放杖凌蒼霞豈無軒車駕熟鹿亦有鼓吹號寒蛙仙人勸酒不用勺石上自有樽罍窪徑從此路朝玉闕千里莫遣毫釐差故人日夜望我歸相迎欲到長風沙豈知乘槎天女側獨倚雲機看織紗世間誰似老兄弟篤愛不復相疵瑕相擕行到水窮處庶幾一見留子嗟千年枸杞嘗夜吠無數草棘工藏遮但令凡心一洗濯神人仙藥不我遐山中歸來萬想滅豈復回顧雙雲鴉離却白水别作虛空縹眇之想層巒叠浪興㑹淋漓屈子逺逰之遺也李必恆曰雙雲鴉似指失偶事先生前迎正輔詩有萬里倘同歸兩鰥當對耰之句自注某喪婦已三年矣正輔近亦有亡嫂之戚故云洗濯凡心及萬想滅二語可見雲鴉即所云雲鬟鴉鬢矣章質夫送酒六壺書至而酒不達戲作小詩問之白衣送酒舞淵明急掃風軒洗破觥豈意青州六從事化為烏有一先生空煩左手持新蟹漫繞東籬嗅落英南海使君今北海定分百榼餉春耕青州烏有偶然拈作對偶集中尚有以通印子魚對披綿黃雀以日斜庚子對嵗在己辰並為宋詩人所稱其實軾詩卓絶處不盡在此復齊漫録曰文之所以貴對偶者謂出於自然非假於牽强也王禹玉元豐間以錢二萬酒十壺餉吕夢得夢得作啓謝之有白水真人青州從事禹玉歎賞為其切題至若東坡得章質夫書遺酒六瓶書至而酒亡因寄詩云豈意青州六從事化為烏有一先生二句渾然一意絶無斧鑿痕更覺有功詩人玉屑曰天下未嘗無對東坡以章質夫寄酒不至作詩云豈意青州六從事化為烏有一先生或以緑研寄楊誠齊為人以柏木簡換去誠齊用此意作詩謝云如何緑玉含風面化作青銅溜雨枝二事可為竒對亦善用坡詩也雨後行菜夢回聞雨聲喜我菜甲長平明江路濕並岸飛兩槳天公真富有乳膏瀉黃壤霜根一蕃滋風葉漸俯仰未任筐筥載已作杯盤想艱難生理窄一味敢專饗小摘飯山僧清安寄真賞芥藍如菌菌脆美牙頰響白菘類羔豚冒土出蹯掌誰能視火候小竈當自養質而實綺癯而實腴得陶公田園諸詩神髓殘臘獨出二首録一首江邊有微行詰曲背城市平湖春草合步到栖禪寺堂空不見人老稚掩關睡所營在一食食已寧復事客來豈無得施豫靜掃地風松獨不靜道我作鼓吹通首酷寫靜境結云風松獨不靜此是反托之法元微窅奧妙處可尋容齊三筆曰東坡初赴惠州過峽山寺不值主人故其詩云山僧本幽獨乞食况未還雲碓水自舂松門風為關石泉解娛客琴筑鳴空山既至惠州殘臘獨出至栖禪寺亦不逢一僧故其詩云江邉有微行詰曲背城市平湖春草合步到栖禪寺堂空不見人老稚掩關睡後在儋耳作觀碁詩記游廬山白鶴觀觀中人皆闔戶晝寢獨聞碁聲云我時獨游不逢一士誰歟碁者戶外屨二不聞人聲時聞落子其寂寞冷落之味可以想見句語之妙一至於此新年五首録一首曉雨暗人日春愁連上元水生挑菜渚煙濕落梅村小市人歸盡孤舟鶴踏翻猶堪慰寂寞漁火亂黃昏次韻髙要令劉湜峽山寺見寄新聞妙無多舊學閒可束猶當隱季主未遽逃梅福空腸吐餘思靜似蠶綴族寸田結初果秀若銅生緑荆棘掃誠盡梨棗憂不熟髙人寧鑄金下士乃服玉君看嶺嶠隘我欲巾笥蓄曽攀羅浮頂亦到朱明谷旋觀真歷瑰歸卧甘破屋故人老猶仕世味薄如縠偶從越女笑不怕蠻江浴驚聞尺書到喜有新詩辱應憐五管客曽作八州督骨銷讒口鑠膽破獄吏酷隴雲不易寄江月乃可掬遙知清逺寺不稱空明腹蹇驢步武碎短瑟絃柱促仰看泉落佩俯聼石響轂千峰瀉清駛一往無回躅狂雷失晤語過電不容目要知僧長飢正坐山少肉人間無南北蝸角空出縮仇池九十九自注仇池有九十九泉余嘗夢至有詩嵩少三十六自注子由近買田陽翟北望嵩少甚近天人同一夢仙凡無兩録陋邦真可老生理亦粗足便回爇天熖長作照海燭自注黃魯直寄詩云蓮花合裏一寸燭牝馬海中燒百川魯直蓋迎有得也雋語清談引人入勝而竟體裁對絶不見排比之迹故由筆妙應憐五管客曽作八州督二句宋援則引莊子上有五管之說李原則引韓詩五管編歷之句王注兼採而並録之古人之虛𠂻如此援說誠為未當李必恆補注是李原而非宋援可也其所作王注正僞直斥王注為杜撰是沒其實矣至曽作八州督句李原但引晋書只能解釋字面此則補注得之然觀軾賀子由生第四孫詩結云早謀二頃田莫待八州督有自注云吾前後典八州此乃八州督三字之確注補注但引八州憐我往來頻之句猶未為得也惠州近城數小山類蜀道春與進士許毅野步㑹意處飲之且醉作詩以記適參寥專使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也夕陽飛絮亂平蕪萬里春前一酒壺鐵化雙魚沉逺素劍分二嶺隔中區花曽識面香仍好鳥不知名聲自呼夢想平生消未盡滿林烟月到西湖渥采流熹觸物圓覽夢想之切洋溢於詞端冷齊夜話曰韓子蒼曰丁晋公海外詩云草解忘憂憂底事花名含笑笑何人世以為工及讀東坡詩云花曽識面香仍好鳥不知名聲自呼便覺才力相去逺矣風月堂詩話曰東坡南遷參寥居西湖智果院交逰無復曩時之盛作湖上絶句云去嵗春風上苑行爛窺紅紫厭平生而今眼底無姚魏浪蘂浮花懶問名城隈野水緑逶迤裊裊輕舟掠岸過欲採藝蘭無覔處野花汀草占春多詩既出遂坐譏刺得罪返初服軾惠州答參寥書曰専人逺來辱手書并示近詩如獲一笑之樂數日喜慰忘味也某到貶所半年凡百粗適更不能細說大略祗似靈隱天竺和尚退院後却在一箇小村院子折足鐺中罨糙米飯喫便過一生也得食荔支二首録一首羅浮山下四時春盧橘楊梅次第新日啖荔支三百顆不辭長作嶺南人遷居并引吾紹聖元年十月十二日至惠州寓合江樓是月十八日遷於嘉祐寺二年三月十九日復遷於合江樓三年四月二十日復歸於嘉祐寺時方卜築白鶴峰之上新居成庶幾其少安乎前年家水東回首夕陽麗去年家水西溼面風雨細東西兩無擇緣盡我輒逝今年復東徙舊館聊一憩已買白鶴峰規作終老計長江在北戶雪浪舞吾砌青山滿墻頭䰀鬌幾雲髻雖慚抱朴子金鼎陋蟬蛻猶賢栁栁州廟俎薦丹荔吾生本無待俯仰了此世念念自成劫塵塵各有際下觀生物息相吹等蛟蚋栁州貶謫詩多憂鬱凄楚之音軾嘗評其南澗中詩引老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也若惠州諸作無不寬然有餘地此其所得深矣軾和陶集曰去嵗三月自水東嘉祐寺遷合江樓逮今一年多病鮮歡頗懷水東之樂得歸善縣後隙地數畝父老云此古白鶴觀也意欣然欲居之白鶴峰新居成自嘉祐寺遷入詠淵明時運詩云斯晨斯夕言息其廬似為余發也兩橋詩并引惠州之東江溪合流有橋多廢壞以小舟渡羅浮道士鄧守安始作浮橋以四十舟為二十舫鐵鎖石矴隨水漲落榜曰東新橋州西豐湖上有長橋屢作屢壞栖禪院僧希固築進兩岸為飛樓九間盡用石鹽木堅若鐵石榜曰西新橋皆以紹聖三年六月畢工作二詩落之東新橋羣鯨貫鐵索背負橫空霓首搖翻雪江尾插崩雲溪機牙任信縮漲落隨髙低轆轤卷巨索青蛟挂長堤奔舟免狂觸脫筏防撞擠一橋何足云歡傳廣東西父老有不識喜笑爭攀躋魚龍亦驚逃雷雹生馬蹄嗟此病涉久公私困留稽姦民食此險出沒生鳬鷖似賣失船壺如去登樓梯不知百年來幾人隕沙泥豈知濤瀾上安若堂與閨往來無晨夜醉病休扶擕使君飲我言妙割無牛雞不云二子勞歎我捐腰犀自注二士造橋豫嘗助施犀帶我亦夀使君一言聽扶藜常當修未壞勿使後噬臍先寫浮橋之狀次言橋成之利而以常當修未壞終之驚采絶艷直是為浮橋作贊頌前賢詩中無此倔竒西新橋昔橋木千柱挂湖如斷霓浮梁陷積淖破板隨奔溪笑看逺岸沒坐覺孤城低聊因三農隙稍進百步隄炎州無堅植潦水輕推擠千年誰在者鐵柱羅浮西獨有石鹽木白蟻不敢躋似開銅駝峰如鑿鐵馬蹄岌岌類鞭石山川非㑹稽嗟我久閣筆不書紙尾鷖蕭然無尺箠欲構飛空梯百夫下一杙椓此百尺泥自注橋柱石磉之下皆有堅木椓入泥中丈餘謂之頂樁探囊賴故侯寶錢出金閨自注子由之婦史頃入內得賜黃金錢數十以助施父老喜雲集簞壺無空擕三日飲不散殺盡西村雞似聞百嵗前海近湖有犀自注橋下舊名鰐湖蓋嘗有鮫鰐之類那知陵谷變枯瀆生茭藜後來勿忘今冬涉水過臍序記事跡與東橋體格不同而波瀾意度曲折恣肆獨以和韻顯其竒白鶴峰新居欲成夜過西鄰翟秀才二首林行婆家初閉戶翟夫子舍尚留關連娟缺月黃昏後縹眇新居紫翠間繫悶豈無羅帶水割愁還有劍鋩山自注韓退之云水作青羅帶山如碧玉篸栁子厚云海上炎峰若劍鋩秋來處處割愁腸皆嶺南詩也中原北望無歸日鄰火村舂自往還甕間畢卓防偷酒壁後匡衡不㸃燈待鑿平江百尺井要分清署一壺氷佐卿恐是歸來鶴次律寧非過去僧他日莫尋王粲宅夢中來往本何曽首作兀傲鮮妍揮毫卓犖次作以意貫串故役事繁而思不隔不善學之不轉成㸃鬼簿耶石林詩話曰詩篇當有操縱不可拘用一律蘇子瞻詩林行婆家初閉戶翟夫子舍尚留關始讀殆不可測其意蓋下有連娟缺月四句則入頭不怕放行寧傷初拙也縱筆白頭蕭散滿霜風小閣藤牀寄病容報道先生春睡美道人輕打五更鐘王十朋曰按此詩執政聞而怒之再貶儋耳種茶松間旅生茶已與松俱瘦茨棘尚未容䝉翳爭交構天公所遺棄百嵗仍稚幼紫笋雖不長孤根乃獨夀移栽白鶴嶺土軟春雨後彌旬得連隂似許晚遂茂能忘流轉苦戢戢出鳥咮未任供臼磨且可資摘嗅千團輸大官百餅衒私鬬何如此一啜有味出吾囿茶根移種經雨而生謫居殆用自况故曰天公所遺棄曰能忘流轉苦詞㫖了然可見白鶴山新居鑿井四十尺遇磐石石盡乃得泉海國困蒸溽新居利髙寒以彼陟降勞易此寢處乾但苦江路峻常慙汲腰酸矻矻煩四夫磽磽斫層巒彌旬得尋丈下有青石磐終日但迸火何時見飛瀾豐我粲與醪利汝椎與鑽山石有時盡我意殊未䦨今朝僮僕喜黃土復可摶晨瓶得雪乳莫甕停氷湍我生類如此何適不艱難一勺亦天賜曲肱有餘歡艱難二字為通首㸃睛處借題抒寫奧美無窮三月二十九日二首南嶺過雲開紫翠北江飛雨送淒凉酒醒夢回春盡日閉門隱几坐燒香門外橘花猶的皪墻頭荔子已斕斑樹暗草深人靜處捲簾欹枕卧看山吾謫海南子由雷州被命即行了不相知至梧乃聞尚在藤也旦夕當追及作此詩示之九疑聨綿屬衡湘蒼梧獨在天一方孤城吹角烟樹裏落日未落江蒼茫幽人拊枕坐歎息我行忽至舜所藏江邊父老能說子白須紅頰如君長莫嫌瓊雷隔雲海聖恩尚許遙相望平生學道真實意豈與窮達俱存亡天其以我為箕子要使此意留要荒他年誰作輿地志海南萬古真吾鄉水天景色離合情懷極排解乃極沉痛鶴林玉露曰子瞻謫儋州子由謫雷州皆章惇取其字之偏傍而謔之當時有術士曰儋字從立人子瞻其北歸乎雷字雨在田上承天之澤子由其未艾乎後皆驗行瓊儋間肩輿坐睡夢中得句云千山動鱗甲萬谷酣笙鐘覺而遇清風急雨戲作此數句四州環一島百洞蟠其中我行西北隅如渡月半弓登髙望中原但見積水空此生當安歸四顧真途窮眇觀大瀛海坐詠談天翁茫茫太倉中一米誰雌雄幽懷忽破散永嘯來天風千山動鱗甲萬谷酣笙鐘安知非羣仙鈞天宴未終喜我歸有期舉酒屬青童急雨豈無意催詩走羣龍夢雲忽變色笑電亦改容應怪東坡老顔衰語徒工久矣此妙聲不聞蓬萊宫行荒逺僻陋之地作騎龍弄鳳之思一氣浩歌而出天風浪浪海山蒼蒼足當司空圖豪放二字苕溪漁隱叢話曰幽懷忽破散四句蓋風來則千山草木俱動如動鱗甲萬谷號呼有聲如酣笙鏞耳次前韻寄子由我少即多難邅回一生中百年不易滿寸寸彎强弓老矣復何言榮辱今兩空泥洹尚一路自注古語云十方薄伽梵一路涅槃門梵語泥洹此云涅槃所向餘皆窮似聞崆峒西仇池迎此翁胡為通南海復駕垂天雄下視九萬里浩浩皆積風回望古合州屬此琉璃鐘離别何足道我生豈有終渡海十年歸方鏡照兩童還鄉亦何有暫假壺公龍峩眉向我笑錦水為君容天人巧相勝不獨數子工指㸃昔逰處蒿萊生故宫其胸次實為天空海濶非是無聊解免之詞遷居之夕聞鄰舍兒誦書欣然而作幽居亂蛙黽生理半人禽跫然已可喜况聞弦誦音兒聲自圓美誰家兩青襟且欣集齊咻未敢笑越吟九齡起韶石姜子家日南吾道無南北安知不生今海濶尚挂斗天髙欲橫參荆榛短墻缺燈火破屋深引書與相和置酒仍獨斟可以侑我醉琅然如玉琴謫居荒陋聞誦讀而欣然乃是恆情所同最愛海濶數句寫出一時情景别具興㑹文彩欲飛觀棊豫素不解棊嘗獨遊廬山白鶴觀觀中人皆闔戶晝寢獨聞棊聲於古松流水之間意欣然喜之自爾欲學然終不解也兒子過乃粗能者儋守張中日從之戲豫亦隅坐竟日不以為厭也五老峰前白鶴遺趾長松䕃庭風日清美我時獨遊不逢一士誰歟棊者戶外屨二不聞人聲時聞落子紋枰坐對誰究此味空鉤意釣豈在魴鯉小兒近道剝啄信指勝固欣然敗亦可喜優哉遊哉聊復爾耳軾嘗論司空圖棊聲花院閉幡影石幢髙之句以為吾嘗獨入白鶴觀松隂滿地不見一人惟聞棊聲然後知此句之工但恨其寒儉有僧態數語可謂定評矣此四言一章則甚似規橅二十四品之文者清幽靜妙真得味外之味然何嘗帶一毫寒儉氣耶深雪偶談日四言自韋孟司馬遷相如班固束晳陶潛韓愈栁宗元梅堯臣歐陽修王安石蘇軾工拙略見嘗怪五言而上世人往往極其才之所至而四言雖文詞巨伯輒不能工水心有是言矣劉潛夫亦以四言尤難三百五篇在前之故余思四言如律以三百五篇則韋氏為工世殊體異後之銘詩莫非四言也安石以上諸公未暇深論如蘇公所撰范蜀公志銘余每展卷輒為擊節在儋耳作觀碁詩其寂寒冷落之味可以想見坡公四言於古近體中句語無適而不髙妙也困學紀聞曰觀碁詩誰歟碁者用檀弓文法苕溪漁隱叢話曰夢得觀碁歌云初疑磊落曙天星次見搏擊三秋兵雁行布陳衆未曉虎穴得子人皆驚余嘗愛此數語能摹寫奕碁之趣夢得必髙於手談也至東坡觀碁則云勝固可欣敗亦可喜優哉遊哉聊復爾耳蓋東坡素不解碁不究此味也糴米糴米買束薪百物資之市不緣耕樵得飽食殊少味再拜請邦君願受一㕓地知非笑昨夢食力勉內愧春秧幾時花夏稗忽已穟悵焉撫耒耜誰復識此意此與陶潛詩云田家豈不苦弗獲辭此難四體誠乃疲庶無異患干同為學道有得之語擷菜并引吾借王參軍地種菜不及半畝而吾與過子終年飽菜夜半飲醉無以解酒輒擷菜煮之味含土膏氣飽風露雖粱肉不能及也人生須底物而更貪耶乃作四句秋來霜露滿東園蘆蔔生兒芥有孫我與何曽同一飽不知何苦食雞豚見到之言不嫌直遂次韻子由月季花再生幽芳本長春暫瘁如蝕月且當付造物未易料枯枿也知宿根深便作紫笋茁乘時出婉娩為我暖栗烈先生蚤貴重廟論推英拔而今城東瓜不記召南茇陋居有逺寄小圃無濶躡還為久處計坐待行年匝自注子由明年六十臘果綴梅枝春杯浮竹葉誰言一萌動已覺萬木活聊將玉蘂新自注世謂此玫瑰花也插向綸巾折誰言一萌動二語覺春風太和自在襟抱間次韻子由浴罷理髮千梳淨風晞勝湯沐閉息萬竅通霧散名乾浴頽然語默喪靜見天地復時令具薪水漫欲濯腰腹陶匠不可求盆斛何由足自注海南無浴器故常乾浴而已老雞卧糞土振羽雙瞑目倦馬𩥇風沙奮鬛一噴玉垢淨各殊性快愜聊自沃雲母透蜀紗琉璃瑩蘄竹稍能夢中覺漸使生處熟楞嚴在牀頭妙偈時仰讀反流歸照性獨立遺所矚未知仰山禪已就季主卜安心㑹自得助長毋相督觸處圓通了無罣礙十二月十七日夜坐達曉寄子由燈燼不挑垂暗蘂爐灰重撥尚餘薰清風欲發鴉翻樹缺月初升犬吠雲閉眼此心新活計隨身孤影舊知聞雷州别乘應危坐跨海幽光與子分凄寂之境寫得雞犬皆仙超然元著子由生日上天不難知好惡與我一方其未定間人力破隂隲小忍待其定報應真可必季氏生而仁觀過見其實端如栁下惠焉往不三黜天有時而定夀考未易畢兒孫七男子自注子由三子四孫次第皆逢吉遙知設羅門獨掩懸罄室回思十年事無愧篋中筆但願白髮兄年年作生日語語朴摯祝頌乃弟之體故當如是以黃子木拄杖為子由生日之夀靈夀扶孔光菊潭飲伯始雖云閒草木豈樂䝉此耻一時偶收用千載相瘢疻海南無嘉植野果名黃子堅瘦多節目天材任操倚嗟我始剪裁世用或緣此貴從老夫手往配先生兒相從歸故山不愧仙人杞自注本革枸杞一名仙人杖從老夫手配先生几嗟余寡兄弟四海一子由此語老而益信儋耳霹靂收威莫雨開獨憑欄檻倚崔嵬垂天雌霓雲端下快意雄風海上來野老已歌豐嵗語除書欲放逐臣回殘年飽飯東坡老一壑能專萬事灰崷崒雄姿經挫折而不稍損抑養浩然之氣於此見其心聲蘇轍曰東坡居士謫居儋耳置家羅浮之下獨與幼子過負擔渡海葺茅竹而居之日啖薯芋而華屋玉食之念不存於胸中平生無所嗜好以圖史為園囿文章為鼓吹至是亦皆罷去猶獨喜為詩精深華妙不見老人衰憊之氣馮景曰唐書吳武陵與孟簡書云雷砰電射天怒也不能終朝栁宗元之貶已十二年矣聖人在上安有畢世而怒人臣耶公起句暗用其意新居朝陽入北林竹樹散疏影短籬尋丈間寄我無窮境舊居無一席逐客猶遭屏結茅得兹地翳翳村巷永數朝風雨凉畦菊發新頴俯仰可卒嵗何必謀二頃幸得一㕓蕭條髙寄仁智所樂不勝娛衷散賞非夫澄懷觀道曷克有此軾答程全父推官書曰初至僦官屋數椽近復遭迫逐不免買地結茅僅免露處而囊為一空困厄之中何所不有置之不足道聊為一笑而已施元之曰東坡至儋耳軍使張中請館於行衙又别飾官舍為安居計朝廷命湖南提舉常平董必者察訪廣西遣使臣過海逐出之中坐黜死雷州監司悉鐫秩遂買地築室為屋五間潮人王介石為客於儋躬泥水之役其勞甚於家𨽻故詩有逐客猶遭屏句倦夜倦枕厭長夜小窗終未明孤村一犬吠殘月幾人行衰鬢久已白旅懷空自清荒園有絡緯虛織竟何成虛廓寂寥具臻妙境縱筆三首録一首寂寂東坡一病翁白須蕭散滿霜風小兒誤喜朱顔在一笑那知是酒紅容齊五筆曰樂天詩云醉貌如霜葉雖紅不是春坡則曰小兒誤喜朱顔在一笑那知是酒紅采舊公案而機杼一新前無古人於是為至貧家淨掃地貧家淨掃地貧女好梳頭下士晚聞道聊以拙自修扣門有佳客一飯相邀留春炊勿草草此客未易偷慎勿用勞薪感我如薰蕕德人抱衡石銖黍安可庾起二語瞥空而入是詩家興體庚辰嵗人日作時聞黃河已復北流老臣舊數論此今斯言乃驗二首録一首老去仍棲隔海村夢中時見作詩孫天涯已慣逢人日歸路猶欣過鬼門三策已應思賈讓孤忠終未赦虞翻典衣剩買河源米屈指新篘作上元方回曰前輩論詩文謂子美䕫州後詩東坡嶺外文老筆愈勝少作而中年亦未若晚年也此詩元符三年東坡年六十五謫居儋耳所作人日鬼門之對極工劉辰翁曰夢中時見作詩孫此句為仲虎發也陸務觀云在蜀見蘇山藏公墨迹叠韻詩後題云寄作詩孫符符字仲虎施元之曰神宗元豐四年澶州言河決小吳掃詔東行河道已填淤不可復更不修閉哲宗元祐三年安燾等疏議回河東流文忠烈吕正愍從而和之力主其議子由在西掖言於吕正獻曰河決而北先帝不能回而諸公欲回之是自謂過先帝也正獻曰當與公籌之然竟莫能奪其役遂興議論紛然至於纍嵗公嘗侍上讀祖宗寶訓因及時事曰黃河勢方北流而强之使東當局者恨之老臣舊數論此指此事也庚辰嵗正月十二日天門冬酒熟豫自漉之且漉且嘗遂以大醉二首録一首自撥牀頭一甕雲幽人先已醉濃芬天門冬熟新年喜麴米春香並舍聞自注杜子美詩云聞道雲安麴米春蓋酒名也菜圃漸疏花漠漠竹扉斜掩雨紛紛擁裘睡覺知何處吹面東風散纈文花雨於醉中見之别饒情趣汲江煎茶活水還須活火烹自注唐人云茶須緩火炙活火煎自臨釣石取深清大瓢貯月歸春甕小杓分江入夜瓶茶雨己翻煎處腳松風忽作瀉時聲枯腸未易禁三碗坐聽荒城長短更舒促離合若風湧雲飛楊萬里輩曲為疏解似反失其趣指苕溪漁隱叢話曰此詩竒甚道盡烹茶之要且茶非活水則不能發其鮮馥東坡深知此理矣楊萬里曰東坡煎茶詩云活水還須活火烹自臨釣石汲深清第二句七字而具五意水清一也深處取清者二也石下之水非有泥土三也石乃釣石非尋常之石四也東坡自汲非遣卒奴五也大瓢貯月歸春甕小杓分江入夜瓶其狀水之清美極矣分江二字此尤難下雪乳已翻煎處腳松風忽作瀉時聲此倒語也尤為詩家妙法即少陵紅稍啄餘鸚鵡粒碧梧棲老鳳凰枝也枯腸未易禁三碗卧聽山城長短更又翻却盧同公案同喫到七碗坡不禁三碗山城更漏無定長短二字有無窮之味豫來儋耳得吠狗曰烏觜甚猛而馴隨豫遷合浦過澄邁泅而濟路人皆驚戲為作此詩烏啄本海獒幸我為之主食餘已瓠肥終不憂鼎俎晝馴識賔客夜悍為門戶知我當北還掉尾喜欲舞跳浪趁童僕吐舌喘汗雨長橋不肯躡徑渡清深浦拍浮似鵝鴨登岸劇虓虎盜肉亦小疵鞭箠當貰汝再拜謝厚恩天不遣言語何當寄家書黃耳定乃祖一時戲筆摹繪入情至盜肉亦小疵鞭箠當貰汝一句其寓意者深矣澄邁驛通潮閣二首倦客愁聞歸路遙眼明飛閣俯長橋貪看白鷺橫秋浦不覺青林沒晚潮餘生欲老海南村帝遣巫陽招我魂杳杳天低鶻沒處青山一髮是中原羈望深情含藴無際苕溪漁隱叢話曰通潮閣詩云杳杳天低鶻沒處青山一髮是中原伏波將軍廟碑有云南望連山若有若無杳杳一髮耳其語倔竒兩用之蓋得意也六月二十日夜渡海參橫斗轉欲三更苦雨終風也解晴雲散月明誰㸃綴天容海色本澄清空餘魯叟乘桴意粗識軒轅奏樂聲九死南荒吾不恨兹逰竒絶冠平生髙濶空明非實身有仙骨莫能有其隻字方回曰紹聖四年丁丑東坡在惠州年六十二矣五月再謫瓊州别駕昌化軍安置即儋耳也以六月二十日夜渡海七月十三日至儋州或謂尾句太過無省愆之意殊不然也章子厚蔡卞欲殺之而處之怡然當此老境無怨無怒以為兹逰竒絶真了生死輕得喪天人也次韻王鬱林晚塗流落不堪言海上春泥手自翻漢使節空餘皓首故侯瓜在有頽垣平生多難非天意此去殘年盡主恩誤辱使君相抆拭寧聞老鶴更乘軒忠厚悱惻大雅遺音藤州江下夜起對月贈邵道士江月照我心江水洗我肝端如徑寸珠墮此白玉盤我心本如此月滿江不湍起舞者誰歟莫作三人看嶠南瘴毒地有此江月寒乃知天壤間何人不清安牀頭有白酒盎若白露漙獨醉還獨醒夜氣清漫漫仍呼邵道士取琴月下彈相將乘一葉夜下蒼梧灘舒元輿序白一篇只辦形容擬議猶是日下孤燈伎倆此詩乃能證出妙明心直是照天照地廣倅蕭大夫借前韻見贈復和答之二首録一首生還粗勝虞蚤退不如疏垂死初聞道平生誤信書風濤驚夜半疾病送災餘賴有蕭夫子幽懷得少攄軾詩好用古人姓壓韻前人有譏之者若此詩起二句亦是習氣未除而格韻則髙堅於晚節矣次韻韶倅李通直二首録一首一篇瀧吏可書紳莫向長沮更問津老去常憂伴新鬼歸來且喜是陳人曽陪令尹蒼髯古又見郎君白髮新回首天涯一惆悵郤登梅嶺望楓宸李伯時畫其弟亮功舊隱宅圖樂天蚤退今安有摩詰長閒古亦無五畝自栽池上竹十年空看輞川圖近聞陶令開三徑應許揚雄寄一區晚嵗與君同活計如雲鵝鴨散平湖池上承樂天句輞川承摩詰句陶令比李揚雄自喻一意直下舒展自如斯為律詩神境贈嶺上老人鶴骨霜髯心己灰青松合抱手親栽問翁大庾嶺頭住曽見南遷幾箇回髙朗得青蓮之一體娛書堂詩話曰東坡還至庾嶺上少憩村店有一老翁出問從者曰官為誰曰蘇尚書曰是蘇子瞻歟曰是也乃前揖坡曰我聞人害公者百端今日北歸是天祐善人也東坡笑而謝之因題此詩於壁豫昔過嶺而南題詩龍泉鐘上今復過而北次前韻秋風卷黃落朝雨洗緑淨人貪歸路好節近中原正下嶺獨徐行艱嶮未敢忘遙知叔孫子已致魯諸生刻意斫削節短而味長陸游曰建中初韓曽二相得政盡收用元祐人其不召者亦補大藩惟東坡兄弟猶領宫祠末句蓋寓所謂不能致者二人意深語緩尤未易窺測過嶺二首暫著南冠不到頭郤隨北雁與歸休平生不作兔三窟今古何殊貉一丘當日無人送臨賀至今有廟祀潮州劍關西望七千里乘興真為玉局游七年來往我何堪又試曹溪一勺甘夢裡似曽遷海外醉中不覺到江南波生濯足鳴空澗霧繞征衣滴翠嵐誰遣山雞忽驚起半嵓花雨落毿毿視遷謫猶醉夢中知其胸中别有澄定者在方回曰紹聖元年甲戌貶惠州四年丁丑貶儋耳明年元豐戊寅改元三年庚辰量移廉州永州自便凡七年楊憑貶臨賀尉惟徐晦送之此事極切夢裏似曽遷海外此聨甚佳殊不以遷謫為意也留題顯聖寺渺渺疏林集晚鴉孤村烟火梵王家幽人自種千頭橘逺客來尋百結花浮石已乾霜後水焦坑閒試雨前茶秖疑歸夢西南去翠竹江村繞白沙歇白塔鋪甘山廬阜鬱長望林隙依稀漏日光吳國晚蠶初斷葉占城蚤稻欲移秧迢迢澗水隨人急冉冉巖花撲馬香望眼儘從飛鳥逺白雲深處是吾鄉鬱孤臺自注再過䖍州和前韻吾生如寄耳嶺外亦閒遊贛石三百里寒江尺五流楚山微有霰越瘴久無秋望斷橫雲嶠魂飛咤雪洲曉鐘時出寺暮鼓各鳴樓歸路迷千嶂勞生閲百州不隨猿鶴化甘作賈胡留秖有貂裘在猶堪買釣舟深穩之至彌出清新吾生如寄耳一句集中屢見其橫溢固不屑屑於此也次韻江晦叔二首録一首鐘鼓江南岸歸來夢自驚浮雲世事改孤月此心明雨已傾盆落詩仍翻水成二江爭送客木杪看橋橫冲襟內盎見於文詞無不邃然入理苕溪漁隱叢話曰東坡自嶺外歸次韻江晦叔云浮雲世事改孤月此心明語意髙妙如參禪悟道之人吐露胸襟無一毫窒礙也困學紀聞曰浮雲世事改孤月此心明坡公晚年所造深矣更無栁絮隨風起惟有葵花向日傾見司馬公之心浮雲世事改孤月此心明見東坡公之心寒日與器之遊南塔寺寂照堂城南鐘鼓鬬清新端為投荒洗瘴塵總是鏡空堂上客誰為寂照境中人紅英掃地風驚曉緑葉成隂雨洗春記取明年作寒食杏花曽與此翁鄰花落木榮不言人事而人事之變遷自見寄慨良深贈詩僧道通雄豪而妙苦而腴秖有琴聰與蜜殊自注錢塘僧思聰總角善琴後捨琴而學詩復棄詩而學道其詩似皎然而加雄放安州僧仲殊詩敏捷立成而工妙絶人殊辟穀常啖蜜語帶烟霞從古少自注李太白云他人之文如山無烟霞春無草木氣含蔬筍到公無自注謂無酸饀氣也香林乍喜聞薝蔔古井惟慙斷轆轤為報韓公莫輕許從今島可是詩奴氣含蔬筍祗是以諧語入詩遂成千古名論世之開堂為人者能得斯意定知兔園四六敗簏時文撮合補綴不足為支那撰述而具正法眼藏者即如不搽紅粉也風流只要檀郎認得聲等句皆為解第一義也石林詩話曰唐詩僧中葉以後其名字班班為時所稱者甚多然詩皆不傳如經來白馬寺僧到赤烏年數聨僅見文士所録而已陵遲至貫休齊已之徒其詩雖存然無足言矣中間惟皎然最為傑出故其詩十卷獨全亦無甚過人處近世僧學詩者極多皆無超然自得之氣往往反拾掇摸效士大夫所殘棄又自作一種體格律尤凡俗世謂之酸饀氣子瞻贈惠通詩云語帶烟霞從古少氣含蔬筍到公無嘗語人曰頗解蔬語否為無酸饀氣也聞者莫不大笑西清詩話曰東坡言僧詩要無蔬筍氣固詩人龜鑑今時誤解便作世網中語殊不知本分家風水邊林下氣象蓋不可無若盡洗去清拔之韻便與俗同科又何足尚竹坡詩話曰思聰杭州孤山僧東坡倅杭令和參寥子昏字韻詩云千㸃亂山橫紫翠一鈎新月掛黃昏大加稱賞大觀政和間俠琴遊梁日登中貴人之門久之遂還俗為御前使臣方其將冠巾也蘇叔黨因浙僧入都送之詩云試誦北山移為我招琴聰詩至已無及矣豫昔作壺中九華詩其後八年復過湖口則石已為好事者取去乃和前韻以自解云江邊陳馬走千峰問訊方知冀北空尤物已隨清夢斷自注劉夢得以九華為造物一無物真形猶在畫圖中自注道藏有五嶽真形圖歸來晚嵗同元亮郤掃何人伴敬通賴有銅盆修石供仇池玉色自璁瓏自注家有銅盆貯仇池石正緑色有洞水達背豫人嘗以怪石供佛印師作怪石供一篇次韻郭功甫二首録一首蚤知臭腐即神竒海北天南總是歸九萬里風安稅駕雲鵬今悔不卑飛以摘宦為摶扶擬卑飛於厚祿偶露不平之鳴翻案獨絶林子仁曰功甫觀先生畫雪雀有感作詩寄惠州云平生才力信瑰竒今在窮荒豈易歸正似雪林枝上畫羽翰雖好不能飛後先生北歸人用前韻寄詩云秋霜春雨不同時萬里今從海外歸已出網羅毛羽在却尋雲跡帖天飛今次其韻也宋復古畫瀟湘晚景圖三首西征憶南國堂上畫瀟湘照眼雲山出浮空野水長舊游心自省信手筆都忘㑹有衡陽客來看意渺茫落落君懷抱山川自屈蟠經營初有適揮灑不應難江市人家少烟村古木攢知君有幽意細細為尋看咫尺殊非少隂晴自不齊徑蟠趨後崦水㑹赴前溪自說非人意曽經入馬蹄他年宦遊處應話劍山西首篇言畫之梗概終篇言畫之曲折中篇乃以前四句承上後四句起下結搆森嚴不但霞絢氷瑩獨標瓌頴嘲子由堆几盡埃簡攻之如蠧蟲誰知聖人意不在古書中正是讀書萬卷人語不悅學者不能道通雅稱馮開之云讀書太樂則漫太苦則澀董遇之百遍考亭之半日淵明之不求甚解東坡之每事一過其各得於輪扁之甘苦者乎數語可為此詩注腳第五橋白露淒風洗瘴烟夢回相對兩淒然雀羅廷尉非當日鳩杖先生愈少年世事飽諳思縮手主恩未報耻歸田誰憐第五橋東水獨照台州老鄭䖍五六一聨詞意深厚軒窗東鄰多白楊夜作雨聲急窗下獨無眠秋蟲見燈入魚湖上移魚子初生不畏人自從識鈎餌欲見更無因御選唐宋詩醇卷四十一
