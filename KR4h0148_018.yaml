front:
  text: 欽定四庫全書御選唐宋詩醇卷八
  hash: sha256:4ecffdcf19c7c172badaece1ccd4f88e337f029236e3ab2890ccea836f678d0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_018-1a, image: WYG1448/WYG1448-0189a.png}
body:
  text: 隴西李白詩八目録夜泊黃山聞殷十四吳吟宿蝦湖蘇臺覽古越中覽古峴山懷古經下邳圮橋懷張子房金陵陪宋中丞武昌夜飲懷古望鸚鵡洲懷禰衡宿巫山下金陵白楊十字巷謝公亭夜泊牛渚懷古尋髙鳳石門山中元丹丘月下獨酌春歸終南山松龕舊隱尋山僧不遇作待酒不至獨酌友人會宿春日獨酌二首金陵江山遇蓬池隱者山中與幽人對酌春日醉起言志廬山東林寺夜懷尋雍尊師隱居與史郎中欽聽黃鶴樓上吹笛對酒獨坐敬亭山自遣訪戴天山道士不遇秋日與張少府楚城韋公藏書髙齋作憶東山望月有懷對酒憶賀監重憶效古二首擬古感興秋夕旅懷尋陽紫極宫感秋作秋夕書懷荆州賊平臨洞庭言懷作江南春懷聽蜀僧濬彈琴初出金門尋王侍御不遇詠壁上鸚鵡觀元丹丘坐巫山屏風見野草中有曰白頭翁者流夜郎題葵葉瑩禪師房觀山海圖白鷺鷥詠桂巫山枕障勞勞亭嘲魯儒春夜洛城聞笛宣城見杜鵑花白田馬上聞鶯三五七言雜詩寄逺長門怨陌上贈美人閨情怨情湖邉採蓮婦怨情代寄情楚辭體學古思邉别內赴徴自代內贈越女詞巴女詞自溧水道哭王炎哭宣城善釀紀叟題舒州司空山瀑布上清寶鼎詩
  hash: sha256:7a5edc0c8f2fdb268eff5dcab0a7129a9f13f218c00cbd03b565382d4125194f
