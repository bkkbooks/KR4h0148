body:
  text: 御選唐宋詩醇序文有唐宋大家之目而詩無稱焉者宋之文足可以匹唐而詩則實不足以匹唐也既不足以匹而必為是選者則以唐宋文醇之例有文醇不可無詩醇且以見二代盛衰之大凡示千秋風雅之正則也文醇之選就向日書忩校閲所未畢付張照足成者兹詩醇之選則以二代風華此六家為最時於幾暇偶一涉獵而去取評品皆出於梁詩正等數儒臣之手夫詩與文豈異道哉昌黎有言氣盛則言之短長與聲之髙下皆宜然五三六經之所傳其以言訓後世者不以文而以詩豈不以文尚有鋪張揚厲之跡而詩則優游饜飫入人者深是則有文醇尤不可無詩醇也六家品格與時㑹所遭各見於本集小序是編彚成梁詩正等請示其梗概故為之總敘如此凡例一唐宋人以詩鳴者指不勝屈其卓然名家者猶不減數十人兹獨取六家者謂惟此足稱大家也大家與名家猶大將與名將其體假正自不同李杜一時瑜亮固千古希有若唐之配白者有元宋之繼蘇者有黃在當日亦幾角立爭雄而百世論定則微之有浮華而無忠愛魯直多生澀而少渾成其視白蘇較遜退之雖以文為詩要其志在直追李杜實能拔竒於李杜之外務觀包含宏大亦猶唐有樂天然則騷壇之大將旗鼓舍此何適矣一大家全力多於古詩見之就近體而論太白便不肯如子美之加意布置昌黎竒傑之氣尤不耐束縛東坡才博又似不免輕視故篇體常近於率惟白陸於古今體間庶無偏向耳意向既殊多寡亦異而選詩者之進退因之正不强為均齊也一六家詩集中白陸最大别擇較難斷以風人之義多取其有為而作者録之顧其憂深思逺隨處感發寄興之作亦美不勝收佳處領要則又芟其復而拔其尤探得驪珠固不屑屑於一鱗片甲耳一李杜名盛而傳久是以評賞家特多韓白同出唐時而名不逮韓之見重尤後於白則品論之詞故應遞減蘇陸在宋年代既殊名望亦復不敵晚出者評語更寥寥矣多者擇而取之少者不容傅㑹折衷一定聲價自齊燕瘦環肥初不以粧飾之濃淡為妍媸也一評語悉準唐宋文醇之例色别書之但其中有援據正史雜說用資考訂疏解者與古今人評詩之語義各有在文醇未經區别今於藍筆之外另作緑筆書以便閲者燦若列眉一舊時評語考證有錯謬者例應削去特恐沿襲既久或謂是編偶不及載而終不識其非轉致遺誤無巳故仍録之而加駁正焉
