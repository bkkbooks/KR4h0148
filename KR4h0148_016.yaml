front:
  text: 欽定四庫全書御選唐宋詩醇卷七
  hash: sha256:68cd23973d372cc0f2fe0852dc182e218d081547ace00ed5beb856d837d2c5f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_016-1a, image: WYG1448/WYG1448-0171a.png}
body:
  text: 隴西李白詩七目録送楊山人歸嵩山送殷淑送范山人歸泰山送友人送友人入蜀送張秀才謁髙中丞餞校書叔雲與諸公送陳郎將歸衡陽賦得白鷺鷥送宋少府入三峽宣州謝朓樓餞别校書叔雲涇川送族弟錞送崔氏昆季之金陵登黃山凌敲臺送族弟溧陽尉濟充泛舟赴華隂得齊字送儲雍之武昌早秋單父南樓酬竇公衡山中問答答友人贈烏紗帽答長安崔少府叔封遊終南翠微寺太宗皇帝金沙泉見寄酬崔五郎中金門答蘇秀才答髙山人兼呈權顧二侯逰南陽白水登石激作逰南陽清泠泉尋魯城北范居士失道落蒼耳中見范置酒摘蒼耳作逰泰山六首下終南山過斛斯山人宿置酒陪從祖濟南太守泛鵲山湖宿鄭參卿山池遊謝氏山亭把酒問月金陵鳯凰臺置酒陪侍郎叔逰洞庭醉後夜泛洞庭尋裴侍御清酌陪族叔刑部侍郎曄及中書賈舍人至逰洞庭登單父陶少府半月臺天台曉望焦山望寥山杜陵絶句登太白峰秋日登揚州西靈塔登瓦官閣登梅岡望金陵贈族姪髙座寺僧中孚登金陵鳯凰臺望廬山瀑布水二首登廬山五老峰江上望𤾂公山鸚鵡洲秋登巴陵望洞庭與夏十二登嶽陽樓登巴陵開元寺西閣贈衡嶽僧方外與賈舍人至於龍興寺剪落梧桐枝望灉湖秋登宣城謝朓北樓望天門山過崔八丈水亭之廣陵宿常二南郭幽居客中行太原早秋奔亡道中荆門浮舟望蜀江上三峽自巴東舟行經瞿唐峽登巫山最髙峰晚還題壁早發白帝城秋下荆門江行寄逺
