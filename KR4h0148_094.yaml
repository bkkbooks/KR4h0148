front:
  text: 欽定四庫全書御選唐宋詩醇卷四十六
  hash: sha256:9423d20c5ae3b9f8f9e8c2a4ee8bdfacc2d35f845917bfd79de32cc5991baac5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_094-1a, image: WYG1448/WYG1448-0902a.png}
body:
  text: 山陰陸遊詩五目録東村散步有懷張漢州將軍行古别離望夫石古别離偶懷小益南鄭之間帳然有賦欲出遇雨看鏡夜分不寐起坐園中至旦步至湖上寓小舟還舍箜篌謡寄季長少卿悶極有作三峽歌贈道流艾如張郊行夜歸書觸目嵗暮感懷山園雜詠雨夜書感春晚雜興夜歸三月十一日郊行路傍曲秋夜舍北晚眺初冬感懷聞雁枕上偶成舍北間望作六字絶句雨夜有懷張季長少卿客言來自上臯道中以其語作一絶殘臘懷舊幽居初夏晨起六月二十四日夜分夢范至能李知幾尤延之同集江亭諸公請豫賦詩記江湖之樂詩成而覺忘數字而已題韓運鹽竹隱堂絶句舟中詠落景餘清暉輕橈弄溪渚之句蓋孟浩然耶溪泛舟詩也因以其句為韻賦詩秋夜紀懷舍北搖落景物殊佳偶作夜坐隴頭水書志書憤小舟遊西涇度西岡而歸春行間身舍北行飯書觸目雪夜感舊雜感蘭感舊露坐新秋秋夕露坐作感秋新涼豐嵗小舟過吉澤效王右丞秋晴見天際飛鴻有感戊午重九舟中冬日感興十韻菴中晨起書觸目春日小園雜賦沈園讀晉書春晴自雲門歸三山夜聞姑惡讀前輩詩文有感讀隱逸傳秋陰秋懷秋思冬晴與子坦子聿遊湖上齋中弄筆偶書示子聿夢中作遊山絶句北望感懷人日東園枕上作長干行小橋觀畫山水示友十月梅花對酒戲詠先少師宣和初有贈朝公以道詩云奴愛才如蕭穎士婢知詩似鄭康成朝公大愛賞今逸全篇偶讀朝公文集泣而足之追感往事
  hash: sha256:0ee1ffa7c7fde594f8d0604b20655a0801013e3c11db58d82d2700f3c46830a1
