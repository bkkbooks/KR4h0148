  text: 欽定四庫全書御選唐宋詩醇卷四十五
  hash: sha256:f0f172a359e2259f271778e7782a9ae218ebd75ef90a011fac1dc9b4077134e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_092-1a, image: WYG1448/WYG1448-0883c.png}
body:
  text: 山隂陸游詩四目録秋興三江舟中大醉作樊江晚泊秋夕秋雨排悶十韻寄題朱元晦武彛精舍長安道村舍幽居感懷遲莫自若耶溪舟行杭鏡湖而歸骨相感憤晚出偏門過杜浦橋莊器之作招隱閣項平父諸人賦詩豫亦繼作溪上醉吟雨中泊舟蕭山縣驛初夏遊凌氏小園題少陵畫像初冬雜題小雨題徐淵子環碧亭亭有茶山曽先生詩臨安春雨初霽飲張功父園戲題扇上小舟過御園春遊絶句雨後夜汲新霽城南舟中夜興丙午五月大雨五日不止鏡湖渺然想見湖未廢時有感而賦早自烏龍廟歸齊中閒咏秋雨北榭作焉耆行園中絶句晨過天慶出城夜登千峰榭秋興余年二十時嘗在菊枕詩頗傳於人今秋偶復采菊縫枕囊悽然有感東吳女兒曲有為豫言烏龍髙嶮不可到處有僧巖居不知其年豫每登千峰榭望之慨然為作詩楚宫行妾命薄四鼓酒醒起步庭下秋霽採藥塞上曲送潘德久使薊門夜歸磚街菴書事送張野夫寺丞牧滁州夜歸偶懷故人獨孤景略月下小酌鄰曲有未飯被追入郭者憫然有作題湖邉旗亭寓懷題千秋觀懷賀亭樊江練塘歸次樊江泛湖至東涇村居初夏東關七月一日夜坐舍北水涯戲作以事至城南書觸目梅花集句題瑩上人二畫剡溪吳江山家莫春自詠蓬萊館午憩夢遊散關渭水之間秋夜荷花秋興新晴舍北望水鄉風物戲作絶句禹跡寺南有沈氏小園四十年前嘗題小闋壁間偶復一到而園已易主刻小闋於石讀之悵然小園夜讀范至能攬轡録言中原父老見使者多揮涕感其事作絶句醉卧松下短歌探梅題四仙像冬晴閒步東村由故塘還舍作夜聞湖中漁歌村夜野意憶昔感懷
