front:
  text: 欽定四庫全書御選唐宋詩醇卷三十八
  hash: sha256:5e63103f00f15df4148a16ac7d40f0a3e70cda1a78d2d7a174e0312d519327ac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_078-1a, image: WYG1448/WYG1448-0736a.png}
body:
  text: 眉山蘇軾詩七目録泗州南山監倉蕭淵東軒二首寄蘄簟與蒲傳正贈眼醫王生彥若觀杭州鈐轄歐育刀劍戰袍王伯揚所藏趙昌花四首梅花黃葵芙蓉山茶書林逋詩後溪隂堂送穆越州金山妙髙臺贈杜介送楊傑次韻送徐大正楊康功有石狀如醉道士為賦此詩海市過萊州雪後望三山次韻胡完夫送范純粹守慶州惠崇春江晚景二首録一首次韻完夫再贈之什某已卜居毗陵與完夫有廬里之約云次韻朱光庭初夏送賈訥倅眉二首録一首題文與可墨竹武昌西山趙令晏崔白大圖幅徑三丈次韻劉貢父西省種竹軾以去嵗春夏侍立邇英而秋冬之交子由相繼入侍次韻絶句四首各述所懷録一首郭熙畫秋山平逺次韻張昌言喜雨書朝補之所藏與可畫竹二首録二首書李世南所畫秋景二首録一首書鄢陵王主簿所畫折枝二首故李誠之待制六丈挽詞九月十五日邇英講論語終篇賜執政講讀史官燕於東宫又遣中使就賜御書詩各一首臣軾得紫薇花絶句其詞云絲綸閣下文書靜鐘鼓樓中刻漏長獨坐黃昏誰是伴紫薇花對紫薇郎翌日各以表謝又進詩一篇臣軾詩云獲鬼章二十韻和王晉卿次韻劉貢父叔姪扈駕和子由除夜元日省宿致齋三首次韻黃魯直畫馬試院中作余與李豸方叔相知久矣領貢舉事而李不得第愧甚作詩送之慶源宣義王丈以纍舉得官為洪雅主簿雅州户掾遇吏民如家人人安樂之既謝事居眉之青神瑞草橋放懷自得有書來求紅帶既以遺之且作詩為戲請黃魯直秦少遊各為賦一首為老人光華送錢穆父出守越州二首卧病逾月請郡不許復直玉堂十一月一日鎖院是日苦寒詔賜官燭法酒書呈同院木山送千乘千能兩姪還鄉
