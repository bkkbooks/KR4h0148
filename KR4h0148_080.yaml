front:
  text: 欽定四庫全書御選唐宋詩醇卷三十九
  hash: sha256:910000d499cf413b520de05bbebf4bcf25a7be27e97a4cafa20580ed7d249931
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_080-1a, image: WYG1448/WYG1448-0758a.png}
body:
  text: 眉山蘇軾詩八目録次韻王定國得晉卿酒相留夜飲書王定國所藏烟江疊嶂圖王晉卿所藏著色山二首録一首王晉卿作烟江疊嶂圖僕賦詩十四韻晉卿和之語特竒麗因復次韻不獨紀其詩畫之美亦為道其出處契濶之故而終之以不忘在莒之戒亦朋友忠愛之義也夜直玉堂擕李之儀端叔詩百餘首讀至夜半書其後次韻秦少章和錢䝉仲去杭州十五年復遊西湖用歐陽察判韻送子由使契丹文登蓬萊閣下石壁千丈為海浪所戰時有碎裂淘灑嵗久皆圓熟可愛土人謂此彈子渦也取數枚以養石菖蒲且作詩遺垂慈堂老人參寥上人初得智果院㑹者十六人分韻賦詩得心字故周茂叔先生濓溪次韻子由使契丹至涿州見寄四首録二首次韻劉景文周次元寒食同遊西湖次韻林子中王彥祖唱酬夀星院寒碧軒題楊公春蘭次韻曹輔寄壑源試焙新芽次韻劉景文登介亭袁公濟和復次韻答之安州老人食蜜歌次韻蘇伯固主簿重九次韻楊公濟梅花十首録二首贈劉景文再和楊公濟梅花十絶録二首豫去杭十六年而復來留二年而去平生自覺出處老少粗似樂天雖才名相逺而安分寡求亦庶幾焉三月六日來别南北山諸道人而下天竺惠淨師以醜石贈行作三絶句贈武道士彈賀若元祐六年六月自杭州召還汶公館我於東堂閲舊詩卷次諸公韻三首西湖秋涸東池魚窘甚因㑹客呼網師遷之西池為一笑之樂夜歸被酒不能寐戲作放魚一首復次放魚韻答趙承議陳教授九月十五日觀月聽琴西湖示坐客泛潁韓退之孟郊墓銘云以昌其詩舉此問王定國當昌其身耶昌其詩也來詩下語未契作此答之聚星堂雪次前韻送劉景文次韻趙景貺春思且懷吳越山水小飲西湖懷歐陽叔弼兄弟贈趙景貺陳履常送路都曹送運判朱朝奉入蜀淮上早發在潁州與德麟同治西湖未成改揚州三月十六日湖成德麟有詩見懷次其韻雙石次韻蘇伯固遊蜀岡送李孝博奉使嶺表行宿泗間見徐州張天驥次舊韻近以月石硯屏獻子功中書公復以涵星研獻純父侍講子功有詩純父未也復以月石風林屏贈之謹和子功詩并求純父數句次韻范純父涵星研月石風林屏詩
