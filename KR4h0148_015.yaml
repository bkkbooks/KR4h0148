front:
  text: 欽定四庫全書御選唐宋詩醇卷六
  hash: sha256:264424fd541fc2d312f7a1456a155ce0f377c9f0142f3e7a5029f1bda01bf753
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_015-1a, image: WYG1448/WYG1448-0155c.png}
body:
  text: 隴西李白詩六獻從叔當塗宰陽氷金鏡霾六國亡新亂天經焉知髙光起自有羽翼生蕭曹安􅒈屼耿賈摧欃槍吾家有季父傑出聖代英雖無三台位不借四豪名激昻風雲氣終協龍虎精弱冠燕趙來賢彥多逢迎魯連善談笑季布折公卿遙知禮數絶常恐不合并惕想結宵夢素心久已冥顧慙青雲器謬奉玉樽傾山陽五百年緑竹忽再榮髙歌振林木大笑喧雷霆落筆灑篆文崩雲使人驚吐辭又炳煥五色羅華星秀句滿江國髙才掞天庭宰邑艱難時浮雲空古城居人若剃草掃地無纎莖惠澤及飛走農夫盡歸耕廣漢水萬里長流玉琴聲雅頌播吳越還如泰階平小子别金陵來時白下亭羣鳯憐客鳥差池相哀鳴各拔五色毛意重泰山輕贈微所費廣斗水澆長鯨彈劎歌苦寒嚴風起前楹月銜天門曉霜落牛渚清長歎即歸路臨川空屏營贈汪倫李白乘舟將欲行忽聞岸上踏歌聲桃花潭水深千尺不及汪倫送我情楊齊賢曰白逰涇縣桃花潭村人汪倫常醖美酒以待白倫之裔孫至今寶其詩安陸白兆山桃花嵒寄劉侍御綰雲卧三十年好間復愛仙蓬壺雖冥絶鸞鶴心悠然歸來桃花嵒得憩雲窗眠對嶺人共語飲潭猿相連時升翠微上邈若羅浮巔兩岑抱東壑一嶂橫西天樹雜日易隱崖傾月難圓芳草換野色飛蘿搖春煙入逺構石室選幽開上田獨此林下意杳無區中緣永辭霜臺客千載方來旋此等篇詠與鮑參軍謝宣城自是神合不徒形似淮南卧病書懷寄蜀中趙徵君蕤吳會一浮雲飄如逺行客功業莫從就嵗光屢奔迫良圗俄棄捐衰疾乃綿劇古琴藏虛匣長劎挂空壁楚冠懷鍾儀越吟比莊舄國門遙天外鄉路逺山隔朝憶相如臺夜夢子雲宅旅情初結緝秋氣方寂歷風入松下清露出草間白故人不可見幽夢誰與適寄書西飛鴻贈爾慰離析亦是宣城一派視移病還園示親屬詩有過之無不及也楊慎曰太白渡荆門詩仍連故鄉水萬里送行舟送人之羅浮詩爾去之羅浮余還憩峨嵋及此詩國門遙天外四句皆寓鄉思楊慎曰趙蕤梓州人精於數學蘇頲薦西蜀人才云趙蕤術數李白文章宋人注李詩遺其事望終南山寄紫閣隱者出門見南山引領意無限秀色難為名蒼翠日在眼有時白雲起天際自舒卷心中與之然託興每不淺何當造幽人滅迹棲絶巘淡雅自然處神似淵明白雲天際無心舒卷白詩妙有其意秋夜宿龍門香山寺奉寄王方城十七丈奉國營上人從弟幼成令問朝發汝海東暮棲龍門中水寒夕波急木落秋山空望極九霄逈賞幽萬壑通目皓沙上月心清松下風玉斗橫網户銀河耿花宫興在趣方逸歡餘情未終鳯駕憶王子虎溪懷逺公桂枝坐蕭瑟棣華不復同流恨寄伊水盈盈焉可窮沙丘城下寄杜甫我來竟何事髙卧沙丘城城邉有古樹日夕連秋聲魯酒不可醉齊歌空復情思君若汶水浩蕩寄南征白與杜甫相知最深飯顆山頭一絶本事詩及酉陽雜俎載之蓋流俗傳聞之説白集無是也鮑庾隂何詞流所重李杜實嘗宗之特所成就者大不寄其籬下耳安得以為譏議之辭乎甫詩及白者十餘見白詩亦屢及甫即此結語情亦不薄矣世俗輕誣古人往往類是尚論者當知之鍾惺曰一片真氣沈德潛曰有餘地有餘情此詩家正聲也浮淺者以為無味淮隂書懷寄王宗城沙墩至梁苑二十五長亭大舶夾雙櫓中流鵝鸛鳴雲天掃空碧川嶽涵餘清飛鳬從西來適與佳興并眷言王喬舄婉孌故人情復此親懿會而增交道榮沿洄且不定飄忽悵徂征暝投淮隂宿欣得漂毋迎斗酒烹黃雞一餐感素誠豫為楚壯士不是魯諸生有德必報之千金耻為輕緬書羇孤意逺寄棹歌聲一起真有萬夫之稟吕本中稱此篇與關山月為氣雄一世非虛言也聞王昌齡左遷龍標遙有此寄楊花落盡子規啼聞道龍標過五溪我寄愁心與明月隨風直到夜郎西胡應麟曰此詩及下江陵洛陽聞笛望天門山等作真有揮斥八極凌厲九霄之意沈德潛曰即將心寄明月流影入君懷之意出以搖曳之筆語意一新憶舊逰寄譙郡元參軍憶昔洛陽董糟丘為余天津橋南造酒樓黃金白璧買歌笑一醉纍月輕王侯海內賢豪青雲客就中與君心莫逆回山轉海不作難傾情倒意無所惜我向淮南攀桂枝君留洛北愁夢思不忍别還相隨相隨迢迢訪仙城三十六曲水回縈一溪初入千花明萬壑度盡松風聲銀鞍金絡倒平地漢東太守來相迎紫陽之真人邀我吹玉笙餐霞樓上動仙樂嘈然宛似鸞鳯鳴袖長管催欲輕舉漢中太守醉起舞手持錦袍覆我身我醉橫眠枕其股當筵意氣凌九霄星離雨散不終朝分飛楚關山水遙余既還山尋故巢君亦歸家渡渭橋君家嚴君勇貔虎作尹并州遏戎虜五月相呼度太行摧輪不道羊腸苦行來北涼嵗月深感君貴義輕黃金瓊杯綺食青玉案使我醉飽無歸心時時出向城西曲晉祠流水如碧玉浮舟弄水簫鼓鳴微波龍鱗莎草緑興來携妓恣經過其若楊花似雪何紅粧欲醉宜斜日百尺清潭寫翠娥翠娥嬋娟初月輝美人更唱舞羅衣清風吹歌入空去歌曲自繞行雲飛此時行樂難再遇西逰因獻長楊賦北闕青雲不可期東山白首還歸去渭橋南頭一遇君酇臺之北又離羣問余别恨知多少落花春暮爭紛紛言亦不可盡情亦不可極呼兒長跪緘此辭寄君千里遙相憶白詩天才縱逸至於七言長古往往風雨爭飛魚龍百變又如大江無風波浪自湧白雲從空隨風變滅誠可謂怪偉竒絶者矣此篇最有紀律可循歷數舊逰純用序事之法以離合為經緯以轉折為節奏結構極嚴而神氣自暢至於竒情勝致使覽者應接不暇又其才之獨擅者耳唐汝詢曰此篇敘事四轉語若貫珠又非初唐牽合之比長篇當以此為法吳昌祺曰長篇步步竒崛蒼徑亦天然筆力也楊齊賢曰唐地理志亳州譙郡有鄼縣鄼才何切蕭何子孫所續封何所封音贊漢屬南陽郡月夜江行寄崔員外宗之飄飄江風起蕭颯海樹秋登艫美清夜挂席移輕舟月隨碧山轉水合青天流杳如星河上但覺雲林幽歸路方浩浩徂川去悠悠徒悲蕙草歇復聽菱歌愁岸曲迷後浦沙明瞰前洲懷君不可見望逺增離憂可謂工於發端警句亦直逼二謝宿白鷺洲寄楊江寧朝别朱雀門暮棲白鷺洲波光搖海月星影入城樓望美金陵宰如思瓊樹憂徒令魂入夢翻覺夜成秋緑水解人意為余西北流因聲玉琴裏蕩漾寄君愁節諧語警新林浦阻風寄友人潮水定可信天風難與期清晨西北轉薄暮東南吹以此難挂席佳期益相思海月破圓影菰蔣生緑池昨日北湖梅開花已滿枝今朝東門栁夾道垂青絲嵗物忽如此我來定幾時紛紛江上雪草草客中悲明發新林浦空吟謝朓詩起勢竒崛寄懷處不勝晼晚之歎寄韋南陵氷余江上乘興訪之遇尋顔尚書笑有此贈南船正東風北船來自緩江上相逢借問君語笑未了風吹斷聞君携妓訪情人應為尚書不顧身堂上三千珠履客甕中百斛金陵春恨我阻此樂淹留楚江濵月色醉逺客山花開欲然春風狂殺人一日劇三年乘興嫌太遲焚却子猷船夢見五栁枝已堪挂馬鞭何日到彭澤長歌陶令前語笑末了風吹斷畫出兩舟相遇情景鍾惺極賞其工題情深樹寄象公腸斷枝上猿淚添山下樽白雲見我去亦為我飛翻古意然必有所謂不必強解或以白雲為白虎引周處射虎事實之更屬紕繆北山獨酌寄韋六巢父將許由未聞買山隱道存迹自髙何憚去人近紛吾下兹嶺地間喧亦泯門橫羣岫開水鑿衆泉引屏高而在雲竇深莫能凖川光晝昏凝林氣夕凄緊於焉摘朱果兼得飬玄牝坐月觀寶書拂霜弄瑶軫傾壺事幽酌顧影還獨盡念君風塵遊傲爾令自哂鮑謝集中髙作寄東魯二稚子吳地桑葉緑吳蠶已三眠我家寄東魯誰種龜隂田春事已不及江行復茫然南風吹歸心飛墮酒樓前樓東一株桃枝葉拂青煙此樹我所種别來向三年桃今與樓齊我行尚未旋嬌女字平陽折花倚桃邊折花不見我淚下如流泉小兒名伯禽與姊亦齊肩雙行桃樹下撫背復誰憐念此失次第肝腸日憂煎裂素寫逺意因之汶陽川范杼曰天下喪亂骨肉分離此老杜詠懷入門號咷以下意也然彼合此離彼有哭其死此則憐其生彼兼時事此乃單咏要皆憂思之正者也沈德潛曰家常語瑣瑣屑屑彌見其真廣記曰太白於任城縣造酒樓其居在酒樓前獨酌清溪江石上寄權昭夷我携一樽酒獨上江祖石自從天地開更長幾千尺舉杯向天笑天回日西照永願坐此石長垂嚴陵釣寄謝山中人可與爾同調禪房懷友人岑倫自注時南逰羅浮兼泛桂海自春徂秋不返僕旅江外書情寄之嬋娟羅浮月搖艷桂水雲美人竟獨往而我安得羣一朝語笑隔萬里歡情分沉吟綵霞沒夢寐羣芳歇歸鴻渡三湘逰子在百粵邉塵染衣劎白日雕華髮春風變楚關秋聲落吳山草木結悲緒風沙淒苦顔朅來已永久頽思如循環飄飄限江裔想像空留滯離憂每醉心别淚徒盈袂坐愁青天末出望黃雲蔽目極何悠悠梅花南嶺頭空長滅征鳥水濶無還舟寶劎終難託金囊非易求歸來儻有問桂樹山之幽稱心而言意足而止情深語摯老筆紛披廬山謡寄盧侍御虛舟我本楚狂人鳯歌笑孔丘手持緑玉杖朝别黃鶴樓五嶽尋仙不辭逺一生好入名山逰廬山秀出南斗傍屏風九疊雲錦張影落明湖青黛光金闕前開二峰長銀河倒挂三石梁香爐瀑布遙相望回崖沓嶂凌蒼蒼翠影紅霞映朝日鳥飛不到吳天長登髙壯觀天地間大江茫茫去不還黃雲萬里動風色白波九道流雪山好為廬山謡興因廬山發間窺石鏡清我心謝公行處蒼苔沒早服還丹無世情琴心三疊道初成遙見仙人綵雲裏手把芙蓉朝玉京先期汗漫九垓上願接盧敖逰太清天馬行空不可羈紲桂臨川曰全篇開闔軼蕩冠絶古今即使工部為之未易及此髙岑輩恐亦脅息其襟期雄曠辭旨慷慨音節瀏亮無一不可春日歸山寄孟浩然朱紱遺塵境青山謁梵筵金繩開覺路寶筏度迷川嶺樹攢飛栱嵒花覆谷泉塔形標海月樓勢出江煙香氣三天下鐘聲萬壑連荷秋珠已滿松密蓋初圓鳥聚疑聞法龍參若護禪愧非流水韻叨入伯牙弦方回曰太白負不羈之才樂府大篇翕忽變化而律詩乃工夫縝密如此杜審言宋之問相伯仲道經三天者清微天禹餘天大赤天也流夜郎至西塞驛寄裴隱揚帆借天風水驛苦不緩平明及西塞已先投沙伴回巒引羣峰橫蹙楚山斷砯衝萬壑會震沓百川滿龍怪潛溟波俟時救災旱我行望雷雨安得霑枯散鳥去天路長人愁春光短空將澤畔吟寄爾江南管自漢陽病酒歸寄王明府去嵗左遷夜郎道琉璃硯水長枯稿今年敕放巫山陽蛟龍筆翰生輝光聖主還聽子虛賦相如却與論文章願掃鸚鵡洲與君醉百場嘯起白雲飛七澤歌吟淥水動三湘莫惜連船沽美酒千金一擲買春芳平生飛動意見爾不能無胸懷正復如此江夏寄漢陽輔録事誰道此水廣狹如一匹練江夏黃鶴樓青山漢陽縣大語猶可聞故人難可見君草陳琳檄我書魯連箭報國有壯心龍顔不回眷西飛精衛鳥東海何由填鼓角徒悲鳴樓船習征戰抽劎步霜月夜行空庭遍長呼結浮雲埋沒顧榮扇他日觀軍容投壺接髙宴早春寄王漢陽聞道春還未相識走傍寒梅訪消息昨夜東風入武陽陌頭楊栁黃金色碧水浩浩雲茫茫美人不來空斷腸預拂青山一片石與君連日醉壺觴秀骨天成偶然涉筆無不入妙江上寄元六林宗霜落江始寒楓葉緑未脫客行悲清秋永路苦不達滄波眇川汜白日隱天末停棹依林巒驚猿相叫聒夜分河漢轉起視溟漲濶涼風何蕭蕭流水鳴活活浦沙淨如洗海月明可掇蘭交空懷思瓊樹詎解渴朂哉滄洲心嵗晚庶不奪幽賞頗自得興逺與誰豁涇溪南藍山下有落星潭可以卜築余泊舟石上寄何判官昌浩藍岑竦天壁突兀如鯨額奔蹙橫澄潭勢吞落星石沙帶秋月明水搖寒山碧佳境宜緩棹清暉能留客恨君阻歡逰使我自驚惕所期俱卜築結茅錬金液早過漆林渡寄萬巨西經大藍山南來漆林渡水色倒空青林煙橫積素漏流昔吞翕沓浪競奔注潭落天上星龍開水中霧嶢巖注公柵突兀陳焦墓嶺峭紛上干川明屢回顧因思萬夫子解渴同瓊樹何日覩清光相歡詠佳句遊敬亭寄崔侍御我家敬亭下輒繼謝公作相去數百年風期宛如昨登髙素秋月下望青山郭俯視鴛鷺羣飲啄自鳴躍夫子雖蹭蹬瑶臺雪中鶴獨立窺浮雲其心在寥廓時來顧我笑一飯葵與藿世路如秋風相逢盡蕭索腰間玉具劎意許無遺諾壯士不可輕相期在雲閣自金陵泝流過白璧山玩月達天門寄句容王主簿滄江泝流歸白璧見秋月秋月照白璧皓如山隂雪幽人停宵征賈客忘早發進帆天門山回首牛渚沒川長信風來日出宿霧歇故人在咫尺新賞成胡越寄君青蘭花惠我庶不絶白寄人之詩大致泛濫於元嘉以還此前諸篇皆是也白嘗謂建安以來綺麗非珍蓋亦大概言之至其間表表諸人曷嘗不歷閫入室相與周旋出入乎特才實邁古故大而化之其淵源有自來矣杜甫亦復如是詞人落筆往往過當甫嘗云陶謝不枝梧他日則云安得思如陶謝手令渠述作與同逰後人過尊二家或欲盡薄從前非通論也秋日魯郡堯祠亭上宴别杜補闕范侍御我覺秋興逸誰云秋興悲山將落日去水與晴空宜魯酒白玉壺送行駐金羈歇鞍憩古木解帶挂橫枝歌鼓川上亭曲度神飈吹雲歸碧海夕鴈沒青天時相失各萬里茫然空爾思飄然而來戛然而止格調髙逸有如鵬翔末息翩翩而自逝胡震亨曰太白詩押宜字韻者凡五見此其一也他如月色望不盡空天父相宜謔浪偏相宜置酒正相宜春風與醉客今日乃相宜韻致俱勝段成式曰李集有堯祠贈杜補闕者老杜也别魯頌誰道泰山髙下却魯連節誰云秦軍衆摧却魯連舌獨立天地間清風灑蘭雪夫子還倜儻攻文繼前烈錯落石上松無為秋霜折贈言鏤寶刀千嵗庶不滅與堯祠宴别二詩皆極清健太沖挺拔景純豪俊非潘陸諸人之比劉辰翁曰上六句意象髙逈自切事情結末古意選語夢逰天姥吟留别海客談瀛洲煙濤微茫信難求越人語天姥雲霓明滅或可覩天姥連天向天橫勢拔五嶽掩赤城天台四萬八千丈對此欲倒東南傾我欲因之夢吳越一夜飛度鏡湖月湖月照我影送我至剡溪謝公宿處今尚在淥水蕩漾清猿啼腳著謝公屐身登青雲梯半壁見海日空中聞天雞千巖萬轉路不定迷花倚石忽已暝熊咆龍吟殷巖泉栗深林兮驚層巔雲青青兮欲雨水淡淡兮生煙列缺霹靂丘巒崩摧洞天石扇訇然中開青冥浩蕩不見底日月照耀金銀臺霓為衣兮風為馬雲之君兮紛紛而來下虎鼓瑟兮鸞回車仙之人兮列如麻忽魂悸以魄動恍驚起而長嗟惟覺時之枕席失向來之煙霞世間行樂亦如此古來萬事東流水别君去時何時還且放白鹿青崖間須行即騎訪名山安能摧眉折腰事權貴使我不得開心顔七言歌行本出楚騷樂府至于太白然後窮極筆力優入聖域昔人謂其以氣為主以自然為宗以俊逸髙暢為貴咏之使人飄揚欲仙而尤推其天姥吟逺别離等篇以為雖子美不能道蓋其才橫絶一世故興會標舉非學可及正不必執此謂子美不能及也此篇夭矯離竒不可方物然因語而夢因夢而悟因悟而别節次相生絲毫不亂若中間夢境迷離不過詞意偉怪耳胡應麟以為無首無尾窈冥昏默是真不可以説夢也特謂非其才力學之立見顛踣則誠然耳范杼曰夢吳越以下夢之源也次諸節夢之波瀾也其間顯而晦晦而顯非太白之胸次筆力亦不能發此髙柄曰白逺别離長相思烏栖曲鳴臯歌梁園吟天姥吟廬山謡等作長篇短韻驅駕氣勢殆與南山秋色爭髙可也王世貞曰歐陽公自謂廬山髙明妃曲李杜所不能作非公言也無論其他只半壁見海日空中聞天雞率爾語公能道否留别廣陵諸公憶昔作少年結交趙與燕金羈絡駿馬錦帶橫龍泉寸心無疑事所向非徒然晚節覺此疏獵精草太玄空名束壯士薄俗棄髙賢中回聖明顧揮翰凌雲煙騎虎不敢下攀龍忽墮天還家守清真孤潔勵秋蟬錬丹費火石採藥窮山川卧海不關人租稅遼東田乘興忽復起棹歌溪中船臨醉謝葛強山公欲倒鞭狂歌自此别垂釣滄浪前金陵酒肆留别風吹栁花滿店香吳姬壓酒喚客嘗金陵子弟來相送欲行不行各盡觴請君試問東流水别意與之誰短長言有盡而意無窮味在酸醎之外黃庭堅曰學者若不見古人用意處但得其皮毛所以去之甚逺如此詩若人復能為首句亦未是太白至於次句壓酒字他人亦自難及三四句益不同五六句乃真太白妙處當潛心焉鍾惺曰不須多亦不須深寫得情出贈别鄭判官竄逐勿復哀慚君問寒灰浮雲本無意吹落章華臺逺别淚空盡長愁心已摧二年吟澤畔憔悴幾時回黃鶴樓送孟浩然之廣陵故人西辭黃鶴樓煙花三月下揚州孤帆逺影碧空盡唯見長江天際流語近情遙有手揮五弦目送飛鴻之妙唐汝詢曰目力已極離思無涯悵望之情俱在言外留别賈舍人至大梁白雲起飄颻來南洲裴回蒼梧野十見羅浮秋鼇抃山海傾四溟揚洪流意欲託孤鳯從之摩天逰鳯苦道路難翺翔還崑丘不肯銜我去哀鳴慙不周逺客謝主人明珠難暗投拂拭倚天劍西登嶽陽樓長嘯萬里風掃清胸中憂誰念劉越石化為繞指柔秋風吹胡霜凋此簷下芳折芳怨嵗晚離别悽以傷謬攀青瑣賢延我於北堂君為長沙客我獨之夜郎勸此一杯酒豈惟道路長割珠兩分贈寸心貴不忘何必兒女仁相看淚成行深於比喻乃騷人之遺意其音哀婉情景正合渡荆門送别渡逺荆門外來從楚國逰山隨平野盡江入大荒流月下飛天鏡雲生結海樓仍連故鄉水萬里送行舟項聨與杜甫之星垂平野濶月湧大江流句法相類亦氣勢均敵胡震亨以杜為勝亦故為低昻耳南陵别兒童入京白酒新熟山中歸黃雞啄黍秋正肥呼童烹雞酌白酒兒女嬉笑牽人衣髙歌取醉欲自慰起舞落日爭光輝遊説萬乘苦不蚤著鞭跨馬涉逺道會稽愚婦輕買臣余亦辭家西入秦仰天大笑出門去我輩豈是蓬蒿人結句以直致見風格所謂辭意俱盡如截奔馬江夏别宋之悌楚水清若空遙將碧海通人分千里外興在一杯中谷鳥吟晴日江猿嘯晚風平生不下淚於此泣無窮登髙而呼衆山皆響胡震亨曰項聨與達夫功名萬里外心事一杯中似皆從庾抱之悲生萬里外恨起一杯中來而達夫較厚太白較逸並未易軒輊胡應鱗云髙雖渾厚易到李則超逸入神南陽送客斗酒勿為薄寸心貴不忘坐惜故人去偏令逰子傷離顔怨芳草春思結垂楊揮手再三别臨岐空斷腸從古詩十九首脫化而出詞意俱古咏至五六可謂藴藉風流矣鍾惺曰項聨是客中送客語説得渾然不覺送張舍人之江東張翰江東去正值秋風時天清一鴈逺海濶孤帆遲白日行欲暮滄波杳難期吳洲如見月千里幸相思方回曰一雁孤帆之句亦以寓吾道不偶之歎下句引白日滄波而云行欲暮杳難期意可見也送王屋山人魏萬還王屋并序王屋山人魏萬云自嵩宋沿吳相訪數千里不遇乘興逰台越經永嘉觀謝公石門後於廣陵相見美其愛文好古浪迹方外因述其行而贈是詩仙人東方生浩蕩弄雲海沛然乘天逰獨往失所在魏侯繼大名本家聊攝城卷舒入元化迹與古賢并十三弄文史揮筆如振綺辨折田巴生心齊魯連子西涉清洛源頗驚人世喧采秀卧王屋因窺洞天門朅來逰嵩峰羽客何雙雙朝携月光子暮宿玉女窗鬼谷上窈窕龍潭下奔潨東浮汴河水訪我三千里逸興滿吳雲飄颻浙江汜揮手杭越間樟亭望潮還濤卷海門石雲橫天際山白馬走素車雷奔駭心顔遙聞會稽美且渡耶溪水萬壑與千巖峥嶸鏡湖裏秀色不可名清輝滿江城人逰月邉去舟在空中行此中久延佇入剡尋王許笑讀曹娥碑沈吟黃絹語天台連四明日入向國清五峯轉月色百里行松聲靈溪恣沿越華頂殊超忽石梁橫青天側足履半月忽然思永嘉不憚海路賖挂席歷海嶠回瞻赤城霞赤城漸微沒孤嶼前嶢兀水續萬古流亭空千霜月縉雲川谷難石門最可觀瀑布挂北斗莫窮此水端噴壁灑素雪空濛生晝寒却思惡溪去寧懼惡溪惡咆哮七十灘水石相噴薄路創李北海李公雍昔為括州開此嶺路巖開謝康樂惡溪有謝康樂題詩處松風和猿聲搜索連洞壑徑出梅花橋雙溪納歸潮落帆金華岸赤松若可招沈約八詠樓城西孤岧嶤岧嶤四荒外曠望羣川會雲卷天地開波連浙西大亂流新安口北指嚴光瀨釣臺碧雲中邈與蒼嶺對稍稍來吳都裴回上姑蘇煙綿橫九疑漭蕩見五湖目極心更逺悲歌但長吁回橈楚江濵揮策揚子津身著日本裘裘則朝卿所贈日本布為之昻藏出風塵五月造我語知非佁擬人相逢樂無限水石日在眼徒干五諸侯不致百金産吾友揚子雲弦歌播清芬雖為江寧宰好與山公羣乘興但一行且知我愛君君來幾何時仙臺應有期東窗緑玉樹定長三五枝至今天壇人當笑爾歸遲我苦惜逺别茫然使心悲黃河若不斷白首長相思就彼所述鋪敘成文因其曲折緯以佳句大有帆隨湘轉水到渠成之致胡震亨曰佁一作儓儓擬言癡也司馬相如賦仡以佁擬丑吏魚吏二切又音態礙注不前也雖似俗語其來已久送友人尋越中山水聞道稽山去偏宜謝客才千巖泉灑落萬壑樹縈回東海橫秦望西陵繞越臺湖清霜鏡曉濤白雪山來八月枚乘筆三吳張翰杯此中多逸興早晚向天台桂臨川曰太白天才飄逸長律雖法度整嚴而清骨不泯魯郡堯祠送竇明府薄華還西京自注時久病初起作朝䇿黧眉騧舉鞭力不堪強扶愁疾向何處角巾微服堯祠南長楊掃地不見日石門噴作金沙潭笑誇故人指絶境山光水色青於藍廟中往往來擊鼓堯本無心爾何苦門前長跪雙石人有女如花日歌舞銀鞍繡轂往復回簸林蹶石鳴風雷逺煙空翠時明滅白鷗歷亂長飛雪紅泥亭子赤闌干碧流環轉青錦湍深沉百丈洞海底那知不有蛟龍蟠君不見緑珠潭水流東海緑珠紅粉沉光彩緑珠樓下花滿園今日曽無一枝在昨夜秋聲閶闔來洞庭木落騷人哀遂將三五少年輩登髙逺望形神開生前一笑輕九鼎魏武何悲銅雀臺我歌白雲倚窗牖爾聞其聲但揮手長風吹月度海來遙勸仙人一杯酒酒中樂酣宵向分舉觴酹堯堯可聞何不令臯繇擁篲橫八極直上青天揮浮雲髙陽小飲真瑣瑣山公酩酊何如我竹林七子去道賖蘭亭雄筆安足誇堯祠笑殺五湖水至今憔悴空荷花爾向西秦我東越暫向瀛洲訪金闕藍田太白若可期為余掃灑石上月起滅在手變化從心初曷嘗沾沾於矩矱而意之所到無不應節合拍歌行至此豈非神品金鄉送韋八之西京客自長安來還歸長安去狂風吹我心西挂咸陽樹此情不可道此别何時遇望望不見君連山起煙霧魯郡東石門送杜二甫醉别復幾日登臨遍池臺何時石門路重有金樽開秋波落泗水海色明徂徠飛蓬各自逺且盡手中杯無限低徊有説不盡處可謂情深於辭灞陵行送别送君灞陵亭灞水流浩浩上有無花之古樹下有傷心之春草我向秦人問路岐云是王粲南登之古道古道連綿走西京紫闕落日浮雲生正當今夕斷腸處黃鸝愁絶不忍聽古之傷心人别有懷抱是詩之謂矣送裴十八圗南歸嵩山君思潁水緑忽復歸嵩岑歸時莫洗耳為我洗其心洗心得真情洗耳徒買名謝公終一起相與濟蒼生沉刻之意以快語出之可令聞者驚竦同王昌齡送族弟襄歸桂陽秦地見碧草楚謡對清樽把酒爾何思鷓鴣啼南園余欲羅浮隱猶懷明主恩躊躇紫宫戀孤負滄洲言終然無心雲海上同飛翻相期乃不淺幽桂有芳根蕭士贇曰細味此詩非一飯不忘君者乎議者何厚誣太白之不如杜也爾家何在瀟湘川青莎白石長沙邊昨夢江花照江日幾枝正發東窗前覺來欲往心悠然魂隨越鳥飛南天秦雲連山海相接桂水橫煙不可涉送君此去令人愁風帆茫茫隔河洲春潭瓊草緑可折西寄長安明月樓桂臨川曰情出至悃詞調警絶送崔度還吳自注度故人禮部員外輔國之子幽燕沙雪地萬里盡黃雲朝吹歸秋雁南飛日幾羣中有孤鳯雛哀鳴九天聞我乃重此鳥緑章五色分胡為雜凡禽雞鶩輕賤君舉手捧爾足疾心若火焚拂羽淚滿面送之吳江濆去影忽不見躊躇日將曛哀痛之音篤於故舊自見深情金陵送張十二再逰東吳張翰黃花句風流五百年誰人今繼作夫子世稱賢再動遊吳棹還浮入海船春光白門栁霞色赤城天去國難為别思歸各未旋空餘賈生淚相顧共悽然張翰雜詩青條若總翠黃華如散金御選唐宋詩醇卷六
