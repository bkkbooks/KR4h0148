  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_065-1a, image: WYG1448/WYG1448-0590c.png}
body:
  text: 昌黎韓愈詩五短燈檠歌長檠八尺空自長短檠二尺便且光黃簾緑幕朱戶閉風露氣入秋堂凉裁衣寄逺淚眼暗搔頭頻挑移近牀太學儒生東魯客二十辭家來射䇿夜書細字綴語言兩目眵昏頭雪白此時提攜當案前看書到曉那能眠一朝富貴還自恣長檠髙張照珠翠吁嗟世事無不然牆角君看短檠棄貧賤糟糠諷諭深切病鴟屋東惡水溝有鴟墮鳴悲青泥掩兩翅拍拍不得離羣童呌相召瓦礫爭先之計校生平事殺却理亦宜奪攘不愧恥飽滿盤天嬉晴日占光景髙風送追隨遂凌紫鳯羣肻顧鴻鵠卑今者運命窮遭逢巧丸兒中汝要害處汝能不得施於吾乃何有不忍乘其危丏汝將死命浴以清水池朝餐輟魚肉暝宿防􅀈貍自知無以致䝉德久猶疑飽入深竹叢飢來傍階基亮無責報心固以聽所為昨日有氣力飛跳弄籓籬今晨忽徑去曾不報我知僥幸非汝福天衢汝休窺京城事彈射竪子豈易欺勿諱泥坑辱泥坑乃良規顧嗣立曰此詩每虛頓一二語用深一步法如計較生平事殺却理亦宜亮無責報心固以聽所為是也通首是比分明為負心人寫照與老杜義鶻行正相反華山女街東街西講佛經撞鐘吹螺閙宫庭廣張罪福資誘脅聽衆狎恰排浮萍黃衣道士亦講說座下寥落如明星華山女兒家奉道欲驅異教歸仙靈洗糚拭靣著冠帔白咽紅頰長眉青遂來升座演真訣觀門不許人開扄不知誰人暗相報訇然振動如雷霆掃除衆寺人跡絶驊騮塞路連輜軿觀中人滿坐觀外後至無地無由聽抽叉脫釧解環珮堆金疊玉光青熒天門貴人傳詔召六官願識師顔形玉皇頷首許歸去乘龍駕鶴來青冥豪家少年豈知道來繞百市腳不停雲窗霧閣事恍惚重重翠幔深金屏仙梯難攀俗緣重浪憑青鳥通丁寧漁隱叢話曰類苑云退之見神仙亦不伏云我寧屈曲自世間安能從汝巢神山賦謝自然則曰童騃無所識作誰氏子則曰不從而誅未晚耳惟華山女詩頗假借不知何以得此朱子曰或怪公排斥拂老不遺餘力而於華山女獨假借如此非也此正譏其衒姿色假仙靈以惑衆又譏時君不察使失行婦人得入宫禁耳觀其卒章豪家少年雲窗霧閣翠幔金屏青鳥丁寧等語䙝慢甚矣豈真以神仙處之哉彥周詩話曰詩人寫人物態度至不可移易元微之李娃行云髻鬟峨峨高一尺門前立地看春風此定為娼婦退之華山女詩云洗糚拭靣著冠帔白咽紅頰長眉青此定是女道士東坡作芙蓉城詩亦用長眉青三字云中有一人長眉青炯如微雲淡踈星便有神仙風度瀧吏南行逾六旬始下昌樂瀧險惡不可狀船石相舂撞往問瀧頭吏潮州尚幾里行當何時到土風復何似瀧吏垂手笑官何問之愚譬官居京邑何由知東吳東吳遊宦鄉官知自有由潮州底處所有罪乃竄流儂幸無負犯何由到而知官今行自到那遽妄問為不虞卒見困汗出愧且駭吏曰聊戲官儂嘗使往罷嶺南大扺同官去道苦遼下此三千里有州始名潮惡溪瘴毒聚雷電常洶洶鱷魚大於船牙眼怖殺儂州南數十里有海無天地颶風有時作掀簸真差事聖人於天下於物無不容比聞此州囚亦有生還儂官無嫌此州固罪人所徙官當明時來事不待說委官不自謹慎宜即引分往胡為此水邊神色久儻慌㼚大瓶罌小所任自有宜官何不自量滿溢以取斯工農雖小人事業各有守不知官在朝有益國家不得無虱其間不武亦不文仁義飾其躬巧姦敗羣倫叩頭謝吏言始慙今更羞歷官二十餘國恩並未酬凡吏之所訶嗟實頗有之不即金木誅敢不識恩私潮州雖云遠雖惡不可過於身實己多敢不持自賀欲寫貶地遠惡却設為問答又借吳音俚語以致真切之意助荒陋之態格調全祖古樂府來君子以恐懼修省瀧吏篇之謂也莫道英雄氣短沈德潜曰音節氣味得之漢人樂府韓詩中推為别調借吏言以規諷主意在此除官赴闕至江州寄鄂嶽李大夫盆城去鄂渚風便一日耳不枉故人書無因帆江水故人辭禮闈旌節鎮江圻而我竄逐者龍鍾初得歸别來己三嵗望望長迢遞咫尺不相聞平生那可計我齒落且盡君鬢白幾何年皆過半百來日苦無多少年樂新知衰暮思故友譬如親骨肉寧免相可不我昔實愚憃不能降色辭子犯亦有言臣猶自知之公其務貰過我亦請改事桑榆儻可收願寄相思字情致纒綿詞氣遜順使人之意也消南山有高樹行贈李宗閔南山有高樹花葉何蓑蓑上有鳯凰巢鳯凰乳且棲四旁多長枝羣鳥所託依黃鵠據其髙衆鳥接其卑不知何山鳥羽毛有光輝飛飛擇所處正得衆所希上承鳯凰恩自期永不衰中與黃鵠羣不自隱其私下視衆鳥羣汝徒竟何為不知挾丸子心默有所規彈汝枝葉間汝翅不覺摧或言由黃鵠黃鵠豈有之慎勿猜衆鳥衆鳥不足猜無人語鳯凰汝屈安得知黃鵠得汝去婆娑弄毛衣前汝下視鳥各議汝瑕疵汝豈無朋匹有口莫肻開汝落蒿艾間幾時復能飛哀哀故山友中夜思汝悲路遠翅翎短不得持汝歸韓醇曰據詩意鳯凰謂斐度挾丸子謂李德裕李紳元稹也新書李宗閔傳云斐度伐蔡引為彰義觀察判官蔡平知制誥長慶初錢徽典貢舉宗閔託所親於徽李德裕李紳元稹共白徽取士不以實宗閔坐貶劒州刺史俄復為中書舍人由是嫌怨顯結縉紳之禍四十餘年不解又云宗閔初為裴度引用及度薦李德裕可為宰相宗閔遂與為怨韓愈為作南山猛虎行規之按度薦德裕在公沒後五年新書誤矣漁隱叢話曰退之宗閔俱裴晉公征淮西時幕客也退之作南山有髙樹及猛虎行贈宗閔皆略盡其終身所為然退之無恙時宗閔才為中書舍人所為尚未暴自錢徽貶後牛李之憾始結至其為相則退之死久矣遂有封川之行所謂前汝下視鳥各議汝瑕疵烏鵲從噪之虎不知所歸者何其明驗也方嵩卿曰心默有所規規圖也東坡五禽言去年麥不熟挾彈規我肉本公語也猛虎行猛虎雖云惡亦各有匹儕羣行深谷間百獸望風低身食黃熊父子食赤豹麛擇肉於熊豹肻視兔與貍正晝當谷眠眼有百步威自矜無當對氣性縱以乖朝怒殺其子暮還食其妃匹儕四散走猛虎還孤棲狐鳴門兩旁烏鵲從噪之出逐猴入居虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頤猛虎死不辭但慙前所為虎坐無助死况如汝細微故當結以信親當結以私親故且不保人誰信汝為二詩皆哀矜涕泣而道宵雅之遺則也方嵩卿曰蜀本總題誤以上題贈李宗閔四字綴猛虎行之上後人因之其實後詩不為宗閔作猛虎行樂府舊題非前詩類也新書又謂斐度薦李德裕宗閔怨之為作此詩薦事在太和三年公沒久矣不可據雪後寄崔二十六丞公藍田十月雪塞關我興南望愁羣山攢天嵬嵬凍相映君乃寄命於其間秩卑俸薄食口衆豈有酒食開容顔殿前羣公賜食罷驊騮踏路驕且閒稱多量少鑒裁密豈念幽桂遺榛菅幾欲犯嚴出薦口氣象硉兀未可攀歸來殞涕掩關卧心之紛亂誰能刪詩翁憔悴斸荒棘清玉刻佩聯玦環腦脂遮眼卧壯士大弨挂壁無由彎乾坤惠施萬物遂獨於數子懷偏慳朝欷暮唶不可解我心安得如石頑起調激越極似同谷歌某氏曰斯立是時為藍田縣丞其曰藍田十月元和十年十月也孟郊已死張籍病眼故有詩翁壯士之句有懷立之且念朋友之不振也奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄閣老張十八助教曲江千頃秋波淨平鋪紅雲蓋明鏡大明宫中給事歸走馬來看立不正遺我明珠九十六寒光映骨睡驪目我今官閒得婆娑問言何處芙蓉多撐舟昆明度雲錦腳敲兩舷呌吳歌太白山高三百里負雪嵬嵬插花裏玉山前腳不復來曲江汀瀅水平杯我時相思不覺一回首天門九扇相當開上界真人足官府豈如散仙鞭笞鸞鳯終日相追陪紅雲明鏡中特有雪山倒影便寫得異樣精采結似灑脫正恐不能忘情樊汝霖曰公時自中書舍人降太子右庶子記夢夜夢神官與我言羅縷道妙角與根挈攜陬維口瀾翻百二十刻須臾間我聽其言未云足捨我先度橫山腹我徒三人共追之一人前度安不危我亦平行踏􅙚􅚤神完骨蹻腳不掉側身上視溪谷盲杖撞玉版聲彭􅘑神官見我開顔笑前對一人壯非少石壇坡陀可坐卧我手承頦肘拄座隆樓傑閣磊嵬髙天風飄飄吹我過壯非少者哦七言六字常語一字難我以指撮白玉丹行且咀噍行詰盤口前截斷第二句綽虐顧我顔不歡乃知仙人未賢聖護短慿愚邀我敬我能屈曲自世間安能從女巢神山只是寓言勿真謂與鬼爭義黃庭堅曰六字常語一字難只前句中哦字便是所難此乃為詩之法也樊汝霖曰蘇內翰嘗曰太白詩云遺我鳥跡書讀之了不閒太白尚氣乃自招不識字不如退之倔強云我能屈曲自世間安能隨女巢神山又云退之性氣雖出世間人亦不能容也某氏曰此詩蓋有託諷意公忤執政左遷為右庶子時作前酬盧公荷花詩末云豈如散仙鞭笞鸞鳯終日相追陪而此詩末亦云我能屈曲自世間安能從女巢神山皆有不能俯仰隨人之意可知其為左遷之時也顧嗣立曰按金居敬云羅縷道妙三句意皆本參同契角根陬維謂青龍處房六白虎在昴七朱雀在張二皆朝於𤣥武虛危之位也迎一陽之氣以進火妙用始於虛危在一日言正當子半故曰須臾間又云百二十刻須臾間如參同契以十二卦十二律配十二時陽火隂符之候然一日之間有之一刻之間亦有之也公蓋深得金丹之㫖乃倔強世間耶南內朝賀歸呈同官薄雲蔽秋曦清雨不成泥罷賀南內衙歸凉曉淒淒緑槐十二街渙散馳輪蹄余惟贛書生孤身無所齎三黜竟不去致官九列齊豈惟一身榮珮玉冠簪犀滉蕩天門高著籍朝厥妻文才不如人行又無町畦問之朝廷事略不知東西况於經籍深豈究端與倪君恩太山重不見酬稗稊所職事無多又不自提撕明庭集孔鸞曷取於鳧鷖樹以松與柏不宜閒蒿藜婉孌自媚好幾時不見擠貪食以忘軀鮮不調鹽醯法吏多少年磨淬出角圭將舉汝愆尤以為已階梯收身歸關東期不到死迷戒心法吏始擬收身則已有為而為矣中間省躬引分乃足為朝士座右銘雍録曰唐都城有三大內太極宫在西故明西內大明宫在東故名東內别有興慶宫號南內也洪興祖曰中朝事跡云天街兩畔樹槐俗號為槐街白樂天樂逰園詩云下視十二街緑槐間紅塵即此也讀東方朔雜事嚴嚴王母宫下維萬仙家噫缺為飄風濯手大雨沱方朔乃竪子驕不加禁訶偷入雷電室輷輘掉狂車王母聞以笑衛官助呀呀不知萬萬人生身埋泥沙簸頓五山踣流漂八維蹉曰吾兒可憎奈此狡獪何方朔聞不喜禠身絡蛟蛇瞻相北斗柄兩手自相挼羣仙急乃言百犯庸不科向觀睥睨處事在不可赦欲不布露言外口實喧譁王母不得己顔嚬口齎嗟頷頭可其奏送以紫玉珂方朔不懲創挾恩更矜誇詆欺劉天子正晝溺殿衙一旦不辭訣攝身凌蒼霞俞瑒曰此詩洪興祖以為譏弄權者觀結語云殊不然也意亦指文人播弄造化如雙鳥詩云爾不然何獨取方朔而擬之權幸耶顧嗣立曰按漢書東方朔傳贊曰朔之詼諧逢占射覆其事浮淺行於衆庶童兒牧豎莫不炫耀而後世好事者因取竒言怪語附著之公詩皆本經史而此作獨專取內傳亦偶然戲筆故題之曰雜事也漢武帝內傳曰帝好長生七夕西王母降其宫有頃索桃七枚以四枚與帝自食三枚曰此桃三千年一實時東方朔從殿東廂朱鳥牖中窺母母謂帝曰此窺牖兒嘗三來偷吾此桃昔為太山上仙宫令到方丈擅弄雷電激波揚風風雨失時隂陽錯忤致令鮫鯨陸行海水暴竭黃鳥宿淵於是九潦丈人乃言於太上遂謫人間其後朔一日乘雲龍飛去不知所在庭楸庭楸止五株共生十步間各有藤繞之上各相鉤聯下葉各垂地樹顛各雲連朝日出其東我常坐西偏夕日在其西我常坐東邊當晝日在上我在中央間仰視何青青上不見纎穿朝暮無日時我且八九旋濯濯晨露香明珠何聯聯夜月來照之蒨蒨自生烟我己自頑鈍重遭五楸牽客來尚不見肻到權門前權門衆所趨有客動百千九牛亡一毛未在多少間往既無可顧不往自可憐厯叙東西朝暮繁而不殺彌有古意南溪始泛三首榜舟南山下上上不得返幽事隨去多孰能量近逺隂沈過連樹藏昂抵橫坂石粗肆磨礪波惡厭牽挽或倚偏岸漁竟就平洲飯㸃㸃暮雨飄梢梢新月偃餘年凛無幾休日愴已晚自是病使然非由取髙蹇南溪亦清駛而無楫與舟山農驚見之隨我觀不休不惟兒童輩或有杖白頭饋我籠中瓜勸我此淹留我云以病歸此已頗自由幸有用餘俸置居在西疇囷倉米穀滿未有旦夕憂上去無得得下來亦悠悠但恐煩里閭時有緩急投願為同社人雞豚燕春秋足弱不能步自宜收朝蹟羸形可輿致佳觀安可擲即此南坂下久聞有水石拖舟入其間溪流正清激隨波吾未能峻瀨乍可刺鷺起若導吾前飛數十尺亭亭柳帶沙團團松冠壁歸時還盡夜誰謂非事役三首神似陶公所謂姦窮變怪得往往造平淡者蔡寬夫詩話曰退之詩豪健雄放自成一家世特恨其深婉不足南溪始泛三篇乃末年所作獨為閒逺有淵明風氣王直方詩話曰洪龜父言山谷於退之詩少所許可最愛南溪始泛以為有詩人句律之深意隱居詩話曰南溪始泛詩將死病中作也句有足弱不能步自宜收朝蹟又云餘年凛無幾休日愴已晚張籍哭退之詩略曰去夏公請告養病城南莊籍時休官罷兩月同逰翔移船入南溪東西縱篙撑公作逰溪詩詠唱多慨慷又曰偶有賈秀才來兹亦同并秀才謂賈島也題楚昭王廟丘墳滿目衣冠盡城闕連雲草樹荒猶有國人懷舊德一間茅屋祭昭王顧嗣立曰按公外集有記宜城驛云驛東北有井傳是昭王井井東北數十步有楚昭王廟髙木萬株舊廟屋極宏盛今惟草屋一區然問左側人尚云每嵗十月民相率聚祭其前元和十四年二月二日題蓋與此詩同作也答張十一功曹山淨江空水見沙哀猿啼處兩三家篔簹競長纎纎笋躑躅閒開豔豔花未報恩波知死所莫令炎瘴送生涯吟君詩罷看雙鬢斗覺霜毛一半加任子淵曰斗覺詩中健語也前輩多使退之詩有此句東坡詩黃昏斗覺羅裳薄後山詩斗覺文字生清新題木居士火透波穿不計春根如頭靣幹如身偶然題作木居士便有無窮求福人道破世情張藝叟木居士詩序耒陽縣北沿流二三十里鼇口寺即退之所題木居士在焉元豐初以禱旱不應為邑令析而薪之今存者乃僧道符更刻和歸工部送僧約早知皆是自拘囚不學因循到白頭汝既出家還擾擾何人更得死前休振威一喝三日耳聾入關詠馬嵗老豈能充上駟力微當自慎前程不知何故翻驤首牽過關門妄一鳴木芙蓉新開寒露叢逺比水間紅豔色寧相妒嘉名偶自同採江官渡晚搴木古祠空願得勤來看無令便逐風朱子曰此詩言荷花與木芙蓉生不同處而色皆美名又同故以採江搴木二事相對言其生處而九歌者祭神之辭故曰古祠也奉和庫部盧四兄曹長兄元日朝回天仗宵嚴建羽旄春雲送色曉雞號金爐香動螭頭暗玉佩聲來雉尾髙戎服上趨承北極儒冠列侍映東曹太平時節難身遇郎署何須歎二毛沈德潜曰入賈岑倡和作中可以伯仲奉和斐相公東征途經女几山下作旗穿曉日雲霞雜山倚秋空劒㦸明敢請相公平賊後暫攜諸吏上崢嶸洪興祖曰以我之旗况彼雲霞以彼之山况我劒㦸詩家謂回鸞舞鳯格蔡寬夫詩話曰退之和裴晉公征淮西時過女几山詩云云而晉公之詩無見惟白樂天集載其一聯云待平賊壘報天子莫指仙山示老夫方時意氣自信不疑如此豈容令狐楚輩沮撓乎次潼關先寄張十二閣老使君荆山已去華山來日出潼關四扇開刺史莫辭迎候逺相公親破蔡州回沈德潜曰沒石飲羽之技不必以尋常絶句法求之晉公破賊回重拜台司以詩示幕中賔客愈奉和南伐旋師太華東天書夜到册元功將軍舊壓三司貴相國新兼五等崇鵷鷺欲歸仙仗裏熊羆還入禁營中長慙典午非材職得就閒官即至公嚴重蒼渾直逼杜陵石林詩話曰七言難於氣象雄渾句中有力而紆徐不失言外之意自老杜錦江春色來天地玉壘浮雲變古今與五更鼓角聲悲壯三峽星河影動搖等句之後常恨無復繼者韓退之筆力最為傑出然每苦意與語俱盡和裴晉公破蔡州回詩所謂將軍舊壓三司貴相國新兼五等崇非不壯也然意亦盡於此矣不若劉禹錫賀晉公留守東都云天子旌旗分一半八方風雨會中州語逺而體大也沈德潜曰莊重得體左遷至藍關示姪孫湘一封朝奏九重天夕貶潮州路八千欲為聖明除弊事肻將衰朽惜殘年雲橫秦嶺家何在雪擁藍關馬不前知汝逺來應有意好收吾骨瘴江邊李光地曰佛骨一表孤映千古而此詩配之尤妙在許大題目而以除弊事三字了却晚次宣溪辱韶州張端公使君惠書叙别酬以絶句二章韶州南去接宣溪雲水蒼茫日向西客淚數行元自落鷓鴣休傍耳邊啼兼金那足比清文百首相隨愧使君俱是嶺南巡管內莫欺荒僻斷知聞筆墨閒録曰潮州以後詩最哀深宣溪絶句等詩絶有味量移袁州張韶州端公以詩相賀因酬之明時逺逐事何如遇赦移官罪未除北望詎令隨塞鴈南遷才免葬江魚將經貴郡煩留客先惠髙文謝起豫暫欲繫船韶石下上賔虞舜整冠裾李光地曰末句取諸離騷所謂跪敷袵以敶辭者有䝉難正志氣象奉和兵部張侍郎酬鄆州馬尚書祇召途中見寄開緘之日馬帥巳再領鄆州之作來朝當路日承詔改轅時再領須句國仍遷少昊司暖風抽宿麥清雨卷歸旗賴寄新珠玉長吟慰我思石林詩話曰蔡天啓言嘗與張文潜論韓柳五字警句文潜舉退之暖風抽宿麥清雨卷歸旗子厚壁空殘月曙門掩候蟲秋皆集中第一奉酬天平馬十二僕射暇日言懷見寄之作天平篇什外政事亦無雙威令加徐土儒風被魯邦清為公論重寬得士心降嵗晏偏相憶長謡坐北窗奉使鎮州行次承天行營奉酬裴司空竄逐三年海上歸逢公復此著征衣旋吟佳句還鞭馬恨不身先去鳥飛詔許遲留而奮迅如此仁者之勇庶無愧焉新書詔愈宣撫既行衆皆危之元稹言韓愈可惜穆宗亦悔詔愈度事從宜無必入愈曰安有受君命而滯留自顧遂疾驅入奉和僕射裴相公感恩言志文武成功後居為百辟師林園窮勝事鐘鼓樂清時擺落遺髙論雕鐫出小詩自然無不可范蠡爾其誰按詩話云慶歷中西師未解晏元獻為樞密使㑹大雪置酒西園歐陽永叔賦詩云須憐鐵甲冷徹骨四十餘萬屯邊兵晏曰昔韓愈亦能作言語赴斐度㑹但云林園窮勝事鐘鼓樂清時不曾如此作閙夫斐度之優游緑野乃不得己而與世浮沈故愈詩云云晏殊所處不同聞永叔諷厲正應改容謝之顧猶怫然於中耶和僕射相公朝回見寄盡瘁年將久公今始暫閒事隨憂共減詩與酒俱還放意機衡外收身矢石間秋臺風日逈正好看前山退之與中立雅契同涉艱危樹功業其於當時朝局元老苦心有知之最深者二詩能曲傳之諷詠殊有餘味御選唐宋詩醇卷三十一
