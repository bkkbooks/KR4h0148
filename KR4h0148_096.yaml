  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_096-1a, image: WYG1448/WYG1448-0921c.png}
body:
  text: 山陰陸遊詩六目録春遊三月二十日兒輩出謁孤坐北窗西村湖塘晚眺秋夜漁父梅市郭西柳橋晚眺秋社村舍秋日雜詠小立秋晚湖上雨後至近村題嚴州王秀才山水枕屏追憶征西幕中舊事解嘲讀史遣興送子龍赴吉州掾正月五日出遊初春雜興杜叔高秀才雨雪中相過留一宿而别誦此詩送之村居書喜别嚴和之舟中作夏初湖村雜題書直舍壁謝韓實之直閣送燈直舍獨坐思成都出東城並江而歸立春後十二日命駕至郊外戲書觸目河橋晚歸後寓嘆與兒輩泛舟遊西湖一日間晴陰屢易秋思小徑登東山繚行自西北至溪上感憤野興幽居春晚閔雨書事明日復理夢中意作舍南野步出遊山行感昔風雲晝晦夜遂大雪夢華山道室倚樓石帆夏日乙丑夏秋之交小舟早夜往來湖中戲成絶句懷舊春雨梨花雜感出遊歸鞍上口占初夏間居地僻耒陽令曾君寄禾譜農器譜二書求詩夏末野興訪山家寄隱士春前六日作贑士曾興宗字光祖以其居篔簹谷圗來求詩夏日雜題西村晚歸雨晴秋夜纍日濃雲作雪不成遂有春意野望春晴恩封渭南伯唐詩人趙嘏為渭南尉當時謂之趙渭南後來將以豫為陸渭南乎戲作長句山行初夏書感對酒作頃歲從戎南鄭屢往來興鳯間暇日追懷舊遊有賦異夢夜坐小飲雜感十首之二仲秋書事秋日徙倚門外久之聞新雁有感小園獨酌古意湖上尋梅湖山雪晴欲出而路濘未通戲作春日雜興蘭亭道上初夏雜興山行過僧菴不入夏日六言夏日泛溪至南莊復回湖桑歸郊行文章思蜀江村示兒
