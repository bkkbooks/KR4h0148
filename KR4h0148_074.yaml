front:
  text: 欽定四庫全書御選唐宋詩醇卷三十六
  hash: sha256:9df8c6d68c1e136a6bbe8a796035783985c56c91045694f7fd6a5685ba8a3b97
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_074-1a, image: WYG1448/WYG1448-0693a.png}
body:
  text: 眉山蘇軾詩五目録九日黃樓作次韻王鞏獨眠次韻僧潜見贈百步洪送參寥師夜過舒堯文戲作祈雪霧豬泉出城馬上作贈舒堯文臺頭寺步月得人字種松得徠字以雙刀遺子由子由有詩次其韻月夜與客飲杏花下答郡中同僚賀雨罷徐州往南京馬上走筆寄子由五首録二首舟中夜起遊惠山贈惠山僧惠表與秦太虛參寥㑹於松江而關彥長徐安中適至分韻得風字二首録一首端午遍遊諸寺得禪字和孫同年卞山龍洞禱晴與客遊道場何山得鳥字泛舟城南㑹者五人分韻賦詩得人皆苦炎字四首次韻李公擇梅花與王郎昆仲及兒子邁繞城觀荷花登峴山亭晚入飛英寺分韻得月明星稀四首與胡祠部游法華山趙閲道髙齊豫以事繫御史臺獄獄吏稍見侵自度不能堪死獄中不得一别子由故作二詩授獄卒梁成以遺子由十二月二十八日䝉恩責授檢校水部員外郎黃州團練副使復用前韻過淮梅花二首少年時嘗過一村院見壁上有詩云夜涼疑有雨院靜似無僧不知何人詩也宿黃州禪智寺寺僧皆不在夜半雨作偶記此詩故作一絶初到黃州定惠院寓居月夜偶出次韻前篇安國寺尋春寓居定惠院之東雜花滿山有海棠一株土人不知貴也雨中看牡丹三首武昌銅劍歌曉至巴口迎子由與子由同游寒溪西山次韻子由病酒肺疾發正月草日往岐亭郡人潘古郭三人送余於女王城東禪莊院
  hash: sha256:37128867cca02ca22425b1ab97a57fc0510d17aee9c4437e929ee53dd47308f1
