front:
  text: 欽定四庫全書御選唐宋詩醇卷四十三
  hash: sha256:6f5cf4b3d90a471715667a55e088b38fd920b7e74b83dbe9353b81992e3ca73a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_088-1a, image: WYG1448/WYG1448-0845a.png}
body:
  text: 山隂陸遊詩二目録十月十九日與客飲忽記去年此時自錦屛歸山南道中小獵今又將去此矣長門怨斷碑歎蜀酒歌醉後草書歌詩戲作十二月初一日得梅一枝絶竒戲作長句今年於是四賦此花矣十二月十一日視築隄遊修覺寺塞上曲苦笱月下作過大蓬嶺度繩橋至杜秀才山莊東湖新竹夏日湖上同何元立賞荷花追懷鏡湖舊逰怡齋龍湫歌蒸暑思梁州述懷古意寓驛舍題宇文子友所藏薛公鶴晨至湖上聽琴龍眠畫馬山中得長句戲呈周輔并簡朱縣丞長歌行逰三井觀臨别成都帳飲萬里橋贈談德稱丈夫觀儲福觀離堆伏龍祠觀孫太古畫英惠王像登灌口廟東大樓觀岷江雪山平羌道中望峩眉山慨然有作次韻何元立都曹贈行初到榮州醉中懷眉山舊逰齋中夜坐有感晚登橫溪閣高齋小飲戲作太液黃鵠歌夜聞浣花江聲甚壯謁諸葛丞相廟醉中長歌春感花時遍逰諸家園題明皇幸蜀圖春殘對酒逰圓覺乾明祥符三院至暮食薺幽居晚興書歎月下醉題銅壺閣望月夜宴即席作芳華樓夜宴嵗晚數日寒頓減頗有春意感懷賦短歌梅花萬里橋江上習射出塞曲偶過浣花感舊逰戲作樓上醉書初春出逰張園海棠登劔南西川門感懷眉州作江樓訪楊先輩不遇因至石室感秋白鶴館夜坐南津勝因院亭子書寓舍壁
  hash: sha256:483c9a1351485852f0e4847b06c33d7108756ad6b2277273c1108f606edff247
