  text: 欽定四庫全書御選唐宋詩醇巻十九
  hash: sha256:b187d933271e75f57a16543184d3f4aa0f8e10f593bec6763d805659132a4958
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_041-1a, image: WYG1448/WYG1448-0405c.png}
body:
  text: 太原白居易詩一唐人詩篇什最富者無如白居易詩其源亦出於杜甫而視甫為更多史稱其每一篇出士人傳誦雞林行賈售其國相詩名之盛前古罕儷矣且夫居易豈徒以詩傳哉當其為左拾遺忠誠謇諤抗論不回中遭逺謫處之怡然牛李搆釁絶無依附不以媕娿逢時不以黨援干進不以坎壈顛躓而於邑無憀自非識力㴠養有大過人者安能進退綽有餘裕若是洎太和開成之後時事日非宦情愈淡唯以醉吟為事遂托於詩以自傳焉其與元㣲之書云志在兼濟行在獨善諷諭者意激而言質閒適者思澹而辭迂作詩指歸具見於此蓋根柢六義之㫖而不失乎温厚和平之意變杜甫之雄渾蒼勁而為流麗安詳不襲其面貌而得其神味者也而杜牧譏其纎艶淫媟非莊人雅士所為夫居易之莊雅孰與牧牧詩乃纎艶淫媟之尤者而反唇以訾居易乎宋祁據以立論抑亦惑之甚者冷齋夜話所載樂天每作詩令一老嫗解之解則錄之不解則又復易之亦屬附㑹之説不足深辯嘗考居易同時素相牴牾者莫如李徳裕徳裕每屏其詩不觀劉禹錫以為言徳裕曰吾於斯人不足久矣覽之恐回吾心此正歐陽修所謂雖其怨家讐人不能少毁而掩蔽之者也兹集之選芟其體之重複詞之淺易者約存若干首全集佳篇殆盡於此居易生平出處亦畧見於此彼耳食者或猶加詆毁焉韓愈不云乎蚍蜉撼大樹可笑不自量何損於香山居士歟賀雨皇帝嗣寶歴元和三年冬自冬及春暮不雨旱爞爞上心念下民懼歲成災㐫遂下罪已詔殷勤告萬邦帝曰予一人繼天承祖宗憂勤不遑寧夙夜心忡忡元年誅劉闢一舉靖巴卭二年戮李錡不戰安江東顧惟眇眇徳遽有巍巍功或者天降沴無乃儆予躬上思答天戒下思致時邕莫如率其身慈和與儉恭乃命罷進獻乃命賑饑窮宥死降五刑已責寛三農宫女出宣徽厩馬减飛龍庶政靡不舉皆出自宸𠂻奔騰道路人傴僂田野翁歡呼相告報感泣涕沾胷順人人心悦先天天意從詔下纔七日和氣生沖融凝為油油雲散作習習風晝夜三日雨淒淒復濛濛萬心春熈熈百榖青芃芃人變愁為喜歲易儉為豐乃知王者心憂樂與衆同皇天與后土所感無不通冠珮何鏘鏘將相及王公蹈舞呼萬歲列賀明庭中小臣誠愚陋職忝金鑾宫稽首再三拜一言獻天聰君以明為聖臣以直為忠敢賀有其始亦願有其終皇帝嗣寶歴至皆出自宸𠂻厯叙遇災修省之政應天以實不以文也奔騰道路人至歲儉易為豐極形喜雨之情天人感召㨗於影響也乃知王者心至未鋪陳賀雨之意而以願有其終結致規戒之詞焉史稱憲宗剛明果斷慨然發憤削平僣叛唐之威令幾於復振晚節信用非人不終其業蓋保治之難如此是詩情辭剴切忠愛藹然極有闗係之作汪立名曰按元和四年閏三月憲宗以久旱欲降徳音公見詔節未詳即建言乞免江淮兩賦以救流瘠且多出宫人上悉從之制下而雨公集中有奏請加徳音中節目二件狀已責乃用左傳晉悼公已責事謂止逋債也今本皆作責已誤觀刈麥自注時為盩厔縣尉田家少閒月五月人倍忙夜來南風起小麥覆隴黄婦姑荷簞食童稚攜壺漿相隨餉田去丁壯在南岡足蒸暑土氣背灼炎天光力盡不知熱但惜夏日長復有貧婦人抱子在其傍右手秉遺穗左臂懸弊筐聽其相顧言聞者為悲傷家田輸税盡拾此充饑腸今我何功徳曾不事農桑吏禄三百石歲晏有餘糧念此私自媿盡日不能忘力盡不知熱二句曲盡農家苦心恰是從旁看出貧婦一叚悲憫更深聶夷中詩摹寫不到雲居寺孤桐一株青玉立千葉緑雲委亭亭五丈餘髙意猶未已山僧年九十清淨老不死自云手種時一顆青桐子直從萌芽拔髙自毫末始四面無附枝中心有通理寄言立身者孤直當如此香山集中古體多以鋪叙暢達見長短篇則以含蓄藴藉生姿此首短峭中殊有逺勢髙意猶未已五字尤妙問友種蘭不種艾蘭生艾亦生根荄相交長莖葉相附榮香莖與臭葉日夜俱長大鋤艾恐傷蘭溉蘭恐滋艾蘭亦未能溉艾亦未能除沉吟意不決問君合何如通首分三層一層一意妙有頓挫短篇換韻音節亦古燕詩示劉叟并序叟有愛子背叟逃去叟甚悲念之叟少年時亦嘗如是故作燕詩以諭之梁上有雙燕翩翩雄與雌銜泥兩椽間一巢生四兒四兒日夜長索食聲孜孜青蟲不易捕黄口無飽期觜爪雖欲弊心力不知疲須臾十往來猶恐巢中饑辛勤三十日母瘦雛漸肥喃喃教言語一一刷毛衣一旦羽翼成引上庭樹枝舉翅不回顧隨風四散飛雌雄空中鳴聲盡呼不歸却入空巢裏啁啾終夜悲燕燕爾勿悲爾當返自思思爾為雛日髙飛背母時當時父母念今日爾應知極㝷常語却有闗風化足以警世老嫗皆知或謂此也杏園中棗樹人言百果中唯棗凡且鄙皮皴似龜手葉小如䑕耳胡為不自知生花此園裏豈宜遇攀翫幸免遭傷毁二月曲江頭雜英紅旖旎棗亦在其間如嫫對西子東風不擇木吹煦長未已眼㸔欲合抱得盡生生理寄信遊春客乞君一迴視君愛繞指柔從君怜栁杞君求悦目豔不敢爭桃李君若作大車輪軸材須此放魚自注自此後詩到江州作曉日提竹籃家童買春蔬青青芹蕨下疊卧雙白魚無聲但呀呀以氣相煦濡傾籃寫地上撥刺長尺餘豈唯刀机憂坐見螻蟻圖脱泉雖己久得水猶可蘇放之小池中且用救乾枯水小池窄狹動尾觸四隅一時幸茍活久逺將何如憐其不得所移放於南湖南湖連西江好去勿踟蹰施恩即望報吾非斯人徒不須泥沙底辛苦覓明珠施恩即望報四語小中見大蘇軾和潛師放魚詩意本此文柏牀陵上有老柏柯葉寒蒼蒼朝為風煙樹暮為宴寢牀以其多竒文宜升君子堂刮削露節目拂拭生輝光𤣥斑狀貍首素質如截肪雖充悦目翫終乏周身防華彩誠可愛生理苦已傷方知自殘者為有好文章時貶江州隠然有自傷之意方知自殘者為有好文章即杜甫古栢行之意而反用之秦中吟十首并序貞元元和之際余在長安聞見之間有足悲者因直歌其事命為秦中吟議婚天下無正聲悦耳即為娛人間無正色悦目即為姝顔色非相逺貧富則有殊貧為時所棄富為時所趨紅樓富家女金縷繡羅𥜗見人不歛手嬌癡二八初母兄未開口已嫁不須臾緑窗貧家女寂寞二十餘荆釵不直錢衣上無真珠幾迴人欲聘臨日又踟蹰主人㑹良媒置酒滿玉壺四座且勿飲聽我歌兩途富家女易嫁嫁早輕其夫貧家女難嫁嫁晚孝於姑聞君欲娶婦娶婦意何如重賦厚地植桑麻所要濟生民生民理布帛所求活一身身外充征賦上以奉君親國家定兩税本意在愛人厥初防其淫明勅内外臣税外加一物皆以枉法論奈何歲月久貪吏得因循浚我以求寵歛索無冬春織絹未成匹繅絲未盈斤里胥廹我納不許蹔逡廵歲暮天地閉陰風生破村夜深煙火盡霰雪白紛紛㓜者形不蔽老者體無温悲喘與寒氣併入鼻中辛昨日輸殘税因窺官庫門繒帛如山積絲絮似雲屯號為羡餘物隨月獻至尊奪我身上暖買爾眼前恩進入瓊林庫歲久化為塵通達治體故於時政源流利弊言之了然其沉著處令讀者酸鼻杜甫石壕吏之嗣音也傷宅誰家起甲第朱門大道邊豐屋中櫛比髙墻外迴環疊疊六七堂棟宇相連延一堂費百萬鬱鬱起青煙洞房温且清寒暑不能干髙堂虚且逈坐卧見南山繞廊紫藤架夾砌紅藥欄攀枝摘櫻桃帶花移牡丹主人此中坐十載為大官厨有臭敗肉庫有貫朽錢誰能將我語問爾骨肉間豈無窮賤者忍不救饑寒如何奉一身直欲保千年不見馬家宅今作奉誠園唐書曰馬燧子暢終少府監諸子無室廬自託奉誠園亭觀即其安邑里舊第云桂苑叢談曰馬暢以第中大杏餽中人竇文塲文塲以進徳宗徳宗未嘗見頗怪暢因令中使就封其樹暢懼進宅廢為奉誠園傷友陋巷孤寒士出門苦恓恓雖云志氣髙豈免顔色低平生同門友通籍在金閨曩者膠漆契邇來雲雨睽正逢下朝歸軒騎五門西是時天久陰三日雨淒淒蹇驢避路立肥馬當風嘶迴頭忘相識占道上沙堤昔年洛陽社貧賤相提携今日長安道對面隔雲泥近日多如此非君獨慘悽死生不變者唯聞任與黎自注任公叔黎逢是時天久陰六句摹寫炎涼之况真是不堪近日多如此又拓開一層寄慨益深不致仕七十而致仕禮法有明文何乃貪榮者斯言如不聞可憐八九十齒墮雙眸昏朝露貪名利夕陽憂子孫掛冠顧翠緌懸車惜朱輪金章腰不勝傴僂入君門誰不愛富貴誰不戀君恩年髙須告老名遂合退身少時共嗤誚晚歲多因循賢哉漢二疏彼獨是何人寂寞東門路無人繼去塵朝露貪名利二句入之淵明集中幾無以辨或謂樂天淺易豈其然乎汪立名曰按八朝偶雋元和初杜佑為司徒年過七十猶未請老裴晉公時知制誥因髙郢致仕令詞曰以年致仕抑有前聞近代寡㢘罕由斯道盖譏佑也公詩所指當與裴同立碑勛徳既下衰文章亦陵夷但見山中石立作路旁碑銘勲悉太公叙徳皆仲尼復以多為貴千言直萬貲為文彼何人想見下筆時但欲愚者悦不思賢者嗤豈獨賢者嗤仍得後代疑古石蒼苔字安知是愧詞我聞望江縣麴令撫惸嫠自注麴令名信陵在官有仁政名不聞京師身歿欲歸𦵏百姓遮路岐攀轅不得歸留𦵏此江湄至今道其名男女涕皆垂無人立碑碣唯有邑人知汪立名曰按麴信陵貞元元年鮑防榜下及第以六年作望江令其投石祝江祈雨文云必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於人以害其歲其為政盖可想見矣輕肥意氣驕滿路鞍馬光照塵借問何為者人稱是内臣朱紱皆大夫紫綬或將軍誇赴軍中宴走馬去如雲尊罍溢九醖水陸羅八珍果擘洞庭橘膾切天池鱗食飽心自若酒酣氣益振是歲江南旱衢州人食人結句斗絶有一落千丈之勢五弦清歌且罷唱紅袂亦停舞趙叟抱五弦宛轉當胷撫大聲麤若散颯颯風和雨小聲細欲絶切切鬼神語又如鵲報喜轉作猿啼苦十指無定音顛倒宫徴羽坐客聞此聲形神若無主行客聞此聲駐足不能舉嗟嗟俗人耳好今不好古所以緑窗琴日日生塵土歌舞秦城歲云暮大雪滿皇州雪中退朝者朱紫盡公侯貴有風雪興富無饑寒憂所營唯第宅所務在追遊朱門車馬客紅燭歌舞樓歡酣促密坐醉暖脱重裘秋官為主人廷尉居上頭日中為一樂夜半不能休豈知閿鄉獄中有凍死囚買花帝城春欲暮喧喧車馬度共道牡丹時相隨買花去貴賤無常價酬直看花數灼灼百朶紅戔戔五束素上張幄幕庇旁織巴籬䕶水洒復泥封移來色如故家家習為俗人人迷不悟有一田舍翁偶來買花處低頭獨長歎此歎無人諭一叢深色花十户中人賦結語即漢文惜造露臺意馮斑曰白公諷刺詩周詳明直娓娓動人自創一體古人無是也凡諷論之文欲得深隠使言者無罪聞者足戒白公盡而露其妙處正在周詳讀之動人此亦出於小雅也和答詩十首錄四首五年春微之從東臺來不數日又左轉為江陵士曹掾詔下日㑹予下内直歸而微之己即路邂逅相遇於街衢中自永夀寺南扺新昌里北得馬上話別語不過相勉保方寸外形骸而己因不暇及他是夕足下次於山北寺僕職役不得去命季弟送行且奉新詩一軸致於執事凡二十章率有興比淫文豔韻無一字焉意者欲足下在途諷讀且以遣日時消憂懣又有以張直氣而扶壯心也及足下到江陵寄在路所為詩十七章凡五六千言言有為章有㫖迨於宫律體裁皆得作者風發緘開巻且喜且怪僕思牛僧孺戒不能示他人唯與杓直拒非及樊宗師輩三四人時一吟讀心甚貴重然竊思之豈僕所奉者二十章遽能開足下聰明使之然耶抑又不知足下是行也天將屈足下之道激足下之心使感時發憤而臻於此耶若兩不然者何立意措辭與足下前時詩如此之相逺也僕既羡足下詩又憐足下心盡欲引狂簡而和之屬直宿拘牽居無暇日故不即時如意旬月來多乞病假假中稍閒且摘巻中尤者繼成十章亦不下三千言其間所見同者固不能自異異者亦不能强同同者謂之和異者謂之答并別錄和夢遊春詩一章各附於本篇之末餘未和者亦續致之頃者在科試間常與足下同筆硯每下筆時輙相顧共患其意太切而理太周故理太周則辭繁意太切則言激然與足下為文所長在於此所病亦在於此足下來序果有辭犯文繁之説今僕所和者猶前病也待與足下相見日各引所作稍刪其繁而晦其義焉餘具書白和陽城驛商山陽城驛中有歎者誰云是元監察江陵謫去時忽見此驛名良久涕欲垂何故陽道州名姓同於斯憐君一寸心寵辱誓不移疾惡若巷伯好賢如緇衣沉吟不能去意者欲改為改為避賢驛大署於門楣荆人愛羊祜户曹改為辭一字不忍道况兼姓呼之因題八百言言直文甚竒詩成寄與我鏗若金和絲上言陽公行友悌無等夷骨肉同衾裯至死不相離次言陽公迹夏邑始棲遲鄉人化其風少長皆孝慈次言陽公道終日對酒巵兄弟笑相顧醉貌紅怡怡次言陽公節謇謇居諫司誓心除國蠧决死犯天威終言陽公命左遷天一涯道州炎瘴地身不得生歸一一皆實錄事事無孑遺凡是為善者聞之惻然悲道州既己矣往者不可追何世無其人來者亦可思願以君子文告彼大樂師附於雅歌末奏之白玉墀天子聞此章教化如法施直諫從如流佞臣惡如疵宰相聞此章政柄端正持進賢不知倦去邪勿復疑憲臣聞此章不忍縱詭隨然後告史氏舊史有前規若作陽公傳欲令後世知不勞叙世家不用費文辭但使國史上全録元稹詩此詩分兩大叚看商山陽城驛至事事無孑遺詳叙元詩凡是為善者至未賛嘆之中自攄胸臆中有所感借題發揮正合緇衣好賢之㫖不以理太周而辭繁為嫌也答桐花山木多蓊鬰兹桐獨亭亭葉重碧雲片花簇紫霞英是時三月天春暖山雨晴夜色向月淺暗香隨風輕行者多商賈居者悉黎氓無人解賞愛有客獨屏營手攀花枝立足蹋花影行生憐不得所死欲揚其聲截為天子琴刻作古人形云待我成器薦之於穆清誠是君子心恐非草木情胡為愛其華而反傷其生老龜被刳腸不如無神靈雄鷄自斷尾不願為犧牲况此好顔色花紫葉青青宜遂天地性忍加刀斧刑我思五丁力㧞入九重城當君正殿栽花葉生光晶上對月中桂下覆堦前蓂汎拂香爐煙隱映斧藻屏為君布緑陰當暑蔭軒楹沉沉綠滿地桃李不敢爭為君發清韻風來如叩瓊泠泠聲滿耳鄭衛不足聽受君封植力不獨吐芬馨助君行春令開花應清明受君雨露恩不獨含芳榮戒君無戯言剪葉封弟兄受君歲月功不獨資生成為君長髙枝鳯凰上頭鳴一鳴君萬歲夀如山不傾再鳴萬人泰泰階為之平如何有此用幽滯在巖坰歲月不爾駐孤芳坐凋零請向桐枝上為余題姓名待余有勢力移爾獻丹庭元詩中有爾生不得所我願裁為琴安置君王側調和元首音之句此詩前叚命意相似所謂同者不能自異也我思五丁力以下推廣言之放聲大作所謂異者不能强同也詞意本之杜甫入蜀鳯凰臺一章然彼以淒涼激楚勝此則纒綿濃至一唱三嘆可知居易非無意用世者惜旋用旋黜不獲竟其才耳答四皓廟天下有道見無道巻懐之此乃聖人語吾聞諸仲尼矯矯四先生同稟希世資隨時有顯晦秉道無磷緇秦皇肆暴虐二世遘亂離先生相隨去商嶺採紫芝君看秦獄中戮辱者李斯劉項爭天下謀臣竟悦隨先生如鸞鶴去入冥冥飛君看齊鼎中燋爛者酈其子房得沛公自謂相遇遲八難掉舌樞三界役心機辛苦十數年晝夜形神疲竟雜霸者道徒稱帝者師子房爾則能此非吾所宜漢髙之季年嬖寵鍾所私冢嫡欲廢奪骨肉相憂疑豈無子房口口舌無所施亦有陳平心心計將何為皤皤四先生髙冠危映眉從容下南山顧眄入東闈前瞻惠太子左右生羽儀却顧戚夫人楚舞無光輝心不畫一計口不吐一詞暗定天下本遂安劉氏危子房吾則能此非爾所知先生道既光太子禮甚卑安車留不住功成棄如遺如彼旱天雲一雨百榖滋澤則在天下雲復歸希夷勿髙巢與由勿尚吕與伊巢由往不返伊吕去不歸豈如四先生出處兩逶迤何必長隱逸何必長濟時由來聖人道無朕不可窺巻之不盈握舒之亘八陲先生道甚明夫子猶或非願子辨其惑為予吟此詩元詩責四皓定惠帝以釀吕氏之禍此事後之論未免過苛假令當年廢長立愛如意嗣位所恃以託孤者獨一周昌耳絳灌諸人未必帖然心服且産祿輩根蒂深固吕雉搆患益急保無意外之變耶居易駁之自是正論起引孔子語未又歸到聖人之道前後照應中間以子房作陪蓋當劉項逐鹿之時羣雄擾擾皆功名之士子房獨具入道之姿其傑出者也借賔定主身分愈髙隨手帯出陳平則賔中賔也未又以伊吕巢由作襯議論瀾翻不竭全是以作文法行之直可當一篇四晧論讀和雉媒吟君雉媒什一哂復一歎和之一何晚今日乃成篇豈唯鳥有之抑亦人復然張陳刎頸交竟以勢不完至今不平氣塞絶泜水源趙襄骨肉親亦以利相殘至今不善名髙於磨筓山况此籠中雉志在飲啄間稻粱暫入口性己隨人遷身苦亦自忘同族何足言但恨為媒拙不足以自全勸君今日後養鳥養青鸞青鸞一失侣至死守孤單勸君今日後結客結任安主人賔客去獨住在門䦨正意多喻意少言下竦然驚心動魄御選唐宋詩醇巻十九
