  text: 欽定四庫全書御選唐宋詩醇卷二十三
  hash: sha256:95dc26794b90c166ac927bea4d478f9889716f12ec7eea574ce6f429b5e1ad74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_049-1a, image: WYG1448/WYG1448-0463a.png}
body:
  text: 太原白居易詩五賦得古原草送别離離原上草一嵗一枯榮野火燒不盡春風吹又生逺芳侵古道晴翠接荒城又送王孫去萋萋滿别情復齊漫録曰野火燒不盡春風吹又生不若劉長卿春入燒痕青之句語簡而意盡堯山堂外紀曰白樂天初至京以所業謁顧著作況況覩姓名熟視曰長安米貴居大不易及披卷首篇曰咸陽原上草一嵗一枯榮野火燒不盡春風吹又生乃嗟賞曰道得箇語居亦何難前言戲之耳因為延譽聲名遂振旅次景空寺宿幽上人院不與人境接寺門開向山暮鐘寒鳥聚秋雨病僧閒月隱雲樹外螢飛廊宇間幸投花界宿暫得靜心顔思致清幽開晚唐宗派同李十一醉憶元九花時同醉破春愁醉折花枝當酒籌忽憶故人天際去計程今日到梁州意淺情深格調最近王龍標本事詩曰元和四年三月元微之為御史鞫獄梓潼樂天兄弟送别後旬日與李侍郎建閒逰曲江及慈恩寺飲酣作此詩後旬日得元書果以是日至褒仍寄詩曰夢君兄弟曲江頭也到慈恩寺院逰驛吏喚人排馬去忽驚身在古梁州千里神遇若合符契同錢員外禁中夜直宫漏三聲知半夜好風涼月滿松筠此時閒坐寂無語藥樹影中惟兩人禁中夜作書與元九心緒萬端書兩紙欲封重讀意遲遲五聲宫漏初鳴後一點窗燈欲滅時汪立名曰按元和十二年公在江州作書與微之封題有詩昔憶封書與君夜金鑾殿後欲明天今夜封書在何處廬山菴裏曉燈前即指此書也八月十五日夜禁中獨直對月憶元九銀臺金闕夕沉沉獨宿相思在翰林三五夜中新月色二千里外故人心渚宫東面煙波冷浴殿西頭鐘漏深猶恐清光不同見江陵卑濕足秋隂次聨本色語屬對却極工後來惟蘇軾深得此妙他人效顰則淺率無味矣八月十五日夜聞崔大員外翰林獨直對酒玩月因懷禁中清景偶題是詩秋月髙懸空碧外仙郎靜玩禁闈間嵗中惟有今宵好海內無如此地閒皓色分明雙闕榜清光深到九門關遙聞獨醉還惆悵不見金波照玉山絢爛之極乃造平淡此詩家漸老漸熟之境非淺學所可貌為也村夜霜草蒼蒼蟲切切村南村北行人絶獨出門前望野田月明蕎麥花如雪一味真朴不假妝點自具蒼老之致七絶中之近古者聞蟲暗蟲唧唧夜綿綿況是秋隂欲雨天猶恐愁人暫得睡聲聲移近卧牀前王昭君漢使却回憑寄語黃金何日贖蛾眉君王若問妾顔色莫道不如宫裏時舊事翻新思路自别後二句總從贖字生出此與李商隱詩金徽本是無情物不許文君憶故夫二句用意極相似然彼近尖刻此則深厚乃中晚之判也詩人玉屑曰古今人作昭君詞多矣余獨愛樂天一絶其意優遊而不迫切然樂天賦此詩年甚少題盧祕書夏日新栽竹二十韻湘竹初封植盧生此考槃久持霜節苦新託露根難等度須當砌疏稠要滿欄買憐分薄俸栽稱作閒官葉剪藍羅碎莖抽玉琯端幾聲清淅瀝一簇緑檀欒未夜清嵐入先秋白露團拂肩搖翡翠尉手弄琅玕韻透窗風起隂鋪砌月殘炎天聞覺冷窄地見疑寬梢動勝搖扇枝低好掛冠碧籠煙羃羃珠灑雨珊珊晚籜晴雲展隂芽蟄虺蟠愛從抽馬䇿惜未截魚竿松韻徒煩聽桃夭不足觀梁慚當家杏臺陋本司蘭撐撥詩人興勾牽酒客歡靜連蘆簟滑涼拂葛衣單豈止消時暑應能保嵗寒莫同凡草木一種夏中看正寫旁寫虛寫實寫曲盡新栽竹之趣雕鎪組織異樣新鮮既不笨拙又不纎巧此變盛唐之格調而自出機杼者也晚唐以後多學此種欲與元八卜鄰先有是贈平生心迹最相親欲隱牆東不為身明月好同三徑夜緑楊宜作兩家春每因暫出猶思伴豈得安居不擇鄰何獨終身數相見子孫長作隔牆人句句細貼一層深一層題王侍御池亭朱門深鎖春池滿岸落薔薇水浸莎畢竟林塘誰是主主人來少客來多贈楊祕書巨源自注楊嘗有贈盧洺州詩云三刀夢益州一箭取遼城由是知名早聞一箭取遼城相識雖新有故情清句三朝誰是敵白鬚四海半為兄貧家剃草時時入瘦馬尋花處處行不用更教詩過好折君官職是聲名結是戲語歐陽修謂愈窮愈工則有慨乎其言之也燕子樓三首并序徐州故張尚書有愛妓曰盼盼善歌舞雅多風態豫為校書郎時逰徐泗間張尚書宴豫酒酣出盼盼以佐歡歡甚豫因贈詩云醉嬌勝不得風嫋牡丹花盡歡而去爾後絶不相聞逮兹僅一紀矣昨日司勳員外郎張仲素繢之訪豫因吟新詩有燕子樓三首詞甚婉麗詰其由為盼盼作也繢之從事武寧軍纍年頗知盼盼始末云尚書既沒歸葬東洛而彭城有張氏舊第第中有小樓名燕子盼盼念舊愛而不嫁居是樓十餘年幽獨塊然于今尚在豫愛繢之新詠感彭城舊逰因同其題作三絶句滿窗明月滿簾霜被冷燈殘拂卧牀燕子樓中霜月夜秋來只為一人長鈿暈羅衫色似煙幾回欲著即澘然自從不舞霓裳曲疊在空箱十一年今春有客洛陽回曾到尚書墓上來見說白楊堪作柱爭教紅粉不成灰一唱三歎餘音繞梁似此風調雖起王昌齡李白輩為之何以復加襄陽舟夜下馬襄陽郭移舟漢隂驛秋風截江起寒浪連天白本是多愁人復此風波夕江夜舟行煙淡月濛濛舟行夜色中江鋪滿槽水帆展半檣風呌曙嗷嗷雁啼秋唧唧蟲只應催北客早作白鬚翁浦中夜泊暗上江隄還獨立水風霜氣夜稜稜回看深浦停舟處蘆荻花中一點燈舟中讀元九詩把君詩卷燈前讀詩盡燈殘天未明眼痛滅燈猶暗坐逆風吹浪打船聲字字沉著二十八字中無限層折元微之聞樂天左降江州詩云殘燈無熖影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒窗居易以為此句他人尚不可聞況僕心哉此詩真可謂同調嵗晚旅望朝來暮去星霜換隂慘陽舒氣序牽萬物秋霜能壞色四時冬日最凋年煙波半露新沙地鳥雀羣飛欲雪天向晚蒼蒼南北望窮隂旅思兩無邊倚天拔地字字竒警與杜甫閣夜詩極相似望江州江回望見雙華表知是潯陽西郭門猶去孤舟三四里水煙沙雨欲黃昏東南行一百韻寄通州元九侍御澧州李十一舍人果州崔二十二使君開州韋大員外庾三十二補闕杜十四拾遺李二十助教員外竇七校書南去經三楚東來過五湖山頭看候館水面問征途地逺窮江界天低極海隅飄零同落葉浩蕩似乘桴漸覺鄉原異深知土産殊夷音語嘲􅑜蠻態笑睢盱水市通闤闠煙村混舳艫吏徵漁户稅人納火田租亥日饒蝦蟹寅年足虎貙成人男作丱事鬼女為巫樓暗攢倡婦隄長簇販夫夜船論鋪賃春酒斷瓶沽見果皆盧橘聞禽悉鷓鴣山歌猿獨呌野哭鳥相呼嶺徼雲成棧江郊水當郛月移翹柱鶴風泛颭檣烏鼇礙潮無信蛟驚浪不虞鼉鳴江擂鼓蜃氣海浮圗樹裂山魈穴沙含水弩樞喘牛犁紫芋羸馬放青菰繡面誰家婢􅀈頭幾嵗奴泥中采菱芡燒後拾樵蘇鼎膩愁烹鱉盤腥厭膾鱸鍾儀徒戀楚張翰浪思吳氣序涼還熱光隂旦復晡身方逐萍梗年欲近桑榆渭北田園廢江西嵗月徂憶歸恆慘淡懷舊忽踟蹰自念咸秦客嘗為鄒魯儒藴藏經國術輕棄度關繻賦力淩鸚鵡詞鋒敵轆轤戰文重掉鞅射䇿一彎弧崔杜鞭齊下元韋轡並驅名聲逼揚馬交分過蕭朱世務輕摩揣周行竊覬覦風雲皆㑹合雨露各霑濡共遇升平代偏慚固陋軀承明連夜直建禮拂晨趨美服頒王府珍羞降御厨議髙通白虎諫切伏青蒲柏殿行陪宴花樓走看酺神旗張鳥獸天籟動笙竽戈劎星芒耀魚龍電䇿驅定場排越妓促坐進吳歈縹眇疑仙樂嬋娟勝畫圗歌鬟低翠羽舞汗墮紅珠别選閒逰伴潛招小飲徒一杯愁已破三盞氣彌粗軟美仇家酒幽閒葛氏姝十千方得斗二八正當壚論笑杓胡律談憐鞏囁嚅李酣尤短竇庾醉更蔫迂鞍馬呼教住骰盤喝遣輸長驅波卷白連擲采成盧籌併頻逃席觥嚴别置盂滿巵那可灌頽玉不勝扶入視中樞草歸乘內廄駒醉曾衝宰相驕不揖金吾日近恩雖重雲髙勢却孤翻身落霄漢失腳到泥塗博望移門籍潯陽佐郡符時情變寒暑世利算錙銖望日辭雙闕明朝别九衢播遷分郡國次第出京都秦嶺馳三驛商山上二刊峴陽亭寂寞夏口路﨑嶇大道全生棘中丁盡執殳江關未徹警淮冦尚稽誅林對東西寺山分大小姑廬峯蓮刻削湓水帶縈紆九派吞青草孤城覆緑蕪黃昏鐘寂寂清曉角嗚嗚春色辭門栁秋聲到井梧殘芳悲鶗鴂暮節感茱茰蕊拆金英菊花飄雪片蘆波紅日斜沒沙白月平鋪幾見林抽筍頻驚燕引雛嵗華何倐忽年少不須㬰眇默思千古蒼茫想八區孔窮緣底事顔天有何辜龍智猶經醢龜靈未免刳窮通應已定聖哲不能逾況我身謀拙逢他厄運拘漂流隨大海錘煆任洪爐險阻嘗之矣栖遲命也夫沉冥消意氣窮餓耗肌膚防瘴和殘藥迎寒補舊襦書牀鳴蟋蟀琴匣網蜘蛛貧室如懸磬端憂劇守株時遭人指點數被鬼揶揄兀兀都疑夢昏昏半是愚女驚朝不起妻怪夜長吁萬里拋朋侣三年隔友于自然悲聚散不是恨榮枯去夏微之瘧今春席八殂天涯書達否泉下哭知無謾寫詩盈卷空盛酒滿壺只添新悵望豈復舊歡娛壯志因愁減衰容與病俱相逢應不識滿頷白髭鬚波瀾壯闊筆力沉雄較代書百韻更勝杜甫而下罕與為儷圖字一韻重押以字義不同也唐宋人往往有之許彥周詩話曰春色辭門栁秋聲到井梧此語未易及也馮舒曰先叙東南行情景因情景追念前時以見題之後先輕重與代書一篇體勢殊甚各致其情文章變化因物賦形多類此也汪立名曰按洪氏隆興職方乘嶺南村落有市謂之墟以其不常㑹多虛日也西蜀曰痎言如痎疾間而後作江南惡以疾稱因止曰亥獨徐筠水志云荆吳俗以寅申巳亥日集於市觀公詩用亥日甚多則徐氏之說為是初到江州寄翰林張李杜三學士早攀霄漢上天衢晚落風波委世途雨露施恩無厚薄蓬蒿隨分有榮枯傷禽側翅驚弓箭老婦低顔事舅姑碧落三山曾識面年深記得姓名無喻意頗俚俗一入文人之口便極風雅其情深也庾樓曉望獨憑朱檻立淩晨山色初明水色新竹霧曉籠銜嶺月蘋風暖送過江春子城隂處猶殘雪衙鼓聲前未有塵三百年來庾樓上曾經多少望鄉人中兩聨寫景一逺一近結十四字如生鐵鑄成有千鈞之力春末夏初閒逰江郭二首閒出乘輕屐徐行踏軟沙觀魚傍湓浦看竹入楊家自注湓浦多魚浦西有楊侍郎宅多好竹林迸穿籬筍藤飄落水花雨埋釣舟小風揚酒旗斜嫩剝青菱角濃煎白茗芽淹留不知夕城樹欲棲鴉栁影繁初合鶯聲澀漸稀早梅迎夏結殘絮送春飛西日韶光盡南風暑氣微展張新小簟尉貼舊生衣緑蟻杯香嫩紅絲鱠縷肥故園無此味何必苦思歸清氣溢素襟句句切春末夏初景色題元八溪居溪風漠漠樹重重水檻山窗次第逄晚葉尚開紅躑躅秋房初結白芙蓉聲來枕上千年鶴影落杯中五老峯更愧殷勤留客意魚鮮飯細酒香濃通首娟靜腹聨對句更超妙江樓早秋南國雖多熱秋來亦不遲湖光朝霽後竹氣晚涼時樓閣宜佳客江山入好詩清風水蘋葉白露木蘭枝欲作雲泉計須營伏臘資匡廬一步地官滿更何之送客之湖南年年漸見南方物事事堪傷北客情山鬼趫跳惟一足峽猿哀怨過三聲帆開青草湖中去衣濕黃梅雨裏行别後雙魚難定寄近來潮不到湓城青草湖黃梅雨時地一併醒出屬對工切渾成百花亭晚望夜歸百花亭上晚徘徊雲影隂晴掩復開日色悠揚映山盡雨聲蕭颯度江來鬢毛過病雙如雪心緒逄秋一似灰向夜欲歸愁未了滿湖明月小船回次聨有氣勢蘇軾詩天外黑風吹海立浙東飛雨過江來二句本此而下字更竒西樓小郡大江邊危樓夕照前青蕪卑濕地白露泬寥天鄉國此時阻家書何處傳仍聞陳蔡戍轉戰已三年神似杜甫庾樓新嵗嵗時銷旅貌風景觸鄉愁牢落江湖意新年上庾樓唐汝詢曰此登樓而感謫宦也羇旅之貌隨時而銷懷鄉之愁觸景而發人情之常也若乃牢落江湖之意則於新年登庾樓而益甚焉上香爐峰倚石攀蘿歇病身青笻竹杖白紗巾他時畫出廬山障便是香爐峰上人早發楚城驛過雨塵埃滅㳂江道徑平月乘殘夜出人趁早涼行寂歷閒吟動冥濛暗思生荷塘翻露氣稻壟㵼泉聲宿犬聞鈴起栖禽見火驚曨曨煙樹色十里始天明汪立名曰按太平寰宇記貞觀八年廢楚城縣歸潯陽詳其地即舊屬柴桑又云按圖經晉建興元年始立郡領潯陽柴桑彭澤上甲九江等五縣則潯陽柴桑各有其地自後併潯陽入柴桑後廢柴桑為潯陽於是潯陽柴桑合一縣而名異建昌江建昌江水縣門前立馬教人喚渡船忽似往年歸蔡渡草風沙雨渭河邊香爐峰下新卜山居草堂初成偶題東壁五架三間新草堂石階桂柱竹編牆南簷納日冬天暖北户迎風夏月涼灑砌飛泉才有點拂窗斜竹不成行來春更葺東廂屋紙閣蘆簾著孟光重題長松樹下小溪頭斑鹿胎巾白布裘藥圃荼園為産業野麋林鶴是交逰雲生澗户衣裳潤嵐隱山厨火燭幽最愛一泉新引得清泠屈曲繞階流日高睡足猶慵起小閣重衾不怕寒遺愛寺鐘欹枕聽香爐峯雪撥簾看匡廬便是逃名地司馬仍為送老官心泰身寧是歸處故鄉可獨在長安觸境怡情及時行樂遷謫之感毫不挂懷全是一團真趣流露筆墨間編集拙詩成一十五卷因題卷末戲贈元九李二十一篇長恨有風情十首秦吟近正聲每被老元偷格律苦教短李伏歌行世間富貴應無分身後文章合有名莫怪氣粗言語大新排十五卷詩成自負語實是苦心語末學詆訶居易殆杜甫所謂爾曹身與名俱滅不廢江河萬古流也湖上閒望藤花浪拂紫茸條菰葉風翻緑剪刀閒弄水芳生楚思時時合眼詠離騷江樓夜吟元九律詩成三十韻昨夜江樓上吟君數十篇詞飄朱檻底韻墮渌江前清楚音諧律精微思入𤣥收將白雪麗奪盡碧雲妍寸截金為句雙雕玉作聨八風淒間發五彩爛相宣氷扣聲聲冷珠排字字圎文頭交比繡筋骨軟於綿澒湧同波浪錚鏦過管絃醴泉流出地鈞樂下從天神鬼聞如泣魚龍聽似禪星回疑聚集月落為留連雁感無鳴者猿愁亦悄然交流遷客淚停住賈人船暗被歌姬乞潛聞思婦傳斜行題粉壁短卷寫紅箋肉味經時忘頭風當日痊老張知定伏短李愛應顛道屈才方振身間業始専天教聲烜赫理合命迍邅顧我文章劣知他氣力全功夫雖共到巧拙尚相懸各有詩千首俱拋海一邊白頭吟處變青眼望中穿酬答朝妨食披尋夜廢眠老償文債負宿結字因緣每歎陳夫子常嗟李謫仙名高折人爵思苦減天年不得當時遇空令後代憐相悲今若此湓浦與通川起聨點題因極贊元九之詩道屈才方振四句作轉軸顧我文章劣至宿結字因緣叙自己之詩并及遭際每歎陳夫子至空令後代憐又舉古人之能詩不遇者以况兩人結出現在之地含蓄不盡其說詩處譬如飲水冷暖自知又如食蜜中邊皆甜兩人同調可方伯牙鍾期矣送客春逰嶺南二十韻已訝逰何逺仍嗟别太頻離容君蹙促贈語我殷勤迢遞天南面蒼茫海北漘訶陵國分界交趾郡為鄰蓊鬱三光晦溫暾四氣勻隂晴變寒暑昏曉錯星辰瘴地難為老蠻陬不易馴土民稀白首洞主盡黃巾戰艦猶驚浪戎軍未息塵紅旗圍卉服紫綬裹文身麵苦桄榔裛漿酸橄欖新牙檣迎海舶銅鼓賽江神不凍貪泉暖無霜毒草春雲煙蟒蛇氣刀劔鱷魚鱗路足羇棲客官多謫逐臣天黃生颶母雨黑長楓人回使先傳語征軒早返輪須防杯裏蠱莫愛橐中珍北與南殊俗身將貨孰親嘗聞君子誡憂道不憂貧前叙嶺南風土物産之異結處規以不貪忠告善道所以致殷勤也送逺詩如此用意乃為深厚泛作安慰語便淺方回曰大抵中唐人善言風土如西北風沙酩漿氊幄之區東南水國蠻島夷洞之外無不曲盡其妙樂天此詩亦可謂曲盡南中之俗矣輟耕録曰南人方言曰溫暾者得懷暖也王建宫詞新晴草色暖溫暾得行簡書聞欲下峽先以此寄朝來又得東川信欲取春初發梓州書報九江聞暫喜路經三峽想還愁瀟湘瘴霧加餐飯灎澦驚波穩泊舟欲寄兩行迎爾淚長江不肯向西流南湖早春風回雲斷雨初晴返照湖邊暖復明亂點碎紅山杏發平鋪新緑水蘋生翅低白雁飛仍重舌澀黃鸝語未成不道江南春不好年年衰病減心情刻畫早春有色澤腹聨尤警題韋家泉池泉落青山出白雲縈村繞郭幾家分自從引作池中水深淺方圓一任君點額魚龍門點額意何如紅尾青鬐却返初見說在天行雨苦為龍未必勝為魚比體即曳尾泥中意夜送孟司功潯陽白司馬夜送孟功曹江暗管弦急樓明燈火髙湖波翻似箭霜草殺如刀且莫開征棹隂風正怒號一氣旋折全以神行不知是情是景筆墨之痕俱化五律中此種境界開自老杜意到筆隨非可以規倣而得者也湖亭與行簡宿潯陽少有風情客招宿湖亭盡却回水檻虛涼風月好夜深誰共阿憐來贈江客江栁隂寒新雨地塞鴻聲急欲霜天愁君獨向沙頭宿水繞蘆花月滿船清冷逼人潯陽秋懷贈許明府霜紅二林葉風白九江波暝色投煙鳥秋聲帶雨荷馬閒無處出門冷少人過鹵莽還鄉夢依稀望闕歌共思除醉外無計奈愁何試問陶家酒新篘得幾多題遺愛寺前溪松偃亞長松樹侵臨小石溪靜將流水對高共逺峯齊翠蓋煙籠密花幢雪壓低與僧清影坐借鶴穩枝棲筆寫形難似琴偷韻易迷暑天風槭槭晴夜露淒淒獨契依為舍閒行繞作蹊棟梁君莫采留著伴幽棲咏物善取神韻故著題而不呆板若過於求切轉蹈剪綵為花之弊聞楊十二新拜省郎遙以詩賀文昌新入有光輝紫界宫牆白粉闈曉日雞人傳漏箭春風侍女護朝衣雪飄歌句高難和鶴拂煙霄老慣飛官職聲名俱入手近來詩客似君稀穩稱中自饒風致對句較出句必分外精警固由機熟亦本思長送韋侍御量移金州司馬春歡雨露同霑澤冬歎風霜獨滿衣留滯多時如我少遷移好處似君稀卧龍雲到須先起蟄燕雷驚尚未飛莫恨東西溝水别滄溟長短擬同歸江西裴常侍以優禮見待又䝉贈詩輒叙鄙誠用伸感謝一從簪笏事金貂每借溫顔放折腰長覺身輕離泥滓忽驚手重捧瓊瑶馬因回顧雖增價桐遇知音己半焦他日秉鈞如見念壯心直氣未全銷優禮贈詩分對工細一結有身分遷謫之久一味感恩幸澤豈復能自樹立耶别草堂三間茅舍向山開一帶山泉繞舍回山色泉聲莫惆悵三年官滿却歸來行次夏口先寄李大夫連山斷處大江流紅斾逶迤鎮上遊幕下翺翔秦御史軍前奔走漢諸侯曾陪劎履升鸞殿欲謁旌幢入鶴樓假著緋袍君莫笑恩深始得向忠州用事典切聲調高亮七律中正法眼藏與劉禹錫最相似重贈李大夫早接清班登玉階同承别詔直金鑾鳯巢閣上容身穩鶴鎖籠中展翅難流落多年應是命量移逺近未成官慚君獨不欺憔悴猶作銀臺舊眼看御選唐宋詩醇卷二十三
