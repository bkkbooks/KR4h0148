  text: 欽定四庫全書御選唐宋詩醇巻十六
  hash: sha256:78be776a0d2e8578a2c2e468b0fe2786fb4c8b2a23e1d7b7fbd224eaf8e2c6d4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_035-1a, image: WYG1448/WYG1448-0350a.png}
body:
  text: 襄陽杜甫詩八涪江泛舟送韋班歸京得山字追餞同舟日傷春一水間飄零為客久衰老羡君還花逺重重樹雲輕處處山天涯故人少更益鬢毛斑春日梓州登樓行路難如此登樓望欲迷身無却少壯跡有但羈栖江水流城郭春風入皷鞞雙雙新燕子依舊已銜泥滿目悲涼頸聨却極醖藉郪城西原送李判官兄武判官弟赴成都府慿髙送所親久坐惜芳辰逺水非無浪他山自有春野花隨處發官柳著行新天際傷愁别離筵何太頻三四比興有味送路六侍御入朝童稚情親四十年中間消息兩茫然更為後㑹知何地忽漫相逢是别筵不分桃花紅勝錦生憎柳絮白於綿劔南春色還無頼觸忤愁人到酒邊張溍曰妙用倒叙法前四句藏多少曲折望牛頭寺牛頭見鶴林梯逕繞幽深春色浮山外天河宿殿隂傳燈無白日布地有黄金休作狂歌老迴㸔不住心上兠率寺兠率知名寺真如㑹法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不忘白牛車逺近且欲上慈航葉夢得曰詩人以一字為工世固知之唯變化開闔出竒無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺近數千里上下數百年盡在有自兩字間而呑吐山川之氣俯仰古今之懷皆見於言外也登牛頭山亭子路出雙林外亭窺萬井中江城孤照日山谷逺含風兵革身將老關河信不通猶殘數行淚忍對百花叢陪李梓州王閬州蘇遂州李果州四使君登惠義寺春日無人境虚空不住天鶯花隨世界樓閣寄山巔遲暮身何得登臨意惘然誰能觧金印瀟洒共安禪涪城縣香積寺官閣寺下春江深不流山腰官閣迥添愁含風翠壁孤雲細背日丹楓萬木稠小院迴廊春寂寂浴鳬飛鷺晚悠悠諸天合在藤蘿外昏黒應須到上頭戲題寄上漢中王羣盜無歸路衰顔㑹逺方尚憐詩警䇿猶記酒顛狂魯衛彌尊重徐陳畧喪亡空餘枚叟在應念早升堂王士正曰頸聨十字情事可感仇兆鼇曰羣盜蜀有徐知道兩京有党項羌東都有史朝義無歸路公不能歸鄉㑹逺方遇王於梓州也倦夜竹涼侵卧内野月滿庭隅重露成涓滴稀星乍有無暗飛螢自照水宿鳥相呼萬事干戈裏空悲清夜徂王直方曰東坡云司空表聖自論其詩以為得味外味緑樹連村暗黄花入麥稀此句最善又云棋聲花院閉幡影石壇髙吾嘗獨游五老峰入白鶴觀松隂滿地不見一人惟聞棋聲然後知此句之工但恨其寒儉有僧態若子美暗飛螢自照水宿鳥相呼四更山吐月殘夜水明樓才力富健去表聖之流逺矣對雨莽莽天涯雨江邊獨立時不愁巴道路恐濕漢旌旗雪嶺防秋急䋲橋戰勝遲西戎甥舅禮未敢背恩私感時憂國觸緒即來非忠義根於至性者不可强為所以獨冠千古而上繼騷雅王命漢北豺狼滿巴西道路難血埋諸將甲骨斷使臣鞍牢落新燒棧蒼茫舊築壇深懷喻蜀意慟哭望王官朱鶴齡曰王官當指嚴武吐蕃圍松州髙適不能制故蜀人思得武以代之有感將帥䝉恩澤兵戈有嵗年至今勞聖主何以報皇天白骨新交戰雲臺舊拓邊乘槎斷消息無處覔張騫洪邁曰前輩謂少陵當流離顛沛之際一飯不忘君故詩有云萬方頻送喜無乃聖躬勞至今勞聖主何以報皇天獨使至尊憂社稷諸君何以答昇平天子亦應厭奔走諸君固合思昇平皆是心也幽薊餘虵豕乾坤尚虎狼諸侯春不貢使者日相望慎勿吞青海無勞問越裳大君先息戰歸馬華山陽趙次公曰左傳吳為封豕長蛇荐食上國今言餘蛇豕於幽薊葢史朝義雖滅尚有未臣服者青海謂西羌越裳謂東夷戎之以無事于彼也洛下舟車入天中貢賦均日聞紅粟腐寒待翠華春莫取金湯固長令宇宙新不過行儉徳盜賊本王臣中原未得平安報醉裏眉攢萬國愁以韻語攄讜議其源固自二雅來也至今勞聖主何以報皇天直使泄泄之臣置身無地不過行儉德盜賊本王臣其識解閎逺如此王嗣奭曰此五詩皆救時之碩畫報主之赤心自許稷契真非虚語黄生曰七律之諸將責人臣也五律之有感諷人君也然此雖諷人君未嘗不責其臣以疆圉國事敗壞至此皆人臣之罪也公平曰諄諄論社稷憂時事者大指盡此仇兆鼇曰此言洛都之非計也議者謂帝幸東都其地舟車咸集貢賦道均且傳倉多積粟春待駕臨此特進言者之侈談耳豈知國家欲固金湯而新宇宙實不係乎此若能行儉徳以愛人則盜賊本王臣耳何必為此遷都之役耶王道俊曰王導論遷都云能宏衛文大帛之冠無往不可若不績其麻則樂土為墟公意如此送元二適江左亂後今相見秋深復逺行風塵為客日江海送君情晉室丹陽尹公孫白帝城經過自愛惜取次莫論兵原注元常應孫呉科舉劉㑹孟曰戒其經過論兵豈非藩鎮節度有難言者乎此等結語熟味最是深厚章梓州水亭原注時漢中王兼道士席謙在㑹同用荷字韻城晚通雲霧亭深到芰荷吏人橋外少秋水席邊多近屬淮王至髙門薊子過荆州愛山簡吾醉亦長歌三四佳致翫月呈漢中王夜深露氣清江月滿江城浮客轉危坐歸舟應獨行闗山同一照烏鵲自多驚欲得淮王術風吹暈已生登髙風急天髙猿嘯哀渚清沙白鳥飛迴無邊落木蕭蕭下不盡長江衮衮來萬里悲秋常作客百年多病獨登臺艱難苦恨繁霜鬢潦倒新停濁酒盃氣象髙渾有如巫峽千尋走雲連風誠為七律中希有之作後人無其骨力徒肖之於聲貌之間外强而中乾是為不善學杜者胡應麟曰五十六字如海底珊瑚瘦勁難移沈深莫測而精光萬丈力量萬鈞通章章法句法字法前無昔人後無來者此當為古今七律第一遣憤聞道花門將論功未盡歸自從収帝里誰復總戎機蜂蠆終懷毒雷霆可振威莫令鞭血地再濕漢臣衣朱鶴齡曰永泰元年郭子儀與囬紇共破吐蕃前後贈賚無算所謂論功未盡歸也京師解嚴魚朝恩統神䇿軍軍勢浸盛誰復總戎機盖諷中人典兵而任子儀之不專也送陵州路使君赴任王室比多難髙官皆武臣幽燕通使者岳牧用詞人國待賢良急君當拔擢新佩刀成氣象行蓋出風塵戰伐乾坤破瘡痍府庫貧衆寮宜潔白萬役但平均霄漢瞻佳士泥途任此身秋天正搖落迴首大江濱西山三首彛界荒山頂蕃州積雪邊築城依白帝轉粟上青天蜀將分旗皷羌兵助井泉西南背和好殺氣日相纒辛苦三城戍長防萬里秋烟塵侵火井雨雪閉松州風動將軍幕天寒使者裘漫山賊營壘迴首得無憂子弟猶深入關城未觧圍蠶崖鐵馬瘦灌口米船稀辯士安邊䇿元戎決勝威今朝烏鵲喜欲報凱歌歸仇兆鰲曰公抱憂國之懷籌時之畧而又洊逢亂離故在梓閬間有感於朝事邊防凡見諸詩歌者多悲涼激壯之語而各篇精神煥發氣骨風神並臻其極熟復長吟知為千舌絶唱也絶句江邊踏青罷迴首見旌旗風起春城暮髙樓皷角悲城上草滿巴西緑空城白日長風吹花片片春動水茫茫八駿隨天子羣臣從武皇遙聞出巡守早晚徧遐荒用周穆漢武為喻立言得體王嗣奭曰叙景言情真堪痛哭詩之不愧風人者也傷春五首天下兵雖滿春光日自濃西京疲百戰北闕任羣兇闗塞三千里烟花一萬重䝉塵清露急御宿且誰供殷復前王道周遷舊國容蓬萊足雲氣應合總從龍鸎入新年語花開滿故枝天青風捲幔草碧水通池牢落官軍速蕭條萬事危鬢毛元自白淚㸃向來垂不是無兄弟其如有别離巴山春色静北望轉逶迤日月還相鬭星辰屢合圍不成誅執法焉得變危機大角纒兵氣鈎陳出帝畿烟塵昏御道耆舊把天衣行在諸軍闕來朝大將稀賢多隠屠釣王肯載同歸再有朝廷亂難知消息真近傳王在洛復道使歸秦奪馬悲公主登車泣貴嬪蕭闗迷北上滄海欲東巡敢料安危體猶多老大臣豈無嵇紹血霑灑屬車塵聞説初東幸孤兒却走多難分太倉粟競棄魯陽戈胡虜登前殿王公出御河得無中夜舞誰憶大風歌春色生烽燧幽人泣薜蘿君臣重脩徳猶足見時和無窮悲憤一片忠懇大雅之後絶無而僅有論詩至此可以表乾裏坤與天地終始求之於風容色澤之間無以涉其藩籬況堂奥乎朱鶴齡曰代宗致亂因信任非人老臣不用故曰賢多隠屠釣曰猶多老大臣曰誰憶大風歌篇中毎三致意焉仇兆鰲曰此與有感皆記時事纒綿悱惻發於忠君愛國之誠當與洞房八首並傳通鑑廣徳元年十月吐畨陷京師上幸陜州官吏奔散無復供擬扈從將士不免飢餒乃幸魚朝恩營是時下詔徵兵諸將畏程元振讒構莫有至者及至行在太常博士柳伉上疏請斬元振以謝天下乃削其官放歸田里郭子儀合衆軍擊吐畨復長安放船送客蒼溪縣山寒雨不開直愁騎馬滑故作泛舟迴青惜峯巒過黄知橘柚來江流大自在坐穏興悠哉頸聨語極作意而不傷巧呉子良曰錢起詩山來指樵火峯去惜花林不如此詩頸聨奉待嚴大夫殊方又喜故人來重鎮還湏濟世才常怪偏禆終日待不知旌節隔年迴欲辭巴徼啼鸎合逺下荆門去鷁催身老時危思㑹面一生襟抱向誰開奉寄髙常侍汶上相逢年頗多飛騰無那故人何總戎楚蜀應全未方駕曹劉不啻過今日朝廷湏汲黯中原將帥憶亷頗天涯春色催遲暮别淚遙添錦水波將赴荆南寄别李劔州使君髙義驅今古寥落三年坐劔州但見文翁能化俗焉知李廣未封侯路經灔澦雙蓬鬢天入滄浪一釣舟戎馬相逢更何日春風迴首仲宣樓通體響亮申涵光曰王李七子全學此五六句法泛江方舟不用楫極目總無波長日容盃酒深江淨綺羅亂離還奏樂飄泊且聽歌故國流清渭如今花正多陪王使君晦日泛江就黄家亭子山豁何時斷江平不肯流稍知花改岸始騐鳥隨舟結束多紅粉歡娯恨白頭非君愛人客晦日更添愁次句寫物甚工楊慎以為求工反拙不及李羣玉樂府及巴渝竹枝詞何乃妄加軒輊春逺肅肅花絮晚菲菲紅素輕日長唯鳥雀春逺獨柴荆數有闗中亂何曾劔外清故鄉歸不得地入亞夫營黄生曰寫有景之景詩人類能之寫無景之景唯杜獨擅塲此詩上半當想其虚中取意之妙百舌百舌來何處重重秪報春知音兼衆語整翮豈多身花密藏難見枝髙聽轉新過時如發口君側有讒人運古如巳出然亦露却色相地隅江漢山重阻風雲地一隅年年非故物處處是窮途喪亂秦公子悲涼楚大夫平生心已折行路日荒蕪游子巴蜀愁難語呉門興杳然九江春草外三峽暮帆前厭就成都卜休為吏部眠蓬萊如可到衰白問羣仙末句比也謂逺思蓬山者失之歸夢道路時通塞江山日寂寥偷生唯一老伐叛已三朝雨急青楓暮雲深黒水遥夢歸歸未得不用楚辭招極沈欝逸宕之妙滕王亭子君王臺榭枕巴山萬丈丹梯尚可攀春日鸎啼修竹裏仙家犬吠白雲間清江錦石傷心麗嫩蘂濃花滿目斑人到於今歌出牧來遊此地不知還仇兆鰲曰末二句一氣讀下正刺其荒游非頌其遺澤也玉臺觀原注滕王造中天積翠玉臺遥上帝髙居絳節朝遂有馮夷來擊皷始知嬴女善吹簫江光隠見黿鼉窟石勢參差烏鵲橋更肯紅顔生羽翼便應黄髪老漁樵純從空際形容穠郁之中彌見格力滕王亭子寂寞春山路君王不復行古牆猶竹色虚閣自松聲鳥雀荒村暮雲霞過客情尚思歌吹入千騎把霓旌渡江春江不可渡二月巳風濤舟楫欹斜疾魚龍偃卧髙渚花兼素錦汀草亂青袍戲問垂綸客悠悠見汝曹送韋郎司直歸成都竄身來蜀地同病得韋郎天下干戈滿江邊嵗月長别筵花欲暮春日鬢俱蒼為問南溪竹抽梢合過牆原注余草堂在成都西郭將赴成都草堂途中有作先寄嚴鄭公得歸茅屋赴成都直為文翁再剖符但使閭閻還揖讓敢論松竹久荒蕪魚知丙穴由來美酒憶郫筒不用酤五馬舊曾諳小徑㡬回書札待潛夫處處青江帶白蘋故園猶得見殘春雪山斥候無兵馬錦里逢迎有主人休怪兒童延俗客不教鵝鴨惱比隣習池未覺風流盡況復荆州賞更新竹寒沙碧浣花溪菱刺藤梢咫尺迷過客徑湏愁出入居人不自解東西書籖藥裹封蛛網野店山橋送馬啼豈藉荒庭春草色先判一飲醉如泥錦官城西生事微烏皮几在還思歸昔去為憂亂兵入今來巳恐隣人非側身天地更懷古迴首風塵甘息機共説總戎雲鳥陣不妨遊子芰荷衣數詩情致委折骨肉停勻杜詩之最近人者末篇特用抝調節奏極佳王士正曰不作竒語髙調而情致圓足遂開玉局劔南門户别房太尉墓他鄉復行役駐馬别孤墳近涙無乾土低空有斷雲對碁陪謝傅把劔覔徐君唯見林花落鸎啼送客聞李因篤曰有歎息此人去蕭條天地空之感自閬州領妻子却赴蜀山行三首汨汨避羣盜悠悠經十年不成向南國復作遊西川物役水虚照魂傷山寂然我生無倚著盡室畏途邊苦調竒語長林偃風色迴復意猶迷衫裛翠微潤馬銜青草嘶棧懸斜避石橋斷却尋溪何日千戈盡飄飄愧老妻行色遞隠見人烟時有無僕夫穿竹語稚子入雲呼轉石驚魑魅抨弓落狖鼯真供一笑樂似欲慰窮途山館南國晝多霧北風天正寒路危行木杪身逺宿雲端山鬼吹燈滅厨人語夜闌鷄鳴問前館世亂敢求安倚杖㸔花雖郭内倚杖即溪邊山縣早休市江橋春聚船狎鷗輕白浪歸雁喜青天物色兼生意淒凉憶去年登樓花近髙樓傷客心萬方多難此登臨錦江春色來天地玉壘浮雲變古今北極朝廷終不改西山㓂盜莫相侵可憐後主還祠廟日暮聊為梁甫吟律法甚細隠𠂻極厚不獨以雄渾髙濶之象陵轢千古葉夢得曰七言律難於氣象雄渾句中有力而紆徐不失言外之意自老杜錦江春色五更鼓角等句後常恨無復繼者申涵光曰北極西山二語可抵一篇王命論春歸苔逕臨江竹茅簷覆地花别來頻甲子倐忽又春華倚杖㸔孤石傾壺就淺沙逺鷗浮水靜輕燕受風斜世路雖多梗吾生亦有涯此身醒復醉乘興即為家仇兆鰲曰螢雪叢説云老杜詩好下受字東坡尤愛輕燕受風斜句以為燕迎風低飛乍前乍後却非受字不能形容楊徳周曰微風燕子斜正與此同㸔詠之不盡味之有餘歸鴈東來萬里客亂定㡬年歸腸斷江城鴈髙髙正北飛自寫心事與王勃九日一絶正堪對照贈王二十四侍御契四十韻往往雖相見飄飄媿此身不闗輕紱冕俱是避風塵一别星橋夜三移斗柄春敗亡非赤壁奔走為黄巾子去何瀟灑余藏異隠淪書成無過鴈衣故有懸鶉恐懼行裝數伶俜卧疾頻曉鸎工迸淚秋月觧傷神㑹面嗟黎黒含悽話苦辛接輿還入楚王粲不歸秦錦里殘丹竈花溪得釣綸消中祗自惜晚起索誰親伏柱聞周史乘槎有漢臣鴛鴻不易狎龍虎未宜馴客則挂冠至交非傾葢新由來意氣合直取性情真浪跡同生死無心恥賤貧偶然存蔗芋幸各對松筠麤飯依他日窮愁怪此辰女長裁褐穏男大巻書匀漰口江如練蠶崖雪似銀名園當翠巘野棹沒青蘋屢喜王侯宅時邀江海人追隨不覺晚欵曲動彌旬但使芝蘭秀何煩棟宇隣山陽無俗物鄭驛正留賓出入並鞍馬光輝叅席珍重遊先主廟更厯少城闉石鏡通幽魄琴臺隠絳唇送終惟糞土結愛獨荆榛置酒髙林下觀碁積水濱區區甘累趼稍稍息勞筋網聚粘圓鯽絲繁煮細蓴長歌敲柳癭小睡凭藤輪農月湏知課田家敢忘勤浮生難去食良㑹惜清晨列國兵戈暗今王徳教淳要聞除猰㺄休作畫麒麟洗眼㸔輕薄虚懐任屈伸莫令膠漆地萬古重雷陳明淨整齊佳語霏霏如吐玉屑張溍曰巻収舒放一一如意具有仙氣寄董卿嘉榮十韻聞道君牙帳防秋近赤霄下臨千雪嶺却背五䋲橋海内久戎服京師今晏朝犬羊曽爛漫宫闕尚蕭條猛將宜嘗膽龍泉必在腰黄圖遭汚辱月窟可焚燒㑹取干戈利無令斥候驕居然雙捕虜自是一嫖姚落日思輕騎髙天憶射雕雲臺畫形像皆為掃氛妖過故斛斯校書莊二首原注老儒艱難時病于庸蜀歎其沒後方授一官此老巳云歿隣人嗟亦休竟無宣室召徒有茂陵求妻子寄他食園林非昔遊空堂繐帷在淅淅野風秋燕入非傍舎鷗歸秪故池斷橋無復板卧柳自生枝遂有山陽作多慚鮑叔知素交零落盡白首淚雙垂黄生曰借古敘事處見筆之老寫景寓情處見筆之靈二種筆法俱難到朱鶴齡曰斛斯即斛斯六乃草堂之隣公所謂酒伴者立秋雨院中有作山雲行絶塞大火復西流飛雨動華屋蕭蕭梁棟秋窮途愧知巳暮齒借前籌巳費清晨謁那成長者謀觧衣開北户髙枕對南樓樹濕風涼進江喧水氣浮禮寛心有適節爽病微瘳主將歸調鼎吾還訪舊丘三四殊有靈氣勝謝眺朔風吹飛雨蕭條江上來之句奉和嚴鄭公軍城早秋秋風嫋嫋動髙旌玉帳分弓射虜營巳収滴博雲間戍更奪蓬婆雪外城院中晚晴懷西郭茅舎幕府秋風日夜清澹雲疎雨過髙城葉心朱實㸔時落階面青苔先自生復有樓臺銜暮景不勞鐘皷報新晴浣花溪裏花饒笑肯信吾兼吏隠名張璁曰此公有不樂於幕府者也明年正月遂行歸草堂宿府清秋幕府井梧寒獨宿江城蠟炬殘永夜角聲悲自語中天月色好誰㸔風塵荏茸音書絶關塞蕭條行路難已忍伶俜十年事强移栖息一枝安多少心事於無聊中出之字字沉欝遣悶奉呈嚴公二十韻白水魚竿客清秋鶴髪翁胡為來幕下秪合在舟中黄巻真如律青袍也自公老妻憂坐痺幼女問頭風平地專欹倒分曹失異同禮甘衰力就義忝上官通疇昔論詩早光輝仗鉞雄寛容存性拙剪拂念途窮露裛思藤架烟霏想桂叢信然龜觸網直作鳥窺籠西嶺紆村北南江遶舎東竹皮寒舊翠椒實雨新紅浪簸船應坼杯乾甕即空藩籬生野徑斤斧任樵童束縳酬知巳蹉跎効小忠周防期稍稍太簡遂怱怱曉入朱扉啟昏歸畫角終不成尋别業未敢息微躬烏鵲愁銀漢駑駘怕錦幪㑹希全物色時放倚梧桐黄生曰公與嚴武始終睽合之故具見此一首葢公在蜀兩依嚴武其於公故舊之情不可謂不厚及居幕中未免以禮數相拘又為同輩所譖此公所以不堪其束縳往往寄之篇詠也送舎弟穎赴齊州岷嶺南蠻北徐關東海西此行何日到送汝萬行啼絶域惟髙枕清風獨杖藜危時暫相見衰白意都迷奉觀嚴鄭公㕔事岷山沲江畫圖十韻得忘字沲水流中座岷山到此堂白波吹粉壁青嶂揷雕梁直訝杉松冷兼疑菱荇香雪雲虚㸃綴沙草得微茫嶺鴈隨毫末川蜺飲練光霏紅洲蘂亂拂黛石蘿長暗谷非關雨丹楓不為霜秋成𤣥圃外景物洞庭旁繪事功殊絶幽襟興激昻從來謝太傅丘壑道難忘甫心繫國家往往因題闌入今為嚴武題畫而不及此蓋志將逺引故語不旁及其詩精嚴流麗㸃睛在虚字讀者宜細玩之胡夏客曰起聨莊重接聨精警収語穏足此最入格之篇仇兆鰲曰昔人論此詩為宋人詠畫之祖但其兮寫山水亦本謝靈運過始寧堡詩杜用以詠畫更較詳細精工耳正月三日歸溪上有作簡院内諸公野外堂依竹籬邊水向城蟻浮仍臘味鷗泛巳春聲藥許隣人斸書從稚子擎白頭趨幕府深覺負平生王嗣奭曰自是𠂻語春日江村農務村村急春流岸岸深乾坤萬里眼時序百年心茅屋還堪賦桃源自可尋艱難賤生理飄泊到如今李因篤曰頷聨十字縱横八極俯仰千秋有鳶飛魚躍之意絶句兩箇黄鸝鳴翠柳一行白鷺上青天忩含西嶺千秋雪門泊東呉萬里船雖非正格自是絶唱近人以四句皆對為截律詩中四句是不知古人兩句一聨四句一絶也哭嚴僕射歸櫬素幔隨流水歸舟返舊京老親如宿昔部曲異平生風送蛟龍匣天長驃騎營一哀三峽暮遺後見君情劉克莊曰老親如宿昔二句極其悽愴李義山過舊府有寄諸掾詩云莫慿無鬼論終負托孤心猶有故吏之情可以矯薄俗渝州候嚴六侍御不到先下峽聞道乗驄發沙邊待至今不知雲雨散虚費矩長吟山帶烏蠻濶江連白帝深船經一柱觀留眼共登臨禹廟禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫龍蛇雲氣生虚壁江聲走白沙早知乘四載疏鑿控三巴龍蛇橘柚宋人亦知其用本事不知其妙在無迹極鏡花水月之趣學者悟此乃得使事三昧法題忠州龍興寺所居院壁忠州三峽内井邑聚雲根小市常争米孤城早閉門空㸔過客淚莫覔主人恩淹泊仍愁虎深居頼獨園旅夜書懷細草微風岸危檣獨夜舟星垂平野濶月湧大江流名豈文章著官應老病休飄飄何所似天地一沙鷗小市常争米孤城早閉門寫荒涼之景如在目前若此孤舟夜泊著語乃極雄傑當由真力彌滿耳李白山隨平野一聨語意暗合不分上下亦見大家才力天然相似劉㑹孟曰等閒星月著一湧字夐覺不同十二月一日寒輕市上山烟碧日滿樓前江霧黄負鹽出井此谿女打皷發船何郡郎新亭舉目風景切茂陵著書消渴長春花不愁不爛漫楚客唯聽棹相將借抝調以遣懐鏘然可聴即㸔燕子入山扉豈有黄鸝厯翠微短短桃花臨水岸輕輕柳絮㸃人衣春來凖擬開懷久老去親知見面稀他日一盃難强進重嗟筋力故山違朱鶴齡曰詩作於冬而有燕子黄鸝桃柳之句蓋逆道其事所謂他日一盃難强進也長江二首衆水㑹涪萬瞿塘争一門朝宗人共挹盜賊爾誰尊孤石隠如馬髙蘿垂飲猿歸心異波浪何事即飛飜浩浩終不息乃知東極臨衆流歸海意萬國奉君心色借瀟湘濶聲驅灔澦深未辭添霧雨接上過衣襟王嗣奭曰詩以長江命題乃寫其朝宗之性以警盜賊之背主者兩章同意王道俊曰江流之大不辭霧雨雨接江流而上過人衣襟之間所謂波浪兼天者如此通鑑永泰元年夏嚴武卒以郭英又代之漢州刺史崔旰攻英乂英乂奔簡州為韓澄所殺楊子琳等起兵討旰蜀中大亂承聞故房相公靈櫬自閬州啟殯歸𦵏東都有作二首逺聞房太尉歸𦵏陸渾山一徳興王後孤魂久客間孔明多故事安石竟崇班他日嘉陵涕仍霑楚水還丹旐飛飛日初傳發閬州風塵終不觧江漢忽同流劔動親身匣書歸故國樓盡哀知有處為客恐長休陳師道詩云丘園無起日江漢有東流為後人傳誦故當本於此詩懷錦水居止萬里橋西宅百花潭北莊層軒皆面水老樹飽經霜雪嶺界天白錦城曛日黄惜哉形勝地回首一茫茫葛常之曰公作草堂經營上元之始斷手寶應之年始終四載而其間往梓閬三年公詩所謂三年奔走空皮骨也其起居寢處之興不足以償其經營往來之勞可謂一世之羈人然自唐至今已數百載而草堂之名與其山川草木皆因公詩以不朽矣子規峽裏雲安縣江樓翼瓦齊兩邊山木合終日子規啼眇眇春風見簫蕭夜色凄客愁那聽此故作傍人低由涵光曰頷聨爽豁如弹丸脱手此太白雋語也立春春日春盤細生菜忽憶兩京梅發時盤出髙門行白玉菜傳纎手送青絲巫峽寒江那對眼杜陵逺客不勝悲此身未知歸定處呼兒覔紙一題詩俯拾即是純用本色讀者當得其自然之趣漫成一絶江月去人只數尺風燈照夜欲三更沙頭宿鷺聨拳靜船尾跳魚撥刺鳴老病老病巫山裏稽留楚客中藥殘他日裹花發去年叢夜足霑沙雨春多逆水風合分雙賜筆猶作一飄蓬南楚南楚青春異暄寒早早分無名江上草隨意嶺頭雲正月蜂相見非時鳥共聞杖藜妨躍馬不是故離羣寫出間曠之致如見沂水春風氣象昭明所云語時事則指而可想論懷抱則曠而且真杜老有之寄岑嘉州原注州據蜀江外不見故人十年餘不道故人無素書願逢顔色關塞逺豈意岀守江城居外江三峽且相接斗酒新詩終日疎謝朓毎篇堪諷誦馮唐巳老聽吹嘘泊船秋夜經春草伏枕青楓限玉除眼前所寄選何物贈子雲安雙鯉魚脱去排比之迹絶無雕飾之痕何等風韻御選唐宋詩醇巻十六
