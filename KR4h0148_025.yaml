  text: 欽定四庫全書御選唐宋詩醇巻十一
  hash: sha256:49d8297cd1fc40bd1876d53bce3387e4822c249e01b3e2bf9b2d60a66895ac22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_025-1a, image: WYG1448/WYG1448-0250c.png}
body:
  text: 襄陽杜甫詩三乾元中寓居同谷縣作歌七首有客有客字子美白頭亂髪垂過耳歲拾橡栗隨狙公天寒日暮山谷裏中原無書歸不得手脚凍皴皮肉死嗚呼一歌兮歌已哀悲風為我從天來舊唐書時榖食踴貴甫寓居成州同谷縣自負薪拾梠兒女饑殍者數人長鑱長鑱白木柄我生託子以為命黄獨無苖山雪盛短衣數挽不掩脛此時與子空歸來男呻女吟四壁静嗚呼二歌兮歌始放鄰里為我色惆悵仇兆鼇曰山谷云陳藏器本草載黄獨遇霜雪枯無苖蓋蹲鴟之類蔡夢弼引別注云黄獨嵗饑土人掘以充糧公詩屢用黄精不必作黄獨按公詩若太平寺泉眼及丈人山皆為引年而發此歌則為救饑而言主黄獨為是有弟有弟在逺方三人各瘦何人强生別展轉不相見胡塵暗天道路長東飛駕鵞後鶖鶬安得送我置汝旁嗚呼三歌兮歌三發汝歸何處收兄骨趙傁曰公四弟曰穎觀豐占各散在他郡惟占從公入蜀有妹有妹在鍾離良人早歿諸孤癡長淮浪髙蛟龍怒十年不見來何遲扁舟欲往箭滿眼杳杳南國多旌旗嗚呼四歌兮歌四奏林猿為我啼清晝朱鶴齡曰猿多夜啼今啼清晝極言其悲也解作竹林穿鑿難信四山多風溪水急寒雨颯颯枯樹濕黄蒿古城雲不開白狐跳梁黄狐立我生何為在窮谷中夜起坐萬感集嗚呼五歌兮歌正長魂招不來歸故鄉仇兆鼇曰此歌忽然變調寫得山昏水惡雨驟風狂荒城晝暝狐羣嘯頓覺空谷孤危萬感交廹招魂於生前收骨於死後見存亡總不能自必矣南有龍兮在山湫古木巃嵸枝相樛木葉黄落龍正蟄蝮蛇東來水上遊我行怪此安敢出拔劍欲斬且復休嗚呼六歌兮歌思遲溪壑為我迴春姿王道俊曰前後六章皆自叙流離之感不應此章獨譏時事蓋詠同谷萬丈潭之龍也郭知達引蘇注云此詩南有龍喻明皇在南内東坡必無是言男兒生不成名身已老三年饑走荒山道長安卿相多少年富貴應須致身早山中儒生舊相識但話宿昔傷懷抱嗚呼七歌兮悄終曲仰視皇天白日速慷慨悲歌足以裂山石而立海水殆所謂自鑄離騷者史遷云人勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也甫之遇為何如哉流離困頓轉徙山谷仰天一呼萬感交集而筆之竒氣之豪又足以發其所感淋漓頓挫自成音節自古及今不可有二宋祁云莫肯念亂小雅怨自然流泣袁安愁此之謂矣歌中思及弟妹字字至情南有龍一篇感時憫亂實有寓意若謂為明皇而作則不免牽合耳李廌曰太白逺別離蜀道難與子美同谷七歌風騷極致不在屈宋之下胡應麟曰杜七歌亦倣張衡四愁然七歌竒崛雄深四愁和平婉麗漢唐短歌各為絶唱所謂異曲同工王嗣奭曰七歌創作原不倣離騷而哀實過之讀離騷未必墮淚而讀此不能終篇則以節短而聲促也仇兆鼇曰七歌結語皆本蔡琰胡笳曲水㑹渡山行有常程中夜尚未安微月沒已久崖傾路何難大江動我前洶若溟渤寛篙師暗理楫歌笑輕波瀾霜濃木石滑風急手足寒入舟已千憂陟巘仍萬盤迥眺積水外始知衆星乾逺遊令人瘦衰疾慙加餐仇兆鼇曰曹孟徳詩星漢燦爛若出其裏與杜句可參㸔飛仙閣土門山行窄微徑緣秋豪棧雲䦨干峻梯石結構牢萬壑欹疎林積陰帯奔濤寒日外淡泊長風中怒號歇鞍在地底始覺所歴髙往來雜坐卧人馬同疲勞浮生有定分饑飽豈可逃歎息謂妻子我何隨汝曹龍門閣清江下龍門絶壁無尺土長風駕髙浪浩浩自太古危途中縈盤仰望垂綫縷滑石欹誰鑿浮梁裊相拄目眩隕雜花頭風吹過雨百年不敢料一墜那得取飽聞經瞿塘足見度大庾終身歴艱險恐懼從此數石櫃閣季冬日已長山晚半天赤蜀道多早花江間饒竒石石櫃曾波上臨虚蕩髙壁清暉囘羣鷗暝色帯逺客羇棲負幽意感歎向絶跡信甘孱懦嬰不獨凍餒廹優遊謝康樂放浪陶彭澤吾衰未自安謝爾性所適暝色帶逺客造語入妙光祿坂行云暝色無人獨歸客雋致減矣桔柏渡青㝠寒江渡駕竹為長橋竿濕烟漠漠江永風蕭蕭連笮動嫋娜征衣颯飄颻急流鴇鷁散絶岸黿鼉驕西轅自茲異東逝不可要髙通荆門路闊㑹滄海潮孤光隱顧眄遊子悵寂寥無以洗心胸前登但山椒劔門惟天有設險劔門天下壮連山抱西南石角皆北向兩崖崇墉倚刻畫城郭状一夫怒臨關百萬未可傍珠玉走中原岷峨氣悽愴三皇五帝前鷄犬各相放後王尚柔逺職貢道已䘮至今英雄人髙視見覇王并吞與割據極力不相讓吾將罪真宰意欲鏟疊嶂恐此復偶然臨風黙惆悵危時之慮與劔閣銘固自有異若李商隱井絡一首乃用銘意者江盈科曰少陵秦州以後詩突兀宏肆逈異昔作非有意換格蜀中山水自是挺特竒崛獨能象景傳神使人讀之山川歴落居然在眼所謂春蠶結繭隨物肖形乃為真詩人真手筆也胡夏客曰劍門詩因劍閣銘而成但銘詞出以莊嚴此詩尤加雄肆用古而能勝於古人方稱作家朱鶴齡曰蜀為財賦所出自明皇臨幸供億不貲民力盡矣民力盡而冦盗乘之晉李特流人之禍可為明鑒此詩故有岷峨悽愴與英雄割據之慮也成都府翳翳桑榆日照我征衣裳我行山川異忽在天一方但逢新人民未卜見故鄉大江東流去遊子去日長曾城填華屋季冬樹木蒼喧然名都㑹吹簫間笙簧信美無與適側身望川梁鳥雀夜各歸中原杳茫茫初月出不髙衆星尚爭光自古有羇旅我何苦哀傷語意多本古人較途中諸作雖氣度少舒而憂思未嘗忘也初月兩語上承中原一句王應麟以謂肅宗初立盗賊未息最為得解蓋至此身事少定不覺念及朝廷甫豈須臾忘君者哉石犀行君不見秦時蜀太守刻石立作三犀牛自古雖有厭勝法天生江水向東流蜀人矜誇一千載泛溢不近張儀樓今年灌口損户口此事或恐為神羞終藉隄防出衆力髙擁木石當清秋先王作法皆正道詭怪何得參人謀嗟爾三犀不經濟缺訛只與長川逝但見元氣常調和自免洪濤恣凋瘵安得壮士提天綱再平水土犀奔茫斥不經之談歸之正道筆力傑奡不落言筌視石笋行尤為擅勝題壁畫馬歌原注韋偃畫章侯別我有所適知我憐君畫無敵戱拈秃筆掃驊騮歘見騏驎出東壁一匹齕草一匹嘶坐㸔千里當霜蹄時危安得真致此與人同生亦同死屹然健筆轉出命意乃詩人之㫖戯題畫山水圖歌原注王宰畫宰丹青絶倫十日畫一水五日畫一石能事不受相促廹王宰始肯留真跡壮哉崑崙方壺圖挂君髙堂之素壁巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍舟人漁子入浦溆山木盡亞洪濤風尤工逺勢古莫比咫尺應須論萬里焉得并州快剪刀剪取吳松半江水無名氏西清詩話曰梁蕭文奐善畫於扇上圖山水咫尺之内便覺萬里為遙老杜云尤工逺勢古莫比咫尺應須論萬里乍讀似非用事如男兒既介胄長揖別上官用介胄之士不拜婦人在軍中兵氣恐不揚用軍中豈有女子乎皆用其事而隱其語題李尊師松樹障子歌老夫清晨梳白頭𤣥都道士來相訪握髪呼兒延入户手提新畫青松障障子松林靜杳㝠憑軒忽若無丹青陰崖却承霜雪幹偃蓋反走虬龍形老夫平生好竒古對此興與精靈聚已知仙客意相親更覺良工心獨苦松下丈人巾屨同偶坐似是商山翁悵望聊歌紫芝曲時危慘澹來悲風戯為雙松圖歌原注韋偃天下幾人畫古松畢宏已老韋偃少絶筆長風起纎末滿堂動色嗟神妙兩株慘裂苔蘚皮屈鐵交錯迴髙枝白摧朽骨龍虎死黒入太隂雷雨垂松根胡僧憇寂寞龎眉皓首無住著偏袒右肩露雙脚葉裏松子僧前落韋侯韋侯數相見我有一匹好東絹重之不減錦繡段已令拂拭光凌亂請公放筆為直幹題畫諸篇刻意冥搜積思獨造與太白觀粉圖山水諸篇並駕齊驅遂為此體之祖至於思業髙竒縋幽鑿險則杜老又似稍優者蓋其詣力所近更覺良工心獨苦也沈徳潛曰突兀起不妨平接如堂上不合生楓樹下云聞君掃却赤縣圖是也平調起必驚語接此詩是也學者於此求之思過半矣病栢有栢生崇岡童童狀車蓋偃蹙龍虎姿主當風雲㑹神明依正直故老多再拜豈知千年根中路顔色壞出非不得地蟠據亦髙大歲寒忽無憑日夜柯葉改丹鳯領九雛哀鳴翔其外鴟鴞志意滿養子穿穴内客從何鄉來佇立久吁怪靜求元精理浩蕩難倚賴託喻之言可垂鑒戒葉夢得曰此詩為明皇而作病橘羣橘少生意雖多亦奚為惜哉結實小酸澀如棠梨剖之盡蠧蟲采掇爽其宜紛然不適口豈只存其皮蕭蕭半死葉未忍別故枝𤣥冬霜雪積况乃迴風吹嘗聞蓬萊殿羅列瀟湘姿此物歲不稔玉食失光輝㓂盗尚憑陵當君減膳時汝病是天意吾諗罪有司憶昔南海使奔騰獻荔支百馬死山谷到今耆舊悲因病橘而囘憶荔枝婉轉言之多少慨歎枯㯶蜀門多㯶櫚髙者十八九其皮割剥甚雖衆亦易朽徒布如雲葉青黄歲寒後交横集斧斤凋䘮先蒲栁傷時苦軍乏一物官盡取嗟爾江漢人生成復何有有同枯㯶木使我沈嘆久死者即已休生者何自守啾啾黄雀啅側見寒蓬走念爾形影乾摧殘沒藜莠仇兆鼇曰詩中詠物之作有就本題作結者此章是也有借客意作結者病橘枯柟是也可悟詩家擒縱之法枯柟楩柟枯崢嶸鄉黨皆莫記不知幾百歲慘慘無生意上枝摩皇天下根蟠厚地巨圍雷霆拆萬孔蟲蟻萃凍雨落流膠衝風奪佳氣白鵠遂不來天鷄為愁思猶含棟梁具無復霄漢志良工古昔少識者出涕淚種榆水中央成長何容易截承金露盤裊裊不自畏四詩皆託物起興風人之嗣音也葉夢得曰此詩當是為房次律而作浦起龍曰四詩寄託遙深歛鋒鍔為之力追古作者戯作花卿歌成都猛將有花卿學語小兒知姓名用如快鶻風火生見賊唯多身始輕綿州副使著柘黄我卿掃除即日平子璋髑髏血糢糊手提擲還崔大夫李侯重有此節度人道我卿絶世無既稱絶世無天子何不喚取守京都收筆婉轉自如所謂意愜闗飛動者不獨子璋一句凛澶有生色也唐書上元二年四月梓州刺史段子璋反襲東川節度使李奐於綿州自稱梁王五月成都尹崔光逺率將花驚定攻拔綿州斬子璋柟樹為風雨所拔歎倚江柟樹草堂前故老相傳二百年誅茅卜居總為此五月髣髴聞寒蟬東南飄風動地至江翻石走流雲氣幹排雷雨猶力爭根斷泉源豈天意滄波老樹性所愛浦上童童一青蓋野客頻留懼雪霜行人不過聽竽籟虎倒龍顛委榛棘淚痕血㸃垂胸臆我有新詩何處吟草堂自此無顔色勢取矯厲意主樸真茅屋為秋風所破歌八月秋髙風怒號巻我屋上三重茅茅飛度江灑江郊髙者掛罥長林梢下者飄轉沉塘坳南村羣童欺我老無力忍能對面為盗賊公然抱茅入竹去唇焦口燥呼不得歸來倚杖自歎息俄頃風定雲墨色秋天漠漠向昏黑布衾多年冷似鐵驕兒惡卧踏裏裂床床屋漏無乾處雨脚如麻未斷絶自經䘮亂少睡眠長夜沾濕何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足極無聊事以直寫見筆力入後大波軒然而起疊筆作收如龍掉尾非僅見此老胸懐若無此意則詩亦可不作朱鶴齡曰白樂天云安得布裘長萬丈與君都蓋洛陽城同此意天邊行天邊老人歸未得日暮東臨大江哭隴右河源不種田胡騎羗兵入巴蜀洪濤滔天風拔木前飛秃鶖後鴻鵠九度附書向洛陽十年骨肉無消息苦戰行苦戰身死馬將軍自云伏波之子孫干戈未定失壯士使我歎恨傷精魂去年江南討狂賊臨江把臂難再得別時孤雲今不飛時獨看雲涙横臆情溢乎詞音長節短述古赤驥頓長纓非無萬里姿悲鳴淚至地為問馭者誰鳯凰從東來何意復髙飛竹花不結實念子忍朝饑古時君臣合可以物理推賢人識定分進退固其宜唐汝詢曰驥無良馭則踠萬里之能鳯無竹實則髙飛而不下君臣相合之義當以此理推之賢者固知所自守而用人者可不加之意乎市人日中集於利競錐刀置膏烈火上哀哀自煎熬農人望歲稔相率除蓬蒿所務榖為本邪贏無乃勞舜舉十六相身尊道何髙秦時任商鞅法令如牛毛比賦相兼名論不朽蘇軾以末四句為稷契輩人語信有其意朱鶴齡曰是時第五琦劉晏皆以宰相領度支鹽鐡使𣙜税四出利析錐刀故言為治之道在乎惇本抑末舉良相以任之不當用興利之臣以滋民偽也觀打魚歌綿州江水之東津魴魚鱍鱍色勝銀漁人漾舟沉大網截江一擁數百鱗衆魚常才盡却棄赤鯉騰出如有神潜龍無聲老蛟怒囘風颯颯吹沙塵饔子左右揮霜刀膾飛金盤白雪髙徐州秃尾不足憶漢陰槎頭逺遁逃魴魚肥美知第一既飽歡娛亦蕭瑟君不見朝來割素鬐咫尺波濤永相失又觀打魚蒼江漁子清晨集設網提綱萬魚急能者操舟疾若風撑突波濤挺义入小魚脱漏不可記半死半生猶戢戢大魚傷損皆垂頭屈强泥沙有時立東津觀魚已再來主人罷鱠還傾盃日暮蛟龍改窟穴山根鱣鮪隨雲雷干戈兵革鬬未止鳯凰麒麟安在哉吾徒胡為縱此樂暴殄天物聖所哀指事言情詞意簡逺如龍門之桐百尺無枝又如萬石洪鐘不作細響此所以為大家仇兆鼇曰從竭澤而漁處寫出慘酷可憐之狀具見愛物仁心黄生曰前詩寓感此詩寓規體物既精命意復逺越王樓歌綿州州府何磊落顯慶年中越王作孤城西北起髙樓碧瓦朱甍照城郭樓下長江百丈清山頭落日半輪明君王舊跡今人賞轉見千秋萬古情泠泠雅調或謂倣王子安滕王閣而風致小遜非也冬到金華山觀因得故拾遺陳公學堂遺跡涪右衆山内金華紫崔嵬上有蔚藍天垂光抱瓊臺繫舟接絶壁杖策窮縈囘四顧俯層巔淡然川谷開雪嶺日色死霜鴻有餘哀焚香玉女跪霧裏仙人來陳公讀書堂石柱仄青苔悲風為我起激烈傷雄才通泉驛南去通泉縣十五里山水作溪行衣自濕亭午氣始散冬温蚊蚋在人逺鳬鴨亂登頓生曽陰欹傾出髙岸驛樓衰栁側縣郭輕烟畔一川何綺麗盡目窮壮觀山色逺寂寞江光夕滋漫傷時愧孔父去國同王粲我生苦飄零所歴有嗟嘆眼前景色寫出自有佳致過郭代公故宅豪俊初未遇其跡或脱畧代公尉通泉放意何自若及夫登衮冕直氣森噴薄磊落見異人豈伊常情度定策神龍後宫中翕清廓俄頃辨尊親指揮存顧託羣公有慚色王室無削弱迥出名臣上丹青照臺閣我行得遺跡池館皆疏鑿壮公臨事斷顧步涕横落髙咏寶劔篇神交付冥漠仇兆鼇曰俄頃辨尊親推其决幾之明壯公臨事斷服其應變之敏二語能寫出代公身分荀彧之失身誤於不能辨陳竇之僨事失於不能斷杜詩論人必具特識推此可見短歌行原注贈王郎司直王郎酒酣拔劔斫地歌莫哀我能拔爾抑塞磊落之竒才豫樟翻風白日動鯨魚跋浪滄溟開且脱佩劔休徘徊西得諸侯棹錦水欲向何門趿珠履仲宣樓頭春色深青眼髙歌望吾子眼中之人吾老矣劉㑹孟曰豪氣激人堂堂復堂堂盧世㴶曰突兀横絶跌宕悲凉桃竹杖引江心蟠石生桃竹蒼波噴浸尺度足斬根削皮如紫玉江妃水仙惜不得梓潼使君開一束滿堂賓客皆歎息憐我老病贈兩莖出入爪甲鏗有聲老夫復欲東南征乗濤鼓枻白帝城路幽必為鬼神奪拔劔或與蛟龍爭重為告曰杖兮杖兮爾之生也甚正直慎勿見水踴躍學變化為龍使我不得爾之扶持滅跡於君山湖上之青峰噫風塵澒洞兮豺虎咬人忽失雙杖兮吾將曷從竒變酷似大白老杜真乃無所不有朱鶴齡曰此詩蓋借竹杖以規諷章留後也既以踴躍為龍戒之又以忽失雙杖危之其㣲㫖可見仇兆鼇曰宋之問騷體詩有嵩山天門歌杜詩此篇所自出然杜之靈竒却勝於宋之雋麗韋諷錄事宅觀曹將軍畫馬圖國初已來畫鞍馬神妙獨數江都王將軍得名三十載人間又見真乗黄曽貌先帝照夜白龍池十日飛霹靂内府殷紅馬腦盤媫好傳詔才人索盤賜將軍拜舞歸輕紈細綺相追飛貴戚權門得筆跡始覺屏障生光輝昔日太宗拳毛騧近時郭家師子花今之畫圖有二馬復令識者久歎嗟此皆騎戰一敵萬縞素漠漠開風沙其餘七匹亦殊絶迥若寒空動烟雪霜蹄蹴踏長楸間馬官厮飬森成列可憐九馬爭神駿顧視清髙氣深稳借問苦心愛者誰後有章諷前支遁憶昔廵幸新豐宮翠華拂天來向東騰驤磊落三萬匹皆與此圖筋骨同自從獻寶朝河宗無復射蛟江水中君不見金粟堆前松栢裏龍媒去盡鳥呼風蒼莾厯落中法律深細前從照夜白叙入即伏未段感慨中間錯綜九馬文勢跌宕可謂毫髪無遺憾波瀾獨老成矣七古至於老杜浩浩落落獨往獨來神龍在霄連蜷變化不可方物天馬行空脱去羈靮足以横睨一世獨有千古東坡書韓幹牧馬圖猶非其匹况他人乎丹青引原注贈曹將軍覇將軍魏武之子孫於今為庶為清門英雄割據雖已矣文彩風流猶尚存學書初學衛夫人但恨無過王右軍丹青不知老將至富貴於我如浮雲開元之中常引見承恩數上南薰殿凌烟功臣少顔色將軍下筆開生面良相頭上進賢冠猛將腰間大羽箭褒公鄂公毛髪動英姿颯爽來酣戰先帝天馬玉花驄畫工如山貌不同是日牽來赤墀下迥立閶闔生長風詔謂將軍拂絹素意匠慘淡經營中斯須九重真龍出一洗萬古凡馬空玉花却在御榻上榻上庭前屹相向至尊含笑催賜金圉人太僕皆惆悵弟子韓幹早入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋䘮將軍畫善蓋有神必逢佳士亦寫真即今飄泊干戈際屢貌㝷常行路人途窮反遭俗眼白世上未有如公貧但㸔古來盛名下終日坎壈纒其身起筆老横開元之中以下叙昔日之遇正為末段反照丹青之妙見贈言之義明矣通篇瀏灕頓挫節奏之妙於斯為極許顗曰老杜丹青引一洗萬古凡馬空東坡觀吳道子畫壁詩筆所未到氣已吞二公之詩足以當之沈徳潛曰畫人畫馬賔主相形縱横跌蕩此種篇法得之於心應之於手有化工而無人力莫能賛歎其妙發䦘中前有毒蛇後猛虎溪行盡日無村塢江風蕭蕭雲拂地山木慘慘天欲雨女病妻憂歸意速秋花錦石誰復數別家三月一得書避地何時免愁苦寄韓諫議今我不樂思岳陽身欲奮飛病在牀美人娟娟隔秋水濯足洞庭望八荒鴻飛㝠㝠日月白青楓葉赤天雨霜玉京羣帝集北斗或騎騏驎翳鳯凰芙蓉旌旗煙霧樂影動倒景揺瀟湘星宫之君醉瓊漿羽人稀少不在旁似聞昨者赤松子恐是漢代韓張良昔隨劉氏定長安帷幄未改神慘傷國家成敗吾豈敢色難腥腐餐風香周南留滯古所惜南極老人應夀昌美人胡為隔秋水焉得置之貢玉堂朱鶴齡曰韓諫議不可考其人似李鄴侯必肅宗收京時嘗與宻謀後屏居衡湘修神仙羽化之道公思之而作惜其留滯秋水而不得大用也浦起龍曰源本楚騷亦近太白憶昔憶昔開元全盛日小邑猶藏萬家室稻米流脂粟米白公私倉廪俱豐實九州道路無豺虎逺行不勞吉日出齊紈魯縞車班班男耕女桑不相失宫中聖人奏雲門天下朋友皆膠漆百餘年間未災變叔孫禮樂蕭何律豈聞一絹直萬錢有田種榖今流血洛陽宫殿燒焚盡宗廟新除狐兎穴傷心不忍問耆舊復恐初從亂離説小臣魯鈍無所能朝廷記識䝉祿秩周宣中興望我皇灑血江漢身衰疾居然變雅治亂相形極其沉痛王嗣奭曰百餘年間二句蓋言法度之存亡闗乎國家之理亂先叙此二語隨用豈聞二字轉下如快馬驀澗何等筆力仇兆鼇曰明皇當豐亨豫大時忽盈虚消息之理致開元變為天寶流禍兩朝而亂猶未已此詩於理亂興亡之故反覆痛陳蓋亟望代宗撥亂反治復見開元之盛焉冬狩行原注時梓州刺史章彛兼侍御史留後東川君不見東川節度兵馬雄校獵亦似觀成功夜發猛士三千人清晨合圍步驟同禽獸已斃十七八殺聲落日迴蒼穹幕前生致九青兕馲駝􅐑峞垂𤣥熊東西南北百里間髣髴蹴踏寒山空有鳥名鸜鵒力不能髙飛逐走蓬肉味不足登鼎俎何為見羈虞羅中春蒐冬狩侯得同使君五馬一馬驄况今攝行大將權號令頗有前賢風飄然時危一老翁十年厭見旌旗紅喜君士卒甚整肅為我迴轡擒西戎草中狐盡何益天子不在咸陽宫朝廷雖無幽王禍得不哀痛塵再䝉嗚呼得不哀痛塵再䝉大義凛然及今誦之如見其壯顔毅色申涵光曰草中狐盡何益二句即賈生不獵猛敵而獵禽獸意王洙曰代宗在陜詔徴天下兵時程元振用事無一人應詔者故章末感激言之別唐十五誡因寄禮部賈侍郎九載一相逢百年能幾何復為萬里別送子山之阿白鶴久同林潜魚本同河未知棲集期衰老强髙歌歌罷兩悽惻六龍忽蹉跎相視髪皓白况難駐羲和胡星墜燕地漢將仍横戈蕭條四海内人少豺虎多少人慎莫投多虎信所過飢有易子食獸猶畏虞羅子負經濟才天門鬱嵯峨飄飄適東周來往若崩波南宫吾故人白馬金盤陀雄筆映千古見賢心靡他念子善師事嵗寒守舊柯為吾謝賈公病肺卧江沱梅堯臣曰飢有易子食二語含蓄甚深殆不可模倣閬山歌閬州城東靈山白閬州城北玉臺碧松浮欲盡不盡雲江動將崩未崩石那知根無鬼神㑹已覺氣與嵩華敵中原格鬬且未歸應結茅齋看青壁閬水歌嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童蕩槳欹側過水雞銜魚來去飛閬中勝事可腸斷閬州城南天下稀二詩著語竒秀覺空翠撲人冲襟相照草堂昔我去草堂蠻夷塞成都今我歸草堂成都適無虞請陳初亂時反覆乃須臾大將赴朝廷羣小起異圖中宵斬白馬盟㰱氣己麤西取卭南兵北斷劒閣隅布衣數十人亦擁專城居其勢不兩大始聞蕃漢殊西卒却倒戈賊臣互相誅焉知肘腋禍自及裊獍徒義士皆痛憤紀綱亂相踰一國實三公萬人欲為魚唱和作威福孰肯辨無辜眼前列杻械背後吹笙竽談笑行殺戮濺血滿長衢到今用鉞地風雨聞號呼鬼妾與鬼馬色悲充爾娛國家法令在此又足驚吁賤子且奔走三年望東吳弧矢暗江海難為遊五湖不忍竟舍此復來薙榛蕪入門四松在步屧萬竹疎舊犬喜我歸低佪入衣裾鄰舍喜我歸沽酒携胡蘆大官喜我來遣騎問所須城郭喜我來賔客隘村墟天下尚未寧健兒勝腐儒飄颻風塵際何地置老夫於時見疣贅骨髓幸未枯飲啄媿殘生食薇不敢餘記離亂事可補史氏之闕黄鶴曰公昔去成都因送嚴武入朝未㡬徐知道反遂入梓州繼以吐蕃入寇陷松維州勢迫近蜀此詩首言成都之亂似專指羌人而羣小賊臣因之為亂者也劉克莊後村詩話子羙草堂舊犬喜我歸鄰舍喜我歸大官喜我來城郭喜我來四韻其體從木蘭詩中得來太子張舍人遺織成褥段客從西北來遺我翠織成開緘風濤湧中有掉尾鯨逶迤羅水族瑣細不足名客云充君褥承君終宴榮空堂魑魅走髙枕形神清領客珍重意顧我非公卿留之懼不祥施之混柴荆服飾定尊卑大哉萬古程今我一賤老裋褐更無營煌煌珠宫物寢處禍所嬰歎息當路子干戈尚縱横掌握有權柄衣馬自肥輕李鼎死岐陽實以驕貴盈來瑱賜自盡氣豪直阻兵皆聞黄金多坐見悔吝生奈何田舍翁受此厚貺情錦鯨巻還客始覺心和平振我麤席塵媿客茹藜羹因小見大殊有闗於典制足以正人心而厚風俗浦起龍曰前言珍貴之品不宜以非分受後言奢侈必敗聊以守分終史稱武在蜀肆志逞欲窮極奢靡公在幕下作此諷諭至舉李鼎来瑱以深戒之按題中無答謝却等字亦事後感賦自存箧衍非以與張者杜鵑西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑我昔遊錦城結廬錦水邊有竹一頃餘喬木上參天杜鵑暮春至哀哀叫其間我見常再拜重是古帝魂生子百鳥巢百鳥不敢嗔仍為餧其子禮若奉至尊鴻雁及羔羊有禮太古前行飛與跪乳識序如知恩聖賢古法則付與後世傳君㸔禽鳥情猶解事杜鵑今忽暮春間值我病經年身病不能拜淚下如迸泉古調微辭集中題凡再見知其寄慨者深矣其集外一篇則偽也至於發端四語不闗詩之工拙謂必如是乃合樂府亦固哉之論王士祿曰興觀羣怨讀此慨然有得客堂憶昨離少城而今異楚蜀舍舟復深山窅窕一林麓棲泊雲安縣消中内相毒舊疾廿載來衰年得無足死為殊方鬼頭白免短促老馬終望雲南鴈意在北別家長兒女欲起慚筋力客堂叙節改具物對覊束石暄蕨芽紫渚秀蘆笋綠巴鸎紛未稀徼麥早向熟悠悠日動江漠漠春辭木臺郎選才俊自顧亦已極前軰聲名人埋沒何所得居然綰章紱受性本幽獨平生憇息地必種數竿竹事業只濁醪營葺但草屋上公有記者累奏資薄祿主憂豈濟時身逺彌曠職循文廟算正獻可天衢直尚想趨朝廷毫髪禆社稷形骸今若是進退委行色水閣朝霽奉簡嚴雲安東城抱春岑江閣鄰石面崔嵬晨雲白朝旭射芳甸雨檻卧花叢風床展書巻鈎簾宿鷺起丸藥流鸎囀呼婢取酒壺續兒誦文選晚交嚴明府矧此數相見選體青山捫蝨坐黄鳥抱書眠極力追擬去之彌逺蔡天啟曰荆公每稱老杜鈎簾宿鷺起丸藥流鶯囀以為用意髙妙五字模楷蠶榖行天下郡國向萬城無有一城無甲兵焉得鑄甲作農器一寸荒田牛得耕牛盡耕蠶亦成不勞烈士淚滂沱男榖女絲行復歌有慨乎其言之古柏行孔明廟前有老柏柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺君臣已與時際㑹樹木猶為人愛惜雲來氣接巫峽長月出寒通雪山白憶昨路遶錦亭東先主武侯同閟宫崔嵬枝榦郊原古窈窕丹青户牖空落落盤踞雖得地冥冥孤髙多烈風扶持自是神明力正直原因造化功大厦如傾要梁棟萬牛迴首丘山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香葉終經宿鸞鳯志士幽人莫怨嗟古來材大難為用情深文明眼空筆老千載而下如聞太息之聲王嗣奭曰公生平極賛孔明蓋竊比之意孔明才大而不盡其用公嘗自比稷契而人莫之用故篇終結出才大難用此作詩本㫖發興於古柏者也李因篤曰武侯廟柏自不得作一細語如太史公用尚書為本紀厚重乃爾縛雞行小奴縛雞向市賣雞被縛急相喧爭家中厭雞食蟲蟻不知雞賣還遭烹蟲雞於人何厚薄吾叱奴人解其縛雞蟲得失無了時注目寒江倚山閣齊物之㫖師厚曰天下利害當權輕重除㓂則勞民愛民則養㓂與其養㓂孰若勞民與其惜蟲孰若存雞此論聖人不易天下亦無難處之事始知浮屠法不可治世蔡正孫曰步里客談云古人作詩斷句輙旁入他意最為驚䇿如老杜云雞蟲得失無了時注目寒江倚山閣是也黄魯直作水仙花詩坐對真成被花惱出門一笑大江横亦是此意牽牛織女牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此事終䝉朧颯然精靈合何必秋遂通亭亭新粧立龍駕且曾空世人亦為爾祈請走兒童稱家隨豐儉白屋達公宫膳夫翊堂殿鳴玉淒房櫳曝衣遍天下曵月揚微風蛛絲小人態曲綴𤓰果中初筵􅀈重露日出甘所終嗟汝未嫁女秉心鬱忡忡防身動如律竭力機杼中雖無姑舅事敢昧織作功明明君臣契咫尺或未容義無棄禮法恩始夫婦恭小大有佳期戒之在至公方圓茍齟齬丈夫多英雄借題發議正而不腐起處作疑詞李商隱七夕詩所自出也張綖曰易言物不可以茍合故借牛女無私㑹之事以興男女無茍合之道又因男女無茍合之道以比君臣無茍合之義觸類旁通髙古嚴正可見古作詩者之意殿中楊監見示張旭草書圖斯人已云亡草聖秘難得及兹煩見示滿目一淒惻悲風生㣲綃萬里起古色鏘鏘鳴玉動落落羣松直連山蟠其間溟漲與筆力有練實先書臨池真盡墨俊拔為之主暮年思轉極未知張王後誰並百代則嗚呼東吳精逸氣感清識楊公拂篋笥舒巻忘寢食念昔揮毫端不獨觀酒徳形容草書竒語獨造趙次公曰逸氣感清識謂張旭之逸氣感楊監之清識課伐木并序課𨽻人伯夷幸秀信行等入谷斬陰木人日四根止維條伊枚正直挺然晨征暮返委積庭内我有藩籬是缺是補載伐篠簜伊仗支持則旅次於小安山有虎知禁若恃爪牙之利必昏黒樘突䕫人屋壁列樹白菊鏝為墻實以竹示式遏為與虎近混淪乎無良賔客憂害馬之徒茍活為幸可嘿息已作詩示宗武誦長憂無所為客居課奴僕清晨飯其腹持斧入白谷青㝠曾巔後十里斬陰木人肩四根已亭午下山麓尚聞丁丁聲功課日各足蒼皮成委積素節相照燭藉汝跨小籬當仗若虚竹空荒咆熊羆乳獸待人肉不示知禁情豈惟干戈哭城中賢府主處貴如白屋蕭蕭理體淨蜂蠆不敢毒虎穴連里閭隄防舊風俗泊舟滄江岸久客慎所觸舍西崖嶠壯雷雨蔚含蓄墻宇資屢修衰年怯幽獨爾曹輕執熱為我忍煩促秋光近青岑季月當泛菊報之以㣲寒共給酒一斛槐葉冷淘青青髙槐葉采掇付中厨新麪來近市汁滓宛相俱入鼎資過熟加餐愁欲無碧鮮俱照筯香飯兼苞蘆經齒冷於雪勸人投比珠願隨金騕褭走置錦屠蘇路逺思恐泥興深終不渝獻芹則小小薦藻明區區萬里露寒殿開氷清玉壺君王納凉晚此味亦時須隨事徴其忠欵所謂一飯不忘君者信然朱子語錄曰文字好用經語亦一病東坡寫此詩至路逺思恐泥云此不足為法行官張望補稻畦水歸東屯大江北百頃平若桉六月青稻多千畦碧泉亂揷秧適云已引溜加溉灌更僕往方塘决渠當斷岸公私各地著浸潤無天旱主守問家臣分明見溪畔芊芊炯翠羽剡剡生銀漢鷗鳥鏡裏來闗山雪邊看秋菰成黑米精鑿傳白粲玉粒足晨炊紅鮮任霞散終然添旅食作苦期壯觀遺穗及衆多我倉戒滋蔓黄生曰杜田園諸詩覺有傲睨陶公之色其氣力沈雄骨格蒼勁本色自不可掩上後園山脚朱夏熱所嬰清旭步北林小園背髙岡挽葛上﨑崟曠望延駐目飄颻散疎襟潛鱗恨水壯去翼依雲深勿謂地無疆劣於山有陰石榞遍天下水陸兼浮沈自我登隴首十年經碧岑劔門來巫峽薄倚浩至今故園暗戎馬骨肉失追㝷時危無消息老去多歸心志士惜白日久客藉黄金敢為蘇門嘯庶作梁父吟杜田曰榞音原木名皮可食或云善本止是石原驅竪子摘蒼耳江上秋已分林中瘴猶劇畦丁告勞苦無以供日夕蓬莠獨不焦野蔬暗泉石巻耳况療風童兒且時摘侵星驅之去爛漫任逺適放筐亭午際洗剝相䝉羃登牀半生熟下筯還小益加㸃𤓰薤間依稀橘奴跡亂世誅求急黎民糠籺窄飽食復何心荒哉膏粱客富家厨肉臭戰地骸骨白寄語惡少年黄金且休擲仇兆鼇曰膏粱徒飽而黎民苦飢傷在居人富家食肉而戰場暴骨傷及征夫此嘆物力之宜惜也秋行官張望督促東渚耗稻向畢清晨遣女奴阿稽竪子阿段往問東渚雨今足佇聞粳稻香上天無偏頗蒲稗各自長人情見非類田家戒其荒功夫競榾榾除草置岸旁榖者命之本客居安可忘青春具所務勤墾免亂常吳牛力容易並驅動莫當豐苖亦已穊雲水照方塘有生固蔓延靜一資隄防督領不無人提携頗在綱荆揚風土暖肅肅候㣲霜尚恐主守疎用心未甚臧清朝遣婢僕寄語踰崇岡西成聚必散不獨陵我倉豈要仁里譽感此亂世忙北風吹蒹葭蟋蟀近中堂荏苒百工休鬱紆遲暮傷御選唐宋詩醇巻十一
