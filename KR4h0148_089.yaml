  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_089-1a, image: WYG1448/WYG1448-0847c.png}
body:
  text: 山隂陸遊詩二十月十九日與客飲忽記去年此時自錦屏歸山南道中小獵今又將去此矣去年縱獵韓壇側玉鞭自探南山雪今年痛飲蜀江邊金杯却吸峩眉月竹枝歌舞新教成凄怨傳得三巴聲城頭築觀出雲雨峨眉正與闌干平酒酣詩就擲杯去醉踏玻璃江上路懸知幽澗斷橋邊已有梅花開半樹長門怨寒風號有聲寒日慘無暉空房不敢恨但懷嵗莫悲今年選後宮連娟千蛾眉早知獲譴速悔不承恩遲聲當徹九天淚當達九泉死猶復見思生當長棄捐忠厚悱惻深於言怨斷碑歎原注興元姚節度園以折碑為石筍文猶可識蓋梁蕭懿墓碑簡文為太子時撰書法遒美可愛二蕭同起南蘭陵正如文叔與伯升至今人悲大蕭死齎恨不見梁家興崇崇之陵久為谷豈惟羣盜分珠玉斷碑槎牙棄道邊文字班班猶可讀剝剜苔蘚一悽然俯仰人間幾變遷世人作碑君勿咽千載園林須石筍簡峭蜀酒歌漢州鵝黃鷥鳯雛不鷙不搏德有餘眉州玻璃天馬駒出門已無萬里塗病夫少年夢清都曾賜虛皇碧琳腴文德殿門晨奏書歸局黃封羅百壺十年流落狂不除遍走人間尋酒壚青絲玉瓶到處酤鵝黃玻璃一滴無安得豪士致連車倒瓶不用杯與盂琵琶如雷聒坐隅不愁渴死老相如醉後草書歌詩戲作朱樓矯首隘八荒緑酒一舉纍百觴洗我堆阜崢嶸之胸次寫為淋漓放縱之詞章墨翻初若鬼神怒字瘦忽作蛟螭僵寶刀出匣揮雪刃大舸破浪馳風檣紙窮擲筆霹靂響婦女驚走兒童藏往時草檄喻西域颯颯聲動中書堂原注余嘗草丞相魯公以下與夏國主書於政事堂一收朝迹忽十載西掠三巴窮夜郎山川荒絶風俗異賴有美酒猶能狂醉中自脫頭上幘緑髮未許侵微霜人生得喪良細事孰謂老大多悲傷醉墨淋漓暢然滿志忽移商調凄焉改色矣柴升所謂浸淫奔放於詞翰之中以遂其放浪蕭散不溺不淄之槩者取諸此也十二月初一日得梅一枝絶竒戲作長句今年於是四賦此花矣高標已壓萬花羣尚恐嬌春習氣存月兔搗霜供換骨湘娥鼓瑟為招魂孤城小驛初飛雪斷角殘鐘半掩門盡意端相終有恨夜寒皴玉倩誰溫梅花詩最為難工中四語頗有逸致十二月十一日視築隄江水來自蠻夷中五月六月聲摩空巨魚穹龜牙鬚雄欲取闤市為龍宮橫隄百丈卧霽虹始誰築此東平公今年樂哉適嵗豐吏不相倚勇赴功西山大竹織萬籠船舸載石來無窮橫陳屹立相疊重置力猶在水廟東我登高原相其衝一盾可受百箭攻蜿蜿其長高隆隆截如長城限羌戎安得椽筆記始終插江石崖堅可礲遊修覺寺上盡蒼崖百級梯詩囊香碗手親携山從飛鳥行邊出天向平蕪盡處低花落忽驚春事晚樓高􅓑覺客魂迷興闌掃榻禪房卧清夢還應到剡溪潘問竒曰第三句真登臨妙語祖應世曰曲江有一水雲際飛之句竟陵評云若入俗手定作一雲水際飛矣此頷聨若作鳥從山邉出更有何味塞上曲三尺鐵如意一枝玉馬鞭笑把出門去萬里行無前當道何崔嵬云是玉門關方當置屯守征人何時還馬色如雜花鎧光若流水肅肅不敢譁遙望但塵起日落戍火青煙重塞垣紫回首五湖秋西風開芡觜蟠竒氣於簡古著鮮華於老健不徒作悲涼語氣體絶似太白苦筍藜藿盤中忽眼明駢頭脫襁白玉嬰極知耿介種性别苦節乃與生俱生我見魏徴殊媚嫵約束兒童勿多取人才自古要養成放使干霄戰風雨周密曰世傳涪翁喜苦筍嘗從斌老乞苦筍詩云南園苦筍味勝肉籜龍稱寃莫採録煩君更致蒼玉束明月風雨吹成竹嘗賦苦筍云苦而有味如忠諫之可活國放翁又從而奬之云我見魏徴殊媚嫵約束兒童勿多取於是世以諫筍目之殊不知翁嘗自跋云余生長江南里人喜食苦筍試取而嘗之氣苦不可於鼻味苦不可於口故嘗屏之未始為客一設及來黔中黔人各掘苦筍萌於土中才一寸許味如蜜蔗初春則不食惟僰道人食苦筍四寸餘曰出土尺餘味猶甘苦相半以此觀之涪翁所食乃取其甘非貴於苦也月下作畏暑不巾襪步月搘短笻瘦身髮鬅鬙顧影如孤松徑幽螢開闔池漲魚噞喁飛泉穿北垣珠玉相撞舂東湖更竒絶百畝銀初鎔但能抱琴往絶恨欠鶴從重露傾荷盤微風墮芙蓉歡言笑清夜縹眇吹踈鐘空中飛仙人粲然氷雪容笑我老塵世不記瑶臺逢清麗寄意處妙無迹相過大蓬嶺度繩橋至杜秀才山莊度筰臨千仭梯山躡半空濕雲朝暮雨隂壑古今風亭觀參差見闌干詰曲通柳空叢篠出松偃翠蘿蒙負籠銀叉女鉏災鶴髮翁何由有餘俸小築此山中東湖新竹插棘編籬謹護持養成寒碧映淪漪清風掠地秋先到赤日行天午不知解籜時聞聲簌簌放梢初見葉離離官間我欲頻來此枕簟仍教到處隨集中詩類此者頗多往往膾炙人口然頷聨不過斫句工巧作者佳處殊不在此今擇其華淨少纍者存之以備一體其有句無篇者汰之若矜尚字句之巧以為得放翁家法所謂微之之識碔砆耳夏日湖上烏帽笻枝散客愁不妨胥吏雜沙鷗迎風枕簟平欺暑近水簾櫳探借秋茶竈逺從林下見釣筒常向月中收江湖四十餘年夢豈信人間有蜀州同何元立賞荷花追懷鏡湖舊逰少狂欺酒氣吐虹一笑未了千觴空涼堂下簾人似玉月色泠泠透湘竹三更畫船穿藕花花為四壁船為家不須更踏花底藕但嗅花香已無酒花深不見畫船行天風空吹白紵聲雙槳歸來㺯湖水往往湖邊人已起即今憔悴不堪論賴有何郎共此樽紅緑踈踈君勿歎漢嘉去嵗無荷看怡齋東湖仲夏草樹荒屋古無人亭午涼萱房微呀不見日筍籜自解時吹香野藤蟠屈入窗罅濕菌扶疏生屋梁跨溝數椽最幽翳漲水及檻雨敗墻靜涵青蘋舞藻荇間立白鷺浮鴛鴦芙渠雖瘦亦瀰漫照眼翠蓋遮紅妝水紋枕簟欲卷却團團素扇懶復將天風忽送塔鈴語喚覺清夢逰瀟湘龍湫歌環湫巨木老不花淵淪千尺龍所家爪䀶入木欲數寸觀者心掉不敢譁去年大旱綿千里禾不立苗麥垂死林神社鬼無奈何老龍欠伸徐一起隆隆之雷浩浩風倒卷江水傾虛空鱗間出火作飛電金蛇夜掣層雲中明朝父老來賽雨大巫吹簫小巫舞祠門人散月娟娟龍歸抱珠湫底眠須臾慰滿三農望斂却神功寂若無此詩亦有其意蒸暑思梁州述懷宣和之末豫始生遭亂不及逰司并從軍梁州亦少慰土脈深厚泉流清季秋嶺谷浩積雪二月草木初抽萌夏中高涼最可喜不省舉手驅蚊虻藏氷一出賣滿市玊璞堆積寒崢嶸柳隂夜卧千駟馬沙上露宿連營兵胡笳吹墮漾水月烽燧傳到山南城最思出甲戌秦隴戈戟徹夜相摩聲兩年劍南走塵土肺熱煩促無時平荒池昏夜蛙閣閣食案白日蠅營營何時王師自天下雷雨澒洞收欃槍老生衰病畏暑濕思卜鄠杜開柴荆古意紲足飼飢鷹鷹飽意未平伏櫪豈不安老驥終悲鳴士生固欲達又懼徒富貴素願有未伸五鼎淡無味茅屋秋雨漏稻陂春水深長歌傾蜀酒舉世不知心身分極高語亦落落入古寓驛舍原注豫三至成都皆館於是間坊古驛掩朱扉又憩空堂綻客衣九萬里中鯤自化一千年外鶴仍歸繞庭數竹饒新筍解帶量松長舊圍惟有壁間詩句在暗塵殘墨兩依依題宇文子友所藏薛公鶴仙人騏驥絶世稀卵生凡禽似而非宮保妙筆窮化機縞衣元裳真令威千年華表聊一歸回首幸脫乘軒譏喙吞不恨菰米微從吾曹逰安得肥晨至湖上園古逢秋好身間與懶宜空堂賞踈豁重閣望參差竹粉有新意松風含古姿低回慙祿米官事少於詩聽琴踈簾曲檻蘋風涼細腰美人藕絲裳緑藤水紋穿矮牀玉指纎纎彈履霜高林鶯囀日正長幽澗泉鳴夜未央哀思不怨和而莊有齊淑女禮自防世人但惑青樓倡琵琶箜篌雜胡羌試聽一曲醒汝狂文姬指法傳中郎於韓歐蘇黃諸家外自樹一幟泠泠清音欲滿人耳視諸子正未肯作邾莒龍眠畫馬國家一從失西陲年年買馬西南夷瘴鄉所産非權竒邉頭嵗入幾畨皮崔嵬瘦骨帶火印離立欲不禁風吹圉人太僕空列位龍媒汗血來何時李公太平官京師立仗慣見窪渥姿斷縑嵗久墨色暗逸氣尚若不可羈賞竒好古自一癖感事憂國空餘悲嗚呼安得毛骨若此三千匹銜枚夜度桑乾磧文集跋韓幹馬大駕南幸將十八年秦兵洮馬不復可見志士所共嘆也觀此畫使人作關輔河渭之夢殆欲霣涕矣山中得長句戲呈周輔并簡朱縣丞鶴鳴山空無鶴來青霞嶂深天壁開千巖角逐互吞土一峰拔起矜崔嵬曰光微漏潭見底原注清霞嶂碧玉潭皆霧中佳處水氣上薄雲成堆幽禽飛鳴報客至竒樹璀璨知誰栽花藤怪蔓白晝暗奔猿落狖無時哀路窮尚躡一千級忽見密竹藏樓臺共言神僧昔住此至今光景如天台搘笻負笠出復沒喜動婦人驚提孩高人何至作狡獪無乃玩世聊相詼不然學道窮實際詎捨正大崇竒瓌儒林丈人學擅世餘事尚壓蔡與崔名山未死可再到此士一失難重陪贊府摘山事如織擺撥領客何竒哉境幽神愴不可住歸倩玉手傳金杯原注朱君有侍兒許為客出唐書劉建鋒傳高郁教馬殷教民得自摘山收茗算募高户置邸閣居茗長歌行人生不作安期生醉入東海騎長鯨猶當出作李西平手梟逆賊清舊京金印煌煌未入手白髮種種來無情成都古寺卧秋晚落日偏傍僧窗明豈其馬上破賊手哦詩長作寒螿鳴興來買盡市橋酒大車磊落堆長瓶哀絲豪竹助劇飲如巨野受黃河傾平時一滴不入口意氣頓使千人驚國讐未報壯士老匣中寶劍夜有聲何當凱還宴將士三更雪壓飛狐城逰三井觀三井久知名暇日偶一訪棟宇壞欲盡基址尚閎壯畫牆皆國工煙雲儼天仗旌旄亞戈戟佩玉雜弓韔太古實傑作筆落九天上吳生名擅世睥睨未肯讓規模逺有考意象豪不放最竒老癯仙骨立神愈王石恪雖少怪用筆亦跌宕兩姝淡蛾眉非復火食狀塵埃久侵蝕風雨無蓋障好事未易逢寧能久亡恙雍洛劫火餘妙迹盡凋喪斯逰恐難繼佇立增悄愴因畫生慨妙得子美家法筆力朴堅亦復相近臨别成都帳飲萬里橋贈談德稱成都城南萬里橋蘆根蘋末風蕭蕭映花碾草鈿車小駐坡驀澗青驄驕入門翠徑絶窈窕臨水飛觀何岧嶤判無功名著不朽惟仗詩酒寬亡聊迎霜早已足雉兔微冷便欲思狐貂喜看縷膾映盤箸恨欠斫蟹加橙椒坐中談侯天下士龍馬毛骨矜超遙烏犀白紵謫仙樣但可邂逅不可招今年一戰馘餘子風送六翮凌青霄美人再拜乞利市醉墨飛落生鮫綃我衰於世百無用十年不趂含元朝華纓肯傍蕭颯鬢寶帶那束龍鍾腰祝君好去事明主日望分喜來漁樵逰談引類亦細事寄酒且解相如消丈人觀黃金篆書扁朱門夾道巨竹屯蒼雲崖嶺劃若天地分千柱耽耽壓其垠纓冠肅謁丈人君廣殿空庭吹寶熏摩挲畫橋手為皸異哉山蔸與土羵物怪齾齾冠丘墳仙人佩玊雜帨帉手整貂冠最不羣欲去不忍恨日曛道翁采藥晝夜勤松根茯苓獲兼斤人之植立強骨斤狗杞羣吠聲狺狺山爐小甑吹幽芬朱顔不飲常自曛我亦宿誦五千文一念之差隨世紛逝將從翁走如麋隱書祕訣何由聞硬語排奡自見妥帖本集七律自注丈人觀孫太古畫范長生作舉手整貂蟬像神氣尤竒逸儲福觀原注唐玊真公主修真之地路轉屏風疊雲藏帝子家窮幽行犖確息倦倚槎牙緑蘚封茶樹清霜折藥花世無勾漏令誰此養丹砂不少新色亦逼唐調離堆伏龍祠觀孫太古畫英惠王像岷山導江書禹貢江流蹴山山為動嗚呼秦守信豪傑千年遺迹人猶誦決江一支溉數州至今禾黍連雲種孫翁下筆開生面岌嶪高冠摩屋棟徙木遺風雖峭刻取材尚足當世用寥寥後世豈乏人尺寸未施讒已衆要官無責空賦祿軒蓋傳呼真一閧竒勳偉績曠世無仁人志士臨風慟我逰故祠九頓首夜遇神君了非夢披雲激電從天來赤手騎􅚪不施鞚以騷人之才發志士之感獨立蒼茫自詠詩正使生平藴結藉此一攄登灌口廟東大樓觀岷江雪山我生不識柏梁建章之宮殿安得峩冠侍逰宴又不及身在榮陽京索間擐甲橫戈夜酣戰胸中迫隘思逺逰泝江來倚􅡵山樓千年雪嶺闌邉出萬里雲濤坐上浮禹迹茫茫始江漢疏鑿功當九州半丈夫生世要如此齎志空死能無歎白髮蕭條吹北風手持巵酒酹江中姓名未死終磊磊要與此江東注海平羌道中望峩眉山慨然有作白雲如玊城翠嶺出其上異境忽墮前心目久蕩漾别來二百日突兀喜無恙飛仙遙舉手喚我一稅鞅此行豈或便屏迹事幽曠何必故山歸更破萬里浪王士禎曰九盤山臨青衣江遙望大峩秀出天半雲嵐萬狀積雪晶然中峩如傴僂少峩如拱揖北來諸山蜿蜒起伏爭趨峩下放翁詩白雲如玉城翠嶺出其上異境忽墮前心目久蕩漾身未到此不知語意之工次韻何元立都曹贈行原注元立用陳後山送蘇公詩韻嘉榮東西川此别不為逺徘徊凌雲守決去未遽忍登高望故人煙樹參差見懸知今日夢不隔重城鍵平生相從意百年有未滿結巢青城雲期子在嵗晚澄淡入古初到榮州亂山缺處城樓呀雙旗蕭蕭晚吹笳煙深緑桂臨絶壑霜落殘瀨鳴寒沙廢臺已無隱士嘯遺宅尚有高人家鈴齋下榻約僧話松隂枕石放吏衙杯羮最珍慈竹筍瓶水自養山薑花地爐堆獸熾石炭瓦鼎號蚓煎秋茶少年逺逰無百里一飢能使行天涯豈惟慣見蓬婆雪直恐遂泛星河槎故巢肯作兒女戀異境會向鄉閭誇一杯徑醉幘自墮燈下髮影看鬖髿醉中懷眉山舊逰徑酒少和氣哀歌無歡情故鄉不敢思登高望錦城錦城那得去髣佛蟇頥路遙知尊前人指我題詩處我雖流落夜郎天遇酒能狂似少年想見東郊携手日海棠如雪柳飛綿原注漢嘉術者袁牧童謂豫明年春分後當還西州如瓶瀉水如珠走盤相見酒間揮灑之樂齋中夜坐有感荒山為城溪作壕風鼓巨木聲翻濤鴟梟乘屋彈不去狐狸欺人怒豎毛雨來紅鶴更可惡爭巢一似嬰兒號城孤屋老草木茂正坐人少此輩豪急呼五百具畚鍤欲掀窟穴窮腥臊忽然語罷却自笑殘年何至與汝鏖浣花紅色緑如黛春波灧灧浮輕舠行當繫纜柳隂下仰聽鶯語傾香醪晚登黃溪閣樓鼓聲中日又斜憑高愈覺在天涯空桑客土生秋草野渡虛舟集晚鴉瘴霧不開連六詔俚歌相答帶三巴故鄉可望應添淚莫恨雲山萬疊遮淒其欲絶哀厲彌長被之歌喉可以繞梁三日高齋小飲戲作梅花又發鬼門關坐覺春風萬里寬荔子隂中時縱酒竹枝聲裏強追歡丁年漢使殊方老子夜吳歌昨夢殘白帝夜郎俱不惡兩公補處得憑欄原注豫五年間自夔客榮太液黃鵠歌有引漢始元元年春二月黃鵠下建章宮太液池中公卿上夀賜諸侯王列侯宗室金錢豫夜讀漢書追作歌一首建章宮裏春風寒太液水生池面寬中人馳奏黃鵠下龍旗豹尾臨池看芹香藻暖鵠得意左右從官呼萬嵗須臾傳詔宴公卿歡聲如雷動天地時平宮省逰樂多黃鵠刷羽涵恩波小臣珥筆龍墀下願繼前朝天馬歌託興深逺承靈威兮障外國猶是夜度桑乾之意夜聞浣花江聲甚壯浣花之東當筰橋奔牛齧橋橋為搖分洪初疑兩蛟舞觸石散作千珠跳壯聲每挾雷雨橫巨勢潛借黿鼉驕夢回聞之坐太息鐵衣何日東征遼銜枚度磧沙颯颯槃槊斷隴風蕭蕭不然投檄徑歸去短篷卧聽錢塘潮謁諸葛丞相廟原注彌牟八陳原上漢終四百天所命老賊方持太阿柄區區梁益豈足支不忍安坐觀異姓遺民亦知王室在閏位那十天統正公雖已沒有神靈猶假賊手誅鍾鄧前年我過沔陽祠再拜奠爼衰淚迸潔齋請作送迎詩精忠大義神其聽能道孔明心事辭意警絶善於包舉醉中長歌闌千斗柄搖天東人間一夜回春風注桃染柳嵗相似惟我衰顔非昔紅可憐逢春不自感更欲使氣驚兒童煙郊射雉錦臆碎水亭供膾金盤空歸穿南市萬人看流星突過連錢驄高樓作歌醉自寫墨光燭焰交長虹人生未死貴適意萬里作客原非窮故人夜直金鑾殿偃卧獨聽宮門鐘春感少時狂走西復東銀鞍駿馬馳如風眼看春去不復惜只道嵗月來無窮初逰漢中亦未覺一飲尚可傾千鍾義魚狼藉漾水濁獵虎蹴踏南山空射堋命中萬人看毬門對植雙旗紅華堂却來弄筆硯新詩醉草誇坐中劔關南山才幾日壯氣摧縮成衰翁雪霜蕭颯已滿鬢蛟龍鬱屈空蟠胸鄰園杏花忽爛漫推枕強起隨逰蜂繞看百匝幾嘆息吹紅洗緑行匆匆莫年逢春尚有幾常恐春去尋無蹤青銅三百尚可辦且判爛醉酤郫筒花時遍逰諸家園宣華無樹著啼鶯惟有摩訶春水生故老能言當日事直將宮錦裹宮城於海棠寓荒淫之警獨有深味題明皇幸蜀圖天寶政事何披猖使典相國胡奴王弄權楊李不足怪阿瞞手自裂紀綱八姨富貴尚有理何至詔書褒五郎原注天寶末下詔雪張易之兄弟盧龍賊騎已洶洶丹鳯神語猶琅琅人知大勢危纍卵天稔竒禍如崩牆臺省諸公獨耐事歌詠功德卑虞唐一朝殺氣橫天末匹馬西奔幾不脫向來諂子知幾人賊前稱臣草間活劍南萬里望秦天行殿春寒聞杜鵑老臣九齡不可作魚蠧蛛絲金鑑篇筆墨老橫有如高牙大纛堂堂正正摧堅而折鋭一結尤得立言之旨春殘石鏡山前送落暉春殘回首倍依依時平壯士無功老鄉逺征人有夢歸苜蓿苗侵官道合蕪菁花入麥畦稀倦逰自笑摧頽甚誰記飛鷹醉打圍盧世㴶曰項聨有髀肉復生之慨對酒間愁如飛雪入酒即消融好花如故人一笑杯自空流鶯有情亦念我柳邉盡日啼春風長安不到十四載酒徒往往成衰翁九環寶帶光照地不如留君雙頰紅逰圓覺乾明祥符三院至暮成都再見春事殘雖名間官實不間門前車馬閙如市案上文檄高於山有時投罅輒徑出略似齊客偷秦關日斜僕夫已整駕顧景欲駐愁嘲訕豈知今朝有此樂放浪一笑開衰顔抽身黃塵烏帽底得意翠木清泉間褰裳危磴窮犖確洗耳古澗聽淙潺豈惟頓覺宇宙廣政爾一散腰腳頑似聞青城縹眇處待我歸綴仙官班俊鷹解絛即萬里豈比倦翼方知還食薺小著鹽醯助滋味微加薑桂發精神風罏歙鉢窮家活妙訣何曾肯授人小有風致幽居晚興借鉏斸藥喜微香汲井澆花趂晚涼胸次何曾橫一物尊前尚欲笑千場錦江秋雨芙蓉老笠澤春風杜若芳歸去自佳留亦樂夢中何處是吾鄉行雲流水之趣眼前語頗能道出書歎三代藏寶器世守參河圖埋湮則已矣可使列市區文章有廢興蓋與治亂符慶歷嘉祐間和氣扇大爐數公實主盟渾灝配典謨開闢始歐王災畬逮曾蘇大駕初渡江中原皆避胡吾猶及故老清夜陪坐隅論文有脈絡千古著不誣俯仰四十年緑髮霜蓬枯孤生尊所聞秉節不敢渝久幽士固有速售理則無世方亂珉玉吾其老江湖文章與時隆汙自古而然後生小子偭規矩而改錯豈知老成之有淵源耶太白歎大雅久不作少陵云文章千古事高情逺識可以並讀文集答邢司户書近時頗有不利場屋者退而組織古語剽裂竒字大書深刻以眩世俗讀之使人面熱此等果可言文章乎如唐韓氏桞氏吾宋歐氏王氏蘇氏以文章擅天下者徒以在場屋時苦心耗力凡陳言淺説之可病者已知厭棄如都市之玉工珉玉雜治積日既久望而識之矣一旦取荆山之璞以為黃琮蒼璧萬乘之寶珉豈可復欺耶凡今不利場屋而名古之文者往往多未嘗識珉者也又安知玉哉月下醉題黃鵠飛鳴未免飢此身自笑欲何之閉門種菜英雄老彈鋏思魚富貴遲生擬入山隨李廣死當穿冢近要離一樽強醉南樓月感慨長吟恐過悲盧世㴶曰三四自是壯語銅壺閣望月銅壺閣上看明月身在千尋白銀闕十年肺渴今夕平皓然胸次堆氷雪恨無仙掌出雲表更取墜露和玉屑夜闌三嘆下危梯明日人間火雲熱夜宴即席作宣華輦路牧牛羊摩訶龍池草茫茫宮殿犁盡餘繚牆南風逺吹禾黍香草間白骨橫秋霜何由喚起釂一觴癡人走死聲利場我獨感此惜流光蘋花開時風榭涼美人縹眇如鸞翔堯年舜日樂未央非子之故為誰狂芳華樓夜宴射虎將軍老不侯尚能豪縱醉江樓笙歌雜沓娛清夜風露高寒接素秋少日壯心輕玉塞暮年幽夢墮滄洲人間清絶沅湘路常許靈均作許愁嵗晚嵗晚城隅車馬稀偷間聊得掩荆扉征蓬滿野風霜苦多稼連雲雁騖肥報國有心空自信結茅無地竟安歸浣花道上人誰識華表千年老令威頷聨真風人語歎惋無盡妙有含蓄數日寒頓減頗有春意感懷賦短歌微隂寒不力破臘春暗動林梢報梅白水際聞鳥哢羈鴻漸整翮一一勞目送應憐飛蓬客猶作浣花夢平生江淮間裘馬事豪縱豈知老畏死齋鉢受蔬供忍饞每自笑小飲未敢痛何以慰寂寥卧聽壓春甕梅花氷崖雪谷木未芽造物破荒開此花神全形枯近有道意莊色正知無邪高堅政要飽憂患放葉何遽愁荒遐移根上苑亦過計竹籬茅屋真吾家平生自嫌亦自許妙處可識不可誇金尊翠杓未免俗篝火為試江南茶另開生面全是寓言萬里橋江上習射坡隴如濤東北傾胡牀看射及春晴風和漸減雕弓力野逈遙聞羽箭聲天上欃槍端可落草間狐兔不須驚丈夫未死誰能料一笴他年下百城出塞曲佩刀一刺山為開壯士大呼城為摧三軍甲馬不知數但見動地銀山來長戈逐虎祁連北馬前曵來血丹臆却回射雁鴨緑江箭飛雁起連雲黑清泉茂草下程時野帳牛酒爭淋漓不學京都貴公子唾壺麈尾事兒嬉偶過浣花感舊逰戲作憶昔初為錦城客醉騎駿馬桃花色玉人携手上江樓一笑鈎簾賞微雪寶叉換酒忽徑去三日樓中香未滅市人不識呼酒仙異事驚傳一城説至今西壁餘小草過眼年光如電掣正月錦江春水生花枝缺處小舟橫間倚胡牀吹玉笛東風十里斷腸聲樓上醉書丈夫不虛生世間本意破敵收河山豈知蹭蹬不稱意八年梁益凋朱顔三更撫枕忽大呌夢中奪得松亭關中原機會嗟屢失明日茵席留餘澘益州官樓酒如海我來解旗論日買酒酣博簺為歡娛信手梟盧喝成采牛背爛爛電目光狂殺自謂元非狂故都九廟臣敢忘祖宗神靈在帝旁縱筆直書却有沈鬱頓挫之妙范成大贈遊云高興餘飛動孤忠有照臨非虛語也初春出遊春風初來滿刀州江水照人如潑油犢車芳草南陌頭家家傾資事遨逰萬里橋西繫黃騮為君一登散花樓半年長齋廢觥籌興來忽典千金裘小桃婀娜弄芳柔紅蘭茁芽滿春洲壚邉女兒不見愁鬬草才罷還藏鈎可憐世人自拘囚盎中乾坤舞蜉蝣百年苦短去日遒問君安用萬户侯張園海棠洛陽春信久不通姚魏開落胡塵中揚州千葉昔曾見已歎造化無餘功西來始見海棠盛成都第一推燕宮池臺掃除凡木盡天地眩轉花光紅慶雲墮空不飛去時有絳雪縈微風蜂蝶成團出無路我亦狂走迷西東此園低樹猶三丈錦繡却在青天上不須更著刀尺裁乞與齊奴開步障不著凡語為海棠生色從來咏海棠者多矣以此為最登劍南西川門感懷自古高樓傷客情更堪萬里望吳京故人不見莫雲合客子欲歸春水生瘴癘連年須藥石退藏無地著柴荆諸公勉畫平戎䇿投老深思看太平盧世㴶曰此首極似杜陵讀者自辨之眉州作扁舟久不泛蟇津常恐黃塵解汚人爛醉破除千日悶原注豫不至眉山三年矣狂吟判斷四州春原注此行自成都歷永康唐安至眉山汀洲漸歎蘋花老風露初嘗荔子新便欲騎鯨東海去勝逰未忍别峩岷江樓急雨洗殘瘴江邉間倚樓日依平野沒水帶斷槎流搗紙荒村晚呼牛古巷秋腐儒憂國意此際入搔頭隨意詠懷不覺近杜其由來深矣訪楊先輩不遇因至石室訪客客已去追涼成獨行衣冠嚴漢殿草木拱秦城古甃蒼苔滑空庭落日明出門還戃恍列屋打碑聲原注墻東即石經堂感秋西風繁杵搗征衣客子關情正此時萬事從初聊復爾百年強半欲何之畫堂蟋蟀怨清夜金井梧桐辭故枝一枕凄涼眠不得呼燈起作感秋詩王士正曰玉階蟋蟀閙清夜四語小説載此為蜀中某驛卒女詩放翁見之納以為妾為夫人所逐又有卜算子詞不合畫春山依舊留愁住云云按劔南集此詩乃放翁在蜀時所作本七律玉階作畫堂閙作怨後人稍竄易數字輒傅會或收入閨秀詩可笑也白鶴館夜坐竹聲風雨交松聲波濤翻我坐白鶴館燈清無晤言廓然心境寂一洗吏卒喧袖手哦新詩清寒愧雄渾屈宋死千載誰能起九原中間李與杜獨招湘水魂自此競摹寫幾人望其籓蘭苕看翡翠煙雨啼青猿豈知雲海中九萬擊鵬鵾更闌燈欲死此意與誰論此與書歎一篇見此老識力亦後學良則所以為南渡之冠南津勝因院亭子南江平無風如鏡新拂拭漁舟不點破瀲瀲千頃碧闌干西北角雲散山爭出坡陀競南走翠入窗户窄江山不世情作意娛此客豈無尊中酒豪飲非宿昔明當還成都塵土埋馬迹後巖在眼中飛去無羽翼原注後巖在鳯凰山後七八里山水尤竒絶書寓舍壁天與癡頑不解愁未埋病骨且間逰山於拄杖橫時看路到芒鞋破處休初擬燒丹住南嶽却因學劔客西州秋風巾褐添蕭爽又作臨卭十日留御選唐宋詩醇卷四十三
