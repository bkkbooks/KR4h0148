front:
  text: 欽定四庫全書御選唐宋詩醇卷十二
  hash: sha256:01fae3cbe41f42aabcd5a1ec657c6ff54400c9514fd09e75f89a5b7dd584f2ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_026-1a, image: WYG1448/WYG1448-0270a.png}
body:
  text: 襄陽杜甫詩四目録雨又上後園山腳種萵苣八哀詩贈司空王公思禮故司徒李公光弼贈左僕射鄭國公嚴公武贈太子太師汝陽郡王璡贈祕書監江夏李公雍故祕書少監武功蘇公源明故著作郎貶台州司戶滎陽鄭公虔故右僕射相國張公九齡寫懷觀公孫大娘弟子舞劔器行同元使君舂陵行李潮八分小篆歌聽楊氏歌荆南兵馬使太常卿趙公大食刀歌王兵馬使二角鷹狄明府秋風二首虎牙行後苦寒行二首夜歸醉為馬墜諸公攜酒相看大覺髙僧蘭若宿青溪驛奉懷張員外十五兄之緒憶昔行魏將軍歌北風白鳬行醉歌行贈公安顔少府請顧八題壁夜聞􅓋篥發劉郎浦別董頲送顧八分文學適洪吉州遣遇解憂宿鑿石浦過津口次空靈岸宿花石戌望嶽嶽麓山道林二寺行歲晏行追酬故髙蜀州人日見寄蘇大侍御訪江浦賦八韻紀異題衡山縣文宣王廟新學堂呈陸宰
  hash: sha256:fd6fff91c47aabac3e205900ca8bf2a8e7949aa901080c4859f1dc731786d358
