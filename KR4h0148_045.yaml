  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_045-1a, image: WYG1448/WYG1448-0434a.png}
body:
  text: 太原白居易詩三病假中南亭閒望欹枕不視事兩日門掩闗始知吏役身不病不得閒閒意不在逺小亭方丈間西簷竹梢上坐見太白山遙媿峯上雲對此塵中顔神韻酷似淵明西簷二句亦摹採菊東籬下語意官舍小亭閒望風竹散清韻煙槐凝綠姿日髙人吏去閒坐在茅茨葛衣禦時暑蔬飯療朝饑持此聊自足心力少營為亭上獨吟罷眼前無事時數峯太白雪一巻陶潜詩人心各自是我是良在兹迴謝爭名客甘從君所嗤太白雪陶潜詩隨意所㑹綴而成文不相合而相合和錢員外禁中夙興見示窗白星漢曙窗暖燈火餘坐巻朱裏幕看封紫泥書窅窅鐘漏盡曈曈霞景初樓䑓紅照耀松竹青扶踈君愛此時好迴頭特謂余不知上清界曉景復何如松聲自注修竹里張家宅南亭作月好好獨坐雙松在前軒西南㣲風來潜入枝葉間蕭寥發為聲半夜明月前寒山颯颯雨秋琴泠泠弦一聞滌炎暑再聽破昏煩竟夕遂不寐心體俱翛然南陌車馬動西隣歌吹繁誰知兹簷下滿耳不為喧清境可想禁中寓直夢遊仙遊寺西軒草詔暇松竹深寂寂月出清風來忽似山中夕因成西南夢夢作遊仙客覺聞宮漏聲猶謂山泉滴酷似摩詰秋山久病曠心賞今朝一登山山秋雲物冷稱我清羸顔白石卧可枕青蘿行可攀意中如有得盡日不欲還人生無幾何如寄天地間心有千載憂身無一日閒何時解塵網此地來掩闗題楊穎士西亭靜得亭上境逺諧塵外蹤憑軒東南望鳥滅山重重竹露泠煩襟杉風清病容曠然宜真趣道與心相逢即此可遺世何必蓬壺峯秋遊原上七月行已半早涼天氣清清晨起巾櫛徐步出柴荆露杖笻竹冷風襟越蕉輕閒擕弟姪輩同上秋原行新棗未全赤晚𤓰有餘馨依依田家叟設此相逢迎自我到此邨往往白髪生邨中相識久老㓜皆有情留連向暮歸樹樹風蟬鳴是時新雨足禾黍夾道青見此令人飽何必待西成樸實説去一片真趣流行非徒擬王儲田家詩也閒居深閉竹間扉靜掃松下地獨嘯晚風前何人知此意㸔山盡日坐枕帙移時睡誰能從我遊使君心無事蕭疎藴藉遊悟真寺詩一百三十韻元和九年秋八月月上弦我遊悟真寺寺在王順山去山四五里先聞水潺湲自兹舍車馬始涉藍溪灣手拄青竹杖足蹋白石灘漸怪耳目曠不聞人世喧山下望山上初疑不可攀誰知中有路盤折通巖巅一息幡竿下再休石龕邊龕間長丈餘門户無扄闗俯窺不見人石髪垂若鬟驚出白蝙蝠雙飛如雪翻回首寺門望青崖夾朱軒如擘山腹開置寺於其間入門無平地地窄虚空寛房廊與臺殿髙下隨峯巒巖㠋無撮土樹木多瘦堅根株抱石長屈曲蟲蛇蟠松桂亂無行四時鬱芊芊枝梢嫋清翠韻若風中弦日月光不透綠陰相交延幽鳥時一聲聞之似寒蟬首憇賔位亭就坐未及安須臾開北户萬里明豁然拂簷虹霏㣲遶棟雲囘旋赤日間白雨陰晴同一川埜綠蔟草樹眼界吞秦原渭水細不見漢陵小於拳却顧來時路縈紆映朱䦨歴歴上山人一一遙可觀前對多寶塔風鐸鳴四端欒櫨與户牖恰恰金碧繁云昔迦葉佛在此坐涅槃至今鐡鉢在當底手跡穿西開玉像殿白佛森比肩斗藪塵埃衣禮拜氷雪顔疊霜為袈裟貫雹為華鬘逼觀疑鬼功其跡非雕鐫次登觀音堂未到聞旃檀上階脱雙履歛足升淨筵六楹排玉鏡四座敷金鈿黒夜自光明不待燈燭燃衆寶互低昻碧珮珊瑚幡風來似天樂相觸聲珊珊白珠垂露凝赤珠滴血殷㸃綴佛髻上合為七寶冠雙瓶白琉璃色若秋水寒隔瓶見舍利圎轉如金丹玉笛何代物天人施祇園吹如秋鶴聲可以降靈仙是時秋方中三五月正圓寶堂豁三門金魄當其前月與寶相射晶光爭鮮妍照人心骨冷竟夕不欲眠曉㝷南塔路亂竹低嬋娟林幽不逢人寒蝶飛翾翾山果不識名離離夾道蕃足以療饑乏摘嘗味甘酸道南藍谷神紫繖白紙錢若歲有水旱詔使修蘋蘩以地清淨故獻奠無葷羶危石疊四五􅐑嵬欹且刓造物者何意堆在巖東偏冷滑無人跡苔㸃如花牋我來登上頭下臨不測淵目眩手足掉不敢低頭看風從石下生薄人而上摶衣服似羽翮開張欲飛騫􅑨􅑨三面峯峯尖刀劔攅往往白雲過決開露青天西北日落時夕暉紅團團千里翠屏外走下丹砂丸東南月上時夜氣青漫漫百丈碧潭㡳寫出黄金盤藍水色似藍日夜長潺潺周迴繞山轉下視如青環或鋪為慢流或激為奔湍泓澄最深處浮出蛟龍涎側身入其中懸磴尤險艱捫蘿踏樛木下逐飲澗猨雪迸起白鷺錦跳驚紅鱣歇定方盥潄濯去支體煩淺深皆洞徹可照腦與肝但愛清見底欲㝷不知源東崖饒怪石積甃蒼琅玕温潤發於外其間韞璵璠卞和死己久良玉多棄捐或時洩光彩夜與星月連中頂最髙峰拄天青玉竿􅫪􅤜上不得豈我能攀援上有白蓮池素葩覆清瀾聞名不可到處所非人寰又有一片石大如方尺甎揷在半壁上其下萬仞懸云有過去師坐得無生禪號為定心石長老世相傳却上謁仙祠蔓草生綿綿昔聞王氏子羽化升上𤣥其西㬠藥䑓猶對芝术田時復明月夜上聞黄鶴言迴㝷畫龍堂二叟鬚髪斑想見聽法時歡喜禮印壇復歸泉窟下化作龍蜿蜒階前石孔在欲雨生白煙往有寫經僧身靜心精專感彼雲外鴿羣飛千翩翩來添硯中水去吸巖底泉一日三往復時節長不愆經成號聖僧弟子名揚難誦此蓮花偈數滿百億千身壊口不壊舌根如紅蓮顱骨今不見石函尚存焉粉壁有吳畫筆彩依舊鮮素屏有禇書墨色如新乾靈境與異跡周覽無不殫一遊五晝夜欲返仍盤桓我本山中人誤為時網牽牽率使讀書推挽令効官既登文字科又忝諫諍員拙直不合時無益同素餐以此自慚惕戚戚常寡歡無成心力盡未老形骸殘今來脱簪組始覺離憂患及為山水遊彌得縱踈頑野麋斷覊絆行走無拘攣遊魚放入海一往何時還身著居士衣手把南華篇終來此山住永謝區中緣我今四十餘從此終身閒若以七十期猶得三十年洋洋灑灑一氣讀去幾於千巖競秀萬壑爭流目不給賞矣就其中細㝷之則步驟井然一絲不紊首四句㸃清因遊寺而登山並年月日俱細叙出去山四五里至置寺於其間寫寺外之景曲折靈異逈隔塵世如入仙境妙在以回頭寺門望四句作一頓遂覺心神蕩漾宛是初到神情入門無平地一句作提筆至聞之似寒蟬叙寺中路逕之逶迤樹木之蒼鬱首憇賔位亭至可以降靈仙細叙寺中所厯之境與相傳之法物開北戸而前行又回顧而見來路是以對多寶塔也玉像殿觀音堂皆寺西界是時秋方中至竟夕不欲眠摹寫夜中之景與八月月上弦一句相映又作一束曉㝷南塔路至欲返仍盤桓歴叙連日所遊之境變化出之由南而東而中而上不言北者自入寺門大抵皆向北行也其間有神像有峯巖有水有怪石有白蓮有祠有臺有畫有書細細寫出日落月上復帯叙次日由晝入夜之景更不拖㳫寫經僧誦經弟子只虚寫在傳聞上叙出靈境與異跡四句作一總束一遊五晝夜又與八月月上弦照應我本山中人至末收足遊字意四十餘三十年又與元和九年照應細玩全詩分明以作記序手筆用之於詩韓愈南山詩以竒肆勝此以秀折勝可謂匹敵謝靈運遊山詩栁宗元山水記素稱竒搆以彼方此不無廣狹之別矣朝回遊城南朝退馬未困秋初日猶長回轡城南去郊埜正清涼水竹夾小徑縈迴繞川岡仰看晚山色俯㺯秋泉光青松繫我馬白石為我牀常時簪組累此日和身忘旦隨鵷鷺末暮遊鷗鶴傍機心一以盡兩處不亂行誰辨心與跡非行亦非藏機心既盡行藏自如居易一生真實受用在此舟行自注江州路上作帆影日漸髙閒眠猶未起起問鼓枻人己行三十里船頭有行竈炊稻烹紅鯉飽食起婆娑盥潄秋江水平生滄浪意一旦來遊此何况不失家舟中載妻子遷謫逺行絶不作牢騷語非實有見地者不能如謝靈運初發石首城便云苕苕萬里帆茫茫將何之豈復成胷襟耶泛湓水四月未全熱麥涼江氣秋湖山處處好最愛湓水頭湓水從東來一𣲖入江流可憐似縈帯中有隨風舟命酒一臨泛舍鞍揚棹謳放迴岸傍馬去逐波間鷗煙浪始渺𣺌風襟亦悠悠初疑上河漢中若㝷瀛洲汀樹綠拂地沙草芳未休青蘿與紫葛枝蔓垂相樛繫纜步平岸囘頭望江州城雉映水見隱隱如蜃樓日入意未盡將歸復少留到官行半歲今日方一遊此地來何暮可以寫吾憂寫景如畫晚望江城寒角動沙洲夕鳥還獨在髙亭上西南望逺山小詩極有氣勢集中尤難得者遊石門澗石門無舊徑披榛訪遺跡時逢山水秋清輝如古昔常聞慧逺輩題詩此巖壁雲覆莓苔封蒼然無處覔蕭踈野生竹崩剥多年石自從東晉後無復人遊歴獨有秋澗聲潺湲空旦夕汪立名曰按石門澗有二處一在江州太平寰宇記云石門澗在廬山西懸崖對聳形如闗當雙石之間懸流數丈有一石可坐二十許人一在杭州西湖咸淳臨安志云武林山石門澗陸羽二寺記云南有巉巖舊有卧龍石横澗石慈雲法師種松於此然詩中有慧逺題詩語自是江州作西湖志亦收此詩誤也香鑪峯下新置草堂即事咏懐題於石上香鑪峯北面遺愛寺西偏白石何鑿鑿清流亦潺潺有松數十株有竹千餘竿松張翠繖盖竹倚青琅玕其下無人居悠哉多歲年有時聚猿鳥終日空風煙時有沉冥子姓白字樂天平生無所好見此心依然如獲終老地忽乎不知還架巖結茅宇斸壑開茶園何以洗我耳屋頭飛落泉何以淨我眼砌下生白蓮左手攜一壺右手挈五弦傲然意自足箕踞於其間興酣仰天歌歌中聊寄言言我本野夫誤為世網牽時來昔捧日老去今歸山倦鳥得茂樹涸魚返清源舍此欲焉往人間多險艱草堂結搆四圍景致詳於記中此詩只淡淡寫去自具朴老之致草堂記匡廬竒秀甲天下山山北峯曰香鑪峯北寺曰遺愛寺介峯寺間其境勝絶又甲廬山元和十一年秋太原人白樂天見而愛之若逺行客過故鄉戀戀不能去因面峯腋寺作為草堂明年春草堂成三間兩柱二室四牖廣袤豐殺一稱心力洞北戸來陰風防徂暑也敞南甍納陽日虞祁寒也木斷而己不加丹牆圬而己不加白墄階用石羃窗用紙竹簾紵幃率稱是焉堂中設木榻四素屏二漆琴一張儒道佛書各三兩巻樂天既來為主仰觀山俯聽泉傍睨竹樹雲石自辰及酉應接不暇俄而物誘氣隨外適内和一宿體寧再宿心恬三宿後頽然嗒然不知其然而然自問其故答曰是居也前有平地輪廣十丈中有平臺半平地臺南有方池倍平䑓環池多山竹野卉池中生白蓮白魚又南抵石澗夾澗有古松老杉大僅十人圍髙不知幾百尺修柯戞雲低枝拂潭如幢豎如葢張如龍蛇走松下多灌叢蘿蔦葉蔓駢織承翳日月光不到地盛夏風氣如八九月時下鋪白石為出入道堂北五步據層崖積石嵌空垤塊雜木異草盖覆其上緑陰䝉䝉朱實離離不識其名四時一色又有飛泉植茗就以烹燀好事者見可以永日堂東有瀑布水懸三尺瀉階隅落石渠昏曉如練色夜中如環珮琴筑聲堂西倚北崖右趾以剖竹架空引崖上泉胍分綫懸自簷注砌纍纍如貫珠霏㣲如雨露滴瀝飄灑隨風逺去其四傍耳目杖屨可及者春有錦繡谷花夏有石門澗雲秋有虎谿月冬有鑪峯雪陰晴顯晦昏旦含吐千變萬狀不可殫紀覼縷而言故云甲廬山者噫凡人豐一屋華一簀而起居其間尚不免有驕穏之態今我為是物主物至致知各以類至又安得不外適内和體寧心恬哉昔永逺宗雷輩十八人同入此山老死不反去我千載我知其心以是哉矧予自思從㓜迨老若白屋若朱門凡所止雖一日二日輙覆簣土為臺聚拳石為山環斗水為池其喜山水病癖如此一旦蹇剥來佐江郡郡守以優容而撫我廬山以靈勝待我是天與我時地與我所卒獲所好又何以求焉尚以冗員所覊餘累未盡或往或來未遑寧處待予異時弟妹婚嫁畢司馬歲秩滿出處行止得以自遂則必左手引妻子右手抱琴書終老於斯以成就我平生之志清泉白石實聞此言時三月卄七日始居新堂四月九日與河南元集虚范陽張允中南陽張深之東西二林寺長老湊朗滿晦堅等凡二十有二人具齋施茶果以落之因為草堂記長慶二年七月自中書舍人出守杭州路次藍溪作太原一男子自顧庸且鄙老逢不次恩洗拔出泥滓既居可言地願助朝廷理伏閣三上章戅愚不稱㫖聖人存大體優貸容不死鳯詔停舍人魚書除刺史㝠懐齊寵辱委順遂行止我自得此心於兹十年矣餘杭乃名郡郡郭臨江汜已想海門山潮聲來入耳昔予貞元末覊旅曾遊此甚覺太守尊亦諳魚酒美因生江海興每羡滄浪水尚擬拂衣行况今兼祿仕青山峰巒接白日煙塵起東道既不通改轅遂南指自秦窮楚越浩蕩五千里聞有賢主人而多好山水是行頗為愜所歴良可紀䇿馬渡藍溪勝遊從此始中間以舊遊一層作襯推波助瀾致有曲折白文公年譜云時河朔復亂居易數上疏論其事天子不能用遂求外任盖穆宗荒縱宰相蕭俛杜元穎崔植等皆齷齪無逺畧宜公之不樂居朝也時汴軍亂路不通故由襄漢赴任自蜀江至洞庭湖口有感而作江從西南來浩浩無旦夕長波逐若瀉連山鑿如劈千年不壅潰萬里無墊溺不爾民為魚大哉禹之績導岷既艱逺距海無咫尺胡為不訖功餘水斯委積洞庭與青草大小兩相敵混合萬丈深淼茫千里白毎歲秋夏時浩大吞七澤水族窟穴多農人土地窄我今尚嗟歎禹豈不愛惜邈未究其由想古觀遺跡疑此苖人頑恃險不終役帝亦無奈何留患與今昔水流天地内如身有血脉滯則為疽疣治之在鍼石安得禹復生為唐水官伯手提倚天劔重來親指畫疏河似剪紙決壅同裂帛渗作膏腴田蹋平魚鼈宅龍宫變閭里水府生禾麥坐添百萬户書我司徒籍議論竒闢筆力亦渾勁與題稱集中此種絶少頗近昌黎其源亦從杜甫劍門一篇脱胎立春後五日立春後五日春態紛婀娜白日斜漸長碧雲低欲墮殘氷坼玉片新蕚排紅顆遇物盡欣欣愛春非獨我迎芳後園立就暖前檐坐還有惆悵心欲別紅爐火遇物盡欣欣二句即茂叔不除忩前草之意別元九後咏所懐零落桐葉雨蕭條槿花風悠悠早秋意生此幽閒中况與故人別中懐正無悰勿云不相送心到青門東相知豈在多但問同不同同心一人去坐覺長安空初與元九別後忽夢見之及寤而書適至兼寄桐花詩悵然感懐因以此寄自注元九初謫江陵永夀寺中語新昌坊北分歸來數行淚悲事不悲君悠悠藍田路自去無消息計君食宿程己過商山北昨夜雲四散千里同月色曉來夢見君應是君相憶夢中握君手問君意何如君言苦相憶無人可寄書覺來未及説叩門聲冬冬言是商州使送君書一封枕上忽驚起顛倒著衣裳開緘見手札一紙十三行上論遷謫心下説離别腸心腸都未盡不暇叙炎涼云作此書夜夜宿商州東獨對孤燈坐陽城山館中夜深作書畢山月向西斜月下何所有一樹紫桐花桐花半落時復道正相思殷勤書背後兼寄桐花詩桐花詩八韻思緒一何深以我今朝意憶君此夜心一章三遍讀一句十囘吟珍重八十字字字化為金一意百折往復纒綿極平極曲愈淺愈深覺兩人覿靣對語無此親切也杜甫於李白居易於元㣲之皆友誼中最篤者故兩集中贈答詩真摰乃爾悲事不悲君一句見從前之上章論救不係於私情也此是篇中眼目舊唐書本傳居易與河南元稹相善同年登制舉交情隆厚稹自監察御史謫為江陵府士曹掾翰林學士李絳崔羣於上前面論稹無罪居易累疏切諫不報秋江送客秋鴻次第過哀猿朝夕聞是日孤舟客此地亦離羣濛濛潤衣雨漠漠冐帆雲不醉潯陽酒煙波愁殺人溪中早春南山雪未盡陰嶺留殘白西澗氷己消春溜含新碧東風未幾日蟄動萌草坼潜知陽和功一日不虚擲愛此天氣暖來拂溪邉石一坐欲忘歸暮禽聲嘖嘖蓬蒿隔桑棗隱映煙火夕歸來問夜飡家人烹薺麥通首寫早春之景一結言外有情悠然不盡渭村雨歸渭水寒漸落離離蒲稗苖閒傍沙邊立看人刈葦苕近水風景冷晴明猶寂寥復兹夕陰起野思重蕭條蕭條獨歸路暮雨濕村橋意致簡逺極似韋應物寄㣲之三首江州望通州天涯與地未有山萬丈髙有江千里闊間之以雲霧飛鳥不可越誰知千古險為我二人設通州君初到鬱鬱愁如結江州我方去迢迢行未歇道路日乖隔音信日斷絶因風欲寄語地逺聲不徹生當復相逢死當從此別君遊襄陽日我在長安住今君在通州我過襄陽去襄陽九里郭樓雉連雲樹顧此稍依依是君舊遊處蒼茫蒹葭水中有潯陽路此去更相思江西少親故去國日己逺喜逢物似人如何含此意江上坐思君有如河嶽氣相合方氛氲狂風吹中絶兩處成孤雲風迴終有時雲合豈無因努力各自愛窮通我爾身清空一氣如話三首直如一首反覆讀之令人心惻惻殊難為懐似古樂府似蘇李河梁詩似杜甫夢李白二章要自成為香山之詩惟其真也詩文到真處則千古流傳不可磨滅矣孟夏思渭村舊居寄舍弟嘖嘖雀引雛稍稍筍成竹時物感人情憶我故鄉曲故園渭水上十載事樵牧手種榆栁成陰陰覆墻屋隱豆苖肥鳥鳴桑椹熟前年當此時與爾同遊矚詩書課弟姪農圃資童僕日暮麥登塲天晴蠶拆簇㺯泉南澗坐待月東亭宿興發飲數杯悶來棋一局一朝忽分散萬里仍羈束井鮒思反泉籠鶯悔出谷九江地卑濕四月天炎燠苦雨初入梅瘴雲稍含毒泥秧水畦稻灰種畬田粟已訝殊歲時仍嗟異風俗閒登郡樓望日落江山綠歸鴈拂鄕心平湖斷人目殊方我漂泊舊居君幽獨何時同一瓢飲水心亦足村居之樂寫來神往歸鴈平湖風景亦自不惡而煙波江上之愁己盡此十字中足抵一篇登樓賦南湖晚秋八月白露降湖中水方老旦夕秋風多衰荷半傾倒手攀青楓樹足蹋黄蘆草慘淡老容顔冷落秋懐抱有兄在淮楚有弟在蜀道萬里何時來煙波白浩浩早秋晚望兼呈韋侍御九𣲖繞孤城城髙生逺思人煙半在船野水多於地穿霞日脚直驅鴈風頭利去國來幾時江上秋三至夫君亦淪落此地同飄寄憫黙向隅心摧頽觸籠翅且謀眼前計莫問胷中事潯陽酒甚濃相勸時時醉司馬宅雨徑綠蕪合霜園紅葉多蕭條司馬宅門巷無人過唯對大江水秋風朝夕波瀕江冷署如在目前寄王質夫憶始識君時愛君世縁薄我亦吏王畿不為名利著春㝷仙遊洞秋上雲居閣樓觀水潺潺龍潭花漠漠吟詩石上坐引酒泉邊酌因話出處心心期老巖壑忽從風雨別遂被簪纓縛君作出山雲我為入籠鶴籠深鶴殘悴山逺雲飄泊去處雖不同同負平生約今來各何在老去隨所託我守巴南城君佐征西幕年顔漸衰颯生計仍蕭索方含去國愁且羡從軍樂舊遊疑是夢往事思如昨相憶春又深故山花正落前後叙交情中間忽作比體格調頗近建安一結有風致送客回晚興城上雲霧開沙頭風浪定參差亂山出淡泞平江淨行客舟已逺居人酒初醒嫋嫋秋竹梢巴蟬聲似磬江城風景逐層寫得凄凉筆墨之外逼出一愁字東樓竹瀟灑城東樓遶樓多修竹森然一萬竿白粉封青玉巻簾睡初覺欹枕㸔未足影轉色入樓牀席生浮緑空城絶賔客向夕彌幽獨樓上夜不歸此君留我宿娟淨可愛東坡種花二首持錢買花樹城東坡上栽但購有花者不限桃杏梅百果参雜種千枝次第開天時有早晚地力無髙低紅者霞豔豔白者雪皚皚遊蜂逐不去好鳥亦來栖前有長流水下有小平臺時拂臺上石一舉風前杯花枝蔭我頭花蕊落我懐獨酌復獨咏不覺月平西巴俗不愛花竟春無人來唯此醉太守盡日不能迴東坡春向暮樹木今何如漠漠花落盡翳翳葉生初每日領童僕荷鋤仍決渠剗土壅其本引泉溉其枯小樹低數尺大樹長丈餘封植來幾時髙下齊扶踈養樹既如此養民亦何殊將欲茂枝葉必先救根株云何救根株勸農均賦租云何茂枝葉省事寛刑書移此為郡政庶幾甿俗蘇前一首細寫種花之趣靜觀物理及時行樂獨善之義也後一首推廣言之與栁宗元郭槖駞種樹説同意兼濟之志也妙在説得極纎悉極平淡乃具真實本領宋儒謂杜子美情多得志必能濟物亦是此意陳蕃不事掃除一室而欲經營天下宜其志大而才疎也勸農均賦省事寛刑豈獨治一郡哉雖以治天下可矣二老堂詩話曰蘇文忠公不輕許可獨敬愛樂天屢形詩篇盖其文章皆主辭達而忠厚好施剛直盡言與人有情於物無著大畧相似謫居黄州始號東坡其原必起於樂天忠州之作也步東坡朝上東坡步夕上東坡步東坡何所愛愛此新成樹種植當歲初滋榮及春暮信意取次栽無行亦無數緑陰斜景轉芳氣㣲風度新葉鳥下來萎花蝶飛去閒攜斑竹杖徐曵黄麻屨欲識往來頻青苔成白路容齋隨筆曰東坡居黄州始自稱東坡居士其意葢專慕樂天而然如贈寫真李道士云他時要指集賢人知是商山老居士贈善相程傑云我似樂天君記取華顛賞遍洛陽春送程懿叔云我甚似樂天但無素與蠻入侍邇英云定是香山老居士世縁終淺道縁深去杭州云出處依稀似樂天敢將衰朽較前賢則公之所以景仰者不止一再言之非東坡之名偶爾暗合也竹窗常愛輞川寺竹窗東北廊一別十餘載見竹未曾忘今春二月初卜居在新昌未暇作廐庫且先營一堂開窗不糊紙種竹不依行意取北簷下窗與竹相當遶屋聲淅淅逼人色蒼蒼煙通杳靄氣月透玲瓏光是時三伏天天氣熱如湯獨此竹窗下朝迴解衣裳輕紗一幅巾小簟六尺牀無客盡日靜有風終夜涼乃知前古人言事頗諳詳清風北窗卧可以傲羲皇御選唐宋詩醇巻二十一
