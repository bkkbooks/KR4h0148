front:
  text: 欽定四庫全書御選唐宋詩醇卷五
  hash: sha256:77a79b8c882bed7f0f1b7d5369dd7421d35c2d862ed60d14e2ffee66a5e01639
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_012-1a, image: WYG1448/WYG1448-0134c.png}
body:
  text: 隴西李白詩五目録襄陽歌江上吟侍從宜春苑奉詔賦龍池桞色初靑聽新鶯百囀歌西嶽雲臺歌送丹丘子梁園吟鳴臯歌送岑徵君橫江詞白雲歌送劉十六歸山秋浦歌當塗趙炎少府粉圖山水歌上皇西巡南京歌峨眉山月歌江夏行清溪行贈孟浩然見京兆韋參軍量移東陽贈韋侍御黃裳二首贈裴十四贈清漳明府姪聿贈新平少年口號贈徵君鴻秋日鍊藥院鑷白髮贈元六兄林宗憶襄陽舊遊贈馬少府巨對雪獻從兄虞城宰贈升州王使君忠臣贈别從甥髙五醉後贈從甥髙鎮贈秋浦桞少府中丞宋公以吳兵三千赴河南軍次尋陽脫豫之囚參謀幕府因贈之流夜郎贈辛判官贈常侍御贈易秀才經亂離後天恩流夜郎憶舊遊書懷贈江夏韋太守良宰贈漢陽輔録事贈盧司户贈從弟南平太守之遙流夜郎半道承恩放還兼欣剋復之美書懷示息秀才宿清溪主人巴陵贈賈舍人贈從弟宣州長史昭陳情贈友人贈錢徵君少陽登敬亭山南望懷古贈竇主簿經亂後將避地剡中留贈崔宣城
  hash: sha256:1b89767beea258ad0a41fc698523ab4d2a2ef43718c1d46469592f87829272d7
