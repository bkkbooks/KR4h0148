  text: 欽定四庫全書御選唐宋詩醇卷三
  hash: sha256:28694b32903d0170e8ae42fea50e595de46f5561b83313a823e183a3b441031e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_009-1a, image: WYG1448/WYG1448-0113c.png}
body:
  text: 隴西李白詩三關山月明月出天山蒼茫雲海間長風幾萬里吹度玉門關漢下白登道胡窺青海灣由來征戰地不見有人還戍客望邊色思歸多苦顔髙樓當此夜歎息未應閒朗如行玉山可作白自道語格髙氣渾雙關作收彌有逸致吕居仁曰太白詩如明月出天山等篇氣蓋一世學者能熟味之自不褊淺矣胡應麟曰雄渾之中多少閒雅樂府解題曰漢橫吹曲二十八解魏晉以來惟傳十曲又有關山月等八曲合十八曲關山月傷離别也獨漉篇獨漉水中泥水濁不見月不見月尚可水深行人沒越鳥從南來胡鷹亦北渡我欲彎弓向天射惜其中道失歸路落葉别樹飄零隨風客無所托悲與此同羅幃舒卷似有人開明月直入無心可猜雄劍挂壁時時龍鳴不斷犀象繡澀苔生國恥未雪何由成名神鷹夢澤不顧鴟鳶為君一擊鵬摶九天全從古詞奪換而出其妙過之世人但學蘭亭靣欲換凡骨無金丹如白之樂府真乃神移意授變化從心故使靑出於藍氷寒於水蘇轍曰羅幃舒卷四語殊不可及蕭士贇曰獨漉篇即拂舞歌五曲中之獨祿篇也太白集中祿字作漉字其間命意造辭亦模倣規擬特古辭為父報仇太白則為國雪恥耳登髙丘而望逺海登髙丘望逺海六鰲骨巳霜三山流安在扶桑半摧折白日沉光彩銀臺金闕如夢中秦皇漢武空相待精衛費木石黿鼉無所慿君不見驪山茂陵盡灰滅牧羊之子來攀登盜賊劫寶玉精靈竟何能窮兵黷武今如此鼎湖飛龍安可乘蕭士贇曰此題樂録及解題並無前聞太白此詩不過引秦皇漢武巡海求仙之事以通諷諫耳唐汝詢曰此譏方士之無益也雙燕離雙燕復雙燕雙飛令人羡玉樓珠閣不獨棲金窗繡户長相見柏梁失火去因入吳王宫吳宫又焚蕩雛盡巢亦空憔悴一身在孀雌憶故雄雙飛難再得傷我寸心中途窮慟哭豈勝身世之感五噫四愁同此酸楚蕭士贇曰此其太白自歎之作乎首四句言待詔金鑾時也柏梁失火去喻遭讒被放時也中三句喻以纍遭謫時也末四句言放逐之餘思君而不得再見安得不為之傷心乎亦可哀也己琴歷曰河間新歌二十一章之一有雙燕離山人勸酒蒼蒼雲松落落綺皓春風爾來為阿誰蝴蝶忽然滿芳草秀眉霜雪顔桃花骨靑髓緑長美好稱是秦時避世人勸酒相歡不知老各守麋鹿志恥隨龍虎爭歘起佐太子漢王乃復驚顧謂戚夫人彼翁羽翼成歸來商山下泛若雲無情舉觴酹巢由洗耳何獨清浩歌望嵩嶽意氣還相傾泛咏四皓便是無情之文故注家以為感時事刺盧鴻輩不為無見白居易四皓廟云如彼旱天雲一雨百榖滋澤則在天下雲復歸希夷可謂藴藉有味矣白詩却只有五字曰泛若雲無情尤為深妙知古人每相本也蕭士贇曰此詩蓋為明皇廢太子瑛有所感而作也明皇之時盧鴻王希夷隱居嵩山李元愷吳筠之徒皆以隱逸稱或召至闕廷或遣問政事徒爾髙談濶論然未有能如四皓之一言而太子得不易也末句亦深不滿於嵩嶽之隱者與其意微而顯矣樂府山人勸酒者觴酌七曲之一于闐采花于闐采花人自言花相似明妃一朝西入胡胡中美女多羞死乃知漢地多名姝胡中無花可方比丹靑能令醜者妍無鹽翻在深宫裏自古妒蛾眉胡沙埋皓齒沉淪不偶之士如明妃者自古不乏若林甫當國而云野無遺賢則賢不肖之易置者衆矣即白之受譖於張垍所謂入宫見妬固其宜也結語峭甚可為歎絶樂録于闐采花者蕃胡四曲之一鞠歌行玉不自言如桃李魚目笑之卞和恥楚國青蠅何太多連城白璧遭讒毁荆山長號泣血人忠臣死為刖足鬼聽曲知寧戚夷吾因小妻秦穆五羊皮買死百里奚洗拂青雲上當時賤如泥朝歌鼓刀叟虎變磻溪中一舉釣六合遂荒營丘東平生渭水曲誰識此老翁奈何今之人雙目送飛鴻起六句一意三折語語竒雋蓋述遭讒被放之感糞壤充幃而申椒不芳亦此物也聽曲知寧戚以下託意古人與梁甫吟起處同意亦本騷中語化出目送飛鴻用衛靈見孔子事乃心不在賢之意一路平直到此截然而止却與起勢相稱章法可玩蕭士贇曰太白此詞始則傷士之遭讒廢棄中則羡乎四賢之遇合有時終則重嘆今人不能如古人之識士也亦借此自况云耳王僧䖍技録平調七曲七曰鞠歌行陸機鞠歌行序曰按漢宫閣有含章鞠室靈芝鞠室後漢馬防第宅卜臨道連閣通池鞠城彌於街路鞠歌將謂此也又東阿王詩連騎擊壤或謂蹙鞠乎三言七言雖竒寶名器不遇知己終不見重願逢知己以託意焉幽澗泉拂彼白石彈吾素琴幽澗愀兮流泉深善手明徽髙張清心寂歷似千古松颼飀兮萬尋中見愁猿弔影而危處兮叫秋木而長吟客有哀時失職而聽者淚淋浪以霑襟乃緝商綴羽潺湲成音吾但寫聲發情於妙指殊不知此曲之古今幽澗泉鳴深林此琴操也松響猿吟寫出凄清幽怨之音曲澗泉聲泠然在耳鍾惺曰中見非目境也就琴中見之末後殊不知一語妙達樂理樂府幽澗泉者山水二十四曲之一王昭君昭君拂玉鞍上馬啼紅頰今日漢宫人明朝胡地妾題多名篇此只以十字盡之校今朝猶漢地明旦入胡關之句詞意倍為激烈古今樂録曰元嘉技録吟嘆四曲二曰王明君石崇作郭茂倩云一曰王昭君唐書樂志曰明君漢曲也石崇以此曲教緑珠而自製新辭荆州歌白帝城邊足風波瞿塘五月誰敢過荆州麥熟繭成蛾繅絲憶君頭緒多撥榖飛鳴奈妾何古質入漢得風人之遺韻樂府妙處如是如是桂臨川曰李詩短章若荆州歌等作俱出風雅可以被之管絃者也郭茂倩曰荆州歌蓋出於清商曲江陵樂荆州即江陵也有紀南城梁簡文荆州歌云紀城南里望朝雲雉飛麥熟妾思君是也蕭士贇曰撥榖布榖也雉子斑辟邪伎作鼓吹驚雉子斑之奏曲成喔咿振迅欲飛鳴扇錦翼雄風生雙雌同飲啄趫悍誰能爭乍向草中耿介死不求黃金籠下生天地至廣大何惜遂物情善卷讓天子務光亦逃名所貴曠士懷朗然合太清前半傅題後半攄意隱者為髙故往而不返究何關於造物之大然亦各行其志也白本髙曠故其言如此蕭士贇曰天寶之末爭名者於朝爭利者於市太白此詩其有所諷與古今樂録曰漢鼓吹鐃歌十八曲其十三曰雉子斑梁三朝樂第四十一設辟邪使鼓吹作雉子斑曲引去來相逢行相逢紅塵內髙揖黃金鞭萬户垂楊裏君家阿那邊顧華玉論五言絶以調古為上乘以情真為得體李白有之王僧䖍技録相和歌清調六曲有相逢狹路行亦曰長安有狹邪行亦曰相逢行胡震亨曰阿那猶云若箇也有所思我思仙人乃在碧海之東隅海寒多天風白波連山倒蓬壺長鯨噴湧不可涉撫心茫茫淚如珠西來靑鳥東飛去願寄一書謝麻姑海寒多天風五字融鑄古人自成竒句蕭士贇曰王僧䖍技録相和歌瑟調三十八曲內有有所思又漢短簫鐃歌二十二曲其一曰有所思亦曰嗟佳人注云漢大樂食舉十三曲第七曰有所思漢朝以此樂侑食久别離别來幾春未還家玉窗五見櫻桃花况有錦字書開緘使人嗟至此腸斷彼心絶雲鬟緑鬢罷梳結愁如回飈亂白雪去年寄書報陽臺今年寄書重相催東風兮東風為我吹行雲使西來待來竟不來落花寂寂委青苔一往纒綿所謂緣情之什却自不涉綺靡古今樂録别離十九曲之一白頭吟錦水東北流波蕩雙鴛鴦雄巢漢宫樹雌弄秦草芳寧同萬死碎綺翼不忍雲間兩分張此時阿嬌正嬌妒獨坐長門愁日暮但願君恩顧妾深豈惜黃金買詞賦相如作賦得黃金丈夫好新多異心一朝將聘茂陵女文君因贈白頭吟東流不作西歸水落花辭條羞故林絲固無情隨風任傾倒誰使女蘿枝而來强縈抱兩草猶一心人心不如草莫卷龍鬚席從他生網絲且留琥珀枕或有夢來時覆水再收豈滿杯棄妾己去難重回古來得意不相負祗今惟有青陵臺蕭士贇曰辭惋意悲國風好色而不淫小雅怨誹而不亂是詩得之矣馮舒曰天際鸞吟非復人間凡響沈德潛曰此隨題感興耳後人欲扭合時事支離無謂兔絲固無情以下信手拈來無不入妙古今樂録曰王僧䖍技録楚調曲有白頭吟行歌古皚如山上雪篇西京雜記云卓文君作宋書樂志大曲十五曲曰白頭吟采蓮曲若耶溪旁采蓮女笑隔荷花共人語日照新妝氷底明風飄香袂空中舉岸上誰家游冶郎三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷腸綺而不艷此自關乎天分王安石云詩人各有所得淸水出芙蓉天然去雕飾此李白所得也於此亦可見之劉辰翁曰淺語盡情古今樂録曰梁武帝製江南弄七曲三曰采蓮曲臨江王節士歌洞庭白波木葉稀燕鴻始入吳雲飛吳雲寒燕鴻苦風號沙宿瀟湘浦節士悲秋淚如雨白日當天心照之可以事明主壯士憤雄風生安得倚天劍跨海斬長鯨白日當天心二語深於寫照蕭士贇曰樂府遊俠曲二十一中有臨江王節士歌陸厥所作長干行妾髮初覆額折花門前劇郎騎竹馬來繞牀弄靑梅同居長千里兩小無嫌猜十四為君婦羞顔未嘗開低頭向暗壁千喚不一回十五始展眉願同塵與灰常存抱柱信豈上望夫臺十六君逺行瞿塘灔澦堆五月不可觸猿聲天上哀門前遲行跡一一生緑苔苔深不能掃落葉秋風早八月蝴蝶黃雙飛西園草感此傷妾心坐愁紅顔老早晚下三巴預將書報家相迎不道逺直至長風沙兒女子情事直從胸臆間流出縈迂回折一往情深嘗愛司空圖所云道不自器與之圓方為深得委曲之妙此篇庶幾近之鍾惺曰古秀真漢人樂府楊慎曰胡蝶來文粹作胡蝶黃蝶以春來八月非來時秋蝶多黃感金氣也白樂天詩秋蝶黃茸茸此可以證憶妾深閨裏煙塵未曾識嫁與長干人沙頭候風色五月南風興思君下巴陵八月西風起想君發揚子去來悲如何見少離别多湘潭幾日到妾夢越風波昨夜狂風度吹折江頭樹渺渺暗無邊行人在何處好乘浮雲驄佳期蘭渚東鴛鴦緑蒲上翡翠錦屏中自憐十五餘顔色桃花紅那作商人婦愁水復愁風黃庭堅以此為李益所作頗為具眼即以前篇校之氣體固殊矣以其淸麗存之馮舒曰此等詩俱元氣所陶冶未可以中唐後詩法論之馮班曰二篇句句有本樂府遺聲都邑三十四曲有長干行吳都賦長干延屬注云江東謂山岡間為干建鄴之南有大長干小長干古朗月行小時不識月呼作白玉盤又疑瑶臺鏡飛在白雲端仙人垂兩足桂樹作團團白搗藥成問言與誰餐蟾蜍蝕圓影大明夜已殘羿昔落九烏天人清且安陰精此淪惑去去不足觀憂來其如何悽愴摧心肝寓託處書法謹嚴蟾蜍以比祿山陰精以刺太真取義皆切羿射九烏以彼比此原無指實必字字為之附㑹則鑿矣胡震亨曰此詩生於天問夜光何德死則又育厥利維何而顧在腹數語盧同月蝕詩又生於此始則微詞含寄終至破口發村矣樂府遺聲時景二十五曲有明月篇亦曰朗月子獨不見白馬誰家子黃龍邊塞兒天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴西池風摧寒棕響月入霜閨悲憶與君别年種桃齊蛾眉桃今百餘尺花落成枯枝終然獨不見流淚空自知喓喓草蟲躍躍阜螽卉木萋止女心悲止思婦之言三百篇具矣幽怨凄清宛然可聽樂府解題曰獨不見傷思而不得見也白紵辭揚淸歌發皓齒北方佳人東鄰子且吟白紵停緑水長袖拂靣為君起寒雲夜卷霜海空胡風吹天飄塞鴻玉顔滿堂樂未終館娃日落歌吹濛蕭士贇曰全篇句意間架並是擬鮑明逺者杜少陵所謂俊逸鮑參軍者與月寒江淸夜沉沉美人一笑千黃金垂羅舞縠揚哀音郢中白雪且莫吟子夜吳歌動君心動君心冀君賞願作天池雙鴛鴦一朝飛去靑雲上二詩雖出入古詞要自情景雙美别具丰神郭茂倩曰宋書樂志云白紵舞按舞辭有巾袍之言紵本吳地所生宜是吳舞也樂府解題曰古辭盛稱舞者之美宜及芳時為樂也唐書樂志曰梁武帝令沈約改其辭為四時白紵歌蕭士贇曰白紵歌有白紵舞吳地出紵故興其所見以寓意始則田野之作後乃大樂氏用焉其音入清商調故清商七曲有子夜者即白紵也在吳歌為白紵在雅歌為子夜其實一也鳴雁行胡雁鳴辭燕山昨發委羽朝度關一一銜蘆枝南飛散落天地間連行接翼往復還客居煙波寄湘吳凌霜觸雪毛體枯畏逢矰繳驚相呼聞弦虛墜良可吁君更彈射何為乎此白遭難避禍而作步步憂虞所謂驚弓之鳥一結婉而多諷誦之惻然郭茂倩曰衛風雍雍鳴雁旭日始旦鄭箋云雁者隨陽而處似婦人從夫故婚禮用焉雍雍聲和也鳴雁行蓋出於此妾薄命漢帝寵阿嬌貯之黃金屋咳唾落九天隨風生珠玉寵極愛還歇妒深情却疏長門一步地不肯暫回車雨落不上天水覆難再收君情與妾意各自東西流昔日芙蓉花今成斷腸草以色事他人能得幾時好因題見意與白頭吟同不必妄傅時事也雨落不上天以下一意折旋可以發人深省蕭士贇曰雖言漢武之事而意實在於王皇后之廢辭意悽斷令人感歎謝枋得曰陳無巳葉落風不起山花空自紅正如太白雨落不上天覆水難重收之意沈德潛曰形容盡態妙於語言蕭士贇曰樂府佳麗四十七曲中有妾薄命曹植有妾薄命篇事出漢書許后傳曰奈何妾薄命端遇竟寧前陶𢎞景仙方注曰斷腸草不可食其花美好名芙蓉花幽州胡馬客歌幽州胡馬客緑眼虎皮冠笑拂兩隻箭萬人不可干彎弓若轉月白雁落雲端雙雙掉鞭行遊獵向樓蘭出門不顧後報國死何難天驕五單于狼戾好凶殘牛馬散北海割鮮若虎餐雖居燕支山不道朔雪寒婦女馬上笑顔如赬玉盤翻飛射鳥獸花月醉雕鞍旄頭四光芒爭戰若蜂攢白刃灑赤血流沙為之丹名將古誰是疲兵良可歎何時天狼滅父子得閒安明皇喜事邊功寵任蕃將天寶十載髙仙芝敗於大食安祿山敗於契丹是詩之作必刺祿山也出門不顧後報國死何難詰之也名將古誰是疲兵良可歎傷之也言切而意悲矣古今樂録曰梁鼓角橫吹三十六曲又有隔谷等二十七曲中有幽州馬客吟通鑑綱目天寶十載夏石國王子潛引大食欲攻四鎮仙芝將兵三萬擊之大敗士卒略盡秋八月安祿山將三道兵六萬討契丹奚與契丹合夾擊唐兵殺傷殆盡祿山以二十騎走入師州御選唐宋詩醇卷三
