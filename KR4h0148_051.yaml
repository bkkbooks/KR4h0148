body:
  text: 太原白居易詩六江州赴忠州至江陵以來舟中示舍弟五十韻昔作咸秦客常思江海行今來仍盡室此去又專城典午猶為幸分憂固是榮箳篁州乘送艛艓驛船迎共載皆妻子同逰即弟兄寧辭浪迹逺且貴賞心并雲展帆髙掛飈馳櫂迅征泝流從漢浦循路轉荆衡山逐時移色江隨地改名風光近東早水木向南清夏口煙孤起湘川雨半晴日煎紅浪拂月射白沙明北渚寒留雁南枝暖待鶯駢朱桃露蕚點翠栁含萌亥市魚鹽聚神林鼓笛鳴壺漿椒葉氣歌曲竹枝聲繫纜憐沙靜垂綸愛岸平水餐紅粒稻野茹紫花菁甌泛茶如乳臺粘酒似餳膾長抽錦縷藕脆削瓊英容易來千里斯須進一程未曾勞氣力漸覺有心情卧穩添春睡行遲帶酒酲忽愁牽世網便欲濯塵纓早接文場戰曾爭翰苑盟掉頭稱俊造翹足取公卿且昧隨時義徒輸報國誠衆排恩易失偏壓勢先傾虎尾憂危切鴻毛性命輕燭蛾誰救護蠶繭自纒縈斂手辭雙闕回眸望兩京長沙拋賈誼漳浦卧劉楨鶗鴂鳴還歇蟾蜍破又盈年光同激箭鄉思極搖旌潦倒親知笑衰羸舊識驚烏頭應感白魚尾為勞赬劎學將何用丹燒竟不成孤舟萍一葉雙鬢雪千莖老見人情盡閒思物理精如湯探冷熱似博鬭輸贏險路應須避迷途莫共爭此心知止足何物要經營玉向泥中潔松經雪後貞無妨隱朝市不必謝寰瀛但在前非悟期無後患嬰多知非景福少語是元亨晦即全身藥明為伐性兵昏昏隨世俗蠢蠢學黎氓鳥以能言􅀈龜緣入夢烹知之一何晚猶足保餘生議論與叙事相間而行才氣瀾翻潮湧一筆掃就題嶽陽樓嶽陽城下水漫漫獨上危樓憑曲䦨春岸緑時連夢澤夕波紅處近長安猿攀樹立啼何苦雁點湖飛渡亦難此地惟堪畫圖障華堂張與貴人看結語振竦洞庭之險更不待實寫入峽次巴東不知逺郡何時到猶喜全家此去同萬里王程三峽外百年生計一舟中巫山暮足霑花雨隴水春多逆浪風兩片紅旌數聲鼓使君艛艓上巴東量移涉險非樂境也中兩聨寫舟行之苦落句偏結得有氣色容齊隨筆曰杜子美詩夜足霑沙雨春多逆水風樂天巫山隴水二句全用之郡齊暇日憶廬山草堂兼寄二林僧社三十韻皆叙貶官以來出處之意諫諍知無補遷移分所當不堪匡聖主只合事空王龍象投新社鵷鸞失故行沉吟辭北闕誘引向西方便住雙林寺仍開一草堂平治行道路安置坐禪牀手版支為枕頭巾閣在牆先生烏几舄居士白衣裳竟嵗何曾悶終身不擬忙滅除殘夢想換盡舊心腸世界多煩惱形神久損傷正從風鼓浪轉作日銷霜吾道尋知止君恩偶未忘忽䝉頒鳯詔兼謝剖魚章蓮靜方依水葵枯重仰陽三車猶夕㑹五馬已晨裝去似尋前世來如别故鄉眉低出鷲嶺腳重下蛇岡漸望廬山逺彌愁峽路長香爐峯隱隱巴水字茫茫瓢挂留庭樹經收在屋梁春拋紅藥圃夏憶白蓮塘惟擬捐塵事將何答寵光有期追永逺無政繼龔黃南國秋猶熱西齊夜暫涼閒吟四句偈靜對一爐香身老同丘井心空是道場覔僧為去伴留俸作歸糧為報山中侣憑看竹下房㑹因歸去在松菊莫教荒一路順叙尉貼中針線細密宛轉斡旋無一毫痕迹此種長律正不易得隂雨嵐霧今朝重江山此地深灘聲秋更急峽氣曉多隂望闕雲遮眼思鄉雨滴心將何慰幽獨賴此北窗琴送蕭處士逰黔南能文好飲老蕭郎身似浮雲鬢似霜生計拋來詩是業家園忘却酒為鄉江從巴峽初成字猿過巫陽始斷腸不醉黔中爭去得磨圍山月正蒼蒼音節悲涼聞清歌應喚奈何也竹枝詞四首瞿塘峽口水煙低白帝城頭月向西唱到竹枝聲咽處寒猿暗鳥一時啼竹枝苦怨怨何人夜靜山空歇又聞蠻兒巴女齊聲唱愁殺江樓病使君巴東船舫上巴西波面風生雨腳齊水蓼冷花紅簇簇江蘺溼葉碧淒淒江畔誰人唱竹枝前聲斷咽後聲遲怪來調苦緣詞苦多是通州司馬詩聲韻悠揚最合竹枝之體唐汝詢曰冷煙斜月之景竹枝悲咽之聲即寒猿暗鳥尚不勝情況可使愁人聽之邪巴水城下巴江水春來似麴塵軟沙如渭曲斜岸憶天津影蘸新黃栁香浮小白蘋臨流搔首坐惆悵為何人别種東坡花樹兩絶三年留滯在江城草樹禽魚盡有情何處殷勤重回首東坡桃李種新成花林好住莫憔悴春至但知依舊春樓上明年新太守不妨還是愛花人深情達語别橋上竹穿橋迸竹不依行恐礙行人被損傷我去自慚遺愛少不教君得似甘棠太平樂詞二首嵗豐仍節儉時泰更銷兵聖念長如此何憂不太平湛露浮堯酒熏風起舜歌願同堯舜意所樂在人和閨怨詞三首録二首珠箔籠寒月紗忩背曉燈夜來巾上淚一半是春氷關山征戍逺閨閣别離難苦戰應憔悴寒衣不要寬二詩意在言外有盛唐人遺意長洲苑春入長洲草又生鷓鴣飛起少人行年深不辨娃宫處夜夜蘇臺空月明憶江栁曾栽楊栁江南岸一别江南兩度春遙憶青青江岸上不知攀折是何人一氣直下節促而意長初除主客郎中知制誥與王十一李七元九三舍人中書同宿話舊感懷閒宵靜話喜還悲聚散窮通不自知已分雲泥行異路忽驚雞鶴宿同枝紫垣曹署榮華地白髮郎官老醜時莫怪不如君氣味此中來校十年遲居易以元和十年貶江州司馬十五年冬自忠州召還拜尚書司門員外郎轉主客郎中知制誥在外凡六年矣撫今追昔無限感慨悲喜二字為一篇綱領第三句悲第四句喜第五句喜第六句悲末二句喜中有悲其實悲之意多於喜深厚藴藉細玩自知居易非沾沾於祿位者故曰聚散窮通不自知蓋其安命素矣見于給事暇日上直寄南省諸郎官詩因以戲贈倚作天仙弄地仙誇張一日抵千年黃麻敕勝長生籙白紵詞嫌內景篇雲彩誤居青瑣地風流合在紫微天東曹漸去西垣近鶴駕無妨更著鞭蔡寬夫詩話曰唐制諫議大夫班給事中上中書舍人班又次之然自外入為諫議者嵗滿始遷給事中嵗滿始遷舍人蓋以下為進故有上坡下坡之說樂天贈于給事詩雲彩誤居青瑣地四句雖以為戲亦當時實事也西省北院新構小亭種竹開忩東通騎省與李常侍隔窗小飲因題四韻結託白鬚伴因依青竹叢題詩新壁上過酒小窗中深院晚無日虛檐涼有風金貂醉看好回首紫垣東蘇軾曰元祐元年豫為中書舍人時執政患本省事多泄漏欲於舍人㕔後作露籬禁同省往來豫白諸公應須簡要清通何必栽籬插棘諸公笑而止明年竟作之暇日讀樂天此詩乃知唐時西掖後作窗以通東省而今日本省不得往來可嘆也送客南遷我說南中事君應不願聽曾經身困苦不覺語丁寧燒處愁雲夢波時憶洞庭春畬煙勃勃秋瘴露冥冥蚊蚋經冬活魚龍欲雨腥水蟲能射影山鬼解藏形穴掉巴蛇尾林飄鴆鳥翎颶風千里黑蕁草四時青客似驚弦雁舟如委浪萍誰人勸言笑何計慰漂零慎勿琴離膝長須酒滿瓶大都從此去宜醉不宜醒將欲詳說南中之苦而先著君應不願聽五字曲折深摯中幅鋪叙風土物産末結出送之之情此詩與前送客逰嶺南同一機局然彼係宦逰故規以不貪此係遷謫故進以自遣義各有取爾方回曰樂天一貶洱州司馬移忠州刺史後歸朝為中書舍人出知杭州召復為蘇州未嘗逺貶其殆借此為題以誇筆端之富妙于鋪叙南土之景歟舊房逺壁秋聲蟲絡絲入檐新影月低眉牀帷半故簾旌斷仍是初寒欲夜時平平寫景悽然欲絶此種意境非三唐以後所能到新昌新居書事四十韻因寄元郎中張博士冒寵已三遷歸朝始二年囊中貯餘俸園外買閒田狐同三徑蒿萊共一㙻新園聊剗穢舊屋且扶顛檐漏移傾瓦梁敧換蠹椽平治繞臺路整頓近階甎巷狹開容駕牆低壘過肩門閭堪駐蓋堂室可鋪筵丹鳯樓當後青龍寺在前市街塵不到官樹影相連省吏嫌坊逺豪家笑地偏敢勞賓客訪或望子孫傳不覔他人愛惟將自性便等閒栽樹木隨分占風煙逸致因心得幽期遇境牽松聲疑澗底草色勝河邊虛澗氷銷地晴和日出天苔行滑如簟莎坐軟於綿簾每當山卷帷多待月褰籬東花掩映窗北竹嬋娟迹慕青門隱名慚紫禁仙假歸思晚沐朝去戀春眠拙薄才無取疏慵職不専題牆書命筆酤酒率分錢柏杵舂靈藥銅瓶漱暖泉爐香穿蓋散籠燭隔紗燃陳室何曾掃陶琴不要弦屏除俗事盡養活道情全尚有妻拏纍猶為組綬纒終須拋爵祿漸擬斷腥羶大底宗莊叟私心事竺乾浮榮水劃字真諦火生蓮梵部經十二𤣥書字五千是非都付夢語默不妨禪博士官猶冷郎中病已痊多同僻處住久結靜中緣緩步攜笻杖徐吟展蜀箋老宜閒語話悶憶好詩篇蠻榼來方㵼䝉茶到始煎無辭數相見鬢髮各蒼然鋪叙新居詩中有畫或議其俚俗瑣碎然不可及處正在此入他人手必不能如此詳細過求詳悉必不能如此位置妥帖竹頭木屑皆非棄物亦顧其用之者何如耳勤政樓西老栁半朽臨風樹多情立馬人開元一株栁長慶二年春不著一字盡得風流偶題閣下㕔靜愛青苔院深宜白髮翁貌將松共瘦心與竹俱空暖有低檐日春多揚幕風平生閒境界盡在五言中喜張十八博士除水部員外郎老何歿後吟聲絶雖有郎官不愛詩無復篇章傳道路空留風月在曹司長嗟博士官猶屈亦恐騷人道漸衰今日聞君除水部喜於身得省郎時一氣呵成句句轉筆筆靈章法亦本杜甫不襲其貌而得其神故佳宋人如楊廷秀輩有意摹仿此種徒成油腔滑調耳方回曰何遜以詩名老杜頌之曰能詩何水曹張籍是除樂天賀之五十六字如一直說話自然條暢晚庭逐涼送客出門後移牀下砌初趁涼行繞竹引睡卧看書老更為官拙慵多向事疏松窗倚藤杖人道似僧居梨園弟子白頭垂淚話梨園五十年前雨露恩莫問華清今日事滿山紅葉鎖宫門暮江吟一道殘陽鋪水中半江瑟瑟半江紅可憐九月初三夜露似真珠月似弓寫景竒麗一幅著色秋江圖聽彈湘妃怨玉軫朱絃瑟瑟徽吳娃徵調奏湘妃分明曲裏愁雲雨似道蕭蕭郎不歸自注江南新詞有云暮雨蕭蕭郎不歸逢張十八員外籍旅次正茫茫相逢此道傍曉嵐林葉暗秋露草花香白髮江城守青衫水部郎客亭同宿處忽似夜歸鄉重到江州感舊逰題郡樓十一韻掌綸知是忝剖竹信為榮才薄官仍重恩深責尚輕昔徵從典午今出自承明鳯詔休揮翰漁歌欲濯纓還乘小艛艓却到古湓城醉客臨江待禪僧出郭迎青山滿眼在白髮半頭生又校三年老何曾一事成重過蕭寺宿再上庾樓行雲水新秋思閭閻舊日情郡民猶認得司馬咏詩聲全首著意重到二字落句意與神㑹情景逼真題别遺愛草堂兼呈李十使君自注李亦廬山人常隱白鹿洞曾住爐峯下書堂對藥臺斬新蘿徑合依舊竹窗開砌水新開􅒙池荷手自栽五年方暫至一宿又須回縱未長歸得猶勝不到來君家白鹿洞聞道亦生苔草堂記中有清泉白石實聞斯言之語縱未長歸得二句殆自為解嘲耶遁叟詩話曰白樂天用斬新亦出杜斬新花蕊未應飛斬字正形容其新在可解不可解之間舟中晚起日髙猶掩水窗眠枕簟清涼八月天泊處或依酤酒店宿時多伴釣魚船退身江海應無用憂國朝廷自有賢且向錢塘湖上去冷吟閒醉二三年前四句即目之景皆退身無用實事也第六句忽接云憂國朝廷自有賢此豈無意於國悻悻然漫諉之他人者蓋言既不用乞身逺出繫心不忘觸境生感不覺衝口而出既而思之無可如何且惟冷吟閒醉而已命意深厚直與杜甫同調非劉禹錫輩輕薄者所及晚興極浦收殘雨髙城駐落暉山明虹半出松暗鶴雙歸將吏隨衙散文書入務稀閒吟倚新竹筠粉汙朱衣夜歸半醉閒行湖岸東馬鞭敲鐙轡瓏璁萬株松樹青山上十里沙堤明月中樓角漸移當路影潮頭欲過滿江風歸來未放笙歌散畫戟門開蠟燭紅次聨已盡西湖之景五六從空中摹擬而得潮頭欲過滿江風較許渾山雨欲來風滿樓句更為闊大汪立名曰按西湖蘇白隄相傳二公始築新書亦云居易為杭州刺史始築隄捍錢唐湖此公初到杭州詩已有十里沙隄句又錢唐湖石函記但云修築河隄加髙數尺别杭民詩注云增築湖隄築不自公始明矣或以公詩有緑楊隂裏白沙隄為白隄所自來然公詩如護江隄白踏晴沙亦用白沙不獨湖隄也況公所修湖隄在湖之東北接連下湖舊志近昭慶有石函橋溜水橋是其故址即李泌設閘泄水引灌六井處今杭人率指蘇隄之西為白隄益不相涉又有指石徑塘為白隄者不知張祜已有斷橋荒蘚合之句矣白詩誰開湖寺西南路草緑裙腰一道斜自注云孤山寺在湖洲中草緑時望如裙腰正指今石徑橋也臘後嵗前遇景詠意海梅半白栁微黃凍水初融日欲長度臘都無苦霜霰迎春先有好風光郡中起晚聽衙鼓城上行慵倚女牆公事暫閒身且健使君殊未厭餘杭郡齊暇日辱常州陳郎中使君早春晚坐水西館書事詩十六韻見寄亦以十六韻酬之新年多暇日晏起褰簾坐睡足心更慵日髙頭未裹徐傾下藥酒稍爇煎茶火誰伴寂寥身無絃琴在左遙思毗陵館春深物嫋娜波拂黃栁梢風搖白梅朵衙門排曉戟鈴閣開朝鎖太守水西來朱衣垂素舸良辰不易得嘉㑹無由果五馬正相望雙魚忽前墮魚中獲瑰寶持玩何磊砢一百六十言字字靈珠顆上申心𣢾曲下叙時轗軻才富不如君道孤還似我敢辭官逺慢且貴身安妥勿復問榮枯冥心無不可遙思毗陵館至佳㑹無由果一段先托起一層以下再叙入寄詩便曲折有致行文最忌直遂詩亦何必不然學者參此思過半矣題小橋前新竹招客雁齒小紅橋垂檐低白屋橋前何所有苒茸新生竹皮開坼褐錦節露抽青玉筠翠如可餐粉霜不忍觸閒吟聲未巳幽玩心難足管領好風煙輕欺凡草木誰能有月夜伴我林中宿為君傾一杯狂歌竹枝曲筠翠一聨寫得浮筠膩粉光動紙上曲盡新竹姿致病中逢秋招客夜酌不見詩酒客卧來半月餘合和新藥草尋檢舊方書晚霽煙景度早涼窗户虛雪生衰鬢久秋入病心初卧簟蘄竹冷風襟卭葛疏夜來身校健小飲復何如洛下卜居三年典郡歸所得非金帛天竺石兩片華亭鶴一隻飲啄供稻粱苞裹用茵席誠知是勞費其奈心愛惜逺從餘杭郭同到洛陽陌下擔拂雲根開籠展霜翮貞姿不可雜高性宜其適遂就無塵坊仍求有水宅東南得幽境樹老寒泉碧池畔多竹隂門前少人迹未請中庶祿且脫雙驂易自注買履道宅價不足因以兩馬償之豈獨為身謀安吾鶴與石清況可掬却是抒寫真趣非矯語鳴亷也鶴石分承細寫一句結足不曰點綴新居而曰安鶴與石妙甚郡中西園閒園多芳草春夏香靡靡深樹足佳禽旦暮鳴不已院門閉松竹庭徑穿蘭芷愛彼池上橋獨來聊徙倚魚依藻長樂鷗見人暫起有時舟隨風盡日蓮照水誰知郡府內景物閒如此始悟喧靜緣何嘗繫逺邇妙諦從心逺地偏悟出九日宴集醉題郡樓兼呈周殷二判官前年九日餘杭郡呼賓命宴虛白堂去年九日到東洛今年九日來吳鄉兩邊蓬鬢一時白三處菊花同色黃一日日知添老病一年年覺惜重陽江南九月未搖落栁青蒲緑稻穟香姑蘇臺榭倚蒼靄太湖山水含清光可憐假日好天色公門吏靜風景涼榜舟鞭馬取賓客掃樓拂席排壺觴胡琴錚鏦指撥刺吳娃美麗眉眼長笙歌一曲思凝絶金鈿再拜光低昻日腳欲落備燈燭風頭漸髙加酒漿觥盞豔飛菡萏葉舞鬟擺落茱茰房半酣憑檻起四顧七堰八門六十坊逺近髙低寺間出東西南北橋相望水道脈分棹鱗次里閭棊布城冊方人煙樹色無隙罅十里一片青茫茫自問有何才與政髙㕔大館居中央銅魚今乃澤國節刺史自古吳都王郊無戎馬郡無事門有棨戟腰有章盛時儻來合慚愧壯嵗忽去還感傷從事醒歸應不可使君醉倒亦何妨請君停杯聽我語此語真實非虛狂五旬已過不為夭七十為期蓋是常須知菊酒登髙㑹從此多無二十場以九日起以宴集結中幅鋪叙吳中山水人物城市之勝可作圖經霓裳羽衣歌自注和微之我昔元和侍憲皇曾陪內宴宴昭陽千歌百舞不可數就中最愛霓裳舞舞時寒食春風天玉鉤欄下香案前案前舞者顔如玉不著人家俗衣服虹裳霞帔步搖冠鈿瓔纍纍珮珊珊娉婷似不任羅綺顧聽樂懸行復止磬簫箏笛遞相攙擊擫彈吹聲邐迤散序六奏未動衣陽臺宿雲慵不飛中序擘騞初入拍秋竹竿裂春氷坼飄然轉旋回雪輕嫣然縱送遊龍驚小垂手後栁無力斜曳裾時雲欲生煙蛾斂略不勝態風袖低昻如有情上元點鬟招蕚緑王母揮袂别飛瓊繁音急節十二遍跳珠撼玉何鏗錚翔鸞舞了却收翅唳鶴曲終長引聲當時乍見驚心目凝視諦聽殊未足一落人間八九年耳冷不曾聞此曲湓城但聽山魈語巴峽惟聞杜鵑哭移領錢塘第二年始有心情問絲竹玲瓏箜篌謝好箏陳寵觱栗沈平笙清絃脆管纎纎手教得霓裳一曲成虛白亭前湖水畔前後祗應三度按便除庶子拋却來聞道如今各星散今年五月至蘇州朝鐘暮角催白頭貪看案牘常侵夜不聽笙歌直到秋秋來無事多閒悶忽憶霓裳無處問聞君部內多樂徒問有霓裳舞者無答云七縣十萬户無人知有霓裳舞惟寄長歌與我來題作霓裳羽衣譜四幅花箋碧間紅霓裳實録在其中千姿萬狀分明見恰與昭陽舞者同眼前髣佛覩形質昔日今朝想如一疑從魂夢呼召來似著丹青圖寫出我愛霓裳君合知發於歌詠形於詩君不見我歌云驚破霓裳羽衣曲又不見我詩云曲愛霓裳未拍時由來能事皆有主楊氏創聲君造譜君言此舞難得人須是傾城可憐女吳妖小玉飛作煙越豔西施化為土矯花巧笑久寂寥娃館苧蘿空處所如君所言誠有是君試從容聽我語若求國色始翻傳但恐人間廢此舞妍蚩優劣寧相逺大都只在人擡舉李娟張態君莫嫌亦擬隨宜且教取我昔元和侍憲皇至唳鶴曲終長引聲叙霓裳羽衣之節奏聲容也當時乍見驚心目至聞道如今各星散叙自己之仕途遷移而選伎以教霓裳也今年五月至蘇州至似著丹青圖寫出叙微之之寄霓裳羽衣譜也我愛霓裳君合知至末以和詩意作結而言此舞之不可失其傳也曰就中最愛霓裳舞教得霓裳一曲成無人知有霓裳舞恰與昭陽舞者同但恐人間廢此舞叙次分明層層照應可當一篇霓裳羽衣記情致纒綿往復極一唱三歎之妙夢溪筆談曰葉法善引明皇入月宫聞仙樂及上歸但記其半遂於笛中寫之㑹西涼府都督楊敬述進婆羅門曲與其聲調相符遂以月中所聞為散序用敬述所進為其腔而名霓裳羽衣曲其說出鄭嵎津陽門詩注與公自注不同又蒲州逍遙樓楯上有唐人橫書類梵字相傳是霓裳譜字訓不通莫知是非或謂今燕部有獻仙音曲乃其遺聲然霓裳本謂之道調法曲今獻仙音乃小石調耳未知孰是韻語陽秋曰霓裳羽衣舞始於開元盛於天寶今寂不傳矣賴有白詩可見一二爾虹裳二句言所飾之服也散序二句及繁音二句言所奏之曲也而唐㑹要謂破陳樂赤白桃李花望瀛霓裳羽衣總名法曲今世所傳望瀛亦十二遍散序無拍曲終亦長引聲若樂奏望瀛亦可髣佛其遺意云小童薛陽陶吹觱栗歌自注和浙西李大夫作翦削乾蘆插寒竹九孔漏聲五音足近來吹者誰得名關璀老死李衮生衮今又老誰其嗣薛氏樂童年十二指點之下師授聲含嚼之間天與氣潤州城高霜月明吟霜思月欲發聲山頭江底何悄悄猿聲不喘魚龍聽翕然聲作疑管裂詘然聲盡疑刀截有時婉軟無筋骨有時頓挫生稜節急聲員轉促不斷轢轢轔轔似珠貫緩聲展引長有條有條直直如筆描下聲乍墜石沉重高聲忽舉雲飄蕭明旦公堂陳宴席主人命樂娛賓客碎絲細竹徒紛紛宫調一聲雄出羣衆音覼縷不落道有如部伍隨將軍嗟爾陽陶方稚齒下手發聲已如此若教白頭吹不休但恐聲名壓關李全是摹老杜觀舞劎器行而變化出之筆力峭徑詞意奇警在集又髙一格汪立名曰按李德裕有霜夜對月聽小童陽陶吹觱栗歌羅隱詩平泉上相東征日曾為陽陶吹觱栗吳江太守㑹稽侯相次三篇皆俊逸太守謂公㑹稽侯謂元也然元相集中已失此詩桂苑叢談曰咸通中姑臧公自梁移鎮淮海郡寡勝逰之地且風亭月觀既已荒涼於戲馬臺連玉鉤道開創池沼建亭臺既畢號曰賞心有浙右小校薛陽陶監押度支運米入城公喜其姓名試詢之果是舊人及問往日蘆管之事有朱崖陸暢元白所撰歌篇一軸公益喜之以蘆管奏於兹亭其管絶微每一篳栗管中常容三管聲聲如天際自然來云雙石蒼然兩片石厥狀怪且醜俗用無所堪時人嫌不取結從胚渾始得自洞庭口萬古遺水濱一朝入吾手擔舁來郡內洗刷去泥垢孔黑煙痕深罅青苔色厚老蛟蟠作足古劎插為首忽疑天上落不似人間有一可支吾琴一可貯吾酒峭絶高數尺坳泓容一斗五絃倚其左一杯置其右窪樽酌未空玉山頽已久人皆有所好物各求其偶漸恐少年場不容垂白叟回頭問雙石能伴老夫否石雖不能言許我為三友觸手明通遊戲自在此種詩境開自居易而蘇軾效之軾集中楊康功石一首本此和微之四月一日作四月一日天花稀葉隂薄泥新燕影忙蜜熟蜂聲樂麥風低冉冉稻水平漠漠芳節或蹉跎逰心稍牢落春華信為美夏景亦未惡颭浪嫩青荷重欄晚紅藥吳宫好風月越郡多樓閣兩地誠可憐其奈久難索喜雨圃旱憂葵堇農旱憂禾菽人各有所私我旱憂松竹松乾竹焦死眷眷在心目灑葉溉其根汲水勞僮僕油雲忽東起涼雨淒相續似面洗垢塵如頭得膏沐千柯習習潤萬葉欣欣緑千日澆灌功不如一霢霂方知宰生靈何異活草木所以聖與賢同心調玉燭千日澆灌功不如一霢霂口頭尋常語却是至理喜字意才寫得盡末四句推廣言之小中見大蓋濟人利物之心無時或忘也六年春贈分司東都諸公時為河南尹我為同州牧內愧無才術忝擢恩已多遭逢幸非一偶當榖賤嵗適值民安日郡縣獄空虛鄉閭盜奔逸其間最幸者朝客多分秩行接鴛鷺羣坐成芝蘭室時聨拜表騎間動題詩筆夜雪秉燭逰春風攜榼出花教鶯點檢栁付風排比法酒淡清漿含桃嫋紅實洛童調金管盧女鏗瑶瑟黛慘歌思深腰凝舞拍密每因同醉樂自覺忘衰疾始悟肘後方不如杯中物生涯隨日過世事何時畢老子苦乖慵希君數牽率偶當榖賤嵗四句先將境內承平之況吏治之善特筆提寫以下接入宴逰之樂便自不妨此其所以可幸也儻四境不治而從事宴逰是曠官也方自愧之不暇何以幸為韋應物詩云邑有流亡愧俸錢與此作兩得之矣和微之詩二十三首并序録三首微之又以近作二十三首寄來命僕繼和其間瘀絮四百字車斜二十篇者流皆韻劇辭殫瓌奇怪譎又題云奉煩只此一度乞不見辭意欲定霸取威置僕於窮地耳大凡依次用韻韻同而意殊約體為文文成而理勝此足下素所長者僕何有焉今足下果用所長過䝉見窘然敵則氣作急則計生四十二章麾掃並畢不知大敵以為何如夫斸石破山先觀鑱迹發矢中的兼聽弦聲以足下來章惟求相困故老僕報語不覺大誇況曩者唱酬近來因繼已十六卷凡千餘首矣其為敵也當今不見其為多也從古未聞所謂天下英雄惟使君與操耳戲及此者亦欲三千里外一破愁顔勿示他人以取笑誚樂天白和三月三十日四十韻送春君何在君在山隂署憶我蘇杭時春逰亦多處為君歌往事豈敢辭勞慮莫怪言語狂須知酬答遽江南臘月半水凍疑如瘀寒景尚蒼茫和風已吹噓女牆城似竈雁齒橋如鋸魚尾上奫淪草芽生沮洳律遲太簇管日暖羲和馭布澤木龍催迎春土牛助雨師習習灑雲將飄飄翥四野萬里晴千山一時曙杭土麗且康蘇民富而庶善惡有懲勸剛柔無吐茹兩衙少辭牒四境稀書疏俗以勞來安政因閒暇著仙亭日登眺虎丘時逰豫尋幽駐旌軒選勝回賓御舟移溪鳥避樂作林猿覷池古莫邪沈石竒羅剎踞水苗泥易耨畬粟灰難鉏紫蕨抽出畦白蓮埋在淤萎花紅帶黯溼葉黃含烟鏡動波颭菱雪回風旋絮手經攀桂馥齒為嘗梅楚坐并船腳攲行多馬蹄跙聖賢清濁醉水陸鮮肥飫魚膾芥醬調水葵鹽䜴絮雖微五袴歌幸免兆人詛但令樂不荒何必逰無倨吳苑僕尋罷越城公尚據舊逰幾客存新宴誰人與莫空文舉酒强下何曾箸江上易優遊城中多毁譽分應當自盡事勿求人恕我既無子孫君仍畢㛰娶久為雲雨别終擬江湖去范蠡有扁舟陶潛有籃輿兩心苦相憶兩口遙相語最恨七年春春來各一處和韻竒險正自章妥句適寫景歷歷如畫引人入勝但令樂不荒何必逰無倨分應當自盡事勿求人恕尤見道之語和酬鄭侍御東陽春悶放懷追越逰見寄君得嘉魚置賓席樂如南有嘉魚時徑氣森爽竹竿竦妍文煥爛芙蓉彼載筆在幕名已重補衮於朝官尚卑一緘疏入掩谷永三都賦成排左思自言拜辭主人後離心蕩揚風前旗東南門館别經嵗春眼悵望秋心悲自注已上叙嘉魚昨日嘉魚來訪我方駕同出何所之樂逰原頭春尚早百舌新語聲椑椑日趁花忙向南坼風催栁急從東吹流年敞恍不饒我美景鮮妍來為誰紅塵三條界阡陌碧草千里鋪郊畿餘霞斷時綺幅裂斜雲展處羅文紕暮鐘逺近聲互動暝鳥髙下飛追隨酒酣將歸未能去悵然回望天四垂生何足養嵇著論途何足泣楊漣洏胡不花下伴春醉滿酌緑酒聽黃鸝嘉魚點頭時一歎聽我此言不知疲語終興盡各分散東西軒騎分逶迤此詩勿遣閒人見見恐與他為笑資白首舊寮知我者憑君一詠向周師自注周判官師範蘇杭舊判官去範字叶韻整麗疏宕七古正則和順之琴者隂隂花院月耿耿蘭房燭中有弄琴人聲貌俱如玉清冷石泉引雅淡風松曲遂使君子心不愛凡絲竹御選唐宋詩醇卷二十四
