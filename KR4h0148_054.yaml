front:
  text: 欽定四庫全書御選唐宋詩醇巻二十六
  hash: sha256:07ac4884214e398c12167eac35527e3720513a991aa6862efd94f290b38b85bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_054-1a, image: WYG1448/WYG1448-0514a.png}
body:
  text: 太原白居易詩八目錄池上小宴問程秀才橋亭卯飲西風題岐王舊山池石壁履道池上作和令狐相公寄劉郎中兼見示長句期宿客不至晚歸府從龍潭寺至少林寺題贈同逰者元相公輓歌詞三首録一首酬李二十侍郎池上閒詠和髙僕射罷節度讓尚書授少保分司喜遂逰山水之作送考功崔郎中赴闕同諸客題于家公主舊宅菩提寺上方晚眺楊栁枝詞八首録四首春早秋初因時即事兼寄浙東李侍郎送姚杭州赴任因思舊逰種栁三詠韋七自太子賔客再除秘書監以長句賀而餞之九年十一月二十一日感事而作春来頻與李二賔客郭外同逰因贈長句三月三日閒居春盡香山避暑二絶贈談客答夢得秋庭獨坐見贈酬夢得霜夜對月見懐初冬月夜得皇甫澤州手札并詩數篇因遣報書偶題長句寄獻北都留守裴令公㸔夢得題答李侍郎詩詩中有文星之句因戲和之早春憶逰思黯南莊因寄長句杪秋獨夜答閒上人来問因何風疾夜聞箏中彈瀟湘送神曲感舊戱禮經老僧夢得前所酬篇有鍊盡美少年之句因思往事兼詠今懐重以長句答之春盡日宴罷感事獨吟前有别栁枝絶句夢得繼和云春盡絮飛留不得隨風好去落誰家又復戱答時熱少見客因詠所懐宣州崔大夫閣老忽以近詩數十首見示吟諷之下竊有所喜因成長句寄題郡齋晚池汎舟遇景成詠贈吕處士和楊尚書罷相後夏日逰永安水亭兼招本曹楊侍郎同行五年秋病後獨宿香山寺早入皇城贈王留守僕射山中五絶句録三首嶺上雲石上苔澗中魚和敏中洛下即事送敏中新授户部員外郎西歸覽盧子䝉侍御舊詩多與微之唱和感今傷昔因贈子䝉題于巻後新小灘喜入新年自詠夏日與閒禪師林下避暑談氏小外孫玉童楊栁枝詞詔取永豐栁植禁苑感賦池上篇齒落辭不能忘情吟江南喜逄蕭九徹因話長安舊逰戱贈五十韻送劉郎中赴任蘇州靈巖寺寄韜光禪師
