front:
  text: 欽定四庫全書御選唐宋詩醇卷十一
  hash: sha256:9d513feeb94467d0a831a0ff304a07e7ff0e10666c589f7382ad9f1c12dd1c44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_024-1a, image: WYG1448/WYG1448-0248a.png}
body:
  text: 襄陽杜甫詩三目録乾元中寓居同谷縣作歌七首水會渡飛仙閣龍門閣石匱閣桔柏渡劔門成都府石犀行題壁畫馬歌戲題畫山水圖歌題李尊師松樹障子歌戲為雙松圖歌病柏病橘枯棕枯柟戲作花卿歌柟樹為風雨所拔嘆茅屋為秋風所破歌天邊行苦戰行述古觀打魚歌越王樓歌冬到金華山觀因得故拾遺陳公學堂遺迹通泉驛南去通泉縣十五里作過郭代公故宅短歌行桃竹杖引韋諷録事宅觀曹將軍畫馬圖丹青引發閬中寄韓諌議憶昔冬狩行別唐十五誡因寄禮部賈侍郎閬山歌閬水歌草堂太子張舍人遺織成褥段杜鵑客至水閣朝霽奉簡嚴雲安蠶榖行古柏行縛雞行牽牛織女殿中楊監見示張旭草書圖課伐木槐葉冷淘行官張望補稻畦水歸上後園山腳驅竪子摘蒼耳秋行官張望督促東渚耗稻向畢清晨遣女奴阿稽竪子阿段往問
  hash: sha256:75c1c1a10d7d2e972025d185a6a1fea3b0798e60633de7ffd92f964d5eeeacb0
