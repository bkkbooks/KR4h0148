front:
  text: 欽定四庫全書御選唐宋詩醇卷二十四
  hash: sha256:feb236473db44ae4ef7e8bf67a61f5be1d3e57fceebc59120131122e330ca613
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_050-1a, image: WYG1448/WYG1448-0476a.png}
body:
  text: 太原白居易詩六目録江州赴忠州至江陵以來舟中示舍弟五十韻題岳陽樓入峽次巴東郡齋暇日憶廬山草堂兼寄二林僧社三十韻皆叙貶官以來出處之意陰雨送蕭處士遊黔南竹枝詞四首巴水别種東坡花樹兩絶别橋上竹太平樂詞二首閨怨詞三首録二首長洲苑憶江栁初除主客郎中知制誥與王十一李七元九三舎人中書同宿話舊感懷見于給事暇日上直寄南省諸郎官詩因以戲贈西省北院新構小亭種竹開牕東通騎省與李常侍隔牕小飲因題四韻送客南遷舊房新昌新居書事四十韻因寄元郎中張博士勤政樓西老栁偶題閣下㕔喜張十八博士除水部員外郎晚庭逐涼梨園弟子暮江吟聴彈湘妃怨逢張十八員外籍重到江州感舊遊題郡樓十一韻題别遺愛草堂兼呈李十使君舟中晚起晚興夜歸臘後嵗前遇景詠意郡齋暇日辱常州陳郎中使君早春晚坐水西館書事詩十六韻見寄亦以十六韻酬之題小橋前新竹招客病中逢秋招客夜酌洛下卜居郡中西園九日宴集醉題郡樓兼呈周殷二判官霓裳羽衣歌小童薛陽陶吹觱栗歌雙石和微之四月一日作喜雨六年春贈分司東都諸公和微之詩二十三首録三首和三月二十日四十韻和酬鄭侍御東陽春悶放懷追越遊見寄和順之琴者
  hash: sha256:6ef651c213e49091f208441f8609c2673b95abe2c8c5cacf9b145bf5714a1968
