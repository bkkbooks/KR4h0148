  text: 欽定四庫全書御選唐宋詩醇卷三十三
  hash: sha256:8f01f0a99221e72f4f04fafc873cb5967c53b854ef8a6ef1a0e0a8a6286f508e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_069-1a, image: WYG1448/WYG1448-0626c.png}
body:
  text: 眉山蘇軾詩二十月二日將至渦口五里所遇風留宿長淮久無風放意弄清快今朝雪浪滿始覺平野隘兩山控吾前吞吐久不嘬孤舟繫桑本終夜舞澎湃舟人更傳呼弱纜恃菅蒯平生傲憂患久矣恬百怪鬼神欺吾窮戲我聊一噫瓶中尚有酒信命誰能戒刻畫山水如謝公而去其棘澀出潁口初見淮山是日至壽州我行日夜向江海楓葉蘆花秋興長長淮忽迷天逺近青山久與船低昻壽州己見白石塔短棹未轉黃茒岡波平風軟望不到故人久立烟蒼茫宛是拗體律詩别饒古趣施元之曰東坡嘗縱筆書此詩且題云豫年三十六赴杭倅過壽作此詩今五十九南遷至䖍烟雨淒然頗有當年氣象也壽陽岸下街東街西翠幕成池南池北緑錢生幽人獨來帶殘酒偶聽黃鸝第一聲泗州憎伽塔我昔南行舟繫汴逆風三日沙吹面舟人共勸禱靈塔香火未收旗腳轉回頭頃刻失長橋郤到龜山未朝飯至人無心何厚薄我自懷私欣所便耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變我今身世兩悠悠去無所逐來無戀得行固願留不惡每到有求神亦倦退之舊云三百尺澄觀所營今己換不嫌俗士汙丹梯一看雲山繞淮甸至理竒文只是眼前景物口頭語透闢無礙是廣長舌潛溪詩眼曰句法之學自是一家工夫昔嘗問山谷耕田欲雨刈欲晴去得順風來者怨山谷云不如千巖無人萬壑靜十步回頭五步坐此專論句法不論義理蓋七言詩四字三字作兩節也此句法出黃庭經自上有黃庭下關元已下多此體張平子四愁詩句句如此困學紀聞曰劉夢得何卜賦云同涉於川其時在風㳂者之吉泝者之凶同萟於野其時在澤伊穜之利乃稑之厄東坡詩耕田欲雨刈欲晴去得順風來者怨本此意容齊四筆曰俚語笑林謂兩商人入神廟其一陸行欲晴許賽以猪頭其一水行欲雨許賽以羊頭神顧小鬼言晴乾喫猪頭雨落喫羊頭有何不可坡詩云若使人人禱輒應造物應須日千變此意未易為庸俗道也志林曰泗州大聖僧伽傳云和尚何國人也又世云莫知其所從來云不知何國人也近讀隋書西域傳乃有何國余在惠州忽被命責儋耳太守方子容自擕告身來且語余曰此固前定無可恨吾妻沈素事僧伽謹甚一夕夢和尚告别沈問所往答曰當與蘇子瞻同行後七十二日當有命今適七十二日矣豈非前定乎豫以為事之前定者不待夢而知然豫何人也而和尚辱與同行得非夙世有少緣契乎龜山我生飄蕩去何求再過龜山嵗五周身行萬里半天下僧卧一菴初白頭地隔中原勞北望潮連滄海欲東遊元嘉舊事無人記故壘摧頽今在不自注宋文帝遣將拒魏太武築城此山萬里句闊逺一菴句靜閒妙作對偶熙寧甲寅軾自杭倅移知密州至元豐己未移知湖州故云再過龜山嵗五周結寓感嘆以見兵戎事往并故壘亦不復存不獨無人記憶已也明道雜志曰蘇公詩云身行萬里半天下僧卧一菴初白頭黃九云初日頭問其義但云若此僧負暄於初日耳余不然黃甚不平曰豈有用白對天乎余異日問蘇公公曰若是黃九要改作日頭也不奈何他十月十六日記所見風髙月暗雲水黃淮陰夜發朝山陽山陽曉霧如細雨炯炯初日寒無光雲收霧卷己亭午有風北來寒欲僵忽驚飛雹穿户牖迅駛不復容遮防市人顛沛百賈亂疾雷一聲如頽墻使君來呼晚置酒坐定已復日照廊恍疑所見皆夢寐百里變怪旋消亡共言蛟龍厭舊穴魚鱉隨徙空陂塘愚儒無知守章句論說黑白推何祥惟有主人言可用天寒欲雪飲此觴遊金山寺我家江水初發源宦遊直送江入海聞道潮頭一丈髙天寒尚有沙痕在中冷南畔石盤陀古來出沒隨濤波試登絶頂望鄉國江南江北青山多羈愁畏晚尋歸楫山僧苦留看落日微風萬頃鞾文細斷霞半空魚尾赤是時江月初生魄二更月落天深黑江心似有炬火明飛焰照山棲鳥驚悵然歸臥心莫識非鬼非人竟何物自注是夜所見如此江山如此不歸山江神見怪驚我頑我謝江神豈得巳有田不歸如江水一往作縹眇之音覺自來賦金山者極意著題正無從得此逺韻起二句將萬里程半生事一筆道盡恰好由岷山導江至此處海門歸宿為入題之語中閒望鄉國句故作羈望語以環應首尾後思及江神見怪而終之以歸田矜竒之語見道之言想見登眺徘徊俯視一切自金山放船至焦山金山樓觀何耽耽撞鐘擊鼓聞淮南焦山何有有修竹採薪汲水僧兩三雲霾浪打人迹絶時有沙户祈春蠶自注吳人謂水中可田者為沙我來金山更留宿而此不到心懷慙同遊盡返決獨往賦命窮薄輕江潭清晨無風浪自湧中流歌嘯倚半酣老僧下山驚客至迎笑喜作巴人談自注焦山長老中江人也自言久客忘鄉井只有彌勒為同龕困眠得就紙帳暖飽食未厭山蔬甘山林飢臥古亦有無田不退寧非貪展禽雖未三見黜叔夜自知七不堪行當投劾謝簪組為我佳處留茒菴金山作己極登髙望逺之勝故焦山作只寫見聞歌嘯之景彼以雄放稱竒此以閒寂入妙結處無田不退寧非貪則又為前篇有田不歸如江水之句進一解矣甘露寺自注欲遊甘露寺有二客相過遂與偕行寺有石如羊相傳謂之很石云諸葛亮孔明坐其上與孫仲謀論曹公也大鐵鑊二案銘梁武帝所鑄畫師子一菩薩二陸探微筆衛公所留祠堂在寺手植柏合抱矣近寺僧發古殿基得舍利七粒并石記乃衛公為穆宗皇帝造福所葬者也江山豈不好獨遊情易闌但有相擕人何必素所歡我欲訪甘露當途無閒官二子舊不識欣然肯聨鞍古郡山為城層梯轉朱欄樓臺斷崖上地窄天水寬一覽吞數州山長江漫漫郤望大明寺惟見烟中竿很石臥庭下穹隆如伏羱緬懷臥龍公挾䇿事雕鑽一談收猘子再說走老瞞名髙有餘想事往無留觀蕭公古鐵鑊相對空團團陂陀受百斛積雨生微瀾泗水逸周鼎渭城辭漢盤山川失故態怪此能獨完僧繇六化人霓衣挂冰紈隱見十二疊觀者疑夸謾破板陸生畫青猊戲盤跚上有二天人揮手如翔鸞筆墨雖欲盡典刑垂不刋赫赫贊皇公英姿凜以寒古柏手親種挺然誰敢干枝撑雲峰裂根入石窟蟠剃草得斷碑斬崖出金棺瘞藏豈不牢見伏理可歎四雄皆龍虎遺迹儼未刓方其盛壯時爭奪肯少安廢興屬造物遷逝誰控摶况彼妄庸子而欲事所難古今共一軌後世徒辛酸聊興廣武歎不待雍門彈就寺中所見器物撫時懷古每事各為段落而感慨深情别有規連矩泄之妙志林曰昔先友史經臣彥輔謂余阮籍登廣武而嘆曰時無英雄使豎子成其名豈謂沛公豎子乎余曰非也傷時無劉項也豎子指魏晉閒人耳其後余遊潤州甘露寺寺有孔明孫權梁武李德裕之遺跡余感之賦詩則猶此意也嗣宗雖放蕩本有意於世以魏晉閒多故故一放於酒何至以沛公為豎子乎玉壺清話曰潤州甘露寺熙寧四年春江中漁者見神光纍夕起於溷厠閒一旦其厠無故自圮長老應夫再營之方築基墾土去地數尺一礎覆土中刻曰有唐太和三年正月二十四日於上元縣禪衆寺舊塔基下獲舍利石函以其年二月十五日重瘞藏於丹徒縣甘露寺東塔下金棺一銀槨一錦襆九重皆余之施也余創甘露寺寶剎重瘞舍利以資穆皇之冥福也江浙西道觀察等使兼潤州刺史李德裕記臘日游孤山訪惠勤惠思二僧天欲雪雲滿湖樓臺明滅山有無水清出石魚可數林深無人鳥相呼臘日不歸對妻孥名尋道人實自娛道人之居在何許寶雲山前路盤紆孤山孤絶誰肯廬道人有道山不孤紙窗竹屋深自暖擁褐坐睡依團蒲天寒路逺愁僕夫整駕催歸及未晡出山回望雲木合但見野鶻盤浮圖茲遊淡薄歡有餘到家恍如夢蘧蘧作詩火急追亡逋清景一失後難摹結句清景二字一篇之大㫖雲雪樓臺逺望之景水清林深近接之景未至其居見盤紆之山路既造其屋有坐睡之蒲團至於僕夫整駕回望雲山寒日將晡宛焉入畫野鶻句於分明處寫出迷離正與起五句相對照語語清景亦語語自娛而道人有道之處己於言外得之栩栩欲仙何必滌筆於冰甌雪碗蘇長公外紀曰惠勤惠思者皆居孤山子瞻以臘日訪之作詩此詩惟孥蘧二韻艱澀而公三叠之原韻孥字乃東方朔臘日早歸之事施元之曰惠勤餘杭人東坡通守錢塘見歐陽文忠公於汝陰而南公曰西湖僧惠勤甚文而長於詩子求人於湖山閒而不可得則往從勤乎東坡到官三日訪勤於孤山之下遂賦此詩戲子由宛丘先生長如丘宛丘學舍小如舟常時低頭誦經史忽然缺伸屋打頭斜風吹帷雨注面先生不愧旁人羞任從飽死笑方朔肯為雨立求秦優眼前勃豀何足道處置六鑿須天游讀書萬卷不讀律致君堯舜知無術勸農冠蓋閙如雲送老虀鹽甘似蜜門前萬事不挂眼頭雖長低氣不屈餘杭别駕無功勞畫堂五丈容旗旄重樓跨空雨聲逺屋多人少風騷騷平生所慙今不恥坐對疲氓更鞭箠道逢陽虎呼與言心知其非口諾唯居髙志下真何益氣節消縮今無幾文章小枝安足程先生别駕舊齊名如今衰老俱無用付與時人分重輕前後平列兩段末以四句作結宛丘低頭讀書而有昻藏磊落之氣别駕畫堂髙坐而有氣節消縮之嫌其所齊名並驅者獨文章耳而文章固無用也中閒以畫堂五丈容旗旄對宛丘學舍小如舟以重樓跨空雨聲逺對斜風吹帷雨注面以平生所慙今不恥對先生不愧傍人羞以坐對疲氓更鞭箠對門前萬事不挂眼以居髙志下真何益對頭雖長低氣不屈故作喧寂相反之勢不獨氣節消縮者難云自適即安坐誦讀者豈云得時文則跌宕昭彰情則欷歔悒鬱烏臺詩案曰任從飽死笑方朔肯為雨立求秦優意取東方朔傳侏儒飽欲死及滑稽傳優旃謂陛楯郎汝雖長何益乃雨立我雖短幸休居言弟家貧官卑而身材長大所以比東方朔陛楯郎而以當今進用之人比侏儒優旃也讀書萬卷不讀律致君堯舜知無術是時新興律學軾意非之以為法律不足以致君於堯舜今時又專學法律而忘詩書故言我讀萬卷書不讀法律蓋聞法律之中無致君堯舜之術也勸農冠蓋閙如雲送老虀鹽甘似蜜以譏新差提舉官所至苛細生事發摘官吏惟學官無吏責也弟轍為學官故有是句生平所慙今不恥坐對疲氓更鞭箠是時多徒配犯鹽之人例皆飢貧言鞭箠此等貧民軾生平所慙今不復恥矣以譏諷鹽法太急也道逢陽虎呼與言心知其非口諾唯是時張靚俞希旦作鹽司意不喜其為人然不敢與爭議故毁詆之為陽虎也越州張中舍壽樂堂青山偃蹇如髙人常時不肯入官府髙人自與山有素不待招邀滿庭户卧龍蟠屈半東州萬室鱗鱗枕其股背之不見與無同狐裘反衣無乃魯張君眼力覻天奧能遣荆棘化堂宇持頤宴坐不出門收攬竒秀得十五才多事少厭閒寂臥看雲烟變風雨筍如玉筯椹如簪强飲且為山作主不憂兒輩知此樂但恐造物怪多取春濃睡足午窗明想見新茶如潑乳句句竒闢軾每以人事喻景物筆端出竒無窮真乃仁智之性共山水效深矣雨中遊天竺靈感觀音院蠶欲老麥半黃前山後山雨浪浪農夫輟耒女廢筐白衣仙人在髙堂如古謡諺精悍遒古考天竺觀音祈禱晴雨見於史者始自髙宗紹興然張去華禱雨之事己始自咸平初靈感之額則賜於治平此詩輟耒廢筐之詞似含嘲諷集中有杭州禱觀音祈晴祝文蓋自熙寧間習俗盛行矣咸淳臨安志曰後晉天福四年僧道翊結廬山中夜有光就地視得竒木命孔仁謙刻觀音像㑹僧勳從洛陽持古佛舍利來因納之頂閒妙相具足錢忠懿王夢白衣人求治其居王感悟乃即其地創佛廬號天竺看經院咸平初郡守張去華以旱迎大士至梵天寺致禱即日雨自是遇水旱必謁焉六月二十七日望湖樓醉書五首録三首黑雲翻墨未遮山白雨跳珠亂入船卷地風來忽吹散望湖樓下水如天放生魚鱉逐人來無主荷花到處開水枕能令山俯仰風船解與月裴回獻花游女木蘭橈細雨斜風濕翠翹無限芳洲生杜若吳兒不識楚辭招七月一日出城舟中苦熱涼飇呼不來流汗方被體稀星乍明滅暗水光瀰瀰香風過蓮芡驚枕裂魴鯉缺伸宿酒餘起坐濯清泚火雲勢方壯未受月露洗身微欲安適坐待東方啓驚枕裂魴鯉五字警絶筆端有風冷然宿臨安淨土寺雞鳴發餘杭到寺已亭午參禪固未暇飽食良先務平生睡不足急掃清風宇閉門羣動息香篆起烟縷覺來烹石泉紫筍發輕乳晚涼沐浴罷衰髮稀可數浩歌出門去暮色入村塢微月半隱山圓荷爭瀉露相攜石橋上夜與故人語明朝入山房石鏡炯當路昔照熊虎姿今為猿鳥顧廢興何作弔萬世一仰俯别有一種清腴幽異之趣無心刻琢自造𤣥微自淨土步至功臣寺落日岸葛巾晚風吹羽扇松間野步穩竹外飛橋轉神功鑿橫嶺巖石得巨片直度千人溝下有微流泫岡巒蔚回合金碧爛明絢緬懷異姓王負擔此鄉縣長逢跨下辱屢乞桑間飯誰謂山石頑識此希世彥凜然英氣逼屹起猶聳戰他年萬騎歸父老恣歡宴錦繡被原野金珠散貧賤竇融既入朝吳芮空記面榮華坐銷歇閲世如郵傳惟有長明燈依然照金殿寫步至之景琢句近六朝人風骨後幅即事寄慨正以不橫使議論為髙五代史曰錢鏐字具美杭州臨安人也以販鹽為盜天復二年封越王昭宗詔圖形凌烟閣升衣錦營為衣錦城石鑑山曰衣錦山大官山曰功臣山鏐游衣錦城宴故老山林皆覆以錦梁太祖即位封吳越王兼淮南節度使作還鄉歌曰三節還鄉兮挂錦衣父老逺來相追隨牛斗無孛人無欺吳越一王駟馬歸游徑山衆峰來自天目山勢若駿馬奔平川中途勒破千里足金鞭玉鐙相回旋人言山住水亦住下有萬古蛟龍淵道人天眼識王氣結茒宴坐荒山巔精誠貫山石為裂天女下試顔如蓮寒窗暖足來朴朔夜鉢咒水降蜿蜒雪眉老人朝扣門願為弟子長參禪爾來廢興三百載奔走吳㑹輸金錢飛樓湧殿壓山破朝鐘暮鼓驚龍眠晴空偶見浮海蜃落日下數投村鳶有生共處覆載內擾擾膏火同烹煎近來愈覺世議隘每到寬處差安便嗟余老矣百事廢郤尋舊學心茫然問龍乞水歸洗眼欲看細字銷殘年自注龍井水洗病眼有效只是叙述徑山事竒文崛起紙上如有金碧照耀躡杜陵之髙蹤導渭南之先路烏臺詩案曰熙寧六年游徑山留題云近來愈覺世議隘以譏近日進用之人多是刻薄議論偏隘不少容人過失故見山中寬閒之處為樂也徑山山門事狀曰徑山乃天目東北峰也中有徑路以通天目故謂之徑山有大師諱法欽吳郡崑山人初隱此山有素衣老人前致拜曰我龍也自師到此吾屬五百皆不安息我將挈歸天目願捨此地為師立錫之所師許之乃請師登山絶頂入五峰之閒中有大湫指謂師曰吾家若去此湫當漲留一穴水慎勿堙之我將時至衛師焉今此一穴尚存謂之龍井永泰中師坐石屏下見白衣儒士拜於前自言是天目巾子山人也長安佛法有難聞師道行髙邈願度為沙彌往救師曰汝有何術曰我誦俱胝觀音咒功力無比師欲驗之乃曰吾坐後石屏汝能咒之令破否曰可遂叱之石屏裂為三片今謂之喝石巖師知神異為剃髮給衣賜名惠崇至京師與術士競惠崇告勝云夜泛西湖五絶新月生魄迹未安才破五六漸盤桓今夜吐艷如半璧游人得向三更看三更向闌月漸垂欲落未落景特竒明朝人事誰料得看到蒼龍西沒時蒼龍已沒牛斗橫東方芒角升長庚漁人收筒及未曉船過惟有菰蒲聲自注湖上禁漁皆盜釣者也菰蒲無邊水茫茫荷花夜開風露香漸見燈明出逺寺更待月黑看湖光湖光非鬼亦非仙風恬浪靜光滿川須臾兩兩入寺去就視不見空茫然五絶蟬聨而下體製從三百篇出清蒼突兀三四兩作寫景之妙尤為脫盡恆蹊昔陳思贈白馬王彪詩藝苑巵言謂其體全倣大雅文王之什至謝康樂登臨海嶠四章文選直合為一首注亦更不分其一其二若此詩亦必作一首讀乃見其妙耳監試呈諸試官我本山中人寒苦盜寸廩文詞雖少作勉强非天禀既得旋廢忘懶惰今十稔麻衣如再著墨水真可飲每聞科詔下白汗如流瀋此邦東南㑹多士敢題品芻蕘盡蘭蓀香不數葵荏貧家見珠貝眩晃自難審緬懷嘉祐初文格變已甚千金碎全璧百衲收寸錦調和椒桂釅咀嚼沙礫磣廣眉成半額學步歸踔踸維時老宗伯氣壓羣兒凜蛟龍不世出魚鮪初驚淰至音久乃信知味猶食椹至今天下士微管幾左袵謂當千載後石室祠髙朕爾來又一變此學初誰諗權衡破舊法芻豢笑凡飪髙言追衛樂篆刻鄙曹沈先生周孔出弟子淵騫寢郤顧老鈍軀頑朴謝鐫鋟諸君况才傑容我懶且噤聊欲廢書眠秋濤舂午枕熙寧五年軾在杭州通判任是年科場監試故有呈試官及試院諸詩此其第一作也以自述起以自述終中閒極論文章之變嘉祐茁軋之習文變而弊得歐陽為之力返於古逮王安石一變科舉之法是又變而之衰之候矣括以二言曰先生周孔出弟子淵騫寢而自傷老鈍無與回瀾豈惟論文實以慨世趙次公曰衛玠樂廣言其時尚虛無之學也曹植沈約言時以詩賦為篆刻而不用也石林詩話曰至和嘉祐閒場屋舉子為文尚竒澀讀或不能成句歐陽文忠公力欲革其弊既知貢舉凡文涉雕刻者皆黜之時范景仁王禹玉梅公儀等同事而梅聖俞為參詳官及放榜平時有聲如劉輝輩皆不預選士論頗洶洶然是榜得蘇子瞻為第二人子由與曾子固皆在選中不可謂不得人矣邵長蘅曰先生以嘉祐六年辛丑中制科入第三等至熙寧五年壬子在杭州監試蓋十二年矣今十稔舉成數云望海樓晚景五絶録三首海上濤頭一線來樓前指顧雪成堆從今潮上君須上更看銀山二十回橫風吹雨入樓斜壯觀應須好句誇雨過潮平江海碧電光時掣紫金蛇青山斷處塔層層隔岸人家喚欲譍江上秋風晚來急為傳鐘鼓到西興試院煎茶蟹眼己過魚眼生颼颼欲作松風鳴䝉茸出磨細珠落眩轉繞甌飛雪輕銀瓶瀉湯誇第二未識古人煎水意自注古語云煎水不煎茶君不見昔時李生好客手自煎貴從活火發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今負病常苦飢分無玉碗捧蛾眉且學公家作茗飲磚爐石銚行相隨不用撑腸拄腹文字五千卷但願一甌常及睡足日髙時獨寫煎茶妙處於集中諸詠茶詩别出一竒語不必深而精采自露此與汲江一篇在古近體中各推絶唱任居實曰蔡君謨作茶辨辨水泉煮飲等極為詳備有蟹眼魚眼用湯之法茶經云凡候湯有三沸如魚眼微有聲為一沸四向如湧泉連珠為第二沸騰波鼓浪為三沸則湯老趙次公曰銀瓶瀉湯誇第二此乃是尋常㸃茶時先略傾瓶中湯方㸃謂之第二湯也孫莘老求墨妙亭詩蘭亭繭紙入昭陵世間遺跡猶龍騰顔公變法出新意細筋入骨如秋鷹徐家父子亦秀絶字外出力中藏稜嶧山傳刻典刑在千載筆法留陽冰杜陵評書貴瘦硬此論未公吾不憑短長肥瘦各有態玉環飛燕誰敢憎吳興太守真好古購買斷缺揮縑繒龜趺入坐螭隱壁空齊晝靜聞登登竒蹤散出走吳越勝事傳說誇友朋書來乞詩要自寫為把栗尾書溪藤後來視今猶視昔過眼百世如風燈他年劉郎憶賀監還道同時須服膺軾論書大㫖不外前和子由作所云端莊雜流麗剛健含婀娜二語故每不取少陵瘦硬通神之說此詩就亭中所列李顔二徐諸刻加之評論軾之書其源出於顔徐詩中細筋入骨如秋鷹及字外出力中藏稜二句非惟道古乃其自道蓋直以金針度與人矣復齊漫録曰山谷次韻子瞻和子由觀韓幹馬因論伯時畫天馬云曹霸弟子沙苑丞喜作肥馬人笑之李侯論幹獨不爾妙畫骨相遺毛皮翰林評書乃如此賤肥貴瘦渠未知蓋謂東坡嘗作孫莘老墨妙亭詩云杜陵評書貴瘦硬此論未公吾不憑短長肥瘦各有態玉環飛燕誰敢憎意屬此也軾墨妙亭記曰熙寧四年十二月髙郵縣孫莘老自廣德移守吳興其明年二月作墨妙亭於府第之北逍遙堂之東取凡境內自漢以來古文遺刻以實之當是時朝廷方更化立法使者旁午以為莘老當日夜治文書赴期㑹不能復雍容自得如故事而莘老益喜賔客賦詩飲酒為樂又以其餘暇網羅遺逸得前人賦詠數百篇為吳興新集其刻畫尚存而僵仆斷缺於荒陂野草之閒者又皆集於此亭是嵗十二月余以事至湖周覽嘆息而莘老求文為記催試官考較戲作八月十五夜月色隨處好不擇茅簷與市樓况我官居似蓬島鳯咮堂前野橘香劍潭橋畔秋荷老八月十八潮壯觀天下無鵾鵬水擊三千里組練長驅十萬夫紅旗青蓋互明滅黑沙白浪相吞屠人生㑹合古難必此景此行那兩得願君聞此添蠟燭門外白袍如立鵠寫月髙朗寫潮雄竒鵾鵬組練二語可括枚乘七發觀濤一篇秋懷二首苦熱念西風常恐來無時及茲遂淒凛又作徂年悲蟋蟀鳴我牀黃葉投我幃窗前有棲鵩夜嘯如狐狸露冷梧葉脫孤眠無安枝熠耀亦有偶髙屋飛相追定知無幾見迫此清霜期物化逝不留我興為嗟咨便當勤秉燭為樂戒暮遲海風東南來吹盡三日雨空階有餘滴似與幽人語念我平生歡寂寞守環堵壺漿慰作勞裹飯救寒苦今年秋應熟過從飽雞黍嗟我獨何求萬里涉江浦居貧豈無食自不安畎畝念此坐達晨殘燈翳復吐前作感愴後作乃導以冲和起乎悲止乎樂蓋猶是優游卒嵗之㫖梵天寺見贈守詮小詩清逺可愛次韻但聞烟外鐘不見烟中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去峭蒨髙潔韋栁遺音竹坡詩話曰余讀東坡和梵天寺僧守詮詩嘗喜其清絶過人晚遊錢塘始得詮詩云落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨時聞犬吠聲更入青蘿去乃知其幽深清逺自有林下一種風流東坡雖欲回三峽倒流之瀾與溪壑爭流終不近也湖壖雜記曰梵天寺石幢髙建皆鐫吳越名號其寺之伽藍乃東坡也禪家取東坡溪聲便是廣長舌山色不離清淨身二語以為見道不若其題梵天五古色相俱空己臻上乘其成佛當不在靈運下也矧伽藍乎冷齊夜話曰東吳僧惠詮徉狂垢汚而詩語清婉嘗書一詩於湖上山寺壁東坡一見為和其後詮竟以此詩知名次韻孔文仲推官見贈我本麋鹿性諒非伏轅姿君如汗血馬作駒已權竒齊驅大道中並帶鑾鑣馳聞聲自決驟那復受縶維謂君朝發燕秣楚日未欹云何中道止連蹇驢騾隨金鞍冒翠錦玉勒垂青絲旁觀信美矣自揣良厭之均為人所勞何必陋鹽輜君看立仗馬不敢鳴且窺調習困鞭箠僅存骨與皮人生各有志此論我久持他人聞定笑聊與吾子期空階臥積雨病骨煩撐支秋草上垣墻霜葉鳴階墀門前自無客敢作揚雄麾候吏報君來弭節江之湄一對髙人談稍忘俗吏卑今朝枉詩句粲如鳯來儀上山絶梯磴墮海迷津涯憐我枯槁質借潤生華滋豈效世俗人洗刮求瘢痍賢明日登用清廟歌緝熙胡不學長卿預作封禪詞起處八句以我與君並說為雙提之勢謂君朝發燕以下言孔也空階臥積雨以下自言也而中以人生各有志四句聨絡上下纓帶有情此是一篇關鍵處至於候吏報君來以下不過叙述贈答之因體勢故應爾爾湯村開運鹽河雨中督役居官不任事蕭散羡長卿胡不歸去來滯留愧淵明鹽事星火急誰能恤農耕薨薨曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬荒堤上四顧但湖泓線路不容足又與牛羊爭歸田雖賤辱豈失泥中行寄語故山友慎母厭藜羮職役之勞與夫妨農病民之實歷歷如繪所以指陳得失有國風小雅之遺其云羡長卿而愧淵明特托言耳烏臺詩案曰是時盧秉提舉鹽事擘畫開運鹽河差夫千餘人某於大雨中部役其河只為般鹽既非農事而役農民秋田未了有妨農事又其河中間有涌沙數里意言開得不便自歎泥雨勞苦羡司馬長卿居官而不任事又愧陶淵明不早棄官歸去也農事未休而役千人故云鹽事星火急誰能恤農耕又言百姓已勞苦不意天雨又助官政之勞民轉致百姓疲敝役人在泥水中辛苦無異鴨與猪又言某亦在泥中與牛羊爭路而行若歸田豈至此哉故云寄語故山友慎不可厭藜羮而思仕宦以譏開運鹽河不當又妨農事也是日宿水陸寺寄北山清順僧二首録一首草沒河堤雨暗村寺藏修竹不知門拾薪煮藥憐僧病掃地焚香淨客魂農事未休侵小雪佛燈初上報黃昏年來漸識幽居味思與髙人對榻論杳窱回合如坐虛白而閉重𤣥竹坡詩話曰東坡遊西湖於僧舍壁閒見小詩云竹暗不通日泉聲落如雨春風自有期桃李亂深塢問誰所作或告以錢塘僧清順即日求得之一見甚喜而順之名出矣朱壽昌郎中少不知母所在刺血寫經求之五十年去嵗得之蜀中以詩賀之嗟君七嵗知念母憐君壯大心愈苦羡君臨老得相逢喜及無言淚如雨不羡白衣作三公不愛白日升青天愛君五十著彩服兒啼却得償當年烹龍為炙玉為酒鶴髮初生千萬壽金馬詔書錦作囊白藤肩輿簾蹙繡感君離合我酸辛此事今無古或聞長陵朅來見大姊仲儒豈意逢將軍開皇苦桃空記面建中天子終不見西河郡守誰復譏潁谷封人羞自薦前十二句稱述本事於離合情狀曲折無不盡矣然讀之但覺情餘於詞者以有嗟君憐君羡君愛君等字為之㸃睛便俱是作詩之㫖與傳記體裁逈别也感君離合二句忽念及今無古有作一轉軸以下遂歷陳古事不復再加論斷截然而止此格尤為創見然正是漢魏人遺意低手不能為亦不敢為也七言轉韻古詩凡轉韻之首句未有不用韻者七言音節自不可與五言一例嘗考杜陵全集其中亦有三四首出韻者若醉時歌之先生有道出羲皇哀江頭之憶昔霓旌下南苑等句是也此詩不羡白衣作三公句無韻蓋亦如少陵之偶亦有之而自來詩人從無論及於此者何耶司馬溫公日録曰朱壽昌父任諫議大夫壽昌母素微生壽昌嵗餘遣出之因是不知所在壽昌既長求之不得乃棄官尋之刺血書懴以散與人至是得之於同州迎以歸錢子飛知永興軍奏其事乞加旌賞故召之壽昌以同母弟妹皆在同州乃折資授河中通判東軒筆録曰司農少卿朱壽昌在襁褓所生母被出治平中棄官入關中尋訪得於陜州蘇子瞻作詩序且譏切世之不養者李定見之大惋恨㑹為中丞劾軾作詩訕謗將至不測賴上保持之止黜為黃州團練副使和致仕張郎中春晝投紱歸來萬事輕消磨未盡秪風情舊因蓴菜求長假新為楊枝作短行不禱自安緣壽骨深藏難沒是詩名淺斟杯酒紅生頰細琢歌詞穩稱聲蝸殼卜居心自放蠅頭寫字眼能明盛衰閲過君應笑寵辱年來我亦平跪履數從圯上老逸書閒問濟南生東風屈指無多日只恐先春鶗䳏鳴集中七言長律甚少此體在唐如杜白諸公亦不多見以其傷氣也是作格度渾成音調諧美録此一首以見才大無所不可耳畫魚歌自注湖州道上作天寒水落魚在泥短鉤畫水如耕犁渚蒲拔折藻荇亂此意豈復遺鰍鯢偶然信手皆虛擊本不辭勞幾萬一一魚中刃百魚驚蝦蟹奔忙誤跳擲漁人養魚如養雛插竿貫笠驚鵜鶘豈知白挺閙如雨攪水覔魚嗟己疏時新法盛行故即短鉤畫水以為喻所言此意豈復遺鰍鯢與一魚中刃百魚驚者似皆指新法之病民王吕輩壞法亂制豈異拔渚蒲而亂藻荇哉其請罷條例司疏有云造端宏大民實驚疑創法新竒吏皆惶惑正與詩意相同而其繪事如畫筆端有神雖寥峭短章讀其詞如有千百言在腕下趙次公曰鯢有二有鯨鯢之鯢有魚子之鯢此意豈復遺鰍鯢言魚子也邵長蘅曰畫胡麥切音義並同劃以鈎劃魚今三吳水鄉往往有之游道場山何山道場山頂何山麓上徹雲峰下幽谷我從山水窟中來尚愛此山看不足陂湖行盡白漫漫青山忽作龍蛇盤山髙無風松自響誤認石齒號驚湍山僧不放山泉出屋底清池照瑶席階前合抱香入雲月裏仙人親手植出山回望翠雲鬟碧瓦朱欄縹眇間白水田頭問行路小溪深處是何山髙人讀書夜達旦至今山鶴鳴夜半我今廢學不歸山山中對酒空三嘆道場山頂何山麓總寫四句此下詳於道場而略於何山乃偏於詳處更作出山回望二語搖蕩入情何山只緬懷髙人之讀書不復模山範水意盡而止無往不以自然為工汪藻何氏書堂記曰寺有何氏書堂圖記相承以何氏為晉何鍇鍇嘗讀書此山後為吳興太守以其居為寺而名其山贈孫莘老七絶録三首嗟豫與子久離羣耳冷心灰百不聞若對青山談世事當須舉白便浮君天目山前淥浸裾碧瀾堂下看銜艫作堤捍水非吾事閒送苕溪入太湖烏程霜稻襲人香釀作春風霅水光時復中之徐邈聖毋多酌我次公狂前兩作憤悶之詞以快利出之後一首役使成語如天造地設前無古人烏臺詩案曰任杭州通判日轉運司差往湖州相度堤岸利害因與知湖州孫覺相見作詩與之某是時約孫覺并坐客如有言及時事者罰一大盞雖不指言時事是非意言時事多不便不得說也次首某為先曾言水利不便却被轉運使差相度堤岸意言本非興水利之人以譏諷水利之不便也趙次公曰天目山在湖州按樂史寰宇記湖州安吉縣天目山三萬六千尺而水經浙江水出吳興郡於潛縣北天目山按王存九域志湖州南至杭州界首十五里故天目山於寰宇記則係之湖州於水經則係之於潛而於潛雖屬杭州與湖州接境先生倅杭以開運鹽河至湖其言作堤捍水非吾事意謂於此可以為隄而事不在已也王復秀才所居雙檜二首録一首凜然相對敢相欺直幹臨空未要竒根到九泉無曲處世閒惟有蟄龍知石林詩話曰元豐閒蘇子瞻繫御史獄神宗本無意深罪之時相進呈忽言蘇軾於陛下有不臣之意神宗改容曰軾固有罪然於朕不應至是卿何以知之時相因舉軾檜詩云陛下飛龍在天軾以為不知己而求地下之蟄龍非不臣而何神宗曰詩人之詞安可如此論彼自咏檜何預朕事時相語塞章子厚亦從旁解之遂薄其罪子厚嘗以語余且以醜言詆時相曰人之害物無所忌憚有如是也苕溪漁隱叢話曰東坡在御史獄獄吏問云雙檜詩根到九泉無曲處世閒惟有蟄龍知有無譏諷答曰王安石詩天下蒼生待霖雨不知龍向此中蟠此龍是也吏亦為之一笑法惠寺橫翠閣朝見吳山橫暮見吳山從吳山故多態轉側為君容幽人起朱閣空洞更無物惟有千步岡東西作簾額春來故國歸無期人言秋悲春更悲已泛平湖思濯錦更看橫翠憶峨眉雕欄能得幾時好不獨憑欄人易老百年興廢更堪哀懸知草莽化池臺遊人尋我舊遊處但覔吳山橫處來作初唐體清麗竿眠神韻欲絶風水洞二首和推節録一首風轉鳴空穴泉幽寫石門虛心聞地籟妄意覔桃源過客詩難好居僧語不繁歸瓶得氷雪清冷慰文園好景宜得好詩乃偏以詩之難好見其景之絶竒工於翻案西湖遊覽志曰風水洞舊名恩德洞上洞立夏清風自生立秋則止下洞流水潺潺大旱不涸自普照遊二菴長松吟風晚雨細東菴半掩西菴閉山行盡日不逢人裛裛野梅香入袂居僧笑我戀清景自厭山深出無計我雖愛山亦自笑獨往神傷後難繼不如西湖飲美酒紅杏碧桃香覆髻作詩寄謝採薇翁本不避人那避世清幽之趣微妙之音司空圖詩品中未曽道及新城道中二首録一首東風知我欲山行吹斷簷間積雨聲嶺上晴雲披絮帽樹頭初日挂銅鉦野桃含笑竹籬短溪栁自搖沙水清西崦人家應最樂煮葵燒笋餉春耕絮帽銅鉦未免著相矣有野桃溪栁一聨鑄語神來常人得之便足以名世方回曰東坡為杭倅時詩熙寧六年癸丑二月循行屬縣由富陽至新城有此作三四乃是早行詩也起句十四字妙五六亦佳於潛女青裙縞袂於潛女兩足如霜不穿屨􅡬沙鬢髮絲穿柠蓬沓障前走風雨老濞宫粧傳父祖至今遺民悲故主苕溪楊栁初飛絮照溪畫眉渡溪去逢郎樵歸相媚嫵不信姬姜有齊魯村粧野境寫出翛然自得練響選和可入樂府李厚曰老濞吳王濞也杜牧之詩老濞即山鑄後庭千蛾眉此指吳越王錢氏也趙次公曰􅡬沙鬢髮絲穿柠退之月蝕詩云赤鳥司南方尾秃翅􅡬沙柠當作杼字書柠同楮字耳於絲穿之下無義說文曰杼機之持緯者絲穿杼言鬢如絲之穿杼也僧清順新作垂雲亭江山雖有餘亭榭著難穩登臨不得要萬象各偃蹇惜哉垂雲軒此地得何晚天功爭向背詩眼巧增損路窮朱欄出山破石壁很海門浸坤軸湖尾抱雲巘葱葱城郭麗淡淡烟村逺紛紛烏鵲去一一漁樵返雄觀快新獲微景收昔遁道人真古人嘯咏慕嵇阮空齊臥蒲褐芒屨每自捆天憐詩人窮乞與供詩本我詩久不作荒澀旋鋤墾從君覔佳句咀嚼廢朝飯煅煉之工字字創獲至天功爭向背以下十二句忽作排對而風骨益覺峻聳詩有排對自晉有之二陸顔謝己層見叠出至於王褒庾信之篇但略妍聲病即成唐律而詩體日趨靡曼矣此作刻削傲岸具體昌黎若僅謂體格似少陵渼陂西南臺等篇則猶未盡其風力也冷齊夜話曰西湖僧清順頥然清苦多佳句嘗有自題北山埀雲菴詩云久從林下遊頗識林下趣縱然緑陰繁不礙清風度閒於石上眠落葉不知數一鳥忽飛來啼破幽絶處坡與之遊甚多酬唱㑹客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服藹藹君詩似嶺雲從來不許醉紅裙不知野屐穿山翠惟見輕橈破浪紋頗憶呼盧袁彥道難邀罵坐灌將軍自注皆取其有服也晚風落日元無主不惜清涼與子分載酒無人過子雲掩關晝臥客書裙歌喉不共聽珠貫醉面何因作纈紋僧侣且陪香火社詩壇欲斂鸛鵝軍憑君遍繞湖邊寺漲渌晴來己十分山水清音氣韻自别按周邠原作見咸淳臨安志結云莫辭上馬玉山倒已是遲留至夜分前詩結語蓋答其意漫叟詩話曰東坡最善用事既顯而易讀又切當若招持服人遊湖不赴云却憶呼盧袁彥道難邀罵坐灌將軍天然竒作庚溪詩話曰錢塘吳山有美堂乃仁宗朝梅摰公儀出守杭上賜之詩有曰地有吳山美東南第一州梅以上詩名堂士大夫留題甚衆東坡倅杭因令筆吏盡録之御選唐宋詩醇卷三十三
