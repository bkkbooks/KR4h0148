  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_033-1a, image: WYG1448/WYG1448-0331c.png}
body:
  text: 襄陽杜甫詩七蜀相丞相祠堂何處尋錦官城外柏森森映階碧草自春色隔葉黃鸝空好音三顧頻煩天下計兩朝開濟老臣心出師未捷身先死長使英雄淚滿襟老杜入蜀於孔明三致意焉其志有在也詩意豪邁哀頓具有無數層折後來匹此惟李商隱籌筆驛耳世人論此二詩互有短長或不置軒輊其實非有定見今略而言之此為謁祠之作前半用筆甚淡五六乃寫出孔明身分七八折轉而下當時後世悲感並到正意注重後半李詩因地興感故將孔明威靈撮入十四字中寫得十分滿足接筆一轉幾將氣焰掃盡五六兩層折筆末仍收歸本事非有神力者不能二詩局陳各異工力悉敵悠悠耳食之論未足與議也劉㑹孟曰一字一淚寫得使人不忍讀故以為至卜居浣花流水水西頭主人為卜林塘幽已知出郭少塵事更有澄江銷客愁無數蜻蜓齊上下一雙鸂鶒對沈浮東行萬里堪乘興須向山隂上小舟黃生曰結聫暗用孔明子猷語融㑹入妙梅雨南京犀浦道四月熟黃梅湛湛長江去冥冥細雨來茅茨踈易濕雲霧密難開竟日蛟龍喜盤渦與岸回為農錦里煙塵外江村八九家圓荷浮小葉細麥落輕花卜宅從兹老為農去國賒逺慚勾漏令不得問丹砂有客幽棲地僻經過少老病人扶再拜難豈有文章驚海內漫勞車馬駐江干竟日淹留佳客坐百年粗糲腐儒餐不嫌野外無供給乘興還來看藥欄直舉胸情掃絶依傍顧宸曰詞人聲價髙士性情種種具見朱瀚曰一主一賓對仗成篇而錯綜照應極結構之法狂夫萬里橋西一草堂百花潭水即滄浪風含翠篠娟娟靜雨裛紅蕖冉冉香厚祿故人書斷絶恆飢稚子色淒涼欲填溝壑惟踈放自笑狂夫老更狂盧元昌曰因草堂而興感詩成之後用末句狂夫為題堂成背郭堂成䕃白茅緣江路熟俯青郊榿林礙日吟風葉籠竹和煙滴露梢暫止飛烏將數子頻來語燕定新巢旁人錯比揚雄宅懶惰無心作解嘲語意寬閒頷聫託興風趣絶佳西郊時出碧雞坊西郊向草堂市橋官柳細江路野梅香傍架齊書帙看題檢藥囊無人覺來往疏懶意何長王安石曰老杜之無人覺來往下得覺字大好暝色赴春愁下得赴字大好若下見字起字即是小兒言語足見吟詩要一字兩字工夫所思原注崔吏部漪苦憶荆州醉司馬謫官樽俎定常開九江日落醒何處一柱觀頭眠幾回可憐懷抱向人盡欲問平安無使來故慿錦水將雙淚好過瞿塘灔澦堆如此詩可謂古真悲涼矣其性情真至自然流露又在語言文字之外所以髙視天壤獨稱作者盧世㴶曰突兀崚嶒有拔劔斫地之意野老野老籬前江岸回柴門不正逐江開漁人網集澄潭下賈客船隨返照來長路關心悲劔閣片雲何意傍琴臺王師未報收東郡城闕秋生畫角哀原注兩京同南都得云城闕也劉㑹孟曰前半句句洗削黃生曰前摹晚景真是詩中有畫後說旅情幾於淚痕濕紙矣遣興干戈猶未定弟妹各何之拭淚霑襟血梳頭滿面絲地卑荒野大天逺暮江遲衰疾那能久應無見汝時五六悲慨之言又極沈雄南鄰錦里先生烏角巾園收芋栗不全貧慣看賓客兒童喜得食階除鳥雀馴秋水才深四五尺野航恰受兩三人白沙翠竹江村暮相送柴門月色新申涵光曰秋水才深四五尺野航恰受兩三人語踈落而不酸今人作七律堆砌排耦全無生氣而矯之者又單弱無體裁讀杜諸律可悟不整為整之妙出郭霜露晚凄凄髙天逐望低逺煙鹽井上斜景雪峯西故國猶兵馬他鄉亦鼓鼙江城今夜客還與舊烏啼過南鄰朱山人水亭相近竹參差相過人不知幽花欹滿樹小水細通池歸客村非逺殘樽席更移看君多道氣從此數追隨恨别洛城一別四千里胡騎長驅五六年草木變衰行劔外兵戈阻絶老江邊思家步月清宵立憶弟看雲白日眠聞道河陽近乘勝司徒急為破幽燕老筆空蒼任華所云勢攫虎豹氣騰蛟螭者尺幅中能有其象至於直搗幽燕之舉未嘗無計及者而良謀不用莫奏膚功甫詩蓋屢及之此用兵得失之機足見甫之識略矣若建都荆門甫尤以為非計彼其流離漂泊衣食不暇而關心國事觸緒輒來所謂發乎性止乎忠孝者尋常詞章之士豈能望其項背哉朱鶴齡曰李光弼傳乾元二年冬十月光弼悉軍赴河陽大破賊衆上元元年進圍懷州通鑑上元元年三月光弼破安太清於懷州城下四月又破史思明於河陽西渚寄賀蘭銛朝野歡娛後乾坤震蕩中相隨萬里日總作白頭翁嵗晚仍分袂江邊更轉蓬勿云俱異域飲啄幾回同寄楊五桂州談原注因州參軍段子之任五嶺皆炎熱宜人獨桂林梅花萬里外雪片一冬深聞此寬相憶為邦復好音江邊送孫楚逺附白頭吟王嗣奭曰氣勢流走字句空靈詩之不縛於律者和裴迪登新津寺寄王侍郎原注王時牧蜀何限倚山木吟詩秋葉黃蟬聲集古寺鳥影度寒塘風物悲遊子登臨憶侍郎老夫貪佛日隨意宿僧房建都十二韻蒼生未蘇息胡馬半乾坤議在雲臺上誰扶黃屋尊建都分魏闕下詔闢荆門恐失東人望其如西極存時危當雪恥計大豈輕論雖倚三階正終愁萬國翻牽裾恨不死漏網辱殊恩永負漢庭哭遙憐湘水魂窮冬客江劔隨事有田園風斷青蒲節霜埋翠竹根衣冠空穰穰關輔久昏昏願枉長安日光輝照北原仇兆鰲曰當時房琯分建之䇿與吕諲建都之請前後事勢逈不相同安史首亂時陷中原破兩京剪宗室逼乘輿唐室孤危極矣故分建子弟之議足使賊子膽寒其後長安既復兵勢復張惟河北未平故須專意北向以除禍本若建都荆門虛張國勢迂踈甚矣且東南本無事而勞民動衆恐反生意外之虞此作詩本意也錢箋附㑹兩事致詩意反晦今辨正之和裴迪登蜀州東亭送客逢早梅相憶見寄東閣官梅動詩興還如何遜在揚州此時對雪遙相憶送客逢春可自由幸不折來傷嵗暮若為看去亂鄉愁江邊一樹垂垂發朝夕催人自白頭幽情婉調别有風神黃生曰此詩直而實曲朴而實秀其暗映早梅婉折如意往復盡情筆力橫絶千古楊德周曰必如頷聨方不墮咏物劫王元美以為古今咏梅第一散愁二首久客宜旋斾興王未息戈蜀星隂見少江雨夜聞多百萬傳深入寰區望匪它司徒下燕趙收取舊山河聞道并州鎮尚書訓士齊幾時通薊北當日報關西戀闕丹心破霑衣皓首啼老魂招不得歸路恐長迷王士正曰首篇頸聨不至蜀者不知其確客至原注喜崔明府相過舍南舍北皆春水但見羣鷗日日來花徑不曾緣客掃蓬門今始為君開盤飱市逺無兼味樽酒家貧只舊醅肯與鄰翁相對飲隔籬呼取盡餘杯朱瀚曰首句用在水一方詩意次句用海翁狎鷗故事遣意二首囀枝黃鳥近泛渚白鷗輕一徑野花落孤村春水生衰年催釀黍細雨更移橙漸喜交游絶幽居不用名申涵光曰一徑孤村二語髙岑秀句也簷影微微落津流脉脉斜野船明細火宿雁聚圓沙雲掩初弦月香傳小樹花鄰人有美酒稚子夜能賒浦起龍曰二詩輕圓明秀集中另是一種漫成江臯已仲春花下復清晨仰面貪看鳥回頭錯應人讀書難字過對酒滿壺頻近識峨眉老原注束山隱者知豫懶是真仇兆鰲曰頸聨寫出應接不暇之意朱子引為心不在焉之證亦斷章取義耳春夜喜雨好雨知時節當春乃發生隨風潛入夜潤物細無聲野徑雲俱黑江船火獨明曉看紅濕處花重錦官城近人評此詩云寫得脉脉綿綿於造化發生之機最為密切是已然非有意為之蓋其胸次自然流出而意已潛㑹所謂不涉理路不落言詮者如此若有意效之即訓詁語耳江亭詩亦同此意尤為活潑潑地春水三月桃花浪江流復舊痕朝來沒沙尾碧色動柴門接縷垂芳餌連筒灌小園已添無數鳥爭浴故相喧江亭坦腹江亭暖長吟野望時水流心不競雲在意俱遲寂寂春將晚欣欣物自私故林歸未得排悶强裁詩薛瑄曰水流心不競雲在意俱遲從容自在可以形容有道者之氣象寂寂春將晚欣欣物自私可以形容物各付物之氣象江山如有待花柳更無私唐詩皆不及此氣象村夜蕭蕭風色暮江頭人不行村舂雨外急鄰火夜深明胡羯何多難漁樵寄此生中原有兄弟萬里正含情寫難狀之景如在目前早起春來常早起幽事頗相關帖石防隤岸開林出逺山一丘藏曲折緩步有躋攀童僕來城市瓶中得酒還方回曰杜此等詩乃晚唐之祖千煆百鍊似此者極多尾句別換意亦晚唐所必然者可惜花飛有底急老去願春遲可惜歡娛地都非少壯時寬心應是酒遣興莫過詩此意陶潛解吾生後汝期烈士暮年壯心不已不如次句之有包含落日落日在簾鈎溪邊春事幽芳菲緣岸圃樵爨倚灘舟啅雀爭枝墜飛蟲滿院遊濁醪誰造汝一酌散千憂起語天然工妙謝榛曰五律首句用韻宜突然而起如落日在簾鈎是也寒食寒食江村路風花髙下飛汀煙輕冉冉竹日淨暉暉田父要皆去鄰家閙不違地偏相識盡雞犬亦忘歸浦起龍曰風致何減桃花源遊修覺寺野寺江天豁山扉花竹幽詩應有神助吾得及春遊徑石相縈帶川雲自去留禪枝宿衆鳥漂轉暮歸愁後遊寺憶新遊處橋憐再渡時江山如有待花柳更無私野潤煙光薄沙暄日色遲客愁全為減捨此復何之頷聨忽然而來渾然而就妙處只在眼前題新津北橋樓得郊字望極春城上開筵近鳥巢白花簷外朵青柳檻前梢池水觀為政厨煙覺逺庖西川供客眼唯有此江郊江漲江發蠻夷漲山添雨雪流大聲吹地轉髙浪蹴天浮魚鱉為人得蛟龍不自謀輕帆好去便吾道付滄洲落落寫來極有聲勢他人一經模畫便覺與題不似晚晴村晚驚風度庭幽過雨霑夕陽薰細草江色映疏簾書亂誰能帙杯乾可自添時聞有餘論未怪老夫潛江上值水如海勢聊短述為人性僻耽佳句語不驚人死不休老去詩篇渾漫興春來花鳥莫深愁新添水檻供垂釣故著浮槎替入舟焉得思如陶謝手令渠述作與同遊吕居仁曰陸士衡文賦立片言以居要乃一篇之警策此要論也文章無警䇿則不足以傳世蓋不能竦動世人如杜子美及唐人諸詩無不如此但晉宋間人專致力於此故失於綺靡而無髙古氣味杜詩云語不驚人死不休所謂驚人語即警䇿也野望因過常少仙野橋齊度馬秋望轉悠哉竹覆青城合江從灌口來入村樵徑引嘗果栗皺開落盡髙天日幽人未遣回浦起龍曰逐層引出景事情意俱到奉簡髙三十五使君當代論才子如公復幾人驊騮開道路鷹隼出風塵行色秋將晚交情老更親天涯喜相見披豁對吾真送韓十四江東覲省兵戈不見老萊衣歎息人間萬事非我已無家尋弟妹君今何處訪庭闈黃牛峽靜灘聲轉白馬江寒樹影稀此別應須各努力故鄉猶恐未同歸悲涼雄渾謝膚澤而敦骨力世人穩順聲勢當知大家此等氣格劉㑹孟曰此子美自謂深悲極怨者朱瀚曰氣韻淋漓滿紙猶濕草堂即事荒村建子月獨樹老夫家霧裏江船渡風前徑竹斜寒魚依密藻宿鷺起圓沙蜀酒禁愁得無錢何處賖唐書肅宗紀上元二年以十一月為嵗首月以斗所建辰為名建子月朔上受朝賀如正旦儀王十七侍御掄許携酒至草堂奉寄此詩便請邀髙三十五使君同到老夫卧穩朝慵起白屋寒多暖始開江鸛巧當幽徑浴鄰雞還過短牆來繡衣屢許携家醖皂蓋能忘折野梅戲假霜威促山簡須成一醉習池回朱瀚曰真率如話而矩度謹嚴陪李七司馬皂江上觀造竹橋即日成往來之人免冬寒入水聊題短作簡李公把燭成橋夜回舟坐客時天髙雲去盡江迥月來遲衰謝多扶病招邀屢有期異方乘此興樂罷不無悲贈花卿錦城絲管日紛紛半入江風半入雲此曲秪應天上有人間能得幾回聞絶句獨主風神此則音韻鏗然矣仇兆鰲曰風華流麗頓挫抑揚雖太白少伯無以過之其首句㸃題而下作承轉乃絶句正法也李白蘇臺覽古云舊苑荒臺楊栁新菱歌清唱不勝春只今唯有西江月曾照吳王宫裏人亦然少年行馬上誰家薄媚郎臨階下馬坐人床不通姓字粗豪甚指㸃銀瓶索酒嘗仇兆鰲曰少年意態神情躍躍欲動是善於寫生者慿何十一少府雍覓榿木栽草堂塹西無樹林非子誰復見幽心飽聞榿木三年大與致溪邊十畝隂贈别何雍生死論交地何由見一人悲君隨燕雀薄宦走風塵綿谷元通漢沱江不向秦五陵花滿眼傳語故鄉春起極沈著五六醖藉有味贈別鄭鍊赴襄陽戎馬交馳際柴門老病身把君詩過日念此别驚神地濶峨眉晚天髙峴首春為於耆舊內試覔姓龎人奉和嚴中丞西城晚眺十韻汲黯匡君切亷頗出將頻直詞才不世雄略動如神政簡移風速詩清立意新層城臨暇景絶域望餘春旗尾蛟龍㑹樓頭燕雀馴地平江動蜀天濶樹浮秦帝念深分閫軍須逺算緡花羅封蛟蝶瑞錦送麒麟辭第輸髙義觀圖憶古人征南多興緒事業暗相親仇兆鰲曰杜詩佳句如地卑荒野大天逺暮江遲與地濶峨眉晚天髙峴首春工力相敵若地平江動蜀天濶樹浮秦更是函蓋乾坤嚴中丞枉駕見過原注嚴自東川除西川敕令兩川都節制元戎小隊出郊坰問柳尋花到野亭川合東西瞻使節地分南北任流萍扁舟不獨如張翰皂帽還應似管寧寂寞江天雲霧裏何人道有少微星廣州段功曹到得楊五長史談書功曹却歸聊寄此詩衛青開幕府楊僕將樓船漢節梅花外春城海水邊銅梁書逺及珠浦使將旋貧病他鄉老煩君萬里傳送段功曹歸廣州南海春天外功曹幾月程峽雲籠樹小湖日落船明交趾丹砂重韶州白葛輕幸君因旅客時寄錦官城絶句漫興手種桃李非無主野老牆低還似家恰似春風相欺得夜來吹折數枝花陸游曰白樂天用相字多作思必切如為問長安月如何不相離是也此詩相欺亦當從入聲讀懶慢無堪不出村呼兒日在掩柴門蒼苔濁酒林中靜碧水春風野外昏李東陽曰少陵漫興諸絶句有古竹枝詞意跌宕竒古超出詩人蹊徑韓退之亦有之江畔獨步尋花絶句稠花亂蘂裹江濱行步欹危實怕春詩酒尚堪驅使在未須料理白頭人東望少城花滿煙百花髙樓更可憐誰能載酒開金盞喚取佳人舞繡筵黃師塔前江水東春光懶困倚微風桃花一簇開無主可愛深紅映淺紅黃四娘家花滿蹊千朵萬朵壓枝低留連戲蝶時時舞自在嬌鶯恰恰啼絶句無數春笋滿林生柴門密掩斷人行㑹須上畨看成竹客至從嗔不出迎老杜七言絶句在盛唐中獨創一格論者多所訾議云非正派當由其才力橫絶偶為短韻不免有蟠屈之象正如騏驥驊騮一日千里捕鼠則不如狸狌不足為甫病也然其間無意求工而别有風致不特花卿龜年數首久推絶唱即此諸作何嘗不風調致佳乎讀者故當别具隻眼不為耳食朱鶴齡曰斬新上畨皆唐人方言元詩飛舞先春雪因依上畨梅則上畨不專為竹也獨孤及詩舊日霜毛一畨新亦讀去聲戲為六絶句庾信文章老更成凌雲健筆意縱橫今人嗤㸃流傳賦不覺前賢畏後生庾信傳贊揚子雲有言詩人之賦麗以則詞人之賦麗以淫若以庾氏方之斯又詞賦之罪人也楊王盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流縱使盧王操翰墨劣於漢魏近風騷龍文虎脊皆君馭歷塊過都見爾曹浦起龍曰上抑下揚極有分寸才力應難誇數公凡今誰是出羣雄或看翡翠蘭苕上未掣鯨魚碧海中王洙曰第三詩借盧王反復言之以謂縱使不及漢魏風騷畢竟皆異材也注謂指盧王為爾曹是全失前後語氣數公謂上所指也翡翠蘭苕極絶巧之態不薄今人愛古人清詞麗句必為鄰竊攀屈宋宜方駕恐與齊梁作後塵李因篤曰中原七子大言相髙其病正坐此未及前賢更勿疑遞相祖述復先誰别裁僞體親風雅轉益多師是汝師以詩論文於絶句中又屬創體此元好問論詩絶句之濫觴也六朝四子之文自是天地英華不可磨滅其所成就雖遜古人要非淺薄踈陋之徒所可輕議宜甫之直言訶之也翡翠蘭苕鯨魚碧海所見何其髙濶上親風雅轉益多師解人不當爾耶此六詩固不當以字句工拙計之王嗣奭曰此亦公之自道也公詩祖述三百而旁搜諸家以集其成如楚騷漢魏樂府鐃歌齊梁以來甚多倣效而公獨無之然讀其詩皆三百之嫡派古人之雁行也其所師可知矣如孔子識大識小無不學而賢不賢皆師矣不如是何以謂之集大成哉浦起龍曰後生輕薄附逺而嫚近蓋逺者論定既久不敢置喙至於近人則哆口詆訶以髙自誇詡剽竊古人影響博其談資究於古人所謂師承派别之源流茫乎未有聞也少陵痌焉而作是詩有慨乎言之也鸂鶒故使籠寬織須知動損毛看雲莫悵望失水任呼號六翮曾經剪孤飛卒未髙且無鷹隼慮留滯莫辭勞花鴨花鴨無泥滓階前每緩行羽毛知獨立黑白太分明不覺羣心妬休牽衆眼驚稻粱霑汝在作意莫先鳴顧宸曰鸂鶒遣留滯也花鴨戒多言也此雖詠物實自詠耳畏人早花隨處發春鳥異方啼萬里清江上三年落日低畏人成小築褊性合幽棲門徑從榛草無心走馬蹄逺遊賤子何人記迷方著處家竹風連野色江沫擁春沙種藥扶衰病吟詩解歎嗟似聞胡騎走失喜問京華野望西山白雪三城戍南浦清江萬里橋海內風塵諸弟隔天涯涕淚一身遙唯將遲暮供多病未有涓埃答聖朝跨馬出郊時極目不堪人事日蕭條孫僅所云敻邈髙聳若鑿太虛而噭萬竅此類是已流連光景何足語此朱鶴齡曰按史是時分劔南為兩節度而西山三城列戍百姓罷於調役髙適嘗上疏論之不納公詩當為此作故有人事蕭條之嘆水檻遣心去郭軒楹敞無村眺望賖澄江平少岸幽樹晚多花細雨魚兒出微風燕子斜城中十萬户此地兩三家葉夢得曰詩語忌過巧然緣情體物自有天然之妙如老杜細雨魚兒出微風燕子斜此十字殆無一字虛設細雨著水面為漚魚嘗上浮而淰若大雨則伏而不出矣燕體輕弱風猛則不勝惟微風乃受以為勢故又有輕燕受風斜之句屏跡用拙存吾道幽居近物情桑麻深雨露燕雀半生成村鼓時時急漁舟箇箇輕杖藜從白首心跡喜雙清訏謨定命逺猶辰告謝安石愛之如此頷聫允為雅人深致晚起家何事無營地轉幽竹光團野色舍影漾江流失學從兒懶長貧任婦愁百年渾得醉一月不梳頭洪仲曰末聨以曠達寓悲涼也奉酬嚴公寄題野亭之作拾遺曾奏數行書懶性從來水竹居奉引濫騎沙苑馬幽棲真釣錦江魚謝安不倦登臨費阮籍焉知禮法疏枉沐旌麾出城府草茅無徑欲教鋤仇兆鰲曰嚴詩欵曲殷勤公詩和平委婉解者指嚴為語多譏刺指公為始終傲岸兩失作者之意嚴公仲夏枉駕草堂兼携酒饌得寒字竹裏行厨洗玉盤花邊立馬簇金鞍非關使者徵求急自識將軍禮數寬百年地僻柴門逈五月江深草閣寒看弄漁舟移白日老農何有罄交歡飲真茹强老筆紛披嚴公㕔宴同詠蜀道畫圖得空字日臨公館靜畫滿地圖雄劔閣星橋北松州雪嶺東華夷山不斷吳蜀水相通興與烟霞㑹清樽幸不空直是氣象不同奉送嚴公入朝十韻鼎湖瞻望逺象闕憲章新四海猶多難中原憶舊臣與時安反側自昔有經綸感激張天步從容靜塞塵南圖回羽翮北極捧星辰漏鼓還思晝宫鸚罷囀春空留玉帳術愁殺錦城人閣道通丹地江潭隱白蘋此生那老蜀不死㑹歸秦公若登台輔臨危莫愛身盧世㴶曰氣象規模雅與題稱末復法言忠告令人肅然子美真古人也送嚴侍郎到綿州同登杜使君江樓得心字野興每難盡江樓延賞心歸朝送使節落景惜登臨稍稍烟集渚微微風動襟重船依淺瀨輕鳥度層隂檻峻背幽谷忩虛交茂林燈光散逺近月彩靜髙深城擁朝來客天橫醉後參窮途衰謝意苦調短長吟此㑹共能幾諸孫賢至今不勞朱户閉自待白河沈奉濟驛重送嚴公四韻逺送從此别青山空復情幾時杯重把昨夜月同行列郡謳歌惜三朝出入榮江村獨歸處寂寞飬殘生一往情深足見嚴杜交誼九日奉寄嚴大夫九日應愁思經時冒險難不眠持漢節何路出巴山小驛香醪嫩重巖細菊斑遙知簇鞍馬回首白雲間蔡夢弼曰公九日在梓登臨時嚴武還朝尚在蜀棧道中也王嗣奭曰通篇不說憶嚴只寫其客行之景與思已之情正是深於憶者黃草黃草峽西船不歸赤甲山下行人稀秦中驛使無消息蜀道兵戈有是非萬里秋風吹錦水誰家別淚濕羅衣莫愁劔閣終堪據聞道松州已被圍氣格蒼健五六乃如老樹著花必求其事以實之徒增紛紛懷舊地下蘇司業情親獨有君那因喪亂後便有死生分老罷知明鏡悲來望白雲自從失詞伯不復更論文所思原注得台州鄭司户䖍消息鄭老身仍竄台州信始傳為農山澗曲卧病海雲邊世已疏儒素人猶乞酒錢徒勞望牛斗無計斸龍泉不見原注近無李白消息不見李生久佯狂真可哀世人皆欲殺吾意獨憐才敏捷詩千首飄零酒一杯匡山讀書處頭白好歸來三詩真朴若自胸臆流出所謂文生於情不求工而自至題𤣥武禪師屋壁何年顧虎頭滿壁畫滄洲赤日石林氣青天江海流錫飛常近鶴杯度不驚鷗似得廬山路真隨惠遠遊黃生曰三四本極竒險看似尋常以竒在立意而句法渾融也客夜客睡何曾著秋天不肯明卷簾殘月影髙枕逺江聲計拙無衣食途窮仗友生老妻書數紙應悉未歸情王嗣奭曰何曾不肯四字愁懷畢露所謂愁人知夜長也客亭秋忩猶曙色落木更天風日出寒山外江流宿霧中聖朝無棄物老病已成翁多少殘生事飄零似轉蓬野望金華山南涪水西仲冬風日始凄凄山連越嶲蟠三蜀水散巴渝下五溪獨鶴不知何事舞飢烏似欲向人啼射洪春酒寒仍緑目極傷神誰為攜壯士拂劍浩然彌哀五六情雖間入氣自孤行此殆非人力可幾張溍曰三四自然壯麗七子之祖聞官軍收河南河北劔外忽傳收薊北初聞涕淚滿衣裳却看妻子愁何在漫卷詩書喜欲狂白首放歌須縱酒青春作伴好還鄉即從巴峽穿巫峽便下襄陽向洛陽原注余田園在東京驚喜溢於字句之外故其為詩一氣呵成法極無迹末聨撒手空行如懶殘履衡嶽之石旋轉而下非有伯昏瞀人之氣者不能也王嗣奭曰一氣流注而曲折盡情絶無粧㸃愈朴愈真他人決不能道浦起龍曰八句其疾如飛題事只一句餘俱寫情神理妙在逼真杜老生平第一首快詩唐書寶應元年冬官軍進克東都河南平次年正月史朝義死於廣陽李懷仙斬其首以獻河北平御選唐宋詩醇卷十五
