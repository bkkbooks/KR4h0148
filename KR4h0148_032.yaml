front:
  text: 欽定四庫全書御選唐宋詩醇卷十五
  hash: sha256:2b8380f4a0786fcc9d6af4c9a405205af175a8e826aca86a77450e5ece76e391
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_032-1a, image: WYG1448/WYG1448-0328a.png}
body:
  text: 襄陽杜甫詩七目録蜀相卜居梅雨為農有客狂夫堂成西郊所思野老遣興南鄰出郭過南鄰朱山人水亭恨別寄賀蘭銛寄楊五桂州談和裴迪登新津寺寄王侍郎建都十二韻和裴迪登蜀州東亭送客逢早梅相憶見寄散愁二首客至遣意二首漫成春夜喜雨春水江亭村夜早起可惜落日寒食逰修覺寺後逰題新津北橋樓江漲晚晴江上值水如海勢聊短述野望因過常少仙奉簡髙三十五使君送韓十四江東覲省草堂即事王十七侍御掄許携酒至草堂奉寄此詩便請邀髙三十五使君同到陪李七司馬皂江上觀造竹橋即日成往來之人免冬寒入水聊題短作簡李公贈花卿少年行慿何十一少府雍覔榿木栽贈别何雍贈別鄭鍊赴襄陽奉和嚴中丞西城晚眺十韻嚴中丞枉駕見過廣州段功曹到得楊五長史談書功曹却歸聊寄此詩送段功曹歸廣州絶句漫興江畔獨步尋花絶句絶句戲為六絶句鸂鶒花鴨畏人逺逰野望水檻遣心屏跡奉酬嚴公寄題野亭之作嚴公仲夏枉駕草堂兼携酒饌嚴公㕔宴同詠蜀道畫圖奉送嚴公入朝十韻送嚴侍郎到綿州同登杜使君江樓奉濟驛重送嚴公四韻九日奉寄嚴大夫黃草懷舊所思不見題元武禪師屋壁客夜客亭野望聞官軍收河南河北
  hash: sha256:ed44aa951f20835a01c7005dd6fafbef48aa4297b38c0890bf15ae42508763ab
