front:
  text: 欽定四庫全書御選唐宋詩醇卷三十三
  hash: sha256:8f01f0a99221e72f4f04fafc873cb5967c53b854ef8a6ef1a0e0a8a6286f508e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_068-1a, image: WYG1448/WYG1448-0625a.png}
body:
  text: 眉山蘇軾詩二目録十月二日將至渦口五里所遇風留宿出潁口初見淮山是日至壽州壽陽岸下泗州僧伽塔龜山十月十六日記所見遊金山寺自金山放船至焦山甘露寺臘日遊孤山訪惠勤惠思二僧戲子由越州張中舍壽樂堂雨中遊天竺靈感觀音院六月二十七日望湖樓醉書五首録三首七月一日出城舟中苦熱宿臨安淨土寺自淨土步至功臣寺遊徑山夜泛西湖五絶監試呈諸試官望海樓晚景五絶録三首試院煎茶孫莘老求墨妙亭詩催試官考較戲作秋懷二首梵天寺見僧守詮小詩清逺可愛次韻次韻孔文仲推官見贈湯村開運鹽河雨中督役是日宿水陸寺寄北山清順僧二首録一首朱壽昌郎中少不知母所在刺血寫經求之五十年去嵗得之蜀中以詩賀之和致仕張郎中春晝畫魚歌遊道場山何山贈孫莘老七絶録三首王復秀才所居雙檜二首録一首法惠寺橫翠閣風水洞二首和節推録一首自普照遊二菴新城道中二首録一首於潛女僧清順新作垂雲亭㑹客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服
