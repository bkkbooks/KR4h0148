  text: 欽定四庫全書御選唐宋詩醇卷三十五
  hash: sha256:9392319f176a5bd7dba76bd9cc037c2871982d7b97ef332b2ebf488c3ebed4dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_072-1a, image: WYG1448/WYG1448-0671a.png}
body:
  text: 眉山蘇軾詩四目録除夜大雪留濰州元日早晴遂行中途雪復作送范景仁遊洛中次韻景仁留别書韓幹牧馬圖送魯元翰少卿知衛州和李邦直沂山祈雨有應東欄梨花次韻答邦直子由四首録二首司馬君實獨樂園子由將赴南都與余會宿於逍遙堂作兩絶句讀之殆不可為懷因和其詩以自解余觀子由自少曠達天資近道又得至人飬生長年之訣而余亦竊聞其一二以為今者宦遊相别之日淺而異時退休相從之日長既以自解且以慰子由云過雲龍山人張天驥初别子由河復黃河韓幹馬十四匹贈寫御容妙善師哭刁景純答吕梁仲屯田張寺丞益齋送李公恕赴闕虔州八境圖八首録六首讀孟郊詩二首與梁左藏會飲傅國博家續麗人行起伏龍行次韻答劉涇聞辨才法師復歸上天竺以詩戲問僕曩於長安陳漢卿家見吳道子畫佛碎爛可惜其後十餘年復見之於鮮于子駿家則己裝背完好子駿以見遺作詩謝之雨中過舒教授次韻答舒教授觀余所藏墨答仲屯田次韻芙蓉城和鮮于子駿鄆州新堂月夜二首中秋月三首中秋見月寄子由與頓起孫勉泛舟探韻得未字
  hash: sha256:3065a0085168afe019210b8c79eb83bd4760ef5d42fe6c0b491beb91de20986d
