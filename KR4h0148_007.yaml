front:
  text: 欽定四庫全書御選唐宋詩醇卷二
  hash: sha256:48d6bce5ed86935e9d629f9effc6ee462fcacff883b5cb36fe3cdfe5939cc943
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_007-1a, image: WYG1448/WYG1448-0100c.png}
body:
  text: 隴西李白詩二逺别離逺别離古有皇英之二女乃在洞庭之南瀟湘之浦海水直下萬里深誰人不言此離苦日慘慘兮雲冥冥猩猩啼煙兮鬼嘯雨我縱言之將何補皇穹竊恐不照余之忠誠雷慿慿兮欲吼怒堯舜當之亦禪禹君失臣兮龍為魚權歸臣兮鼠變虎或言堯幽囚舜野死九疑聯綿皆相似重瞳孤墳竟何是帝子泣兮緑雲間隨風波兮去無還慟哭兮逺望見蒼梧之深山蒼梧山崩湘水絶竹上之淚乃可滅此憂天寶之將亂欲抒其忠誠而不可得也日者君象雲盛則蔽其明啼煙嘯雨陰晦之象甚矣詩云薈兮蔚兮南山朝隮小人之勢至於如此政事尚可問乎屈平曰理弱而媒拙兮恐導言之不固又曰閨中既邃逺兮哲王又不寤白以見疏之人欲言何補而忠誠不懈如此此立言之本指龍魚虎鼠之喻亦本楚詞及說苑兼用客難中語比類陳詞可謂深切著明者矣蕭士贇曰太白熟識時病欲言則懼禍及已不得已而形之詩章聊以致其愛君憂國之志而己楊載曰波瀾開闔如江海之波一波未平一波復起又如兵家之陳方以為正又復為竒方以為竒忽復是正出入變化不可紀極劉辰翁曰參差曲屈幽人鬼語而動蕩自然無長吉之苦髙柄曰此太白傷時君子失位小人用事以致喪亂身在江湖之上欲往救而不可哀忠諫之無從舒憤疾而作也李東陽曰古律詩各有音節然皆限於字數求之不難樂府長短句最難調叠然亦有自然之節如太白逺别離子美桃竹杖皆極其操縱曷嘗按古人聲調而自和順委曲沈德潛曰中有欲言不可明言處故托弔古以抒之屈折反覆離騷之㫖郭茂倩曰楚詞云悲莫悲兮生别離古詩云行行重行行與君生别離李陵與蘇武詩云良時不可再别離在須臾故後人擬之為古别離梁簡文又為生别離宋吳邁逺有長别離李白有逺别離亦皆類此蜀道難噫吁戲危乎髙哉蜀道之難難於上靑天蠶叢及魚鳬開國何茫然爾來四萬八千歲不與秦塞通人煙西當太白有鳥道可以橫絶峨眉巔地崩山摧壯士死然後天梯石棧相鉤連上有六龍回日之髙標下有衝波逆折之回川黃鶴之飛尚不得過猿猱欲度愁攀援青泥何盤盤百步九折縈巖巒捫參歷井仰脅息以手撫膺坐長歎問君西遊何時還畏途巉巖不可攀但見悲烏號古木雄飛雌從繞林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峯去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗砯崖轉石萬壑雷其險也如此嗟爾逺道之人胡為乎來哉劍閣峥嶸而崔嵬一夫當關萬夫莫開所守或非親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨嗟解此詩者幾如聚訟惟蕭士贇謂為祿山亂華天子幸蜀而作者得之蓋其詩筆勢竒崛詞㫖隱躍往往求之不得則妄為之說若析而論之亦自瞭然可覩題本古樂府非白所創即以蜀道之難二語為通篇節奏蠶叢及魚鳬至以手撫膺坐長歎極言山川道途之險以還題意而其非尋常遊幸之地已見言外與下文神相貫注問君西遊何時還正指幸蜀事蕭士贇曰君字非泛然而言猶杜甫北征詩恐君有遺失及君誠中興主之義所謂君者明皇也其說是也當日倉皇西幸扈從蕭條棧道﨑嶇霖鈴悲感烏號鵑啼寫出凄凉之狀故曰使人聽此凋朱顔此為明皇悲也以下重寫難字而以其險也如此三句束之逺道之人蓋指從者而言故承以劍閣峥嶸六句楚蒍賈云我能往寇亦能往蜀之險不必可恃故為危之之詞以致其忠愛之意若如諸說所云為守蜀者發於義為不倫矣朝避猛虎六句直言避亂而祝其早還通篇結穴在此結語收得住有無限遙情若徒賞其文章之竒而不審其深情逺意未為知白者也胡震亨謂其海說事理故包括大而有合樂府諷世立教本㫖蓋亦窮於解矣劉辰翁曰妙在起伏其才思放肆語次崛竒自不必言桂臨川曰蜀道難全為元宗幸蜀而作至於一夫當關云云為元宗慮深逺矣詞㫖幽深雄渾飄逸歐陽子以廬山髙方之殊為可哂趙執信曰原本楚騷集中格調相類者多是為此體之祖沈德潛曰筆陳縱橫如虯飛蠖動起雷霆於指顧之間任華盧同輩仿之適得其怪耳太白所以為仙才也錦城雖云樂不如早還家是其主意王僧䖍技録有蜀道難行吳競樂府解題曰蜀道難備言銅梁玉壘之阻與蜀國弦頗同洪芻曰新唐書嚴武傳曰武在蜀放肆房琯以故宰相為部內刺史武踞慢不為禮最厚杜甫然欲殺甫數矣李白作蜀道難乃為房與杜危之也新唐書據范攄雲溪友議言之耳按托言載李白至京以所業贄謁賀知章知章覽蜀道難一篇曰子謫仙人也白本傳天寶初因吳筠被召亦至長安時往見賀知章則與嚴武帥蜀歲月懸逺嘗見李集一本於蜀道難題下注諷章仇兼瓊也考其年月近之矣謂危房杜者非也新唐書苐弗深考耳沈括曰前史稱嚴武為劍南節度不法李白為作蜀道難按孟棨所記白初至京師賀知章聞名首詣之白出蜀道難時乃天寶初也嚴武為劍南乃在至德以後肅宗時年代甚逺蓋小說所記率多舛訛蕭士贇曰所謂嘗見李集一本於蜀道難下注諷章仇兼瓊者黃魯直嘗於宜州為周惟深作草書蜀道難亦於題下注云諷章仇兼瓊也然天寶初天下乂安四郊無警劍閣乃長安入蜀之道太白非狂者乃拳拳然欲其嚴劍閣之守不知將何所拒乎以此知其不為章仇兼瓊也梁甫吟長嘯梁甫吟何時見陽春君不見朝歌屠叟辭棘津八十西來釣渭濱寧羞白髮照清水逢時吐氣思經綸廣張三千六百釣風期暗與文王親大賢虎變愚不測當年頗似尋常人君不見髙陽酒徒起草中長揖山東隆準公入門不拜騁雄辨兩女輟洗來趨風東下齊城七十二指揮楚漢如旋蓬狂客落魄尚如此何况壯士當羣雄我欲攀龍見明主雷公砰訇震天鼓帝傍投壺多玉女三時大笑開電光倐爍晦冥起風雨閶闔九門不可通以額扣關閽者怒白日不照吾精誠杞國無事憂天傾猰㺄磨牙競人肉騶虞不折生草莖手接飛猱搏雕虎側足焦原未言苦智者可卷愚者豪世人見我輕鴻毛力排南山三壯士齊相殺之費二桃吳楚弄兵無劇孟亞夫咍爾為徒勞梁甫吟梁甫吟聲正悲張公兩龍劍神物合有時風雲感㑹起屠釣大人􅒈屼當安之此詩當亦遭讒被放後作與屈平眷眷楚國同一精誠三千六百釣迄無定論按說苑云吕望年七十釣於渭渚孔叢子云太公勤身苦志八十而遇文王以百年三萬六千場計之七十至八十約三千六百釣也或又以八十始釣九十始遇為十年殆未知楚辭所云太公九十乃顯榮蓋指封國時言也沈德潛曰太白以氣勝故拉雜使事而不見其迹若不善學之恐意氣粗豪雜出不倫矣作詩不可不防其漸古今樂録曰王僧䖍技録相和歌楚調五曲內有梁甫吟行始於諸葛亮沈德潛曰三千六百釣或言地有三千六百軸太公合天下而釣之得與文王相遇也烏夜啼黃雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔窗語停梭悵然憶逺人獨宿空房淚如雨語淺意深樂府本色劉辰翁曰語有深於此者然情之所至皆不如此則亦不必深也凡言樂府者未足以知此吳昌祺曰含藴無窮音節絶妙古今樂録曰烏夜啼者清商曲也乃周房中樂之遺聲江左所謂梁宋新聲也其詞始於宋臨川王義慶宋元嘉中從彭城王義康於豫章郡義慶時為江州相見而哭文帝聞而怪之召還宅義慶大懼妓妾聞烏夜啼叩齊閣云明日應有赦及旦改南兖州刺史因作此歌其詞云蘢葱窗不開烏夜啼夜夜望郎來蓋咏其妾也李勉琴說曰烏夜啼何晏之女所造與此義同而事異烏棲曲姑蘇臺上烏棲時吳王宫裏醉西施吳歌楚舞歡未畢青山欲銜半邊日銀箭金壺漏水多起看秋月墜江波東方漸髙奈樂何樂極悲生之意寫得微婉荒宴未幾而麋鹿游於姑蘇矣全不說破可謂興寄深微者胡應麟以杜之七哀雋永深厚法律森然謂此篇斤兩稍輕咏歎不足真意為謗傷未足與議也末綴一單句有不盡之妙賀知章曰此詩可以泣鬼神范杼曰此篇與烏夜啼可謂精金粹玉蕭士贇曰深得國風刺詩之體盛言其美而不美者自見樂録鳥獸二十一曲之一戰城南去年戰桑乾源今年戰蔥河道洗兵條支海上波放馬天山雪中草萬里長征戰三軍盡衰老丐奴以殺戮為耕作古來惟見白骨黃沙田秦家築城避胡處漢家還有烽火然烽火然不息征戰無已時野戰格鬬死敗馬號嗚向天悲烏鳶啄人腸銜飛上挂枯樹枝士卒塗草莽將軍空爾為乃知兵者是凶器聖人不得己而用之古詞云戰城南死郭北野死不葬烏可食又云願為忠臣安可得白詩亦本其意而語尤慘痛意更切至所以刺黷武而戒窮兵者深矣蕭士贇曰開元天寶中上好邊功征伐無時此詩蓋有所諷也沈德潛曰胸奴二句可謂竒語末本莊語却以搖曳出之古今樂録曰戰城南漢鼓吹鐃歌十八曲之六行行且游獵篇邊城兒生年不讀一字書但將遊獵誇輕趫胡馬秋肥宜白草騎來躡影何矜驕金鞭拂雪揮鳴鞘半酣呼鷹出逺郊弓彎滿月不虛發雙鶬迸落連飛髇海邊觀者皆辟易猛氣英風振沙磧儒生不及遊俠人白首下帷復何益揆文教奮武衛二者不可偏廢此白憤時有激而作蓋天寶以後益好邊功武士得志亦世道之憂也樂府解題曰梁劉孝威遊獵篇備言遊行射獵之事亦謂之行行且遊獵篇飛龍引鼎湖流水清且閒軒轅去時有弓劍古人傳道留其間後宫嬋娟多花顔乘鸞飛煙亦不還騎龍攀天造天關造天關聞天語長雲河車載玉女載玉女過紫皇紫皇乃賜白兔所搗之藥方後天而老凋三光下視瑶池見王母蛾眉蕭颯如秋霜一結從大人賦翻出仙者後天而老乃蛾眉蕭颯如許則不老者且先凋矣諷意微而顯蕭士贇曰飛龍引者古樂府魚龍六曲之一行路難金樽清酒斗十千玉盤珍羞值萬錢停杯投筯不能食拔劍四顧心茫然欲渡黃河氷塞川將登太行雪滿山閒來垂釣碧溪上忽復乘舟夢日邊行路難行路難多岐路今安在長風破浪㑹有時直挂雲帆濟滄海氷塞雪滿道路之難甚矣而日邊有夢破浪濟海尚未决志於去也後有二篇則畏其難而决去矣此蓋被放之初述懷如此真寫得難字意出劉辰翁曰結得不至鼠尾甚善郭茂倩曰樂府解題云行路難備言世路艱難及離别悲傷之意多以君不見為首按陳武别傳曰武常牧羊諸家牧豎有知歌謡者武遂學行路難則所起亦逺矣長相思長相思在長安絡緯秋啼金井闌微霜淒淒簟色寒孤燈不明思欲絶卷帷望月空長嘆美人如花隔雲端上有青冥之長天下有渌水之波瀾天長路逺魂飛苦夢魂不到關山難長相思摧心肝絡緯秋啼時將晚矣曹植云盛年處房室中夜起長嘆其寓興則同然植意以禮義自守此則不勝淪落之感衛風曰云誰之思西方美人楚辭曰恐美人之遲暮賢者窮於不遇而不敢忘君斯忠厚之㫖也辭清意婉妙於言情梅鼎祚曰綴景幽絶如泣如訴怨而不誹郭茂倩曰古詩云客從逺方來遺我一書札上言長相思下言久别離長者久逺之辭言行人久戍寄書以遺所思也又曰客從逺方來遺我一端綺文綵雙鴛鴦裁為合歡被著以長相思緣以結不解謂被中著綿以致相思絲綿之意故曰長相思也又有千里思與此相類上留田行行至上留田孤墳何崢嶸積此萬古恨春草不復生悲風四邊來腸斷白楊聲借問誰家地埋沒蒿里塋古老向余言言是上留田蓬科馬鬛今巳平昔之弟死兄不葬他人於此舉銘旌一鳥死百鳥鳴一獸走百獸驚桓山之禽别離苦欲去回翔不能征田氏倉卒骨肉分靑天白日摧紫荆交柯之木本同形東枝憔悴西枝榮無心之物尚如此參商胡乃尋天兵孤竹延陵讓國揚名髙風緬邈頽波激清尺布之謡塞耳不能聽蕭士贇說得之白之從璘雖曰迫脅亦其倜儻自負欲藉以就功名故也詞氣激切若有不平之感如謝靈運所云道消結憤悶者桓山之禽蓋白自比也胡應麟詩藪稱其公無渡河篇波滔天堯咨嗟大禹湮百川兒啼不窺家其害乃去茫然風沙等語為極力摹漢似此情質詞古何遽不如漢也蕭士贇曰孤竹延陵數句非泛然之作以唐史至德間事考之其為李成式輩以謀激永王璘之反而執殺之太白目擊其事故作是詩與沈德潛曰末一段促節繁音如聞樂章之亂王僧䖍技録瑟調曲之一崔豹古今注上留田地名也其地有不字其孤弟者鄰人作悲歌以風其兄故有此曲前有一樽酒行春風東來忽相過金樽淥酒生微波落花紛紛稍覺多美人欲醉朱顔酡靑軒桃李能幾何流光欺人忽蹉跎君起舞日西夕當年意氣不肯平白髮如絲嘆何益即白所云浮生若夢為歡幾何之意寫來偏自細致不是一味豪放又不是齊梁卑靡之音故妙樂府觴酌十曲之一夜坐吟冬夜夜寒覺夜長沉吟久坐坐北堂氷合井泉月入閨金缸青凝照悲啼金缸滅啼轉多掩妾淚聽君歌歌有聲妾有情情聲合兩無違一語不入意從君萬曲梁塵飛空谷幽泉琴聲斷續恩怨爾汝呢呢如聞景細情真結語從鮑照詩翻案而出蕭士贇曰前有一樽酒行夜坐吟三篇鮑照樂府白紵詞體也鮑詩云萬曲不關心一曲動情多欲知情厚薄更聽此聲過談元春曰似鮑參軍體聽君歌逐君音不貴聲貴意深而以一語不入二句露出爽俊之致微有别耳郭茂倩曰夜坐吟鮑照所作也其詞曰冬夜沉沉夜坐吟言聽歌逐音因音託意也野田黃雀行遊莫逐炎洲翠棲莫近吳宫燕吳宫火起焚巢窠炎洲逐翠遭網羅蕭條兩翅蓬蒿下縱有鷹鸇奈若何黯然自傷當在潯陽既敗之後胡震亨云不參按白身世遘遇之概不知其因事傅題借題抒情之本指最為有見故頌詩者必貴於論世也古今樂録曰王僧䖍技録有野田黃雀行晉樂奏東阿王置酒髙殿上一篇箜篌謡攀天莫登龍走山莫騎虎貴賤結交心不移唯有嚴陵及光武周公稱大聖管蔡寧相容漢謡一斗粟不與淮南舂兄弟尚路人吾心安所從他人方寸間山海幾千重輕言託朋友對靣九疑峯開花必早落桃李不如松管鮑久己死何人繼其蹤白之受知明皇禮遇殊絶當時王公貴人交遊亦衆潯陽既敗莫為省記故以嚴陵光武及管鮑為比言管蔡者事之緣起如此也卒之為白納官贖罪者郭子儀也亦可以無憾矣蕭士贇曰琴操五十七曲九引內有箜篌引亦曰公無渡河亦曰箜篌謡夷則格上白鳩拂舞辭鏗鳴鐘考朗鼓歌白鳩引拂舞白鳩之白誰與鄰霜衣雪襟誠可珍含哺七子能平均食不噎性安馴首農政鳴陽春天子刻玉杖鏤形賜耆人白鷺之白非純真外潔其色心匪仁闕五德無司晨胡為啄我葭下之紫鱗鷹鸇鵰鶚貪而好殺鳯凰雖大聖不願以為臣詩妙比興茍無關風義不作可也蓋自李林甫用而聚斂之臣進嚴酷之吏多此詩所以刺也詞之古奧超魏入漢王世貞乃謂李白樂府出入齊梁非篤論也鍾惺曰似刺當時羅織諸獄吏寫出疾惡去殘之意說得有體楊齊賢曰唐禮樂志曰白鳩吳拂舞曲也蕭士贇曰拂舞歌五曲有白鳩篇亦曰白鳬舞以其歌且舞也亦入清商曲按晉楊泓舞序云自到江南見白符舞符即鳬也白鳬舞即白鳩舞也白鳬之辭出於吳拂舞五篇並晉人採集亡國所作惟白鳬不用吳舊歌而更作之命曰白鳩篇古今樂録曰鞞鐸巾拂四舞梁並夷則格鐘磬鳩拂和故白擬其詞日出行日出東方隈似從地底來歷天又入海六龍所舍安在哉其始與終古不息人非元氣安得與之久裴徊草不謝榮於春風木不怨落於秋天誰揮鞭策驅四運萬物興歇皆自然羲和羲和汝奚汨沒於荒淫之波魯陽何德駐景揮戈逆道違天矯誣實多吾將囊括大塊浩然與溟涬同科易曰原始反終故知死生之說不知自然之運而意於長生久視者妄也詩意似為求仙者發故前云人非元氣安得與之久裴徊後云魯陽揮戈矯誣實多而結以與溟涬同科言不如委順造化也若謂寫時行物生之妙作理學語亦索然無味矣觀此益知白之學仙蓋有所託而然也樂府日出行者時景二十一曲之一北風行燭龍棲寒門光曜猶旦開日月照之何不及此唯有北風號怒天上來燕山雪花大如席片片吹落軒轅臺幽州思婦十二月停歌罷笑雙蛾摧倚門望行人念君長城苦寒良可哀别時提劍救邊去遺此虎紋金鞞靫中有一雙白羽箭蜘蛛結網生塵埃箭空在人今戰死不復回不忍見此物焚之巳成灰黃河捧土尚可塞北風雨雪恨難裁悲歌激楚唐汝詢曰此為戍婦之辭以諷也郭茂倩曰北風衛詩也傳曰北風寒凉病害萬物若鮑照北風凉李白燭龍棲寒門皆傷北風雨雪而行人不歸與衛詩異矣淮南子燭龍在雁門北蔽於委羽之山不見日又曰八紘之外有八極北極之山曰寒門山海經西有王母之山有軒轅之臺陳子昻詩北登薊丘望求古軒轅臺御選唐宋詩醇卷二
