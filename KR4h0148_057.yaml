  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_057-1a, image: WYG1448/WYG1448-0534c.png}
body:
  text: 昌黎韓愈詩一韓愈文起八代之衰而其詩亦卓絶千古論者常以文掩其詩甚或謂于詩本無解處夫唐人以詩名家者多以文名家者少謂韓文重于韓詩可也直斥其詩為不工則羣兒之愚也大抵議韓詩者謂詩自有體此押韻之文格不近詩又豪放有餘深婉不足常苦意與語俱盡蓋自劉攽沈括時有異同而黃魯直陳師道輩遂羣相訾謷歷宋元明異論間出此實昧于昌黎得力之所在未嘗沿波以討其源則真不辨詩體者也夫六義肇興體裁斯别言簡而意該節短而韻長含吐抑揚雖重復其詞而彌有不盡之味此風人之旨也至于二雅三頌鋪陳終始竭情盡致義存乎揚厲而不病其夸情迫于呼號而不嫌其激其為體迥異于風非特詞有繁簡其意之隱顯固殊焉千古以來寧有以少含蓄為雅頌之病者乎然則唐詩如王孟一派源出于風而愈則本之雅頌以大暢厥辭者也其生平論詩專主李杜而于治水之航磨天之刃慷慨追慕誠欲效其震蕩乾坤陵暴萬類而後得盡吐其竒傑之氣其視清微淡逺雅詠溫恭殊不足以盡吾才然偶一為之餘力亦足以相及如琴操及南溪諸作具在特性所不近不多作耳而仰攻者顧執多少之數以判優絀之數乎擬桃源為樂土而輒謂洪河太華之駴人求仙佛之玄虛而反以聖賢經天緯地為多事此其説固不待智者而決也今試取韓詩讀之其壯浪縱恣擺去拘束誠不減于李其渾涵汪茫千彚萬狀誠不減于杜而風骨崚嶒腕力矯變得李杜之神而不襲其貌則又拔竒于二子之外而自成一家夫詩至足與李杜鼎立而論定猶有待于千載之後甚矣詩道之難言也然元稹固嘗推杜而抑李歐陽修又主退之不主子美李杜已然在愈故應不免彼自鳴自息者又烏足與深辨哉兹集所登為古詩者什八為律詩者什二蓋愈詩偏以古勝此自有定論也聨句之盛前此未有以非一人所得專美姑置不録若夫集外遺詩如嘲鼾睡辭唱歌淺俚醜惡假託無疑直應削去而不容列諸集中者也元和聖德詩并序臣愈頓首再拜言臣伏見皇帝陛下即位以來誅流姦臣朝廷清明無有欺蔽外斬楊惠琳劉闢以收夏蜀東定青徐積年之叛海內怖駭不敢違越郊天告廟神靈歡喜風雨晦明無不從順太平之期適當今日臣蒙被恩澤日與羣臣序立紫宸殿陛下親望穆穆之光而其職業又在以經籍教導國子誠宜率先作歌詩以稱道盛德不可以辭語淺薄不足以自效為解輒依古作四言元和聖德詩一篇凡千有二十四字指事實録具載明天子文武神聖以警動百姓耳目傳示無極其詩曰皇帝即阼物無違拒曰暘而暘曰雨而雨維是元年有盜在夏欲覆其州以踵近武皇帝曰嘻豈不在我負鄙為艱縱則不可出師征之其衆十旅軍其城下告以福禍腹敗枝披不敢保聚擲首陴外降幡夜竪疆外之險莫過蜀土韋臯去鎮劉闢守後血人于牙不肯吐口開庫啖士曰隨所取汝張汝弓汝鼓汝鼓汝為表書求我帥汝事始上聞在列咸怒皇帝曰然嗟逺士女茍附而安則且付與讀命于庭出節少府朝發京師夕至其部闢喜謂黨汝振而伍蜀可全有此不當受萬牛臠炙萬甕行酒以錦纒股以紅帕首有恇其凶有餌其誘其出穰穰隊以萬數遂劫東川遂據城阻皇帝曰嗟其又可許爰命崇文分卒禁禦有安其驅無暴我野日行三十徐壁其右闢黨聚謀鹿頭是守崇文奉詔進退規矩戰不貪殺擒不濫數四方節度整兵頓馬上章請討俟命起坐皇帝曰嘻無汝煩苦荆并洎梁在國門户出師三千各選爾醜四軍齊作殷其如阜或拔其角或脫其距長驅洋洋無有齟齬八月壬午闢棄城走載妻與妾包裹稚乳是日崇文入處其宇分散逐捕搜原剔藪闢窮見窘無地自處俯視大江不見洲渚遂自顛倒若杵投臼取之江中枷脰械手婦女纍纍啼哭拜叩來獻闕下以告廟社周示城市咸使觀覩解脫攣索夾以砧斧婉婉弱子赤立傴僂牽頭曳足先斷腰膂次及其徒體骸撑拄末乃取闢駭汗如寫揮刀紛紜爭刌膾脯優賞將吏扶圭綴組帛堆其家粟塞其庾哀憐陳歿廪給孤寡贈官封墓周匝宏溥經戰伐地寬免租簿施令酬功急疾如火天地中間莫不順序幽恆青魏東盡海浦南至徐蔡區外雜虜怛威赧德踧踖蹈舞掉棄兵革私習簋簠來請來覲十百其耦皇帝曰吁伯父叔舅各安爾位訓厥氓畝正月元日初見宗祖躬執百禮登降拜俯薦于新宫視瞻梁梠戚見容色淚落入俎侍祠之臣助我惻楚乃以上辛于郊用牡除于國南鱗筍毛簴廬幕周施開揭磊砢獸盾騰拿圎壇帖妥天兵四羅旗常妸娜駕龍十二魚魚雅雅宵升于丘奠璧獻斚衆樂驚作轟豗融冶紫焰噓呵髙靈下墮羣星從坐錯落侈哆日君月妃煥赫婐𡛖瀆鬼濛鴻嶽祇嶪峩飫沃羶薌産祥降嘏鳯皇應奏舒翼自拊赤麟黃龍逶陀結紏卿士庶人黃童白叟踴躍歡呼失喜噎歐乾清坤夷境落褰舉帝車回來日正當午幸丹鳯門大赦天下滌濯剗磢磨滅瑕垢續功臣嗣拔賢任耉孩養無告仁滂施厚皇帝神聖通達今古聽聰視明一似堯禹生知法式動得理所天錫皇帝為天下主并包畜養無異細巨億載萬年敢有違者皇帝儉勤盥濯陶瓦斥遣浮華好此綈紵敕戒四方侈則有咎天錫皇帝多麥與黍無召水旱耗于雀鼠億載萬年有富無窶皇帝正直别白善否擅命而狂既翦既去盡逐羣姦靡有遺侣天錫皇帝厖臣碩輔博問遐觀以置左右億載萬年無敢余侮皇帝大孝慈祥悌友怡怡愈愈奉太皇后浹于族親濡及九有天錫皇帝與天齊壽登兹太平無怠永久億載萬年為父為母博士臣愈職是訓詰作為歌詩以配吉甫典雅處似毛詩質峭處似秦碑華潤處似文選然通體質峭居多首尾頌揚亦彌與秦碑為近誅闢一段借以悚動藩鎮前人論之詳矣至幽恆青魏一段寫諸道震懾而朝廷慰安鎮撫得體有威尤是最著意處穆修曰退之元和聖德詩淮西碑栁雅章之類皆辭嚴義偉制作如經能崒然聳唐德于盛漢之表筆墨間録曰此序乃司馬遷之文非相如文也張栻曰誦退之聖德頌至婉婉弱子赤立傴僂牽頭曳足先斷腰膂處世榮舉子由之説曰此李斯頌秦所不忍言而退之自謂無愧于風雅何其陋也此説如何曰退之筆力髙得斬截處即斬截他豈不知此所以為此言者必有説蓋欲使藩鎮聞之畏罪懼禍不敢叛耳今人讀之至此猶且寒心况當時藩鎮乎此正是合于風雅處只如牆有茨桑中諸詩或以為不必載而龜山乃曰此衛為夷狄所滅之由退之之言亦此意也退之之意過于子由逺矣大抵前輩不可輕議樊汝霖曰此詩蘇黃門獨謂不然且曰此特憲宗命崇文誅一劉闢爾其言闢棄城走爭刌膾脯何其瑣屑之甚謂之造語工則可謂之得雅體未也詩載文王伐崇武王伐紂固自有體退之獨不到此耶亦其少年所為文也按公時年四十不可謂少天抵德不足則夸憲宗功烈固偉比文武則有間矣王荆公嘗論詩曰周頌之詞約約所以為嚴德盛故也魯頌之詞侈侈所以為夸德不足故也是詩也其亦魯頌之謂歟彥周詩話曰韓退之元和聖德詩云駕龍十二魚魚雅雅其深于詩者耶琴操十首將歸操孔子之趙聞殺鳴犢作狄之水兮其色幽幽我將濟兮不得其由涉其淺兮石齧我足乘其深兮龍入我舟我濟而悔兮將安歸尤歸兮歸兮無與石鬭兮無應龍求喻意竒警猗蘭操孔子傷不逄時作蘭之猗猗揚揚其香不採而佩于蘭何傷今天之旋其曷為然我行四方以日以年雪霜貿貿薺麥之茂子如不傷我不爾覯薺麥之茂薺麥之有君子之傷君子之守薺麥二語妙于和平君子二語妙于斬截寫得安土樂天意出龜山操孔子以季桓子受齊女樂諫不從望龜山而作龜之氛兮不能雲雨龜之枿兮不中梁柱龜之大兮秪以奄魯知將隳兮哀莫余伍周公有鬼兮嗟余歸輔一結深痛越裳操周公作雨之施物以孳我何意于彼為自周之先其艱其勤以有疆宇私我後人我祖在上四方在下厥臨孔威敢戲以侮孰荒于門孰治于田四海既均越裳是臣我何意于彼為不享其贄不臣其人妙用盡此六字四海既均越裳是臣愈淡愈妙所謂不著一字盡得風流也李光地曰孰荒于門孰治于田言豈有荒于門而能治于田者見非安近無以服逺起下兩句意拘幽操文王羑里作目窈窈兮其凝其盲耳肅肅兮聽不聞聲朝不日出兮夜不見月與星有知無知兮為死為生嗚呼臣罪當誅兮天王聖明伊川程子曰退之作琴操有曰臣罪當誅兮天王聖明道文王意中事前後之人道不到此徐仲車言退之拘幽操謂文王囚羑里作乃云臣罪當誅兮天王聖明可謂知文王之用心矣凱風七子之母猶不能安其室而云母氏聖善我無令人重自責也岐山操周公為大王作我家於豳自我先公伊我承序敢有不同今狄之人將土我疆民為我戰誰使死傷彼岐有岨我往獨處爾莫余追無思我悲履霜操尹吉甫子伯竒無罪為後母譖而見逐自傷作父兮兒寒母兮兒飢兒罪當笞逐兒何為兒在中野以宿以處四無人聲誰與兒語兒寒何衣兒飢何食兒行于野履霜以足母生衆兒有母憐之獨無母憐兒寧不悲結處獨呼母憐更得神解雉朝飛操牧犢子七十無妻見雉雙飛感之而作雉之飛于朝日羣雌孤雄意氣橫出當東而西當啄而飛隨飛隨啄羣雌粥粥嗟我雖人曾不如彼雉雞生身七十年無一妾與妃别鵠操商陵穆子娶妻五年無子父母欲其改娶其妻聞之中夜悲嘯穆子感之而作雄鵠銜枝來雌鵠啄泥歸巢成不生子大義當乖離江漢水之大鵠身鳥之微更無相逢日且可繞樹相隨飛殘形操曾子夢見一狸不見其首作有獸維狸兮我夢得之其身孔明兮而頭不知吉凶何為兮覺坐而思巫咸上天兮識者其誰滄浪詩話曰韓退之琴操髙古正是本色非唐賢所及漁隱叢話曰唐子西語録云古樂府命題皆有主意後之人用樂府為題者直當代其人措辭如公無渡河須作妻止其夫之辭太白輩或失之惟退之琴操得體琴操栁子厚不能作子厚皇雅退之亦不能作也沈德潛曰琴操諸篇深婉忠厚得風雅之正南山詩吾聞京城南兹維羣山囿東西兩際海巨細難悉究山經及地志茫昧非受授團辭試提挈挂一念萬漏欲休諒不能粗敘所經覯嘗升崇丘望戢戢見相湊晴明出稜角縷脈碎分繡蒸嵐相澒洞表裏忽通透無風自飄簸融液煦柔茂橫雲時平凝點點露數岫天空浮修睂濃緑畫新就孤撑有巉絶海浴褰鵬噣春陽潛沮洳濯濯吐深秀巖巒雖嵂崒軟弱類含酎夏炎百木盛蔭鬱增埋覆神靈日歊歔雲氣爭結構秋霜喜刻轢磔卓立癯瘦參差相疉重剛耿陵宇宙冬行雖幽墨冰雪工琢鏤新曦照危峨億丈恆髙袤明昏無停態頃刻異狀候西南雄太白突起莫間簉藩都配德運分宅占丁戊逍遙越坤位詆訐陷乾竇空虛寒兢兢風氣較搜潄朱維方燒日隂霰縱騰糅昆明大池北去覿偶晴晝綿聨窮俯視倒側困清漚微瀾動水面踊躍躁猱狖驚呼惜破碎仰喜呀不仆前尋徑杜墅坌蔽畢原陋﨑嶇上軒昻始得觀覽富行行將遂窮嶺陸煩互走勃然思坼裂擁掩難恕宥巨靈與夸蛾逺賈期必售還疑造物意固護蓄精祐力雖能排斡雷電怯呵詬攀緣脫手足蹭蹬抵積甃茫如試矯首堛塞生怐愗威容喪蕭爽近新迷逺舊拘官計日月欲進不可又因緣窺其湫凝湛閟隂嘼魚蝦可俯掇神物安敢寇林柯有脫葉欲墮鳥驚救爭銜彎環飛投棄急哺鷇旋歸道回睨達枿壯復奏吁嗟信竒怪峙質能化貿前年遭譴謫探歷得邂逅初從藍田入顧盼勞頸脰時天晦大雪淚目苦矇瞀峻塗拖長冰直上若懸溜褰衣步推馬顛蹶退且復蒼黃忘遐睎所矚才左右杉篁吒蒲蘇杲耀攢介胄專心憶平道脫險逾避臭昨來逄清霽宿願欣始副崢嶸躋冢頂倐閃雜鼯鼬前低劃開闊爛漫堆衆皺或連若相從或蹙若相鬬或妥若弭伏或竦若驚雊或散若瓦解或赴若輻湊或翩若船遊或決若馬驟或背若相惡或向若相佑或亂若抽筍或嵲若注灸或錯若繪畫或繚若篆籀或羅若星離或蓊若雲逗或浮若波濤或碎若鋤耨或如賁育倫賭勝勇前購先強勢已出後鈍嗔䛠譳或如帝王尊叢集朝賤幼雖親不褻狎雖逺不悖謬或如臨食案肴核紛飣餖又如逰九原墳墓包椁柩或纍若盆罌或揭若㽅梪或覆若曝鱉或頽若寢獸或蜿若藏龍或翼若搏鷲或齊若友朋或隨若先後或迸若流落或顧若宿留或戾若仇讎或密若婚媾或儼若峩冠或翻若舞袖或屹若戰陳或圍若搜狩或靡然東注或偃然北首或如火熺熖或若氣饙餾或行而不輟或遺而不收或斜而不倚或弛而不彀或赤若禿鬝或燻若柴槱或如龜坼兆或若卦分繇或前橫若剝或後斷若姤延延離又屬夬夬叛還遘喁喁魚闖萍落落月經宿誾誾樹牆垣巘巘架庫廄參參削劍戟煥煥銜瑩琇敷敷花披蕚闟闟屋摧霤悠悠舒而安兀兀狂以狃超超出猶奔蠢蠢駭不懋大哉立天地經紀肖營腠厥初孰開張僶俯誰勸侑創兹朴而巧戮力忍勞疚得非施斧斤無乃假詛呪鴻荒竟無傳功大莫酬僦嘗聞于祠官芬苾降歆嗅斐然作歌詩惟用贊報酭入手虛冒開局嘗升崇丘以下總敘南山大槩春陽四段敘四時變態太白昆明兩段言南山方隅連亘之所自頃刻異狀候以上只是大略逺望未嘗身歷瞻太白俯昆明眺望乃有專注而猶未登涉也徑杜墅上軒昻志窮觀覽矣蹭蹬不進僅一窺龍湫止焉遭貶由藍田行則又跋陟艱危無心觀覽也層層頓挫引滿不發直至昨來逄清霽以下乃舉憑髙縱目所得景象傾囊倒篋而出之疉用或字從北山詩化出比物取象盡態極妍然後用大哉一段煞住通篇氣脈逶迤筆勢竦峭蹊徑曲折包孕宏深非此手亦不足以稱題也潛溪詩眼曰孫莘老嘗謂老杜北征勝退之南山詩王平甫以為南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事以與國風雅頌相為表裏則北征不可無而南山雖不作未害也二公之論遂定洪興祖曰此詩似上林子虛賦才力小者不可到也朝説之曰韓文公詩號狀體謂鋪敘而無含蓄也若雖親不褻狎雖逺不悖謬該于理多矣顧嗣立曰此等長篇亦從騷賦化出然却與焦仲卿妻杜陵北征諸長篇不同者彼則實敘事情此則虛摹物狀公以畫家之筆寫得南山靈異縹眇光怪陸離中間連用五十一或字復用十四疉字正如駿馬下岡手中脫轡忽用大哉立天地數語作收又如柝聲忽驚萬籟皆寂謝自然詩果州南充縣寒女謝自然童騃無所識但聞有神仙輕生學其術乃在金泉山繁華榮慕絶父母慈愛捐凝心感魑魅慌忽難具言一朝坐空室雲霧生其間如聆笙竽韻來自冥冥天白日變幽晦蕭蕭風景寒簷楹暫明滅五色光屬聨觀者徒傾駭躑躅詎敢前須臾自輕舉飄若風中煙茫茫八紘大影響無由緣里胥上其事郡守驚且歎驅車領官吏氓俗爭相先入門無所見冠履同蛻蟬皆云神仙事灼灼信可傳余聞古夏后象物知神姦山林民可入魍魎莫逄旃逶迤不復振後世恣欺謾幽明紛雜亂人鬼更相殘秦皇雖篤好漢武洪其源自從二主來此禍竟連連木石生怪變狐貍騁妖患莫能盡性命安得更長延人生處萬類知識最為賢奈何不自信反欲從物遷往者不可悔孤魂抱深寃來者猶可誡余言豈空文人生有常理男女各有倫寒衣及飢食在紡績耕耘下以保子孫上以奉君親茍異于此道皆為棄其身噫乎彼寒女永託異物羣感傷遂成詩昧者宜書紳前敘後斷排斥不遺餘力人詫其白日飛升吾獨為孤魂寃痛警世至深切矣凝心感魑魅一語包括半部楞嚴李光地曰世固自有仙道自韓子言之則皆鬼魅所為也信乎曰其入于鬼魅者多矣故首曰凝心感魑魅後曰木石生怪變狐貍騁妖患而中敘其升舉之候風寒幽晦則非休徴可知然韓子本意雖視仙道猶鬼道也故曰莫能盡性命安得更長延其記夢云安能從汝巢神山則直謂世無仙道但窟宅巖崖羣彼異物耳顧嗣立曰公排斥佛老是生平得力處此篇全以議論作詩詞嚴義正明目張膽原道佛骨表之亞也集仙録曰謝自然居果州南充縣年十四修道不食築室于金泉山貞元十年十一月二十日辰時白日升天士女數千人咸共瞻仰須臾五色雲遮亘一川天樂異香散漫刺史李堅表聞詔褒美之秋懷詩十一首窗前兩好樹衆葉光薿薿秋風一披拂䇿䇿鳴不已微燈照空牀夜半偏入耳愁憂無端來感歎成坐起天明視顔色與故不相似羲和驅日月疾急不可恃浮生雖多塗趨死惟一軌胡為浪自苦得酒且歡喜白露下百草蕭蘭共雕悴青青四牆下已復生滿地寒蟬暫寂寞蟋蟀鳴自恣運行無窮期稟受氣苦異適時各得所松柏不必貴彼時何卒卒我志何曼曼犀首空好飲亷頗尚能飯學堂日無事驅馬適所願茫茫出門路欲去聊自勸歸還閲書史文字浩千萬陳迹竟誰尋賤嗜非責獻丈夫意有在女子乃多怨秋氣日惻惻秋空日凌凌上無枝上蜩下無盤中蠅豈不感時節耳目去所憎清曉卷書坐南山見髙稜其下澄秋水有蛟寒可罾惜哉不得往豈謂吾無能用意與同谷六歌略同離離挂空悲戚戚抱虛警露泫秋樹髙蟲弔寒夜永斂退就新懦趨營悼前猛歸愚識夷塗汲古得修綆名浮猶有恥味薄真自幸庶幾遺悔尤即此是幽屏此首特多見道之言葛立方曰此則陶潛歸去來辭覺今是昔非之意似有所悟也今晨不成起端坐盡日景蟲鳴室幽幽月吐窗冏冏喪懷若迷方浮念劇含梗塵埃慵伺候文字浪馳騁尚須勉其頑王事有朝請秋夜不可晨秋日苦易暗我無汲汲志何以有此憾寒雞空在棲缺月煩屢瞰有琴具徽絃再鼓聽愈淡古聲久埋滅無由見真濫低心逐時趨苦勉秪能暫有如乘風船一縱不可纜不如覷文字丹鉛事點勘豈必求贏餘所要石與甔李光地曰首言其汲汲求志而患日之不足也又言淡古之音世無知者低心逐時性所不堪如乘風之船不能自返故惟有讀書以自樂茍暫得甔石之儲便浩浩乎無求矣卷卷落地葉隨風走前軒鳴聲若有意顛倒相追奔空堂黃昏暮我坐默不言童子自外至吹燈當我前問我我不應饋我我不餐退坐西壁下讀詩盡數編作者非今士相去時已千其言有感觸使我復悽酸顧謂汝童子置書且安眠丈夫屬有念事業無窮年李光地曰言誦古人詩與古人相感默然安寢而志乎無窮之業詩所謂獨寐寤宿永矢弗告者歟霜風侵梧桐衆葉著樹乾空階一片下琤若摧琅玕謂是夜氣滅望舒霣其團青冥無依倚飛轍危難安驚起出户視倚楹久汍瀾憂愁費晷景日月如跳丸迷復不計逺為君駐塵鞍一葉之落寫得如許竒峭此等蹊徑從何處開出聨句云腸胃繞萬象可想見落筆時意思暮暗來客去羣囂各收聲悠悠偃宵寂亹亹抱秋明世纍忽進慮外憂遂侵誠強懷張不滿弱念缺已盈詰屈避語穽冥茫觸心兵敗虞千金棄得比寸草榮知恥足為勇晏然誰汝令鮮鮮霜中菊既晚何用好揚揚弄芳蝶爾生還不早運窮兩值遇婉孌死相保西風蟄龍蛇衆木日凋稿由來命分爾泯滅豈足道秋懷詩抑塞磊落所謂寒士失職而志不平者昔人謂東野詩讀之令人不歡觀昌黎此等作真乃異曲同工固宜有臭味之合也樊汝霖曰秋懷詩十一首文選詩體也唐人最重文選學公以六經之文為諸儒倡文選弗論也獨于李郱墓志之曰能暗記論語尚書毛詩左氏文選而公詩如自許連城價傍砌看紅藥眼穿長訝雙魚斷之句皆取諸文選故此詩往往有其體後山詩話曰韓詩如秋懷别元協律南溪始泛皆佳作也御選唐宋詩醇卷二十七
