  text: 欽定四庫全書御選唐宋詩醇卷十八
  hash: sha256:187075f712b0d1bd9ad8f9449eae232283d994306a3cdcf8ae5c5d3f98f7279d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_038-1a, image: WYG1448/WYG1448-0386a.png}
body:
  text: 襄陽杜甫詩十目録草閣江上中夜江漢吾宗有嘆中宵南極獨坐逺逰夜返照日暮八月十五夜月二首十六夜玩月十七夜玩月月雨夜返照向夕曉望雷熟食日示宗文宗武社日九日大厯二年九月三十日小至憶鄭南玭愁即事即事喜觀即到復題短篇二首第五弟豐獨在江左近三四載寂無消息覓使寄此二首舍弟觀赴藍田取妻子到江陵喜寄陪柏中丞觀宴將士七月一日題終明府水樓季秋蘇五弟纓江樓夜宴崔十三評事韋少府姪過客相尋孟倉曹步趾領新酒醬二物滿器見遺老夫柳司馬至謁真諦寺禪師送李八祕書赴杜相公幕送李功曹之荆州充鄭侍御判官重贈見螢火吹笛孤雁白小麂見王監兵馬使說近山有白黑二鷹羅者久取竟未能得王以為毛骨有異他鷹恐臘後春生鶱飛避暖徑翮思秋之甚眇不可見請余賦詩大厯三年春白帝城放船出瞿唐峽久居䕫府將適江陵漂泊有詩凡四十韻泊松滋江亭行次古城店泛江作不揆鄙拙奉呈江陵幕府諸公書堂飲既夜復邀李尚書下馬月下賦絶句舟中對驛近寺江南逢李龜年官亭夕坐戲簡顔十少府暮歸公安送韋二少府匡贊公安縣懷古公安送李二十九弟晉肅入蜀余下沔鄂宴王使君宅泊嶽陽城下登嶽陽樓陪裴使君登嶽陽樓宿青草湖宿白沙驛湘夫人祠祠南夕望歸雁入喬口江閣對雨有懷行營裴二端公千秋節有懷二首登舟將適漢陽舟中夜雪有懷盧十四侍御弟樓上送魏二十四司直充嶺南掌選崔郎中判官兼寄韋韶州燕子來舟中作歸雁二首小寒食舟中作清明發潭州聞惠二過東溪特一送舟泛洞庭遣憂巴西聞收宫闕送班司馬入京去蜀
