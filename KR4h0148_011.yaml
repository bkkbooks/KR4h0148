  text: 欽定四庫全書御選唐宋詩醇卷四
  hash: sha256:c340dec24d363bce82f85915fe6e5d90a5f124d3f9055ba3141230f717f1959a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_011-1a, image: WYG1448/WYG1448-0124c.png}
body:
  text: 隴西李白詩四門有車馬客行門有車馬賓金鞍耀朱輪謂從丹霄落乃是故鄉親呼兒掃中堂坐客論悲辛對酒兩不飲停觴淚盈巾歎我萬里遊飄飄三十春空談帝王略紫綬不挂身雄劍藏玉匣陰符生素塵廓落無所合流離湘水濱借問宗黨間多為泉下人生苦百戰役死托萬鬼鄰北風揚胡沙埋翳周與秦大運且如此蒼穹寧匪仁惻愴竟何道存亡任大鈞此非漫擬前人正寫身世之感雖與陸機詩相出入而筆力校徑氣象亦大後半俯仰慨歎所見者大義逺情深豈徒作者王僧虔技録瑟調曲有門有車馬客行歌東阿王置酒髙殿上一篇東海有勇婦梁山感杞妻慟哭為之傾金石忽暫開都由激深情東海有勇婦何慚蘇子卿學劍越處子超然若流星捐軀報夫讐萬死不顧生白刃耀素雪蒼天感精誠十步兩躩躍三呼一交兵斬首掉國門蹴踏五藏行豁此伉儷憤粲然大義明北海李使君飛章奏天庭捨罪警風俗流芳播滄瀛名在列女籍竹帛巳先榮淳于免詔獄漢主為緹縈津妾一棹歌脫父於嚴刑十子若不肖不如一女英豫讓斬空衣有心竟無成要離殺慶忌壯夫所素輕妻子亦何辜焚之買虛聲豈如東海婦事立獨揚名辭氣甚古寫出義烈之情凛凛有生氣郭茂倩曰魏鼙舞五曲有關中有賢女白作此以代之黃葛篇黃葛生洛溪黃花自綿羃靑煙蔓長條繚繞幾百尺閨人費素手採緝作絺綌縫為絶國衣逺寄日南客蒼梧大火落暑服莫輕擲此物雖過時是妾手中迹情至語何可多得蕭士贇曰忠厚之意發於情性風雅之作也世人作詩評乃謂太白詩全無關於人倫風教是亦未之思耳樂府遺聲草木二十一曲有種葛篇塞下曲五月天山雪無花祗有寒笛中聞折栁春色未曾看曉戰隨金鼓宵眠抱玉鞍願將腰下劍直為斬樓蘭沈德潛曰四語直下從前未具此格塞虜乘秋下天兵出漢家將軍分虎竹戰士臥龍沙邊月隨弓影胡霜拂劍花玉關殊未入少婦莫長嗟髙調入雲於聲律中行俊逸之氣自非初唐可及沈德潛曰只弓如月劍如霜耳筆端點染遂成竒采結意亦復深婉胡應麟曰李白塞下曲與溫泉宫别宋之悌南陽送客度荆門等詩俱盛唐絶作視初唐格調如一而神韻超元氣概閎逸時或過之樂府遺聲征戍十五曲中有塞下曲蕭士贇曰此從軍樂之體也來日大難來日一身擕糧負薪道長食盡苦口焦脣今日醉飽樂過千春仙人相存誘我逺學海凌三山陸憩五嶽乘龍天飛目瞻兩角授以仙藥金丹滿握蟪蛄蒙恩深愧短促思填東海強銜一木道重天地軒師廣成蟬翼九五以求長生下士大笑如蒼蠅聲李白嘗謂興寄深微五言不如四言七言又其靡也非有志於古者不能作此語然自三百篇而騷而五言而七言天機所暢文章日新是非得失之故原不在此今必執三百篇以繩後之為四言者非通論也此題本屬寓言白詩亦是擬古辭旨恍惚竒譎可喜故存之以備一體於此論四言正變及興寄深微之旨則相去逺矣王僧虔技録瑟調曲有善哉行樂府解題曰古辭云來日大難口燥脣乾按魏明步出夏門行曰善哉殊復善弦歌樂我情則善哉者嘆美之詞也玉階怨玉階生白露夜久侵羅襪郤下水晶簾玲瓏望秋月妙寫幽情於無字處得之玉顔不及寒鴉色猶帶昭陽日影來不免露却色相蕭士贇曰無一字言怨而隱然幽怨之意見於言外蔣杲曰玉階露生待之久也水晶簾下望之息也怨而不怒惟玩月以抒其情焉此為深於怨者可以怨矣王僧虔技録玉階怨相和歌楚調十曲之一襄陽曲峴山臨漢江水緑沙如雪上有墮淚碑靑苔久磨滅江山留勝迹我輩復登臨不如此寄慨之深梅鼎祚曰興慨古今言簡意盡蕭士贇曰樂府正聲淸商曲有襄陽樂宋隋王誕始為之辭太白此詩述史而己大堤曲漢水臨襄陽花開大堤暖佳期大堤下淚向南雲滿春風復無情吹我夢魂散不見眼中人天長音信斷幽秀絶逺俗艷胡應麟謂白詩人知其華藻而不知其神骨之淸於此亦見一斑楊慎曰古樂府云春風復多情吹我羅裳開白反其意云春風復無情吹我夢魂散古人謂李詩出自樂府信矣古今樂録大堤曲隋王誕為襄州時作邯鄲才人嫁為厮養卒婦妾本崇臺女揚蛾入丹闕自倚顔如花寧知有雕歇一辭玉階下去若朝雲沒每憶邯鄲城深宫夢秋月君王不可見惆悵至明發蕭士贇曰此太白既黜後作也特借此發興敘其暌遇之始末耳然其辭意眷顧宗國繫心君王亦得騷之遺意與樂府遺聲佳麗四十八曲之一崇臺一作叢臺胡震亨曰此謝朓舊題也蓋設為其事寓臣妾淪擲之感楊慎以為此卒即御趙王武臣歸者果此卒也才人亦不枉矣何詩為正陽辨之未及此總固哉説詩者北上行北上何所苦北上緣太行磴道盤且峻巉巖凌穹蒼馬足蹶側石車輪摧髙岡沙塵接幽州烽火連朔方殺氣毒劍戟嚴風裂衣裳奔鯨夾黃河鑿齒屯洛陽前行無歸日返顧思舊鄉慘戚氷雪裏悲號絶中腸尺布不掩體皮膚劇枯桑汲水澗谷阻採薪隴坂長猛虎又掉尾磨牙皓秋霜草木不可餐飢飲零露漿歎此北上苦停驂為之傷何日王道平開顔覩天光古直悲涼亦苦寒行之比楊齊賢曰此乃祿山初反時作也鑿齒指祿山奔鯨指史思明崔乾祐之徒蕭士贇曰北上行者征行之曲言行役者之苦也此詩其作於至德之後乎隱然有國風愛君憂國勞而不怨厭亂思治之意樂府解題曰晉樂奏魏武北上篇其後或謂之北上行蓋因其辭而擬之也短歌行白日何短短百年苦易滿蒼穹浩茫茫萬劫太極長麻姑垂兩鬢一半巳成霜天公見玉女大笑億千場吾欲攬六龍回車挂扶桑北斗酌美酒勸龍各一觴富貴非所願與人駐顔光恣意恢竒逸情雲上王僧虔技録平調七曲二曰短歌行樂府解題曰短歌行魏武帝對酒當歌人生幾何晉陸機置酒髙堂悲歌臨觴皆言當及時為樂也枯魚過河泣白龍改常服偶被豫且制誰使爾為魚徒勞訴天帝作書報鯨鯢勿恃風濤勢濤落歸泥沙翻遭螻蟻噬萬乘慎出入柏人以為識簡嚴如針銘語蕭士贇曰樂府遺聲龍魚六曲有枯魚却無過河泣字古樂府枯魚過河泣何時復還入作書與魴鱮相教慎出入丁督護歌雲陽上征去兩岸饒商賈吳牛喘月時拖船一何苦水濁不可飲壺漿半成土一唱督護歌心摧淚如雨萬人鑿盤石無由達江滸君看石芒碭掩淚悲千古落筆沉痛含意深逺此李詩之近杜者胡震亨曰白所咏雲陽水道舟行艱礙之苦蓋為齊浣所開新河作也按潤州舊不通江浣開元中為刺史始移漕路京口塘下直達於江立埭收課江北瓜步亦開新河但瓜步岸卑入江為易白嘗有詩美之京口岸髙水淺濁用牛曳舟為難故白有此歌以言其苦其名丁都護歌者初宋髙祖即京口開東府有女其夫見殺呼督護丁旿問收殯事每問輒歎息呼之人因寫為歌白感其土俗之事即因其土之古歌名以為歌也督護都護可通用樹中草鳥銜野田草誤入枯桑裏客土植危根逢春猶不死草木雖無情因依尚可生如何同枝葉各自有枯榮諷刺之言有關風教上留田篇云交讓之木本同形東枝憔悴西枝榮與此詩意正相似樂府遺聲樹中草者草木二十一曲之一君馬黃君馬黃我馬白馬色雖不同人心本無隔共作遊冶盤雙行洛陽陌長劍既照曜髙冠何赩赫各有千金裘俱為五侯客猛虎落陷穽壯夫時屈厄相知在急難獨好亦何益蕭士贇曰此詩其傷友朋之道缺乎抑白遭誣被謗之時所作也耶婉而不迫可謂得國風之體古今樂録曰漢鼓吹鐃歌十八曲十曰君馬黃少年子靑雲年少子挾彈章臺左鞍馬四邊開突如流星過金丸落飛鳥夜入瓊樓臥夷齊是何人獨守西山餓通首傅題一結見意詩人寄託往往如此行行且遊獵篇亦用此格然彼則語激而意己盡此則語冷而意有餘也樂府遺聲遊俠二十一曲之一又有少年行少年行五陵年少金市東銀鞍白馬度春風落花踏盡遊何處笑入胡姬酒肆中胡應麟曰唐人七言絶有作樂府體者如此詩及橫江詞尚是古調鍾惺曰行徑風生豫章行胡風吹代馬北擁魯陽關吳兵照海雪西討何時還半渡上遼津黃雲慘無顔老母與子别呼天野草間白馬繞旌旗悲鳴相追攀白楊秋月苦早落豫章山本為休明人斬虜素不間豈惜戰鬭死為君掃凶頑精感石沒羽豈云憚險艱樓船若鯨飛波蕩落星灣此曲不可奏三軍鬢成斑胡震亨説得詩之意其以胡風吹代馬起而繼曰西討何時還若曰祿山之亂未弭璘之起兵原為國家討賊耳故下以本為休明人六句申之至於鄱湖潰敗若隱若顯全不徑露此白微意所在其詞意危苦筆墨沉鬱真古樂府之遺胡震亨曰古豫章行咏白楊生豫章山秋至為人所伐太白此詞中間止著白楊秋月苦兩句首尾俱作軍旅喪敗語並不及白楊片字讀者多為之茫然今詳味之如所云吳兵照海雪及老母與子别并樓船若鯨飛等語皆永王璘兵敗事也蓋白在廬山受璘辟及璘舟師鄱湖潰散白坐繫潯陽獄並豫章地故以白楊之生落於豫章者自况用志璘之傷敗並己身名隳壞之痛耳其借題略點白楊正用筆之妙巧於擬古得樂府深意者蕭楊二家注何曾道著一字王僧虔技録清調六曲二曰豫章行沐浴子沐芳莫彈冠浴蘭莫振衣處世忌太潔至人貴藏暉滄浪有釣叟吾與爾同歸良賈深藏若虛君子盛德容貌若愚與聖賢尚絅之旨正復相同特老氏未免有作用耳昭昭然揭日月而行聖賢固不為也紉蘭佩茝屈平所以千古然原之被讒史謂衆害其能即後人之議原者亦以為露才揚己觀離騷之文藉喻芬芳不一而足則其不自藏韜可知非明夷用晦之義故朱子亦謂其未嘗學於北方求周公仲尼之道白因漁父一篇反其意而用之蓋其涉世之久英氣將斂故云然耳不然與世浮沉漫無介節胡廣中庸馮道長樂其可嗤又何如耶蕭士贇曰此詩櫽括漁父詞之意他篇云含光混世貴無名何用孤髙比雲月亦此意也其太白涉難後之辭乎樂府遺聲沐浴子者遊俠二十一曲之一靜夜思牀前明月光疑是地上霜舉頭望山月低頭思故鄉詩藪謂古今專門大家得三人焉陳思之古拾遺之律翰林之絶皆天授非人力也要是確論至所云唐五言絶多法齊梁體製自别此則氣骨甚髙神韻甚穆過齊梁逺矣劉辰翁曰自是古意不須言笑范杼曰五言短古不可明白説盡含蓄則有餘味此篇是也徐增曰因疑則望因望則思並無他念真靜夜思也胡應麟曰古詩樂府後惟太白諸絶近之緑水曲渌水明秋月南湖采白蘋荷花嬌欲語愁殺蕩舟人逸調末句非有軼思特妒花之艷耳琴集曰琴曲五弄遊春渌水幽居坐愁秋思並宫調蔡雍所作琴書曰雍入青溪訪鬼谷先生所居山有五曲一曲制一弄南曲有澗冬夏常淥故作淥水郭茂倩云近世作者多因題命詞無復本意云淮南子手會緑水之趣春思燕草如碧絲秦桑低緑枝當君懷歸日是妾斷腸時春風不相識何事入羅幃古意却帶秀色體近齊梁不相識言不識人意也自有貞靜之意蕭士贇曰燕草如絲興征夫懷歸秦桑低枝興思婦斷腸末意貞潔非外物所能動可謂得國風不淫之義笑吳昌祺曰以風之來反襯夫之不來與祗恐多情月旋來照妾牀同意子夜吳歌秦地羅敷女采桑緑水邊素手青條上紅妝白日鮮蠶飢妾欲去五馬莫流連多少含蓄勝於陌上桑作長安一片月萬户搗衣聲秋風吹不盡總是玉關情何日平胡虜良人罷逺征一氣渾成有刪末二句作絶句者不見此女貞心亮節何以風世厲俗唐汝詢曰結句不言黷武而言未平深得風人之旨吳昌祺曰萬户砧聲風吹不盡而其情則同亦婉而深矣明朝驛使發一夜絮征袍素手抽針冷那堪把剪刀裁縫寄逺道幾日到臨洮語逼清商搗衣篇尚帶初唐綺習不及此之真摯夏歌一首亦祗綺語故并不録古今樂録曰吳聲十曲一曰子夜唐書樂志曰子夜歌者晉曲也晉有女子名子夜造此聲樂府解題曰後人更為四時行樂之詞謂之子夜四時歌晉書樂志曰吳歌雜曲並出江南東晉以來稍有增廣其始皆徒歌既而被之管絃蓋自永嘉渡江下至梁陳咸都建業吳聲歌曲起於此也對酒行松子棲金華安期入蓬海此人古之仙羽化竟何在浮生速流電倐忽變光彩天地無雕換容顔有遷改對酒不肯飲含情欲誰待人非元氣安得與之久徘徊白固非不達於理者豈復以沖舉為可待耶蓬萊煙霧聊以寄興此詩乃似胸臆間語自然流出者耳蕭士贇曰古詩浩浩陰陽移一篇太白亦祖其意樂府相和歌有對酒始於曹魏樂奏對酒歌太平一篇估客行海客乘天風將船逺行役譬如雲中鳥一去無蹤迹朴直得樂府體古今樂録曰估客樂者齊武帝所製唐書樂志曰梁改其名為商旅行長相思日色己盡花含煙月明欲素愁不眠趙瑟初停鳯凰柱蜀琴欲奏鴛鴦絃此曲有意無人傳願隨春風寄燕然憶君迢迢隔靑天昔日橫波目今成流淚泉不信妾腸斷歸來看取明鏡前蕭士贇曰此亦戍婦詞也馮舒曰廓古人而大之美人在時花滿堂美人去後餘空牀牀中繡被卷不寢至今三載聞餘香香亦竟不滅人亦竟不來相思黃葉落白露濕青苔幽艷之韻綴以凄涼悄然竟住意在言外薑夔所謂詞盡意不盡有臨水送將歸之致倣佛似之去婦詞古來有棄婦棄婦有歸處今日妾辭君遣妾何處去本家零落盡慟哭來時路憶昔未嫁君聞君甚周旋綺羅錦繡段有贈黃金千十五許嫁君二十移所天結髮日未久離君緬山川家家盡歡樂孤妾長自憐幽閨多沉思盛事無十年相思若循環枕席生流泉流泉咽不掃獨夢關山道及此見君歸君歸妾己老物情惡衰賤新寵方妍好掩淚出故房傷心劇秋草自妾為君妻君東妾在西羅幃到曉恨玉貌一生啼妾有嫁時服輕雲淡翠霞琉璃作斗帳四角金蓮花自從離别久不覺塵埃厚常嫌玳瑁孤猶羡鴛鴦偶歲華逐霜霰賤妾何能久寒沼落芙蓉秋風散楊栁以此憔悴顔空持舊物還餘生欲何寄誰肯相牽攀君恩既斷絶相見何年月悔傾連理杯虛作同心結女蘿附青松貴欲相依投浮萍失緑水教作若為流不歎君棄妾自歎妾緣業憶昔初嫁君小姑才倚牀今日妾辭君小姑如妾長回頭語小姑莫嫁如兄夫直起悲涼通篇纒綿悽惋怨而不怒直從谷風篇脫化而出一結古甚却有無限悲感在的是李白手筆蕭士贇曰此篇即顧况棄婦詞後人添增數語竄入太白集中御選唐宋詩醇卷四
