  text: 欽定四庫全書御選唐宋詩醇巻四十
  hash: sha256:1ae09551407a814c421ffcf07ff6f2667ab5562aa8c14ba5c365ce3023474ee4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_083-1a, image: WYG1448/WYG1448-0781c.png}
body:
  text: 眉山蘇軾詩九次韻穆父尚書侍祠郊丘瞻望天光退而相慶引滿醉吟千章杞梓䕃雲天樗散誰收老鄭䖍喜氣到君浮白裏豐年及我挂冠前令嚴鐘鼓三更月野宿貔貅萬竈烟太息何人知帝力歸來金帛㸔赬肩氣偉采竒望之又蔚然深秀厥由風力之遒復齋漫錄曰東坡言古今七言偉麗之句永叔一聯云蒼波萬古流不盡白鳥雙飛意自閒上句取李太白長波瀉萬古之句東坡一聨云令嚴鐘鼓三更月野宿貔貅萬竈烟上句取杜子美中天懸明月令嚴夜寂寥之句也苕溪漁隠叢話曰東坡云七言之偉麗者子美云旌旗日暖龍蛇動宫殿風微燕雀髙五更鼓角聲悲壯三峽星河影動揺爾後寂寥無聞焉直至永叔云蒼波萬古流不盡白鳥雙飛意自閒萬馬不嘶聼號令諸番無事著耕耘可以並驅爭先矣先生亦云令嚴鐘鼔三更月野宿貔貅萬竈烟亦庶幾焉耳郊祀慶成詩帝出乗昌運天心予太平文章三代繼制作七年成大祀乾坤合剛辰日月明泰壇朝掃地魄寳夜垂精仰御圓蒼蓋環觀海嶽成北流呑朔易西極落欃槍升燎靈光答回鑾瑞霧迎需雲徧枯槁解雨達句萌可頌非天徳因箴亦下情民言知有酌帝謂本無聲富國由崇儉蘄年在好生無心斯格物克已自銷兵化國安新政孤臣反舊耕還將清廟什留與野人賡自元豐元年詳定郊祀禮文至六年冬至親祀圜丘以太祖配始罷天地合祭之禮元祐五年廷臣集議復定南郊並祀之儀七年親郊始行合祭宋制三年一郊軾以兵部尚書為南郊鹵簿使疏請嚴整儀仗一時稱盛合祭之禮至紹聖元年仍議罷而軾則主合祭之說然合祭亦僅行於是年耳時宰執侍從進詩以賀故有是詩詩共十四韻而自可頌非天徳以下俱作箴規之語此所謂因事納規不藉揚厲鋪張以矜其華藻也僕所藏仇池石希代之寳也王晉卿以小詩借觀意在於奪不敢不借然以此詩先之海石來珠宫秀色如蛾綠坡陀尺寸間宛轉陵巒足連娟二華頂空洞三茅腹初疑仇池化又恐瀛洲蹙殷勤嶠南使餽餉淮東牧自注僕在揚州程徳孺自嶺南解官還以此石見遺得之喜無寐與汝交不瀆盛以髙麗盆藉以文登玉自注僕以髙麗所餉大銅盆貯之又以登州海石如碎玉者附其足幽光先五夜冷氣壓三伏老人生如寄茅舎久未卜一夫幸可致千里常相逐風流貴公子竄謫武當谷見山應己厭何事奪所欲欲留嗟趙弱寜許負秦曲傳觀慎勿許間道歸應速希代之寳實是寫得出末用秦歸趙璧恰與情事比附意随筆轉如脱彈丸趙次公曰連娟二華頂空洞三茅腹二華太華少華也古人謂造化削成故於二華言頂三茅一名句曲山其腹中空虛别有天地日月載在真誥故於三茅則言腹也詩説雋永曰李賛皇好石有謝臨海守寄石詩牛竒章亦好石洛中闢地多得之刻文可辨近世東坡亦好之有仇池石程徳孺所遺其詩云殷勤嶠南使餽餉淮東牧即今英石也王晉卿示詩欲奪海石錢穆父王仲至蔣頴叔皆次韻穆至二公以為不可許獨頴叔不然今日頴叔見訪親覩此石之妙遂悔前語僕以謂晉卿豈可終閉不予者若能以韓幹二散馬易之者盖可許也復次前韻相如有家山縹緲在眉綠誰云千里還寄此一顰足平生錦繡腸蚤嵗藜莧腹從教四壁空未遣兩峰蹙吾今况衰病義不忘樵牧逝將仇池石歸泝岷山瀆守子不貪寳完我無瑕玉故人詩相戒妙語予所伏一篇獨異論三占從兩卜君家畫可數天驥紛相逐風騣掠原野電尾梢澗谷君如許相易是亦我所欲今朝安西守來聼陽關曲勸我留此峰他日來不速丹經墨史拈出盡歸妙諦筆上生花趙次公曰故人詩相戒指錢穆父王仲至之不欲予也一篇獨異論指蔣頴叔之欲予也書曰三人占則從二人之言故以錢王可從而蔣可違也來聴陽闗曲頴叔將别而行故云耳欲以石易畫晉卿難之穆父欲兼取二物頴叔欲焚畫碎石乃復次前韻并解二詩之意春氷無真堅霜葉失故綠鷃疑鵬萬里蚿笑䕫一足二豪争攘袂先生一捧腹明鏡既無臺淨瓶何用蹙盆山不可隠畫馬無由牧聊將置庭宇何必棄溝瀆焚寶真愛寶碎玉未忘玉久知公子賢出語耆年伏欲觀轉物妙故以求馬卜維摩既復捨天女還相逐授之無盡燈照此久幽谷定心無一物法樂勝五欲三峩吾鄉里萬馬君部曲卧雲行歸休破賊㸔神速自注晋卿將種常有此意因有欲焚畫碎石者乃别為踢浄瓶燒木佛添出一重公案言下如有白毫大光應念來感豈止次韻之能怪變百出趙次公曰三峩吾鄉里言真山萬馬君部曲言真馬我有真山則將卧雲王有真馬則用破賊如此則假山不必愛畫馬不必取也生日劉景文以古畫松鶴為夀且貺佳篇次韻為謝問子一室間寜有千里廓塵心洗長松逺意發孤鶴生朝得此夀死籍疑可落㣲言在參同妙契藏九籥故人有竒趣逸想寄幽壑霜枝謝寒暑雲翮無前却何須構明堂未羡巢阿閣緬懐别時語復作數日惡詩腴固堪飡字瘦還可愕髙標忽在眼清夢了如昨君今噲等伍志與湛軰各豈待相願言方為不朽託子雲老執㦸長孺終主爵吾當追松喬子亦鄙衛霍松鶴為夀近於俗情乃寫得古趣洋溢固知才人之筆無所不可程徳孺惠海中柏石兼辱佳篇輙復和謝嵐薫瘴染郤敷腴笑飲貪泉獨繼吴未欲連車收薏苡肯教沈網取珊瑚不知庾嶺三年别收得曹溪一滴無但指庭前雙柏石要予臨老識方壺施元之曰徳孺名之元持節嶺南歸惠此石故詩皆用嶺南事徳孺時為主客郎中送蔣頴叔帥熈河并引頴叔出使臨洮與穆父仲至同餞之各賦詩一篇以今我來思為韻致遄歸之意得我字西方猶宿師論將不及我茍無深入計緩帯我亦可承明正須君文字粲藻火自薦雖云數留行終不果正坐喜論兵臨老付邊瑣新詩出談笑僚友困掀簸我欲歌杕杜楊栁方婀娜邉風事首鹵所得盖么麽願為魯連書一射聊城笴隂功在不殺結草酬魏顆積其憤激發以詼諧起四句似謔似莊言語妙天下次韻吴傳正枯木歌天公水墨自竒絶瘦竹枯松寫殘月夢回疎影在東牕驚怪霜枝連夜發生成變壊一彈指乃知造物初無物古來畫師非俗士妙相實與詩同出龍眠居士本詩人能使龍池飛霹靂君雖不作丹青手詩眼亦自工識拔龍眠胸中有千駟不獨畫肉兼畫骨但當與作少陵詩或自與君拈秃筆東南山水相招呼萬象入我摩尼珠盡將書畫散朋友獨與長鋏歸來乎因吴詩而及李畫因歌枯木而及畫馬軒然而來翩然而往随意所到總入元㣲苕溪漁隐叢話曰東坡題伯時畫馬云龍眠胸中有千駟議者謂譏其無徳而稱余意其不然如文與可善作墨竹故和篔簹谷云料得清貧饞太守渭濵千畝在胸中豈亦是譏之耶又山谷咏伯時虎脊天馬圖亦云筆端那有此千里在胸中盖言畫馬之妙得之於心應之於手若輪扁之斵輪也送范中濟經畧侍郎分韻賦詩得先字且贈以魚枕杯四馬箠一以元戎十乗以先啟行為韻梁李久樂禍自焚豈非天兩䑕鬭穴中一勝亦偶然謀初要百慮善後乃萬全廟堂選世將范氏真多賢仁風被宿麥綠浪揺秦川號令聳毛羽先聲落虛弦我家天一方去路城西偏投竿困障日賣劍行歸田贈君荆魚杯副以蜀馬鞭一醉可以起毋令祖生先謀初善後有無限經濟在中濟能不負此詩又以見其言必有中也施元之曰中濟以廕歴官元祐八年知慶州中濟祖雍仁宗時為副樞李元昊叛拜鎮武節度使知延州又知永興軍故曰廟堂選世將范氏真多賢中濟在慶廣儲蓄城柵嚴守􅊀羈黠羗推誠待下人樂為用書晁説之考牧圖後我昔在田間但知羊與牛川平牛背稳如駕百斛舟舟行無人岸自移我卧讀書牛不知前有百尾羊聼我鞭聲如鼓鼙我鞭不妄發視其後者而鞭之澤中草木長草木病牛羊尋山跨坑谷騰趠筋骨强烟簔雨笠長林下老去而今空見畫世間馬耳射東風悔不長作多牛翁小雅無羊之詩宣王考牧也牛羊寢訛之狀牧人簔笠之容俄焉而麾忽然而夢維魚維旟變幻莫測詩格之竒無踰於此矣不襲其詞而能得其意遥遥千古斯作之外誰其嗣音七年九月自廣陵召還復館於浴室東堂八年六月乞㑹稽將去汶公乞詩乃復用前韻三首乞郡三章字半斜廟堂傳笑眼昏花上人問我遲留意待賜頭綱八餅茶自注尚書學士得賜頭綱龍茶一斤今年綱到最遲夢繞吳山郤月廊白梅盧橘覺猶香自注杭州梵天寺有月廊數百間寺中多白楊梅盧橘會稽且作須臾意從此歸田策最良東南此去幾時歸倦鳥孤飛豈有期斷送一生消底物三年光景六篇詩首作託言待賜戀闕情深三作只是把詩消嵗月之意道破便可發深省苕溪漁隐叢話曰細色茶五綱凡四十三品形製各異共七千餘餅又有粗色茶七綱凡五品大小龍鳳併㨂芽悉入龍腦和膏為團餅茶共四萬餘餅東坡題文公詩巻云待賜頭綱八餅茶即今粗色紅綾袋餅八者是也東府雨中别子由庭下梧桐樹三年三見汝前年適汝隂見汝鳴秋雨去年秋雨時我自廣陵歸今年中山去白首歸無期客去莫歎息主人亦是客對牀定悠悠夜雨空蕭瑟起折梧桐枝贈汝千里行歸來知健否莫忘此時情空清如話而情味無窮此較前初秋寄子由一章尤入神品書丹元子所示李太白真天人幾何同一漚謫仙非謫乃其㳺麾斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道為少留縻之不可矧肯求西望太白横峨岷眼髙四海空無人大兒汾陽中令君小兒天台坐忘身平生不識髙將軍手汚吾足乃敢瞋作詩一笑君應聞筆歌墨舞實有手弄白日頂摩青穹之氣概足為白寫照矣後人刋詩有將此作分為兩首者特以平韻承接之故然分則意象不昌豈惟不諳詩法且并其佳處失之觀集内儋州夜夢一詩猶用此體可以為証天厨禁臠曰太白賛一韻七句方換韻又是平聲其法不得雙殺雙殺者不得此法也賀裳曰文人有一言使人升九天墮九淵者此類是也亦公自寫其傲岸之趣却令太白生面重開勝碑隂記一段文字逺甚次韻滕大夫雪浪石太行西來萬馬屯勢與岱嶽争雄尊飛狐上黨天下脊半掩落日先黄昏削成山東二百郡氣壓代北三家村千峰石巻矗牙帳崩崖鑿斷開土門朅來城下作飛石一礮驚落天驕魂承平百年烽燧冷此物僵卧枯榆根畫師爭摹雪浪勢天公不見雷斧㾗離堆四面繞江水坐無蜀士誰與論老翁兒戯作飛雨把酒坐㸔珠跳盆此身自幻孰非夢故國山水聊心存勁氣不可斷來則山岑競舉止則壁岸無階墨莊漫録曰東坡帥中山得黒石白脈如蜀孫位孫知㣲所畫石間奔流盡水之變又得白石曲陽為大盆以盛之激水其上名其室曰雪浪齋公自銘曰玉井芙蓉丈八盆伏流飛空潄其根時有英州之命後謫惠州又徙海外故中山後政以公遷謫雪浪之名遂廢元符中始被北歸之命將至吴中張芸叟守中山葺治雪浪齋重安盆石趙次公曰古所謂山東乃今之河北晋地盖太行山之東也山東二百郡正謂太行以東冀州之琙矣代北則燕趙以往之地也鶴歎園中有鶴馴可呼我欲呼之立坐隅鶴有難色側睨予豈欲臆對如鵩乎我生如寄良畸孤三尺長脛閣瘦軀俛啄少許便有餘何至以身為子娱驅之上堂立斯須投以餅餌視若無戞然長鳴乃下趨難進易退我不如難進易退我不如此鶴歎所以作也却只於結處一句收住中云豈欲臆對如鵩乎乃疑而問鶴之詞我生如寄四句便直代鶴作臆對語章法竒絶是為善學賈賦者唐庚語録曰東坡作病鶴詩嘗寫三尺長脛瘦軀闕其一字使任徳翁軰下之數十字東坡徐出其稿盖閣字也此字既出儼然如見病鶴矣子由生日以檀香觀音像及新合印香銀篆槃為夀一首旃檀婆律海外芬西山老臍柏所薫香螺脱黶來相羣能結縹緲風中雲一燈如螢起微焚何時度盡繆篆紋繚繞無窮合復分緜緜浮空散氤氲東坡持是夀卯君君少與我師皇墳旁資老聃釋迦文共厄中年㸃蠅蚊晚遇斯須何足云君方論道承華勲我亦旗鼓嚴中軍國恩未報敢不勤但願不為世所醺爾來白髪不可耘問君何時返鄉枌收拾散亡理放紛此心實與香俱焄聞思大士應已聞香難以形容偏為形容曲盡平時好以禪語入詩此詩偏只結句大士已聞一㸃真有如天花變現不可測識者在詩道中殆以從聞思修而入三摩地矣王直方詩話曰蘇黄門以己夘生故東坡有夘君之語其以檀香觀音像遺黄門云持是夀夘君其出局偶書云傾杯不能飲待得夘君來其送王鞏詩云淚濕粉牋書不得憑君送與夘君看過髙郵寄孫君孚過淮風氣清一洗塵埃容水木漸幽茂菰蒲雜㳺龍可憐夜合花青枝散紅茸美人逰不歸一笑當誰供故園在何處已偃手種松我行忽失路歸夢千山重聞君有負郭二頃收横從巻野畢秋穫殷牀聞夜舂樂哉何所憂社酒粥面醲宦逰豈不好毋令到千鍾極言景物清幽留連不能去而其人之足思自見感舊懐人風格最古此詩出於南遷之時孫升亦遭貶謫篇中絶不露牢騷抑鬱之意津津乎其有遺味矣劉延世孫公談圃序曰紹聖之改元也凡仕於元祐而貴顯者例皆竄貶湖南嶺表相望而錯趾惟閩郡獨孫公一人遷於臨汀公元祐時歴三院遷左史入中書為舍人危言讜論内外憚之已而忤時宰意以集賢殿修撰留守南都後遷天章閣待制其謫官也自南都為歸州遂以散秩謫臨汀公諱升字君孚髙郵人慈湖夾阻風五首錄四首捍索桅竿立嘯空篙師酣寝浪花中故應菅蒯知心腹弱纜能争萬里風此生歸路愈茫然無數青山水拍天猶有小船來賣餅喜聞虛落在山前日輪亭午汗珠融誰識南訛長養功暴雨過雲聊一快未妨明月郤當空卧看落月横千丈起喚清風得半帆且並水村欹側過人間何處不巉巖荒灣旅泊却寫得即事皆可喜讀此數詩足以開豁塵襟過廬山下并引予過廬山下雲物騰湧黙有禱焉未午衆峰凛然故作是詩亂雲欲霾山勢與飄風南羣隮相應和勇往争驂驔可憐薈蔚中時出紫翠嵐鴈沒失東嶺龍騰見西龕一時供坐笑百態變立談暴雨破坱北清飈掃渾酣廓然歸何處陋矣安足戡亭亭紫霄峰窈窈白石菴五老數松雪雙溪落天潭雖云黙禱應顧有移文慙雲巒新霽氣象萬千列秀青青己見廬山真面目矣壺中九華詩并引湖口人李正臣蓄異石九峰玲瓏宛轉若牕櫺然予欲以百金買之與仇池石為偶方南遷未暇也名之曰壺中九華且以記之清溪電轉失雲峰夢裡猶驚翠掃空五嶺莫愁千嶂外九華今在一壺中天池水落層層見玉女牕明處處通念我仇池太孤絶百金歸買碧玲瓏詩亦宛轉玲瓏與題恰稱趙次公曰劉禹錫有歌云九華山自是造化一尤物焉能藉甚乎人間今先生以石有九峰遂以名之其在一壺中則神仙壺公之壺也中别有天地山川故云耳秧馬歌并引過廬陵見宣徳郎致仕曽君安止出所作禾譜文既溫雅事亦詳實惜其有所缺不譜農器也予昔逰武昌見農夫皆騎秧馬以榆棗為腹欲其滑以秋桐為背欲其輕腹如小舟昻其首尾背如覆瓦以便兩髀雀躍於泥中繫束藁其首以縛秧日行千畦較之傴僂而作者勞佚相絶矣史記禹乗四載泥行乗橇解者曰橇形如箕擿行泥上豈秧馬之類乎作秧馬歌一首附於禾譜之末云春雲濛濛雨淒淒春秧欲老翠剡齊嗟我婦子行水泥朝分一瓏暮千畦腰如箜篌首啄雞筋煩骨殆聲酸嘶我有桐馬手自提頭尻軒昻腹脇低背如覆瓦去角圭以我兩足為四蹏聳踊滑汰如鳬鷖纎纎束藁亦可齎阿用繁纓與月題郤從畦東走畦西山城欲閉聞鼓鼙忽作的盧躍檀溪歸來挂壁從髙栖了無芻秣飢不啼少壯騎汝逮老黧何曽蹶軼防顛陳錦韀公子朝金閨笑我一生蹋牛犂不知自有木駃騠直以馬喻非馬瑰偉連犿其說能解人頥䂬溪詩話曰東坡遊武昌嘗作秧馬歌唐子西至羅浮始識此器作詩云擬向明時受一㕓著鞭常恐老農先行藏己問吾能識從此馳名四十年亦巧於用事周必大農器譜序曰紹聖初元蘇文忠公軾南遷過太和邑人宣徳郎致仕曽公安止獻所著禾譜文忠羙具温雅詳實為作秧馬歌又惜其不譜農器時曽公已喪明不暇為也後百餘年其侄孫耒陽令之謹始續成之凡耒耜耨鑄車戽簔笠銍刈篠簣杵臼斗斛釡甑倉庾厥類惟十附以襍記勒成三巻皆考之經傳參合今制無不備者是可補伯祖之書成蘇公之志矣八月七日初入贑過惶恐灘七千里外二毛人十八灘頭一葉身山憶喜懽勞逺夢自注蜀道有錯喜歡鋪在大散闗上地名惶恐泣孤臣長風送客添帆腹積雨浮舟減石鱗便合與官充水手此生何止略知津起二句固是同調栁州書作發端乃更警策按十八灘自下而上第一灘在萬安縣前名黄公灘東坡改作惶恐以對喜歡其後文文山更以惶恐對零丁遂成典故結處云充水手者應是暗用何易於腰笏引舟事也䂬溪詩話曰栁詩十一年前南渡客四千里外北歸人又一身去國六千里萬死投荒十二年蘇詩七千里外二毛人十八灘頭一葉身不約而合句法使然故也鬰孤臺自注以下四首皆䖍州八境見圖畫鬰孤如舊㳺山為翠浪湧水作玉虹流日麗崆峒曉風酣章貢秋丹青未變葉鱗甲欲生洲嵐氣昏城樹灘聲入市樓烟雲侵嶺路草木半炎州故國千峰外髙臺十日留他年三宿處凖擬繫歸舟廉泉水性故自清不清或撓之君㸔此廉泉五色爛摩尼廉者謂我㢘我以此名為有㢘則有貪有慧則有癡誰為栁宗元孰是吴隠之漁父足豈潔許由耳何緇紛然立名字此水了不知毁譽有時盡不知無盡時朅來㢘泉上捋䰅看鬢眉好在水中人到處相娱嬉有盡在人無盡在我維摩經言有法門名無盡燈此詩所本塵外亭楚山澹無塵贑水清可厲散策塵外遊麾手謝此世山髙惜人力十步輙一憇郤立浮雲端俯視萬井麗幽人宴坐處龍虎為斬薙馬駒獨何疑豈墮山鬼計夜垣非助我謬敬欲其逝戲留一轉語千載起攘袂韓詩云﨑嶇上軒昻始得觀覽富未及此之圓妙也正諦既得故後幅但就馬祖事言之不更為山水饒舌趙次公曰幽人宴坐處以下八句皆是馬祖事馬祖始居此山山鬼為築垣自謂修行不至為鬼所識乃舍去今先生詩語髙馬祖一著也天竺寺并引予年十二先君自䖍州歸謂予言近城山中天竺寺有樂天親書詩云一山門作兩山門兩寺元從一寺分東澗水流西澗水南山雲起北山雲前臺花發後臺見上界鐘清下界聞遥想吾師行道處天香桂子落紛紛筆勢竒逸墨跡如新今四十七年予來訪之則詩已亡有刻石存耳感涕不已而作是詩香山居士留遺跡天竺禪師有故家空詠連珠吟疊壁已亡飛鳥失驚虵林深野桂寒無子雨浥山薑病有花四十七年真一夢天涯流落淚横斜㸃染處極其古秀掲朗標華較香山聨珠體詩更進一格月華寺自注寺鄰岑水塲施者皆坑戸也百年間盖三焚矣天公胡為不自憐結土融石為銅山萬人探斵富媪泣祗有金帛資豪姦脱身獻佛意可料一瓦坐待千金還月華三火豈天意至今茇舍依榛菅僧言此地本龍象興廢反掌曽何艱髙嚴夜吐金碧氣曉得異石青斕斑坑流窟發錢湧地莫施百鎰朝千鍰此山出寶以自賊地脈已㫁天應慳我願銅山化南畝爛漫黍麥蘇惸鰥道人修道要底物破鐺煮飯茒三間亦是左傳象齒焚身莊子山木自㓂之意説來警動倍覺氣象崢嶸李必恒曰智度論云水行中龍陸行中象故荷大法力比之龍象按月華寺智藥三藏真身在焉故有龍象之語碧落洞槎牙亂峰合晃蕩絶壁横遥知紫翠間古來仙釋并陽崖射朝日髙處連玉京隂谷叩白月夢中遊化城果然石門開中有銀河傾幽龕入窈窕别戸穿虛明泉流下珠琲乳湔交縵纓我行畏人知恐為仙者迎小語輙響荅空山自雷驚策杖歸去來治具煩方平氣交冲漠與神為徒小語響荅二句寫巖洞之景未經人道苕溪漁隐叢話曰題碧落洞詩云小語輙響荅空山白雲驚此語全類李太白今印本誤作自雷驚不惟無意味兼與上句重叠也李必恒曰一統志云洞多懸石如霓旌羽盖旁有小洞號雲華深不可測按詩所云幽龕别戸即指其處也峽山寺自注傳竒所記孫恪袁氏事即此寺至今有人見白猿者天開清逺峽地轉凝碧灣我行無遲速攝衣步孱顔山僧本幽獨乞食况未還雲確水自舂松門風為關石泉解娱客琴筑鳴空山佳人劍翁孫遊戲暫人間忽憶嘯雲侣賦詩留玉環林深不可見霧雨霾髻鬟空山無人水流花開良由妙造自然匪闗思索而致裴硎傳竒曰廣徳中有孫恪者游洛中遇袁氏女遂納為室後十餘年同至峽山寺袁氏欣然改服理鬢詣老僧乃持一碧玉環獻僧曰此是院舊物僧初不曉及齋罷有野猿數十悲嘯捫蘿而躍袁氏惻然俄命筆題詩云無端變化幾湮沉剛被恩情役此心不如逐伴歸山去長嘯一聲烟霧深詩畢遂裂衣化為老猿追嘯者躍樹而去老僧方悟曰乃貧道為沙門時所養者碧玉環則胡人所施繫於其頸者舟行至清逺縣見顧秀才極談惠州風物之美到處聚觀香案吏此邦宜著玉堂仙江雲漠漠桂花溼梅雨翛翛荔子然聞道黄柑常抵鵲不容朱橘更論錢恰從神武來𢎞景便向羅浮覔稚川八句屬對律詩正格筆力積健為雄頡頏杜老廣州蒲澗寺自注地産菖蒲十二節相傳安期生之故居始皇訪之於此不用山僧導我前自尋雲外出山泉千章古木臨無地百尺飛濤瀉漏天昔日菖蒲方士宅後來簷蔔祖師禪而今只有花含笑笑道秦王欲學仙自注山中多含笑花浴日亭自注在南海廟前劍氣崢嶸夜揷天瑞光明滅到黄灣坐看暘谷浮金暈遥想錢塘涌雪山已覺滄凉蘇病骨更煩沆瀣洗衰顔忽驚鳥動行人起飛上千峰紫翠間前六句猶是滄滄凉凉之勢忽驚鳥動一轉陡然而上筆勢竒絶㳺羅浮山一首示兒子過人間有此白玉京羅浮見日雞一鳴自注劉夢得有詩記羅浮夜半見日事山不甚髙而夜見日此可異也南樓未必齊日觀欎儀自欲朝朱明自注山有二石樓今延祥寺在南樓下朱明洞在冲虛觀後云是蓬萊第七洞天東坡之師抱朴老真契久已交前生玉堂金馬久流落寸田尺宅今誰耕道華亦嘗啖一棗自注唐永樂道士侯道華竊食鄧天師藥仙去永樂有無核棗人不可得道華獨得之予在岐下亦嘗得食一枚契虛正欲仇三彭自注唐僧契虛遇人導㳺稚川仙府真人問曰汝絶三彭之仇乎契虛不能答鐵橋石柱連空横自注山有鐵橋石柱人罕至者杖藜欲趁飛猱輕雲溪夜逢瘖虎伏自注山有啞虎廵山斗壇晝出銅龍吟自注冲虛觀後有朱真人朝斗壇近於壇上獲銅龍六銅魚一小兒少年有竒志中宵起坐存黄庭近者戲作凌雲賦筆勢彷彿離騷經負書從我盍歸去羣仙正草新宫銘汝應奴𨽻蔡少霞我亦季孟山元卿自注唐有夢書新宫銘者云紫陽真人山元卿撰其畧曰良常西麓原澤束泄新宫宏宏崇軒䡾䡾又有蔡少霞者夢人遣書碑畧曰昔乗魚車今履瑞雲躅空仰塗綺輅輪囷其末題云五雲書閣吏蔡少霞書還湏畧報老同叔贏糧萬里尋初平自注子由一字同叔森蔚璀偉以御風凌雲之氣行之是亦新宫銘所稱天籟虛徐鳳簫冷徹者耶容齋隨筆曰東坡遊羅浮山作詩示叔黨其末負書從我四句坡自注用山元卿撰銘蔡少霞書碑二事予按薛用弱集異記載蔡少霞夢人召去令書碑題云蒼龍溪新宫銘紫陽真人山元卿撰其詞三十八句不聞有五雲閣吏之説魚車瑞雲之語乃逸史所載陳幼霞事云蒼龍溪主歐陽某撰盖坡公誤以㓜霞為少霞耳十月二日初到惠州彷彿曽遊豈夢中欣然雞犬識新豐吏民驚怪坐何事父老相擕迎此翁蘇武豈知還漠北管寧自欲老遼東嶺南萬戸皆春色自注嶺南萬戸酒㑹有幽人客寓公貶謫之地見如舊逰有終焉之志賢者固隨寓而安白水山佛跡巖自注羅浮之束麓也在惠州東北二十里何人守蓬萊夜半失左股浮山若鵬蹲忽展垂天羽根株互連絡崖嶠争呑吐神工自爐鞲融液相綴補至今餘隙罅流出千斛乳方其欲合時天匠麾月斧帝觴分餘瀝山骨醉后土峰巒尚開闔澗谷猶呼舞海風吹未凝古佛來布武當時汪罔氏投足不蓋拇青蓮雖不見千古落花雨雙溪滙九折萬馬騰一鼓奔雷濺玉雪潭洞開水府潛鱗有飢蛟掉尾取渇虎我來方醉後濯足聊戲侮回風巻飛雹掠面過疆弩山靈莫惡劇㣲命安足賭此山吾欲老慎勿厭求取谿流變春酒與我相賔主當連青竹竿下灌黄精圃山記謂浮山即蓬萊别島洪水浮至依羅而止二山合體謂之羅浮本是不根之談前八韻據此翻騰而入無非為佛跡二字取勢以跌落古佛來布武一句耳後紀浴於湯池從飢蛟渇虎飛雹强弩數句之中參以醉後濯足二語忽然動魄驚心忽然掉臂徐步羅浮以風雨為合離匪此神筆莫傳其妙唐庚語録曰東坡詩叙事言簡而意盡惠州有潭潭有潛蛟人未之信也虎飲水其側蛟尾而食之俄而浮骨水上人方知之東坡以十字道盡云潛鱗有飢蛟掉尾取渇虎言渇則知虎以飲水而召災言飢則蛟食其肉矣志林曰紹聖元年十月十二日與幼子過遊白水佛跡院浴於湯池熟甚其源殆可煮物循山而東少北有懸水百仭山八九折折處輙為潭深者磓石五丈不得其所止雪濺雷怒可喜可畏水厓有巨人迹數十所謂佛跡也軾答陳季常書曰今日遊白水佛跡山山上布水三十仭雷輥電散未易名狀大畧如項羽破章邯時也十一月二十六日松風亭下梅花盛開春風嶺上淮南村昔年梅花曽斷魂自注予昔赴黄州春風嶺上見梅花有兩絶句明年正月往岐亭道上賦詩云去年今日闗山路細雨梅花正斷魂豈知流落復相見蠻風蜑雨愁黄昏長條半落荔枝浦卧樹獨秀桄榔園豈惟幽光留夜色直恐冷艶排冬温松風亭下荆棘裏兩株玉蘂明朝暾海南仙雲嬌墮砌月下縞衣來扣門酒醒夢覺起繞樹玅意有在終無言先生獨飲勿歎息幸有落月窺清尊秀色孤姿渉筆如融風彩露集中梅花詩有以清空入妙者如和秦觀梅花詩云竹外一枝斜更好是也有以使事傳神者此詩海南仙雲嬌墮砌月下縞衣來扣門是也軾嘗稱秦觀詩有云西湖處士骨應槁只有此詩君壓倒觀詩豈能過之毋亦自道其所得耳此題尚有和韻兩篇第二篇有紛紛初疑月挂樹耿耿獨與參横昏二句最為洪邁所稱胡仔亦云三首皆擺落陳言古今人未嘗經道者第二首尤竒然細玩前篇䆒是不逮原唱也遯齋閒覽曰凡詩之詠物雖平淡巧麗不同要能以隨意造語為工東坡在嶺南有暾字韻詠梅詩韻險而語工非大手筆不能到也䂬溪詩話曰用自己詩為故事湏作詩多者乃有之太白云滄浪吾有曲相子棹歌聲樂天云湏知菊酒登髙㑹從此多無二十塲明年云去秋共數登髙㑹又被今年減一塲坡赴黄州過春風嶺有絶句後詩云去年今日闗山路細雨梅花正斷魂至海外又云春風嶺上淮南村昔年梅花曽斷魂新釀桂酒搗香篩辣入瓶盆盎盎春溪帶雨渾收拾小山藏社罋招呼明月到芳樽酒材已遣門生致菜把仍叨地主恩爛煮葵羮斟桂醑風流可惜在蠻村桂酒頌作於釀成之後有云釀為我醪淳而清甘終不壞醉不醒此詩乃作於方釀之時故但以搗香篩辣為言耳收拾小山藏社甕造語神竒軾桂酒頌序曰吾謫居海上法當數飲酒以禦瘴而嶺南無酒禁有隐者以桂酒方授吾釀成而玉色香味超然非人間物也東坡先生曰酒天禄也其成壊羙惡世以兆人主之吉凶吾得此豈非天哉故為之頌以遺後之有道而居夷者其法盖刻石置之羅浮鐵橋之下非忘世求道者莫至焉江郊并引惠州歸善縣治之北數步抵江少西有盤石小潭可以垂釣作江郊詩云江郊蔥曨雲外蒨絢碕岸斗入洄潭輪轉先生悦之布席閒燕初日下照潛鱗俯見意釣忘魚樂此竿綫優哉悠哉玩物之變琢句全摹水經注碕岸二句乃從斗聳曲池及洄湍電轉環濤轂轉等句化出潛鱗俯見亦從新安江潭不掩鱗一句得來正月二十四日與兒子過賴仙芝王原秀才僧曇潁行全道士何宗一同逰羅浮道院及栖禪精舍過作詩和其韻寄邁迨一首斷橋隔勝踐脱屨欣小掲瘴花已繁紅官栁猶疎細斜川二三子悼歎我年逝淒凉羅浮館風壁頽雨砌黄冠常苦飢迎客羞破袂仙山在何許歸鶴時墮毳﨑嶇食松黄欲救齒髪弊坐令禪客笑一夢等千嵗栖禪晚置酒蠻果粲蕉荔齋厨釡無羮野餉籃有蕙嬉㳺趁時節俯仰了此世猶當洗業障更作臨水褉寄書陽羡兒并語長頭弟門戸各努力先期畢租税從荒寂處生情韻動崖谷趙次公曰陽羡兒言邁也長頭弟則言迨也陽羡乃常州二子在常州也迨之長頭先生前集有詩可見其實贈王子直秀才萬里雲山一破裘杖端閒挂百錢㳺五車書已留兒讀二頃田應為鶴謀自注子直住鶴田山水底笙歌蛙兩部山中奴婢橘千頭幅巾我欲相隨去海上何人識故侯用詞多以數目字大小相形清艶兩絶藝苑雌黄曰水底笙歌蛙兩部山中奴婢橘千頭雖愛其語之工然南史孔徳璋門庭之内草萊不剪中有蛙鳴或問之曰欲為陳蕃乎曰我以此當兩部鼓吹何必效陳蕃却無笙歌之説石林詩話曰子瞻嘗兩用孔稚圭鳴蛙事如水底笙歌蛙兩部雖以笙簧易鼓吹不礙其為意同至已遣亂蛙成兩部則兩部不知為何物故用事寜與出處語小異而意同不可盡牽出處語而意不顯也遊博羅香積寺并引寺去縣七里三山犬牙夾道皆美田麥禾甚茂寺下谿水可作碓磨若築塘百歩閘而落之可轉兩輪舉四杵也以屬縣令林抃使督成之二年流落鼃魚鄉朝來喜見麥吐芒東風揺波舞淨緑初日泫露酣嬌黄汪汪春泥已投膝剡剡秋穀初分秧誰言萬里出無友見此二美喜欲狂三山屏擁僧舍小一谿雷轉松隂凉要令水力供臼磨與相地脉増隄防霏霏落雪看收麵隠隠叠鼓聞舂糠散流一啜雲子白炊裂十字瓊肌香豈惟牢九薦古味自注束晳餅賦饅頭簿持起搜牢九要使真一流天漿詩成捧腹便絶倒書生說食真膏盲固是硬語排奡湏㸔其字字鎔鑄而成有回萬牛之力有轉丸珠之巧苕溪漁隐叢話曰老杜自我作古其詩體不一在人所喜取而用之如東坡在嶺外游博羅香積寺同正輔游白水山皆古詩而終篇對屬精切語意貫穿此亦是老杜體如岳麓道林二寺行追酬故髙蜀州人日見寄入衡州奉贈李八丈判官晚登瀼上堂之類概可見矣李必恒曰按束晳餅賦有饅頭薄壯起溲牢丸之名而先生詩用作牢九又自注中薄壯作簿持起溲作起搜又真一酒歌亦用起搜字想别有所據連雨漲江二首越井岡頭雲出山䍧牱江上水如天牀牀避漏幽人屋浦浦移家蜑子船龍巻魚蝦并雨落人隨雞犬上墻眠只應樓下平堦水長記先生過嶺年急雨蕭蕭作晚凉卧聞榕葉響長廊㣲明燈火耿殘夢半濕簾帷浥舊香髙浪隠牀吹甕盎闇風驚樹擺琳瑯先生不出晴無用留向空堦滴夜長四月十一日初食荔支南村諸楊北村盧自注謂楊梅盧橘也白華青葉冬不枯垂黄綴紫烟雨裏特與荔支為先驅海山仙人綘羅襦紅紗中單白玉膚不湏更待妃子笑風骨自是傾城姝不知天公有意無遣此尤物生海隅雲山得伴松檜老霜雪自困樝梨麤先生洗盞酌桂醑氷盤薦此赬虬珠似聞江鰩斫玉柱更洗河豚烹腹腴自注予嘗謂荔支厚味髙格兩絶果中無比惟江鰩柱河豚魚近之耳我生涉世本為口一官久已輕蓴鱸人間何者非夢幻南來萬里真良圖綘羅紅紗語不露刻鏤之迹而形容備至江鰩河豚之比特以其同為異味非有深意陳敏政駁之固無謂胡仔辨之亦强作解事耳遯齋閒覽曰東坡食茘支詩云海山仙人綘羅襦紅紗中單白玉膚予誦之未嘗不愛其體物之工然其後云似聞江鰩斫玉柱更洗河豚烹腹腴予意東坡未嘗至閩中亦不識真荔支其曰四月十一日是特廣南火山者耳故其比類僅與魏文帝庾信同科苕溪漁隐叢話曰詩人詠物形容之妙近世為最東坡海山仙人四句誦此則知其詠荔支也坡詩自注云予嘗謂荔支厚味髙格兩絶果中無比惟江珧柱河豚魚近之耳又曰僕嘗問荔支何所似或曰荔支似龍眼客皆笑其陋實無所似也僕曰荔支似江珧柱應者皆憮然僕亦不解此所謂善於比類者若魏文帝庾信之葡萄乃至謬耳遯齋閒覧殊無鍳裁若言閩廣荔支髙下不同則可若言東坡不善比類則不可也六月十二日酒醒步月理髪而寢羽蟲見月争翾翻我亦散髪虛明軒千梳冷快肌骨醒風露氣入霜蓬根起舞三人謾相屬停杯一問終無言曲肱薤簟有佳處夢覺瓊樓空斷魂語簡而静紙上有凉氣撲人荔支歎十里一置飛塵灰五里一候兵火催顛坑仆谷相枕籍知是荔支龍眼來飛車跨山鶻横海風枝露葉如新採宫中美人一破顔驚塵濺血流千載永元荔支來交州天寶嵗貢取之涪至今欲食林甫肉無人舉觴酹伯㳺自注漢永元中交州進荔支龍眼十里一置五里一候奔騰死亡罹猛獸毒蟲之害者無數唐羌字伯游為林武長上書言狀和帝罷之唐天寶中盖取涪州荔支自子午谷路進入我願天公憐赤子莫生尤物為瘡痏雨順風調百穀登民不飢寒為上瑞君不見武夷溪邊粟粒芽前丁後蔡相籠加自注大小龍茶始於丁晋公成於蔡君謨歐陽永叔聞君謨進小龍團驚歎曰君謨士人也何至作此事争新買寵各出意今年鬬品充官茶自注今年閩中監司乞進鬬茶許之吾君所之豈此物致養口體何陋邪洛陽相君忠孝家可憐亦進姚黄花自注洛下貢花自錢惟演始君不見一段百端交集一篇之竒横在此詩本為茘支發數忽説到茶又說到牡丹其胸中鬰勃有不可以已者惟不可以已而言斯至言至文也䂬溪詩話曰錢惟演為洛帥留守置驛貢花識者鄙之坡作荔支歎云洛陽相君忠孝家可憐亦進姚黄花補世之語不能易也容齋三筆曰東坡先生作文引用史傳必詳述本末有至百餘字者盖欲使讀者一覽而得之不待復尋繹書策也如勤上人詩集叙引翟公罷廷尉賓客反覆事晁君成詩集叙引李郃漢中以星知二使者事上富丞相詩引左史倚相羙衛武公事荔支歎詩引唐羌言荔支事是也苕溪漁隐叢話曰武夷溪邉粟粒茅誤指其地武夷未嘗有茶茶之精絶者乃在北苑自有一溪南流至富沙城下方與西來武夷溪水合流東去劔浦固不可雷同言之建安北苑茶始於太宗朝太平興國二年遣使造之取象於龍鳳以别庻飲由此入貢至道間仍忝造石乳其後大小龍茶又起於丁謂而成於蔡君謨謂之將漕閩中實董其事社前十五日即採其芽日數千工聚而造之逼社即入貢工甚大造甚精皆載於所撰建陽茶録御選唐宋詩醇巻四十
