body:
  text: 太原白居易詩四江南遇天寶樂叟白頭病叟泣且言祿山未亂入梨園能彈琵琶和法曲多在華清隨至尊是時天下太平久年年十月坐朝元千官起居環珮合萬國會同車馬奔金鈿照耀石甕寺蘭麝熏煮溫湯源貴妃宛轉侍君側體弱不勝珠翠繁冬雪飄颻錦袍暖春風蕩漾霓裳翻歡娛未足燕冦至弓徑馬肥胡語喧豳土人遷避夷狄鼎湖龍去哭軒轅從此漂淪落南土萬人死盡一身存秋風江上浪無限暮雨舟中酒一樽涸魚久失風波勢枯草曾沾雨露恩我自秦來君莫問驪山渭水如荒村新豐樹老籠明月長生殿暗鎖春雲紅葉紛紛蓋欹瓦緑苔重重封壞垣惟有中官作宫使每年寒食一開門前敘樂叟之言天寶舊事也後敘告樂叟之言亂後景象也俯仰今昔滿目蒼涼言外暗然欲絶樂叟未必實有其人特借以抒感慨之思耳醉後走筆酬劉五主簿長句之贈兼簡張大賈二十四先輩昆季劉兄文髙行孤立十五年前名翕習是時相遇在符離我年二十君三十得意忘年心迹親寓居同縣日知聞衡門寂寞朝尋我古寺蕭條暮訪君朝來暮去多攜手窮巷貧居何所有秋燈夜寫聨句詩春雪朝傾暖寒酒陴湖緑愛白鷗飛濉水清憐紅鯉肥偶語間攀芳樹立相扶醉踏落花歸張賈弟兄同里巷乘間數數來相訪雨天連宿草堂中月夜徐行石橋上我年漸長忽自驚鏡中冉冉髭鬚生心畏後時同勵志身牽前事各求名問我栖栖何所適鄉人薦為鹿鳴客二千里别謝交逰三十韻詩慰行役出門可憐惟一身弊裘瘦馬入咸秦鼕鼕街鼓紅塵暗晚到長安無主人二賈二張與余弟驅車邐迤來相繼操詞握賦為干戈鋒鋭森然勝氣多齊入文場同苦戰五人十載九登科二張得雋名居甲美退爭雄重告捷棠棣輝榮並桂枝芝蘭芬馥和荆葉惟有元犀屈未伸握中自謂駭雞珍三年不鳴鳴必大豈獨駭雞當駭人元和運啓千年聖同遇明時余最幸始辭祕閣吏王畿遽列諫垣升禁闈蹇步何堪鳴珮玉衰容不稱著朝衣閶闔晨開朝百辟冕旒不動香煙碧步登龍尾上虛空立去天顔無咫尺宫花似雪從乘輿禁月如霜坐直廬身賤每驚隨內宴才微常愧草天書晚松寒竹新昌第職居密近門多閉日暮銀臺下直回故人到門門暫開回頭下馬一相顧塵土滿衣何處來斂手炎涼敘未畢先説舊山今悔出岐陽旅宦少歡娛江左羇逰費時日贈我一篇行路吟吟之句句披沙金嵗月徒催白髮貌泥塗不屈青雲心誰會茫茫天地意短才獲用長才棄我隨鵷鷺入煙雲謬上丹墀為近臣君同鸞鳯棲荆棘猶著青袍作選人惆悵知賢不能薦徒為出入蓬萊殿月慚諫紙二百張嵗愧俸錢三十萬大抵浮榮何足道幾度相逄即身老且傾斗酒慰羇愁重話符離問舊逰北巷鄰居幾家去東林舊院何人住武里村花落復開流溝山色應如故感此酬君千字詩醉中分手又何之須知通塞尋常事莫歎浮沉先後時慷慨臨岐重相勉殷勤别後加餐飯君不見買臣衣錦還故鄉五十身榮未為晚七古長篇一氣盤旋不必刻意求竒自具大家風格非晚唐人寒儉迫促者所能到惆悵知賢不能薦四句自占身分極髙末段仍歸曠達是詩作於元和之初居易為左拾遺未幾即丐改官除京兆户曹參軍外出蓋立朝而道不行則奉身而退知愧者庶可無愧也畫竹歌并引協律郎蕭悅善畫竹舉時無倫蕭亦甚自祕重有終嵗求其一竿一枝而不得者知豫天與好事忽寫一十五竿惠然見投豫厚其意髙其藝無以答貺作歌以報之凡一百八十六字云植物之中竹難寫古今雖畫無似者蕭郎下筆獨逼真丹青以來惟一人人畫竹身肥擁腫蕭畫莖瘦節節竦人畫竹梢死羸垂蕭畫枝活葉葉動不根而生從意生不笋而成由筆成野塘水邊崎岸側森森兩叢十五莖嬋娟不失筠粉態蕭颯盡得風煙情舉頭忽看不似畫低耳靜聽疑有聲西叢七莖徑而健省向天竺寺前石上見東叢八莖疏且寒憶曾湘妃廟裏雨中看幽姿逺思少人别與君相顧空長歎蕭郎蕭郎老可惜手顫眼昏頭雪色自言便是絶筆時從今此竹尤難得波瀾意度直逼子美堂奧與香山平日面貌不類蓋有意規倣子美題畫諸作而為之者長恨歌漢皇重色思傾國御宇多年求不得楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側回眸一笑百媚生六宫粉黛無顔色春寒賜浴華清池溫泉水滑洗凝脂侍兒扶起嬌無力始是新承恩澤時雲鬢花顔金步搖笑蓉帳暖度春宵春宵苦短日髙起從此君王不早朝承歡侍宴無間暇春從春逰夜専夜後宫佳麗三千人三千寵愛在一身金屋妝成嬌侍夜玉樓宴罷醉和春姊妹弟兄皆列土可憐光彩生門户遂令天下父母心不重生男重生女驪宫髙處入青雲仙樂風飄處處聞緩歌慢舞凝絲竹盡日君王看不足漁陽鞞鼓動地來驚破霓裳羽衣曲九重城闕煙塵生千乘萬騎西南行翠華搖搖行復止西出都門百餘里六軍不發無奈何宛轉蛾眉馬前死花鈿委地無人收翠翹金雀玉搔頭君王掩面救不得回看血淚相和流黃埃散漫風蕭索雲棧縈紆登劎閣峨眉山下少人行旌旗無光日色薄蜀江水碧蜀山青聖主朝朝暮暮情行宫見月傷心色夜雨聞鈴腸斷聲天旋日轉回龍馭到此躊躇不能去馬嵬坡下泥土中不見玉顔空死處君臣相顧盡沾衣東望都門信馬歸歸來池苑皆依舊太液芙蓉未央栁芙蓉如面栁如眉對此如何不淚垂春風桃李花開夜秋雨梧桐葉落時西宫南苑多秋草落葉滿階紅不掃梨園子弟白髮新椒房阿監青蛾老夕殿螢飛思悄然孤燈挑盡未成眠遲遲鐘鼓初長夜耿耿星河欲曙天鴛鴦瓦冷霜華重翡翠衾寒誰與共悠悠生死别經年魂魄不曾來入夢臨卭道士鴻都客能以精誠致魂魄為感君王展轉思遂教方士殷勤覔排空馭氣奔如電升天入地求之遍上窮碧落下黃泉兩處茫茫皆不見忽聞海上有仙山山在虛無縹眇間樓閣玲瓏五雲起其中綽約多仙子中有一人字太真雪膚花貌參差是金闕西廂扣玉扄轉教小玉報雙成聞道漢家天子使九華帳裏夢魂驚攬衣推枕起徘徊珠箔銀屏邐迤開雲鬢半偏新睡覺花冠不整下堂來風吹仙袂飄颻舉猶似霓裳羽衣舞玉容寂寞淚闌干梨花一枝春帶雨含情凝睇謝君王一别音容兩渺茫昭陽殿裏恩愛絶蓬萊宫中日月長回頭下望人寰處不見長安見塵霧惟將舊物表深情鈿合金叉寄將去叉留一股合一扇叉擘黃金合分鈿但教心似金鈿堅天上人間會相見臨别殷勤重寄詞詞中有誓兩心知七月七日長生殿夜半無人私語時在天願作比翼鳥在地願為連理枝天長地久有時盡此恨綿綿無絶期從古女禍未有盛於唐者明皇踐阼覆轍匪逺開元勵精幾致太平天寶以後溺情牀第太真潛納新臺同譏艷妻煽處職為厲階倉皇播遷宗社再造幸也姚宋諸賢臣輔之而不足一太真敗之而有餘南內歸來儻返而自咎恨無終窮矣遑繫心於既殞傾城之婦耶長恨一傳自是當時傅會之説其事殊無足論者居易詩詞特妙情文相生沉鬱頓挫哀艷之中具有諷刺漢皇重色思傾國從此君王不早朝君王掩面救不得皆微詞也養在深閨人未識為尊者諱也欲不可縱樂不可極結想成因幻緣奚罄總以為發乎情而不能止乎禮義者戒也通首分四段漢皇重色思傾國至驚破霓裳羽衣曲暢敘楊妃擅寵之事却以漁陽鞞鼓動地來二句暗攝下意一氣直下滅去轉落之痕九重城闕煙塵生至夜雨聞鈴腸斷聲敘馬嵬賜死之事行宫見月傷心色二句暗攝下意蓋以幸蜀之靡日不思引起還京之倣徨念舊一直説去中間暗藏馬嵬改葬一節此行文飛渡法也天旋日轉回龍馭至魂魄不曾來入夢敘上皇南宫思舊之情悠悠生死别經年二句亦暗攝下意臨卭道士鴻都客至末敘方士招魂之事結處點清長恨為一詩結穴戞然而止全勢已足更不必另作收束陳鴻長恨歌傳曰開元中泰階平四海無事明皇在位嵗久倦於旰食宵衣政無大小始委於右丞相深居逰宴以聲色自娛先是元獻皇后武淑妃皆有寵相次即世宫中雖良家子千數無可悅目者上心忽忽不樂時每嵗十月駕幸華清宫內外命婦熠耀景從浴日餘波賜以湯沐春風靈液淡蕩其間上心油然若有顧遇左右前後粉色如土詔髙力士潛搜外宫得𢎞農楊元琰女於夀邸既笄矣鬒髮膩理纎穠中度舉止間冶如漢武帝李夫人别疏湯泉詔賜澡瑩既出水體弱力微若不任羅綺光彩煥發轉動照人上甚悅進見之日奏霓裳羽衣曲以導之定情之夕授金叉鈿合以固之又命戴步搖垂金璫明年册為貴妃半后服用繇是冶其容敏其詞婉孌萬態以中上意上益嬖焉時省風九州泥金五嶽驪山雪夜上陽春朝與上行同室宴専席寢専房雖有三夫人九嬪二十七世婦八十一御妻暨後宫才人樂府妓女使天子無顧盼意自是六宫無復進幸者非徒殊艷尤態致是蓋才智明慧善巧便佞先意希旨有不可形容者叔父昆弟皆列在清貫爵為通侯姊妹封國夫人富埒王室車服邸第與大長公主侔而恩澤勢力則又過之出入禁門不問京師長吏為側目故當時謡詠有云生女勿悲酸生男勿喜歡又曰男不封侯女作妃看女却為門上楣其人心羡慕如此天寶末兄國忠盜丞相位愚弄國柄及安祿山引兵向闕以討楊氏為詞潼關不守翠華南幸出咸陽道次馬嵬亭六軍徘徊持戟不進從官郎吏伏上馬前請誅錯以謝天下國忠奉氂纓盤水死於道周左右之意未快上問之當時敢言者請以貴妃塞天下怒上知不免而不忍見其死反袂掩面使牽之而去蒼黃展轉竟就絶於尺組之下既而明皇狩成都肅宗受禪靈武明年大凶歸元大駕還都尊明皇為太上皇就養南宫遷於西內時移事去樂盡悲來每至春之日冬之夜池蓮夏開宫槐秋落梨園弟子玉琯發音聞霓裳羽衣一聲則天顔不怡左右歔欷三載一意其念不衰求之魂夢杳不可得適有道士自蜀來知上皇心念楊妃如是自言有李少君之術明皇大喜命致其神方士乃竭其術以索之不至又能逰神馭氣出天界入地府以求之不見又旁求四虛上下東極大海跨蓬壺見最髙仙山上多樓闕西廂下有洞户東向闔其門署曰玉妃太真院方士抽簪扣扉有雙童女出應門方士造次未及言而雙鬟復入俄有碧衣侍女又至詰其所從方士因稱唐天子使者且致其命碧衣云玉妃方寢請少待之於時雲海沉沉洞天日晚瓊户重闔悄然無聲方士屏息斂足拱手門下久之而碧衣延入且曰玉妃出見一人冠金蓮披紫綃珮紅玉曳鳯舄左右侍者七八人揖方士問皇帝安否次問天寶十四年已還事言訖憫然指碧衣取金叉鈿合各析其半授使者曰為謝太上皇謹獻是物尋舊好也方士受辭與信將行色有不足玉妃固徵其意復前跪致詞請當時一事不為他人聞者驗於太上皇不然恐鈿合金叉負新垣平之詐也玉妃茫然退立若有所思徐而言之曰昔天寶十載侍輦避暑驪山宫秋七月牽牛織女相見之夕秦人風俗是夜張錦繡陳飲食樹瓜果焚香於庭號為乞巧宫掖間尤尚之夜殆半休侍衛於東西廂獨侍上上憑肩而立因仰天感牛女事密相誓心願世世為夫婦言畢執手各嗚咽此獨君王知之耳因自悲曰由此一念又不得居此復墮下界且結後緣或為天或為人決再相見好合如舊因言太上皇亦不久人間幸惟自安無自苦耳使者還奏太上皇皇心震悼日日不豫其年夏四月南宮晏駕元和元年冬十二月太原白樂天自校書郎尉於盩厔鴻與琅邪王質夫家於是邑暇日相携遊仙遊寺話及此事相與感歎質夫舉酒於樂天前曰夫希代之事非遇出世之才潤色之則與時消沒不聞於世樂天深於詩多於情者也試為歌之如何樂天因為長恨歌意者不但感於事亦欲懲尤物窒亂階垂於將來也歌既成使鴻傳焉世所不聞者豫非開元遺民不得知世所知者有明皇本紀在今但傳長恨歌云爾唐汝詢曰此譏明皇迷於色而不悟也始則求其人而未得既得而愛幸之即淪惑而不復理朝政矣不獨寵妃一身而又遍及其宗黨不惟不復早朝益且盡日耽於絲竹以致祿山倡亂乘輿播遷帝既誅妃以謝天下則宜悔過乃復展轉懷思不能自絶至令方士遍索其神得鈿合金叉而不辨其詐是真迷而不悟者矣吁以五十年致治之主而一女子覆其成功權去勢詘而以憂死悲夫女寵之禍豈淺鮮哉花鈿委地無人收伏後鈿合金叉案意者妃就絶之時花鈿散逸民間必有得之者方士特挾此以欺上皇非有他術也詩人王屑曰峨眉山下少人行峨眉在嘉州與幸蜀全無交涉乃文章之病也汪立名曰按隱居詩話云唐人咏馬嵬事多矣世所稱白居易六軍不發無奈何宛轉蛾眉馬前死此乃歌詠祿山能使官兵叛逼追明皇不得已而誅楊妃也豈特不曉文章體裁而造語蠢拙抑亦失臣下事君之禮老杜則不然其北征詩曰不聞夏殷衰中自誅褒妲乃見明皇鑒夏商之敗畏天悔禍賜妃子以死官軍何與焉此論為推尊少陵則可若以此貶樂天則不可論詩須相題長恨歌本與陳鴻王質夫話楊妃始終而作猶慮詩有未詳陳鴻又作長恨歌傳所謂不特感其事亦欲懲尤物窒亂階垂於將來也自與北征詩不同若諱馬嵬事實則長恨二字便無著落矣讀書全不理會作詩本末而執片詞肆議古人已屬太過至謂歌詠祿山能使官軍云云則尤近乎煆鍊矣宋人多文字吹求之禍皆釀於此等議論若唐人作詩本無所謂忌諱忠厚之風自可慕也然陳傳中敘貴妃進於夀邸而白詩諱之但云楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側安得謂樂天不知文章大體耶倘有祖其謬以羅織少陵者必將以少陵憶昔詩張后不樂天子忙句為失以臣事君之禮百官跣足隨天王句為歌詠吐蕃追逼代宗又豈通論乎琵琶引并序元和十年豫左遷九江郡司馬明年秋送客湓浦口聞船中夜彈琵琶者聽其音錚錚然有京都聲問其人本長安倡女嘗學琵琶於穆曹二善才年長色衰委身為賈人婦遂命酒使快彈數曲曲罷憫默自敘少小時歡樂事今漂淪憔悴轉徙於江湖間豫出官二年恬然自安感斯人言是夕始覺有遷謫意因為長句歌以贈之凡六百一十二言命曰琵琶行潯陽江頭夜送客楓葉荻花秋瑟瑟主人下馬客在船舉酒欲飲無管弦醉不成歡慘將别别時茫茫江浸月忽聞水上琵琶聲主人忘歸客不發尋聲暗問彈者誰琵琶聲停欲語遲移船相近邀相見添酒回燈重開宴千呼萬喚始出來猶抱琵琶半遮面轉軸撥弦三兩聲未成曲調先有情弦弦掩抑聲聲思似訴平生不得意低眉信手續續彈説盡心中無限事輕攏慢撚抹復挑初為霓裳後六么大弦嘈嘈如急雨小弦切切如私語嘈嘈切切錯雜彈大珠小珠落玉盤間關鶯語花底滑幽咽泉流水下灘水泉冷澀弦疑絶疑絶不通聲暫歇别有幽愁暗恨生此時無聲勝有聲銀瓶乍破水漿迸鐵騎突出刀鎗鳴曲終收撥當心畫四弦一聲如裂帛東船西舫悄無言惟見江心秋月白沉吟放撥插弦中整頓衣裳起斂容自言本是京城女家在蝦蟇陵下住十三學得琵琶成名屬教坊第一部曲罷曾教善才伏妝成每被秋娘妬五陵年少爭纒頭一曲紅綃不知數鈿頭雲箆擊節碎血色羅裙翻酒汚今年歡笑復明年秋月春風等間度弟走從軍阿姨死暮去朝來顔色故門前冷落鞍馬稀老大嫁作商人婦商人重利輕别離前月浮梁買茶去去來江口守空船繞船月明江水寒夜深忽夢少年事夢啼妝淚紅闌干我聞琵琶已歎息又聞此語重唧唧同是天涯淪落人相逢何必曾相識我從去年辭帝京謫居卧病潯陽城潯陽地僻無音樂終嵗不聞絲竹聲住近湓江地低濕黃蘆苦竹繞宅生其間旦暮聞何物杜鵑啼血猿哀鳴春江花朝秋月夜往往取酒還獨傾豈無山歌與村笛嘔啞嘲哳難為聽今夜聞君琵琶語如聽仙樂耳暫明莫辭更坐彈一曲為君翻作琵琶行感我此言良久立却坐促弦弦轉急淒淒不似向前聲滿座重聞皆掩泣座中泣下誰最多江州司馬青衫濕滿腔遷謫之感借商婦以發之有同病相憐之意焉比興相緯寄托遙深其意微以顯其音哀以思其辭麗以則十九首云清商隨風發中曲正徘徊一彈再三歎慷慨有餘哀及杜甫觀公孫大娘弟子舞劎器行與此篇同為千秋絶調不必以古近前後分也容齋五筆曰白公琵琶行讀者但羡其風致敬其詞章至形於樂府歌詠之不足遂以謂真為長安故倡而作不知直欲攄寫天涯淪落之恨爾唐汝詢曰此宦逰不遂因琵琶以托興也言當清秋明月之夜聞琵琶哀怨之音聽商婦自敘之苦以動我逐臣久客之懷宜其泣下沾襟也藝苑雌黃曰家在蝦蟆陵下住按國史補云舊説董仲舒墓門下人至者皆下馬故謂之下馬陵語訛為蝦蟆陵故東坡詩云隻雞敢忘喬公語下馬聊尋董相墳又謝徐朝奉啓云過而下馬空瞻董相之陵蓋用此事郭氏佩觿亦嘗論此云長安董仲舒墓名曰下馬陵今轉語為蝦蟆陵事出黃京紀白氏琵琶行蓋徇俗之過也醉後狂言酬贈蕭殷二協律餘杭邑客多羇貧其間甚者蕭與殷天寒身上猶衣葛日髙甑中未拂塵江城山寺十一月北風吹沙雪紛紛賓客不見綈袍惠黎庶未沾襦袴恩此時太守自慚愧重衣復衾有餘溫因命染人與針女先製兩裘贈二君吳綿細軟桂布密柔如狐腋白似雲勞將詩書投贈我如此小惠何足論我有大裘君未見寬廣和暖如陽春此裘非繒亦非纊裁以法度絮以仁刀尺鈍拙製未畢出亦不獨裹一身若令在郡得五考與君展覆杭州人即杜甫廣厦千萬間意而暢言之前段黎庶未沾𥜗袴恩句已伏後意末段又推廣一層淋漓暢竭言大而非誇也秋江晚泊扁舟泊雲島倚棹念鄉國四望不見人煙江淡秋色客心貧易動日入愁未息代書詩一百韻寄微之憶在貞元嵗初登典校司身名同日授心事一言知肺腑都無隔形骸兩不羇疏狂屬年少間散為官卑分定金蘭契言通藥石規交賢方汲汲友直每偲偲有月多同賞無杯不共持秋風拂琴匣夜雪卷書帷髙上慈恩塔幽尋皇子陂唐昌玉蕊會崇敬牡丹期笑勸迂辛酒間吟短李詩儒風愛敦質佛理賞玄師自注辛立度李紳劉敦質庾玄師度日曾無悶通宵靡不為雙聲聨律句八面對宫棋往往逰三省騰騰出九逵寒銷直城路春到曲江池樹暖枝條弱山晴彩翠奇峯攢石緑點栁宛麴塵絲岸草煙鋪地園花雪壓枝早光紅照耀新溜碧逶迤幄幕侵堤布盤筵占地施徵伶皆絶藝選妓悉名姬鉛黛凝春態金鈿耀水嬉風流誇墮髻時世鬭啼眉密坐隨歡促華尊逐勝移香飄歌袂動翠落舞叉遺籌插紅螺碗觥飛白玉巵打嫌調笑易飲訝卷波遲殘席喧譁散歸鞍酩酊騎酡顔烏帽側醉袖玉鞭垂紫陌傳鐘鼓紅塵塞路岐幾時曾暫别何處不相隨荏苒星霜換回環節候催兩衙多請告三考欲成資運啓千年聖天成萬物宜皆當少壯日同惜盛明時光景嗟虛擲雲霄竊暗窺攻文朝矻矻講學夜孜孜䇿目穿如札毫鋒鋭若錐繁張獲鳥網堅守釣魚坻並受夔龍薦齊陳朝董詞萬言經濟略三䇿太平基中第爭無敵專場戰不疲輔車排勝陳犄角搴降旗雙闕紛容衛千僚儼等衰恩隨紫泥降名向白麻披既在髙科選還從好爵縻東垣君諫諍西邑我驅馳再喜登烏府多慚侍赤墀官班分內外逰處遂參差每列鵷鸞序偏瞻獬豸姿簡威霜凜洌衣彩繡葳蕤正色推強禦剛腸嫉喔咿常憎持祿位不擬保妻兒養勇期除惡輸忠在滅私下鞲驚燕雀當道懾狐狸南國人無怨東臺吏不欺理寃多定國切諫幸辛毗造次行於是平生志在兹道將心共直言與行兼危水暗波翻覆山藏路險巇未為明主識已被幸臣疑木秀遭風折蘭芳遇霰萎千鈞勢易壓一柱力難搘騰口因成痏吹毛遂得疵憂來吟貝錦謫去詠江蘺邂逅塵中遇殷勤馬上辭賈生離魏闕王粲向荆夷水過清源寺山經綺里祠心搖漢皋珮淚墮峴亭碑驛路緣雲際城樓枕水湄思鄉多繞澤望闕獨登陴林晚青蕭索江平緑渺瀰野秋鳴蟋蟀沙冷聚鸕鷀官舍黃茅屋人家苦竹籬白醪充夜酌紅粟備晨炊寡鶴摧風翮鰥魚失水鬐暗雛啼渴旦涼葉墮相思一點寒燈滅三聲曉角吹藍衫經雨故驄馬卧霜羸念涸誰濡沫嫌醒自啜醨耳垂無伯樂舌在有張儀負氣衝星劎傾心向日葵金言自銷鑠玉性肻磷緇伸屈須看蠖窮通莫問龜定知身是患應用道為醫想子令如彼嗟豫獨在斯無憀當嵗杪有夢到天涯坐阻連襟帶行乖接履綦潤銷衣上霧香散室中芝念逺緣遷貶驚時為别離素書三往復明月七盈虧舊里非難到餘歡不可追樹依興善老草傍靜安衰前事思如昨中懷寫向誰北村尋古柏南宅訪辛夷此日空搔首何人共解頤病多知夜永年長覺秋悲不飲長如醉加餐亦似飢狂吟一千字因使寄微之長律百韻始於杜甫夔府詠懷一篇繼之者元微之白居易居易集中百韻詩凡三篇杜甫排奡沉鬱局陳變化其才氣筆力自非居易所及居易法律井然條暢流美實可為後來之法學者未能窺杜之閫奧且從此種問津自無艱澀淩亂之病馮班曰勻細整贍力自有餘長詩有敘置次第起承轉合不可不知却拘不得須變化飛動為佳此篇勻整之至却細膩省淨無疊辭纍句妃紅嫓紫之病長詩忌詞太煩如此最善和談校書秋夜感懷呈朝中規友遙夜涼風楚客悲清砧繁漏月髙時秋霜似鬢年空長春草如袍位尚卑詞賦擅名來已久煙霄得路去何遲漢庭卿相皆知已不薦揚雄欲薦誰清脆瀏亮古詩青袍似春草庾信賦亦云青袍如草第四句妙於翻用感秋寄逺惆悵時節晚兩情千里同離憂不散處庭樹正秋風燕影動歸翼蕙香銷故叢佳期與芳嵗牢落兩成空律法整嚴尚與盛唐相近腹聨已開晚唐李商隱一𣲖春題華陽觀自注觀即華陽公主故宅有舊內人存馬帝子吹簫逐鳯凰空留仙洞號華陽落花何處堪惆悵頭白宫人掃影堂縣西郊秋寄贈馬造紫閣峯西清渭東野煙深處夕陽中風荷落葉蕭條緑水蓼殘花寂寞紅我厭宦逰君失意可憐秋思兩心同前四句寫景極簫瑟之致結出懷人意自然早春獨逰曲江自注時為校書郎散職無羈束羸驂少送迎朝從直城出春傍曲江行風起池東暖雲開山北晴氷銷泉脈動雪盡草芽生露杏紅初坼煙楊緑未成影遲新度雁聲澀欲啼鶯間地心俱靜韶光眼共明酒狂憐性逸藥效喜身輕慵慢疏人事幽棲逐野情回看藝閣笑不似有浮名中三聨刻畫早春之景細膩清新江南送北客因憑寄徐州兄弟書時年十五故園望斷欲何如楚水吳山萬里餘今日因君訪兄弟數行鄉淚一封書御選唐宋詩醇卷二十二
