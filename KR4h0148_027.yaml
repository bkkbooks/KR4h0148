  text: 欽定四庫全書御選唐宋詩醇卷十二
  hash: sha256:01fae3cbe41f42aabcd5a1ec657c6ff54400c9514fd09e75f89a5b7dd584f2ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_027-1a, image: WYG1448/WYG1448-0272c.png}
body:
  text: 襄陽杜甫詩四雨空山中宵陰微冷先枕席回風起清曙萬象萋已碧落落出岫雲渾渾倚天石日假何道行雨含長江白連檣荆州船有士荷矛㦸南防草鎮慘霑濕赴逺役羣盜下辟山總戎備强敵水深雲光廓鳴櫓各有適漁艇息悠悠夷歌負樵客留滯一老翁書時記朝夕王嗣奭曰公憂旱詩云上天鑠金石羣盜亂豺虎今雖得雨而復憂盜上一章憂吳楚之盜故恐逺客難行此章憂峽中之盜故憐士卒勞役又上後園山腳昔我遊山東憶戲東嶽陽窮秋立日觀矯首望八荒朱崖著毫髮碧海吹衣裳蓐收困用事𤣥冥蔚强梁逝水自朝宗鎮名各其方平原獨憔悴農力廢耕桑非關風露凋曾是戍役傷於時國用富足以守邊疆朝廷任猛將逺奪戎虜場到今事反覆故老淚萬行龜䝉不復見况乃懷舊鄉肺萎屬久戰骨出熱中腸憂來杖匣劔更上林北岡瘴毒猿鳥落峽乾南日黃秋風亦已起江漢始如湯登髙欲有往蕩析川無梁哀彼逺征人去家死路旁不及祖父塋纍纍塜相當劉㑹孟曰情緒闊逺收拾悲慟種萵苣并序既雨已秋堂下理小畦隔種一兩席許萵苣向二旬矣而苣不甲坼獨野莧青青傷時君子或晚得微祿轗軻不進因作此詩陰陽一錯亂驕蹇不復理枯旱於其中炎方慘如燬植物半蹉跎嘉生將已矣雲雷歘奔命師伯集所使指麾赤白日澒洞青光起雨聲先已風散足盡西靡山泉落滄江霹靂猶在耳終朝紆颯沓信宿罷瀟灑堂下可以畦呼童對經始苣兮蔬之常隨事藝其子破塊數席間荷鋤功易止兩旬不甲坼空惜埋泥滓野莧迷汝來宗生實於此此輩豈無秋亦䝉寒露委翻然出地速滋蔓户庭毁因知邪干正掩抑至沒齒賢良雖得祿守道不封已擁塞敗芝蘭衆多盛荆杞中園陷蕭艾老圃永為恥登於白玉盤藉以如霞綺莧也無所施胡顔入筐篚以上諸篇皆羇旅無聊中即景遣懷紀細事寫憂心而已然規模既大波瀾自逺每一篇中莫不俯仰今昔推通物理言近而指則逺語質而思則深論者所云不作諸家細碎詩也劉協云人稟七情應物斯感感物吟志莫非自然此之諸篇殆亦自然流露者矣故能藏風韻於荒凉寓髙華於懇朴若儲王田家詩但寫情景當別有位置不可與此並論髙元之曰自古工詩者未嘗無興也覩物有感則有興今之作詩以興近乎訕也故不敢作而詩之一義廢矣杜萵苣詩皆興小人盛而掩抑君子也髙適題處士園云耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者知興之與訕異殆可與言詩浦起龍曰當與菁莪巷伯諸詩並讀人知好前後出塞三吏三別等篇不知好此種彼為漢魏之後徑此為風雅之希聲八哀詩并序傷時盜賊未息興起王公李公歎舊懷賢終於張相國八公前後存沒遂不詮次焉贈司空王公思禮司空出東夷童稚刷徑翮追隨燕薊兒頴鋭物不隔服事哥舒翰意無流沙磧未甚拔行間犬戎大充斥短小精悍姿屹然强寇敵貫穿百萬衆出入由咫尺馬鞍懸將首甲外控鳴鏑洗劔青海水刻銘天山石九曲非外蕃其王轉深壁飛不近駕鷙鳥資逺擊曉達兵家流飽聞春秋癖胸襟日沉靜肅肅自有適潼關初潰散萬乘猶辟易偏裨無所施元帥見手格太子入朔方至尊狩梁益胡馬纒伊洛中原氣甚逆肅宗登寶位塞望勢敦迫公時徒步至請罪將厚責際㑹清河公間道傳玉册天王拜跪畢讜議果冰釋翠華卷飛雪熊虎亘阡陌屯兵鳯凰山帳殿涇渭闢金城賊咽喉詔鎮雄所扼禁暴清無雙爽氣春淅瀝巷有從公歌野多青青麥及夫哭廟後復領太原役恐懼祿位髙悵望王土窄不得見清時嗚呼就窀穸永繫五湖舟悲甚田橫客千秋汾晉間事與雲水白昔觀文苑傳豈述廉藺績嗟嗟鄧大夫士卒終倒㦸故司徒李公光弼司徒天寶末北收晉陽甲胡騎攻吾城愁寂意不愜人安若泰山薊北斷右脅朔方氣乃蘇黎首見帝業二宫泣西郊九廟起頽壓未散河陽卒思明僞臣妾復自碣石來火焚乾坤獵髙視笑祿山公又大獻捷異王册崇勳小敵信所怯擁兵鎮河汴千里初妥帖青蠅紛營營風雨秋一葉內省未入朝死淚終映睫大屋去髙棟長城掃遺堞平生白羽扇零落蛟龍匣雅望與英姿惻愴槐里接三軍晦光彩烈士痛稠疊直筆在史臣將來洗箱篋吾思哭孤冡南紀阻歸楫扶顛永蕭條未濟失利涉疲苶竟何人灑涕巴東峽王李名將實為起興所由李功業尢隆二篇氣魄沉摯最為精彩劉克莊曰語極悲壯其形容臨淮憂讒畏譏不敢入朝之意獨見分曉贈左僕射鄭國公嚴公武鄭公瑚璉器華嶽金天晶昔在童子日已聞老成名嶷然大賢後復見秀骨清開口取將相小心事友生閲書百紙盡落筆四座驚歷職匪父任嫉邪常力爭漢儀尚整肅胡騎忽縱橫飛傳自河隴逢人問公卿不知萬乘出雲涕風悲鳴受詞劔閣道謁帝蕭關城寂寞雲臺仗飄颻沙塞旌江山少使者笳鼓凝皇情壯士血相視忠臣氣不平密論貞觀體揮發岐陽征感激動四極聨翩收二京西郊牛酒再原廟丹青明匡汲俄寵辱衛霍竟哀榮四登㑹府地三掌華陽兵京兆空栁色尚書無履聲羣烏自朝夕白馬休橫行諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕記室得何遜韜鈐延子荆四郊失壁壘虛館開逢迎堂上指圖畫軍中吹玉笙豈無成都酒憂國只細傾時觀錦水釣問俗終相并意待犬戎滅人藏紅粟盈以兹報主願庶或裨世程炯炯一心在沉沉二竪嬰顔回竟短折賈誼徒忠貞飛旐出江漢孤舟轉荆衡虛無馬融笛悵望龍驤塋空餘老賔客身上愧簮纓嚴武鎮蜀雖多不法然在蜀而蜀安去蜀而蜀危以其去來為輕重則道其實也且武於甫最為知已故極寫其忠勤大略諸將詩云軍令分明數舉杯亦同此意贈太子太師汝陽郡王璡汝陽讓帝子眉宇真天人虬鬚似太宗色映塞外春往者開元中主恩視遇頻出入獨非時禮異見羣臣愛其謹潔極倍此骨肉親從容聽朝後或在風雪晨忽思格猛獸苑囿騰清塵羽旗動若一萬馬肅侁侁詔王來射雁拜命已挺身箭出飛鞚內上又回翠麟翻然紫塞翮下拂明月輪胡人雖獲多天笑不為新王每中一物手自與金銀袖中諫獵書扣馬久上陳竟無銜橛虞聖聰矧多仁官免供給費水有在藻鱗匪唯帝老大皆是王忠勤晚年務置醴門引申白賔道大容無能永懷侍芳茵好學尚貞烈義形必霑巾揮翰綺繡揚篇什若有神川廣不可泝墓久狐鄰宛彼漢中郡文雅見天倫何以開我悲泛舟俱逺津溫溫昔風味少壯已書紳舊遊易磨滅衰謝增酸辛贈祕書監江夏李公雍長嘯宇宙間髙才日陵替古人不可見前輩復誰繼憶昔李公存詞林有根柢聲華當健筆灑落富清製風流散金石追琢山嶽鋭情窮造化理學貫天人際干謁走其門碑版照四裔各滿深望還森然起凡例蕭蕭白楊路洞徹寶珠惠龍宫塔廟湧浩劫浮雲衛宗儒爼豆事故吏去思計眄睞已皆虛跋涉曽不泥向來映當時豈獨勸後世豐屋珊瑚鈎騏驎織成罽紫騮隨劔几義取無虛歲分宅脫驂間感激懷未濟衆歸賙給美擺落多藏穢獨步四十年風聽九臯唳嗚呼江夏姿竟掩宣尼袂往者武后朝引用多寵嬖否臧太常議面折二張勢衰俗凛生風排蕩秋旻霽忠貞負寃恨宫闕深旒綴放逐早聨翩低垂困炎厲日斜鵩鳥入魂斷蒼梧帝榮枯走不暇星駕無安稅幾分漢廷竹夙擁文侯篲終悲洛陽獄事近小臣敝禍階初負謗易力何深嚌伊昔臨淄亭酒酣托末契重叙東都別朝陰改軒砌論文到崔蘇指盡流水逝近伏盈川雄未甘特進麗是非張相國相扼一危脆爭名古豈然關鍵歘不閉例及吾家詩曠懷掃氛翳慷慨嗣真作咨嗟玉山桂鍾律儼髙縣鯤鯨噴迢遰坡陀青州血蕪沒汶陽瘞哀贈竟蕭條恩波延揭厲子孫存如線舊客舟凝滯君臣尚論兵將帥接燕薊朗咏六公篇憂來豁䝉蔽仇兆鼇曰各章以序事成文部署森嚴純似班史惟此章感慨激昻排蕩變化直追龍門之筆細按其前後段落又未嘗不脉絡整齊也故祕書少監武功蘇公源明武功少也孤徒步客徐兖讀書東嶽中十載考墳典時下萊蕪郭忍饑浮雲巘負米晚為身每食臉必泫夜字照爇薪垢衣生碧蘚庶以勤苦志報兹劬勞顯學蔚醇儒姿文包舊史善灑落辭幽人歸來潛京輦射君東堂䇿宗匠集精選制可題未乾乙科已大闡文章日自負吏祿亦纍踐晨趨閶闔內足踏宿昔趼一麾出守還黃屋朔風卷不暇陪八駿虜庭悲所遣平生滿樽酒斷此朋知展憂憤病二秋有恨石可轉肅宗復社稷得無逆順辨范曄顧其兒李斯憶黃犬祕書茂松意溟漲本末淺青熒芙蓉劔犀兕豈獨剸反為後輩䙝豫實苦懷緬煌煌齊房芝事絶萬手搴垂之俟來者正始徴勸勉不要懸黃金胡為投乳贙結交三十載吾與誰遊衍滎陽復冥寞罪罟已橫罥嗚呼子逝日始泰則終蹇長安米萬錢凋喪盡餘喘戰伐何當解歸帆阻清沔尚纒漳水疾永負蒿里餞故著作郎貶台州司户滎陽鄭公䖍鶢鶋至魯門不識鐘鼓饗孔翠望赤霄愁思雕籠養滎陽冠衆儒早聞名公賞地崇士大夫況乃氣精爽原注往者公在疾蘇許公頲位尊望重素未相識早愛才名躬自撫問後結忘年之契逺邇嘉之天然生知姿學立游夏上神農極闕漏黃石愧師長藥纂西極名原注公著薈蕞等諸書之外又撰胡本草七卷兵流指諸掌貫穿無遺恨薈蕞何技癢圭臬星經奧蟲篆丹青廣子雲窺未遍方朔諧太枉神翰顧不一體變鍾兼兩文傳天下口大字猶在榜昔獻書畫圖新詩亦俱往滄洲動玉陛寡鶴誤一響三絶自御題四方尤所仰嗜酒益疏放彈琴視天壤形骸實土木親近唯几杖未曾寄官書突兀倚書幌晚就藝香閣胡塵昏坱莽反覆歸聖朝㸃染無滌蕩老䝉台州椽泛泛浙江槳履穿四明雪饑拾楢溪橡空聞紫芝歌不見杏壇丈天長眺東南秋色餘魍魎別離慘至今斑白徒懷曩春深秦山秀葉墜清渭朗劇談王公門野稅林下鞅操紙終夕酣時物集遐想詞場竟疏闊平昔濫吹奬百年見存沒牢落吾安放蕭條阮咸在出處同世網他日訪江樓含悽述飄蕩原注著作與今祕書監鄭君審篇翰齊價謫江陵故有阮咸江樓之句王士正曰百年見存沒牢落吾安放十字悲甚故右僕射相國張公九齡相國生南紀金璞無留礦仙鶴下人間獨立霜毛整矯然江海思復與雲路永寂寞想土階未遑等箕潁上君白玉堂倚君金華省碣石歲崢嶸天地日蛙黽退食吟大庭何心記榛梗骨驚畏曩哲鬒變負人境雖䝉換蟬冠右地恧多幸敢忘二疏歸痛迫蘇耽井紫綬映暮年荆州謝所領庾公興不淺黃霸鎮每靜賔客引調同諷詠在務屏詩罷地有餘篇終語清省一陽發陰管淑氣含公鼎乃知君子心用才文章境散帙起翠螭倚薄巫廬並綺麗𤣥暉擁箋誄任昉騁自我一家則未缺隻字警千秋滄海南名繫朱鳥影歸老守故林戀闕悄延頸波濤良史筆蕪絶大庾嶺向時禮數隔制作難上請再讀徐孺碑猶思理烟艇子美八哀自是巨篇然以韻語作叙述情緒既繁筆墨不無利鈍大家之文正如黃河之水滔滔莾莾魚龍砂石與流俱下非如沼沚之觀清泠可喜而已論此詩者譽之或過其實毁之或損其真惟盧世㴶曰八哀詩未免傷煩傷泛然詩家之元氣在焉杜詩之體統存焉不可遺亦不容選斯言得之劉克莊曰八哀詩崔德符謂可以表裏雅頌中古作者莫及韓子蒼謂其筆力變化當與太史公諸贊方駕惟葉石林謂長篇最難晉魏以前無過十韻常使人以意逆志初不以叙事顛倒為工此八篇本非集中髙作而世多尊稱不敢置議其病蓋傷於多如李雍蘇源明篇中多纍句芟去方為盡善余謂韓比此於史公紀傳固不易之論至於石林之評纍句為長篇者亦不可不知寫懷勞生共乾坤何處異風俗冉冉自趨競行行見羈束無貴賤不悲無富貧亦足萬古一骸骨鄰家遞歌哭鄙夫到巫峽三歲如轉燭全命甘留滯忘情任榮辱朝班及暮齒日給還脫粟編蓬石城東採藥山北谷用心霜雪間不必條蔓緑非關故安排曽是順幽獨達士如弦直小人似鈎曲曲直我不知負暄候樵牧貌古心逺見道之言非關矯語觀公孫大娘弟子舞劔器行并序大歷二年十月十九日䕫府別駕元持宅見臨潁李十二娘舞劔器壯其蔚跂問其所師曰余公孫大娘弟子也開元三載余尚童稚記於郾城觀公孫氏舞劔器渾脫瀏灕頓挫獨出冠時自髙頭宜春梨園二伎坊內人洎外供奉曉是舞者聖文神武皇帝初公孫一人而已玉貌錦衣況余白首今兹弟子亦非盛顔既辨其由來知波瀾莫二撫事慷慨聊為劔器行往者吳人張旭善草書書帖數常於鄴縣見公孫大娘舞西河劔器自此草書長進豪蕩感激即公孫可知矣昔有佳人公孫氏一舞劔器動四方觀者如山色沮喪天地為之久低昻㸌如羿射九日落矯如羣帝驂龍翔來如雷霆收震怒罷如江海凝清光絳唇珠袖兩寂寞况有弟子傳芬芳臨潁美人在白帝妙舞此曲神揚揚與余問答既有以感時撫事增惋傷先帝侍女八千人公孫劔器初第一五十年間似反掌風塵澒洞昏王室梨園子弟散如烟女樂餘姿映寒日金粟堆南木已拱瞿唐石城草蕭瑟玳筵急管曲復終樂極哀來月東出老夫不知其所往足繭荒山轉愁疾前如山之嶙峋後如海之波瀾前半極其濃至後半感嘆音響一何悲絃急知柱促也劉克莊曰此篇與琵琶行一如壯士軒昻赴敵場一如兒女恩怨相爾汝王嗣奭曰此見舞劔器而傷往事全是為開元天寶五十年間治亂興衰而發王士正曰陳暘樂書云樂府諸曲自古不用犯聲自則天末年劔器入渾脫為犯聲之始劔器宫調渾脫商調以臣犯君故為犯聲又唐多用解曲如柘枝用渾脫解之類觀此則劔器渾脫各為舞曲之名今人誤讀杜序以渾脫瀏灕頓挫六字為句文字中往往連綴用之可笑也同元使君舂陵行并序覽道州元使君結舂陵行兼賊退後示官吏作二首志之曰當天子分憂之地效漢官良吏之目今盜賊未息知民疾苦得結輩十數公落落然參錯天下為邦伯萬物吐氣天下少安可得矣不意復見比興體制微婉頓挫之詞感而有詩增諸卷軸簡知我者不必寄元遭亂髮盡白轉衰病相嬰沉綿盜賊際狼狽江漢行歎時藥力薄為客羸瘵成吾人詩家秀博采世上名粲粲元道州前聖畏後生觀乎舂陵作歘見俊哲情復覽賊退篇結也實國楨賈誼昔流慟匡衡常引經道州憂黎庶詞氣浩縱橫兩章對秋月一字偕華星致君唐虞際純朴憶大庭何時降璽書用爾為丹青獄訟永衰息豈唯偃甲兵悽惻念誅求薄斂近休明乃知正人意不茍飛長纓涼飈振南嶽之子寵若驚色阻金印大興含滄浪清我多長卿病日夕思朝廷肺枯渴太甚漂泊公孫城呼兒具紙筆隱几臨軒楹作詩呻吟內墨淡字欹傾感彼危苦詞庶幾知者聽悃愊無華之吏日計不足歲計有餘不肖者橫征暴斂掊削元氣為民蟊賊古之賢君所以惓惓於良二千石也甫此篇所謂干預教化之尤者元結二詩仁者之言可以並垂不朽元結舂陵行序云癸卯歲漫叟授道州刺史道州舊四萬餘户經賊已來不滿四千大半不勝賦稅到官未五十日承諸使徴求符牒二百餘封皆曰失其限者罪至貶削於戲若悉應其命則州縣破亂刺史欲焉逃罪若不應命又即獲罪戾必不免也吾將守官靜以安人待罪而已此州是舂陵故地故作舂陵行以達下情詩曰軍國多所須切責在有司有司臨郡縣刑法竟欲施供給豈不憂徴斂又可悲州小經亂亡遺人實困疲大鄉無十家大族命單羸朝飱是草根暮食乃樹皮出言氣欲絶意速行步遲追呼尚不忍况乃鞭撲之郵亭傳急符來往迹相追更無寬大恩但有迫促期欲令鬻兒女言發恐亂隨悉使索其家而又無生資聽彼道路言怨傷誰復知去冬山賊來殺奪幾無遺所願見王官撫飬以惠慈奈何重驅逐不使存活為安人天子命符節吾所持州縣忽亂亡得罪復是誰逋緩違詔令䝉責固所宜前賢重守分惡以禍福移亦云貴守官不愛能適時顧唯孱弱者正直當不虧何人採國風吾欲獻此辭又賦退示官吏序云癸卯歲西原賊入道州殺掠幾盡而去明年賊又攻永破邵不犯此州邊鄙而退豈力能制敵蓋䝉其傷憐而已諸使何為忍苦徴斂故作詩一篇以示官吏詩曰昔歲逢太平山林二十年泉源在庭户洞壑當門前井稅有常期日晏猶得眠忽然遭世變數歲親戎旃今來典斯郡山夷又紛然城小賊不屠人貧傷可憐是以陷鄰境此州獨見全使臣將王命豈不如賊焉今彼徴斂者迫之如火煎誰能絶人命以作時世賢思欲委符節引竿自刺船將家就魚菱窮老江湖邊李潮八分小篆歌蒼頡鳥跡既茫昧字體變化如浮雲陳倉石鼓又已訛大小二篆生八分秦有李斯漢蔡雍中間作者寂不聞嶧山之碑野火焚棗木傳刻肥失真苦縣光和尚骨立書貴瘦硬方通神惜哉李蔡不復得吾甥李潮下筆親尚書韓擇木騎曹蔡有鄰開元已來數八分潮也奄有二子成三人况潮小篆逼秦相快劔長㦸森相向八分一字直百金蛟龍盤拏肉屈强吳郡張顛誇草書草書非古空雄壯豈如吾甥不流宕丞相中郎丈人行巴東逢李潮逾月求我歌我今衰老才力薄潮乎潮乎奈汝何論書皆中肯綮坡老云杜陵評書貴瘦硬此論未公吾不憑特借作跌宕耳非遂不許其論也詩亦瘦硬無比聽楊氏歌佳人絶代歌獨立發皓齒滿堂慘不樂響下清虛裏江城帶素月况乃清夜起老夫悲暮年壯士淚如水玉杯久寂寞金管迷宫徴勿云聽者疲愚智心盡死古來傑出士豈待一知已吾聞昔秦青傾側天下耳荆南兵馬使太常卿趙公大食刀歌太常樓船聲嗷嘈問兵刮寇趨下牢牧出令奔飛百艘猛蛟突獸紛騰逃白帝寒城駐錦袍𤣥冬示我胡國刀壯士短衣頭虎毛憑軒拔鞘天為髙翻風轉日木怒號冰翼雪淡傷哀猱鐫錯碧罌鸊鵜膏鋩鍔已瑩虛秋濤鬼物撇捩辭坑壕蒼水使者捫赤絛龍伯國人罷釣鰲芮公回首顔色勞分閫救世用賢豪趙公玉立髙歌起攬環結佩相終始萬歲持之護天子得君亂絲與君理蜀江如線如針水荆岑彈丸心未已賊臣惡子休干紀魑魅魍魎徒為耳妖腰亂領敢欣喜用之不髙亦不庳不似長劔須天倚吁嗟光祿英雄弭大食寶刀聊可比丹青宛轉麒麟裏光芒六合無泥滓王嗣奭曰此燕歌行變體布局既新鍊詞特異所謂驚人之作王兵馬使二角鷹悲臺蕭颯石巃嵸哀壑杈丫浩呼洶中有萬里之長江回風滔日孤光動角鷹翻倒壯士臂將軍玉帳軒勇氣二鷹猛腦絛徐墜目如愁胡視天地杉雞竹不自惜溪虎野羊俱辟易鞲上鋒稜十二翮將軍勇鋭與之敵將軍樹勳起安西崑崙虞泉入馬蹄白羽曽肉三狻猊敢決豈不與之齊荆南芮公得將軍亦如角鷹下翔雲惡鳥飛飛啄金屋安得爾輩開其羣驅出六合梟鸞分以賦鷹者賦人賔主離合幾於魚龍百變眩人心目此與前篇皆擺脫恆蹊體格音節蒼然入古沈德潛曰起四句不著鷹一字然如有角鷹飛於目前入手須如此著墨狄明府梁公曽孫我姨弟不見十年官濟濟大賢之後竟陵遲浩蕩古今同一體比看叔伯四十人有才無命百僚底今者兄弟一百人幾人卓絶秉周禮在汝更用文章為長兄白眉復天唘汝門請從曽翁說太后當朝多巧詆狄公執政在末年濁河終不汚清濟國嗣初將付諸武公獨廷諍守丹陛禁中決冊請房陵前朝長老皆流涕太宗社稷一朝正漢官威儀重昭洗時危始識不世才誰謂荼苦甘如薺汝曹又宜列土食身使門户多旌棨胡為漂泊岷漢間干謁王侯頗歷扺况乃山髙水有波秋風蕭蕭露泥泥虎之饑下巉嵒蛟之橫出清泚早歸來黃土泥衣眼易眯浦起龍曰舊說此詩俱以憐狄漂零為解今觀篇尾一段乃與昌黎送董邵南序同意蓋博濟必不得志於朝而歷干藩鎮者時河北方多擅命意頗不喜其往也秋風二首秋風淅淅吹巫山上牢下牢修水關吳檣楚柂牽百丈暖向神都寒未還要路何日罷長㦸戰自青羌連百蠻中巴不曾消息好暝傳戍鼓長雲間秋風淅淅吹我衣東流之外西日微天清小城搗練急石古細路行人稀不知明月為誰好早晚孤帆他夜歸㑹將白髮倚庭樹故園池臺今是非洗馬言愁凄然可聽虎牙行秋風歘吸吹南國天地慘慘無顔色洞庭揚波江漢回虎牙銅柱皆傾側巫峽陰岑朔漠氣峰巒窈窕溪谷黑杜鵑不來猿狖寒山鬼幽憂雪霜逼楚老長嗟憶炎瘴三尺角弓兩斛力壁立石城橫塞起金錯旌竿滿雲直漁陽突騎獵青丘犬戎鎖甲聞丹極八荒十年防盜賊征戍誅求寡妻哭逺客中宵淚霑臆後苦寒行二首南紀巫廬瘴不絶太古以來無尺雪蠻夷長老怨苦寒崑崙天關凍應折𤣥猿口噤不能嘯白鵠翅垂眼流血安得春泥補地裂晚來江門失大木猛風中夜吹白屋天兵斬斷青海戎殺氣南行動地軸不爾苦寒何太酷巴東之峽生凌澌彼蒼回斡人得知節短勢險別成格調張溍曰命意用筆善於轉換夜歸夜來歸來衝虎過山黑家中已眠卧傍見北斗向江低仰看明星當空大庭前把燭嗔兩炬峽口驚猿聞一箇白頭老罷舞復歌杖藜不睡誰能那醉為馬墜諸公攜酒相看甫也諸侯老賔客罷酒酣歌拓金㦸騎馬忽憶少年時散蹄迸落瞿塘石白帝城門水雲外低身直下八千尺粉堞電轉紫遊韁東得平岡出天壁江村野堂爭入眼垂鞭嚲鞚凌紫陌向來皓首驚萬人自倚紅顔能騎射安知決臆追風足朱汗驂驔猶噴玉不虞一蹶終損傷人生快意多所辱職當憂戚伏衾枕况乃遲暮加煩促朋知來問腆我顔杖藜强起依僮僕語盡還成開口笑提攜別掃清溪曲酒肉如山又一時初筵哀絲動豪竹共指西日不相貸喧呼且覆杯中淥何必走馬來為問君不見嵇康養生遭殺戮前有聲色後饒情致一叙一解老氣無比大覺髙僧蘭若原注和尚去冬往湖南巫山不見廬山逺松林蘭若秋風晚一老猶鳴日暮鐘諸僧尚乞齊時飯香爐峯色隱晴湖種杏仙家近白榆飛錫去年啼邑子獻花何日許門徒風調清逈頗似摩詰宿青溪驛奉懷張員外十五兄之緒漾舟千山內日入泊枉渚我生本飄飄今復在何許石根青楓林猿鳥聚儔侣月明遊子靜畏虎不得語中夜懷友朋乾坤此深阻浩蕩前後間佳期付荆楚黃生曰此詩在杜集已為輕秀之作較諸唐賢猶見氣骨憶昔行憶昔北尋小有洞洪河怒濤過輕舸辛勤不見華蓋君艮岑青輝慘么麼千崖無人萬壑靜三步回頭五步坐秋山眼泠魂未歸仙賞心違淚交墮弟子誰依白茅室盧老獨啓青銅鎖巾拂香餘搗藥塵階除灰死燒丹火懸圃滄洲莽空闊金節羽衣飄婀娜落日初霞閃餘映倐忽東西無不可松風澗水聲合時青兕黃熊啼向我徒然咨嗟無遺迹至今夢想仍猶左祕訣隱文須內教晚歲何功使願果更討衡陽董鍊師南浮早鼓瀟湘柂魏將軍歌將軍昔著從事衫鐵馬馳突重兩銜被堅執鋭略西極崑崙月窟東嶄巖君門羽林萬猛士惡若哮虎子所監五年起家列霜㦸一日過海收風帆平生流輩徒蠢蠢長安少年氣欲盡魏侯骨聳精爽緊華嶽峰尖見秋隼星躔寶校金盤陀夜騎天駟超天河欃槍熒惑不敢動翠蕤雲旓相蕩摩吾為子起歌都護酒䦨插劔肝膽露鈎陳蒼蒼風𤣥武萬歲千秋奉明主臨江節士安足數精緊亷悍自是子美盛年之作仇兆鼇曰前用八句轉韻中間各四句轉末則三句兩句疊韻蓋歌中音調取其繁聲促節也北風北風破南極朱鳯日威垂洞庭秋欲雪鴻雁將安歸十年殺氣盛六合人烟稀吾慕漢初老時清猶茹芝白鳬行君不見黃鵠髙於五尺童化為白鳬似老翁故畦遺穗已蕩盡天寒歲暮波濤中鱗介腥羶素不食終日忍饑西復東魯門鶢鶋亦蹭蹬聞道如今猶避風託寄悱惻董斯張曰魯門爰居隱然有不饗太牢不樂鐘鼓之態此老倔彊百折不回醉歌行贈公安顔少府請顧八題壁神仙中人不易得顔氏之子才孤標天馬長鳴待駕馭秋鷹整翮當雲霄君不見東吳顧文學君不見西漢杜陵老詩家筆勢君不嫌詞翰升堂為君掃是日霜風凍七澤烏蠻落照銜赤壁酒酣耳熱忘頭白感君意氣無所惜一為歌行歌主客偶然酬應必挾竒氣而出隨筆所至皆臻妙境夜聞􅓋篥夜聞􅓋篥滄江上衰年側耳情所嚮鄰舟一聽多感傷塞曲三更歘悲壯積雪飛霜此夜寒孤燈急管復風湍君知天地干戈滿不見江湖行路難發劉郎浦挂帆早發劉郎浦疾風颯颯昏亭午舟中無日不沙塵岸上空村盡豺虎十日北風風未回客行歲晚晚相催白頭厭伴漁人宿黃帽青鞋歸去來別董頲窮冬急風水逆浪開帆難士子甘㫖闕不知道里寒有求彼樂土南適小長安別我舟楫去覺君衣裳單素聞趙公節兼盡賔主歡已結門廬望無令霜雪殘老夫纜亦解脫粟朝未餐飄蕩兵甲際幾時懷抱寬漢陽頗寧靜峴首試考槃當念著白帽采薇青雲端情意稠疊深得贈言之義送顧八分文學適洪吉州中郎石經後八分蓋憔悴顧侯運爐錘筆力破餘地昔在開元中韓蔡同贔屭𤣥宗妙其書是以數子至御札早流傳揄揚非造次三人並入直恩澤各不二顧於韓蔡內辨眼工小字分日示諸王鈎深法更祕文學與我遊蕭疏外聲利追隨二十載浩蕩長安醉髙歌卿相宅文翰飛省寺視我揚馬間白首不相棄驊騮入窮巷必脫黃金轡一論朋友難遲暮敢失墜古來事反覆相見橫涕泗嚮者玉珂人誰是青雲器才盡傷形體病渴汙官位故舊獨依然時危話顛躓我甘多病老子負憂世志胡為困衣食顔色少稱遂逺作辛苦行順從衆多意舟楫無根葉蛟鼉好為祟况兼水賊繁特戒風飈駛崩騰戎馬際往往殺長吏子千東諸侯勸勉防縱恣邦以民為本魚饑費香餌請哀瘡痍深告訴皇華使使臣精所擇進德知歷試惻隱誅求情固應賢愚異烈士惡茍得俊傑思自致贈子猛虎行出郊載酸鼻振筆直書縱橫歷落行乎其所當行止乎其所不得不止詩境至此亦從心不踰矩時也王嗣奭曰全篇無一字虛飾可以知其相與之情而愛民之真懇規友之直諒又兩見之矣遣遇磬折辭主人開帆駕洪濤春水滿南國朱崖雲日髙舟子廢寢食飄風爭所操我行匪利涉謝爾從者勞石間采蕨女鬻菜輸官曹丈夫死百役暮返空村號聞見事略同刻剝及錐刀貴人豈不仁視汝如莠蒿索錢多門户喪亂紛嗷嗷奈何黠吏徒漁奪成逋逃自喜遂生理花時甘緼袍解憂減米散同舟路難思共濟向來雲濤盤衆力亦不細呀坑瞥眼過飛櫓本無蒂得失瞬息間致逺宜恐泥百慮視安危分明曩賢計茲理庶可廣拳拳期勿替出險思懼真更事之言宿鑿石浦早宿賔從勞仲春江山麗飄風過無時舟楫敢不繫回塘淡暮色日沒衆星嘒缺月殊未生青燈死分翳窮途多俊異亂世少恩惠鄙夫亦放蕩草草頻卒歲斯文憂患餘聖哲垂彖繫過津口南嶽自兹近湘流東逝深和風引桂楫春日漲雲岑回首過津口而多楓樹林白魚困密網黃鳥喧嘉音物微限通塞惻隱仁者心瓮餘不盡酒滕有無聲琴聖賢兩寂寞眇眇獨開襟紀行諸詩一片老境有如天降時雨山川出雲木葉盡脫石氣自青視入蜀詩別一境界蓋渾用力之迹而臻於化矣次空靈岸沄沄逆素浪落落展清晀幸有舟楫遲得盡所歷妙空靈霞石峻楓栝隱奔峭青春猶無私白日亦偏照可使營吾居終焉託長嘯毒瘴未足憂兵戈滿邊徼嚮者留遺恨恥為達人誚回帆覬賞延佳處領其要宿花石戍午辭空靈岑夕得花石戍岸疏開闢水木雜今古樹地蒸南風盛春熱西日暮四序本平分氣候何回互茫茫天造間理亂豈恆數繫舟盤藤輪䇿杖古樵路罷人不在村野圃泉自注柴扉雖蕪沒農器尚牢固山東殘逆氣吳楚守王度誰能扣君門下令減征賦體兼鮑謝義入風詩望嶽南嶽配朱鳥秩禮自百王歘吸領地靈鴻洞半炎方邦家用祀典在德非馨香巡守何寂寥有虞今則亡洎吾隘世網行邁越瀟湘渴日絶壁出漾舟清光旁祝融五峰尊峰峰次低昻紫蓋獨不朝爭長嶪相望恭聞魏夫人羣仙夾翺翔有時五峰氣散風如飛霜牽迫限修途未暇杖崇岡歸來覬命駕沐浴休玉堂三歎問府主曷以贊我皇牲璧忍衰俗神其思降祥岱華二詩筆意峭拔各極其變此則另闢一格出以典重以明德惟馨之意朂勵守土尤有立言之㫖非徒得郊壇登歌氣象沈德潛曰靈光縹眇氣象肅穆漢人練時日帝臨諸章是此詩原本嶽麓山道林二寺行玉泉之南麓山殊道林林壑爭盤紆寺門髙開洞庭野殿腳插入赤沙湖五月寒風冷佛骨六時天樂朝香爐地靈步步雪山草僧寶人人滄海珠塔劫宫牆壯麗敵香厨松道清涼俱逆花交響共命鳥金榜雙回三足烏方丈涉海費時節懸圃尋河知有無暮年且喜經行近春日兼䝉暄暖扶飄然斑白身奚適傍此烟霞茅可誅桃源人家易制度橘洲田土仍膏腴潭府邑中甚淳古太守庭內不喧呼昔遭衰世皆晦迹今幸樂國養微軀依止老宿亦未晚富貴功名焉足圖久為野客尋幽慣細學何顒免興孤一重一掩吾肺腑山鳥山花吾友于宋公放逐曾題壁物色分留與老夫排比綿麗王嗣奭曰全篇一氣杼寫如珠走盤歲晏行歲云暮矣多北風瀟湘洞庭白雪中漁父天寒網罟凍莫徭射雁鳴桑弓去年米貴闕軍食今年米賤大傷農髙馬達官厭酒肉此輩杼軸茅茨空楚人重魚不重鳥汝休枉殺南飛鴻况聞處處鬻男女割慈忍愛還租庸往日用錢捉私鑄今許鉛錫和青銅刻泥為之最易得好惡不合長相䝉萬國城頭吹畫角此曲哀怨何時終聲哀厲而彌長其氣之老正在參錯中追酬故髙蜀州人日見寄并序開文書帙中檢所遺忘因得故髙常侍適往居在成都時髙任蜀州刺史人日相憶見寄詩淚灑行間讀終篇末自枉詩已十餘年莫記存歿又六七年矣老病懷舊生意可知今海內忘形故人獨漢中王瑀與昭州敬使君超先在愛而不見情見乎辭大歷五年五月二十一日却追酬髙公此作因寄王及敬弟自䝉蜀州人日作不意清詩久零落今晨散帙眼忽開迸淚幽吟事如昨嗚呼壯士多慷慨合沓髙名動寥廓歎我悽悽求友篇感時鬱鬱匡君略錦里春光空爛漫瑶墀侍臣已冥寞瀟湘水國傍黿鼉鄠杜秋天失鵰鶚東西南北更誰論白首扁舟病獨存遙拱北辰纒寇盜欲傾東海洗乾坤邊塞西蕃最充斥衣冠南渡多崩奔鼓瑟至今悲帝子曳裾何處覔王門文章曹植波瀾闊服食劉安德業尊長笛誰能亂愁思昭州詞翰與招魂蘇大侍御訪江浦賦八韻紀異并序蘇大侍御渙靜者也旅於江側凡是不交州府之客人事都絶久矣肩輿江浦忽訪老夫舟楫而已茶酒內余請誦近詩肯吟數首才力素壯詞句動人接對明日憶其湧思雷出書篋几杖之外殷殷留金石聲賦八韻記異亦見老夫傾倒於蘇至矣龎公不浪出蘇氏今有之再聞誦新作突過黃初詩乾坤幾反覆楊馬宜同時今晨清鏡中勝食齊房芝余髮喜却變白間生黑絲昨夜舟火滅湘娥簾外悲百靈未敢散風破寒江遲結語竒妙耐人百味仇兆鼇曰詩止七韻而題云八韻用韻取耦不取竒也孫光憲曰渙有變律詩十九首上廣帥李公唐人謂渙詩長於諷刺得陳拾遺一鱗半甲後以作亂伏誅題衡山縣文宣王廟新學堂呈陸宰旄頭彗紫微無復爼豆事金甲相排蕩青襟一憔悴鳴呼已十年儒服弊於地征夫不遑息學者淪素志我行洞庭野歘得文翁肆侁侁胄子行若舞風雩至周室宜中興孔門未應棄是以資雅才渙然立新意衡山雖小邑首唱恢大義因見縣尹心根源舊宫閟講堂非曩構大屋加塗塈下可容百人牆隅亦深邃何必三千徒始壓戎馬氣林木在庭户密幹疊蒼翠有井朱夏時轆轤凍階戺耳聞讀書聲殺伐災髣佛故國延歸望衰顔減愁思南紀改波瀾西河共風味采詩倦跋涉載筆尚可紀髙歌激宇宙凡百慎失墜氣體肅穆便可作此邑修學記何焯曰感慨頓挫自成有韻之文御選唐宋詩醇卷十二
