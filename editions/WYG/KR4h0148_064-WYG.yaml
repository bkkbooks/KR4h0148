front:
  text: 欽定四庫全書御選唐宋詩醇巻三十一
  hash: sha256:85b927c8cb98ab5b5544a1c7c295077bd5d03b5b629df9da9f85013cbbe87d2d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_064-1a, image: WYG1448/WYG1448-0589a.png}
body:
  text: 昌黎韓愈詩五目録短燈檠歌病鴟華山女瀧吏除官赴闕至江州寄鄂岳李大夫南山有高樹行贈李宗閔猛虎行雪後寄崔二十六丞公奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄閣老張十八助教記夢南内朝賀歸呈同官讀東方朔雜事庭楸南溪始泛三首題楚昭王廟答張十一功曹題木居士和歸工部送僧約入關詠馬木芙蓉奉和庫部盧四兄曹長元日朝迴奉和裴相公東征途經女几山下作次潼關先寄張十二閣老使君晉公破賊回重拜台司以詩示幕中賓客愈奉和左遷至藍關示姪孫湘晚次宣溪辱韶州張端公使君惠書叙别酬以絶句二章量移袁州張韶州端公以詩相賀因酬之奉和兵部張侍郎酬鄆州馬尚書祇召途中見寄開緘之日馬帥已再領鄆州之作奉酬天平馬十二僕射暇日言懷見寄之作奉使鎮州行次承天行營奉酬裴司空奉和僕射裴相公感恩言志和僕射相公朝迴見寄
  hash: sha256:cb9dba1641f32733db21fc0a9eb1ac607a10f2399ed67052ce75cc058907aa12
