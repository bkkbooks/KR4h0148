body:
  text: 隴西李白詩四目錄門有車馬客行東海有勇婦黃葛篇塞下曲來日大難玉堦怨襄陽曲大堤曲邯鄲才人嫁為厮飬卒婦北上行短歌行枯魚過河泣丁督䕶歌樹中草君馬黃少年子少年行豫章行沐浴子静夜思緑水曲春思子夜吳歌對酒行估客行長相思去婦詞
