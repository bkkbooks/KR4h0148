  text: 欽定四庫全書御選唐宋詩醇巻三十九
  hash: sha256:52f6d7f746534959c434f2ab2c0eff142c81cc7340733abb66dd16b49524cafe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_081-1a, image: WYG1448/WYG1448-0760a.png}
body:
  text: 眉山蘇軾詩八次韻王定國得晉卿酒相留夜飲短衫壓手氣横秋更著仙人紫綺裘使我有名全是酒從他作病且忘憂詩無定律君應將醉有真鄉我可侯且倒餘樽盡今夕睡蛇已死不湏鈎書王定國所藏烟江疊嶂圖自注王晉卿畫江上愁心千疊山浮空積翠如雲烟山耶雲耶逺莫知烟空雲㪚山依然但見兩崖蒼蒼暗絶谷中有百道飛來泉縈林絡石隠復見下赴谷口為奔川川平山開林麓斷小橋野店依山前行人稍度喬木外漁舟一葉江吞天使君何從得此本㸃綴毫末分清妍不知人間何處有此境徑欲往買二頃田君不見武昌樊口幽絶處東坡先生留五年春風揺江天漠漠暮雲巻雨山娟娟丹楓翻鴉伴水宿長松落雪驚醉眠桃花流水在人世武陵豈必皆神仙江山清空我塵土雖有去路尋無縁還君此畫三歎息山中故人應有招我歸來篇竟是為畫作記然摹寫之神妙恐作記反不能如韻語之曲盡而有情也君不見以下烟雲巻舒與前相稱許顗詩話曰畫山水詩少陵數首無人可繼者惟東坡烟江疊嶂圖一首差近之王晉卿所藏著色山二首録一首縹緲營丘水墨仙浮空出没有無間爾來一變風流盡誰見將軍著色山王晉卿作烟江叠嶂圖僕賦詩十四韻晉卿和之語特竒麗因復次韻不獨紀其詩畫之美亦為道其出處契濶之故而終之以不忘在莒之戒亦朋友忠愛之義也山中舉頭望日邊長安不見空雲烟歸來長安望山上時移事改應澘然管絃去盡賓客散惟有馬埒編金泉渥洼故自千里足要飽風雪輕山川屈居華屋啗棗脯十年俯仰龍旂前卻因瘦病出竒骨鹽車之厄寧非天風流文采磨不盡水墨自與詩爭妍畫山何必山中人田歌自古非知田鄭䖍三絶君有二筆勢挽回三百年欲將巖谷亂窈窕眉峰修嫮誇連娟人間何有春一夢此身將老蠶三眠山中幽絶不可久要作平地家居仙能令水石長在眼非君好我當誰縁願君終不忘在莒樂時更賦囚山篇自注栁子厚有囚山賦王詵和詩有云愛詩好畫本天性輞口先生疑宿縁㑹當别寫一匹烟霞境更應消得玉堂醉筆揮長篇葢亦自得意於詩畫之工也及軾復和此詩詵亦復有答謝之作有云玉堂故人相與厚意使嫫母齊聨娟豈知憂患耗心力讀書嬾去但欲眠又云更得新詩寫珠玉勸我不作區中縁佩服忠言匪論報短章重次木𤓰篇特以答其不忘在莒之戒焉詵自逺謫還朝詩故舉囚山賦以相戒勉其云鄭䖍三絶君有二筆勢挽回三百年則所以譽之者亦至矣夜直玉堂携李之儀端叔詩百餘首讀至夜半書其後玉堂清冷不成眠伴直難呼孟浩然暫借好詩消永夜毎逢佳處輙參禪愁侵硯滴初含凍喜入燈花欲鬬妍寄語君家小兒子他時此句一時編能使人愁能使人喜非好詩那得有此故曰可以參禪詩人玉屑曰東坡跋李端叔詩巻云暫借好詩消永夜每逢佳處輙參禪葢端叔詩用意太過參禪之語所以警之云方回曰李之儀詩得意趣頗深晦非東坡不之察故有是佳句以孟浩然待之非誇也次韻秦少章和錢䝉仲碧畦黄隴稻如京嵗美人和易得情鑑裏移舟天外思地中鳴角古來聲山圍故國城空在潮打西陵意未平二子有如雙白鷺隔江相照雪衣明鑑裏句即是老杜春水船如天上坐之意地中句即是元㣲之鼓角聲從地底迴之意鑪錘在胸森秀别出容齋隨筆曰劉夢得山圍故國周遭在潮打空城寂寞回之句白樂天以為後之詩人無復措詞坡公倣之曰山圍故國城空在潮打西陵意未平坡公天才出語驚世如追和陶詩真與之齊驅獨此比夢得為不侔豈非絶唱寡和理自應爾耶石林詩話曰讀古人詩多意所喜處誦憶之久往往不覺誤用為己語若子瞻山圍故國二句此非誤用直是取舊句縱横役使莫彼我為辨耳去杭州十五年復遊西湖用歐陽察判韻我識南屏金鯽魚重來拊檻散齋餘還從舊社得心印似省前生覔手書葑合平湖乆蕪沒人經豐嵗尚凋疎誰憐寂寞髙常侍老去狂歌憶孟諸蕪沒凋疎人地依然如故而俯仰已成今昔感愴何限軾自再至杭值水旱迭逢饑疫並作於是免上供米糶常平義倉作饘粥設病坊浚二河完六井去葑田築湖堤凡所惠養杭民者至周且備而蕪没者使之通凋疎者令之起此其為君子之用心不徒寄之感歎者也趙堯卿謂公遊夀星院入門便悟有前生我已到杭州之句引之以與此詩似省前生覔手書一語相印証稱為異人抑思君子之所以異於人者以其存心初不在此即是省前生詩人之語豈必徵實他日到惠州亦有彷彿曽遊之句何獨無解耶冷齋夜話曰東坡錢塘詩曰我識南屏金鯽魚似童稚語然是記一時之事西湖南屏山興教寺池有鯽十餘尾金色道人齋餘爭倚檻投餅餌為戲東坡習西湖乆故寓於詩詞耳復齋漫録曰誰憐寂寞髙常侍老去狂歌憶孟諸髙適有兩詩言孟諸其一云朝臨孟諸上忽見芒碭間赤帝終已矣白雲長不還其後又有封丘詩云我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寧堪作吏風塵下東坡所用乃後一篇也東坡先生年譜曰元祐四年三月内累章請郡除龍圖閣學士知杭州以七月三日到杭州任謝表云江山故國所至如歸父老遺民與臣相問以先生去杭州十五年故有是語耳蘇長公外紀曰錢塘西湖夀星寺先生作郡倅日始與參寥子同登方丈即顧謂參寥曰某生平未嘗至此而眼界所視皆若素所經厯者自此上至懺堂當有九十二級遣人數之果如其言即謂參寥子曰某前生山中僧也今日寺僧皆吾法屬耳後每至即解衣盤礴乆而始去送子由使契丹雲海相望寄此身那因逺適更沾巾不辭驛騎凌風雪要使天驕識鳳麟沙漠回看清禁月湖山應夢武林春單于若問君家世莫道中朝第一人末用唐李揆事非以第一人相矜誇正是臨别而望其遄歸之意文登蓬萊閣下石壁千丈為海浪所戰時有碎裂淘灑嵗久皆圓熟可愛土人謂此彈子渦也取數枚以養石菖蒲且作詩遺垂慈堂老人蓬萊海上峯玉立色不改孤根捍滔天雲骨有破碎陽侯殺亷角隂火發光采纍纍彈丸間瑣細或珠徘閻浮一漚耳真妄果安在我持此石歸袖中有東海垂慈老人眼俯仰了大塊置之盆盎中日與山海對明年菖蒲根連絡不可解儻有蟠桃生旦暮猶可待袖中東海語至竒而理至平進於易則天在山中通於禪則一毫端現寳王刹也黄庭堅曰我持此石歸袖中有東海此詩謂之句中眼學者不知此妙韻終不勝參寥上人初得智果院㑹者十六人分韻賦詩得心字漲水返舊壑飛雲思故岑念君忘家客亦有懐歸心三間得幽寂數步藏清深攢金盧橘塢散火楊梅林茶笋盡禪味松杉真法音雲崖有淺井玉醴常半尋遂名參寥泉可濯幽人襟相携横嶺上未覺衰年侵一眼呑江湖萬象涵古今願君更小築嵗晚解吾簪僧潛臨平道中詩軾一見而刻諸石其後謫黄則潛自武陵訪之軾館之東坡至是又為卜精舍居潛及軾南遷猶有專使往返且有欲轉海相訪之詞墨莊漫録云吕温卿為浙漕屢起大獄復欲網羅參寥參寥本名曇潛東坡改之曰道潛吕索牒勘騐竟坐刑還俗編管兖州葢亦以湖上懐軾之詩坐語含刺譏故也建中靖國間始因曽子開得還初服歸老江湖軾平生多方外交而於潛尤有深契焉故此詩有嵗晚解吾簮之言而惠州寄詩猶云未嘗一日忘湖山也參寥泉銘序曰余謫居黄參寥子不逺數千里從余於東坡留期年嘗與同遊武昌之西山夢相與賦詩有云寒食清明都過了石泉槐火一時新語甚美而不知其所謂其後七年余出守錢塘參寥子在焉明年卜智果精舍居之又明年新居成而余以寒食去郡實來告行舍下舊有泉出石間是月又鑿石得泉加冽參寥子擷新茶鑽火煑泉而瀹之笑曰是見於夢九年衛公之為靈也乆矣坐人皆悵然歎息有知命無求之意乃名之參寥泉參寥集曰余初入智果院蘇翰林率賓客相送者十六人各賦詩一章用圎覺經云以大圓覺為我伽藍身心安居平等性智為韻故周茂叔先生濓谿世俗眩名實至人疑有無怒移水中蟹愛及屋上烏坐令此谿水名與先生俱先生本全徳亷退乃一隅因抛彭澤米偶似西山夫遂即世所知以為谿之呼先生豈我輩造物乃其徒應同栁州栁聊使愚谿愚作詩以頌大儒風格倍加峻潔如曰先生本全徳亷退乃一隅不煩言而得其體要前後布置鏗然韻流無一毫道學詩習氣也周子自題濓谿書堂詩曰吾樂葢易足名濓以自箴詩葢本此為説林下偶談曰山谷稱周濓溪胸次如光風霽月又云西風壯士淚多為程顥滴東坡為濓溪詩云夫子豈我輩造物乃其徒葢蘇氏師友未嘗不起敬於周程如此惜乎後因嘻笑而成仇敵也宋史道學傳曰周敦頥字茂叔道州營道人熈寧初為廣東轉運判官提㸃刑獄以疾求知南康軍因家廬山蓮花峰下前有溪合於湓江取營道所居濓溪以名之施元之曰周茂叔先生子燾字次元公守杭次元為兩浙轉運同在錢塘為賦此詩次韻子由使契丹至涿州見寄四首録二首胡羊代馬得安眠窮髪之南共一天又見子卿持漢節遥知遺老泣山前氊毳年來亦甚都時時鴂舌問三蘇自注余與子由入京時北使已問所在後余館伴北使屢誦三蘇文那知老病渾無用欲問君王乞鏡湖轍寄詩云誰將家集過燕都每被行人問大蘇莫把文章動蠻貊恐妨談笑卧江湖軾和之語語相呌應古人和詩有不次韻而但和其意者未有次韻而各不相顧者此詩亦其一証也宋史蘇轍傳曰其使契丹也館客能誦其茯苓賦及洵軾文云澠水燕談曰張芸叟奉使大遼宿幽州館中有題蘇子瞻老人行於壁間者聞范陽書肆亦刻子瞻詩數十篇謂之大蘇集子瞻名重當代至逺人敬服如此香祖筆記曰昔閲髙麗史愛其臣金富軾之文又兄弟一名軾一名轍疑其當宣和時去元祐未逺何以已竊取眉山二公之名讀遊宦紀聞云徐兢以宣和六年使髙麗宻訪其兄弟命名之意葢有所慕文章動蠻貊語不虚云次韻劉景文周次元寒食同游西湖絮飛春減不成年老境同乗下瀬船藍尾忽驚新火後遨頭要及浣花前自注成都太守自正月二日出遊謂之遨頭至四月十九日浣花乃止山西老將詩無敵洛下書生語更妍共向北山尋二士畫橈鼉鼓聒清眠湘素雜記曰蘇鶚演義云今人以酒巡匝為啉尾即再命其爵也云南朝有異國進貢藍牛其尾長三丈一云藍頴水牛其尾三丈時人倣之以為酒令今兩盞從其簡也此皆非正行酒巡匝即重其盞葢慰勞其得酒在後也又啉云者貪也謂處於座末得酒最晚腹癢於酒既得酒巡匝更貪婪之故曰啉尾啉字從口是明貪婪之意此説近之余觀宋景文公守嵗詩云迎新送故只如此且盡燈前婪尾盃又云稍倦持螯手猶殘婪尾觴又東坡寒食詩云藍尾忽驚新火後遨頭要及浣花前注引樂天寒食詩云三杯藍尾酒一楪膠牙餳乃用藍字葢婪藍一也次韻林子中王彦祖唱酬蚤知身寄一漚中晚節尤驚落木風自注近聞莘老公擇皆逝故有此句昨夢已論三世事嵗寒猶喜五人同自注余與子中彦祖子敦完夫同試舉人景徳寺今皆健雨餘北固山圍坐春盡西湖水暎空差勝四明狂監在更將老眼犯塵紅軾帥杭代林希及去杭希復來替其去杭時希葢守潤也北固在潤西湖在杭㸃綴無一泛設夀星院寒碧軒清風肅肅揺牕扉牕前修竹一尺圍紛紛蒼雪落夏簟冉冉緑霧沾人衣日髙山蟬抱葉響人静翠羽穿林飛道人絶粒對寒碧為問鶴骨何縁肥語語兀傲自喜抜俗千尋二老堂詩話曰蘇文忠公詩初若豪邁天成其實闗鍵甚宻再來杭州夀星院寒碧軒詩句句切題而未嘗拘清風肅肅四句寒碧各在其中第五句日髙山蟬抱葉響頗似無意而杜詩云抱葉寒蟬静併葉言之寒亦在其中矣人静翠羽穿林飛固不待言末句却説破道人絶粒對寒碧為問鶴骨何縁肥其妙如此題楊公春蘭春蘭如美人不採羞自獻時聞風露香蓬艾深不見丹青寫真色欲補離騷傳對之如靈均冠佩不敢燕態濃意逺餘味曲包故得騷經之流韻次韻曹輔寄壑源試焙新芽仙山靈草濕行雲洗遍香肌粉未勻明月來投玉川子清風吹破武林春要知玉雪心腸好不是膏油首面新戲作小詩君勿笑從來佳茗似佳人艶體作茶詩似不相稱者結句特為㸃出方回曰此謂壑源新茶自如玉雪不似餅茶團茶外若膏油之沃也故云佳茗似佳人苕溪漁隠叢話曰壑源諸處私焙茶其絶品亦可敵官焙自昔至今亦皆入貢其流販四方悉私焙茶耳東坡和曹輔詩稱道壑源茶葢壑源與北苑為隣山阜相接纔二里許其茶甘香特在諸私焙之上次韻劉景文登介亭澤國梅雨餘衰年困蒸溽髙堂磨新塼頗覺利腰足松根百尺井兩綆飛淨渌流觴聚兒童一笑為捧腹清風信可御剛氣在巖麓始知共此世物外無三伏長歌入雲去不待絃管逐西湖真西子烟樹㸃眉目濤江少醖藉髙浪翻飛屋俛仰拊四海百世飛鳥速逺追錢氏餘近弔祖侯躅吾生如寄耳寸晷輕尺玉誰似劉將軍逸韻謝邊幅千言一揮手五車不再讀春嵓彩鷄舞月峽哀猿哭朝先鶗鴂起暮與寒螿續我老廢吟哦頼君時擊觸從今事逺覽發軔此幽谷清遊得三昧至樂謝五欲莫作狂道士氣壓劉師服長篇次韻觸􅔊如志中間題品江湖復有此卓傑之詞抑何秀氣磅礴咸淳臨安志曰介亭在鳳凰山熈寧中郡守祖無擇作天風泠然有縹緲憑虚之意袁公濟和復次韻答之昏昏墮醉夢奈此六月溽君詩如清風吹我朝睡足登臨得佳句江白照湖渌袖手獨不言黙藁已在腹是時風雨過藹藹雲歸麓疎星帶㣲月金火爭見伏惜哉此清景變滅不可逐歸來讀君詩耿耿猶在目卻思少年日聲價爭場屋文如翻水成賦作叉手速秋風起鴻鴈我亦繼華躅那知君蹭蹬獨泣荆山玉相見南新道青衫垂破幅蚤知事大繆恨不十年讀莫嫌馮唐老終勝賈誼哭今年復為僚舊好許重續升沉何足道等是蠻與觸共為湖山主出入窮澗谷衆馳君不爭人棄我所欲何時神武門相約挂冠服此作專就和詩上用意與前作無一筆相犯衆馳君不爭二句収束通篇神完氣足安州老人食蜜歌自注贈僧仲殊安州老人心似鐵老人心肝小兒舌不食五榖惟食蜜笑指蜜蜂作檀越蜜中有詩人不知千花百草爭含姿老人咀嚼時一吐還引世間癡小兒小兒得詩如得蜜蜜中有藥治百疾正當狂走捉風時一笑看詩百憂失東坡先生取人亷㡬人相歡㡬人嫌恰似飲茶甘苦雜不如食蜜中邊甜因君寄與雙龍餅鏡空一照雙龍影三吳六月水如湯老人心似雙龍井游戲三昩掣電機鋒合之以成絶世竒作昔軾嘗引佛言譬如食蜜中邊皆甜之語以論陶栁詩謂人食五味知其甘苦皆是能分别其中邊者百無一二也如此篇其亦詩之中邊皆甜者乎志林曰蘇州仲殊師利長老能文善詩及歌詞皆操筆立就予曰此僧胸中無一毫髪事故與之游中吳紀聞曰殊初為士人嘗與鄉薦其妻以藥毒之遂棄家為僧工於長短句東坡先生與之往來甚厚時時食蜜解其藥人號蜜殊老學菴筆記曰族伯父彦逺言少時識仲殊長老東坡為作安州老人食蜜歌者一日與數客過之所食皆蜜也豆腐麺筋牛乳之類皆漬蜜食之客多不能下筯惟東坡性亦酷嗜蜜能與之共飽次韻蘇伯固主簿重九雲間朱袖拂雲和知是長松挂女蘿髻重不嫌黄菊滿手香新喜緑橙搓墨翻衫袖吾方醉紙落雲烟子患多只有黄雞與白日玲瓏應識使君歌苕溪漁隠叢話曰商玲瓏餘杭歌者樂天作郡日賦歌與之云誰道使君不解歌聴唱黄雞與白日黄雞催唱丑時鳴白日催年酉前沒東坡用此歌夜飲次韻畢推官云紅燭照庭嘶騕褭黄雞催曉唱玲瓏又次韻蘇伯固云只有黄雞與白日玲瓏應識使君歌次韻楊公濟梅花十首録二首相逢月下是瑶臺藉草清樽連夜開明日酒醒應滿地空令飢鶴啄莓苔縞帬練帨玉川家肝膽清新冷不邪穠李爭春猶辦此更教踏雪看梅花贈劉景文荷盡已無擎雨葢菊殘猶有傲霜枝一年好景君須記最是橙黄橘緑時淺語遥情苕溪漁隠叢話曰最是一年春好處絶勝煙栁滿皇都此退之早春詩也一年好景君須記最是橙黄橘緑時此子瞻初冬詩也二詩意同而詞殊皆曲盡其妙再和楊公濟梅花十絶録二首人去殘英滿酒尊不堪細雨濕黄昏夜寒那得穿花蝶知是風流楚客魂春入西湖到處花帬腰芳草抱山斜盈盈解佩臨煙浦脈脈當壚傍酒家予去杭十六年而復來留二年而去平生自覺出處老少麤似樂天雖才名相逺而安分寡求亦庶㡬焉三月六日來别南北山諸道人而下天竺惠淨師以醜石贈行作三絶句當年衫鬢兩青青强説重臨慰别情衰髪祇今無可白故應相對話來生出處依稀似樂天敢將衰朽較前賢便從洛社休官去猶有閒居二十年在郡依前六百日山中不記㡬回來還將天竺一峰去欲把雲根到處栽三詩宛轉闗生情曲意宻緜邈尺素軾以己巳七月至杭以辛未三月去杭却是六百日其贈唐坰詩云我在錢塘六百日山中暫來不暖席意與此同皆用白詩語意也王直方詩話曰東坡平日最愛樂天之為人而坡在錢塘與樂天所留嵗月略相似其詩云在郡依前六百日者是也趙次公曰在錢塘六百日雖是紀實暗使白樂天詩在郡六百日遊山十二回也西湖遊覽志曰杭州之羙得白蘇而益章考其治績性情往往酷似樂天詩云閭里固宜勤撫䘏樓臺亦要數躋攀子瞻亦云細雨晴時一百六畫橈鼉鼓莫違民樂天詩云笙歌委曲聲延耳金翠動揺光照身子瞻亦云剰看新翻眉倒暈未應泣别臉消紅樂天詩云故伎數人頻問訊新詩兩首倩流傳子瞻亦云休驚嵗嵗年年貎且對朝朝暮暮人樂天取天竺竒石受代詩云唯向天竺山取得兩片石子瞻亦云還將天竺一峰去欲把雲根到處栽葢子瞻景慕惟在樂天故摹擬之詞比比歌詠如云出處依稀似樂天敢將衰朽較前賢殆有夢寐羮墻之想矣贈武道士彈賀若清風終日自開簾涼月今宵肎挂簷琴裏若能知賀若詩中定合愛陶潛以不説破解人之頥耦句共逸韻俱發續湘山野録曰宫詞中十小調子乃隋賀若弼所撰其聲與意及用指取聲之法古今無能加者十調者一曰不博金二曰不換玉三曰夾泛四曰越溪吟五曰越江吟六曰孤猿吟七曰清夜吟八曰葉下聞蟬九曰三清外一調最優古忘其名琴家祇命曰賀若元祐六年六月自杭州召還汶公館我於東堂閲舊詩巻次諸公韻三首半熟黄粱日未斜玉堂隂合手栽花卻尋三十年前味未飯鐘時已飯茶夢覺還驚屧響廊故人來炷影前香鬢須白盡成何事一帖空存老遂良尺一東來喚我歸衰年已迫故山期文章曹植今堪笑卻巻波瀾入小詩西湖秋涸東池魚窘甚因㑹客呼網師遷之西池為一笑之樂夜歸被酒不能寐戲作放魚一首東池浮萍半黏塊裂碧跳青出魚背西池秋水尚涵空舞濶揺深吹荇帶吾僚有意為遷居老守縱饞那忍膾縱横爭看銀刀出瀺灂初驚玉花碎但愁數罟損鱗鬛未信長堤隔濤瀬濊濊發發須臾間圉圉洋洋尋丈外安知中無蛟龍種尚恐或有風雲㑹明年春水漲西湖好去相忘𣺌淮海忽想到蛟龍雲雨覺通篇字鏤句琢盡成澎湃之觀復次放魚韻答趙承議陳教授擾擾萬生同一塊搶榆不羡培風背青丘已呑雲夢芥黄河復繚天門帶長譏韓子隘且陋一飽鯨魚何足膾東坡也是可憐人披抉泥沙収細碎逝將歸修八節灘又欲往釣七里瀬正似此魚逃網中未與造物遊數外且將新句調二子湖上秋髙風月㑹為君更喚木腸兒腳扣兩舷歌小海現身説法又一變以逰方之外為髙是前篇好去相忘𣺌淮海一句轉語也藝苑雌黄曰次韻滕元發詩云坐看青丘呑澤芥按子虚賦云秋田乎青丘徬徨乎海外吞雲夢者八九於其胸中曽不芥蔕芥蔕刺鯁也非草芥之芥西湖詩亦有青丘已呑雲夢芥之説皆非也容齋四筆曰坐看青丘吞澤芥青丘已呑雲夢芥用芥字可謂工新乃以為出處曽不芥蔕非草芥之芥如此論文章其意見亦淺矣九月十五日觀月聴琴西湖示坐客白露下衆草碧空巻㣲雲孤光為誰來似為我與君水天浮四坐河漢落酒樽使我氷雪腸不受麴蘖醺尚恨琴有絃出魚亂湖紋哀彈奏舊曲妙耳非昔聞良時失俯仰此見寧朝昏懸知一生中道眼無由渾月色之明琴聲之清誦詩以當卧逰亦得泛潁我性喜臨水得潁意甚竒到官十日來九日河之湄吏民笑相語使君老而癡使君實不癡流水有令姿遶郡十餘里不駛亦不遲上流直而清下流曲而漪畫船俯明鏡笑問汝為誰忽然生鱗甲亂我須與眉散為百東坡頃刻復在兹此豈水薄相與我相娛嬉聲色與臭味顛倒眩小兒等是兒戲物水中少磷緇趙陳兩歐陽同參天人師觀妙各有得共賦泛潁詩楞嚴圓覺之理栗里香山之筆昔沈敦謨引傳燈録良价禪師過水觀影偈曰我今獨自往處處得逢渠渠今正是我我今不是渠以釋此詩散為百東坡頃刻復在兹二語最為得之篇末趙陳兩歐陽句時趙令畤在軾幕府陳師道教授潁州歐陽棐歐陽辯則修之二子皆適在潁也韓退之孟郊墓銘云以昌其詩舉此問王定國當昌其身耶昌其詩也來詩下語未契作此答之昌身如飽腹飽盡還復飢昌詩如膏面為人作容姿不如昌其氣鬱鬱老不衰雖云老不衰劫壞安所之不如昌其志志一氣自隨養之塞天地孟軻不吾欺人言魏勃勇股栗向小兒何如魯連子談笑卻秦師慎勿怨謗讒乃我得道資淤泥生蓮花糞壤出菌芝頼此善知識使我枯生荑吾言豈須多冷暖子自知志一氣隨固是本諸孟子而謗讒得道則已與西銘憂戚玉成之㫖協合矣豈惟可與言詩困學紀聞曰謹勿怨謗讒數句此尹和静所謂困窮拂欝能堅人之志而熟人之仁也詩曰它山之石可以攻玉施元之曰王定國與吳正憲充馮文簡京素善而師友東坡舒亶輩欲傾二公因坡詩獄羅織定國遂南行萬里三年而歸司馬温公當國深器遇之東坡在翰林以人言力請郡去未㡬定國亦報罷此詩自慎勿怨謗讒以下端為定國發也聚星堂雪并引元祐六年十一月一日禱雨張龍公得小雪與客㑹飲聚星堂忽憶歐陽文忠公作守時雪中約客賦詩禁體物語於艱難中特出竒麗爾來四十餘年莫有繼者僕以老門生繼公後雖不足追配先生而賓客之美殆不減當時公之二子又適在郡故輙舉前令各賦一篇牕前暗響鳴枯葉龍公試手行初雪映空先集疑有無作態斜飛正愁絶衆賓起舞風竹亂老守先醉霜松折恨無翠袖㸃横斜祇有㣲燈照明滅歸來尚喜更鼓暗晨起不待鈴索掣未嫌長夜作衣稜卻怕初陽生眼纈欲浮大白追餘賞幸有回飈驚落屑糢糊檜頂獨多時厯亂瓦溝裁一瞥汝南先賢有故事醉翁詩話誰續説當時號令君聴取白戰不許持寸鐵賦雪者多以悠揚飄蕩取其韻致此獨用生劖之筆作硬盤之語擺脱常態匪徒以禁體物語標竒競勝苕溪漁隠叢話曰六一居士守汝隂日因雪㑹客賦詩詩中玉月梨梅練絮白舞鵝鶴銀等字皆請勿用其後東坡居士出守汝隂聚星堂雪輙舉前令自二公賦詩之後未有繼之者豈非難措筆乎次前韻送劉景文白雲在天不可呼明月豈肎留庭隅怪君西行八百里清坐十日一事無路人不識呼尚書但見凛凛雄千夫自注君一馬兩僕率然相訪逆旅多呼尚書意謂君都頭也豈知入骨愛詩酒醉倒正欲蛾眉扶一篇向人寫肝肺四海知我霜鬢須歐陽趙陳皆我有豈謂夫子駕復迂邇來又見三黜栁共此暖熱餐氊蘇酒肴酸薄紅粉暗祇有潁水清而姝一朝寂寞風雨散對影誰念月與吾自注郡中日與歐陽叔弼趙景貺陳履常相從而景文復至不數日栁戒之亦見過賓客之盛頃所未有然又數日叔弼景文戒之皆去矣何時歸帆泝江水春酒一變甘棠湖自注景文近卜居九江近甘棠湖情事曲折裁約以入有韻之言裵􅏆俯仰逸趣横生石林詩話曰劉季孫能作七字詩家藏書數千巻為杭州鈐轄子瞻作守深知之後嘗以詩寄子瞻云四海共知霜鬢滿重陽曾揷菊花無子瞻大喜在潁州和季孫詩所謂一篇向人寫肝肺四海知我霜鬢須葢記此也次韻趙景貺春思且懐吳越山水嵗華來無窮老眼乆矣静春風如繫馬未動意先騁西湖忽破碎鳥落魚動鏡縈城理枯瀆放閘起膠艇願君營此樂官事何時竟自注清河西湖三閘督君成之思吳信偶然出處付前定飄然不繫舟乗此無盡興醉翁行樂處草木皆可敬明朝㳺北渚急掃黄葉徑白酒真到齊紅帬已放鄭自注酒尚有香泉一壺為樂全先生服不作樂也行樂處至於可敬於此見賢者之澤長是乃詩之有闗名教者前路名句紛沓尤是窮力追新小飲西湖懐歐陽叔弼兄弟贈趙景貺陳履常嵗暮自急景我閒方緩觴歡飲西湖晚步轉北渚長地坐略少長意行無澗岡乆知薺麥青稍喜榆栁黄盎盎春欲動㶑㶑夜未央水天鷗鷺静月霧松檜香撫景方晼晚懐人重淒涼豈無一老兵坐念兩歐陽我意正麋鹿君才亦圭璋此㑹不可再此歡不可忘寫景以駢語入情劉勰所謂儷采百字之偶者可移以評此送路都曹并引乖崖公在蜀有録曹參軍老病廢事公責之曰胡不歸明日參軍求去且以詩留别其略曰秋光都似宦情薄山色不如歸意濃公驚謝之曰吾過矣同僚有詩人而吾不知因留而慰薦之予幼時聞父老言恨不問其姓名今都曹路公以小疾求致仕予誦此語留之不可乃採前人意作詩送之并邀趙徳麟陳履常同賦一篇積雪困桃李春心誰為容淮光釀山色先作歸意濃我亦倦㳺者君恩繫疎慵欲留耿介士伴我衰遲蹤吏課升斗積﨑嶇等鉛舂那將露電身坐待収千鍾結髪空百戰市人看先封誰能掻白首抱關望夕烽子意亮已成我言寧復從恨無乖崖老一洗芥蔕胸我田荆谿上伏臘亦麤供懐哉江南路㑹作林下逢一片愛才求友之意津津亹亹序雖援張詠為説然詠特不知參軍為詩人耳既知則能留而慰薦之軾知都曹矣而於其致仕留之不可故尤怊悵切情容齋三筆曰碑志之作本孝子慈孫欲以稱揚其父祖之功徳播之當時而垂之後世當直存其名字無所避隠然東漢諸銘載其先代多只書官自唐及本朝名人文集所志往往只稱君諱某字某至於記序之文亦然殆與求文揚名之㫖為不相契東坡先生送路都曹詩大畧云結髪空百戰市人看先封誰能掻白首抱闗望夕烽則路君之賢而不遇可知矣然亦不書其名使之少獲表見又為可惜也施元之曰荆溪在常州宜興縣先生嘗買田於此送運判朱朝奉入蜀藹藹青城雲娟娟蛾眉月隨我西北來照我光不滅我在塵土中白雲呼我歸我㳺江湖上明月濕我衣岷峨天一方雲月在我側謂是山中人相望了不隔夢尋西南路黙數長短亭似聞嘉陵江跳破吹錦屏送君無一物清江飲君馬路穿慈竹林父老拜馬下不用驚走藏使者我友生聴訟如家人細説為汝評若逢山中友問我歸何日為話腰腳輕猶堪踏泉石五言換韻體製最古而後人少效之者以其氣易斷而情韻反减耳此則纍纍然如貫珠清妙之音讀之百回不厭淮上早發澹月傾雲曉角哀小風吹水碧鱗開此身定向江湖老黙數淮中十往來在潁州與徳麟同治西湖未成改揚州三月十六日湖成徳麟有詩見懐次其韻太山秋毫兩無窮鉅細本出相形中大千起滅一塵裏未覺杭潁誰雌雄自注來詩云與杭爭雄我在錢塘拓湖渌大堤士女争昌丰六橋横絶天漢上北山始與南屏通忽驚二十五萬丈老葑席巻蒼雲空朅來潁尾弄秋色一水縈帶昭靈宫坐思吳越不可到借君月斧修朣朧二十四橋亦何有換此十頃玻瓈風雷塘水乾禾黍滿寳釵耕出餘鸞龍明年詩客來弔古伴我霜夜號秋蟲自注徳麟見約來揚寄居亦有意求揚倅六橋横絶四句都是實事却寫來異様警動前以杭之西湖陪説潁之西湖後以歐陽之自揚移潁比已之自潁改揚都有天然證佐㑹作佳談搆成絶唱侯鯖録曰歐公自揚州移汝州作西湖詩云都將二十四橋月換得西湖十頃秋後東坡復自汝移揚作詩云二十四橋亦何有換此十頃玻璃風用歐公詩也鶴林玉露曰杭有西湖而潁亦有西湖皆為逰賞之勝而東坡連守二州其初得潁也有潁人在坐云内翰但只消逰湖中便可以了郡事葢言其訟簡也秦少章因作一絶獻之云十里荷花菡蓞初我公所至有西湖欲將公事湖中了見説官閒事亦無東坡到潁有謝執政啟亦云入參兩禁毎玷北扉之榮出典二邦輙為西湖之長咸淳臨安志曰元祐中東坡既奏開浚湖水因以所積葑草築為長堤起南訖北横跨湖面綿亘數里夾道雜植花栁中為六橋行者便之坡嘗賦詩云六橋横絶天漢上北山始與南屏通忽驚二十五萬丈老葑席巻蒼烟空嗣郡守林希榜曰蘇公堤楊慎曰東坡先生在杭州潁州許州皆開西湖而杭之西湖尤偉其詩我在錢塘拓湖渌六句此詩史也而注殊畧今按宋長編云杭本江海之地水泉鹹苦唐刺史李泌始引西湖水作六井故井邑日富及白居易復浚西湖所溉千餘頃然湖水多葑近嵗廢而不理湖中葑田積二十五萬餘丈而水無㡬矣運河失湖水之利則取給於江潮潮渾濁多淤河行闤闠中三年一淘為市井大患而六井亦㡬廢公始至浚茅山鹽橋二河以茅山一河專受江潮以鹽橋一河專受湖水復造堰閘以為湖水蓄洩之限然後潮不入市間至湖上周視良乆曰今願去葑田葑田如雲將安所置之湖南北三十里環湖往來終日不達若取葑草積之湖中為長堤以通南北則葑田去而行者便矣堤成杭人名之曰蘇公堤云合是觀之則公之有功杭人大矣今閲公詩注甚畧故詳注之雙石并引至揚州獲二石其一緑色岡巒迤邐有穴達於背其一玉白可鑒漬以盆水置几案間忽憶在潁州日夢人請住一官府榜曰仇池覺而誦杜子美詩曰萬古仇池穴潛通小有天乃戲作小詩為僚友一笑夢時良是覺時非汲井埋盆故自癡但見玉峰横太白便從鳥道絶峨眉秋風與作煙雲意曉日令涵草木姿一㸃空明是何處老人真欲住仇池次韻蘇伯固逰蜀岡送李孝博奉使嶺表新苖未沒鶴老葉方翳蟬緑渠浸麻水白板燒松煙笑窺有紅頬醉卧皆華顛家家機杼鳴樹樹梨棗懸野無佩犢子府有騎鶴仙觀風嶠南使出相山東賢渡江弔很石過嶺酌貪泉與君步徙倚望彼修連娟願及南枝謝早隨北鴈翩歸來春酒熟共看山櫻然離離蔚蔚雲霞澄鮮苕溪漁隠叢話曰逰蜀岡詩造語全效退之城南聨句新苗八句雖退之筆力殆無以過之行宿泗間見徐州張天驥次舊韻二年三躡過淮舟款段還逢馬少游無事不妨長好飲著書自要且窮愁孤松早偃原非病倦鳥雖還豈是休更欲河邊㡬來往祇今霜雪已䝉頭近以月石硯屏獻子功中書公復以涵星研獻純父侍講子功有詩純父未也復以月石風林屏贈之謹和子功詩并求純父數句紫潭出𤣥雲翳我潭中星獨有潭上月倒挂紫翠屏我老不看書黙坐養此昏花睛時時一開眼見此雲月眼自明乆知世界一泡影大小真偽何足評笑彼三子歐梅蘇無事自作雪羽争自注事見三人詩集故將屏硯送兩范要使珠璧栖牕櫺大范忽長謡語出月脇令人驚小范當繼之説破星心如鷄鳴牀頭復一月下有風林横急送小范家䕶此涵星泓願從少陵博一句山木盡與洪濤傾起八句連絡硯屏瑰偉絶特中間行以迤邐舒而不廹却用少陵詩語一句結住讀之更如有千百言在腕下也次韻范純父涵星硯月石風林屏詩月次於房厯三星斗牛不神箕獨靈簸揺桑榆盡西靡影落蘇子硯與屏天工與我兩厭事孰居無事為此形與君持橐侍帷幄同到温室觀堯蓂自憐太史牛馬走伎等卜祝均倡伶欲留衣冠挂神武便擊雲水歸南溟陶泓不稱管城沐醉石可助平泉醒故持二物與夫子欲使妙質留天庭但令滋液到枯槁勿遣光景生晦㝠上書挂名豈待我獨立自可當雷霆我時醉眠風林下夜與漁火同青熒撫物懐人應獨嘆作詩寄子誰當聴起局得勢後乃舒緩其氣以副之不煩䋲削而自合御選唐宋詩醇巻三十九
