  text: 欽定四庫全書御選唐宋詩醇巻十
  hash: sha256:68f163e5a952d56594f8d84801c67c4db7406e08fa9927d7331f748ff61d38fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_023-1a, image: WYG1448/WYG1448-0229a.png}
body:
  text: 襄陽杜甫詩二喜晴皇天乆不雨既雨晴亦佳出郭眺西郊肅肅春增華青熒陵陂麥窈窕桃李花春夏各有實我飢豈無涯干戈雖横放慘澹鬬龍蛇甘澤不猶愈且耕今未賖丈夫則帶甲婦女終在家力難及黍稷得種菜與麻千載商山芝往者東門𤓰其人骨已朽此道誰疵瑕英賢遇轗軻逺引蟠泥沙顧慙昧所適回首白日斜漢隂有鹿門滄海有靈查焉能學衆口咄咄空咨嗟既雨晴亦佳與雨過蘇端詩乆旱雲亦好皆自胸臆中流出氣息亦近陶令述懐一首去年潼闗破妻子隔絶乆今夏草木長脱身得西走麻鞋見天子衣袖露兩肘朝廷慜生還親故傷老醜涕淚授拾遺流離主恩厚柴門雖得去未忍即開口寄書問三川不知家在否比聞同罹禍殺戮到雞狗山中漏茅屋誰復依戸牖摧頽蒼松根地冷骨未朽幾人全性命盡室豈相偶嶔岑猛虎場欝結回我首自寄一封書今已十月後反畏消息來寸心亦何有漢運初中興生平老耽酒沉思歡㑹處恐作窮獨叟申涵光曰無一語空閒只平平説去有聲有淚真三百篇嫡派李因篤曰北征如萬山之松中蔚煙霞此詩如數尺之竹勢參霄漢唐書本傳天子入蜀甫避走三川肅宗立自鄜州羸服欲奔行在為賊所得至徳二載亡走鳯翔謁上拜左拾遺時所在冦奪甫家寓鄜彌年艱寠孺弱至餓死因許甫自往省視從還京師送樊二十三侍御赴漢中判官威弧不能弦自爾無寧嵗川谷血横流豺狼沸相噬天子從北來長驅振凋敝頓兵岐梁下却跨沙漠裔二京陷未収四極我得制蕭索漢水清緬通淮湖税使者紛星散王綱尚旒綴南伯從事賢君行立談際坐知七曜歴手畫三軍勢冰雪浄聰明雷霆走精鋭幕府輟諫官朝廷無此例至尊方旰食仗爾布嘉惠補闕暮徴入柱史晨征憩正當艱難時實藉長乆計回風吹獨樹白日照執袂慟哭蒼煙根山門萬重閉居人莽牢落遊子方迢遞裵回悲生離局促老一世陶唐歌遺民後漢更列帝恨無匡復資聊欲從此逝送從弟亞赴安西判官南風作秋聲殺氣薄炎熾盛夏鷹隼擊時危異人至令弟草中來蒼然請論事詔書引上殿奮舌動天意兵法五十家爾腹為箧笥應對如轉丸疏通略文字經綸皆新語足以正神器宗廟尚為灰君臣俱下淚崆峒地無軸青海天軒䡖西極最瘡痍連山暗烽燧帝曰大布衣藉卿佐元帥坐看清流沙所以子奉使歸當再前席適逺非歴試須存武威郡為畫長久利孤峯石戴驛快馬金纒轡黄羊飫不羶蘆酒多還醉踴躍常人情慘澹苦士志安邊敵何有反正計始遂吾聞駕鼔車不合用騏驥龍吟回其頭夾輔待所致二詩一時所作匡濟深𠂻寓於翰墨激切沉摯他人無此格力彭衙行憶昔避賊初北走經險艱夜深彭衙道月照白水山盡室久徒步逢人多厚顔參差谷鳥吟不見遊子還癡女飢齩我啼畏虎狼聞懐中掩其口反側聲愈嗔小兒强解事故索苦李餐一旬半雷雨泥濘相牽攀既無禦雨備徑滑衣又寒有時經契濶竟日數里間野果充餱糧卑枝成屋椽早行石上水暮宿天邊煙少留周家窪欲出蘆子闗故人有孫宰髙義薄曾雲延客已曛黑張燈啟重門煖湯濯我足翦紙招我魂從此出妻孥相視涕闌干衆雛爛漫睡喚起霑盤飱誓將與夫子永結為弟昆遂空所坐堂安居奉我歡誰肯艱難際豁達露心肝别來嵗月周胡羯仍搆患何當有翅翎飛去墮爾前通篇追叙瑣屑盡致神似漢魏北征皇帝二載秋閏八月初吉杜子將北征蒼茫問家室維時遭艱虞朝野少暇日顧慙恩私被詔許歸蓬蓽拜辭詣闕下怵􅅥乆未出雖乏諫諍姿恐君有遺失君誠中興主經緯固密勿東胡反未已臣甫憤所切揮涕戀行在道途猶恍惚乾坤含瘡痍憂虞何時畢靡靡踰阡陌人煙眇蕭瑟所遇多被傷呻吟更流血回首鳯翔縣旌旗晚明滅前登寒山重屢得飲馬窟邠郊入地底涇水中蕩潏猛虎立我前蒼崖吼時裂菊垂今秋花石戴古車轍青雲動髙興幽事亦可悦山果多瑣細羅生雜橡栗或紅如丹砂或黑如㸃漆雨露之所濡甘苦齊結實緬思桃源内益歎身世拙坡陀望鄜畤巖谷互出沒我行已水濱我僕猶木末鴟鳥鳴黄桑野䑕拱亂穴夜深經戰場寒月照白骨潼闗百萬師往者散何卒遂令半秦民殘害為異物況我墮胡塵及歸盡華髪經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌兒顔色白勝雪見耶背面啼垢膩脚不韤牀前兩小女補綻才過䣛海圖坼波濤舊繡移曲折天吳及紫鳳顛倒在短褐老夫情懐惡嘔泄卧數日那無囊中帛救汝寒凛慄粉黛亦解苞衾裯稍羅列瘦妻面復光癡女頭自櫛學母無不為曉妝隨手抹移時施朱鉛狼藉畫眉濶生還對童穉似欲忘飢渇問事競挽鬚誰能即嗔喝翻思在賊愁甘受雜亂聒新歸且慰意生理焉能説至尊尚䝉塵幾日休練卒仰觀天色改坐覺祅氣豁隂風西北來慘澹隨回鶻其王願助順其俗善馳突送兵五千人驅馬一萬匹此輩少為貴四方服勇決所用皆鷹騰破敵過箭疾聖心頗虚佇時議氣欲奪伊洛指掌収西京不足拔官軍請深入蓄鋭伺俱發此舉開青徐旋瞻略恒碣昊天積霜露正氣有肅殺禍轉亡胡嵗勢成擒胡月胡命其能乆皇綱未宜絶憶昨狼狽初事與古先别姦臣竟葅醢同惡隨蕩析不聞夏殷衰中自誅褒妲周漢獲再興宣光果明哲桓桓陳將軍仗鉞奮忠烈㣲爾人盡非于今國猶活淒涼大同殿寂寞白獸闥都人望翠華佳氣向金闕園陵固有神掃灑數不缺煌煌太宗業樹立甚宏達以排天斡地之力行屬詞比事之法具備萬物横絶太空前無古人後無來者自有五言不得不以此為大文字也問家室者事之主憤艱虞者意之主以皇帝起太宗結戀行在望匡復言有倫脊忠愛見矣道途感觸抵家悲喜瑣瑣細細靡不具陳極窮苦之情絶不衰餒嚴羽謂李杜之詩如金鳷擘海香象渡河下視郊島輩有類蟲吟草間者豈不然哉憶昨一段立言有體若元禮雖有活國之功終傷人臣之義甫但稱其忠烈而行誅之權歸諸明皇尤為得體中唐以下惟李商隠西郊等作有此風力特知之者少耳蘇軾曰北征詩識君臣大體忠義之氣與秋色争髙可貴也范温曰孫莘老嘗謂老杜北征詩勝退之南山詩王平甫以為南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事與國風雅頌相為表裏則北征不可無而南山雖不作未害也二公之論遂定王嗣奭曰南山北征體不相䝉南山琢鏤凑砌詰屈竒怪創體傑出不可無一不可有二北征固是雅調古來詞人多用之如韓之赴江陵寄三學士等作庶可與之雁行也李因篤曰其才則海涵地負其力則排山倒岳有極尊嚴處有極瑣細處繁則如千門萬戸之象簡則有急弦促柱之悲元河南謂其具一代興亡與風雅頌相表裏可謂知言得舍弟消息風吹紫荆樹色與春庭暮花落辭故枝風回返無處骨肉恩書重漂泊難相遇猶有淚成河經天復東注劉㑹孟曰苦心怨調使人淒然玉華宫溪回松風長蒼䑕竄古瓦不知何王殿遺構絶壁下隂房鬼火青壊道哀湍瀉萬籟真笙竽秋色正蕭灑美人為黄土況乃粉黛假當時侍金輿故物獨石馬憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者吳昌祺曰即古詩所遇無故物之意洪邁曰張文潜在宛丘何大圭往謁之見其吟哦老杜玉華宫詩不絶口大圭請其故曰此章乃風雅鼓吹未易為子言大圭曰先生所賦何必減此曰平生極力摹寫僅有一篇稍似之然未可同日語遂誦其離黄州詩曰扁舟發孤城揮手謝送者山回地勢巻天豁江面寫中流望赤壁石脚挿水下昏昏烟霧嶺歴歴漁樵舍居夷實三載隣里通假借别之豈無情老淚為一灑篙工起鳴舷輕櫓健于馬聊為過江宿寂寂樊山夜此其音響節奏固似之矣九成宫蒼山入百里崖斷如杵臼曾宫慿風回岌嶪土囊口立神扶棟梁鑿翠開户牖其陽産靈芝其隂宿牛斗紛披長松倒掲􅣈怪石走哀猨啼一聲客淚迸林藪荒哉隋家帝製此今頽朽向使國不亡焉為巨唐有雖無新增修尚置官居守巡非瑶水逺迹是雕牆後我行屬時危仰望嗟歎乆天王守太白駐馬更搔首李因篤曰興亡在目託諷獨深浦起龍曰九成玉華用意各别一為隋代所建故明誌來歴有借秦為喻之意一為國初所作故不忍斥言有黍離行邁之思羌村峥嶸赤雲西日脚下平地柴門鳥雀噪歸客千里至妻孥怪我在驚定還拭淚世亂遭飄蕩生還偶然遂鄰人滿牆頭感歎亦歔欷夜闌更秉燭相對如夢寐真語流露不假雕飾而情文並至王慎中曰詩凡三首第一首尤絶一字一句鏤出肺腸而婉轉周至躍然目前又若尋常人所欲道者真國風之義仇兆鼇曰司空曙詩乍見翻疑夢相悲各問年是用杜句陳後山詩可知不是夢忽忽心未穩是翻杜語洗兵馬中興諸將収山東㨗書日報清晝同河廣傳聞一葦過胡危命在破竹中祗殘鄴城不日得獨任朔方無限功京師皆騎汗血馬回紇餵肉葡萄宫已喜皇威清海岱常思仙仗過崆峒三年笛裏闗山月萬國兵前草木風成王功大心轉小郭相謀深古來少司徒清鑒懸明鏡尚書氣與秋天杳二三豪俊為時出整頓乾坤濟時了東走無復憶鱸魚南飛覺有安巢鳥青春復隨冠冕入紫禁正耐煙花繞鶴禁通宵鳳輦備雞鳴問寢龍樓曉攀龍附鳯勢莫當天下盡化為侯王汝等豈知䝉帝力時來不得誇身强闗中既留蕭丞相幕下復用張子房張公一生江海客身長九尺鬚眉蒼徴起適遇風雲㑹扶顛始知籌䇿良青袍白馬更何有後漢今周喜再昌寸地尺天皆入貢竒祥異瑞争來送不知何國致白環復道諸山得銀甕隠士休歌紫芝曲詞人解撰河清頌田家望望惜雨乾布榖處處催春種淇上健兒歸莫嬾城南思婦愁多夢安得壯士挽天河浄洗甲兵長不用平仄相間對偶整齊王李髙岑上及唐初聲調如是乃杜集七古之整麗可法者至於此詩之作自是河北屢㨗賊勢大蹙特為工麗之章用志欣幸中間略有寄意全無譏諷而論者以為直刺肅宗步步文致殊傷子美之志昔人謂甫詩一飯不忘君遂穿鑿附㑹欲令篇無虚設可謂不善說詩唐汝詢曰有典有則雄渾濶大足為唐雅朱鶴齡曰中興大業全在將相得人前曰獨任朔方無限功中曰幕下復用張子房此是一詩眼目使當時能専任子儀終用張鎬則洗兵不用旦夕可期矣若𤣥肅父子之間公爾時不應遽加譏切也浦起龍曰此篇是初唐四家體貌同而骨自異今人好以亂頭粗服優孟少陵而於四家之清詞麗句妄加嗤㸃不知少陵固嘗為之曾不貶損其氣格也留花門花門天驕子飽肉氣勇決髙秋馬肥健挾矢射漢月自古以為患詩人厭薄伐修徳使其來羈縻固不絶胡為傾國至出入暗金闕中原有驅除隠忍用此物公主歌黄鵠君王指白日連雲屯左輔百里見積雪長㦸鳥休飛哀笳曙幽咽田家最恐懼麥倒桑枝折沙苑臨清渭泉香草豐潔渡河不用船千騎常撇烈胡塵踰太行雜種抵京室花門既須留原野轉蕭瑟張溍曰經國之計憂深慮逺豈㝷常韻體李鄠縣丈人胡馬行丈人駿馬名胡騮前年避胡過金牛回鞭却走見天子朝飲漢水暮靈州自矜胡騮竒絶代乘出千人萬人愛一聞説盡急難材轉益愁向駑駘輩頭上鋭耳批秋竹脚下髙蹄削寒玉始知神龍别有種不比俗馬空多肉洛陽大道時再清累日喜得俱東行鳳臆龍鬐未易識側身注目長風生義鶻隂崖有蒼鷹養子黑柏顛白蛇登其巢吞噬恣朝餐雄飛逺求食雌者鳴辛酸力强不可制黄口無半存其父從西歸飜身入長煙斯須領健鶻痛憤寄所宣斗上捩孤影噭哮來九天修鱗脱逺枝巨顙拆老拳髙空得蹭蹬短草辭蜿蜒折尾能一掉飽腸皆已穿生雖滅衆雛死亦垂千年物情有報復快意貴目前茲實鷙鳥最急難心炯然功成失所往用舍何其賢近經潏水湄此事樵夫傳飄蕭覺素髪凛欲衝儒冠人生許與分只在顧盼間聊為義鶻行用激壯士肝評此詩者以史記戰鉅鹿刺秦王擬之筆墨真覺相似至云功成失所往用舍何其賢直目此鶻為魯仲亷輩人矣或欲刪此下數句尤有餘味王嗣奭曰借端發議時露作者品格性情畫鶻行髙堂見生鶻颯爽動秋骨初驚無拘攣何得立突兀乃知畫師妙功刮造化窟冩作神俊姿充君眼中物烏鵲滿樛枝軒然恐其出側腦看青霄寧為衆禽没長翮如刀劍人寰可超越乾坤空峥嶸粉墨且蕭瑟緬思雲沙際自有煙霧質吾今意何傷顧步獨紆鬱刻意冩生筆力起伏頓挫譬之書家幾於入木三分瘦馬行東郊瘦馬使我傷骨骼硉兀如堵牆絆之欲動轉欹側此豈有意仍騰驤細看六印帶官字衆道三軍遺路旁皮乾剥落雜泥滓毛暗蕭條連雪霜去嵗奔波逐餘冦驊騮不慣不得將士卒多騎内廐馬惆悵恐是病乗黄當時歴塊誤一蹷委棄非汝能周防見人慘澹若哀訴失主錯莫無晶光天寒逺放雁為伴日暮不収烏啄瘡誰家且養願終惠更試明年春草長藹然仁者之言正不必有寄託新安吏客行新安道喧呼聞㸃兵借問新安吏縣小更無丁府帖昨夜下次選中男行中男絶短小何以守王城肥男有母送瘦男獨伶俜白水暮東流青山猶哭聲莫自使眼枯収汝淚縱横眼枯即見骨天地終無情我軍取相州日夕望其平豈意賊難料歸軍星散營就糧近故壘練卒依舊京掘壕不到水牧馬役亦輕況乃王師順撫養甚分明送行勿泣血僕射如父兄張綖曰此等詩不専是刺葢兵者凶器聖人不得已而用之故可已而不已者則刺之不得已而用者則慰之哀之若兵車行前後出塞之類皆刺也若新安吏之類則慰也石壕吏之類則哀也然天子有道守在四夷則所以慰哀之者是亦刺也朱鶴齡曰此下六詩乃乾元二年自東都回華州時經歴道途有感而作通鑑乾元二年九節度之師潰於相州郭子儀以朔方軍斷河陽橋保東京築南北兩城守之潼闗吏士卒何草草築城潼闗道大城鐵不如小城萬丈餘借問潼闗吏修闗還備胡要我下馬行為我指山隅連雲列戰格飛鳥不能踰胡來但自守豈復憂西都丈人視要處窄狹容單車艱難奮長㦸萬古用一夫哀哉桃林戰百萬化為魚請囑防闗將慎勿學哥舒以叙述為議論漢魏每有此格連雲句以下皆吏答詞以末為答吏者非也石壕吏暮投石壕村有吏夜捉人老翁踰牆走老婦出門看吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戍一男附書至二男新戰死存者且偷生死者長己矣室中更無人惟有乳下孫有孫母未去出入無完帬老嫗力雖衰請從吏夜歸急應河陽役猶得備晨炊夜久語聲絶如聞泣幽咽天明登前途獨與老翁别李因篤曰響悲意苦最近漢魏新婚别兔絲附蓬麻引蔓故不長嫁女與征夫不如棄路旁結髪為妻子席不煖君牀暮婚晨告别無乃太怱忙君行雖不逺守邊赴河陽妾身未分明何以拜姑嫜父母養我時日夜令我藏生女有所歸雞狗亦得將君今往死地沈痛迫中腸誓欲隨君去形勢反蒼黄勿為新婚念努力事戎行婦人在軍中兵氣恐不揚自嗟貧家女乆致羅􅃭裳羅􅃭不復施對君洗紅妝仰視百鳥飛大小必雙翔人事多錯迕與君永相望讀東山之四章曰其新孔嘉其舊如之何曲盡人情如此此王者之以人道使人也暮婚晨别民之不幸非上之過耶然而發乎情止乎禮義甫之立言與風雅何以異哉真徳秀曰先王之政新有婚期不役政此詩所怨盡其常分而能不忘禮義羅大經曰國風豈無膏沐誰適為容葢古之婦人夫不在家則不為容飾此逺嫌防㣲之意也杜詩云羅􅃭不復施對君洗紅妝尤可悲矣國風之後唯杜陵不可及者此類是也朱鶴齡曰陳琳飲馬長城窟行設為問答此三吏三别諸篇所自來也而新婚一章叙室家離别之情及夫婦始終之分全祖樂府遺意沉痛更為過之垂老别四郊未寧静垂老不得安子孫陣亡盡焉用身獨完投杖出門去同行為辛酸幸有牙齒存所悲骨髓乾男兒既介胄長揖别上官老妻卧路啼嵗暮衣裳單孰知是死别且復傷其寒此去必不歸還聞勸加餐土門壁甚堅杏園度亦難勢異鄴城下縱死時猶寛人生有離合豈擇衰盛端憶昔少壯日遲回竟長歎萬國盡征戍烽火被岡巒積屍草木腥流血川原丹何鄉為樂土安敢尚盤桓棄絶蓬室居塌然摧肺肝王粲七哀實此詩之權輿古詩十五從軍征一首則無家别所自出也胡夏客曰新安石壕新婚垂老諸詩述軍興之調發寫民情之怨哀詳矣然作者之意又不止此國家不幸多事猶幸有繕兵中興之主上能用其民下能應其命至殺身棄家不顧以成一時恢復之功故娓娓言之義合風雅不為誹謗耳無家别寂寞天寶後園廬但蒿藜我里百餘家世亂各東西存者無消息死者為塵泥賤子因陣敗歸來尋舊蹊乆行見空巷日瘦氣慘悽但對狐與狸豎毛怒我啼四鄰何所有一二老寡妻宿鳥戀本枝安辭且窮棲方春獨荷鋤日暮還灌畦縣吏知我至召令習鼔鞞雖從本州役内顧無所攜近行止一身逺去終轉迷家鄉既盪盡逺近理亦齊永痛長病母五年委溝谿生我不得力終身兩酸嘶人生無家别何以為烝黎漢魏樂府因事立言言與事比有風詩遺意後人轉相彷效文勝而情隠矣甫以馳騁今古之才奮乎前人窠臼之外隨所感觸作為詩歌新安吏諸篇上繼風雅陟岵鴇羽之怨苕華草黄之哀殆不是過非漢魏所得有也記曰亡國之音哀以思其民困故曰音之起由人心而生自然以發音之至也安史之亂唐之不亡幸耳相州一潰河陽危迫驅民從役勢不得已然其困亦極矣甫於行役所經傷心慘目上憫國難下痛民窮加以所遇不偶懐抱抑欝程形賦音幾於一字一淚覺千古不可磨滅使孔子刪詩當在變雅之列豈復區區字句之間聲調之末與他人較工拙哉范温曰建安詩辯而不華質而不俚風調髙雅格力遒壯得風雅騷人之氣骨最為近古者也唐諸詩人髙者學陶謝下者學徐庾惟老杜太白退之皆學建安晚乃各自變成一家如老杜崆峒小麥熟人生不相見新安石壕潼闗吏新婚垂老無家别夏日夏夜嘆皆全體作建安語今集第一第二巻中頗多退之亦多此體但頗自加新竒太白多建安句法而罕全篇多雜以鮑明逺體前輩皆留意于此近來學者遂不講爾王嗣奭曰目擊成詩遂下千年之淚一一刻畫宛至同工異曲隨物賦形真造化手也遣興三首下馬古戰場四顧但茫然風悲浮雲去黄葉墜我前朽骨穴螻蟻又為蔓草纒故老行歎息今人尚開邉漢虜互勝負封疆不常全安得亷恥將三軍同晏眠亷恥一作亷頗髙秋登塞山南望馬邑州降虜東擊胡壯健盡不留穹廬莽牢落上有行雲愁老弱哭道路願聞甲兵休鄴中事反覆死人積如丘諸將已茅土載驅誰與謀豐年孰云遲甘澤不在早耕田秋雨足禾黍已映道春苖九月交顔色同日老勸汝衡門士勿悲尚枯槁時來展材力先後無醜好但訝鹿皮翁忘機對芳草遒文壯節抑揚哀怨逺之源於小雅近亦比肩子建抗行嗣宗豐年一篇比興㣲婉足以息競躁而慰晚逹士大夫不可不知此意申涵光曰杜云諸將已茅土載驅誰與謀髙適亦云豈無安邊策諸將已承恩皆言恩寵太過將驕不可用也黄希曰諸將不指李郭如封朔方大將軍孫守亮等九人為異姓王李商臣等十三人為同姓王是也幽人孤雲亦羣遊神物有所歸麟鳳在赤霄何當一來儀往與惠荀輩中年滄州期天髙無消息棄我忽若遺内懼非道流幽人見瑕疵洪濤隠語笑鼓枻蓬萊池崔嵬扶桑日照耀珊瑚枝風㠶倚翠葢暮把東皇衣咽潄元和津所思煙霞㣲知名未足稱局促商山芝五湖復浩蕩嵗暮有餘悲憶舊懐人之作一起髙古極似郭景純游仙格力論者遂以為游仙之詞真皮相也或以為寓意闕庭戀戀君父又以幽人采芝為指李泌云者亦太穿鑿詩自分明末實自謂行所無事以解之斯得其指佳人絶代有佳人幽居在空谷自云良家子零落依草木闗中昔喪敗兄弟遭殺戮官髙何足論不得収骨肉世情惡衰歇萬事隨轉燭夫婿輕薄兒新人已如玉合昏尚知時鴛鴦不獨宿但見新人笑那聞舊人哭在山泉水清出山泉水濁侍婢賣珠回牽蘿補茅屋摘花不挿髪采栢動盈匊天寒翠袖薄日暮倚修竹劉㑹孟曰字字矜到仇兆鼇曰天寳亂後當是實有是人故形容曲至舊謂托詞而作恐非是楊億詩獨自慿䦨干衣襟生暮寒本此末句而低昻自見彼何以不服杜耶浦起龍曰在山二句可謂貞士之心化人之舌建安而下無此語也只以寫景作結脱盡色相赤谷西崦人家躋險不自喧出郊已清目溪回日氣暖徑轉山田熟鳥雀依茅茨藩籬帶松菊如行武陵暮欲問桃花宿西枝村尋置草堂地夜宿賛公土室天寒鳥已歸月出人更静土室延白光松門耿踈影躋攀倦日短語樂寄夜永明燃林中薪暗汲石底井大師京國舊徳業天機秉從來支許遊興趣江湖迥數竒謫闗塞道廣存箕潁何知戎馬間復接塵事屏幽尋豈一路逺色有諸嶺晨光稍曚曨更越西南頂起語亦陶謝之遺夢李白二首死别已吞聲生别常惻惻江南瘴癘地逐客無消息故人入我夢明我常相憶恐非平生魂路逺不可測魂來楓葉青魂返闗塞黑君今在羅網何以有羽翼落月滿屋梁猶疑照顔色水深波浪濶無使蛟龍得浮雲終日行遊子久不至三夜頻夢君情親見君意告歸常局促苦道來不易江湖多風波舟楫恐失墜出門搔白首若負平生志冠葢滿京華斯人獨顦顇孰云網恢恢將老身反累千秋萬嵗名寂寞身後事沈痛之音發於至情情之至者文亦至友誼如此當與出師陳情二表並讀非僅招魂大招之遺韻也落月屋梁千秋絶調楊慎以夢中魂魄猶言是覺後精神尚未回二語比之未為知言仇兆鼇曰千古交情此為獨至首篇云逐客無消息故有路逺之憂水深之慮次篇云情親見君意故寫局促之情憔悴之態皆章法照應也何焯曰此詩之作當在太白繫獄時遣興蟄龍三冬卧老鶴萬里心昔時賢俊人未遇猶視今􅄞康不得死孔明有知音又如壠底松用舍在所尋大哉霜雪幹嵗乆為枯林昔者龎徳公未曾入州府襄陽耆舊間處士節獨苦豈無濟時䇿終竟畏羅罟林茂鳥有歸水深魚知聚舉家依鹿門劉表焉得取用世之志保身之哲具見於此此所謂以意為主以文傅意者林茂二句雖用龎公語然其指自是孟子民之歸仁士願立朝之義而用筆跌宕彌覺深逺浦起龍曰嗣宗咏懐太冲咏史延年五君咏公葢兼而用之遣興朔風飄胡雁慘澹帶砂礫長林何蕭蕭秋草萋更碧北里富薫天髙樓夜吹笛焉知南鄰客九月猶絺綌漆有用而割膏以明自煎蘭摧白露下桂折秋風前府中羅舊尹沙道尚依然赫赫蕭京兆今為時所憐朱鶴齡曰蔡夢弼注引于兢大唐傳天寳三年因蕭京兆炅奏於要路築甬道載沙實之屬於朝堂此詩蕭京兆承上沙道言之其為炅發無疑猛虎慿其威往往遭急縛雷吼徒咆哮枝撑已在脚忽㸔皮寢處無復晴閃爍人有甚於斯足以勸元惡古來權要讀此能不膽落唐書吉温傳李林甫久當國温與羅希奭鍜獄相勉以虐號羅鉗吉䋞後貶端溪尉伏誅前出塞九首戚戚去故里悠悠赴交河公家有程期亡命嬰禍羅君已富土境開邊一何多棄絶父母恩吞聲行負戈浦起龍曰前出塞刺開邊也物衆地大有侈心焉公所為諷也已富而又開邊乃九首寓諷本㫖在首章拈破結語黯然出門日已逺不受徒旅欺骨肉恩豈斷男兒死無時走馬脱轡頭手中挑青絲㨗下萬仞岡俯身試搴旗磨刀嗚咽水水赤刄傷手欲輕腸斷聲心緒亂已乆丈夫誓許國憤惋復何有功名圖騏驎戰骨當速朽王嗣奭曰前四句化用隴頭歌極鑪錘之妙送徒既有長逺戍亦有身生死向前去不勞吏怒嗔路逢相識人附書與六親哀哉兩決絶不復同苦辛吳昌祺曰甚於慟哭迢迢萬餘里領我赴三軍軍中異苦樂王將寧盡聞隔河見胡騎倐忽數百羣我始為奴僕㡬時樹功勲古之良將與士卒同甘苦無不恤其下者至其賞功則雖㣲必録其有異能者擢以不次士所以悦也此篇曲寫人情故杜臆以論兵邁古風為此老自道李因篤曰結語有深味想古之却聘者與此同悲挽弓當挽强用箭當用長射人先射馬擒賦先擒王殺人亦有限列國自有疆茍能制侵陵豈在多殺傷黄生曰明皇不恤其民而逺慕秦漢此詩託諷良深驅馬天雨雪軍行入髙山逕危抱寒石指落曾氷間已去漢月逺何時築城還浮雲暮南征可望不可攀單于冦我壘百里風塵昏雄劔四五動彼軍為我奔擄其名王歸繫頸授轅門潜身備行列一勝何足論從軍十年餘能無分寸功衆人貴茍得欲語羞雷同中原有鬬争況在狄與戎丈夫四方志安可辭固窮九首皆代從軍者之詞指事深切以沉欝寫其哀怨有親覆行間所不能自道者可使天雨粟鬼夜哭矣讀東山江漢諸詩風雅既變斯為極焉以視王粲從軍五首真靡靡不足道後五篇視此稍縱而格力如一其所緣起者殊也吳昌祺曰掃絶依傍獨有千古無意不深無筆不健于鱗謂杜五古不合漢魏烏知其盡脱窠臼而異軌齊驅耶後出塞五首男兒生世間及壯當封侯戰伐有功業焉能守舊丘召募赴薊門軍動不可留千金買馬鞭百金裝刀頭閭里送我行親戚擁道周斑白居上列酒酣進庶羞少年别有贈含笑㸔吳鈎朝進東門營暮上河陽橋落日照大旗馬鳴風蕭蕭平沙列萬幕部伍各見招中天懸明月令嚴夜寂寥悲笳數聲動壯士慘不驕借問大將誰恐是霍嫖姚許顗曰詩有力量如弓之鬬力未挽時不知其難也及其挽之力不極處分寸不可强若出塞云落日照大旗馬鳴風蕭蕭悲笳數聲動壯士慘不驕又八哀詩汝陽讓帝子諸句此等力量不容他人到吳昌祺曰詩如寳刀出匣寒光逼人古人重守邊今人重髙勲豈知英雄主出師亘長雲六合已一家四夷且孤軍遂使貔虎士奮身勇所聞拔劍擊大荒日収胡馬羣誓開𤣥㝠北持以奉吾君獻凱日繼踵兩蕃静無虞漁陽豪俠地擊鼓吹笙竽雲帆轉遼海粳稻來東吳越羅與楚練照耀輿臺軀主將位益崇氣驕凌上都邊人不敢議議者死路衢張綖曰左傳兵猶火也不戢自焚前四章著明皇黷武不戢過寵邊將啟其驕恣輕上之心末則直著禄山之叛以見明皇自焚之禍也我本良家子出師亦多門將驕益愁思身貴不足論躍馬二十年恐辜明主恩坐見幽州騎長驅河洛昏中夜間道歸故里但空村惡名幸脱免窮老無兒孫劉克莊曰前後出塞筆力髙古可與十九首並傳范杼曰前後出塞皆傑作有古樂府之聲而理勝周珽曰諸作如將百萬軍寳之惜之又能風雨使之真射潮之力沒羽之技張綖曰前出塞言哥舒西征之役其詞悲後出塞言祿山北征之師其詞樂悲則猶有苦兵畏亂之思樂則至喜亂而佳兵矣祿山將叛濫賞士卒人趨於利上破國而下覆宗不祥莫大焉萬丈潭青溪合㝠寞神物有顯晦龍依積水蟠窟壓萬丈内跼步凌垠堮側身下烟靄前臨洪濤寛却立蒼石大山危一徑盡崖絶兩壁對削成根虚無倒影垂澹濧黑如灣澴底清見光炯碎孤雲倒來深飛鳥不在外髙蘿成帷幄寒木累旌斾逺川曲通流嵌竇潜洩瀬造幽無人境發興自我輩告歸遺恨多將老斯遊最閉藏修鱗蟄出入巨石礙何事暑天過快意風雨㑹刻意模範視鮑謝山水諸詩鑱削過之楊徳周曰刻劃之中元氣渾淪窈冥之内光恠迸發兩當縣吳十侍御江上宅寒城朝烟澹山谷落葉赤隂風千里來吹汝江上宅鵾鷄號枉渚日色傍阡陌借問持斧翁幾年長沙客哀哀失木狖矯矯避弓翮亦知故鄉樂未敢思宿昔昔在鳳翔都共通金閨籍天子猶䝉塵東郊暗長㦸兵家忌間諜此輩常接跡臺中領舉劾君必慎剖析不忍殺無辜所以分白黑上官權許與失意見遷斥仲尼甘旅人向子識損益朝廷非不知閉口休歎息余時忝諍臣丹陛實咫尺相㸔受狼狽至死難塞責行邁心多違出門無與適於公負明義惆悵頭更白直起老到若從昔日叙起轉筆定拖沓矣不忍殺無辜所以分白黑凛如秋霜皎然明白末乃引咎於已寄慨獨深申涵光曰摩結云知禰不能薦羞稱獻納臣兩公心事如青天白日他人便多回䕶矣發秦州我衰更嬾拙生事不自謀無食問樂土無衣思南州漢源十月交天氣涼如秋草木未黄落況聞山水幽栗亭名更佳下有良田疇充腸多薯蕷崖蜜亦易求宻竹復冬笋清池可方舟雖傷旅寓逺庶遂平生遊此邦俯要衝實恐人事稠應接非本性登臨未銷憂谿谷無異石塞田始㣲収豈復慰老夫惘然難乆留日色隠孤戍烏啼滿城頭中宵驅車去飲馬寒塘流磊落星月髙蒼茫雲霧浮大哉乾坤内吾道長悠悠朱熹曰觀杜詩初年甚精細晚年曠逸不可當如自秦州入蜀諸詩分明如畫乃其少作也王嗣奭曰此詩難於作結大哉乾坤内吾道長悠悠亦近亦逺収得恰好與飄蕩雲天濶同意鐵堂峽山風吹遊子縹緲乘險絶硤形藏堂隍壁色立積鐵徑摩穹蒼蟠石與厚地裂修纎無垠竹嵌空太始雪威遲哀壑底徒旅慘不悦水寒長氷横我馬骨正折生涯抵弧矢盜賊殊未滅飄蓬踰三年迴首肝肺熱鹽井鹵中草木白青者官鹽烟官作既有程煮鹽烟在川汲井嵗搰搰出車日連連自公斗三百轉致斛六千君子慎止足小人苦喧闐我何良嘆嗟物理固自然鹽筴之利筦之在官乃所以止民之争俾得流通以足食而已其留之在民者未嘗不厚天寶以來鹽價猶賤自第五琦輩立法增直而十錢者為三百七十官取多則民食貴而趨利者喧闐益甚止足之戒宜有慨乎言之寒硤行邁日悄悄山谷勢多端雲門轉絶岸積阻霾天寒寒硤不可度我實衣裳單況當仲冬交泝㳂增波瀾野人尋烟語行子傍水餐此生免荷殳未敢辭路難劉㑹孟曰怨傷忠厚得詩人之正法鏡寺身危適他州勉强終勞苦神傷山行深愁破崖寺古嬋娟碧蘚浄蕭摵寒籜聚回回山根水冉冉松上雨洩雲䝉漬晨初日翳復吐朱甍半光炯户牖粲可數拄䇿忘前期出蘿已亭午冥冥子規呌㣲徑不復取張溍曰諸詩結皆寓意感慨此獨以實景収是用筆能變處青陽峽塞外苦厭山南行道彌惡岡巒相經亘雲水氣參錯林迥硤角來天窄壁面削磎西五里石奮怒向我落仰㸔日車側俯恐坤軸弱魑魅嘯有風霜霰浩漠漠昨憶踰隴坂髙秋視吳岳東笑蓮華卑北知崆峒薄超然侔壯觀已謂殷寥廓突兀猶趂人及茲歎冥寞力鑿隘艱彼地山川非此不稱後人刻意摹之過於險怪非杜之過也龍門鎮細泉兼輕氷沮洳棧道濕不辭辛苦行迫此短景急石門雪雲隘古鎮峰巒集旌竿暮慘澹風水白刄澀胡馬屯成臯防虞此何及嗟爾逺戍人山寒夜中泣結處有識語亦淒絶黄淳耀曰時東京為史思明所據故龍門鎮兵有石門之守然此地與成臯逺不相及而防戍於此亦何為哉石龕熊羆咆我東虎豹號我西我後鬼長嘯我前狨又啼天寒昏無日山逺道路迷驅車石龕下仲冬見虹蜺伐竹者誰子悲歌上雲梯為官採美箭五嵗供梁齊苦云直簳盡無以充提携奈何漁陽騎颯颯驚蒸黎申涵光曰起勢竒崛若安放在中間即常語耳御選唐宋詩醇巻十
