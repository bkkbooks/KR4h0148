front:
  text: 欽定四庫全書御選唐宋詩醇巻四十一
  hash: sha256:3843075e1fdf1bf8a1a74e53972358331edf308bce57a95dc9cdb302df2e8336
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_084-1a, image: WYG1448/WYG1448-0802a.png}
body:
  text: 眉山蘇軾詩十目録同正輔表兄㳺白水山與正輔遊香積寺次韻正輔同遊白水山章質夫送酒六壺書至而酒不達戱作小詩問之雨後行菜殘臘獨出二首録一首新年五首録一首次韻髙要令劉湜峽山寺見寄惠州近城數小山類蜀道春與進士許毅野步㑹意處飲之且醉作詩以記適參寥専使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也食荔支二首録一首遷居兩橋詩東新橋西新橋白鶴峰新居欲成夜過西鄰翟秀才二首縱筆種茶白鶴山新居鑿井四十尺遇磐石石盡乃得泉三月二十九日二首吾謫海南子由雷州被命即行了不相知至梧廼聞尚在藤也旦夕當追及作此詩以示之行瓊儋間肩輿坐睡夢中得句云千山動鱗甲萬谷酣笙鐘覺而遇清風急雨戱作此數句次前韻寄子由遷居之夕聞鄰舍兒誦書欣然而作觀棊糴米擷菜次韻子由月季花再生次韻子由浴罷十二月十七日夜坐達曉寄子由子由生日以黄子木拄杖為子由生日之夀儋耳新居倦夜縱筆三首録一首貧家浄掃地庚辰嵗人日作時聞黄河已復北流老臣舊數論此今斯言乃騐二首録一首庚辰嵗正月十二日天門冬酒熟予自漉之且漉且嘗遂以大醉二首録一首汲江煎茶予來儋耳得吠狗曰烏觜甚猛而馴隨予遷合浦過澄邁泅而濟路人皆驚戱為作此詩澄邁驛通潮閣二首六月二十日夜渡海次韻王鬱林藤州江下夜起對月贈邵道士廣倅蕭大夫借前韻見贈復和答之二首録一首次韻韶倅李通直二首録一首李伯時畫其弟亮功舊隠宅圖贈嶺上老人予昔過嶺而南題詩龍泉鐘上今復過而北次前韻過嶺二首留題顯聖寺歇白塔舖鬱孤臺次韻江晦叔二首録一首寒日與器之游南塔寺寂照臺贈詩僧道通予昔作壺中九華詩其後八年復過湖口則石己為好事者取去乃和前韻以自解云次韻郭功甫二首録一首宋復古畫瀟湘晚景圖三首嘲子由第五橋軒牕魚
  hash: sha256:0e265f57685924535e893a2f02b9da14015b593e0b678e7a9c278ae82d902914
