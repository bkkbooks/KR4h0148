front:
  text: 欽定四庫全書御選唐宋詩醇巻八
  hash: sha256:667bf6a24c910576e67b15c31eed35c26a945d5162de7de3744657b20227197e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_018-1a, image: WYG1448/WYG1448-0189a.png}
body:
  text: 隴西李白詩八目錄夜泊黄山聞殷十四吳吟宿鰕湖蘇臺覽古越中覽古峴山懐古經下邳圮橋懐張子房金陵陪宋中丞武昌夜飲懐古望鸚鵡洲懐禰衡宿巫山下金陵白楊十字巷謝公亭夜泊牛渚懐古尋髙鳳石門山中元丹丘月下獨酌春歸終南山松龕舊隠尋山僧不遇作待酒不至獨酌友人㑹宿春日獨酌二首金陵江山遇蓬池隠者山中與幽人對酌春日醉起言志廬山東林寺夜懐尋雍尊師隠居與史郎中欽聽黄鶴樓上吹笛對酒獨坐敬亭山自遣訪戴天山道士不遇秋日與張少府楚城韋公藏書髙齋作憶東山望月有懐對酒憶賀監重憶效古二首擬古感興秋夕旅懐尋陽紫極宫感秋作秋夕書懐荆州賊平臨洞庭言懐作江南春懐聽蜀僧濬彈琴初出金門尋王侍御不遇詠壁上鸚鵡觀元丹丘坐巫山屏風見野草中有曰白頭翁者流夜郎題葵葉瑩禪師房觀山海圖白鷺鷥詠桂巫山枕障勞勞亭嘲魯儒春夜洛城聞笛宣城見杜鵑花白田馬上聞鶯三五七言雜詩寄逺長門怨陌上贈美人閨情怨情湖邉採蓮婦怨情代寄情楚辭體學古思邉别内赴徴自代内贈越女詞巴女詞自溧水道哭王炎哭宣城善釀紀叟題舒州司空山瀑布上清寳鼎詩
  hash: sha256:29fcd9936142fa4a528a9be0337f73447bf43df6f697dbe549f33b5cd3923e11
