  text: 欽定四庫全書御選唐宋詩醇巻三十二
  hash: sha256:4b6d38d00e6e21d1171941ecff853d2865dedbcda9f4ab15bff25952e491a099
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_067-1a, image: WYG1448/WYG1448-0605c.png}
body:
  text: 眉山蘇軾詩一詩日杜韓以後唐季五代纎佻薄弱日即淪胥宋初楊億劉筠錢惟演之徒崇尚崑體祇是温李後塵嗣是蘇舜欽以豪放自異梅堯臣以髙淡為宗雖志於古矣而神明變化之功少未有能驂駕杜韓卓然自成一家而雄視百代者必也其蘇軾乎軾之器識學問見於政事發於文章史稱言足以達其有猷行足以遂其有為節義足以固其有守皆志與氣為之也惟詩亦然地負海涵不名一體而核其㫖要之所在如云我詩雖云拙心平聲韻和此軾自評其詩者也作詩熟讀毛詩國風離騷曲折盡在是此軾自以其所得教人者也且夫精深華妙則蘇轍稱之矣公如大國楚吞五湖三江則黄庭堅稱之矣天才宏放宜與日月爭光則蔡絛稱之矣屈注天潢倒連滄海變眩百恠終歸渾雅則敖陶孫稱之矣前之曹劉陶謝後之李杜韓白無所不學亦無所不工同時歐陽王黄猶俱遜謝焉洵乎獨立千古非一代一人之詩也而陳師道顧謂其初學劉禹錫晚學李太白母乃一知半解歟但其詩氣豪體大有非後哲所易學步者是以元好問論詩有云只知詩到蘇黄盡滄海横流却是誰又云蘇門果有忠臣在肯放坡詩百態新蓋非用此為譏議乃正以見其不可摸擬耳其與軾並世之人漫為評論者如張舜民有仔細檢㸃不無利鈍之言而楊時至謂其不知風雅之意後來嚴羽更以其自出己意為詩之大厄創大言以欺世夫豈可為篤論哉是編所錄挹菁拔萃審擇再三殆無遺憾其生平豐功亮節與夫兄弟朋友過從離合之跡及一時新法之廢興時事之遷變靡不因之以見詩凡五百餘首古體則五言稍多於七言近體則七言數倍於五言要歸本於六義之㫖亦非有成見也辛丑十一月十九日既與子由别於鄭州西門之外馬上賦詩一篇寄之不飲胡為醉兀兀此心已逐歸鞍發歸人猶自念庭闈今我何以慰寂寞登髙回首坡隴隔惟見烏㡌出復没苦寒念爾衣裘薄獨騎瘦馬踏殘月路人行歌居人樂僮僕怪我苦悽惻亦知人生要有别但恐嵗月去飄忽寒燈相對記疇昔夜雨何時聽蕭瑟君知此意不可忘慎勿苦愛髙官職自注嘗有夜雨對牀之言故云爾軾與其弟轍友愛特至時軾赴鳯翔簽判之任既别而作此詩起句突兀有意味前叙既别之深情後憶昔年之舊約亦知人生要有别轉進一層曲折遒宕軾是時年甫二十六而詩格老成如是許顗詩話曰燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨此真可泣鬼神矣東坡詩云登髙回首坡隴隔惟見烏㡌出復没逺紹其意王方直詩話曰東坡喜韋蘇州詩寧知風雨夜復此對牀眠之句故在鄭别子由云寒燈相對記疇昔夜雨何時聽蕭瑟又初秋子由與坡相從彭城賦詩云誤喜對牀尋舊約不知飄泊在彭城子由使遼在神水館賦詩云夜雨從來對榻眠茲行萬里隔湖天坡在御史獄有云他年夜雨獨傷神在東府有云對牀定悠悠夜雨今蕭瑟其同轉對有云對牀貪聽連宵雨又曰對牀欲作連夜雨又曰對牀老兄弟夜雨鳴竹屋此其兄弟所賦也相約退休可謂無日忘之然竟不能成其約其意見於逍遥堂詩叙云過宜賔見夷中亂山江寒晴不知逺見山上日朦朧含髙峯晃蕩射峭壁横雲忽飄散翠樹分歴歴行人挹孤光飛鳥投逺碧蠻荒誰復愛穠秀安可適豈無避世士髙隠鍊精魄誰能從之遊路有豺虎迹孤冷巉削具縋幽鑿險之能紀年錄曰嘉祐四年荆州上王兵部書曰自蜀至楚舟行六十日過郡十一縣二十有六公由水路至嘉州入嘉陵江由瀘渝涪忠䕫等州入峽江故作過宜賔泊牛口入峽出峽等詩夜泊牛口日落江霧生繫舟宿牛口居民偶相聚三四依古栁負薪出深谷見客喜且售煑蔬為夜飱安識肉與酒朔風吹茅屋破壁見星斗兒女自吚嚘亦足樂且乆人生本無事苦為世味誘富貴耀吾前貧賤獨難守誰知深山子甘與麋鹿友置身落蠻荒生意不自陋今子獨何者汲汲强奔走不見可欲使心不亂於此悟出艱難中骨力孰謂陋室荒村不可以學道夜行觀星天髙夜氣嚴列宿森就位大星光相射小星閙若沸天人不相干嗟彼本何事世俗强指擿一一立名字南箕與北斗乃是家人器天亦豈有之無乃遂自謂廹觀知何如逺想偶有似茫茫不可曉使我長歎喟掻首問天通以𤣥解是即道不可名强名曰道之㫖也八陣磧平沙何茫茫髣髴見石蕝縱横滿江上嵗嵗沙水齧孔明死己乆誰復辨行列神兵非學到自古不留訣至人已心悟後世徒妄說自從漢道衰蠭起盡姦傑英雄不相下禍難乆連結驅民市無烟戰野江流血萬人賭一擲殺盡如沃雪不為乆逺計草草常無法孔明最後起意欲掃羣孽崎嶇事節制隠忍乆不決志大遂成迂嵗月去如瞥六師分未整一旦英氣折惟餘八陣圖千古壯䕫峽後幅評論孔明數語惜之至服之至也八陣圖壘人所共知其箕張翼舒之形無煩鋪叙放懐今古歴歴千年氣成虹霓詞出金石意豈獨為武侯嘆絶水經注曰江水又東逕諸葛亮圖壘南石磧平曠望兼川陸有亮所作八陣圖東跨故壘皆累細石為之自壘西去聚石八行行閒相去二丈因曰八陣入峽自昔懐幽賞今茲得縱探長江連楚蜀萬𣲖瀉東南合水來如電黔波緑似藍餘流細不數逺勢競相參入峽初無路連山忽似龕縈紆収浩渺蹙縮作淵潭風過如呼吸雲生似吐含墜崖鳴窣窣垂蔓緑􅆴􅆴冷翠多崖竹孤生有石楠飛泉飄亂雪怪石走驚驂絶㵎知深淺樵僮忽兩三人烟偶逢郭沙岸可乘籃野戍荒州縣邦君古子男放衙鳴晚鼓留客薦霜柑聞道黄精草叢生緑玉篸盡應充食飲不見有彭耼氣候冬猶暖星河夜半涵遺民悲昶衍自注孟昶從此入覲王衍亦蜀主舊俗接魚蠶版屋漫無瓦嵓居窄似菴伐薪常冐嶮得米不盈甔歎息生何陋劬勞不自慙葉舟輕逺泝大浪固嘗諳矍鑠空相視嘔啞莫與談蠻荒安可駐幽䆳信難妉獨愛孤棲鶻髙超百尺嵐横飛應自得逺颺似無貪振翮游霄漢無心顧雀䳺塵勞世方病局束我何堪盡解林泉好多為富貴酣試看飛鳥樂髙遁此心甘用險韻作長律盡如其意之所出最稱擅長首二句虚籠以作起局長江六句又作總挈其入峽十二句峽中之景物也絶㵎十二句峽中之人事也氣候八句則言人居峽之陋歎息八句則言已入峽之勞至獨愛孤棲鶻以下十二句前六句寫孤鶻横飛自得之樂後六句寫自已局束塵勞之態兩相對照作開閤之勢知髙超之樂則知髙遁之甘矣章法明嫿如觀逺岫列秀青青太平寰宇記曰瞿塘峽在䕫州府城東舊名西陵峽兩崖對峙中貫一江灧澦堆當其口乃三峽之門巫峽在巫山縣明月峽在夷陵州懸崖閒白石如月黄牛峽在夷陵州西三峽記曰三峽連亘七百里重巖叠嶂隠蔽天日非亭午夜分不見日月水經云杜宇所鑿出峽入峽喜巉巖出峽喜平曠吾心淡無累遇境即安暢東西徑千里勝處頗屢訪幽尋逺無厭髙絶毎先上前詩尚遺畧不錄乆恐忘憶從巫廟囘中路寒泉漲汲歸真可愛翠碧光滿盎忽驚巫峽尾岩腹有穿壙仰見天蒼蒼石室開南嚮宣尼古廟宇叢木作幃帳鐵楯横半空俯瞰不計丈古人誰架構下有不測浪石竇見天囷瓦棺悲古葬新灘阻風雪村落去攜杖亦到龍馬溪茅屋沽村釀玉虛悔不至實為舟人誑聞道石最竒寤寐見怪狀峽山富竒偉得一知㡬喪苦恨不知名歴歴但想像今朝脫重險楚水𣺌平蕩魚多客庖足風順行意王追思偶成篇聊助舟人唱險境發以雄詞須看其意思閒暇蕭散處神女廟大江從西來上有千仭山江山自環擁恢詭富神姦深淵鼉鼈横巨壑蛇龍頑旌陽斬長蛟雷雨移蒼灣蜀守降老蹇至今帶連鐶縱横若無主蕩逸侵人寰上帝降瑶姬來處荆巫間神仙豈在猛玉坐幽且閒飄蕭駕風馭弭節朝天關倐忽巡四方不知道里艱古粧具法服邃殿羅烟鬟百神自奔走雜沓來趨班雲興靈怪聚雲散鬼神還茫茫夜潭靜皎皎秋月彎還應揺玉珮來聽水潺潺徐徊神境仿像仙踪不襲用玉色頩顔及望帷褰幬一切猥瑣漫䙝之語范成大巫山圖及巫山髙二詩亹亹力辨何不縁軾詩巫山神女二作為証耶呉船錄曰下巫峽三十五里至神女廟十二峰皆在北岸前後映帶不能足其數所謂陽臺髙唐觀在來鶴峯上亦未必是神女之事據宋玉賦本以諷襄王後世不察一切以兒女子䙝之今廟中石刻引庸城記瑶姬西王母之女稱雲華夫人助禹令鬼神斬石疏流有功見紀今封妙用真人巫山瞿塘迤邐盡巫峽崢嶸起連峰稍可怪石色變蒼翠天工運神巧漸欲作竒偉坱軋勢方深結構意未遂旁觀不暇瞬步步造幽䆳蒼崖忽相逼絶壁凛可悸仰觀八九頂俊爽凌顥氣晃蕩天宇髙崩騰江水沸孤超兀不讓直拔勇無畏攀縁見神宇憩坐就石位巉巉隔江波一一問廟吏遥觀神女石綽約誠有以俯首見斜鬟拖霞弄修帔人心隨物變逺覺含深意野老笑吾旁少年嘗屢至去隨猿猱上反以繩索試石笋倚孤峰突兀殊不類世人喜神怪論説驚幼稚楚賦亦虚傳神仙安有是次問掃壇竹云此今尚爾翠葉紛下垂婆娑緑鳯尾風來自偃仰若為神物使絶頂有三碑詰曲古篆字老人那解讀偶見不能記窮探到峰背採斫黄楊子黄楊生石上堅瘦文如綺貪心去不顧㵎谷千尋縋山髙虎狼絶深入垣無忌洪濛草樹密蔥蒨雲霞膩石竇有洪泉甘滑如流髓終朝自盥潄冷冽清心胃浣衣挂樹梢磨斧就石鼻徘徊雲日晚歸意念城市不到今十年衰老筋力憊當時伐殘木牙蘖已如臂忽聞老人説終日為歎喟神仙固有之難在忘勢利貧賤爾何愛棄去如脱屣嗟爾若無還絶糧應不死帶阜纓巒屯雲積氣析之則句鍊字琢合之則悠悠乎與顥氣以俱而莫得其涯入蜀記曰巫山峰巒上入霄漢山脚直揷江中議者謂太華衡廬皆無此竒然十二峰者不可悉見所見八九峰惟神女峰最為纎麗竒峭宜為仙真所托荆州十首錄三首南方舊戰國慘澹意猶存慷慨因劉表淒涼為屈原廢城猶帶井古姓聚成村亦解觀形勝昇平不敢論朱檻城東角髙王此望沙江山非一國烽火畏三巴戰國淪秋草危樓倚斷霞百年豪傑盡擾擾見魚鰕栁門京國道驅馬及春陽野火燒枯草東風動緑芒北行連許鄧南去極衡湘楚境横天下懐王信弱王俯仰陳跡懐古者所同悲壯慷慨則唐賢得意筆也嘉祐庚子軾侍其父洵自荆州浮大梁此詩當在鄭州西門作之前太白山下早行至横渠鎮書崇壽院壁馬上續殘夢不知朝日昇亂山横翠幛落月澹孤燈奔走煩郵吏安閒愧老僧再游應眷眷聊亦記吾曾次聨是早行景色妙從首句殘夢二字生出故日月字不嫌雜見王世貞之論似密實疎藝苑巵言曰劉駕馬上續殘夢境頗佳下云馬嘶而復驚遂不成語矣蘇子瞻用其語下云不知朝日昇亦未是至復改為瘦馬兀殘夢愈墜惡道留題延生觀後山小堂溪山愈好意無厭上到巉巉第㡬尖深谷野禽毛羽怪上方仙子鬢眉纎不慙弄玉騎丹鳯應逐嫦娥駕老蟾㵎草巖花自無主晚來胡蝶入疎簾三句觀後之景四句小堂之景唐時文安潯陽平恩邵陽永嘉永安義昌安陽諸主皆先後丐為道士築觀在外玉真師事道士史崇元此詩中二聨較之李義山不逢蕭史休回首莫見洪崕又拍肩之句更為語隠而意微趙次公曰延生觀後上小山有堂是唐玉真公主修道遺跡青城山記曰玉真公主肅宗之姑也築室丈人觀玉真金仙二公主真容見在石鼻城平時戰國今無在陌上征夫白不閒北客初來試新險蜀人從此送殘山獨穿暗月朦朧裏愁渡奔河蒼茫間漸入西南風景變道邊修竹水潺潺揮霍如意五六一聨深沈雄健景中有情蒼茫二字俱讀從上聲前人所未有此自軾詩創用唐人如韓詩讀張王為去聲白詩讀曨􅀈為上聲後人不審所出遂謂前賢自我作古恐不盡然耳趙次公曰石鼻寨即武成鎮也戰國指言蜀與魏也諸葛亮作此城以拒郝昭自北來而入蜀者至此漸入山故曰試新險自蜀來而趨京洛者至此已出山故曰送殘山自此地前往寳鷄為入西南矣病中大雪數日未嘗起觀虢令趙薦以詩相屬戲用其韻答之經旬卧齋閣終日親劑和不知雪已深但覺寒無奈飄蕭牕紙明堆壓簷板墮自注關中皆以板為簷風飇助凝冽幃幔困掀簸惟思近醇醲未敢窺璨瑳何時反炎赫郤欲躬臼磨誰言坐無氊尚有裘充貨西鄰歌吹發促席寒威挫崩騰踏成逕繚繞飛入座人歡瓦先融飲雋缾屢卧嗟予獨愁寂空室自困坷欲為後日賞恐被遊塵涴寒更報新霽皎月懸半破有客獨苦吟清夜默自課詩人例窮蹇秀句出寒餓何當暴霜雪庶以躡郊賀和韻詩峻拔瀏利如彈丸脱手大蘇所長嵗晚相與饋問為饋嵗酒食相邀呼為别嵗至除夜達旦不眠為守嵗蜀之風俗如是余官於岐下嵗暮思歸而不可得故為此三詩寄子由饋嵗農功各已收嵗事得相佐為歡恐無及假物不論貨山川隨出産貧富稱小大寘盤巨鯉横發籠雙兔卧富人事華靡綵繡光翻座貧者愧不能微摰出舂磨官居故人少里巷佳節過亦欲舉鄉風獨唱無人和别嵗故人適千里臨别尚遲遲人行猶可復嵗行那可追問嵗安所之逺在天一涯巳逐東流水赴海歸無時東隣酒初熟西舍彘亦肥且為一日歡慰此窮年悲勿嗟舊嵗别行與新嵗辭去去勿囘顧還君老與衰即古詩所遇無故物焉得不速老意而暢言之頓挫淋漓有對此茫茫百端交集之概守嵗欲知垂盡嵗有似赴壑蛇修鱗半己没去意誰能遮况欲繫其尾雖勤知奈何兒童彊不睡相守夜讙譁晨雞且勿唱更鼓畏添撾坐乆燈燼落起看北斗斜明年豈無年心事恐蹉跎努力盡今夕少年猶可誇前六句比中六句賦結句猶可誇者非幸詞正以見去日之苦多而盛年之不再也此與别嵗一首佳處不減魏武短歌和子由論書吾雖不善書曉書莫如我茍能通其意常謂不學可貎妍容有矉璧美何妨橢端莊雜流麗剛健含婀娜好之每自譏不謂子亦頗書成輒棄去繆被旁人裹體勢本闊落結束入細麽子詩亦見推語重未敢荷邇來又學射力薄愁官笴自注官箭十二把吾能十一把箭耳多好竟無成不精安用夥何當盡屏去萬事付懶惰吾聞古書法守駿莫如跛世俗筆苦驕衆中强嵬騀鍾張忽己逺此語與時左論書實自道其所得端莊剛健一聨及體勢結束一聨宛然見軾書法也中閒揷入學射一段軒然波起凌厲無前韻語陽秋曰東坡與子由論書云吾雖不善書曉書莫如我茍能通其意常謂不學可故其子叔黨跋公書云吾先君子豈以書自名哉特以其至大至剛之氣發於胷中而應之以手故不見其有刻畫嫵媚之態而端乎章甫若有不可犯之色少年喜二王書晚乃喜顔平原故時有二王風氣俗手不知妄謂學徐浩陋矣觀此則知初未嘗規規然出於翰墨積習也鳯翔八觀并序錄五首鳯翔八觀詩記可觀者八也昔司馬子長登會稽探禹穴不逺千里而李太白亦以七澤之觀至荆州二子蓋悲世悼俗自傷不見古人而欲一觀其遺蹟故其勤如此鳯翔當秦蜀之交士大夫之所朝夕往來此八觀者又皆跬步可至而好事者有不能徧觀焉故作詩以告欲觀而不知者石鼓歌冬十二月嵗辛丑我初從政見魯叟舊聞石鼓今見之文字鬱律蛟蛇走細觀初以指畫肚欲讀嗟如箝在口韓公好古生己遲我今况又百年後强尋偏傍推㸃畫時得一二遺八九我車既攻馬亦同其魚維鱮貫之桞自注其詞云我車既攻我馬亦同又云其魚維何維鱮維鯉何以貫之維楊與栁惟此六句可讀餘多不可通古器縱横猶識鼎衆星錯落僅名斗糢糊半已似瘢胝詰曲猶能辨跟肘娟娟缺月隠雲霧濯濯嘉禾秀莨莠漂流百戰偶然存獨立千載誰與友上追軒頡相唯諾下揖冰斯同鷇㝅憶昔周宣歌鴻鴈當時籀史變蝌蚪厭亂人方思聖賢中興天為生耆耉東征徐鹵闞虓虎北伏犬戎隨指嗾象胥雜沓貢狼鹿方召聨翩賜圭卣遂因鼓鼙思將帥豈為考擊煩矇瞍何人作頌比崧髙萬古斯文齊岣嶁勲勞至大不矜伐文武未逺猶忠厚欲尋年嵗無甲乙豈有名字記誰某自從周衰更七國竟使秦人有九有掃除詩書誦法律投棄俎豆陳鞭杻當年何人佐祖龍上蔡公子牽黄狗登山刻石頌功烈後者無繼前無偶皆云皇帝巡四國烹滅彊暴救黔首六經既己委灰塵此鼓亦當遭擊掊傳聞九鼎淪泗上欲使萬夫沈水取暴君縱欲窮人力神物義不汙秦垢是時石鼓何處避無乃天工令鬼守興亡百變物自閒富貴一朝名不朽細思物理坐歎息人生安得如汝壽雄文健筆句竒語重氣魄與韓退之作相埒而研練過之細玩通篇以冬十二月四句起以興亡百變四句結起倣北征詩體結亦悠然不盡若韓詩起四句未免平率結云嗚呼吾意其蹉跎又何衰颯也中閒分三大段第一段自細觀初以指畫肚至下揖氷斯同鷇㝅鋪叙石鼔之文詞字蹟實景實事所與韓公不同者在此故詳述於前且正是初見時情狀古器縱横六句詳寫石鼓之竒古固非文字鬱律蛟蛇走一句所能盡缺月嘉禾視韓詩鸞翔鳯翥珊瑚碧樹之詞又出一竒也漂流百戰四句作轉軸起下二段意憶昔周宣歌鴻鴈至豈有名字記誰某推原溯委鋪述典重自從周衰更戰國至無乃天工令鬼守憑弔古今却以六經九鼎作陪瀾翻無竭筆力馳驟中章法乃極嚴謹真足嗣響少陵苕溪漁隠叢話曰韋蘇州石鼓歌云乃是宣王之臣史籀作退之石鼓歌初不指言史籀所作永叔集古錄云至於字畫亦非史籀不能作此蓋原蘇州之歌而云爾蘇長公石鼔詩云憶昔周宣歌鴻鴈當時籀史變蝌蚪亦原於蘇州也趙次公曰先生詩後段云憶昔周宣歌鴻鴈當時籀史變蝌蚪則石鼓之字蓋蝌蚪之變韓愈有科斗書後記一篇云李陽冰之子服之授余以其家科斗孝經漢衛宏官書兩部合一巻且曰古書得其據依葢可讀如是則退之宜識科斗書者石鼓歌乃云辭嚴義密讀難曉字體不類𨽻與科而先生今詩乃能通其六句則先生為精於字學矣歐陽集古跋尾葢謂韋應物以為文王之鼓韓退之以為宣王之鼓不知何所據而然卒以退之好古不妄者為可信然未嘗載其文至子由和先生詩乃云形雖不具意可知有云楊桞貫魴鱮先生詩注云維鱮維鯉而子由云魴鱮豈各以所辨之字言之乎朱彞尊曰楊用修謂從李賔之所得唐人拓本多至七百有二字叉言及見東坡之本人多惑焉攷賔之石鼓歌中云家藏舊本出棃棗楮墨輕虚不盈握拾殘補缺能㡬何以一涓埃裨海嶽夫以歐陽薛胡諸家所見止四百餘字若賔之本有七百餘字拾殘補缺亦己多矣賔之不應為是言也子瞻之詩曰韓公好古生己遲我今况又百年後强尋偏旁推㸃畫時得一二遺八九子由和之有云形骸偃蹇任苔蘚文字皴剝因風雨字形漫汗隨石缺蒼蛇生角龍折股夫用修之本既得自賔之傳自子瞻是子瞻克見其全子由亦得縱觀子瞻子由又不應為是言也王維吳道子畫何處訪吳畫普門與開元開元有東塔摩詰留手痕吾觀畫品中莫如二子尊道子實雄放浩如海波翻當其下手風雨快筆所未到氣己吞亭亭雙林閒彩暈扶桑暾中有至人談寂滅悟者悲涕迷者手自捫蠻君鬼伯千萬萬相排競進頭如黿摩詰本詩老佩芷襲芳蓀今觀此壁畫亦若其詩清且敦祗園弟子盡鶴骨心如死灰不復温門前兩叢竹雪節貫霜根交柯亂葉動無數一一皆可尋其源吳生雖妙絶猶以畫工論摩詰得之於象外有如仙翮謝籠樊吾觀二子皆神俊又於維也歛袵無閒言以史遷合傳論贊之體作詩開合離竒音節疎古道子下筆入神篇中摹寫亦不遺餘力将言吳不如王乃先於道子極意形容正是尊題法也後稱王維只云畫如其詩而所以譽其畫筆者甚淡顧其妙在筆墨之外者自能使人於言下領悟更不必似畫斷鑿鑿指為神品妙品矣許顗詩話曰老杜作曹將軍丹青引云一洗萬古凡馬空東坡觀吳道子畫壁云筆所未到氣己吞吾不得見其畫矣斯評也二公之句各可以當之東湖吾家蜀江上江水緑如藍邇來走塵土意思殊不堪况當岐山下風物尤可慙有山秃如赭有水濁如泔不謂郡城東數步見湖潭入門便清奥恍如夢西南泉源從髙來隨波走涵涵東去觸重阜盡為湖所貪但見蒼石螭開口吐清甘借汝腹中過胡為目耽耽新荷弄晚涼輕棹極幽探飄飄忘逺近偃息遺佩篸深有龜與魚淺有螺與蚶曝晴復戲雨戢戢多於蠶浮沈無停餌倐忽遽滿籃絲緡雖强致瑣細安足戡聞昔周道興翠鳳棲孤嵐飛鳴飲此水照影弄毿毿自注此古飲鳯池也至今多梧桐合抱如彭耼彩羽無復見上有鸇搏䳺嗟予生雖晚好古意所妉圖書已漫漶猶復訪僑郯巻阿詩可繼此意久已含扶風古三輔政事豈汝諳聊為湖上飲一縱醉後談門前逺行客劫劫無留驂問胡不囘首無乃趁朝參予今正疎懶官長幸見函不辭日游再行恐嵗滿三暮歸仍倒載鐘鼓已韽韽前幅寫東湖之勝而曰湖所貪曰目耽耽匪直摹景而已入後自寫閒遊實有懐抱觀古今之意扶風古三輔政事豈汝諳二句意最深厚得簡兮詩人之㫖沈屈下僚勾檢簿書無由得盡其才不得已而為湖上之遊詎與尋踪探勝者比攷是時軾為鳯翔判官陳希亮為府帥以屬禮待之或謁入不得見軾壯年氣盛不相下其客位假寐作有云同僚不解事愠色見髯鬚雖無性命憂且復忍須臾此詩末復云予今正疎懶官長幸見函無聊不平時一發露於辭氣故必知其人論其世而後可與言詩後人注詩者俱未見及此客位之作編入通守錢塘時併其年譜中次序亦錯謬矣真興寺閣山川與城郭漠漠同一形市人與鴉鵲浩浩同一聲此閣㡬何髙何人之所營側身送落日引手攀飛星當年王中令斫木南山赬寫真留閣下鐵面眼有稜身强八九尺與閣兩崢嶸古人雖暴恣作事今世驚登者尚呀喘作者何以勝曷不觀此閣其人勇且英蒼蒼莽莽意到筆隨中閒側身送落日引手攀飛星十字竒警奪目可與老杜七星在北户河漢聲西流相匹敵趙䕫曰此詩用古人意而不取其字杜子美登慈恩寺塔詩云秦山忽破碎涇渭不可求俯視但一氣焉能辨皇州李氏園自注李茂貞園也今為王氏所有朝遊北城東囘首見修竹下有朱門家破墻圍古屋舉鞭叩其户幽響答空谷入門所見夥十步九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深牕户緑水光兼竹凈時有獨立鵠林中百尺松嵗久蒼鱗蹙豈惟此地少意恐關中獨小橋過南圃夾道多喬木隠如城百雉挺若舟千斛陰陰日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅棃驚合抱映島孤雲馥春光水溶漾雪陣風翻撲其北臨長溪波聲巻平陸北山卧可見蒼翠閒磽秃我時來周覽問此誰所築云昔李將軍負險乗衰叔抽錢算閒口但未㩁羮粥當時奪民田失業安敢哭誰家美園囿籍没不容贖此亭破千家鬱鬱城之麓將軍竟何事蟣蝨生刀韣何嘗載美酒來此駐車轂空使後世人聞名頸猶縮自注俗猶呼皇后圍葢茂貞謂其妻也我今官正閒屢至因休沐人生營居止竟為何人卜何當辦一身永與清景逐叙園中景物委析詳盡自西而南而東而北一一㸃睛宛似栁州小記後以感慨之情寓通曠之見令人意愜五代史李茂貞本姓宋名文通唐禧宗閒以功拜鳯翔隴右節度使賜姓名昭宗景福元年反犯京師加拜尚書令封岐王後唐莊宗同光二年卒七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿於僧舍曾閣閣故曾氏所建也夜久不寐見壁有前縣令趙薦留名有懐其人龕燈明滅欲三更欹枕無人夢自驚深谷留風終夜響亂山銜月半牀明故人漸逺無消息古寺空來看姓名欲向磻溪問姜叟僕夫屢報斗杓傾夜色蒼涼撫景懷人想見竟夕裵囘之致二十七日自陽平至斜谷宿於南山中蟠龍寺横槎晚渡碧㵎口騎馬夜入南山谷谷中暗水響瀧瀧嶺上疎星明煜煜寺藏嵓㡳千萬仞路轉山腰三百曲風生饑虎嘯空林月黑驚麏竄修竹入門突兀見深殿照佛青熒有殘燭媿無酒食待游人旋斫杉松煑溪䔩板閣獨眠驚旅枕木魚曉動隨僧粥起觀萬瓦鬱參差日亂千巖散紅緑門前商賈負椒荈山後咫尺連巴蜀何時歸耕江上田一夜心逐南飛鵠顔謝以後古詩多有對偶終篇者入唐遂以有聲病者為律無聲病者為古至於七言古體亦時一有之若少陵之霜皮溜雨四十圍黛色參天二千尺子規夜啼山竹裂王母晝下雲旗翻昌黎之大蛇中斷喪前王羣馬南渡開新主何人有酒身無事誰家種竹門可欵硬語排奡視唐初四子及元白諸家之宛然律調者不可同曰語也若其自首至尾無句不裁對無對不瑰偉絶特則惟軾集中有之實為創格此作亦其一也其中寫景處語刻畫而句渾成讀之可怖可喜筆力竒絶是日至下馬磧憇於北山僧舍有閣曰懐賢南直斜谷西臨五丈原諸葛孔明所從出師也南望斜谷口三山如犬牙西觀五丈原鬱屈如長蛇有懐諸葛公萬騎出漢巴吏士寂如水蕭蕭聞馬檛公才與曹丕豈止十倍加顧瞻三輔間勢若風巻沙一朝長星墜竟使蜀婦髽山僧豈知此一室老烟霞往事逐雲散故山依渭斜客來空弔古清淚落悲笳不著議論而鬱拔縱横之氣自寓語澹味長最是髙格邵長蘅曰蕭蕭聞馬檛詩車攻篇蕭蕭馬鳴毛傳言不讙譁也公詩用此意三國志曰建興十二年諸葛亮悉大衆由斜谷出以流馬運據武功五丈原與司馬仲達對於渭南分兵屯田為久住之基耕者襍於渭濵之閒而百姓安堵軍無私焉趙次公曰案長安志引水經注曰斜水北歴斜谷過五丈原亦謂之武功水又曰武功蓋在渭水南郿縣北是今先生禱雨於虢縣之磻溪故所經由望見郿縣之五丈原和子由記園中草木十一首錄五首荒園無數畝草木動成林春陽一已敷妍醜各自矜蒲萄雖滿架困倒不能任可憐病石榴花如破紅襟葵花雖粲粲蔕淺不勝簪叢蓼晚可喜輕紅隨秋深物生感時節此理等廢興飄零不自由盛亦非汝能種柏待其成柏成人己老不如種叢篲春種秋可倒陰陽不擇物美惡隨意造柏生何苦艱似亦費天巧天工巧有㡬肯盡為汝耗君看藜與藿生意常草草萱草雖微花孤秀能自拔亭亭亂葉中一一芳心揷牽牛獨何畏詰曲自牙蘖走尋荆與榛如有宿昔約南齋讀書處亂草曉如發偏工貯秋雨嵗嵗壊籬落蘆笋初似竹稍開葉如蒲方春節抱甲漸老根生䰅不愛當夏緑愛此及秋枯黄葉倒風雨白花揺江湖江湖不可到移植苦勤劬安得雙野鴨飛來成畫圖我歸自南山山翠猶在目心隨白雲去夢遶山之麓汝從何方來笑齒粲如玉探懐出新詩秀語奪山緑覺來巳茫昧但記説秋菊有如採樵子入洞聽琴筑歸來寫遺聲猶勝人閒曲自注八月十一日夜宿府學方和此詩夢與弟游南山出詩數十篇夢中甚愛之及覺唯記一句云蟋蟀悲秋菊前四首俱是雜寫花木隨處拈出竗諦非見道忘山者不能獲此圓通也末首則别為一調秀語奪山緑一句情味備至每於稱許轍處想見其友于式好有怡怡之樂此數詩格調柴桑淡逺修武倔竒殆兼擅其勝司竹監燒葦園因召都巡檢柴貽朂左藏以其徒㑹獵園下官園刈葦嵗留槎深冬放火如紅霞枯槎燒盡有根在春雨一洗皆萌芽黄狐老最狡捷賣侮百獸常矜誇年年此厄竟不悟但愛䝉密爭來家風廻熖巻毛尾熱欲出巳被蒼鷹遮野人來言此最樂徒手曉出歸滿車廵邊將軍在近邑呼來颯颯從矛叉戍兵久閒可小試戰鼓雖凍猶堪撾雄心欲搏南㵎虎陣勢頗學常山蛇霜乾火烈聲爆野飛走無路號且呀迎人截來砉逢箭避犬逸去窮投罝擊鮮走馬殊未厭但恐落日催棲鵶弊旗仆鼔坐數獲鞍挂雉兔肩分麚主人置酒聚狂客紛紛醉語晚更譁燎毛燔肉不暇割飲啖直欲追羲媧青丘雲夢古所咤與此何啻百倍加苦遭諫疏説夷羿又被賦客嘲滛奢豈如閒官走山邑放曠不與趨朝衙農工已畢嵗云暮車騎雖少賔殊佳酒酣上馬去不告獵獵霜風吹㡌斜從燒園指出物性愚迷語直而曲廵邊將軍以下十四句以議論叙事颯颯灑灑具有聲色此段既極竒横故主人置酒以下更為紆徐以暢其氣結用獨孤側㡌事恰合㑹獵情景而役使無痕但覺有餘韻逸趣其才真能吞若雲夢者八九其於胸中曾不芥蔕也秀州僧本瑩靜照堂鳥囚不忘飛馬繫嘗念馳靜中不自勝不若聽所之君看厭事人無事乃更悲貧賤苦形勞富貴嗟神疲作堂名靜照此語子謂誰江湖隠淪士豈無適時資老死不自惜扁舟自娛嬉從之恐莫見况肯從我為厭事人無事更悲説來絶倒即就起動相以証真諦之寂然何必坐斷千崖乃得慧眼無見送安惇秀才失解西歸舊書不厭百囘讀熟讀深思子自知他年名宦恐不免今日棲遲那可追我昔家居斷還往著書不復窺園葵朅來東遊慕人爵棄去舊學從兒嬉狂謀謬算百不遂惟有霜鬢來如期故山松柏皆手種行且拱矣歸何時萬事早知皆有命十年浪走寧非癡與君未可較得失臨别惟有長嗟咨送其失解歸而乃勉以讀書朋友切偲之義莫過於此董遇百遍見義熟讀之謂也王筠重覽興深深思之謂也讀書之法亦莫過於此安惇初從軾遊末流乃與元祐諸賢為難當時至有童謡曰大惇小惇殃及子孫葢大惇謂章惇小惇謂安惇也然則安惇乃正世之狂謀謬算者此詩知其他年名宦恐不免而始終以熟讀舊書為箴規固早有以窺其微矣許彦周詩話曰古人文章不可輕易反覆熟讀加意思索庶㡬其見之東坡詩云舊書不厭百囘讀熟讀深思子自知僕嘗以此語銘座右而書諸紳也送劉道原歸覲南康晏嬰不滿六尺長髙節萬仞陵首陽青衫白髪不自歎富貴在天那得忙十年閉户樂幽獨百金購書收散亡朅來東觀弄丹墨聊借舊史誅姦强孔融不肯下曹操汲黯本自輕張湯雖無尺箠與寸刄口吻排擊含風霜自言靜中閲世俗有似不飲觀酒狂衣巾狼籍又屢舞傍人大笑供千場交朋翩翩去畧盡惟我與子猶徬徨世人共弃君獨厚豈敢自愛恐子傷朝來告别驚何速歸意已逐征鴻翔匡廬先生古君子挂冠兩紀鬢未蒼定將文度置滕上喜動鄰里烹猪羊君歸為我道名姓幅巾他日容登堂謂恕借舊史以誅姦强即是軾借舊史以刺執政恕乃剛直者詩固不嫌明目張膽而道之至於恕歸而匡廬色喜言外有直道難容之嘆匪直幸其無恙遄歸也按恕為渙之子治平間司馬光編纂資治通鑑薦恕為局僚詩内所指舊史者此也匡廬先生則指其父渙言之施元之曰劉道原名恕筠州人介甫執政道原在館閣欲引置條例司固辭是時介甫權震天下人不敢忤而道原憤憤欲與之較又條陳所更法令不合衆心者至面刺其過介甫怒變色道原不以為意或稠人廣座對其門生誦言得失無所避遂與之絶此詩端為介甫而發以孔融汲黯比道原曹操張湯况介甫又云雖無尺箠與寸刃口吻排擊含風霜益著其面折之實也次韻張安道讀杜詩大雅初微缺流風困暴豪張為詞客賦變作楚臣騷展轉更崩壊紛綸閲俊髦地偏蕃怪産源失亂狂濤粉黛迷真色魚鰕易豢牢誰知杜陵傑名與謫仙髙掃地収千軌爭標看兩艘詩人例窮苦天意遣奔逃塵暗人亡鹿溟翻帝斬鼇艱危思李牧述作謝王褒失意各千里哀鳴聞九臯騎鯨遁滄海捋虎得綈袍巨筆屠龍手㣲官似馬曹迂疎無事業醉飽死遊遨簡牘儀刑在兒童篆刻勞今誰主文字公合抱旌旄開巻遥相憶知音兩不遭般斤思郢質鯤化陋鯈濠恨我無佳句時䝉致白醪殷勤理黄菊未遣没蓬蒿初讀之但覺鋪叙排比詞氣不減少陵耳詳味其詞乃見下筆矜慎之至葢題是次張安道韻則先有張詩在意中非泛然為少陵作贊頌也地偏四句但將從來詩道之弊廣譬曲喻轉入杜陵只用傑字一言之褒而其起衰式靡立極千古者己意無不盡此下只是嘅其遭際更不論詩即軾平日所云發於情止於忠孝者亦不一及又俱借謫仙為陪以與下開巻知音一聨情事相映合結仍用比喻以應前文大含元氣細入無閒其一一次韻天然又不過汗漫之餘技矣傅堯俞濟源草堂微官共有田園興老罷方尋隠退廬栽種成陰十年事倉皇欲買百金無先生卜築臨清濟喬木如今似畫圖鄰里亦知偏愛竹春來相與䕶龍雛堯俞本鄆州須城人徙居孟州濟源嘗有讀書詩云吾屋雖諠卑頗不甚蕪穢置席屋中閒坐卧羣書内觀此則知詩稱畫圖良非虚譽潁州初别子由二首征帆挂西風别淚滴清潁留連知無益惜此須臾景我生三度别此别尤酸冷念子似先君木訥剛且靜寡辭真吉人介石乃機警至今天下士去莫如子猛嗟我久病狂意行無坎井有如醉且墜幸未傷輒醒從今得閒暇黙坐消日永作詩解子憂持用日三省近别不改容逺别涕霑胸咫尺不相見實與千里同人生無離别誰知恩愛重始我來宛丘牽衣舞兒童便知有此恨留我過秋風秋風亦己過别恨終無窮問我何年歸我言嵗在東離合既循環憂喜迭相攻語此長太息我生如飛蓬多憂髪早白不見六一翁前首留連知無益惜此須臾景即李陵長當從此别且復立斯須之意用作發端語覺悲愴切至更為過之後首本是直抒胸臆讀之乃覺中心菀結之至者此漢魏人絶調也烏臺詩案曰此詩云至今天下士去莫如子猛為弟轍曾差在制置三司條例司充檢詳文字爭議新法不合而罷既美弟轍去之果決則意亦是譏新法不便也施元之曰神宗青苖法既行子由度不能救以書抵介甫指陳其決不可者且請補外介甫大怒將加以罪同列止之除河南推官㑹張安道知陳州辟為教授東坡是時亦以論新法為介甫所嫉通判杭州出都來陳子由送至潁且同謁歐陽公而别葢熈寧四年也歐陽少師令賦所蓄石屏何人遺公石屏風上有水墨希微蹤不畫長林與巨植獨畫蛾眉山西雪嶺上萬嵗不長之孤松崖崩㵎絶可望不可到孤烟落日相溟濛含風偃蹇得真態刻畫始信天有工我恐畢宏韋偃死𦵏虢山下骨可朽爛心難窮神機巧思無所發化為烟霏淪石中古來畫師非俗士摹寫物象畧與詩人同願公作詩慰不遇無使二子含憤泣幽宫長句磊砢筆力如虬松盤屈真可匹敵杜陵御選唐宋詩醇巻三十二
