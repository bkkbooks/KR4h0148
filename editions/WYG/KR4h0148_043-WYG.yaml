  text: 欽定四庫全書御選唐宋詩醇巻二十
  hash: sha256:14ce1d24b3f65cf40e27ca711db3bfe05700aca100aea9ab38a2d00052ac4676
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_043-1a, image: WYG1448/WYG1448-0418a.png}
body:
  text: 太原白居易詩二新樂府并序左自注元和四年為拾遺時作序曰凡九千二百五十二言斷為五十篇篇無定句句無定字繫於意不繫於文首句標其目卒章顯其志詩三百之義也其辭質而徑欲見之者易諭也其言直而切欲聞之者深誡也其事覈而實使采之者傳信也其體順而律可以播於樂章歌曲也總而言之為君為臣為民為物為事而作不為文而作也七徳舞美撥亂陳王業也自注武徳中天子始作秦王破陳樂以歌太宗之功業貞觀初太宗重制破陳樂舞圖詔魏徴虞世南等為之歌詞名七徳舞自龍朔已後詔郊廟享宴皆先奏之七徳舞七徳歌傳自武徳至元和元和小臣白居易觀舞聽歌知樂意樂終稽首陳其事太宗十八舉義兵白旄黄鉞定兩京擒充戮竇四海清二十有四功業成二十有九即帝位三十有五致太平功成理定何神速速在推心置人腹亡卒遺骸散帛收饑人賣子分金贖魏徴夢見子夜泣張謹哀聞辰日哭怨女三千放出宫死囚四百來歸獄剪鬚燒藥賜功臣李勣嗚咽思殺身含血吮瘡撫戰士思摩奮呼乞効死則知不獨善戰善乗時以心感人人心歸爾來一百九十載天下至今歌舞之歌七徳舞七徳聖人有作垂無極豈徒耀神武豈徒誇聖文太宗意在陳王業王業艱難示子孫五十首以此起體裁極合大雅原周受命之由而必本之文王以明王業之所由盛唐之受命始於髙祖而開王業者則太宗之功大意歸重在得人心人心之歸王業之本也亡卒遺骸散帛收十句皆得人心之實事鋪陳詳贍詞㫖莊雅琅琅可誦雞肋集曰予幼時讀太平廣記見唐太宗遣蕭翼購蘭亭叙事盖譎以出之輙歎息曰蘭亭叙若是貴邪至使萬乗之主捐信於匹夫傳稱子貢詐而存魯弦髙誕而存鄭遺一言之細建二國之業猶不可以為常以太宗之賢巍巍乎近古所無柰何溺小耆好而輕䘮其所常之寶異於得原失信不圍而去矣晚多閒居頗屏世好獨於古人筆墨之遺愛而不能置因誦白居易七徳歌曰功成理定何神速速在推心置人腹怨女三千放出宫死囚四百來歸獄歎曰太宗以一旅取天下惟信耳夫不吝三千女而放出宫自信也不約四百囚而來歸獄人信也晉捨原何足道哉宋名臣言行錄曰太宗語侍臣曰朕何如唐太宗左右互辭以賛獨李昉無他言㣲誦七徳舞詞曰怨女三千放出宫死囚四百來歸獄上聞之遽興曰朕不及朕不及卿言警朕矣海漫漫戒求仙也海漫漫直下無底旁無邊雲濤煙浪最深處人傳中有三神山山上多生不死藥服之羽化為天仙秦皇漢武信此語方士年年采藥去蓬萊今古但聞名煙水茫茫無覔處海漫漫風浩浩眼穿不見蓬萊島不見蓬萊不敢歸童男丱女舟中老徐福文成多誑誕上元太乙虚祈禱君看驪山頂上茂陵頭畢竟悲風吹蔓草何况𤣥元聖祖五千言不言藥不言仙不言白日昇青天神仙之説世主多為所惑而方士因得乗其蔽而中之史䇿所垂足為炯戒憲宗不悟服栁泌金丹致殞此詩作於元和初想爾時己有先見耶唐室崇奉老子一結借矛攻盾極其警快立部伎刺雅樂之替也自注太常選坐部伎無性識者退入立部伎又選立部伎絶無性識者退入雅樂部則雅樂之聲可知矣立部伎鼓笛諠雙舞劔跳七丸嫋巨索掉長竿太常部伎有等級堂上者坐堂下立堂上坐部笙歌清堂下立部鼔笛鳴笙歌一聲衆側耳鼓笛萬曲無人聽立部賤坐部貴坐部退為立部伎擊鼓吹笛和雜戯立部又退何所任始就樂懸操雅音雅音替壊一至此長令爾輩調宫徴圓丘后土郊祀時言將此樂感神祗欲望鳯來百獸舞何異北轅將適楚工師愚賤安足云太常三卿爾何人上陽白髪人愍怨曠也自注天寶五載己後楊貴妃専寵後宫人無復進幸矣六宫有羙色者輒置別所上陽是其一也貞元中尚存焉上陽人紅顔暗老白髪新綠衣監使守宫門一閉上陽多少春𤣥宗末歲初選入入時十六今六十同時采擇百餘人零落年深殘此身憶昔吞悲別親族扶入車中不教哭皆云入内便承恩臉似芙蓉胷似玉未容君王得見面己被楊妃遙側目妬令潛配上陽宫一生遂向空房宿宿空房秋夜長夜長無寐天不明耿耿殘燈背壁影蕭蕭暗雨打窗聲春日遲日遲獨坐天難暮宫鶯百囀愁厭聞梁燕雙栖老休妬鶯歸燕去長悄然春往秋來不記年唯向深宫望明月東西四五百迴圓今日宫中年最老大家遙賜尚書號小頭鞵履窄衣裳青黛㸃眉眉細長外人不見見應笑天寶末年時世妝上陽人苦最多少亦苦老亦苦少苦老苦兩如何君不見昔時吕尚羙人賦又不見今日上陽宫人白髪歌新豐折臂翁戒邊功也新豐老翁八十八頭鬢眉鬚皆似雪𤣥孫扶向店前行左臂憑肩右臂折問翁臂折來幾年兼問致折何因緣翁云貫屬新豐縣生逢聖代無征戰慣聽棃園歌管聲不識旗槍與弓箭無何天寶大徴兵户有三丁㸃一丁㸃得驅將何處去五月萬里雲南行聞道雲南有瀘水椒花落時瘴烟起大軍徒涉水如湯未過十人二三死邨南邨北哭聲哀兒別爺孃夫別妻皆云前後征蠻者千萬人行無一回是時翁年二十四兵部牒中有名字夜深不敢使人知偷將大石槌折臂張弓簸旗俱不堪從兹始免征雲南骨碎筋傷非不苦且圖揀退歸鄉土此臂折來六十年一肢雖廢一身全至今風雨陰寒夜直到天明痛不眠痛不眠終不悔且喜老身今獨在不然當時瀘水頭身死魂孤骨不收應作雲南望鄉鬼萬人冢上哭呦呦老人言君聽取君不聞開元宰相宋開府不賞邊功防黷武又不聞天寶宰相楊國忠欲求恩幸立邊功邊功未立生人怨請問新豐折臂翁大意亦本之杜甫兵車行前後出塞等篇借老翁口中説出便不傷於直遂促促刺刺如聞其聲而窮兵黷武之禍不待言矣未又以宋璟楊國忠比勘開元天寶治亂之機具分於此前事不忘後事之師也可謂詩史司天臺引古以儆今也司天臺仰觀俯察天人際羲和死來職事廢官不求賢空取藝昔聞西漢元成間下陵上替謫見天北辰微暗少光色四星煌煌如火赤耀芒動角射三台上台半滅中台折是時非無太史官眼見心知不敢言明朝趨入明光殿唯奏慶雲夀星見天文時變兩如斯九重天子不得知不得知安用臺髙百尺為捕蝗刺長吏也捕蝗捕蝗誰家子天熱日長饑欲死興元兵後傷陰陽和氣蠱蠧化為蝗始自兩河及三輔荐食如蠶飛似雨雨飛蠶食千里間不見青苖空赤土河南長吏言憂農課人晝夜捕蝗蟲是時粟斗錢三百蝗蟲之價與粟同捕蝗捕蝗竟何利徒使饑人重勞費一蝗雖死百蝗來豈將人力勝天災我聞古之艮吏有善政以政驅蝗蝗出境又聞貞觀之初道欲昌文皇仰天吞一蝗一人有慶兆民賴是歲雖蝗不為害姚崇之法至今重之固將以人力救天災也詩意不主捕蝗正以有向上一層在昆明春思王澤之廣被也自注貞元中始漲泛昆明春昆明春春池岸古春流新影浸南山青滉瀁波沉西日紅奫淪往年因旱池枯竭龜尾曵塗魚喣沫詔開八水注恩波千介萬鱗同日活今來淨淥水照天遊魚鱍鱍蓮田田洲香杜若抽心短沙暖鴛鴦鋪翅眠動植飛沉皆性遂皇澤如春無不被漁者仍豐網罟資貧人久獲菰蒲利詔以昆明近帝城官家不得收其征菰蒲無租魚無税近水之人感君惠感君惠獨何人吾聞率土皆王民逺民何疎近何親願推此惠及天下無逺無近同忻忻吳興山中罷𣙜茗鄱陽坑裏休封銀天涯地角無禁利熈熈同似昆明春城鹽州美聖謨而誚邊將也自注貞元壬申歲特詔城之城鹽州城鹽州城在五原原上頭蕃東節度鉢闡布忽見新城當要路金鳥飛傳贊普聞建牙傳箭集羣臣君臣赬面有憂色皆言勿謂唐無人自築鹽州十餘載左衽氊裘不犯塞晝牧牛羊夜捉生長去新城百里外諸邊急驚勞戍人唯此一道無煙塵靈夏潛安誰復辨秦原暗通何處見鄜州驛路好馬來長安藥肆黄耆賤城鹽州鹽州未城天子憂徳宗按圖自定計非闗將畧與廟謀吾聞髙宗中宗世北虜猖狂最難制韓公創築受降城三城鼎峙屯漢兵東西亘絶數千里耳冷不聞胡馬聲如今邊將非無䇿心笑韓公築城壁相看養㓂為身謀各握强兵固恩澤願分今日邊將恩褒贈韓公封子孫誰能將此鹽州曲翻作歌詞聞至尊按新唐書吐蕃傳自虜得鹽州塞防無以障遏而靈武單露鄜坊侵迫冦日以驕數入為邊患貞元八年帝詔城之九年訖功而虜兵不出嗣後韋臯等屢破其兵取新城㧞末恭顒二城禽其將乞悉蓖獻京師迨憲宗初遣使修好朝貢歲入鉢闡布者虜浮屠豫國事者也金鳥飛傳者虜曰飛鳥猶傳騎也詩中叙事源委井然未又揷入張仁愿築受降城事為當時邊將擁兵玩㓂者警也道州民美臣遇明主也道州民多侏儒長者不過三尺餘市作矮奴年進奉號為道州任土貢任土貢寧若斯不聞使人生别離老翁哭孫母哭兒一自陽城來守郡不進矮奴頻詔問城云臣按六典書任土貢有不貢無道州水土所生者只有矮民無矮奴吾君感悟璽書下歲貢矮奴宜悉罷道州民老者㓜者何欣欣父兄子弟始相保從此得作良人身道州民民到於今受其賜欲説使君先下淚仍恐兒孫忘使君生男多以陽為字詔書何可違也正言之不可遜辭以謝之而民被其澤矣入情入理解人不當如是耶宋鮮于侁不散青苖錢亦同此意蠻子朝刺將驕而相備位也蠻子朝汎皮船兮渡繩橋來自巂州道路遥入界先經蜀川過蜀將收功先表賀臣聞雲南六詔蠻東連䍧牱西連蕃六詔星居初𤨏碎合為一詔漸强大開元皇帝雖聖神唯蠻倔强不來賔鮮于仲通六萬卒征蠻一陳全軍沒至今西洱河岸邊箭孔刀痕滿枯骨誰知今日慕華風不勞一人蠻自通誠由陛下休明徳亦賴微臣誘諭功徳宗省表知如此笑令中使迎蠻子蠻子道從者誰何摩挲俗羽雙隈伽清平官持赤藤杖大將軍繫金呿嗟異牟㝷男㝷閤勸特勅召對延英殿上心貴在懷逺蠻引臨玉座近天顔冕旒不垂親勞倈賜衣賜食移時對移時對不可得大臣相㸔有羡色可憐宰相拖紫佩金章朝日唯聞對一刻自鮮于仲通李密搆兵南詔䘮師匱財西南無寧歲韋臯經畧十餘年僅能服之而中國之力己殫矣元微之詩云自居劇鎮無他績幸得蠻來固恩寵蓋刺臯也此詩命意畧同誠由陛下休明徳二句寫出藩臣驕蹇之狀宰相備位尾大不掉唐室卒以不振矣新唐書南蠻傳南詔官曰清平官所以决國事輕重猶唐宰相也大軍將十二與清平官等列曹長以降繫金佉苴佉苴韋帯也按呿嗟與佉苴同大將軍恐是大軍將之訛驃國樂欲王化之先邇後逺也貞元十七年來獻之驃國樂驃國樂出自大海西南角雍羗之子舒難陁來獻南音奉正朔徳宗立仗御紫庭黈纊不塞為爾聽玉螺一吹椎髻聳銅鼓一擊文身踊珠纓炫轉星宿揺花鬘斗藪龍蛇動曲終王子啟聖人臣父願為唐外臣左右歡呼何翕習至尊徳廣之所及須臾百辟詣閤門俯伏拜表賀至尊伏見驃人獻新樂請書國史傳子孫時有擊壤老農父暗測君心閒獨語聞君政化甚聖明欲感人心致太平感人在近不在逺太平由實非由聲觀身理國國可濟君如心兮民如體體生疾苦心憯悽民得和平君愷悌貞元之民若未安驃樂雖聞君不歡貞元之民茍無病驃樂不來君亦聖驃樂驃樂徒喧喧不如聞此芻蕘言新唐書南蠻傳驃古朱波也在永昌南二千里貞元中王雍羗聞南詔歸唐有内附心遣弟悉利移城主舒難陁獻其國樂至成都韋臯譜次其聲以其舞容樂噐異常乃圖畫以獻其樂五譯而至徳宗授舒難陁太僕卿遣還開州刺史唐次述驃國獻樂頌以獻按詩中舒難陁作雍羗之子與唐書異縳戎人達窮民之情也縛戎人縛戎人耳穿面破驅入秦天子矜憐不忍殺詔徙東南吳與越黄衣小使錄姓名領出長安乗遞行身被金創面多瘠扶病徒行日一驛朝飡饑渴費杯盤夜卧腥臊汚牀席忽逢江水憶交河垂手齊聲嗚咽歌其中一虜語諸虜爾苦非多我苦多同伴行人因借問欲説喉中氣憤憤自云鄉管本凉原大厯年中沒落蕃一落蕃中四十載遣著皮裘繫毛帶唯許正朝服漢儀歛衣整巾潛淚垂誓心密定歸鄉計不使蕃中妻子知暗思幸有殘筋力更恐年衰歸不得蕃候嚴兵鳥不飛脱身冐死奔逃歸晝伏宵行經大漠雲陰月黒風沙惡驚藏青冢寒草疎偷渡黄河夜氷薄忽聞漢軍鼙鼓聲路旁走出再拜迎游騎不聽能漢語將軍遂縛作蕃生配向東南卑濕地定無存䘏空防備念此吞聲仰訴天若為辛苦度殘年涼原鄉井不得見胡地妻兒虚棄捐沒蕃被囚思漢土歸漢被劫為蕃虜早知如此悔歸來兩地寧如一處苦縛戎人戎人之中我苦辛自古此寃應未有漢心漢語吐蕃身邊將冐功之狀無辜被俘之情曲曲傳出結語尤令人失笑元㣲之詩自注云近制西邊每擒蕃人例皆傳置南方不加勦戮驪宫髙美天子重惜人之財力也髙髙驪山上有宫朱樓紫殿三四重遲遲兮春日玉甃煖兮温泉溢嫋嫋兮秋風山蟬鳴兮宫樹紅翠華不來兮歲月久牆有衣兮瓦有松吾君在位己五載何不一幸乎其中西去都門幾多地吾君不遊有深意一人出兮不容易六宫從兮百司備八十一車千萬騎朝有宴飫暮有賜中人之産數百家未足充君一日費吾君修已人不知不自逸兮不自嬉吾君愛人人不識不傷財兮不傷力驪宫髙兮髙入雲君之來兮為一身君之不來兮為萬人格調摹騷詞氣特婉約百錬鏡辨皇王鑒也百錬鏡鎔範非常規日辰處所靈且祇江心波上舟中鑄五月五日日午時瓊粉金膏磨瑩己化為一片秋潭水鏡成將獻蓬萊宫揚州長吏手自封人間臣妾不合照背有九五飛天龍人人呼為天子鏡我有一言聞太宗太宗常以人為鏡鑒古鑒今不鑒容四海安危居掌内百王治亂懸心中乃知天子別有鏡不是揚州百鍊銅青石激忠烈也青石出自藍田山兼車運載來長安工人磨琢欲何用石不能言我代言不願作人家墓前神道碣墳土未乾名己滅不願作官家道傍徳政碑不鐫實錄鐫虚辭願為叚氏顔氏碑雕鏤太尉與太師刻此兩片堅貞質狀彼二人忠烈姿義心如石屹不轉死節如石確不移如觀奮擊朱泚日似見叱呵希烈時各於其上題名諡一置髙山一沉水陵谷雖遷碑獨存骨化為塵名不死長使不忠不烈臣觀碑改節慕為人慕為人勸事君石不能言我代言發端竒特後半表出二人寫得凛凛有生氣不忠不烈者讀之故應汗下西涼伎刺封疆之臣也西涼伎假面胡人假獅子刻木為頭絲作尾金鍍眼睛銀帖齒奮迅毛衣擺雙耳如從流沙來萬里紫髯深目兩胡兒鼓舞跳梁前致辭應似涼州未陷日安西都䕶進來時須臾云得新消息安西路絶歸不得泣向獅子涕雙垂涼州陷沒知不知獅子囘頭向西望哀吼一聲觀者悲貞元邊將愛此曲醉生笑㸔看不足娛賔犒士宴監軍獅子胡兒長在目有一征夫年七十見㺯涼州低面泣泣罷歛手白將軍主憂臣辱昔所聞自從天寶兵戈起犬戎日夜吞西鄙涼州陷來四十年河隴侵將七千里平時安西萬里疆今日邊防在鳯翔緣邊空屯十萬卒飽食温衣閒過日遺民腸斷在涼州將卒相看無意收天子每思常痛惜將軍欲説合慚羞奈何仍看西涼伎取笑資歡無所媿縱無智力未能收忍取西涼㺯為戱前半叙事却揷入應似涼州未陷日二句所謂横空盤硬語也涼州陷來四十年四句與前相映筆力排奡仿彿似杜結處仍是香山本色八駿圖誡竒物懲佚游也穆王八駿天馬駒後人愛之寫為圖背如龍兮頸如象骨竦筋髙脂肉壯日行萬里疾如飛穆王獨乗何所之四荒八極踏欲遍三十二蹄無歇時屬車軸折趁不及黄屋草生棄若遺瑶池西赴王母宴七廟經年不親薦璧臺南與盛姬遊明堂不復朝諸侯白雲黄竹歌聲動一人荒樂萬人愁周從后稷至文武積徳累功世勤苦豈知纔及四代孫心輕王業如灰土由來尤物不在大能蕩君心即為害文帝却之不肯乗千里馬去漢道興穆王得之不為戒八駿駒來周室壊至今此物尚稱珍不知房星之精下為怪八駿圖君莫愛澗底松念寒雋也有松百尺大十圍生在澗底寒且卑澗深山險人路絶老死不逢工度之天子明堂欠梁木此求彼有兩不知誰諭蒼蒼造物意但與之材不與地金張世禄原憲貧牛衣寒賤貂蟬貴貂蟬與牛衣髙下雖有殊髙者未必賢下者未必愚君不見沉沉海底生珊瑚歴歴天上種白榆松是喻意金張原憲是正意一結仍用喻意比擬恰合原憲貧或作黄憲賢者誤黄憲為牛醫兒與牛衣無涉牡丹芳美天子憂農也牡丹芳牡丹芳黄金蘂綻紅玉房千片赤英霞爛爛百枝綘㸃燈煌煌照地初開錦繡叚當風不結蘭麝囊仙人琪樹白無色王母桃花小不香宿露輕盈汎紫豔朝陽照耀生紅光紅紫二色間深淺向背萬態隨低昂映葉多情隱羞面卧叢無力含醉妝低嬌笑容疑掩口凝思怨人如斷腸穠姿貴彩信竒絶雜卉亂花無比方石竹金錢何細碎芙蓉芍藥苦㝷常遂使王公與卿相遊花冠盖日相望庳車輭􅓅貴公主香衫細馬豪家郎衛公宅靜閉東院西明寺深開北廊戱蝶雙舞看人久殘鶯一聲春日長共愁日照芳難駐仍張帷幕垂陰涼花開花落二十日一城之人皆若狂三代以還文勝質人心重華不重實重華直至牡丹芳其來有漸非今日元和天子憂農桑䘏下動天天降祥去歲嘉禾生九穗田中寂莫無人至今年瑞麥分兩岐君心獨喜無人知無人知可歎息我願暫求造化力減却牡丹妖豔色少迴卿士愛花心同似吾君憂稼穡極寫牡丹之穠麗忽接三代以還文勝質四句迂腐語聳然奪目下乃接元和天子憂農桑一叚正意便覺峭折有波瀾若低手為之則一直説下耳容齋隨筆曰歐陽公牡丹釋名云牡丹初不載文字唐人如沈宋元白之流皆善咏花當時有一花之異彼必形於篇什而寂無傳焉唯劉梦得有咏魚朝恩宅牡丹詩但云一叢千朶而己亦不云其美且異也予按白公集有白牡丹一篇十四韻又秦中吟買花一章云共道牡丹時相隨買花去而諷諭樂府有牡丹芳一篇絶道花之妖艶至有一城之人皆若狂之語又寄微之百韻詩云崇敬牡丹期注崇敬寺牡丹花多與微之有期又有惜牡丹詩元微之有永夀寺看牡丹詩八韻和樂天秋題牡丹叢三韻酬胡三咏牡丹一絶又有五言二絶句許渾亦云近來無奈牡丹何數十千錢買一窠徐凝云三條九陌花時節萬馬千車看牡丹然則元白未嘗無詩唐人未嘗不重此花也紅線毯憂蠶桑之費也紅線毯擇繭繰絲清水煮揀絲練線紅藍染染為紅線紅於藍織作披香殿上毯披香殿廣十丈餘紅線織成可殿鋪綵絲茸茸香拂拂線軟花虚不勝物美人蹋上歌舞來羅韤繡鞵隨步沒太原毯澀毳縷硬蜀都褥薄錦花冷不如此毯温且柔年年十月來宣州宣州太守加様織自謂為臣能竭力百夫同擔進宫中線厚絲多巻不得宣州太守知不知一丈毯千兩絲地不知寒人要暖少奪人衣作地衣通首直叙到底出以徑遂所謂長於激也杜陵叟傷農夫之困也杜陵叟杜陵居歲種薄田一頃餘三月無雨旱風起麥苖不秀多黄死九月降霜秋早寒禾穗未熟皆青乾長吏明知不申破急歛暴徴求考課典桑賣地納官租明年衣食將何如剥我身上帛奪我口中粟虐人害物即豺狼何必鈎爪鋸牙食人肉不知何人奏皇帝帝心惻隱知人弊白麻紙上書徳音京畿盡放今年税昨日里胥方到門手持尺牒牓鄉邨十家租税九家畢虚受吾君蠲免恩從古及今善政之不能及民者多矣一結慨然思深可為太息賣炭翁苦宫市也賣炭翁伐薪燒炭南山中滿面塵灰煙火色兩鬢蒼蒼十指黒賣炭得錢何所營身上衣裳口中食可憐身上衣正單心憂炭賤願天寒夜來城外一尺雪曉駕炭車輾冰轍牛困人饑日己髙市南門外泥中歇翩翩兩騎來是誰黄衣使者白衫兒手把文書口稱勅迴車叱牛牽向北一車炭千餘斤宫使驅將惜不得半匹紅紗一丈綾繫向牛頭充炭直直書其事而其意自見更不用著一斷語陰山道疾貪虜也陰山道陰山道紇邏敦肥水泉好每至戎人送馬時道傍千里無纎草草盡泉枯馬病羸飛龍但印骨與皮五十匹縑易一匹縑去馬來無了日養無所用去非宜每歲死傷十六七縑絲不足女工苦疎織短截充匹數藕絲蛛網三丈餘囘鶻訴稱無用處咸安公主號可敦逺為可汗頻奏論元和二年下新勅内出金帛酬馬直仍詔江淮馬價縑從此不令疎短織合羅將軍呼萬歲捧授金銀與縑綵誰知黠虜啟貪心明年馬多來一倍縑漸好馬漸多陰山虜奈爾何舊唐書囘紇傳囘紇恃功自乾元後屡遣使以馬和市繒帛仍歲來市以馬一匹易絹四十匹動至數萬馬蕃得帛無厭我得馬無用朝廷甚苦之大厯八年十一月囘紇使使領馬萬匹來市代宗以馬價出於租賦不欲重困民命有司量入許市六千匹按元微之詩自注李傳云元和二年有詔悉以金銀酬囘鶻馬價新舊唐書俱不載此詔是詩叙事極詳可以補史傳之所不及又按詩中五十匹縑易一匹新舊唐書俱作四十匹亦與此異未知孰是鹽商婦惡幸人也鹽商婦多金帛不事田農與蠶績南北東西不失家風水為鄉船作宅本是揚州小家女嫁得西江大商客綠鬟富去金釵多皓腕肥來銀釧窄前呼蒼頭後叱婢問爾因何得如此壻作鹽商十五年不屬州縣屬天子毎年鹽利入官時少入官家多入私官家利薄私家厚鹽鐡尚書逺不知何况江頭魚米賤紅鱠黄橙香稻飯飽食濃妝倚柁樓兩朶紅顋花欲綻鹽商婦有幸嫁鹽商終朝美飯食終歲好衣裳好衣美食來何處亦須慚媿桑𢎞羊桑𢎞羊死己久不獨漢世今亦有杏為梁刺居處僣也杏為梁桂為柱何人堂室李開府碧砌紅軒色未乾去年身沒今移主髙其牆大其門誰家第宅盧將軍素泥朱板光未滅今歲官收別賜人開府之堂將軍宅造未成時頭己白逆旅重居逆旅中心是主人身是客更有愚夫念身後心雖甚長計非久窮奢極麗越規模付子傳孫令保守莫教門外過客聞撫掌囘頭笑殺君君不見馬家宅尚猶存宅門題作奉誠園君不見魏家宅屬他人詔贖賜還五代孫儉存奢失今在目安用髙牆圍大屋此詩與前傷宅一首大意相似後又引出魏徴宅一層勸戒俱備新唐書李師道上私錢六百萬為魏徴孫贖故第居易言徴任宰相太宗用殿材成其正寢後嗣不能守陛下猶宜以賢者子孫贖而賜之師道人臣不宜掠美帝從之文集中有論魏徴舊宅狀紫毫筆誡失職也紫毫筆尖如錐兮利如刀江南石上有老喫竹飲泉生紫毫宣城工人采為筆千萬毛中揀一毫毫雖輕功甚重管勒工名充歲貢君兮臣兮勿輕用勿輕用將何如願賜東西府御史願頒左右臺起居搦管趨入黄金闕抽毫立在白玉除臣有奸邪正衙奏君有動言直筆書起居郎侍御史爾知紫毫不易致毎歲宣城進筆時紫毫之價如金貴慎勿空將彈失儀慎勿空將錄制詞隋堤栁憫亡國也隋堤栁歲久年深盡衰朽風飄飄兮雨蕭蕭三株兩株汴河口老枝病葉愁殺人曾經大業年中春大業年中煬天子種栁成行夾流水西至黄河東至淮綠影一千三百里大業末年春暮月栁色如煙絮如雪南幸江都恣佚遊應將此栁繫龍舟紫髯郎將䕶錦纜青蛾御史直迷樓海内財力此時竭舟中歌笑何日休上荒下困勢不久宗社之危如綴旒煬天子自言福祚長無窮豈知皇子封酅公龍舟未過彭城閤義旗巳入長安宫蕭牆禍生人事變晏駕不得歸秦中土墳數尺何處𦵏吳公臺下多悲風二百年來汴河路沙草和煙朝復暮後王何以覽前王請看隋堤亡國樹一起似諺似謡最有古意詳叙興亡之事仍以栁結俯仰情深秦吉了哀寃民也秦吉了出南中彩毛青黒花頸紅耳聰心慧舌端巧鳥語人言無不通昨日長爪鳶今朝大觜烏鳶捎乳燕一窠覆烏啄母鷄雙眼枯雞號墮地燕驚去然後拾卵攫其雛豈無雕與鶚嗉中肉飽不肯搏亦有鸞鶴羣閒立髙颺如不聞秦吉了人云爾是能言鳥豈不聞鷄燕之寃苦吾聞鳯凰百鳥主爾竟不為鳯凰之前致一言安用噪噪閒言語采詩官監前王亂亡之由也采詩官采詩聽歌導人言言者無罪聞者誡下流上通上下泰周滅秦興至隋氏十代采詩官不置郊廟登歌讚君美樂府豔詞悦君意若求興諭規刺言萬句千章無一字不是章句無規刺漸恐朝廷絶諷議諍臣杜口為冗員諫鼓髙懸作虚器一人負扆常端黙百辟入門兩自媚夕郎所賀皆徳音春官每奏唯祥瑞君之堂兮千里逺君之門兮九重閟君耳唯聞堂上言君眼不見門前事貪吏害民無所忌奸臣蔽君無所畏君不見厲王胡亥之末年羣臣有利君無利君兮君兮願聽此欲開壅蔽達人情先向歌詩求諷刺未章總結言者無罪聞者誡一語申明作詩之㫖隠然自附於三百篇之義也諸篇全倣杜甫新安石壕垂老無家等作諷刺時事婉而多風其不及杜者只筆力之縱横格調之變化耳郭茂倩曰新樂府者皆唐世之新歌也以其辭實樂府而未盡被於聲故曰新樂府大扺皆以諷諭為體欲以播於樂章歌曲焉汪立名曰按元微之集有和李校書新題樂府上陽白髪人華原磬等十二首序云予友李公垂貺予樂府新題二十首雅有所謂不虚為文予取其病時之尤急者列而和之葢十二而己云云語未嘗及白而此序中又不言和李作當是因李作而推廣者御選唐宋詩醇巻二十
