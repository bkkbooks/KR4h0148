body:
  text: 睂山蘇軾詩一目録辛丑十一月十九日既與子由别于鄭州西門之外馬上賦詩一篇寄之過宜賔見夷中亂山夜泊牛口夜行觀星八陣磧入峽出峽神女廟巫山荆州十首録三首太白山下早行至横渠鎮書崇夀院壁留題延生觀後山小堂石鼻城病中大雪數日未嘗起觀虢令趙薦以詩相屬戲用其韻答之嵗晚相與饋問為饋嵗酒食相邀呼為别嵗至除夜達旦不眠為守嵗蜀之風俗如是余官于岐下嵗暮思歸而不可得故為此三詩寄子由饋嵗别嵗守嵗和子由論書鳯翔八觀録五首石鼓歌王維吳道子畫東湖真興寺閣李氏園七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿于僧舍曽閣閣故曾氏所建也夜久不寐見壁有前縣令趙薦留名有懐其人二十七日自陽平至斜谷宿于南山中蟠龍寺是日至下馬磧憩于北山僧舍有閣曰懐賢南有斜谷西臨五丈原諸葛孔明所從出師也和子由記園中草木十一首録五首司竹監燒葦園因召都巡檢柴貽朂左藏以其徒㑹獵園下秀州僧本瑩靜照堂送安惇秀才失解西歸送劉道原歸覲南康次韻張安道讀杜詩傅堯俞濟源草堂潁州初别子由二首歐陽少師令賦所蓄石屏
  hash: sha256:9fed5156cdd758f0adf6276d5e55ad13986a8fb996e2ce4620ea27ac66cc294f
