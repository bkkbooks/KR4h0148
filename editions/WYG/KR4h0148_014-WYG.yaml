front:
  text: 欽定四庫全書御選唐宋詩醇巻六
  hash: sha256:14909631bffbeebaf9a2060370e18c411a54e1dc2c420b457338eee6f777941a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_014-1a, image: WYG1448/WYG1448-0153a.png}
body:
  text: 隴西李白詩六目錄獻從叔當塗宰陽氷贈汪倫安陸白兆山桃花嵒寄劉侍御綰淮南卧病書懐寄蜀中趙徴君蕤望終南山寄紫閣隠者秋夜宿龍門香山寺奉寄王方城十七丈奉國營上人從弟㓜成令聞沙丘城下寄杜甫淮隂書懐寄王宗城聞王昌齡左遷龍標遥有此寄憶舊逰寄譙郡元參軍月夜江行寄崔員外宗之宿白鷺洲寄楊江寧新林浦阻風寄友人寄韋南陵氷余江上乗興訪之遇尋顔尚書笑有此贈題情深樹寄象公北山獨酌寄韋六寄東魯二稚子獨酌清溪江石上寄權昭夷禪房懐友人岑倫廬山謡寄盧侍御虚舟春日歸山寄孟浩然流夜郎至西塞驛寄裴隐自漢陽病酒歸寄王明府江夏寄漢陽輔錄事早春寄王漢陽江上寄元六林宗涇溪南藍山下有落星潭可以卜築余泊舟石上寄何判官昌浩早過漆林渡寄萬巨㳺敬亭寄崔侍御自金陵泝流過白璧山翫月達天門寄句容王主簿秋日魯郡堯祠亭上宴别杜補闕范侍御别魯頌夢逰天姥吟留别留别廣陵諸公金陵酒肆留别贈别鄭判官黄鶴樓送孟浩然之廣陵留别賈舎人至渡荆門送别南陵别兒童入京江夏别宋之悌南陽送客送張舎人之江東送王屋山人魏萬還王屋送友人尋越中山水魯郡堯祠送竇明府薄華還西京金鄉送韋八之西京魯郡東石門送杜二甫灞陵行送别送裴十八圗南歸嵩山同王昌齡送族弟襄歸桂陽送崔度還呉金陵送張十一再逰東呉
