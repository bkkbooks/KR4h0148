front:
  text: 欽定四庫全書御選唐宋詩醇巻十四
  hash: sha256:9e6fb12fd0a18ea42d731d7bb18748f23ece73e69b254daa9351e2378e7fb046
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_030-1a, image: WYG1448/WYG1448-0311a.png}
body:
  text: 襄陽杜甫詩六目録臘日紫宸殿退朝口號曲江二首曲江對酒曲江對雨奉和賈至舍人早朝大明宫宣政殿退朝晚出左掖題省中院壁春宿左省送翰林張司馬南海勒碑晚出左掖送賈閣老出汝州送鄭十八虔貶台州司户傷其臨老䧟賊之故闕為靣别情見於詩端午日賜衣奉贈王中允維奉陪鄭駙馬章曲二首至徳二載甫自京金光門出間道歸鳯翔乾元初從左拾遺移華州掾與親故别因出此門有悲往事寄髙三十五詹事適路逢襄陽楊少府入城戲呈楊員外綰題鄭縣亭子望岳至日遣興奉寄北省舊閣老兩院故人二首得弟消息憶弟秦州雜詩二十首月夜憶舍弟宿賛公房東樓雨晴寓目山寺遣懷天河初月𢷬衣促織螢火蒹葭苦竹除架廢畦夕烽送逺觀兵天末懷李白空嚢病馬蕃劍銅瓶觀安西兵過赴闗中待命二首野望秋日阮隠居致薤三十束秦州見勅目薛三璩授司議郎畢四曜除監察與二子有故逺喜遷官兼述索居凡三十韻寄岳州賈司馬六丈巴州嚴八使君兩閣老五十韻寄張十二山人彪三十韻寄李十二白二十韻
  hash: sha256:2bd32b022496f38e9f21d4012e6a1ce9f48c087ef78fa93cffec9397dafa282e
