  text: 欽定四庫全書御選唐宋詩醇巻二十九
  hash: sha256:6d4dcf273a8f1d472f40a04a1ab723be11d4c9445bccb1298d5a77d1a917e49b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_061-1a, image: WYG1448/WYG1448-0562a.png}
body:
  text: 昌黎韓愈詩三薦士周詩三百篇雅麗理訓誥曾經聖人手議論安敢到五言出漢時蘇李首更號東都漸瀰漫􅉽别百川導建安能者七卓犖變風操逶迤抵晉家氣象日凋耗中間數鮑謝比近最清奥齊梁及陳隋衆作等蟬噪搜春摘花卉沿襲傷剽盗國朝盛文章子昂始高蹈勃興得李杜萬類困陵暴後來相繼生亦各臻閫奥有窮者孟郊受材實雄驁㝠觀洞古今象外逐幽好横空盤硬語妥帖力排奡敷柔肆紆餘奮猛卷海潦榮華肖天秀㨗疾逾響報行身踐規矩甘辱恥媚竈孟軻分邪正眸子看瞭眊杳然粹而清可以鎮浮躁酸寒溧陽尉五十㡬何耄孜孜營甘㫖辛苦久所冒俗流知者誰指注競嘲慠聖皇索遺逸髦士日登造廟堂有賢相愛遇均覆燾况承歸與張二公迭嗟悼青㝠送吹噓強箭射魯縞胡為久無成使以歸期告霜風破佳菊嘉節迫吹帽念將决焉去感物增戀嫪彼微水中荇尚煩左右芼魯候國至小廟鼎猶納郜幸當擇珉玉寧有棄珪瑁悠悠我之思擾擾風中纛上言愧無路日夜惟心禱鶴翎不天生變化在啄菢通波非難圖尺地易可漕善善不汲汲後時徒悔懊救死具八珍不如一簞犒微詩公勿誚愷悌神所勞孟郊一詩流之幽逸者耳殊未足踵武諸大家而退之說士乃甘於肉其自謂嗜善心無寧者此也横空盤硬語妥帖力排奡十字中尤妙在妥帖二字樊宗師文最竒崛而退之以文從字順許之其亦異乎世之所謂妥帖者矣王安石曰吟詩各有所得清水出芙蓉天然去雕飾此李白所得也或㸔翡翠蘭苕上未掣鯨鯢碧海中此杜甫所得也横空盤硬語妥帖力排奡此韓愈所得也彦周詩話曰六朝詩人之詩不可不熟讀如芙蓉露下落楊柳月中踈鍛鍊至此自唐以來無人能及也退之云齊梁及陳隋衆作等蟬噪此語吾不敢議亦不敢從又曰退之云横空盤硬語妥帖力排奡葢能殺縳事實與意義合最難能之知其難則可與論詩矣此所以稱東野也隱居詩話曰孟郊詩蹇澁窮僻琢削不暇真苦吟而成觀其句法格力可見矣其自謂夜吟曉不休苦吟鬼神愁如何不自閒心與身為仇而退之薦其詩云榮華肖天秀㨗疾逾響報何也竹坡詩話曰韓退之薦士詩云孟軻分邪正眸子看瞭眊杳然粹而清可以鎮浮躁余嘗讀東野下第詩云棄置復棄置情如刀劍傷及登第則自謂春風得意馬蹄疾一日看盡長安花一第之得失喜憂至於如此宜其雖得之而不能享也退之謂可以鎮浮躁恐未免過情李光地曰此薦孟郊之詩而首段叙詩源委極其簡盡李太白便謂建安之詩綺麗不足稱杜子美則自陳梁以下無貶詞故惟韓公之論最得其𠂻雖然陶靖節詩蟬蜕汚濁六代孤唱韓公畧無及之何也此與論文不列董賈者同病猶未免於以辭為主爾顧嗣立曰公此詩歴叙詩學源流自三百篇後漢魏止取蘇李建安七子六朝止取鮑謝餘子一筆抹倒眼明手竦識力最高唐初格律變於子昂至李杜二公而極所謂李杜文章在光燄萬丈長知公平生最得力於此也後以東野繼之似猶未足當此若公之才大而力雄思沈而筆鋭則庶乎可以配李杜而無慙矣全唐詩話曰李翶薦孟郊於張建封云兹有平昌孟郊正士也伏聞執事舊知之郊為五言詩自前漢李都尉蘇屬國及建安諸子南朝二謝郊能兼其體而有之李觀薦郊於梁肅補闕書曰郊之五言詩其有高處在古無上其有平處下顧兩謝韓送郊詩曰作詩三百首杳黙咸池音彼三子皆知言也豈欺天下之人哉古風今日曷不樂幸時不用兵無曰既蹙矣乃尚可以生彼州之賦去汝不顧此州之役去我奚適一邑之水可走而違天下湯湯曷其而歸好我衣服甘我飲食無念百年聊樂一日史記韓信傳曰農夫莫不輟耕釋耒褕衣甘食索隱曰恐滅亡不久故廢止作業而事美衣甘食此篇結意類此可謂長歌之哀深於痛哭矣胡渭曰詩云幸時不用兵此必貞元十四年以前作也十五年則呉少誠反而大發諸道兵以討之矣本譏賦役之困民無所逃却言時不用兵正宜甘食好衣相與為樂辭彌婉而意彌痛山樞萇楚之遺音也樊汝霖曰安史亂後方鎮相望於内地大者連州十餘小者不下三四兵驕則逐帥帥強則叛上不廷不貢往往而是故託古風以寓意觀詩意當在德宗之世與烽火詩意相為表裏云嗟哉董生行淮水出桐柏山東馳遥遥千里不能休淝水出其側不能千里百里入淮流夀州屬縣有安豐唐貞元時縣人董生召南隱居行義於其中刺吏不能薦天子不聞名聲爵禄不及門門外惟有吏日來徴租更索錢嗟哉董生朝出耕夜歸讀古人書盡日不得息或山而樵或水而漁入厨具甘㫖上堂問起居父母不慼感妻子不咨咨嗟哉董生孝且慈人不識惟有天翁知生祥下瑞無時期家有狗乳出求食雞來哺其兒啄啄庭中拾蟲蟻哺之不食鳴聲悲傍徨躑躅久不去以翼來覆待狗歸嗟哉董生誰將與儔時之人夫妻相虐兄弟為讐食君之禄而令父母愁亦獨何心嗟哉董生無與儔神味古淡節族自然集中寡二少雙唯琴操間有近之者俞瑒曰古詩長短句盛於太白如蜀道難遠别離等篇實為公所取法者其竒横偏在用韻處貫下一筆然後截住以足上意如盡日不得息亦獨何心等句是也山石山石犖确行徑微黄昏到寺蝙蝠飛昇堂坐階新雨足芭蕉葉大支子肥僧言古壁佛畫好以火來照所見稀鋪床拂席置羮飯疎糲亦足飽我飢夜深靜卧百蟲絶清月出嶺光入扉天明獨去無道路出入高下窮烟霏山紅澗碧分爛熳時見松櫪皆十圍當流赤足蹋澗石水聲激激風吹衣人生如此自可樂豈必局束為人鞿嗟哉吾黨二三子安得至老不更歸以火來照所見稀與嶽廟作神縱欲福難為功畧同於法則隨手撇脫於意則素所不滿之事即隨處自然流露也某氏曰東坡詩云犖确何人似退之意行無路欲從誰宿雲解駮晨光漏獨見山紅澗碧時皆采公此篇中語也顧嗣立曰七言古詩易入整麗而亦近平熟自老杜始為抝體如杜鵑行之類公之七言皆祖此種而中間偏有極鮮麗處不事雕琢更見精采有聲有色自是大家元遺山論詩絶句云有情芍藥含春淚無力薔薇卧晚枝拈出退之山石句始知渠是女郎詩真篤論也汴泗交流贈張僕射汴泗交流郡城角築場千步平如削短垣三靣繚逶迤擊鼓騰騰樹赤旗新秋朝凉未見日公早結束來何為分曹决勝約前定百馬攅蹄近相映毬驚杖奮合且離紅牛纓紱黄金羈側身轉臂著馬腹霹靂應手神珠馳超遥散漫兩閒暇揮霍紛紜爭變化發難得巧意氣粗讙聲四合壯士呼此誠習戰非為劇豈若安坐行良圖當今忠臣不可得公馬莫走須殺賊神采飛動結有忠告便比雉帶箭高一格顧嗣立曰曹子建白馬篇仰手接飛猱俯身散馬蹄杜子美詩走馬脱轡頭手中挑青絲㨗下萬仞岡俯身試搴旗側身轉臂語意本此發難得巧即雉帶箭所謂將軍欲以巧伏人盤馬彎弓惜不發是也舊注難作去聲引張良發八難解大謬某氏曰公集有諫張僕射擊毬書此詩云此誠習戰非為劇豈若安坐行良圖葢諷之也鳴鴈嗷嗷鳴鴈鳴且飛窮秋南去春北歸去寒就暖識所依天長地濶棲息稀風霜酸苦稻粱㣲毛羽摧落身不肥徘徊反顧羣侣違哀鳴欲下洲渚非江南水闊朝雲多草長沙軟無網羅閒飛靜集鳴相和違憂懷惠性匪他凌風一舉君謂何王伯大曰公在徐州與孟東野書有曰去年脱汴州之亂遂來於此主人與余有故居余苻離睢水上及秋將辭去云云主人謂建封公在徐鬱鬱不得志見於書與詩者如此葢託鴈以自喻也雉帶箭原頭火燒靜兀兀野雉畏鷹出復沒將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿勁箭加衝人决起百餘尺紅翎白鏃隨傾斜將軍仰笑軍吏賀五色離披馬前墮篇幅有限而盤屈跳盪生氣遠出故是神筆容齋三筆曰昌黎雉帶箭詩東坡嘗大字書之以為妙絶予讀曹子建七啓論羽獵之美云人稠網宻地逼勢脅乃知韓公用意所來處野雉畏鷹出復沒方嵩卿本作伏欲沒朱子考異云雉出復沒而射者彎弓不肻輕發正是形容持滿命中之巧毫釐不差處改作伏欲神采索然矣顧嗣立曰將軍欲以巧伏人盤馬彎弓惜不發二句無限神情無限頓挫公葢示人以運筆作文之法也至其全首波瀾委曲細㣲熨貼王留耕所謂寫物之妙其狀如在目前信然信然沈德潜曰李將軍度不中不發發必應弦而倒審量於未彎之先此矜惜於己彎弓之候總不肻輕見其技也作詩作文亦須得此意條山蒼條山蒼河水黄浪波沄沄去松栢在山岡桃源圖神仙有無何眇芒桃源之説誠荒唐流水盤迴山百轉生綃數幅垂中堂武陵太守好事者題封逺寄南宫下南宮先生忻得之波濤入筆驅文辭文工畫妙各臻極異境恍惚移於斯架巖鑿谷開宫室接屋連牆千萬日嬴顛劉蹶了不聞地坼天分非所恤種桃處處惟開花川源近逺烝紅霞初來猶自念鄉邑嵗久此地還成家漁舟之子來何所物色相猜更問語大蛇中斷喪前王羣鳥南渡開新主聽終辭絶共悽然自說經今六百年當時萬事皆眼見不知㡬許猶流傳爭持酒食來相饋禮數不同罇俎異月明伴宿玉堂空骨冷魂清無夢寐夜半金雞啁哳鳴火輪飛出客心驚人間有累不可住依然離别難為情船開棹進一迴顧萬里蒼蒼煙水暮世俗寧知偽與真至今傳者武陵人一起一結善占地步彦周詩話曰退之桃源行云種桃處處皆開花川源近逺烝紅霞狀花卉之盛古今無人道此語俞瑒曰公七言古詩少用對句此篇諸對亦甚竒偉沈德潜曰玉堂即金堂玉室意以神仙目之東方半明東方半明大星沒獨有太白配殘月嗟爾殘月勿相疑同光共影須臾期殘月暉暉太白睒睒雞三號更五㸃與鐘鳴漏盡意同韓醇曰此詩與煌煌東方星興寄頗同葢指順宗即位不能親政而憲宗在東宫之時也某氏曰時賈眈鄭珣瑜二相皆天下重望王叔文用事相繼引去此詩所以喻東方半明大星沒也韋執誼為叔文汲引此詩所以喻獨有太白配殘月也順宗己厭機政執誼叔文尚以私意更相猜忌所以有嗟爾殘月勿相疑同光共影須臾期也及憲宗立而叔文執誼竄猶東方明而殘月大白滅此詩所以喻殘月暉暉太白睒睒雞三號更五㸃也意㣲而顯誠得詩人之㫖謁衡嶽廟遂宿嶽寺題門樓五嶽祭秩皆三公四方環鎮嵩當中火維地荒足妖怪天假神柄專其雄噴雲泄霧藏半腹雖有絶頂誰能窮我來正逢秋雨節陰氣晦昧無清風潜心黙禱若有應豈非正直能感通須臾靜掃衆峰出仰見突兀撐青空紫葢連延接天柱石廩騰擲堆祝融森然魄動下馬拜松栢一逕趍靈宮粉牆丹柱動光彩鬼物圖畫填青紅升階傴僂薦脯酒欲以菲薄明其𠂻廟令老人識神意睢盱偵伺能鞠躬手持盃珓導我擲云此最吉餘難同竄逐蠻荒幸不死衣食纔足甘長終侯王將相望久絶神縱欲福難為功夜投佛寺上髙閣星月掩映雲朣朧猿鳴鐘動不知曙杲杲寒日生於東東坡所謂能開衡山之雲者本此沈德潜曰横空盤硬語妥帖力排奡此詩足當此語王伯大曰公兩謫南方初自陽山北還過衡在永貞元年八月過潭適當殘秋陪杜侍御逰湘西寺詩云是時秋向殘是也今云我來正逢秋雨節故知此詩是陽山還時作後自潮州還移刺袁州則元和十五年十月葢未嘗過衡據袁州謝表云去年正月貶授潮州刺史其年十月凖例量移云云即自潮徑當來袁又未嘗遇秋雨節時也蘇東坡觀市詩云潮陽太守南遷歸喜見石廩堆祝融觕言之耳永貞行君不見太皇亮隂未出令小人乘時偷國柄北軍百萬虎與貔天子自將非他師一朝奪印付私黨懍懍朝士何能為狐鳴梟噪爭署置䁑睒跳踉相撫媚夜作詔書朝拜官超資越序曾無難公然白日受賄賂火齊磊落堆金盤元臣故老不敢語晝卧涕泣何汍瀾董賢三公誰復惜侯景九錫行可歎國家功高德且厚天位未許庸夫干嗣皇卓犖信英主文如太宗武高祖膺圖受禪登明堂共流幽州鯀死羽四門肅穆賢俊登數君匪親豈其朋郎官清要為世稱荒郡迫野嗟可矜湖波連天日相騰蠻俗生梗瘴癘烝江氛嶺祲昏若凝一蛇兩頭見未曾怪鳥鳴喚令人憎蠱蟲羣飛夜撲燈雄虺毒螫墮股肱食中置藥肝心崩左右使令詐難憑慎勿浪信常兢兢吾嘗同僚情可勝具書目見非妄徴嗟爾既往宜為懲前幅天昏地暗中間日出氷消閱至後幅又如凄風苦雨文生於情變幻如是蔡寛夫詩話曰子厚禹錫於退之最厚善然退之貶陽山不能無疑赴江陵途中寄三學士云同官盡才俊偏善柳與劉或慮語言泄傳之落寃讐二子不宜爾將疑㫁還不及其為永貞行憤疾至云數君匪親豈其朋又曰吾嘗同僚情可勝則亦見其坦夷尚義待朋友始終也困學紀聞曰少陵善房次律而悲陳陶一詩不為之隱昌黎善柳子厚而永貞行一詩不為之諱公議之不可掩也如是顧嗣立曰此詩前半言小人放逐之為快後半言數君貶謫之可矜葢為劉柳諸公也舊注專指夢得似未必然然夢得貶連州而公曾令陽山以具書目見句為證於義亦通姑存其説以俟考鄭羣贈簟蘄州笛竹天下知鄭君所寶尤瓌竒攜來當晝不得卧一府傳㸔黄瑠璃體堅色淨又藏節盡眼凝滑無瑕疵法曹貧賤衆所易腰腹空大何能為自從五月困暑濕如坐深甑遭烝炊手磨袖拂心語口慢膚多汗真相宜日暮歸來獨惆悵有賣直欲傾家資誰謂故人知我意巻送八尺含風漪呼奴埽地鋪未了光彩照耀驚童兒青蠅側翅􅣣虱避肅肅疑有清飈吹倒身甘寢百疾愈却願天日恒炎曦明珠青玉不足報贈子相好無時衰偼伃怨歌云常恐秋節至凉風奪炎熱此云却願天日恒炎曦同一語妙顧嗣立曰此詩每用反襯意見竒如攜來當晝不得卧却願天日恒炎曦等句也賦物之妙直從細瑣處體貼而出沈德潜曰却願天日恒炎曦與攜來當晝不得卧俱透過一層法樊汝霖曰唐孔戣私記云退之豐肥善睡每來吾家必命枕簟而沈存中筆談亦云世畫韓退之小面而美􅐖著紗帽此乃江南韓熙載爾熙載諡文靖江南人謂之韓文公因此遂誤以為退之退之肥而少􅐖此詩有腰腹空大及慢膚多汙之語二説信然贈崔立之評事崔侯文章苦㨗敏高浪駕天輸不盡曾從關外來上都隨身巻軸車連軫朝為百賦猶鬰怒暮作千詩轉遒𦂳揺毫擲簡自不供頃刻青紅浮海蜃才豪氣猛易語言往往蛟螭雜螻蚓知音自古稱難遇世俗乍見那妨哂勿嫌法官未登朝猶勝赤尉長趨尹時命雖乖心轉壯技能虚富家逾窘念昔塵埃兩相逢爭名齟齬持矛楯子時專場誇觜距余始張軍嚴韅靷爾來但欲保封疆莫學龎涓怯孫臏竄逐新歸厭聞閙齒髪早衰嗟可閔頻䝉怨句刺棄遺豈有賢官敢推引深藏箧笥時一發戢戢己多如束筍可憐無益費精神有似黄金擲虛牝當今聖人求侍從㧞擢杞梓収楛箘東馬嚴徐己奮飛枚臯即召窮且忍復聞王師西討蜀霜風冽冽摧朝菌走章馳檄在得賢燕雀紛拏要鷹隼竊料二塗必處一豈比恒人長蠢蠢勸君韜養待徴招不用雕琢愁肝腎牆根菊花好沽酒錢帛縱空衣可準暉暉簷日暖且鮮摵摵井梧疎更殞高士例湏憐麴蘖丈夫終莫生畦畛能來取醉任喧呼死後賢愚俱泯泯可憐無益費精神為千古文人喟息漁隱叢話曰立之詩有不工處故退之以蛟螭雜螻蚓譏之送區宏南歸穆昔南征軍不歸蟲沙猿鶴伏以飛洶洶洞庭莽翠微九疑鑱天荒是非野有象犀水貝璣分散百寶人士稀我遷於南日周圍來見者衆莫依俙爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧引以纆徽雖有不逮驅騑騑或採於薄漁於磯服役不辱言不譏從我荆州來京畿離其母妻絶因依嗟我道不能自肥子雖勤苦終何希王都觀闕雙巍巍騰蹋衆駿事鞍鞿佩服上色紫與緋獨子之節可嗟唏母附書至妻寄衣開書拆衣淚㾗晞雖不勅還情庻㡬朝暮盤羞惻庭闈幽房無人感伊威人生此難餘可祈子去矣時若發機蜃沈海底氣昇霏彩雉野伏朝扇翬處子窈窕王所妃茍有令德隱不腓况今天子鋪德威蔽能者誅薦受禨出送撫背我涕揮行行正直慎脂韋業成志樹來頎頎我當為子言天扉分㪚百寶人士稀道盡西南邊徼地脉風氣柳州所謂少人而多石也雖不勅還情庻㡬語意深婉逰子讀此可以聽於無聲矣張耒曰古人作七言詩其句脈多上四字而下以三字成之退之乃變句脈以上三下四如落以斧引以纆徽雖欲悔舌不可捫是也方崧卿曰九疑言鑱天洪濤言舂天皆竒語也李光地曰公在陽山有區册在江陵又有區宏皆相從不忍舍故宏之從公於京而歸也詩以送之惓惓訓朂歸於正直可咏可感三星行我生之辰月宿南斗牛奮其角箕張其口牛不見服箱斗不挹酒漿箕獨有神靈無時停簸揚無善名己聞無惡聲己讙名聲相乘除得少失有餘三星各在天什伍東西陳嗟汝牛與斗汝獨不能神俞瑒曰竒趣却從大東之詩來變化自妙用韻凡五轉似古歌謡東坡志林曰韓退之詩我生之辰月宿南斗乃知退之以磨蝎為身宫僕以磨蝎為命宫平生多得謗譽殆同病也剥啄行剥剥啄啄有客至門我不出應客去而嗔從者語我子胡為然我不厭客困於語言欲不出納以堙其源空堂幽幽有秸有莞門以兩版叢書於間窅窅深塹其墉甚完彼寧可隳此不可干從者語我嗟子誠難子雖云爾其口益蕃我為子謀有萬其全凡今之人急名與官子不引去與為波瀾雖不開口雖不開關變化咀嚼有鬼有神今去不勇其如後艱我謝再拜汝無復云往追不及來不有年方崧卿曰韓文與多作以他文見者非一詩之子歸不我以注以猶與也朱子考異云按陸宣公奏議亦然如云未審云云以否之類是也然當作與為正某氏曰公被讒出為陽山至是召還又有謗之者故三星行云名聲相乗除得少失有餘剥啄行云我不厭客困於語言欲不出納以堙其源各有所激云爾歐陽文忠擬剥啄行寄少師云剥剥復啄啄柴門驚鳥雀故人千里駕信士百金諾云云公逺讒避謗欲謝客以堙其源故深其塹堅其墉要為不可干者而歐陽則歸老故鄉欣然喜客之至是以其辭不同如此孟東野失子并序東野連産三子不數日輙失之㡬老念無後以悲其友人昌黎韓愈懼其傷也推天假其命以喻之失子將何尤吾將上尤天女實主下人與奪一何偏彼於女何有乃令蕃且延此獨何罪辜生死旬日間上呼無時聞滴地淚到泉地秖為之悲瑟縮久不安乃呼大靈龜騎雲款天門問天主下人薄厚胡不均天曰天地人由來不相關吾懸日與月吾繫星與辰日月相噬齧星辰踣而顛吾不女之罪知非女由因且物各有分孰能使之然有子與無子禍福未可原魚子滿母腹一一欲誰憐細腰不自乳舉族長孤鰥䲭梟啄母腦母死子始翻蝮蛇生子時坼裂腸與肝好子雖云好未還恩與勤惡子不可說䲭梟蝮蛇然有子且勿喜無子固勿歎上聖不待教賢聞語而遷下愚聞語惑雖教無由悛大靈頓頭受即日以命還地秖謂大靈女往告其人東野夜得夢有夫𤣥衣巾闖然入其户三稱天之言再拜謝𤣥夫収悲以歡忻龜筴傳祝詞云假之玉靈夫子而上行於天下行於淵詩以大靈發端本此王伯大曰黄魯直嘗書此詩遺石君美君美失子云時以觀覽可用亂思而紓哀究觀物理其實如此大槩因果耳退之救世弊故并因果不言然此一段文意乃是湼盤經中佛語退之嘗言不能無所不讀未有能為大儒者其弗信矣乎魯直所云如此俞瑒曰用韻本主先字兼入真文元寒刪諸韻是古韻也與此日足可惜一首同法顧嗣立曰按孟東野集有悼㓜子詩云負我十年恩欠爾千行淚杏殤詩畧云兒生月不明兒死月始光此誠天不知翦棄我子孫又云病叟無子孫獨立猶束柴其詞甚可哀也御選唐宋詩醇巻二十九
