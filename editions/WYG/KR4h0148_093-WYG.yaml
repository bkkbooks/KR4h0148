body:
  text: 山隂陸游詩四秋興樵風溪上弄扁舟濯錦江邉憶舊遊豪竹哀絲真昨夢爽砧繁杵又驚秋墜枝橘熟初堪剪浮瓮醅香恰受篘莫道身閒總無事孤燈夜夜寫清愁三江舟中大醉志欲富天下一身常苦飢氣可吞匈奴束帶向小兒天公無由問世俗那得知揮手散醉髪去隠雲海涯風息天鏡平濤起雪山傾輕帆入浩蕩百怪不可名虹竿秋月鈎巨鼇倘可求滅迹從今逝回㸔隘九州擬以太白便覺去人不逺樊江晩泊碧雲吞日天欲暮城西捩柁城東路蓴羮菰飯香滿船正是江頭落帆處荻洲漁火逺更明煙水蒼茫聞雁聲不是緑尊能破悶白頭客路若為情秋夕羇魂虚仗些詞招病骨那禁積毁消亂葉打窗寒有信昏燈照幔夢無聊棧邉老驥心空在㸑下殘桐尾半焦百感忽生推枕起碧霄銀漢正迢迢深於比興怨而不怒秋雨排悶十韻今夏乆無雨從秋却少晴空濛迷逺望蕭瑟送寒聲衣潤香偏著書蒸蠧欲生壞簷聞瓦墮漲水見堤平溝溢池魚出天低塞雁征螢飛明闇廡蛙閙雜踈更藥醭時須焙舟閒任自横未憂荒楚菊直恐敗吳秔夜永燈相守愁深酒細傾浮雲㑹消散皷笛賽西成方回曰字字工穏寄題朱元晦武彛精舍先生結屋緑巖邉讀易懸知屢絶編不用采芝驚世俗恐人謗道是神仙身閒剩覺溪山好心靜尤知日月長天下蒼生未蘇息憂公遂與世相忘惟朱子稱此詩惟此詩可寄朱子所云詩中有人者長安道千夫登登供版築萬手丁丁供斵木歌樓舞榭髙入雲複幕重簾晝燒燭中使傳宣騎飛鞚達官候見車擊轂豈惟炎熱可炙手五月瞿唐誰敢觸人生易盡朝露晞世事無常壞陂復士師分鹿真是夢塞翁失馬猶為福君不見野老八十無完衣嵗晚兆風吹破屋言抵藥石體合風雅村舍空谷人稀到新寒病頓輕晨霜催小獵宿雨潤新耕草莽秦馳道雲煙越故城千年不磨滅惟有暮山横有俯仰千古之感句法亦逼老杜幽居感懷偶傍楓林結數椽東歸也復度流年汀洲雁下依殘水墟里人行破夕煙十月風霜欺客枕五更皷角滿江天散闗清渭應如昨回首功名一愴然遲暮遲暮固多感况此嵗崢嶸霜霰忽已集夜聞絡緯鳴青燈不解語依依有餘情銅瓶煮寒泉中作笙簫聲沈憂能傷人一夕白髪生蓬萊渺雲海金丹幾時成自若耶溪舟行杭鏡湖而歸換馬亭前煙火㣲鬬牛橋畔行人稀雲山慘澹少顔色霜日清薄無光輝新酒篘成桑正落美人信斷雁空歸髙樓何處吹長笛清淚無端又濕衣詞意清婉風調致佳骨相骨相元知薄功名敢自期病侵彊健日閒過聖明時形勝輪臺地飛騰瀚海師江湖雖萬里猶擬綴聲詩意自深深非闗骨相感憤今皇神武是周宣誰賦南征北伐篇四海一家天厯數兩河百郡宋山川諸公尚守和親䇿志士虚捐少壯年京洛雪消春又動永昌陵上草芊芊大聲疾呼氣浮紙上諸將五首之嫡嗣也盧世㴶曰南渡樂於徧安誰能念此晩出偏門一段新愁帶宿醒半欹烏㡌䇿驢行村墟香動梅初破裘褐寒輕雪未成渡口人爭紅日晩沙邉雁帶碧煙横悠然又覔長堤路腸斷城樓畫角聲過杜浦橋橋北雨餘春水生橋南日落暮山横問君對酒胡不樂聽取菱歌煙外聲莊器之作招隠閣項平父諸人賦詩予亦繼作諸公共賦反招隠細宇斜行肯見傳語到淮南小山作人如江左永和年一窗蘿月禁春瘦萬壑松風撼晝眠我亦尚嫌林谷淺因君更擬斸雲煙溪上醉吟行行不知溪路深但怪素月生遥岑不辭醉袖拂花絮與子更醉青蘿陰雨中泊舟蕭山縣驛端居無䇿散閒愁聊作人間汗漫遊晚笛隨風來倦枕春湖帶雨送孤舟店家菰飯香初熟市擔蓴絲滑欲流自笑勞身成底事黄塵陌上雪䝉頭春潮七字與蘓州各成妙句初夏遊凌氏小園水滿池塘葉滿枝曲廊危榭愜幽期風和海燕分泥處日永吳蠶上簇時閒理阮咸尋舊譜細傾白墮賦新詩從來夏淺勝春日兒女紛紛豈得知原註庾信詩云夏淺却勝春鏡湖遊人至立夏而止題少陵畫像長安落葉紛可掃九陌北風吹馬倒杜公四十不成名袖裏空餘三賦草車聲馬聲喧客枕三百青銅市樓飲杯殘䏑冷正悲辛仗内鬬雞催賜錦初冬雜題莫嫌風雨作新寒一樹青楓已半丹身在范寛圖畫裏小樓西角剩慿䦨小雨細細濕春光霏霏破夕陽卧聞驚倦枕起㸔入虚堂映葉鶯猶囀爭泥燕正忙閒愁無遣處誰與共飛觴工於賦物不落纎巧題徐淵子環碧亭亭有茶山曽先生詩茶山丈人厭囂譁幅巾每訪博士家小亭談笑不知暮往往城上聞吹笳興來傑作粲珠璧嵗乆妙墨亡龍蛇郎君弟子多白髪回頭日月如犇車徐卿赤城古仙子十年四海推才華覽觀陳迹喜不寐施補罅漏支傾斜曲池還浸古來月樷莽忽見當時花重題舊句照髙棟力振風雅排滛哇席間紵袍已散鵠堂上講皷初停撾速宜力置竹葉酒不用更瀹桃花茶原註桃花茶見曽公詩臨安春雨初霽世味年來薄似紗誰令騎馬客京華小樓一夜聽春雨深巷明朝賣杏花矮紙斜行閒作草晴窗細雨戱分茶素衣莫起風塵嘆猶及清明可到家頷聫團轉脱口而出一涉凑泊失此語妙瞿佑曰陳蕳齋詩云客子光隂詩巻裏杏花消息雨聲中陸放翁詩云小樓一夜聽春雨深巷明朝賣杏花皆佳句也葉靖逸詩云春色滿園闗不住一枝紅杏出牆來戴石屏詩云一冬天氣如春暖昨日街頭賣杏花句意亦佳可以追及之盧世㴶曰三四有唐人風韻方回曰臨安春雨初霽一首劍南集編在嚴州朝辭時所作後村詩話乃謂妙年行都所賦思陵賞音似誤飲張功父園戲題扇上寒食清明數日中西園春事又匆匆梅花自避新桃李不為髙樓一笛風寓意雖刻自足風調盧世㴶曰翻案妙有諷意小舟過御園聖主憂民罷露臺春風别苑晝常開盡除曼衍魚龍戲不禁芻蕘雉來水鳥避人横翠靄宫花經雨委蒼苔殘年自喜身强健又作清都夢一回善於立言春遊絶句一百五日春郊行三十六溪春水生千秋觀裏逢急雨射的峰前㸔晩行原註自秦望山而北合三十六溪水為若耶溪雨後礎潤還成雨雲收旋作晴巖花分日發林筍逐畨生筆硯行常具軒窗晩更明塵埃幸不到那得廢詩情夜汲酒渴起夜汲月白天正青銅瓶響寒泉聞之心自醒井邉雙梧桐映月影離離上有獨棲鵲細爪握髙枝我欲畫團扇良工不可求三歎拊庭楯浩然風露秋落落有古意新霽城南舟中夜興身是江湖不繫船雨餘隨處一翛然浮雲盡歛出青嶂孤月徐升行碧天收網漁歌移别浦隔城塔影落前川明朝閒就平洲飲巾履追凉又一年丙午五月大雨五日不止鏡湖渺然想見湖未廢時有感而賦朝雨暮雨梅正黄城南積潦入車箱鏡湖無復鍼青秧直浸山脚白茫茫湖三百里漢訖唐千載未嘗廢陂防屹如長城限胡羗嗇夫有秩走且僵旱有灌注水何傷越民嵗嵗常豐穰泆湖誰始謀不臧使我婦子饜糟糠陵遷谷變亦何常㑹有妙手開湖光蒲魚自足被四方煙艇滿目菱歌長有闗國計民生非尋常歌詠可比山隂志鏡湖綿跨二縣周迴三百五十八里東漢馬臻始築塘蓄水溉田九千餘頃迄於宋民甚利之祥符以來並湖之民盜湖為田熈寧中遣使至越不能復湖後遂盡廢為田皆已陞科議復古以興水利者常惜之而勢不可行㑹稽志張元忭曰忭按諸家所論前乎漢而無海塘則鏡湖不可不築後乎宋而有海塘則鏡湖可以不復近者三江之閘其益百倍於海塘惟時其啟閉以常謹水利之大綱而於外塘務完之内流務濬之以時修水利之細目則受利不止一㑹稽矣又何鏡湖之足論乎早自烏龍廟歸殘漏聲中聴曳鈴翩翩吹㡌出郊坰雨餘澗落雙虹白雲合山餘一髪青鐵馬蹴氷悲昨夢朱顔辭鏡感頽齡歸來獨對空齋冷鳥迹蒼苔自滿庭齋中閒咏風號萬物作濤聲雲截千峰似几平多病支離仍老境暮秋蕭瑟更山城燕觴乆罷塵㾗積庭訟全稀蘚暈生莫道齋中日無事焚香掃地又詩成六句可謂深穏秋雨北榭作秋風吹雨到江濆小閣踈簾曉色分津吏報増三尺水山僧歸入萬重雲飄零露井無桐葉斷續煙汀有雁羣了却文書早尋睡檐聲偏愛枕間聞方囘曰此嚴陵郡圃也三四極工而活焉耆行焉耆山頭暮煙紫牛羊聲斷行人止平沙風急捲寒蓬天似穹廬月如水大胡太息小胡悲投鞍欲眠且復起漢家詔用李輕車萬丈戰雲來壓壘焉耆山下春雪晴莽莽惟有蒺藜生射慶食肉飲其血五穀自古惟聞名樵蘇切莫近亭障將軍卧䕶真長城十年牛馬向南睡知是中原今太平園中絶句溪北溪南飛白鷗夕陽明處見漁舟慿誰為剪機中素畫取天涯一片秋晨過天慶蘿月挂團壁松風號急灘孤燈經院曉殘雪醮壇寒賸欲閒扶杖何妨醉墮冠詩成興不盡萬里跨青鸞三四語意工絶與棋聲花院靜幡影石壇髙不可軒輊出城翩翻烏㡌出林坰掠面風㣲酒半醒戍火難尋玉闗夢衣塵空愧草堂靈天晴山雪明城郭水漲江流近驛亭客髪不如堤上栁數枝春動又青青夜燈千峰榭夷甫諸人骨作塵至今黄屋尚東巡度兵大峴非無䇿収泣新亭要有人薄釀不澆胷壘塊壯圖空負膽輪囷危樓挿斗山衘月徙倚長歌一愴神從空而下氣象髙逺歸咎王吕自是千古公論潘問竒曰劍南詩操觚家奉之如拱壁然一時所為翕然者不過喜其陶寫風雲流連月露而已而其惓惓宗國悱惻纒綿顧未有及之者予為一一標識之使知先生當日傷半壁之無依痛兩宫之不返終天歎悼不徒區區景物間也比少陵庶幾一飯不忘之誼云秋興孤城寂寞近江干處處疎碪送早寒水緑纔餘半篙緑霜髙初染一林丹民租屢減追胥少吏責全輕法令寛偶有一樽聊獨醉强挼黄菊助清歡余年二十時嘗作菊枕詩頗傳於人今秋偶復采菊縫枕嚢悽然有感采得黄花作枕嚢曲屏深幌閟幽香喚回四十三年夢燈暗無人説斷腸少日曽題菊枕詩蠧編殘稾鎻蛛絲人間萬事消磨盡只有清香似舊時黯然自傷與沈園二絶所感同而詞亦並工葢發乎情者深也東吳女兒曲東吳女兒語如鶯十三不肯學吹笙鏡奩初喜穉蠶出窗眼已㸔雙繭成庭空日暖花自舞簾巻巢乾燕新乳阿弟貪書下學遲獨揀詩章教鸚鵡絶似皮陸有為予言烏龍髙嶮不可到處有僧巖居不知其年予每登千峰榭望之慨然為作詩樵子向予説有僧巢翠微巖扉雲共宿錫杖鶴同飛日暮松明火天寒槲葉衣棄官從此逝非子尚誰歸楚宫行漢水方城一何壯大路並馳車百輛軍書挿羽擁修門楚王正醉章華上璇題藻井窮丹青玉笙寶瑟聲㝠㝠忽聞命駕遊七澤萬騎動地如雷霆清晨射獵至中夜蒼兕𤣥熊紛可藉國中壯士力已殫秦冦東來遣誰射妾命薄原註太白作此篇言長門宫事予反之妾命薄早入天家侍帷幄君王勤儉省宴遊寶柱朱弦塵漠漠日長别殿承恩稀旰昃猶聞親萬機宫中雖無珠玉賜塞上不見煙塵飛不須悲傷妾命薄命薄却令天下樂髙處立濶處行四皷酒醒起歩庭下酒解夜過半出門歩中庭天髙河漢白月澹煙霧青重滴竹杪露疎見樹罅星壞甃啼寒螿深竹明孤螢秋晩雖未霜蠧葉時自零四序逝不留慨然感頽齡平生茅一把不博帶萬釘䲭溝謝拍拍鴻路追㝠㝠秋霽灝氣明山川霽色滿天地西風吹我衣忽有萬里意中原運當平所要在得士餘年猶幾何棄置復棄置短幅森嚴中極頓挫之妙採藥篢子編成細箬新獨穿空翠上嶙峋丹砂巗際朝暾日狗杞雲間夜吠人絡石菖蒲䝉緑髪纒松薜茘長蒼鱗金貂謁帝我未暇且作人間千嵗身塞上曲將軍許國不懷歸又見桑乾木葉飛要識君王念征戍新秋已報賜冬衣自合唐音送潘徳乆使薊門崑崙東分一枝渾犇蹴砥柱經龍門羲皇受圖撫上古神禹治水開中原三靈實扶藝祖業萬國共仰東都尊羣兒撞壞吁可歎顧使殘虜今遊魂因君試求出師路孟津白馬應如故不須更議繫河橋北風正可椉氷渡頗聞盧龍已數盡復道飛狐合屯戍轅門倘駐拂雲祠烽火應過明妃墓君歸解鞍藉芳草細談塞北忘予老讀書飲酒待賊平萬丈旄頭方下掃老驥伏櫪志在千里游豈須臾忘恢復者况觸事感懷耶端莊雜流麗剛健含婀娜可以語此詩之妙夜歸塼街菴書事近坊燈火如晝明十里東風吹市聲逺坊寂寂門盡閉只有煙月無人行誰家小樓歌惱儂餘響縹緲縈簾櫳苦心自古乏真賞此恨略與吾曹同歸來空齋卧凄冷燈前病骨巉巉影獨吟古調遣誰聴聊與梅花分夜永送張野夫寺丞牧滁州皇天方憂九州裂建隆真人仗黄鉞陣雲冷壓清流闗賊壘咿嚶氣如髪逋誅猾虜入檻車北風吹乾草頭血一龍上天三百年舊事空聞遺老説金印斗大誰作州公子玉面蒼髯虬賦詩健筆挾風雨論兵辯舌森戈矛别君帳飲灞橋頭長歌為君寛旅愁戰塲遺迹儻可畫尺素寄我闗河秋唐之子孫不能以天下取河北志士之慨於言外見之夜歸偶懷故人獨孤景略買酒村場半夜歸西山落月照柴扉劉琨死後無竒士獨聴荒雞淚滿衣觸緒長嗟言在此而意在彼十四字中波瀾甚濶賀裳詩話乃謂務觀才具無多意境不逺惟善寫眼前景物豈非但見方隅者耶月下小酌草樹已秋聲郊原喜晩晴風生雲盡散天濶月徐行下箸槎頭美傳杯甕面清追歡猶可勉徂嵗不須驚鄰曲有未飯被追入郭者憫然有作舂得香秔摘緑葵縣符急急不容炊君王日御金華殿誰誦周家七月詩親民之官莫如守令與人主共養百姓同休戚者其惟良吏乎漢治之稱文景有以也題湖邉旗亭春色初回杜若洲佳人又典鷫鸘裘八千里外狂漁父五百年前舊酒樓渡口逺山顰翠黛天邉新月挂瓊鈎回頭笑向紅塵説也有閒愁到此不落筆豪俊宋人常問人云君詩中有幾酒樓此亦一酒樓也寓懷脱粟未為飢短褐未為寒衆毁心自可身困氣愈完茒屋雖三間趺坐則已寛濁酒不滿瓢浩歌有餘歡禄食妻子樂功名後人㸔成敗兩蝸角貴賤一鼠肝芒芒百年夢底物堪控摶不如學餐霞駐此雙頰丹行披終南雲飛渡黄河湍巋然過空城人言古長安霜露䝉荆榛喟然增永歎國恥未雪此老終身大恨固其忠義所結然言之頻數亦為筆墨之累此乃别有波瀾言盡而意不盡題千秋觀懷賀亭河湟使典珥左貂曲江相君謝不朝宫中玉環狐作妖黠虜旁窺心已驕天維欲絶地軸揺有識凜凜憂宗祧賀公託言師松喬黄冠徑歸侣漁樵老馬立仗不自聊去如鸞風冲煙霄傾都祖餞擁渭橋賢哉大夫脱塵囂揚州渡江木蘭橈入東夜聽錢塘潮我來故祠竹蕭蕭黄冠野服傳生綃詞卑媿匪英瓊瑤空采蘋藻奠桂椒虚堂斷香閉寂寥遺魂零落何由招論古别有見解樊江手中一巻養魚經又向樊江上草亭朝雨染成新漲緑春煙澹盡逺山青榜舟不厭頻來往岸幘常須半醉醒賦罷新詩自髙詠滿汀鷗鷺欲忘形自饒雅韻練塘㣲風吹頰酒初醒落日舟横杜若汀水秀山明何所似玉人臨鏡暈螺青歸次樊江芳草東西路緑楊長短亭人生豈匏繫吾志本鴻㝠征䄂朝霑雨歸帆夜戴星長魚幸能買且復倒殘瓶泛湖至東涇春水六七里夕陽三四家兒童収鵝鴨婦女治桑麻地僻衣巾古年豐笑語譁老夫維小艇半醉摘藤花村居初夏天遣為農老故鄉小園三畆鏡湖傍嫩莎經雨如秧緑小蝶穿花似繭黄斗酒隻雞人笑樂十風五雨嵗豐穣相逢但喜桑麻長欲話窮通已兩忘盧世㴶曰此景真不可多得東闗煙水蒼茫西復東扁舟又繫栁隂中三更酒醒殘燈在卧聴蕭蕭雨打篷七月一日夜坐舍北水涯戲竹兀傲胡床酒半醒釣筒收盡數舟横風生細葛無三伏月上疎林正四更北斗離離低欲盡明河脉脉去無聲斥僊豈復塵中戀便擬騎鯨返玉京以星河供㸃染少加運用便有景有情以事至城南書觸目十里西風吹㡌帬江城衣杵逺猶聞路如劍閣逢秋雨山似爐峰鏁暮雲原上老翁眠犢背籬根小婦牧羊羣百錢且就村塲醉舌本醇醨莫苦分感舊意正以不露為佳梅花絶句憶昔西戍日夜宿僊人原風吹野梅香夢繞江南村低空銀一鈎糝野玉三尺愁絶水邉花無人問消息題瑩上人二畫天地又秋風谿山憶剡中孤舟幸閒著借我訪支公右剡谿曉聽楓橋鐘暮泊松江月斯人亦可人淡墨冩愁絶右吳江山家暮春遶屋清陰合縁堤緑草纎起蠶初放食新麥已磨鎌苦筍先調醬青梅小蘸鹽佳時幸無事酒盡更須添𤨏事老筆自詠萬事不挂眼終年常避人荒畦荷鋤晩環堵結茒新病馬何勞斥輕鷗未肯馴雖慙市門卒聊作葛天民蓬萊館午憇驛門繫馬聽蟬吟翻動平生萬里心橋畔笛聲催日落城邉草色帶煙深闗河厯厯功名晩嵗月悠悠老病侵憶戍梁州如昨日慿䦨西望一霑襟盧世㴶曰悲壯夢遊散闗渭水之間平生望眼怯天涯客裏何堪度嵗華但恨征輪無四角不愁客路有三义驛忩燈闇傳秋柝闗樹煙深宿暮鴉叱犢老翁頭似雪羡渠生死不離家完題簡净秋夜清夜不成寐出門還浩歌斷雲㣲翳月薄露不傾荷絡緯知時早梧桐奈汝何非闗老懷惡秋物感人多荷花風露青㝠水面凉旋移野艇受清香猶嫌翠葢紅粧句何况人言似六郎隨手翻新居然佳語秋興老子雖貧未易量風流猶在小茅堂蒲萄錦覆桐孫古鸚鵡螺斟玉瀣香千㸃荷聲先報雨一林竹影剰分凉秋來便有欣然處新種蓴絲已滿塘新晴積雨已凄凉新晴還少和稼収平野濶木落逺山多土潤朝畦菜機鳴夜擲梭時清年嵗好吾敢歎蹉跎盧世㴶曰頷聫自是佳句舍北望水鄉風物戱作絶句西風沙際矯輕鷗落日橋邉繫釣舟乞與畫工團扇本青林紅樹一川秋禹跡寺南有沈氏小園四十年前嘗題小闋壁間偶復一到而園已易主刻小闋於石讀之悵然楓葉初丹槲葉黄河陽愁鬢怯新霜林亭感舊空回首泉路慿誰説斷腸壞壁醉題塵漠漠斷雲幽夢事茫茫年來妄念消除盡回向禪龕一炷香周宻曰放翁娶唐氏於其母為姑姪而不相得出之後改適趙士程嘗以春日出遊相遇於禹跡寺南之沈氏園唐以語趙遣致酒肴翁悵然乆之為賦釵頭鳯詞題園壁間集中紅酥手黄藤酒一闋是也唐氏見而和之未幾下世小園窄窄柴門短短籬山家隨分有園池客因問字來携酒僧趂分題就賦詩晨露每㸔花藟坼夕陽頻見樹隂移原註此二事非閒寂不知也拂衣司諫猶忙在此趣淵明却少知盧世㴶曰閒情逸事惟世外人知之夜讀范至能攬轡録言中原父老見使者多揮涕感其事作絶句公卿有黨排宗澤帷幄無人用岳飛遺老不應知此恨亦逢漢節解沾衣南渡之不振實由於此扼腕而言自成髙調醉卧松下短歌披鹿裘枕白石醉卧松隂當月夕寒藤夭矯學此書天風蕭森入詩律忽然夢上百尺顛緑毛邂逅巢雲仙相携大笑咸陽市俯仰塵世三千年造語入妙探梅我遊東村衝暮煙斷橋流水鳴濺濺欲尋梅花作一笑數枝忽到拄杖邉髙標元合著山澤絶豔豈復施丹鉛定知曽授餐玉法不爾恐是凌波仙錦江賦詩忽萬里蓬山把酒今三年相逢風味宛如昨人生何者非前縁頗思取醉極清賞杖頭幸有百許錢但判挿破烏紗㡌莫記吹落黄金船趣極自然調亦清婉題四仙像世上年光東逝波咸陽銅狄幾摩挲神仙不死成何事只向秋風感慨多冬晴閒歩東村由故塘還舍作紅藤拄杖獨相羊路遶東村小嶺傍水落枯萍粘蟹椵原註鄉人植竹以取蟹謂之曰椵雲開寒日上魚梁洛陽二頃言良是光範三書計本狂厯盡危機識天意要令閒健返耕桑方回曰五六善用事蟹椵句尤新盧世㴶曰𤨏事冩來亦新緻祖應世曰一路細細領畧淺􅏥人安能有此夜聞湖中漁歌夢回一燈翳復明卧聞湖上漁歌聲嗚嗚乍低忽更起嫋嫋欲斷還㣲縈初隨缺月墮煙浦已和殘角吹江城悲傷似繫漸離筑忠憤如撫桓伊箏放臣萬里憂國淚戍客白首懷鄉情峽猿失侣方獨宿沙雁垂趐猶遐征巴巫竹枝短亭曉瀟湘欵乃孤舟横世間此恨故相似使我百感何由平一氣排宕有風雨驟至之勢只用一語収結老氣無敵村夜寂寂山村夜悠然醉倚門月昏天有暈風軟水無痕迹為遭讒逺身由不仕尊敢嗟車馬絶同社自雞豚潘問竒曰風軟水無痕未經人道野意隄長逾十里村小只三家山客弛樵擔溪翁鳴釣車花深迷蝶夢雨急散蜂衙衰疾新年減青鞵上若耶憶昔憶昔西征日飛騰尚少年軍書揷鳥羽戍壘候狼煙渭水秋風夜岐山曉雪天金鞿馳叱撥繡袂舞嬋娟但恨功名晚寧知老病纒虎頭空有相麟閣竟無縁壯士埋巴峽原註獨孤䇿孤身卧海壖安西九千里孫武十三篇裘嗼蘇秦弊鞭憂祖逖先何時聞詔下遣將入幽燕筆力健舉感懷卜居鏡湖上一菴環翠屏竹林藏谽谺嶺路蟠青冥騫騰立竒石嶄絶瞻危亭車馬雖埽迹猿鳥與忘形我行半九州蹋盡芒鞵青豈知雪滿鬢於兹敞雲扃丹砂收箭鏃茯苓斸人形遼天𣺌歸鶴一瞬三千齡殘年迫衰謝嬰疾歸鄉枌諸賢渡江初總角幸有聞才非楚倚相亦能讀典墳夫豈或使之後死與斯文世儒鑿户牖道術將𤓰分孤陋守一説百氏殆可焚後來豈無人鼻堊誰揮斤巍巍貞觀治房魏出河汾文集答劉主簿書前輩之學積小以成大以所有易所無以能問於不能故其乆也汪洋浩博該極百家而不可涯涘諸名勝渡江去前輩尚未甚逺故此風猶不墜三二十年來士自為畦畛甚狹已所未知者輒訕薄之以為不足學詆窮經者則曰傳註已盡矣詆博學者則曰不知無害為君子嗚呼陋哉御選唐宋詩醇巻四十五
