body:
  text: 蘭亭道上初夏雜興山行過僧菴不入夏日六言夏夜泛溪至南莊復囘湖桑歸郊行文章思蜀江村示兒臣等謹案御選唐宋詩醇七十四巻乾隆十五年御定凡唐詩四家曰李白曰杜甫曰白居易曰韓愈宋詩二家曰蘇軾曰陸游詩至唐而極其盛至宋而極其變盛極或伏其衰變極或失其正亦惟兩代之詩最為總雜于其中通評甲乙要當以此六家為大宗盖李白源出離騷而才華超妙為唐人第一杜甫源出于國風二雅而性情真摯亦為唐人第一自是以外平易而最近乎情者無過白居易竒剏而不詭于理者無過韓愈録此四集已足包括衆長至于北宋之詩蘇黄並騖南宋之詩范陸齊名然江西宗􅉽實變化于杜韓之間既録杜韓可無庸複見石湖集篇什無多才力識解亦均不能出劍南集上既舉白以槩元自當存陸而刪范權衡至當洵千古之定評矣考國朝諸家選本惟王士禎書朂為學者所傳其古詩選五言不録杜甫白居易韓愈蘇軾陸游七言不録白居易已自為一家之言至唐賢三昧集非惟白居易韓愈皆所不載即李白杜甫亦一字不登盖明詩摹擬之弊極于太倉厯城纎佻之弊極于公安竟陵物窮則變故國初多以宋詩為宗宋詩又弊士禎乃持嚴羽餘論倡神韻之説以救之故其推為極軌者惟王孟韋栁諸家然詩三百篇尼山所定其論詩一則謂歸於温柔敦厚一則謂可以興觀羣怨原非以品題泉石摹繪烟霞洎乎畸士逸人各標幽賞乃别為山水清音實詩之一體不足以盡詩之全也宋人惟不解温柔敦厚之義故意言並盡流而為鈍根士禎又不究興觀羣怨之原故光景流連變而為虛響各明一義遂各倚一偏論甘忌辛是丹非素其斯之謂歟兹逢我皇上聖學髙深精研六義以孔門刪定之㫖品評作者定此六家乃共識風雅之正軌臣等循環雒誦實深為詩教幸不但為六家幸也乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
