body:
  text: 眉山蘇軾卷之三十二辛丑十一月十九日既與子由别於鄭州西門之外馬上賦詩一篇寄之過宜賓見夷中亂山夜泊牛口夜行觀星八陣磧入峽出峽神女廟巫山荆州十首錄三首太白山下早行至横渠鎮書崇壽院壁留題延生觀後山小堂石鼻城病中大雪數日未嘗起觀虢令趙薦以詩相屬戲用其韻答之嵗晚相與饋問為饋嵗酒食相邀呼為别嵗至除夜達旦不眠為守嵗蜀之風俗如是余官於岐下嵗暮思歸而不可得故為此三詩寄子由饋嵗别嵗守嵗和子由論書鳳翔八觀錄五首石鼓歌王維吳道子畫東湖真興寺閣李氏園七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿於僧舍曾閣閣故曾氏所建也夜久不寐見壁有前縣令趙薦留名有懷其人二十七日自陽平至斜谷宿於南山中蟠龍寺是日至下馬磧憩於北山僧舍有閣曰懷賢南直斜谷西臨五丈原諸葛孔明所從出師也和子由記園中草木十一首錄五首司竹監燒葦園因召都巡檢柴貽朂左藏以其徒㑹獵園下秀州僧本瑩静照堂送安惇秀才失解西歸送劉道原歸覲南康次韻張安道讀杜詩傅堯俞濟源草堂潁州初别子由二首歐陽少師令賦所蓄石屏卷之三十三十月二日將至渦口五里所遇風留宿出潁口初見淮山是日至壽州壽陽岸下泗州僧伽塔龜山十月十六日記所見遊金山寺自金山放船至焦山甘露寺臘日游孤山訪惠勤惠思二僧戲子由越州張中舍壽樂堂雨中遊天竺靈感觀音院六月二十七日望湖樓醉書五首錄三首七月一日出城舟中苦熱宿臨安淨土寺自淨土步至功臣寺游徑山夜泛西湖五絶監試呈諸試官望海樓晚景五絶錄二首試院煎茶孫莘老求墨妙亭詩催試官考較戲作秋懷二首梵天寺見僧守詮小詩清逺可愛次韻次韻孔文仲推官見贈湯村開運鹽河雨中督役是日宿水陸寺寄北山清順僧二首錄一首朱壽昌郎中少不知母所在刺血寫經求之五十年去嵗得之蜀中以詩賀之和致仕張郎中春晝畫魚歌遊道塲山何山贈孫莘老七絶錄三首王復秀才所居雙檜二首錄一首法惠寺横翠閣風水洞二首和節推錄一首自普照遊二菴新城道中二首錄一首於潛女僧清順新作垂雲亭㑹客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服卷之三十四韓子華石淙莊立秋日禱雨宿靈隱寺同周徐二令病中遊祖塔院栢堂與述古自有美堂乘月夜歸有美堂暴雨登玲瓏山宿九仙山宿海㑹寺徑山道中次韻荅周長官兼贈蘇寺丞初自徑山歸述古招飲介亭以病先起九日尋臻闍黎遂泛小舟至勤師院二首錄一首九日舟中望見有美堂上魯少卿飲以詩戲之二首錄一首次韻周長官壽星院同餞魯少卿寶山新開徑和錢安道寄恵建茶夜至永樂文長老院文時卧病退院除夜野宿常州城外二首古纒頭曲惠山謁錢道人烹小龍團登絶頂望太湖虎丘寺常潤道中有懷錢塘寄述古五首錄一首金山寺與栁子玉飲大醉卧寶覺禪榻夜分方醒書其壁大風留金山兩日遊鶴林招隠二首無錫道中賦水車過永樂文長老已卒聽僧昭素琴僧惠勤初罷僧職遊靈隠髙峰塔新城陳氏園次鼂補之韻與毛令方尉游西菩提寺二首聽賢師琴除夜病中贈段屯田喬太守見和復次韻答之二公再和亦再答之雪後書北臺壁二首次韻章傳道喜雨惜花送春和子由西齋寄劉孝叔懷西湖寄鼂美叔同年祭常山囘小獵和文與可洋川園池三十首録七首湖橋横湖蓼嶼待月臺過谿亭篔簹谷寒蘆港寄題刁景純藏春塢寄黎眉州次韻周邠寄雁蕩山圖二首和鼂同年九日見寄送喬施州董儲郎中嘗知眉州與先人遊過安丘訪其故居見其子希甫留詩屋壁卷之三十五除夜大雪留濰州元日早晴遂行中途雪復作送范景仁游洛中次韻景仁留别書韓幹牧馬圖送魯元翰少卿知衛州和李邦直沂山祈雨有應東欄梨花次韻答邦直子由四首録二首司馬君實獨樂園子由將赴南都與余㑹宿於逍遙堂作兩絶句讀之殆不可為懷因和其詩以自解余觀子由自少曠達天資近道又得至人養生長年之訣而余亦竊聞其一二以為今者宦游相别之日淺而異時退休相從之日長既以自解且以慰子由云過雲龍山人張天驥初别子由河復黄河韓幹馬十四匹贈寫御容妙善師哭刁景純答吕梁仲屯田張寺丞益齋送李公恕赴闕䖍州八境圖八首録六首讀孟郊詩二首與梁左藏㑹飲傅國博家續麗人行起伏龍行次韻答劉涇聞辯才法師復歸上天竺以詩戲問僕曩於長安陳漢卿家見吳道子畫佛碎爛可惜其後十餘年復見之於鮮于子駿家則已装背完好子駿以見遺作詩謝之雨中過舒教授次韻答舒教授觀余所藏墨答仲屯田次韻芙蓉城和鮮于子駿鄆州新堂月夜二首中秋月三首中秋見月寄子由與頓起孫勉泛舟探韻得未字卷之三十六九日黄樓作次韻王鞏獨眠次韻僧潛見贈百步洪送參寥師夜過舒堯文戲作祈雪霧豬泉出城馬上作贈舒堯文臺頭寺步月得人字種松得徠字以雙刀遺子由子由有詩次其韻月夜與客飲杏花下答郡中同僚賀雨罷徐州往南京馬上走筆寄子由五首録二首舟中夜起遊惠山贈惠山僧惠表與秦太虛參寥㑹於松江而關彦長徐安中適至分韻得風字二首録一首端午遍遊諸寺得禪字和孫同年卞山龍洞禱晴與客遊道場何山得鳥字泛舟城南㑹者五人分韻賦詩得人皆苦炎字四首次韻李公擇梅花與王郎昆仲及兒子邁遶城觀荷花登峴山亭晚入飛英寺分韻得月明星稀四首與胡祠部游法華山趙閱道髙齋予以事繫御史臺獄獄吏稍見侵自度不能堪死獄中不得一别子由故作二詩授獄卒梁成以遺子由十二月二十八日䝉恩責授檢校水部員外郎黄州團練副使復用前韻過淮梅花二首少年時嘗過一村院見壁上有詩云夜涼疑有雨院静似無僧不知何人詩也宿黄州禪智寺寺僧皆不在夜半雨作偶記此詩故作一絶初到黄州定惠院寓居月夜偶出次韻前篇安國寺尋春寓居定惠院之東雜花滿山有海棠一株土人不知貴也雨中看牡丹三首武昌銅劔歌曉至巴口迎子由與子由同游寒谿西山次韻子由病酒肺疾發正月廿日往岐亭郡人潘古郭三人送余於女王城東禪莊院巻之三十七東坡八首姪安節逺來夜坐三首岐亭道上見梅花戲贈季常太守徐君猷通守孟亨之皆不飲酒以詩戲之次韻和王鞏六首録一首江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字是日同至女王城作詩乃和前韻紅梅三首録一首陳季常見過三首録二首寒食雨二首魚蠻子弔李臺卿曹既見和復次其韻次韻孔毅父集古人句見贈五首録三首六年正月二十日復出東門仍用前韻南堂五首録一首次韻孔毅父久旱已而甚雨三首初秋寄子由和蔡景繁海州石室小飲公瑾舟中過江夜行武昌山上聞黄州鼓角自興國往筠宿石田驛南廿五里野人舍圓通禪院先君舊遊也四月二十日晚至宿焉明日忌日也乃手寫寶積獻蓋頌佛一偈以贈長老僊公僊撫掌笑曰昨夜夢寶葢飛下著處輒出火豈此祥乎乃作是詩院有蜀僧宣逮事訥長老識先君云題西林壁廬山二勝開先潄玉亭栖賢三峽橋岐亭五首録三首郭祥正家醉畫竹石壁上郭作詩為謝且遺二古銅劍龍尾硯歌次韻杭人裴維甫同王勝之游蔣山送沈逵赴廣南豆粥秦少游夢發殯而塟之者云是劉發之柩是嵗發首薦秦以詩賀之劉涇亦作因次其韻徐大正閒軒髙郵陳直躬處士畫雁二首次韻王定國南遷回見寄卷之三十八泗州南山監倉蕭淵東軒二首寄蘄簟與蒲傳正贈眼醫王生彦若觀杭州鈐轄歐育刀劍戰袍王伯敭所藏趙昌花四首梅花黄葵芙蓉山茶書林逋詩後溪隂堂送穆越州金山妙髙臺贈杜介送楊傑次韻送徐大正楊康功有石狀如醉道士為賦此詩海市過萊州雪後望三山次韻胡完夫送范純粹守慶州惠崇春江晚景二首録一首次韻完夫再贈之什某已卜居毗陵與完夫有廬里之約云次韻朱光庭初夏送賈訥倅眉二首錄一首題文與可墨竹武昌西山趙令晏崔白大圖幅徑三丈次韻劉貢父西省種竹軾以去嵗春夏侍立邇英而秋冬之交子由相繼入侍次韻絶句四首各述所懷録二首郭熈畫秋山平逺次韻張昌言喜雨書晁補之所藏與可畫竹三首録二首書李世南所畫秋景二首録一首書鄢陵王主簿所畫折枝二首故李誠之待制六丈輓詞九月十五日邇英講論語終篇賜執政講讀史官燕於東宫又遣中使就賜御書詩各一首臣軾得紫嶶花絶句其詞云絲綸閣下文書静鐘鼓樓中刻漏長獨坐黄昏誰是伴紫薇花對紫薇郎翌日各以表謝又進詩一篇臣軾詩云獲鬼章二十韻和王晉卿次韻劉貢父叔姪扈駕和子由除夜元日省宿致齋三首次韻黄魯直畫馬試院中作余與李廌方叔相知久矣領貢舉事而李不得第愧甚作詩送之慶源宣義王丈以累舉得官為洪雅主簿雅州戸掾遇吏民如家人人安樂之既謝事居眉之青神瑞草橋放懷自得有書來求紅帶既以遺之且作詩為戲請黄魯直秦少游各為賦一首為老人光華送錢穆父出守越州二首卧病逾月請郡不許復直玉堂十一月一日鎻院是日苦寒詔賜官燭法酒書呈同院木山送千乘千能兩姪還鄉卷之三十九次韻王定國得晉卿酒相留夜飲書王定國所藏煙江疊嶂圖王晉卿所藏著色山二首録一首王晉卿作煙江疊嶂圖僕賦詩十四韻晉卿和之語特竒麗因復次韻不獨紀其詩畫之美亦為道其出處契濶之故而終之以不忘在莒之戒亦朋友忠愛之義也夜直玉堂攜李之儀端叔詩百餘首讀至夜半書其後次韻秦少章和錢䝉仲去杭州十五年復游西湖用歐陽察判韻送子由使契丹文登蓬萊閣下石壁千丈為海浪所戰時有碎裂淘灑嵗久皆圓熟可愛土人謂此彈子渦也取數枚以養石菖蒲且作詩遺垂慈堂老人參寥上人初得智果院㑹者十六人分韻賦詩得心字故周茂叔先生濂谿次韻子由使契丹至涿州見寄四首録二首次韻劉景文周次元寒食同游西湖次韻林子中王彦祖唱酬壽星院寒碧軒題楊公春蘭次韻曹輔寄壑源試焙新芽次韻劉景文登介亭袁公濟和復次韻答之安州老人食蜜歌次韻蘇伯固主簿重九次韻楊公濟梅花十首録二首贈劉景文再和楊公濟梅花十絶録二首予去杭十六年而復來留二年而去平生自覺出處老少麤似樂天雖才名相逺而安分寡求亦庶幾焉三月六日來别南北山諸道人而下天竺惠浄師以醜石贈行作三絶句贈武道士彈賀若元祐六年六月自杭州召還汶公館我於東堂閲舊詩卷次諸公韻三首西湖秋涸東池魚窘甚因㑹客呼網師遷之西池為一笑之樂夜歸被酒不能寐戲作放魚一首復次放魚韻答趙承議陳教授九月十五日觀月聽琴西湖示坐客泛潁韓退之孟郊墓銘云以昌其詩舉此問王定國當昌其身耶昌其詩也來詩下語未契作此答之聚星堂雪次前韻送劉景文次韻趙景貺春思且懷吳越山水小飲西湖懷歐陽叔弼兄弟贈趙景貺陳履常送路都曹送運判朱朝奉入蜀淮上早發在潁州與德麟同治西湖未成改揚州三月十六日湖成德麟有詩見懷次其韻雙石次韻蘇伯固遊蜀岡送李孝博奉使嶺表行宿泗間見徐州張天驥次舊韻近以月石硯屏獻子功中書公復以涵星研獻純父侍講子功有詩純父未也復以月石風林屏贈之謹和子功詩并求純父數句次韻范純父涵星硯月石風林屏詩卷之四十次韻穆父尚書侍祠郊丘瞻望天光退而相慶引滿醉吟郊祀慶成詩僕所藏仇池石希代之寶也王晉卿以小詩借觀意在於奪不敢不借然以此詩先之王晉卿示詩欲奪海石錢穆父王仲至蔣穎叔皆次韻穆至二公以為不可許獨穎叔不然今日穎叔見訪親覩此石之妙遂悔前語僕以謂晉卿豈可終閉不予者若能以韓幹二散馬易之者盖可許也復次前韻欲以石易畫晉卿難之穆父欲兼取二物穎叔欲焚畫碎石乃復次前韻并解二詩之意生日劉景文以古畫松鶴為壽且貺佳篇次韻為謝程德孺惠海中栢石兼辱佳篇輙復和謝送蔣穎叔帥熈河次韻吳傳正枯木歌送范中濟經畧侍郎分韻賦詩得先字且贈以魚枕杯四馬箠一以元戎十乘以先啟行為韻書晁說之考牧圖後七年九月自廣陵召還復館於浴室東堂八年六月乞㑹稽將去汶公乞詩乃復用前韻三首東府雨中别子由書丹元子所示李太白真次韻滕大夫雪浪石鶴歎子由生日以檀香觀音像及新合印香銀篆槃為壽一首過髙郵寄孫君孚慈湖夾阻風五首録四首過廬山下壺中九華詩秧馬歌八月七日初入贛過惶恐灘鬱孤臺廉泉塵外亭天竺寺月華寺碧落洞峽山寺舟行至清逺縣見顧秀才極談惠州風物之美廣州蒲澗寺浴日亭游羅浮山一首示兒子過十月二日初到惠州白水山佛跡巖十一月二十六日松風亭下梅花盛開新釀桂酒江郊正月二十四日與兒子過賴仙芝王原秀才僧曇潁行全道士何宗一同遊羅浮道院及栖禪精舍過作詩和其韻寄邁迨一首贈王子直秀才遊博羅香積寺連雨漲江二首四月十一日初食茘支六月十二日酒醒步月理髪而寢茘支歎卷之四十一同正輔表兄遊白水山與正輔遊香積寺次韻正輔同遊白水山章質夫送酒六壺書至而酒不達戲作小詩問之雨後行菜殘臘獨出二首録一首新年五首録一首次韻髙要令劉湜峽山寺見寄惠州近城數小山類蜀道春與進士許毅野步㑹意處飲之且醉作詩以記適參寥專使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也食茘支二首録一首遷居兩橋詩東新橋西新橋白鶴峰新居欲成夜過西鄰翟秀才二首縱筆種茶白鶴山新居鑿井四十尺遇盤石石盡乃得泉三月二十九日二首吾謫海南子由雷州被命即行了不相知至梧迺聞尚在藤也旦夕當追及作此詩示之行瓊儋間肩輿坐睡夢中得句云千山動鱗甲萬谷酣笙鐘覺而遇清風急雨戲作此數句次前韻寄子由遷居之夕聞鄰舍兒誦書欣然而作觀棊糴米擷菜次韻子由月季花再生次韻子由浴罷十二月十七日夜坐達曉寄子由子由生日以黄子木拄杖為子由生日之壽儋耳新居倦夜縱筆三首録一首貧家浄掃地庚辰嵗人日作時聞黄河已復北流老臣舊數論此今斯言乃騐二首録一首庚辰嵗正月十二日天門冬酒熟予自漉之且漉且嘗遂以大醉二首録一首汲江煎茶予來儋耳得吠狗曰烏觜甚猛而馴隨予遷合浦過澄邁泅而濟路人皆驚戲為作此詩澄邁驛通潮閣二首六月二十日夜渡海次韻王鬱林藤州江下夜起對月贈邵道士廣倅蕭大夫借前韻見贈復和答之二首録一首次韻韶倅李通直二首録一首李伯時畫其弟亮功舊隱宅圖贈嶺上老人予昔過嶺而南題詩龍泉鐘上今復過而北次前韻過嶺二首留題顯聖寺歇白塔舖鬱孤臺次韻江晦叔二首録一首寒日與器之遊南塔寺寂照堂贈詩僧道通予昔作壺中九華詩其後八年復過湖口則石已為好事者取去乃和前韻以自解云次韻郭公甫二首録一首宋復古畫瀟湘晚景圖三首嘲子由第五橋軒牕魚山陰陸游卷之四十二寄酬曾學士學宛陵先生體比得書云所寓廣教僧舍有陸子泉每對之輒奉懷送曾學士赴行在新夏感事留題雲門草堂度浮橋至南臺還縣航海東陽道中送七兄赴揚州帥幕以石芥送劉韶美禮部劉比釀酒勁甚因以為戲寄張真父舍人病中簡仲彌性唐克明蘇訓直晚泊慈姥磯下夜宿陽山磯將曉大雨北風甚勁俄頃行三百餘里遂抵雁翅浦送全州趙都曹病中作醉中歌上已臨川道中隨意遊山西村雨霽出遊書事上虞逆旅見舊題嵗月感懷題十八學士圖夜聞松聲有感十二月一日宿楓橋雨中泊趙屯有感秋風重陽沙頭移船將離江陵滄灘松滋小酌晚泊松滋渡口繫舟下牢溪遊三游洞二十八韻秋風亭拜冦萊公遺像聞猿瞿唐行蹋磧鄉中每以寒食立夏之間省墳客䕫適逢此時悽然感懷風雨中望峽口諸山竒甚戲作短歌晚晴聞角有感畏虎鄰水延福寺早行大安病酒留半日王守復來招不往送酒解酲因小飲江月館曉發金牛山南行和髙子長參議道中次韻張季長題龍洞太息閬中作遊錦屏山謁少陵祠堂歸次漢中境上南沮水道中長木夜行抵金堆市赴成都泛舟自三泉至益昌謀以明年下三峽雪晴行益昌道中頗有春意劔門道中遇微雨劔門城北回望劔關諸峯青入雲漢感蜀亡事慨然有賦綿州魏城縣驛有羅江東詩云芳草有情皆礙馬好雲無處不遮樓戲用其韻東津東山綿州録參㕔觀姜楚公畫鷹少陵為作詩者西郊尋梅海棠驛舍見故屏風畫海棠有感登茘枝樓凌雲醉歸作醉中感懷玻瓈江送客至江上九月十六日夜夢駐軍河外遣使招降諸城覺而有作成都行初寒木山十月一日浮橋成以故事宴客凌雲觀大散關圖有感卷之四十三十月十九日與客飲忽記去年此時自錦屏歸山南道中小獵今又將去此矣長門怨斷碑歎蜀酒歌醉後草書歌詩戲作十二月初一日得梅一枝絶竒戲作長句今年於是四賦此花矣十二月十一日視築隄遊修覺寺塞上曲苦筍月下作過大蓬嶺度繩橋至杜秀才山莊東湖新竹夏日湖上同何元立賞荷花追懷鏡湖舊遊怡齋龍湫歌蒸暑思梁州述懷古意寓驛舍題宇文子友所藏薛公鶴晨至湖上聽琴龍眠畫馬山中得長句戲呈周輔并簡朱縣丞長歌行遊三井觀臨别成都帳飲萬里橋贈譚德稱丈人觀儲福觀離堆伏龍祠觀孫太古畫英惠王像登灌口廟東大樓觀㟭江雪山平羌道中望峩眉山慨然有作次韻何元立都曹贈行初到榮州醉中懷眉山舊遊齋中夜坐有感晚登横溪閣髙齋小飲戲作太液黄鵠歌夜聞浣花江聲甚壯謁諸葛丞相廟醉中長歌春感花時遍遊諸家園題明皇幸蜀圖春殘對酒遊圓覺乾明祥符三院至暮食薺幽居晚興書歎月下醉題銅壺閣望月夜宴即席作芳華樓夜宴嵗晚數日寒頓減頗有春意感懷賦短歌梅花萬里橋江上習射出塞曲偶過浣花感舊遊戲作樓上醉書初春出遊張園海棠登劔南西川門感懷眉州作江樓訪楊先輩不遇因至石室感秋白鶴館夜坐南津勝因院亭子書寓舍壁卷之四十四西巖翠屏閣雨中山行至松風亭忽澄霽贈宋道人獵罷夜飲示獨孤生秋晚登城北門暮秋數日暄妍頗有春意予閒居無日不出遊戲作江樓醉中作曳策謁漢昭烈惠陵及諸葛公祠宇大雪歌訪客至西郊夜寒故蜀别苑在成都西南十五六里梅至多有兩大樹夭矯若龍相傳謂之梅龍予初至蜀嘗為作詩自此嵗嘗訪之今復賦一首丁酉十一月也閒意書雨暮冬夜宴謁石犀廟江上散步尋梅偶得絶句大醉梅花下走筆賦此廣都江上作道室夜意城南王氏莊尋梅遊諸葛武侯書臺眉州披風榭拜東坡先生遺像南定樓遇急雨舟中對月涪州道中北巖忠州禹廟龍興寺弔少陵先生寓居遊萬州岑公洞萬州放船過下巖小留楚城舟出下牢關峽口夜坐初到荆州阻風小雨極涼舟中熟睡至夕岳陽樓黄鶴樓自雪堂登四望亭因歴訪蘇公遺跡至安國院舟行蘄黄間雨霽得便風有感長風沙登賞心亭將至京口泝谿冬夜聞雁有感月夕自雲門之陶山肩輿者失道行亂山中有茅舍小塘極幽邃求見主人不可意其隱者也園中雜書池亭夜賦雙清堂夜賦橋南納涼初秋夢故山覺而有作别建安紫谿驛月巖聞雁春雨南牕睡起感舊絶句夏日晝寢夢遊一院闃然無人簾影滿堂惟燕蹋箏弦有聲覺而聞鐵鐸風響璆然殆所夢也耶因得絶句書懷絶句雨後極涼料簡篋中舊書有感秋夜雨夜豐城髙安之間憩民家景趣幽邃為之慨然懷歸寄奉新髙令予欲自嚴買船下七里灘謁嚴光祠而歸㑹灘淺陸行至桐廬始能泛江因得絶句辛丑正月三日雪雪霽歸湖上過千秋觀少留題山家壁憶昔秋夜九月三日泛舟湖中作新寒湖村月夕横塘蔬圃五雲門晚歸夜汲井水煑茶寄朱元晦提舉乍晴風日已和泛舟至扶桑埭徘徊西村久之携癭尊醉梅花下城西接待院後竹下作幽居春夜晨起春遊八月十四日夜湖山觀月夜聞秋風感懷草書歌夜泊水村自妙相歸將至杜浦堰舟中作卷之四十五秋興三江舟中大醉作樊江晚泊秋夕秋雨排悶十韻寄題朱元晦武彛精舍長安道村舍幽居感懷遲暮自若耶溪舟行杭鏡湖而歸骨相感憤晚出偏門過杜浦橋莊噐之作招隠閣項平父諸人賦詩予亦繼作溪上醉吟雨中泊舟蕭山縣驛初夏遊凌氏小園題少陵畫像初冬雜題小雨題徐淵子環碧亭亭有茶山曽先生詩臨安春雨初霽飲張功父園戲題扇上小舟過御園春遊絶句雨後夜汲新霽城南舟中夜興丙午五月大雨五日不止鏡湖渺然想見湖未廢時有感而賦早自烏龍廟歸齋中閒咏秋雨北榭作焉耆行園中絶句晨過天慶出城夜登千峰榭秋興余年二十時嘗作菊枕詩頗傳於人今秋偶復采菊縫枕囊悽然有感東吳女兒曲有為予言烏龍髙嶮不可到處有僧巖居不知其年予每登千峯榭望之慨然為作詩楚宫行妾命薄四鼓酒醒起步庭下秋霽採藥塞上曲送潘德久使薊門夜歸塼街巷書事送張野夫寺丞牧滁州夜歸偶懷故人獨孤景畧月下小酌鄰曲有未飯被追入郭者憫然有作題湖邊旗亭寓懷題千秋觀懷賀亭樊江練塘歸次樊江泛湖至東涇村居初夏東關七月一日夜坐舍北水涯戲作以事至城南書觸目梅花絶句題瑩上人二畫剡谿吳江山家暮春自詠蓬萊館午憩夢遊散關渭水之間秋夜荷花秋興新晴舍北望水鄉風物戲作絶句禹跡寺南有沈氏小園四十年前嘗題小闋壁間偶復一到而園已易主刻小闋於石讀之悵然小園夜讀范致能攬轡録言中原父老見使者多揮涕感其事作絶句醉卧松下短歌探梅題四仙像冬晴閒步東村由故塘還舍作夜聞湖中漁歌村夜野意憶昔感懷卷之四十六東村散步有懷張漢州將軍行古别離望夫石古别離偶懷小益南鄭之間悵然有賦欲出遇雨看鏡夜分不寐起坐園中至旦步至湖上寓小舟還舍箜篌謠寄季長少卿悶極有作三峽歌贈道流艾如張郊行夜歸書觸目嵗暮感懷山園雜咏雨夜書感春晚雜興夜歸三月十一日郊行路傍曲秋夜舍兆晚眺初冬感懷聞雁枕上偶成舍北閒望作六字絶句雨夜有懷張季長少卿客言來自上皋道中以其語作一絶殘臘懷舊幽居初夏晨起六月二十四日夜分夢范致能李知幾尤延之同集江亭諸公請予賦詩記江湖之樂詩成而覺忘數字而已題韓運鹽竹隠堂絶句舟中咏落景餘清暉輕橈弄溪渚之句蓋孟浩然耶溪泛舟詩也因以其句為韻賦詩秋夜紀懷舍北搖落景物殊佳偶作夜坐隴頭水書志書憤小舟遊西涇度西岡而歸春行閒身舍北行飯書觸目雪夜感舊雜感蘭感舊露坐新秋秋夕露坐作感秋新涼豐嵗小舟過吉澤效王右丞秋晴見天際飛鴻有感戊午重九舟中冬日感興十韻菴中晨起書觸目春日小園雜賦沈園讀晉書春晴自雲門歸三山夜聞姑惡讀前輩詩文有感讀隠逸傳秋隂秋懷秋思冬晴與子坦子聿遊湖上齋中弄筆偶書示子聿夢中作遊山絶句北望感懷人日東園枕上作長干行小橋觀畫山水示友十月梅花對酒戲詠先少師宣和初有贈晁公以道詩云奴愛才如蕭穎士婢知詩似鄭康成晁公大愛賞今逸全篇偶讀晁公文集泣而足之追感往事巻之四十七春遊三月二十日兒輩出謁孤坐北牕西村湖塘晚眺秋夜漁父梅市郭西栁橋晚眺秋社村舍秋日雜詠小立秋晚湖上雨後至近村題嚴州王秀才山水枕屏追憶征西幙中舊事解嘲讀史遣興送子龍赴吉州掾正月五日出遊初春雜興杜叔髙秀才雨雪中相過留一宿而别誦此詩送之村居書喜别嚴和之舟中作夏初湖村雜題書直舍壁謝韓實之直閣送燈直舍獨坐思成都出東城並江而歸立春後十二日命駕至郊外戲書觸目河橋晚歸後寓歎與兒輩泛舟遊西湖一日間晴隂屢易秋思小逕登東山繚行自西北至溪上感憤野興幽居春晚閔雨書事明日復理夢中意作舍南野歩出逰山行感昔風雲晝晦夜遂大雪夢華山道室倚樓石帆夏日乙丑夏冬之交小舟早夜徃來湖中戲成絶句懷舊春雨梨花雜惑出遊歸鞍上口占初夏閒居地僻耒陽令曾君寄禾譜農器譜二書求詩夏末野興訪山家寄隱士春前六日作贛士曾興宗字光祖以其居篔簹谷圖來求詩夏日雜題西村晚歸雨晴秋夜累日濃雲作雪不成遂有春意野望春晴恩封渭南伯唐詩人趙嘏為渭南尉當時謂之趙渭南後來將以予為陸渭南乎戲作長句山行初夏書感對酒作頃嵗從戎南鄭屢往來興鳳間暇日追懷舊遊有賦異夢夜坐小飲雜感十首之二仲秋書事秋日徙倚門外久之聞新雁有感小園獨酌古意湖上尋梅湖山雪晴欲出而路濘未通戲作春日雜興
