front:
  text: 欽定四庫全書御選唐宋詩醇巻十一
  hash: sha256:49d8297cd1fc40bd1876d53bce3387e4822c249e01b3e2bf9b2d60a66895ac22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_024-1a, image: WYG1448/WYG1448-0248a.png}
body:
  text: 襄陽杜甫詩三目錄乾元中寓居同谷縣作歌七首水㑹渡飛仙閣龍門閣石櫃閣桔柏渡劔門成都府石犀行題壁畫馬歌戱題畫山水圖歌題李尊師松樹障子歌戯為雙松圖歌病柏病橘枯㯶枯柟戯作花卿歌柟樹為風雨所㧞嘆茅屋為秋風所破歌天邊行苦戰行述古觀打魚歌越王樓歌冬到金華山觀因得故拾遺陳公學堂遺跡通泉驛南去通泉縣十五里作過郭代公故宅短歌行桃竹杖引韋諷録事宅觀曹將軍畫馬圖丹青引發閬中寄韓諌議憶昔冬狩行別唐十五誡因寄禮部賈侍郎閬山歌閬水歌草堂太子張舍人遺織成褥段杜鵑客至水閣朝霽奉簡嚴雲安蠶榖行古柏行縛鷄行牽牛織女殿中楊監見示張旭草書圖課伐木槐葉冷淘行官張望補稻畦水歸上後園山脚驅竪子摘蒼耳秋行官張望督促東渚耗稻向畢清晨遣女奴阿稽竪子阿段往問
  hash: sha256:e922f5b2d9efcea5ac3c1cacef5c42e03d3b830b66146abc5e275bb2d7f1cb10
