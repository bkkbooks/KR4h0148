  text: 欽定四庫全書御選唐宋詩醇巻二十五
  hash: sha256:ccc5cd2872b717ff8ee658089a28926648fec7da71dd1a2f9e2433a5692360b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_052-1a, image: WYG1448/WYG1448-0494a.png}
body:
  text: 太原白居易詩七目録秋池二首中隠葺池上舊亭翫止水聞崔十八宿予新昌敝宅時予亦宿崔家依仁新亭一宵偶同兩興暗合因而成詠聊以寫懐池上夜境逰坊口懸泉偶題石上詠興五首錄三首出府歸吾廬池上有小舟四月池水滿秋凉閒卧代鶴立秋夕有懐夢得秋日與張賔客舒著作同遊龍門醉中狂歌凡二百三十八字南池早春有懐北窗三友裴侍中晉公以集賢林亭即事詩二十六韻見贈猥䝉徵和才拙詞繁輒廣為五百言以伸酬獻晚歸香山寺因詠所懐洛陽有愚叟閒居自題菩提寺上方晚望香山寺寄舒員外小臺池上作小閣閒坐遊平泉宴浥澗宿香山石樓贈座客和夢得洛中早春見贈七韻李盧一中丞各創山居俱誇勝絶然去城稍逺来往頗勞敝居新泉實在宇下偶題十五韻聊戱二君夢上山錢塘湖春行西湖晚歸囘望孤山寺贈諸客杭州春望湖亭晚歸孤山寺遇雨餘杭形勝江樓夕望招客江樓晚眺景物鮮竒吟翫成篇寄水部張籍員外晚興春題湖上别州民西湖留别答微之誇越州州宅酬微之微之整集舊詩及文筆為百軸以七言長句寄樂天樂天次韻酬之餘思未盡加為六韻答㣲之見寄得湖州崔十八使君書喜與杭越隣郡因成長句代賀兼寄微之贈侯三郎中履道新居二十韻夢行簡渡淮自到郡齋僅經旬日方專公務未及宴逰偷閒走筆題二十四韻兼寄常州賈舍人湖州崔郎中仍呈吳中諸客故衫泛太湖書事寄微之病中多雨逢寒食重答劉和州城上夜宴六月三日夜聞蟬晚起河亭晴望夢蘇州水閣寄馮侍御太湖石秘省後㕔寄殷協律臨都驛答夢得六言二首春詞送敏中歸豳寧幕池窗送鶴與裴相臨别贈詩烏夜啼送東都留守令狐尚書赴任想東遊五十韻將至東都先寄令狐留守晚桃花阿崔
