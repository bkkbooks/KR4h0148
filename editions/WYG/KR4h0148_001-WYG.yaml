贈蕭殷二協律秋江晚泊代書詩一百韻寄微之和談校書秋夜感懷呈朝中親友感秋寄逺春題華陽觀縣西郊秋寄贈馬造早春獨遊曲江江南送北客因慿寄徐州兄弟書巻之二十三賦得古原草送别旅次景空寺宿幽上人院同李十一醉憶元九同錢員外禁中夜直禁中夜作書與元九八月十五日夜禁中獨直對月憶元九八月十五日夜聞崔大員外翰林獨直對酒翫月因懷禁中清景偶題是詩村夜聞蟲王昭君題盧秘書夏日新栽竹二十韻欲與元八卜隣先有是贈題王侍御池亭贈楊秘書巨源鷰子樓三首襄陽舟夜江夜舟行浦中夜泊舟中讀元九詩嵗晚旅望望江州東南行一百韻寄通州元九侍御澧州李十一舍人果州崔二十二使君開州韋大員外庾三十二補闕杜十四拾遺李二十助教員外竇七校書初到江州寄翰林張李杜三學士庾樓曉望春末夏初閒遊江郭二首題元八溪居江樓早秋送客之湖南百花亭晚望夜歸西樓庾樓新嵗上香鑪峯早發楚城驛建昌江香鑪峯下新卜山居草堂初成偶題東壁重題編集拙詩成一十五卷因題卷末戲贈元九李二十湖上閒望江樓夜吟元九律詩成三十韻送客春遊嶺南二十韻得行簡書聞欲下峽先以此寄南湖早春題韋家泉池㸃額魚夜送孟司功湖亭與行簡宿贈江客潯陽秋懷贈許明府題遺愛寺前溪松聞楊十二新拜省郎遙以詩賀送韋侍御量移金州司馬江西裴常侍以優禮見待又䝉贈詩輒敘鄙誠用伸感謝别草堂行次夏口先寄李大夫重贈李大夫卷之二十四江州赴忠州至江陵以來舟中示舍弟五十韻題岳陽樓入峽次巴東郡齋暇日憶廬山草堂兼寄二林僧社三十韻皆敘貶官以來出處之意隂雨送蕭處士遊黔南竹枝詞四首巴水别種東坡花樹兩絶别橋上竹太平樂詞二首閨怨詞三首錄二首長洲苑憶江栁初除主客郎中知制誥與王十一李七元九三舍人中書同宿話舊感懷見于給事暇日上直寄南省諸郎官詩因以戲贈西省北院新構小亭種竹開牕東通騎省與李常侍隔窗小飲因題四韻送客南遷舊房新昌新居書事四十韻因寄元郎中張博士勤政樓西老栁偶題閣下㕔喜張十八博士除水部員外郎晚庭逐凉棃園弟子暮江吟聽彈湘妃怨逢張十八員外籍重到江州感舊遊題郡樓十一韻題别遺愛草堂兼呈李十使君舟中晚起晚興夜歸臘後嵗前遇景詠意郡齋暇日辱常州陳郎中使君早春晚坐水西館書事詩十六韻見寄亦以十六韻酬之題小橋前新竹招客病中逢秋招客夜酌洛下卜居郡中西園九日宴集醉題郡樓兼呈周殷二判官霓裳羽衣歌小童薛陽陶吹􅓋篥歌雙石和㣲之四月一日作喜雨六年春贈分司東都諸公和微之詩二十三首錄三首和三月三十日四十韻和酬鄭侍御東陽春悶放懷追越遊見寄和順之琴者卷之二十五秋池二首中隱葺池上舊亭翫止水聞崔十八宿予新昌敝宅時予亦宿崔家依仁新亭一宵偶同兩興暗合因而成詠聊以寫懷池上夜境遊坊口懸泉偶題石上詠興五首録三首出府歸吾廬池上有小舟四月池水滿秋涼閒卧代鶴立秋夕有懷夢得秋日與張賓客舒著作同遊龍門醉中狂歌凡二百三十八字南池早春有懷北牕三友裴侍中晉公以集賢林亭即事詩二十六韻見贈猥䝉徵和才拙詞繁輒廣為五百言以伸酬獻晚歸香山寺因詠所懷洛陽有愚叟閒居自題菩提寺上方晚望香山寺寄舒員外小臺池上作小閣閒坐逰平泉宴浥澗宿香山石樓贈座客和夢得洛中早春見贈七韻李盧二中丞各創山居俱誇勝絶然去城稍逺來往頗勞敝居新泉實在宇下偶題十五韻聊戲二君夢上山錢塘湖春行西湖晚歸囘望孤山寺贈諸客杭州春望湖亭晚歸孤山寺遇雨餘杭形勝江樓夕望招客江樓晚眺景物鮮竒吟翫成篇寄水部張籍員外晚興春題湖上别州民西湖留别答微之誇越州州宅酬微之微之整集舊詩及文筆為百軸以七言長句寄樂天樂天次韻酬之餘思未盡加為六韻答微之見寄得湖州崔十八使君書喜與杭越隣郡因成長句代賀兼寄微之贈侯三郎中履道新居二十韻夢行簡渡淮自到郡齋僅經旬日方專公務未及宴遊偷閒走筆題二十四韻兼寄常州賈舍人湖州崔郎中仍呈吳中諸客故衫泛太湖書事寄微之病中多雨逢寒食重答劉和州城上夜宴六月三日夜聞蟬晚起河亭晴望夢蘇州水閣寄馮侍御太湖石秘省後㕔寄殷協律臨都驛答夢得六言二首春詞送敏中歸豳寧幕池牕送鶴與裴相臨别贈詩烏夜啼送東都留守令狐尚書赴任想東遊五十韻將至東都先寄令狐留守晚桃花阿崔卷之二十六池上小宴問程秀才橋亭夘飲西風題岐王舊山池石壁履道池上作和令狐相公寄劉郎中兼見示長句期宿客不至晚歸府從龍潭寺至少林寺題贈同遊者元相公輓歌詞三首録一首酬李二十侍郎池上閒詠和髙僕射罷節度讓尚書授少保分司喜遂遊山水之作送考功崔郎中赴闕同諸客題于家公主舊宅菩提寺上方晚眺楊栁枝詞八首録四首春早秋初因時即事兼寄浙東李侍郎送姚杭州赴任因思舊逰種栁三詠韋七自太子賓客再除秘書監以長句賀而餞之九年十一月二十一日感事而作春來頻與李二賓客郭外同遊因贈長句三月三日閒居春盡香山避暑二絶贈談客答夢得秋庭獨坐見贈酬夢得霜夜對月見懷初冬月夜得皇甫澤州手札并詩數篇因遣報書偶題長句寄獻北都留守裴令公看夢得題答李侍郎詩詩中有文星之句因戲和之早春憶遊思黯南莊因寄長句杪秋獨夜答閒上人來問因何風疾夜聞筝中彈瀟湘送神曲感舊戲禮經老僧夢得前所酬篇有鍊盡美少年之句因思往事兼詠今懷重以長句答之春盡日宴罷感事獨吟前有别栁梅絶句夢得繼和云春盡絮飛留不得隨風好去落誰家又復戲答時熱少見客因詠所懷宣州崔大夫閣老忽以近詩數十首見示吟諷之下竊有所喜因成長句寄題郡齋晚池汎舟遇景成詠贈吕處士和楊尚書罷相後夏日遊永安水亭兼招本曹楊侍郎同行五年秋病後獨宿香山寺早入皇城贈王留守僕射山中五絶句録三首嶺上雲石上苔澗中魚和敏中洛下即事送敏中新授戸部員外郎西歸覽盧子䝉侍御舊詩多與微之唱和感今傷昔因贈子䝉題於卷後新小灘喜入新年自詠夏日與閒禪師林下避暑談氏小外孫玉童楊栁枝詞詔取永豐栁植禁苑感賦池上篇齒落辭不能忘情吟江南喜逢蕭九徹因話長安舊遊戲贈五十韻送劉郎中赴任蘇州靈巖寺寄韜光禪師昌黎韓愈卷之二十七元和聖德詩琴操十首將歸操猗蘭操龜山操越裳操拘幽操岐山操履霜操雉朝飛操别鵠操殘形操南山詩謝自然詩秋懷詩十一首卷之二十八赴江陵途中寄贈王二十補闕李十一拾遺李二十六員外翰林三學士此日足可惜一首贈張籍歸彭城醉贈張秘書送惠師送靈師縣齋有懷陪杜侍御遊湘西兩寺獨宿有題一首因獻楊常侍岳陽樓别竇司直送文暢師北遊答張徹卷之二十九薦士古風嗟哉董生行山石汴泗交流贈張僕射鳴雁雉帶箭條山蒼桃源圖東方半明謁衡嶽廟遂宿嶽寺題門樓永貞行鄭羣贈簟贈崔立之評事送區𢎞南歸三星行剝啄行孟東野失子卷之三十陸渾山火和皇甫湜用其韻苦寒和虞部盧四酬翰林錢七赤藤杖歌送湖南李正字歸寄盧仝酬司門盧四兄雲夫院長望秋作誰氏子送無本師歸范陽石鼓歌題炭谷湫祠堂聽潁師彈琴調張籍盧郎中雲夫寄示送盤谷子詩兩章歌以和之病中贈張十八寄崔二十六立之卷之三十一短燈檠歌病鴟華山女瀧吏除官赴闕至江州寄鄂岳李大夫南山有髙樹行贈李宗閔猛虎行雪後寄崔二十六丞公奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄閣老張十八助教記夢南内朝賀歸呈同官讀東方朔雜事庭楸南溪始泛三首題楚昭王廟答張十一功曹題木居士和歸工部送僧約入闗詠馬木芙蓉奉和庫部盧四兄曹長元日朝迴奉和裴相公東征途經女几山下作次潼關先寄張十二閣老使君晉公破賊囘重拜台司以詩示幕中賓客愈奉和左遷至藍關示姪孫湘晚次宣溪辱韶州張端公使君惠書敘别酬以絶句二章量移袁州張韶州端公以詩相賀因酬之奉和兵部張侍郎酬鄆州馬尚書祗召途中見寄開緘之日馬帥巳再領鄆州之作奉酬天平馬十二僕射暇日言懷見寄之作奉使鎮州行次承天行營奉酬裴司空奉和僕射裴相公感恩言志和僕射相公朝迴見寄御選唐宋詩醇目録巻上
