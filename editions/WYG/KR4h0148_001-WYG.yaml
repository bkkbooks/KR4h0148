body:
  text: 隴西李白卷之一古風巻之二逺别離蜀道難梁甫吟烏夜啼烏棲曲戰城南行行且游獵篇飛龍引行路難長相思上留田行前有一樽酒行夜坐吟野田黄雀行箜篌謠夷則格上白鳩拂舞辭日出行北風行巻之三關山月獨漉篇登髙丘而望逺海雙燕離山人勸酒于闐采花鞠歌行幽澗泉王昭君荆州歌雉子斑相逢行有所思久别離白頭吟采蓮曲臨江王節士歌長干行古朗月行獨不見白紵辭鳴雁行妾薄命幽州胡馬客歌巻之四門有車馬客行東海有勇婦黄葛篇塞下曲來日大難玉堦怨襄陽曲大堤曲邯鄲才人嫁為厮養卒婦北上行短歌行枯魚過河泣丁督䕶歌樹中草君馬黄少年子少年行豫章行沐浴子静夜思緑水曲春思子夜吳歌對酒行估客行長相思去婦詞巻之五襄陽歌江上吟侍從宜春苑奉詔賦龍池栁色初青聽新鶯百囀歌西嶽雲臺歌送丹丘子梁園吟鳴臯歌送岑徵君横江詞白雲歌送劉十六歸山秋浦歌當塗趙炎少府粉圖山水歌上皇西巡南京歌峨眉山月歌江夏行清溪行贈孟浩然見京兆韋參軍量移東陽贈韋侍御黄裳二首贈裴十四贈清漳明府姪聿贈新平少年口號贈徵君鴻秋日鍊藥院鑷白髪贈元六兄林宗憶襄陽舊遊贈馬少府巨對雪獻從兄虞城宰贈昇州王使君忠臣贈别從甥髙五醉後贈從甥髙鎮贈秋浦栁少府中丞宋公以吳兵三千赴河南軍次尋陽脱予之囚參謀幕府因贈之流夜郎贈辛判官贈常侍御贈易秀才經亂離後天恩流夜郎憶舊遊書懷贈江夏韋太守良宰贈漢陽輔録事贈盧司户贈從弟南平太守之遙流夜郎半道承恩放還兼欣剋復之美書懷示息秀才宿清溪主人巴陵贈賈舍人贈從弟宣州長史昭陳情贈友人贈錢徵君少陽登敬亭山南望懷古贈竇主簿經亂後將避地剡中留贈崔宣城巻之六獻從叔當塗宰陽氷贈汪倫安陸白兆山桃花嵒寄劉侍御綰淮南卧病書懷寄蜀中趙徵君蕤望終南山寄紫閣隱者秋夜宿龍門香山寺奉寄王方城十七丈奉國營上人從弟幼成令問沙丘城下寄杜甫淮隂書懷寄王宗城聞王昌齡左遷龍標遙有此寄憶舊遊寄譙郡元參軍月夜江行寄崔員外宗之宿白鷺洲寄楊江寧新林浦阻風寄友人寄韋南陵氷余江上乘興訪之遇尋顔尚書笑有此贈題情深樹寄象公北山獨酌寄韋六寄東魯二稚子獨酌清溪江石上寄權昭夷禪房懷友人岑倫廬山謠寄盧侍御虛舟春日歸山寄孟浩然流夜郎至西塞驛寄裴隱自漢陽病酒歸寄王明府江夏寄漢陽輔録事早春寄王漢陽江上寄元六林宗涇溪南藍山下有落星潭可以卜築余泊舟石上寄何判官昌浩早過漆林渡寄萬巨遊敬亭寄崔侍御自金陵泝流過白璧山翫月達天門寄句容王主簿秋日魯郡堯祠亭上宴别杜補闕范侍御别魯頌夢遊天姥吟留别留别廣陵諸公金陵酒肆留别贈别鄭判官黄鶴樓送孟浩然之廣陵留别賈舍人至渡荆門送别南陵别兒童入京江夏别宋之悌南陽送客送張舍人之江東送王屋山人魏萬還王屋送友人尋越中山水魯郡堯祠送竇明府薄華還西京金鄉送韋八之西京魯郡東石門送杜二甫灞陵行送别送裴十八圖南歸嵩山同王昌齡送族弟襄歸桂陽送崔度還吳金陵送張十一再遊東吳巻之七送楊山人歸嵩山送殷淑送范山人歸泰山送友人送友人入蜀送張秀才謁髙中丞餞校書叔雲與諸公送陳郎將歸衡陽賦得白鷺鷥送宋少府入三峽宣州謝朓樓餞别校書叔雲涇川送族弟錞送崔氏昆季之金陵登黄山凌敲臺送族弟溧陽尉濟充泛舟赴華隂得齊字送儲邕之武昌早秋單父南樓詶竇公衡山中問答答友人贈烏紗帽答長安崔少府叔封游終南翠微寺太宗皇帝金沙泉見寄詶崔五郎中金門答蘇秀才答髙山人兼呈權顧二侯遊南陽白水登石激作遊南陽清泠泉尋魯城北范居士失道落蒼耳中見范置酒摘蒼耳作遊泰山六首下終南山過斛斯山人宿置酒陪從祖濟南太守泛鵲山湖宿鄭參卿山池遊謝氏山亭把酒問月金陵鳳凰臺置酒陪侍郎叔遊洞庭醉後夜泛洞庭尋裴侍御清酌陪族叔刑部侍郎􅁮及中書賈舍人至遊洞庭登單父陶少府半月臺天台曉望焦山望寥山杜陵絶句登太白峰秋日登揚州西靈塔登瓦官閣登梅岡望金陵贈族姪髙座寺僧中孚登金陵鳳凰臺望廬山瀑布水二首登廬山五老峯江上望􅔉公山鸚鵡洲秋登巴陵望洞庭與夏十二登岳陽樓登巴陵開元寺西閣贈衡嶽僧方外與賈舍人至於龍興寺剪落梧桐枝望㴩湖秋登宣城謝朓北樓望天門山過崔八丈水亭之廣陵宿常二南郭幽居客中行太原早秋奔亡道中荆門浮舟望蜀江上三峽自巴東舟行經瞿唐峽登巫山最髙峰晚還題壁早發白帝城秋下荆門江行逺寄巻之八夜泊黄山聞殷十四吳吟宿鰕湖蘇臺覽古越中覽古峴山懷古經下邳圯橋懷張子房金陵陪宋中丞武昌夜飲懷古望鸚鵡洲懷禰衡宿巫山下金陵白楊十字巷謝公亭夜泊牛渚懷古尋髙鳯石門山中元丹丘月下獨酌春歸終南山松龕舊隱尋山僧不遇作待酒不至獨酌友人㑹宿春日獨酌二首金陵江上遇蓬池隱者山中與幽人對酌春日醉起言志廬山東林寺夜懷尋雍尊師隱居與史郎中欽聽黄鶴樓上吹笛對酒獨坐敬亭山自遣訪戴天山道士不遇秋日與張少府楚城韋公藏書髙齋作憶東山望月有懷對酒憶賀監重憶效古二首擬古感興秋夕旅懷尋陽紫極宫感秋作秋夕書懷荆州賊平臨洞庭言懷作江南春懷聽蜀僧濬彈琴初出金門尋王侍御不遇詠壁上鸚鵡觀元丹丘坐巫山屏風見野草中有曰白頭翁者流夜郎題葵葉瑩禪師房觀山海圖白鷺鷥詠桂巫山枕障勞勞亭嘲魯儒春夜洛城聞笛宣城見杜鵑花白田馬上聞鶯三五七言雜詩寄逺長門怨陌上贈美人閨情怨情湖邊採蓮婦怨情代寄情楚辭體學古思邊别内赴徵自代内贈越女詞巴女詞自溧水道哭王炎哭宣城善釀紀叟題舒州司空山瀑布上清寳鼎詩襄陽杜甫巻之九奉贈韋左丞丈二十二韻送髙三十五書記贈李白遊龍門奉先寺望嶽陪李北海宴歴下亭登歴下古城員外新亭𤣥都壇歌貧交行兵車行髙都䕶驄馬行天育驃騎歌白絲行醉時歌醉歌行贈衛八處士同諸公登慈恩寺塔示從孫濟送孔巢父謝病歸遊江東兼呈李白飲中八仙歌曲江麗人行樂遊園歌溔陂行奉同郭給事湯東靈湫作夜聽許十損誦詩愛而有作沙苑行驄馬行自京赴奉先縣詠懷五百字奉先劉少府新畫山水障歌白水縣崔少府十九翁髙齋三十韻三川觀水漲二十韻悲陳陶悲青坂哀江頭哀王孫大雲寺贊公房蘇端薛復筵簡薛華醉歌晦日尋崔戢李封巻之十喜晴述懷一首送樊二十三侍御赴漢中判官送從弟亞赴安西判官彭衙行北征得舍弟消息玉華宫九成宫羌村洗兵馬留花門李鄠縣丈人胡馬行義鶻畫鶻行瘦馬行新安吏潼闗吏石壕吏新婚别垂老别無家别遣興三首幽人佳人赤谷西崦人家西枝村尋置草堂地夜宿贊公土室夢李白二首遣興遣興前出塞九首後出塞五首萬丈潭兩當縣吳十侍御江上宅發秦州鐵堂峽鹽井寒硤法鏡寺青陽峽龍門鎮石龕巻之十一乾元中寓居同谷縣作歌七首水㑹渡飛仙閣龍門閣石櫃閣桔柏渡劔門成都府石犀行題壁畫馬歌戱題畫山水圖歌題李尊師松樹障子歌戱為雙松圖歌病柏病橘枯㯶枯柟戱作花卿歌柟樹為風雨所拔嘆茅屋為秋風所破歌天邊行苦戰行述古觀打魚歌又觀打魚越王樓歌冬到金華山觀因得故拾遺陳公學堂遺跡通泉驛南去通泉縣十五里山水作過郭代公故宅短歌行桃竹杖引韋諷錄事宅觀曹将軍畫馬圖丹青引發閬中寄韓諫議憶昔冬狩行别唐十五誡因寄禮部賈侍郎閬山歌閬水歌草堂太子張舍人遺織成褥段杜鵑客堂水閣朝霽奉簡嚴雲安蠶穀行古柏行縛鷄行牽牛織女殿中楊監見示張旭草書圖課伐木槐葉冷淘行官張望補稻畦水歸上後園山脚驅䜿子摘蒼耳秋行官張望督促東渚耗稻向畢清晨遣女奴阿稽䜿子阿段往問巻之十二雨又上後園山脚種萵苣八哀詩贈司空王公思禮故司徒李公光弼贈左僕射鄭國公嚴公武贈太子太師汝陽郡王璡贈秘書監江夏李公邕故秘書少監武功蘇公源明故著作郎貶台州司户滎陽鄭公䖍故右僕射相國張公九齡寫懷觀公孫大娘弟子舞劔器行同元使君舂陵行李潮八分小篆歌聽楊氏歌荆南兵馬使太常卿趙公大食刀歌王兵馬使二角鷹狄明府秋風二首虎牙行後苦寒行二首夜歸醉為馬墜諸公攜酒相看大覺髙僧蘭若宿清溪驛奉懷張員外十五兄之緒憶昔行魏將軍歌北風白鳬行醉歌行贈公安顏少府請顧八題壁夜聞􅓋篥發劉郎浦别董頲送顧八分文學適洪吉州遣遇解憂宿鑿石浦過津口次空靈岸宿花石戍望嶽岳麓山道林二寺行嵗晏行追酬故髙蜀州人日見寄蘇大侍御訪江浦賦八韻紀異題衡山縣文宣王廟新學堂呈陸宰巻之十三冬日洛城北謁𤣥元皇帝廟投贈哥舒開府翰二十韻上韋左相二十韻奉贈太常張卿二十韻奉贈鮮于京兆二十韻贈特進汝陽王二十韻鄭駙馬宅宴洞中重題鄭氏東亭題張氏隱居天寶初南曹小司寇舅於我太夫人堂下累土為山一匱盈尺以代彼朽木承諸焚香瓷甌甌甚安矣旁植慈竹葢兹數峯嶔岑嬋娟宛有塵外致乃不知興之所至而作是詩龍門奉寄河南韋尹丈人與任城許主簿遊南池登兗州城樓對酒書懷走邀許十一簿公巳上人茅齋房兵曹胡馬詩畫鷹過宋員外之問舊莊夜宴左氏莊送蔡希曾都尉還隴右因寄髙三十五書記春日憶李白寄陳二補闕寄髙三十五書記送裴二虬作尉永嘉贈田九判官贈獻納使起居田舍人陪鄭廣文遊何將軍山林十首重過何氏五首冬日有懷李白贈翰林張四學士送張二十參軍赴蜀州因呈楊五侍御陪諸貴公子丈八溝攜妓納凉晚際遇雨二首贈髙式顔故武衛將軍輓歌三首官定後戲贈九日藍田崔氏莊崔氏東山草堂對雪月夜遣興春望憶幼子喜達行在所三首得家書奉贈嚴八閣老奉送郭中丞兼太僕卿充隴右節度使三十韻送楊六判官使西畨月晚行口號行次昭陵重經昭陵喜聞官軍巳臨賊冦二十韻收京巻之十四臘日紫宸殿退朝口號曲江二首曲江對酒曲江對雨奉和賈至舍人早朝大明宫宣政殿退朝晚出左掖題省中院壁春宿左省送翰林張司馬南海勒碑晚出左掖送賈閣老出汝州送鄭十八䖍貶台州司户傷其臨老陷賊之故闕為面别情見於詩端午日賜衣奉贈王中允維奉陪鄭駙馬韋曲二首至德二載甫自京金光門出間道歸鳳翔乾元初從左拾遺移華州掾與親故别因出此門有悲往事寄髙三十五詹事適路逢襄陽楊少府入城戲呈楊員外綰題鄭縣亭子望岳至日遣興奉寄北省舊閣老兩院故人二首得弟消息憶弟秦州雜詩二十首月夜憶舍弟宿贊公房東樓雨晴寓目山寺遣懷天河初月擣衣促織螢火蒹葭苦竹除架廢畦夕烽送逺觀兵天末懷李白空囊病馬蕃劔銅瓶觀安西兵過赴闗中待命二首野望秋日阮隱居致薤三十束秦州見勅目薛三璩授司議郎畢四曜除監察與二子有故逺喜遷官兼述索居凡二十韻寄岳州賈司馬六丈巴州嚴八使君兩閣老五十韻寄張十二山人彪三十韻寄李十二白二十韻巻之十五蜀相卜居梅雨為農有客狂夫堂成西郊所思野老遣興南鄰出郭過南鄰朱山人水亭恨别寄賀蘭銛寄楊五桂州譚和裘廸登新津寺寄王侍郎建都十二韻和裴迪登蜀州東亭送客逢早梅相憶見寄散愁二首客至遣意二首漫成春夜喜雨春水江亭村夜早起可惜落日寒食遊修覺寺後逰