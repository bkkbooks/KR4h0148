  text: 欽定四庫全書御選唐宋詩醇巻五
  hash: sha256:39faa2df5e6e4216d0f7196553d8daccb74c83762eba5b99aca6fd3878b85ef8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_013-1a, image: WYG1448/WYG1448-0136c.png}
body:
  text: 隴西李白詩五襄陽歌落日欲沒峴山西倒著接䍦花下迷襄陽小兒齊拍手攔街争唱白銅鞮傍人借問笑何事笑殺山翁醉似泥鸕鷀杓鸚鵡杯百年三萬六千日一日須傾三百杯遥看漢水鴨頭緑恰似葡萄初醱醅此江若變作春酒壘麴便築糟丘臺千金駿馬換小妾笑坐雕鞍歌落梅車傍側挂一壺酒鳯笙龍管行相催咸陽市中歎黄犬何如月下傾金罍君不見晉朝羊公一片石龜頭剝落生莓苔涙亦不能為之墮心亦不能為之哀清風朗月不用一錢買玉山自倒非人推舒州杓力士鐺李白與爾同死生襄王雲雨今安在江水東流猿夜聲意曠神逸極頽唐之趣入後俯仰含情乃有心人語韜精日沈飲誰知非荒宴亦同此懐抱耳子美云長鑱長鑱白木柄我生託子以為命語竒矣此詩云舒州杓力士鐺李白與爾同死生苦樂不同造語正復匹敵歐陽修曰落日欲沒峴山西四句此常語也至於清風明月不用一錢買玉山自倒非人推然後見太白之横放其所以驚動千古者固不在此乎黄庭堅曰李白歌詩度越六代與漢魏樂府争衡彭乗曰歐陽公題滄浪亭云清風明月本無價可惜只賣四萬錢與太白致辭雖異然皆善言風月古今樂錄襄陽樂宋隨王誕作襄陽蹋銅蹄者梁武西下所製沈約又作其和云襄陽白銅蹄聖徳應乾来江上吟木蘭之枻沙棠舟玉簫金管坐兩頭美酒尊中置千斛載妓隨波任去留仙人有待乗黄鶴海客無心隨白鷗屈平詞賦懸日月楚王䑓榭空山丘興酣落筆揺五嶽詩成笑傲凌滄洲功名富貴若長在漢水亦應西北流發端四語即事之辭也以下慷當以慨雖帯初唐風調而氣骨逈絶矣反筆作結殊為遒健侍從宜春苑奉詔賦龍池栁色初青聽新鶯百囀歌東風已緑瀛洲草紫殿紅樓覺春好池南栁色半青青縈烟嫋娜拂綺城垂絲百尺挂雕楹上有好鳥相和鳴間闗早得春風情春風巻入碧雲去千門萬户皆春聲是時君王在鎬京五雲垂暉耀紫清仗出金宫隨日轉天回玉輦繞花行始向蓬萊㸔舞鶴還過茝石聽新鶯新鶯飛繞上林苑願入簫韶雜鳯笙清圓流麗可以鼓吹休明千門萬户一語氣象頗大全篇格調想見初唐餘響范徳機曰此賦物詩格調既髙法度又謹妙而易見者也蕭士贇曰蓬萊茝石當時宫苑名沈徳潜曰西都賦後宫則有茝若椒風作茝石者誤也西嶽雲臺歌送丹丘子西嶽峥嶸何壯哉黄河如絲天際來黄河萬里觸山動盤渦轂轉秦地雷榮光休氣紛五彩千年一清聖人在巨靈咆哮擘兩山洪波噴箭射東海三峰却立如欲摧翠厓丹谷髙掌開白帝金精運元氣石作蓮花雲作臺雲臺閣道連窈㝠中有不死丹丘生明星玉女備灑掃麻姑搔背指爪輕我皇手把天地户丹丘談天與天語九重出入生光輝東來蓬萊復西歸玉漿儻惠故人飲騎二茅龍上天飛健筆凌雲一掃靡靡之調梁園吟我浮黄河去京闕挂席欲進波連山天長水濶厭逺渉訪古始及平臺間平臺為客憂思多對酒遂作梁園歌却憶蓬池阮公詠因吟渌水揚洪波洪波浩蕩迷舊國路逺西歸安可得人生達命豈暇愁且飲美酒登髙樓平頭奴子揺大扇五月不熱疑清秋玉盤楊梅為君設呉鹽如花皎白雪持鹽把酒但飲之何用孤髙比雲月昔人豪貴信陵君今人耕種信陵墳荒城虚照碧山月古木盡入蒼梧雲梁王宫闕今安在枚馬先歸不相待舞影歌聲散緑池空餘汴水東流海沈吟此事涙滿衣黄金買醉未能歸連呼五白行六博分曹賭酒酣馳輝歌且謡意方逺東山髙卧時起來欲濟蒼生未應晚懐古之作慷慨悲歌興㑹飈舉范傳正有云李白脱屣軒冕釋羈韁鏁自放宇宙間飲酒非嗜其酣樂取其昏以自穢好神仙非慕其輕舉欲耗壯心遣餘年作詩非事其文律取其吟咏以自適三誦斯篇信然桂臨川曰太白樂天知命感今懐古備載此詩阮籍詠懐詩徘徊蓬池上還顧望大梁渌水揚洪波曠野莽茫茫歸藏啓筮曰有白雲出自蒼梧入於大梁鳴臯歌送岑徵君自註時梁園三尺雪在清泠池作若有人兮思鳴臯阻積雪兮心煩勞洪河凌競不可以徑度氷龍鱗兮難容舠邈仙山之峻極兮聞天籟之嘈嘈霜厓縞皓以合㳫兮若長風扇海湧滄溟之波濤𤣥猨緑羆舔舕崟岌危柯振石駭膽慄魄羣呼而相號峯峥嶸以路絶挂星辰於巖㟼送君之歸兮動鳴臯之新作交鼓吹兮彈絲觴清泠之池閣君不行兮何待若反顧之黄鶴掃梁園之羣英振大雅於東洛巾征軒兮厯阻折尋幽居兮越巘㟧盤白石兮坐素月琴松風兮寂萬壑望不見兮心氛氲蘿𠖇𠖇兮霰紛紛水横洞以下渌波小聲而上聞虎嘯谷而生風龍藏溪而吐雲寡鶴清唳飢鼯嚬呻䰟獨處此幽黙兮愀空山而愁人雞聚族以争食鳯孤飛而無隣蝘蜓嘲龍魚目混珍嫫母衣錦西施負薪若使巢由桎梏於軒冕兮亦奚異乎䕫龍䠥􅍷於風塵哭何苦而救楚笑何誇而却秦吾誠不能學二子沽名矯節以耀世兮固將棄天地而遺身白鷗兮飛來長與君兮相親作騷體便覺屈原宋玉去人不逺其不規規歩趨處正是其才髙氣逸為之耳望不見兮一段寫出幽居寂寞之況興起下文脈絡相貫陳繹曽謂白詩祖風騷宗漢魏善於掉弄造出竒怪驚動心目忽然撇出妙入無聲其知言者乎王世貞以為歌行縱横往往强弩之未間以長語英雄欺人是不知其錯落變化自有天然節奏而輕議之也晁補之緝變離騷敘此篇曰鳴臯歌者唐翰林供奉李白之所作也白天才俊麗不可矩矱然要長於詩至鳴臯歌一篇本末楚辭也而世誤以為詩因為出之其畧曰蝘蜓嘲龍魚目混珍嫫毋衣錦西施負薪此諄諄效屈原卜居及賈誼弔屈原語而白才自逸蕩故或離而去之云范徳機曰此篇稍長而詞意易見亦楚人之流也惟其有蝘蜓魚目巢由䕫龍等語故前輩嘗稱之然此實非太白之用意處妙不在此呉昌祺曰𤣥猿緑羆叠四句而以五句為一韻非騷人法且多對仗亦太白之古詩耳雞聚族争食以下乃白感岑之歸隠而發歎與岑無闗一統志鳴臯山在河南嵩縣東北四十里横江詞横江西望阻西秦漢水東連楊子津白浪如山那可渡狂風愁殺峭帆人横江館前津吏迎向余東指海雲生郎今欲渡縁何事如此風波不可行梁簡文烏棲曲云郎今欲渡畏風波白用其語風致轉勝若其即景寫心則託興逺矣范徳機曰此篇氣格合歌行之體使人嗟咏有無窮之思胡應麟曰尚是樂府古調趙執信曰横江館前一首此樂府也問余何事一首此古詩也白雲歌送劉十六歸山泰山楚山皆白雲白雲處處長隨君長隨君君入楚山裏雲亦隨君渡湘水湘水上女蘿衣白雲堪卧君早歸吐語如轉丸珠又如白雲巻舒清風與歸畫家逸品秋浦歌秋浦長似秋蕭條使人愁客愁不可度行上東大樓正西望長安下見江水流寄言向江水汝意憶儂不遥傳一掬淚為我達揚州觸物懐人抑鬱誰語澤畔行吟深情宛露自是騷人之緒㳂革志秋浦隋縣名唐置池州秋浦猿夜愁黄山堪白頭清溪非隴水翻作斷腸流欲去不得去薄遊成久遊何年是歸日雨淚下孤舟秋浦錦駝鳥人間天上稀山雞羞渌水不敢照毛衣兩鬢入秋浦一朝颯已衰猿聲催白髮長短盡成絲秋浦千重嶺水車嶺最竒天傾欲墮石水拂寄生枝竒境如畫千千石楠樹萬萬女貞林山山白鷺滿澗澗白猿吟君莫向秋浦猿聲碎客心周南采蘋章連用六于以字十九首青青河畔草連用六叠字句白詩祖之邏人横鳥道江祖出魚梁水急客舟疾山花拂面香江行真景白髮三千丈縁愁似个長不知明鏡裏何處得秋霜突然而起四句三折格力極健要是倒装法耳陳師道云白髮縁愁百尺長語亦自然王安石云繰成白髮三千丈有斧鑿痕矣唐汝詢曰託興在意象之外秋浦田舍翁採魚水中宿妻子張白鷴結罝映深竹似輞川詩當塗趙炎少府粉圗山水歌峨眉髙出西極天羅浮直與南溟連名公繹思揮彩筆驅山走海置眼前滿堂空翠如可掃赤城霞氣蒼梧烟洞庭瀟湘意𣺌綿三江七澤情洄㳂驚濤洶湧向何處孤舟一去迷歸年征帆不動亦不旋飄如隨風落天邉心揺目斷興難盡㡬時可到三山巔西峯峥嶸噴流泉横石蹙水波潺湲東厓合沓蔽輕霧深林雜樹空芊綿此中㝠昧失晝夜隠几寂聽無鳴蟬長松之下列羽客對坐不語南昌仙南昌仙人趙夫子妙年歴落青雲士訟庭無事羅衆賔杳然如在丹青裏五色粉圗安足珍真仙可以全吾身若待功成拂衣去武陵桃花笑殺人寫畫似真亦遂驅山走海奔輳腕下杳然如在丹青裏又以真為畫各有竒趣康樂之模山範水從此另開生面漢書梅福為南昌尉棄官去至今傳以為仙上皇西廵南京歌誰道君王行路難六龍西幸萬人歡地轉錦江成渭水天廻玉壘作長安渭水長安隐寓故都之感且以幸其早還非誇成都佳麗也胡震亨曰王弇州以地轉錦江等句不異宋人東狩錢塘封事夫太白亦詩酒自娯跌宕一生者耳安能顧語忌拘教義為是屑屑者哉詩人各自寫一性情各自成一品局固不得取錦袍豪翰强繩以瘦笠苦藻必同籥吹為善也劎閣重關蜀北門上皇歸馬若雲屯少帝長安開紫極雙懸日月照乾坤述當時事何等明白可作詩史有謂肅宗當避位以請上皇復辟者有謂惑張良娣徙上皇於南内者皆傅㑹之說沈徳潜曰二句上皇三句少帝而以末句總收格法又别唐書天寳十五載六月帝幸蜀七月太子即位於靈武尊帝為上皇天帝改元至徳二載十二月上皇至京師大赦以蜀郡為南京峨眉山月歌峨眉山月半輪秋影入平羌江水流夜發清溪向三峽思君不見下渝州但覺其工然妙處不傳劉辰翁曰含情悽惋有竹枝縹緲之音王世貞曰二十八字中有峨眉山平羌江清溪三峽渝州使後人為之不勝痕迹矣益見此老鑪錘之妙江夏行憶昔嬌小姿春心亦自持為言嫁夫壻得免長相思誰知嫁商賈令人却愁苦自從為夫妻何曽在鄉土去年下揚州相送黄鶴樓眼㸔帆去逺心逐江水流只言期一載誰謂歴三秋使妾腸欲斷恨君情悠悠東家西舎同時發北去南來不逾月未知行李㳺何方作箇音書能斷絶適來往南浦欲問西江船正見當壚女紅粧二八年一種為人妻獨自多悲悽對鏡便垂淚逢人只欲啼不如輕薄兒旦暮長相隨悔作商人婦青春長别離如今正好同懽樂君去容華誰得知曲盡怨别之情絮絮可聽豈無膏沐誰適為容末句正用此意清溪行清溪清我心水色異諸水借問新安江見底何如此人行明鏡中鳥度屏風裏向晚猩猩啼空悲逺遊子佇興而言鏗然古調一結有言不盡意之妙贈孟浩然吾愛孟夫子風流天下聞紅顔棄軒冕白首卧松雲醉月頻中聖迷花不事君髙山安可仰徒此揖清芬見京兆韋叅軍量移東陽潮水還歸海流人却到呉相逢問愁苦淚盡日南珠贈韋侍御黄裳二首太華生長松亭亭凌霜雪天與百尺髙豈為微飈折桃李賣陽􅃩路人行且迷春光掃地盡碧葉成黄泥願君學長松慎勿作桃李受屈不改心然後知君子見君乗驄馬知上太山道此地果摧輪全身以為寳我如豐年玉棄置秋田草但朂氷壺心無為歎衰老古道照人得朋友交勉之誼朂君青松心努力保霜雪立言如此可以不朽贈裴十四朝見裴叔則朗如行玉山黄河落天走東海萬里寫入胸懐間身騎白黿不敢度金髙南山買君顧徘徊六合無相知飄若浮雲且西去呉昌祺曰有如生龍活虎非世人所可駕馭天實授之豈人力耶贈清漳明府姪聿我李百萬葉柯條布中州天開青雲噐日為蒼生憂小邑且割雞大刀佇烹牛雷聲動四境惠與清漳流弦歌詠唐堯脱落隠簮組心和得天真風俗猶太古牛羊散阡陌夜寢不扃户問此何以然賢人宰吾土舉邑樹桃李垂隂亦流芬河堤繞緑水桑柘連青雲趙女不冶容提籠晝成羣繰絲鳴機杼百里聲相聞訟息鳥下堦髙卧披道帙蒲鞭挂簷枝示耻無撲抶琴清月當户人寂風入室長嘯無一言陶然上皇逸白玉壺氷水壺中見底清清光洞毫髮皎潔照羣情趙北美佳政燕南播髙名過客覽行謡因之頌徳聲天開青雲噐日為蒼生憂似范仲淹一流人物心和得天真以下循良之實藹然可覩為民牧者直當書之於座右贈新平少年韓信在淮隂少年相欺凌屈體若無骨壯心有所慿一遭龍顔君嘯咤從此興千金荅漂毋萬古共嗟稱而我竟何為寒苦坐相仍長風入短袂兩手如懐氷故有不相恤新交寧見矜摧殘檻中虎覊紲韝上鷹何時騰風雲搏撃申所能鍾惺曰屈體二句可與老杜嚴僕射詩開口取將相小心事友生並㸔寫出英俠本色屈伸之妙口號贈徵君鴻自註此公時被徵陶令辭彭澤梁鴻入會稽我尋髙士傳君與古人齊雲卧留丹壑天書降紫泥不知楊伯起早晚向闗西格調髙朗盧鴻屢徵不起故白詩云爾末句言其當應召也以伯起期之位置殊髙范徳機曰律詩須守䂓矩此等五言何其嚴哉唐書本傳鴻博學善書籀廬嵩山開元初備禮徵再不至五年再詔徵至東都拜諌議大夫固辭還山秋日錬藥院鑷白髮贈元六兄林宗木落識歳秋瓶氷知天寒桂枝日已緑拂雪凌雲端弱齡接光景矯翼攀鴻鸞投分三十載榮枯同所歡長吁望青雲鑷白坐相㸔秋顔入曉鏡壯髮凋危冠窮與鮑生賈饑從漂毋餐時來極天人道在豈吟嘆樂毅方適趙蘇秦初說韓巻舒固在我何事空摧殘寫懐抱於實境約縱逸於苦調即此可以上軼鮑謝起句本之淮南子語意竒古憶襄陽舊逰贈馬少府巨昔為大堤客曽上山公樓開牕碧嶂滿拂鏡滄江流髙冠佩雄劔長揖韓荆州此地别夫子今來思舊逰朱顔君未老白髮我先秋壯志恐蹉跎功名若雲浮歸心結逺夢落日懸春愁空思羊叔子墮淚峴山頭落日懸春愁自是千古雋句對雪獻從兄虞城宰昨夜梁園雪弟寒兄不知庭前㸔玉樹腸斷憶連枝劉辰翁曰此詩首二語小夫賤𨽻誰不能道而學士大夫或愧之矣古今甚深宻義往往於淺易得之藹然惻然可以感動贈昇州王使君忠臣六代帝王國三呉佳麗城賢人當重寄天子借髙名巨海一邉静長江萬里清應須救趙策未肯棄侯嬴如五六語乃為不負重寄末以侯嬴自比寓意救趙盖在天寳初亂後也贈别從甥髙五魚目髙泰山不如一璵璠賢甥即明月聲價動天門能成吾宅相不減魏陽元自顧寡籌略功名安所存五木思一擲如繩繫窮猿櫪中駿馬空堂上醉人喧黄金久已罄為報故交恩聞君隴西行使我驚心魂與爾共飄颻雲天各飛翻江水流或巻此心難具論貧家羞好客語拙覺辭繁三朝空錯莫對飯却慚寃自笑我非夫生事多契濶蓄積萬古憤向誰得開豁天地一浮雲此身乃毫末忽見無端倪太虚可包括去去何足道臨岐空復愁肝膽不楚越山河亦衾裯雲龍若相從明主㑹見收成功解相訪溪水桃花流首道贈意繼敘别情白盖與髙最厚善者自笑我非夫一段開豁心胸遐矚曠覽沈鬰頓挫意近杜陵從此一氣雙收聲情倍振使無後幅之雄健則氣味衰颯矣大家風格如是醉後贈從甥髙鎮馬上相逢揖馬鞭客中相見客中憐欲邀擊筑悲歌飲正值傾家無酒錢江東風光不借人枉殺落花空自春黄金逐手快意盡昨日破産今朝貧丈夫何事空嘯傲不如燒却頭上巾君為進士不得進我被秋霜生旅鬢時清不及英豪人三尺童兒重廉藺匣中盤劎裝䱜魚閒在腰間未用渠且將換酒與君醉醉歸託宿呉專諸有觸而鳴微露憤意醉後披寫自饒天趣蕭士贇曰此太白少年任俠之作李白上裴長史書曰昔東㳺維揚不逾一年散金三十餘萬有落魄公子悉皆濟之贈秋浦栁少府秋浦舊蕭索公庭人吏稀因君樹桃李此地忽芳菲揺筆望白雲開簾當翠㣲時來引山月縱酒酣清暉而我愛夫子淹留未忍歸其人有為政之實於一起見之中丞宋公以呉兵三千赴河南軍次尋陽脫予之囚叅謀幕府因贈之獨坐清天下專征出海隅九江皆渡虎三郡盡還珠組練明秋浦樓船入郢都風髙初選將月滿欲平胡殺氣横千里軍聲動九區白猿慙劍術黄石借兵符戎虜行當翦鯨鯢立可誅自憐非劇孟何以佐良圗劉辰翁曰句句壯末韻更佳范徳機曰發端雄渾而嚴真長律起辭也胡震亨曰排律起句極宜冠冕雄渾不得作小家語如此篇之類最為得體流夜郎贈辛判官昔在長安醉花栁五侯七貴同杯酒氣岸遥凌豪士前風流肯落他人後夫子紅顔我少年章臺走馬著金鞭文章獻納麒麟殿歌舞淹留玳瑁筵與君自謂長如此寧知草動風塵起函谷忽驚胡馬來秦宫桃李向明開我愁逺謫夜郎去何日金雞放赦回中間轉捩處甚健蕭士贇曰向明者向陽花木之義指同時儕類如辛判官之輩因兵興之際不次被用為人桃李我獨遭謫也贈常侍御安石在東山無心濟天下一起振横流功成復瀟灑大賢有巻舒季葉輕風雅匡復屬何人君為知音者傳聞武安將氣振長平瓦燕趙期洗清周秦保宗社登朝若有言為訪南遷賈一往饒清剛之氣贈易秀才少年解長劎投贈即分離何不斷犀象精光暗往時蹉跎君自惜竄逐我因誰地逺虞翻老秋深宋玉悲空摧芳桂色不屈古松姿感激平生意勞歌寄此辭不屑屑排比聲律氣骨清蒼自成髙調空摧芳桂色不屈古松姿所謂冠佩芳澤而昭質未虧露本色處故可諷詠不置經亂離後天恩流夜郎憶舊逰書懐贈江夏韋太守良宰天上白玉京十二樓五城仙人撫我頂結髮受長生誤逐世間樂頗窮理亂情九十六聖君浮雲挂空名天地賭一擲未能忘戰争試渉霸王略將期軒冕榮時命乃大謬棄之海上行學劎翻自哂為文竟何成劎非萬人敵文竊四海聲兒戱不足道五噫出西京臨當欲去時慷慨淚沾纓歎君倜儻才標舉冠羣英開筵引祖帳慰此逺徂征鞍馬若浮雲送余驃騎亭歌鐘不盡意白日落昆明十月到幽州戈鋋若羅星君王棄北海掃地借長鯨呼吸走百川燕然可摧傾心知不得語却欲棲蓬瀛彎弧懼天狼挾矢不敢張攬涕黄金臺呼天哭昭王無人貴駿骨騄耳空騰驤樂毅儻再生於今亦奔亡蹉跎不得意驅馬還貴鄉逢君聽弦歌肅穆坐華堂百里獨太古陶然卧羲皇徵樂昌樂館開筵列壺觴賢豪間青蛾對燭儼成行醉舞紛綺席清歌繞飛梁歡娯未終朝秩滿歸咸陽祖道擁萬人供帳遥相望一别隔千里榮枯異炎涼炎涼㡬度改九土中横潰漢甲連胡兵沙塵暗雲海草木揺殺氣星辰無光彩白骨成丘山蒼生竟何罪函闗壯帝居國命懸哥舒長㦸三十萬開門納兇渠公卿如犬羊忠讜醢與葅二聖出逰豫兩京遂丘墟帝子許專征秉旄控强楚節制非桓文軍師擁熊虎人心失去就賊勢騰風雨惟君固房陵誠節冠終古僕卧香爐頂餐霞潄瑶泉門開九江轉枕下五湖連半夜水軍來潯陽滿旌旃空名適自誤廹脅上樓船徒賜五百金棄之若浮煙辭官不受賞翻謫夜郎天夜郎萬里道西上令人老掃蕩六合清仍為負霜草日月無偏照何由訴蒼昊良牧稱神明深仁恤交道一忝青雲客三登黄鶴樓顧慙禰處士虚對鸚鵡洲樊山霸氣盡寥落天地秋江帯峨眉雪川横三峽流萬舸此中來連帆過揚州送此萬里目曠然散我愁紗窗倚天開水樹緑如髮窺日畏銜山促酒喜得月呉娃與越艷窈窕誇鉛紅呼來上雲梯含笑出簾櫳對客小垂手羅衣舞春風賔跪請休息主人情未極覽君荆山作江鮑堪動色清水出芙蓉天然去雕飾逸興横素襟無時不招尋朱門擁虎士列㦸何森森剪鑿竹石開縈流漲清深登臺坐水閣吐論多英音片辭貴白璧一諾輕黄金謂我不愧君青鳥明丹心五色雲間鵲飛鳴天上來傳聞赦書至却放夜郎廻暖氣變寒谷炎煙生死灰君登鳯池去忽棄賈生才桀犬尚吠堯匈奴笑千秋中夜四五歎常為大國憂旌斾夾兩山黄河當中流連雞不得進飲馬空夷猶安得羿善射一箭落旄頭白之從璘辟也蘇軾辨其由於迫脅論甚平允此篇歴敘交逰始末而白生平踪跡亦略見於此十月到幽州一段盖白自被放後北逰燕趙觀聽形勢知禄山之必叛尾大不掉之害欲言不能述之猶覺痛切至於潼闗失守江陵煽亂與白之為璘所脅受累逺謫無不明如指掌結尾一段慮廟堂之無人憂將帥之不一而賊之不得速平與前遥相照應通篇以交情時勢互為經緯汪洋灝瀚如百川之灌河如長江之赴海卓乎大篇可與北征並峙胡震亨曰太白永王璘一事論者不失之刻即曲為諱失之誣惟蔡寛夫之說為衷其言云太白非從人為亂者盖其學本出縱横以氣俠自任當中原擾攘時欲藉之以立竒功耳其詩曰空名適自誤廹脅上樓船又曰南風一掃胡塵浄西入長安到日邊亦可見其志矣大抵才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父蕭頴士察於未萌斯可矣若其志亦可哀矣斯言也起太白於九原儻亦心服贈漢陽輔錄事鸚鵡洲横漢陽渡水引寒煙沒江樹南浦登樓不見君君今罷官在何處漢口雙魚白錦鱗令傳尺素報情人其中字數無多少祇是相思秋復春煙江風景登樓所見即此發端接出懐人之意最有氣格贈盧司户秋色無逺近出門盡寒山白雲遥相識待我蒼梧間借問盧躭鶴西飛㡬歳還髙調妙於省浄譚元春曰起二句後代清語領此一􅉽贈從弟南平太守之遥少年不得意落魄無安居願隨任公子欲釣吞舟魚常時飲酒逐風景壯心遂與功名疎蘭生谷底人不鋤雲在髙山空巻舒漢家天子馳駟馬赤車蜀道迎相如天門九重謁聖人龍顔一解四海春彤庭左右呼萬歳拜賀明主收沉淪翰林秉筆回英眄麟閣峥嶸誰可見承恩初入銀臺門著書獨在金鑾殿龍駒雕鐙白玉鞍象牀綺席黄金盤當時笑我微賤者却來請謁為交歡一朝謝病逰江海疇昔相知㡬人在前門長揖後門闗今日結交明日改愛君山岳心不移隨君雲霧迷所為夢得池塘生春草使我長價登樓詩别後遥傳臨海作可見羊何共和之炎而附寒而去自是俗情之薄翟公書門殷浩咏詩白何見之晚耶蘭生谷底二句逸韻可賞復有深味末四語用古入化别具清新之致流夜郎半道承恩放還兼欣剋復之美書懐示息秀才黄口為人羅白龍乃魚服得罪豈怨天以愚陷網目鯨鯢未翦滅豺狼屢翻復悲作楚地囚何日秦庭哭遭逢二明主前後兩遷逐去國愁夜郎投身竄荒谷半道雪屯䝉曠如鳥出籠遥欣剋復美光武安可同天子廵劎閣儲皇守扶風揚袂正北辰開襟攬羣雄胡兵出月窟雷破關之東左掃因右拂旋收洛陽宫廻輿入咸京席巻六合通叱咤開帝業手成天地功大駕還長安兩日忽再中一朝讓寳位劎璽傳無窮媿無秋毫力誰念矍鑠翁弋者何所慕髙飛仰㝠鴻棄劎學丹砂臨鑪雙玉童寄言息夫子歳晚陟方蓬引罪自咎無怨尤之心有睠顧之誠不失忠厚本㫖宿清溪主人夜到清溪宿主人碧巖裏簷楹挂星斗枕席響風水月落西山時啾啾夜猨起竒語得自眼前巴陵贈賈舎人賈生西望憶京華湘浦南遷莫怨嗟聖主恩深漢文帝憐君不遣到長沙可謂深婉蕭士贇以此與前篇為非白作觀其氣味非白不辦贈從弟宣州長史昭淮南望江南千里碧山對我行倦過之半落青天外宗英佐雄郡水陸相控帯長川豁中流千里㵼呉會君心亦如此包納無小大揺筆起風霜推誠結仁愛訟庭垂桃李賔館羅軒盖何意蒼梧雲飄然忽相㑹才將聖不偶命與時俱背獨立山海間空老聖明代知音不易得撫劎増感慨當結九萬期中途莫先退陳情贈友人延陵有寳劎價重千黄金觀風歴上國暗許故人深歸來挂墳松萬古知其心懦夫感達節壯士激青衿鮑生薦夷吾一舉置齊相斯人無良朋豈有青雲望臨財不茍取推分固辭讓後世稱其賢英風邈難尚論交但若此友道孰云䘮多君騁逸藻掩映當時人舒文振頽波秉徳冠彛倫卜居乃此地共井為比鄰清琴弄雲月美酒娯冬春薄徳中見損忽之如遺塵英豪未豹變自古多艱辛他人縱以疎君意宜獨親奈何成離居相去復㡬許飄風吹雲霓蔽目不得語投珠冀相報按劎恐相距所思採芳蘭欲贈隔荊渚沈憂心若醉積恨淚如雨願假東壁輝餘光照貧女披露胸懐不作齪齪之態敘􅆾隔處極為微婉得風人之意贈錢徵君少陽白玉一杯酒緑楊三月時春風餘㡬日兩鬢各成絲秉燭唯須飲投竿也未遲如逢渭川獵猶可帝王師登敬亭山南望懐古贈竇主簿敬亭一廻首目盡天南端仙者五六人常聞此逰盤谿流琴髙水石聳麻姑壇白龍降陵陽黄鶴呼子安羽化騎日月雲行翼鴛鸞下視宇宙間四溟皆波瀾汰絶目下事從之復何難百歳落半途前期浩漫漫彊食不成味清晨起長歎願隨子明去錬火燒金丹經亂後將避地剡中留贈崔宣城雙鵝飛洛陽五馬渡江徼何意上東門胡雛更長嘯中原走豺虎烈火焚宗廟太白晝經天頽陽掩餘照王城皆蕩覆世路成奔峭四海望長安嚬眉寡西笑蒼生疑落葉白骨空相弔連兵似雪山破敵誰能料我垂北溟翼且學南山豹崔子賢主人歡娯毎相召胡床紫玉笛却坐青雲叫楊花滿州城置酒同臨眺忽思剡溪去水石逺清妙雪盡天地明風開湖山貌悶為洛生詠醉發呉越調赤霞動金光日足森海嶠獨散萬古意閒垂一溪釣猿近天上啼人移月邊櫂無以墨綬苦來求丹砂要華髮長折腰將貽陶公誚竒辭絡繹行以蒼峭之氣直達所懐絶無長語謝朓驚人此故不減楊慎曰梁虞騫詩落暉散長足細雨織斜文太白亦用其字然其驚人泣鬼則劉勰所謂自鑄偉辭前無古人者乎呉昌祺曰悲壯處亦七哀之遺御選唐宋詩醇巻五
