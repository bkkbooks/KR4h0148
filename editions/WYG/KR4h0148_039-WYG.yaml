  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_039-1a, image: WYG1448/WYG1448-0389c.png}
body:
  text: 襄陽杜甫詩十草閣草閣臨無地柴扉永不闗魚龍迴夜水星月動秋山乆露清初濕髙雲薄未還汎舟慚小婦飄泊損紅顔江上江上日多雨蕭蕭荆楚秋髙風下木葉永夜攬貂裘勲業頻㸔鏡行藏獨倚樓時危思報主衰謝不能休頷聨抑欝無聊却説得如此含蓄宜宋真宗之亟稱之也中夜中夜江山静危樓望北辰長為萬里客有媿百年身故國風雲氣髙堂戰伐塵胡鶵負恩澤嗟爾太平人江漢江漢思歸客乾坤一腐儒片雲天共逺永夜月同孤落日心猶壯秋風病欲疎古來存老馬不必取長途趙汸曰中四句情景混合入化胡應麟曰含濶大於沉深髙岑瞠乎其後吾宗原注衛倉曹崇簡吾宗老孫子質朴古人風耕鑿安時論衣冠與世同在家常早起憂國願年豐語及君臣際經書滿腹中胡應麟曰寓神竒於古澹儲孟莫能為前有歎壯心久零落白首寄人間天下兵常鬭江東客未還窮猿號雨雪老馬怯闗山武徳開元際蒼生豈重攀有慨乎其言之是為匪風下泉之緒中宵西閣百尋餘中宵步綺疏飛星過水白落月動沙虚擇木知幽鳥潛波想巨魚親朋滿天地兵甲少來書頷聨名雋比之月映清淮之句真復相似南極南極青山衆西江白谷分古城疏落木荒戍宻寒雲嵗月蛇常見風颷虎或聞近身皆鳥道殊俗自人羣睥睨登哀柝矛弧照夕曛亂離多醉尉愁殺李將軍獨坐白狗斜臨北黄牛更在東峽雲常照夜江月㑹兼風曬藥安垂老應門試小童亦知行不逮苦恨耳多聾逺遊江濶浮髙棟雲長出斷山塵沙連越嶲風雨暗荆蠻雁矯銜蘆内猿啼失木間弊裘蘇季子歴國未知還情致纒綿却有寛閒之意夜露下天髙秋水清空山獨夜旅魂驚疎燈自照孤㠶宿新月猶懸雙杵鳴南菊再逢人卧病北書不至雁無情步檐倚杖㸔牛斗銀漢遥應接鳳城宛轉闗生渾然無迹范杼曰善詩者就景中寫意不於意中尋景如杜詩無端落葉蕭蕭下踈燈自照孤帆宿殊方落日元猿哭諸聨即景物之中含蓄多少愁恨意若説出便短淺矣返照楚王宫北正黄昏白帝城西過雨痕返照入江翻石壁歸雲擁樹失山村衰年肺病唯髙枕絶塞愁時早閉門不可久留豺虎亂南方實有未招魂日暮牛羊下來乆各巳閉柴門風月自清夜江山非故園石泉流暗壁草露滴秋根頭白燈明裏何湏花燼繁八月十五夜月二首滿目飛明鏡歸心折大刀轉蓬行地逺攀桂仰天髙水路疑霜雪林棲見羽毛此時瞻白􅇠直欲數秋毫起句突兀可謂工於發端稍下巫山峽猶銜白帝城氣沉全浦暗輪仄半樓明刁斗皆催曉蟾蜍且自傾張弓倚殘魄不獨漢家營十六夜翫月舊把金波爽皆傳玉露秋闗山隨地濶河漢近人流谷口樵歸唱孤城笛起愁巴童渾不寢半夜有行舟胡應麟曰咏物起自六朝唐初沿襲雖風華競爽而獨造未聞唯杜公諸作自開堂奥盡削前規如咏月則闗山隨地濶河漢近人流咏雨則野徑雲俱黒江船火獨明咏雪則暗度南樓月寒深北渚雲咏夜則重露成涓滴稀星乍有無皆精深竒䆳前無古人十七夜翫月秋月仍圓夜江村獨老身捲簾還照客倚杖更隨人光射潛虬動明翻宿鳥頻茅齋依橘柚清切露華新李因篤曰只仍圓夜三字説十七夜巳足再添便為俗筆月四更山吐月殘夜水明樓塵匣元開鏡風簾自上鈎􅇠應疑鶴髪蟾亦戀貂裘斟酌姮娥寡天寒奈九秋起聨之妙不可形容東坡稱為絶唱不虚也姚寛曰塵匣二句本沈雲卿月詩臺前疑挂鏡簾外自懸鈎之句雨㣲雨不滑道斷雲疎復行紫崖奔處黒白鳥去邉明秋日新霑影寒江舊落聲柴扉臨野碓半得搗香秔黄生曰前半不煩繩削後半極力經營自起句外止霑影二字著雨其餘俱是襯説此文家避實擊虚法也楚雨石苔滋京華消息遲山寒青兕呌江晚白鷗飢神女花鈿落鮫人織杼悲繁憂不自整終日灑如絲夜絶岸風威動寒房燭影微嶺猿霜外叫江鳥夜深飛獨立親雄劍哀歌嘆短衣煙塵繞閶闔白首壯心違反照反照開巫峽寒空半有無己低魚復暗不盡白鹽孤荻岸如秋水松門似畫圖牛羊識僮僕既夕應傳呼物色在有無之間可謂善於寫照向夕畎畆孤城外江村亂水中深山催短景喬木易髙風鶴下雲汀近鷄棲草屋同琴書㪚明燭長夜始堪終深情畢露三四用字體物入㣲曉望白帝更聲盡陽臺曙色分髙峯寒上日疊嶺宿霾雲地坼江帆隠天清木葉聞荆扉對麋鹿應共爾為羣李因篤曰寫景最工天清木葉聞更為㣲妙雷巫峽中宵動滄江十月雷龍虵不成蟄天地劃争迴却碾空山過深蟠絶壁來何湏妬雲雨霹靂楚王臺熟食日示宗文宗武消渇㳺江漢羈棲尚甲兵㡬年逢熟食萬里逼清明松栢邙山路風花白帝城汝曹催我老迴首淚縱横不著一字悲感無窮惟真故妙耳社日陳平亦分肉太史竟論功今日江南老他時渭北童歡娛㸔絶塞涕淚落秋風鴛鷺迴金闕誰憐病峽中仇兆鰲曰慨古傷情其自負原不淺也九日重陽獨酌盃中酒抱病起登江上臺竹葉於人既無分菊花從此不湏開殊方日落𤣥猿哭舊國霜前白雁來弟妹蕭條各何往干戈衰謝兩相催悲塞矣而聲情髙亮後人九日詩無及之者黄生曰岑參詩云見雁思鄉信聞猿積淚痕與五六意同而此之融㑹藴藉更過彼十字也大歴二年九月三十日為客無時了悲秋向夕終瘴餘䕫子國霜薄楚王宫草敵虚嵐翠花禁冷蘂紅年年小揺落不與故園同黄生曰題作特書之體記為客之嵗月便自具文見意浦起龍曰起法跳脱小至天時人事日相催冬至陽生春又來刺繡五紋添弱線吹葭六琯動飛灰岸容待臘將舒栁天意衝寒欲放梅雲物不殊鄉國異教兒且覆掌中杯憶鄭南玭鄭南伏毒寺瀟灑到江心石影銜珠閣泉聲帶玉琴風杉曽曙倚雲嶠憶春臨萬里滄浪外龍蛇只自深五六可謂鬆秀晴烟沙苑樹曉日渭川帆雖佳猶為習見語仇兆鰲曰吳若注云玭疑作玼玉色鮮潔也按鄭南華州鄭縣之南詳詩意只是憶鄭南寺舊遊耳愁原注强戲為吳體江草日日喚愁生巫峽泠泠非世情盤渦鷺浴底心性獨樹花發自分明十年戎馬暗萬國異域賔客老孤城渭水秦山得見否人今罷病虎縱横黄生曰沈憂莫寫對物生憎皆是愁人實歴之境草生花發水流鷺浴皆喚愁之具愁從中來㣲物之故則亦强戲言之而己即事暮春三月巫峽長皛皛行雲浮日光雷聲忽送千峯雨花氣渾如百和香黄鶯過水翻迴去燕子銜泥濕不妨飛閣捲簾圖畫裏虚無只少對瀟湘即事天畔羣山孤草亭江中風浪雨冥冥一雙白魚不受釣三寸黄甘猶自青多病馬卿無日起窮途阮籍㡬時醒未聞細栁散金甲腸斷秦川流濁涇朱瀚曰孤亭風雨不免有長鋏之歎喜觀即到復題短篇二首巫峽千山暗終南萬里春病中吾見弟書到汝為人意答兒童問來經戰伐新泊船悲喜後欵欵話歸秦三四語自𠂻發本色到家待爾嗔烏鵲抛書示鶺鴒枝間喜不去原上急曽經江閣嫌津栁風㠶數驛亭應論十年事愁絶始星星第五弟豐獨在江左近三四載寂無消息覔使寄此二首亂後嗟吾在羈棲見汝難草黄騏驥病沙晚鶺鴒寒楚設闗城險吳吞水府寛十年朝夕淚衣袖不曽乾聞汝依山寺杭州定越州風塵淹别日江漢失清秋影著啼猿樹魂飄結蜃樓明年下春水東盡白雲求舎弟觀赴藍田取妻子到江陵喜寄馬渡秦闗雪正深北來肌骨苦寒侵他鄉就我生春色故國移居見客心剰欲提携如意舞喜多行坐白頭吟廵簷索共梅花笑冷蘂疎枝半不禁盧世㴶曰次聨還題明凈而意更温深黄生曰浣花溪裏花饒笑肯信吾兼吏隠名言其不信巳𠂻廵簷索共梅花笑冷蘂疎枝半不禁言其善會人意此嚴滄浪所謂詩有别趣非闗理也陪栢中丞觀宴將士繡叚裝簷額金花帖鼓腰一夫先舞劍百戯後歌樵江樹城孤逺雲臺使寂寥漢朝頻選將應拜霍嫖姚得第三聨方見風格非尋常公宴語也七月一日題終明府水樓宓子彈琴邑宰日終軍棄繻英妙時承家節操尚不泯為政風流今在茲可憐賔客盡傾葢何處老翁來賦詩楚江巫峽半雲雨清簟疎簾㸔奕碁蘇軾曰參寥子言老杜詩云楚江巫峽半雲雨清簟踈簾㸔奕碁此句可畫但恐畫不就耳僕言公禪人亦復愛此綺語耶寥云譬如不事口腹人見江瑶柱豈免一朶頥哉季秋蘇五弟纓江樓夜宴崔十三評事韋少府姪峽險江驚急樓髙月逈明一時今夕㑹萬里故鄉情星落黄姑渚秋辭白帝城老人因酒病堅坐㸔君傾過客相尋窮老真無事江山巳定居地幽忘盥櫛客至罷琴書挂壁移筐果呼兒問煮魚時聞繫舟楫及此問吾廬孟倉曹步趾領新酒醬二物滿器見遺老夫楚岸通秋屐胡牀面夕畦藉糟分汁滓甕醬落提擕飯糲添香味朋來有醉泥理生那免俗方法報山妻二詩本色愛其涉筆成趣饒有逸致栁司馬至有使歸三峽相過問兩京函闗猶出將渭水更屯兵設備邯鄲道和親邏些城幽燕唯鳥去商洛少人行衰謝身何補蕭條病轉嬰霜天到宫闕戀主寸心明黄鶴曰大歴二年九月十月京師以吐蕃入冦兩戒嚴故作此詩謁真諦寺禪師蘭若山髙處烟霞嶂㡬重凍泉依細石晴雪落長松問法㸔詩妄觀身向酒慵未能割妻子卜宅近前峯三四與泉聲咽危石一聨相似特意近自然耳送李八秘書赴杜相公幕青簾白舫益州來巫峽秋濤天地迴石出倒聴楓葉下櫓揺背指菊花開貪趨相府今晨發恐失佳期後命催南極一星朝北斗五雲多處是三台寫楓葉菊花語極工細送李功曹之荆州充鄭侍御判官重贈曽聞宋玉宅每欲到荆州此地生涯晚遥悲水國秋孤城一柱觀落日九江流使者雖光彩青楓逺自愁孟浩然擅名之句贈送中乃有其氣象見螢火巫山秋夜螢火飛簾疎巧入坐人衣忽驚屋裏琴書冷復亂簷前星宿稀却繞井欄添箇箇偶經花蘂弄輝輝滄江白髪愁㸔汝來嵗如今歸未歸結聨㸃入見字便覺通體皆活吹笛吹笛秋山風月清誰家巧作斷腸聲風飄律吕相和切月傍闗山㡬處明胡騎中宵堪北走武陵一曲想南征故園楊栁今揺落何得愁中却盡生吞吐含芳安詳合度極頓挫之妙而髙雅絶人明人何景明七律全本此種千載而下固有合續弦膠者也孤雁孤雁不飲啄飛鳴聲念羣誰憐一片影相失萬重雲望盡似猶見哀多如更聞野鵶無意緒鳴噪自紛紛師氏曰鮑當孤雁詩云更無聲斷續空有影相隨孤則孤矣豈若此詩孤之中仍有不孤之意乎白小白小羣分命天然二寸魚細㣲霑水族風俗當園蔬入肆銀花亂傾箱雪片虚生成猶拾卵盡取意何如王嗣奭曰此詩起結藹然有萬物一體之念鹿永與清溪别䝉將玉饌俱無才逐仙隠不敢恨庖厨亂世輕全物微聲及禍樞衣冠兼盜賊饕餮用斯湏顧宸曰中郎之於董卓中散之於司馬及禍雖異其以㣲聲致累則同也茍全性命於亂世不求聞達於諸侯隆中所以獨髙千古二語感慨甚大見王監兵馬使説近山有白黒二鷹羅者乆取竟未能得王以為毛骨有異他鷹恐臘後春生鶱飛避暖勁翮思秋之甚眇不可見請余賦詩雪飛玉立盡清秋不惜竒毛恣逺遊在野只教心力破干人何事網羅求一生自獵知無敵百中争能恥下鞲鵬礙九天湏却避免藏三穴莫深憂儼然為異人寫照竒傑之士亦復干人何事國家必求之者有以取之也使負其岸異而不就網羅亦終無用於世此詩引而伸之義可旁通知此可與言詩王嗣奭曰氣魄雄偉不落纎巧家數朱鶴齡曰太白詩神鷹夢澤不顧䲭鳶為君一擊鵬搏九天義與此同大歴三年春白帝城放船出瞿唐峽乆居䕫府將適江陵漂泊有詩凡四十韻老向巴人裏今辭楚塞隅入舟翻不樂解纜獨長吁窄轉深啼狖虚隨亂浴鳬石苔凌几杖空翠撲肌膚疊壁排霜劍奔泉濺水珠杳㝠藤上下濃淡樹榮枯神女峯娟妙昭君宅有無曲留明怨惜夢盡失歡娛擺闔盤渦沸欹斜激浪輸風雷纒地脉氷雪耀天衢鹿角真走險狼頭如跋胡惡灘寧變色髙卧負微軀書史全傾撓裝囊半壓濡生涯臨臬兀死地脱斯湏不有平川決焉知衆壑趨乾坤霾漲海雨露洗春蕪鷗鳥牽絲颺驪龍濯錦紆落霞沉緑綺殘月壊金樞泥笋苞初荻沙茸出小蒲雁兒争水馬燕子逐檣烏絶島容烟霧環洲納曉晡前聞辨陶牧轉眄拂宜都縣郭南畿好原注路入松滋縣津亭北望孤勞心依憇息朗詠劃昭蘇意遣樂還笑衰迷賢與愚飄蕭將素髪汨沒聴洪鑪丘壑曽忘返文章敢自誣此生遭聖代誰分哭窮途卧疾淹為客䝉恩早厠儒廷争酬造化樸直乞江湖灧澦險相迫滄浪深可逾浮名尋已巳懶計却區區喜近天皇寺先披古畫圖原注此寺有晉右軍書張僧繇􅀞孔子泊顔子十哲形像應經帝子渚同泣舜蒼梧朝士兼戎服君王按湛盧旄頭初俶擾鶉首麗泥塗甲卒身雖貴書生道固殊出塵皆野鶴歴塊匪轅駒伊吕終難降韓彭不易呼五雲髙太甲六月曠摶扶回首黎元病争權將帥誅山林託疲苶未必免﨑嶇處處刻劃間以情思其體則班彪潘岳之征行其情則王粲之登樓也隊仗整肅骨力雄健長律最可學者泊松滋江亭紗㡌隨鷗鳥扁舟繫此亭江湖深更白松竹逺㣲青一柱全應近髙唐莫再經今宵南極外甘作老人星行次古城店汎江作不揆鄙拙奉呈江陵幕府諸公老年常道路遲日復山川白屋花開裏孤城麥秀邉濟江元自濶下水不勞牽風蝶勤依槳春鷗懶避船王門髙徳業幕府盛才賢行色兼多病蒼茫汎愛前風蝶一聨寫物色何其新雋書堂飲既夜復邀李尚書下馬月下賦絶句湖月林風相與清殘尊下馬復同傾乆􅂸野鶴如霜鬢遮莫鄰鷄下五更野鶴如霜鬢正云霜鬢似野鶴如前云黄鵠髙於五尺童化為白鳬似老翁正云五尺童髙如黄鵠化為老翁似白鳬耳此詩家用筆之妙舟月對驛近寺更深不假燭月朗自明船金刹青楓外朱樓白水邉城烏啼眇眇野鷺宿娟娟皓首江湖客鈎簾獨未眠以四句了題舟夜遣懐詞意清麗乃爾江南逢李龜年岐王宅裏尋常見崔九堂前㡬度聞正是江南好風景落花時節又逢君言情在筆墨之外悄然數語可抵白氏一篇琵琶行矣休唱貞元供奉曲當時朝士己無多劉禹錫之婉情鈿蟬金雁皆零落一曲伊州淚萬行温庭筠之哀調以彼方此何其超妙此千秋絶調也黄生曰此詩與劍器行同意今昔盛衰之感言外黯然欲絶見風韻於行間寓感慨於字裏即使龍標供奉操筆亦無以過乃知公於此體非不能為正聲也官亭夕坐戯簡顔十少府南國調寒杵西江浸日車客愁連蟋蟀亭古帶蒹葭不返青絲鞚虚燒夜燭花老翁湏地主細細酌流霞清麗奪目可謂老樹著花暮歸霜黄碧梧白鶴棲城上擊柝復烏啼客子入門月皎皎誰家搗練風淒淒南渡桂水闕舟檝北歸秦川多鼓鞞年過半百不稱意明日㸔雲還杖藜盧世㴶曰全首矯秀無一㸃悲愁溽氣讀去如竹枝樂府七言律中散仙也公安送韋二少府匡贊逍遥公後世多賢送爾維舟惜此筵念我能書數字至將詩不必萬人傳時危兵甲黄塵裏日短江湖白髪前古往今來皆涕淚斷腸分手各風煙公安縣懷古野曠吕䝉營江深劉備城寒天催日短風浪與雲平灑落君臣契飛騰戰伐名維舟倚前浦長嘯一含情黄生曰章法最整公安送李二十九弟晉肅入蜀余下沔鄂正解柴桑纜仍㸔蜀道行檣烏相背發塞雁一行鳴南紀連銅柱西江接錦城憑將百錢卜飄泊問君平宴王使君宅汎愛容霜髪留歡上夜闗自吟詩送老相勸酒開顔戎馬今何地鄉園獨舊山江湖墮清月酩酊任扶還英華辯証世傳杜子美不避家諱兩押閑字其實非也或改作夜䦨又不在本韻卞圜集杜詩自是留歡上夜闗葢有投轄之意上字訛為卜下字訛為閑耳泊岳陽城下江國踰千里山城僅百層岸風翻夕浪舟雪灑寒燈留滯才難盡艱危氣益増圖南未可料變化有鯤鵬登岳陽樓昔聞洞庭水今上岳陽樓吳楚東南坼乾坤日夜浮親朋無一字老病有孤舟戎馬闗山北憑軒涕泗流元氣渾淪不可凑泊千古絶唱劉㑹孟曰氣壓百代為五言雄渾之絶唐庚曰子美岳陽樓詩不過四十字耳其氣象閎放涵蓄深逺殆與洞庭争雄所謂富哉言乎者仇兆鰲曰金玉詩話云洞庭天下壯觀自昔騷人墨客鬬麗搜竒者尤衆然莫若氣蒸雲夢澤波撼岳陽城則洞庭空曠無際雄壯如在目前至讀杜子美詩則又不然吳楚東南坼乾坤日夜浮不知少陵胸中吞㡬雲夢也方回曰嘗登岳陽樓左序毬門壁間大書孟詩右書杜詩後人不敢復題劉長卿云疊浪浮元氣中流沒太陽世不甚傳他可知矣陪裴使君登岳陽樓湖濶兼雲霧樓孤屬晚晴禮加徐孺子詩接謝宣城雪岸叢梅發春泥百草生敢違漁父問從此更南征宿青草湖洞庭猶在目青草續為名宿槳依農事郵籖報水程寒氷争倚薄雲月遞微明湖雁雙雙起人來故北征宿白沙驛氷宿仍餘照人煙復此亭驛邉沙舊白湖外草新青萬象皆春氣孤槎自客星隨波無限月的的近南溟萬象皆春氣五字濶大中有實在處精神正在一句湘夫人祠肅肅湘妃廟空墻碧水春蟲書玉佩蘚燕舞翠帷塵晚泊登汀樹微馨借渚蘋蒼梧恨不盡染淚在叢筠王嗣奭曰臣望君不啻妻望夫蒼梧之恨不為夫人發也祠南夕望百丈牽江色孤舟泛日斜興來猶杖屨目斷更雲沙山鬼迷春竹湘娥倚暮花湖南清絶地萬古一長嗟秀色中含老氣何景明之淵源也歸雁聞道今春雁南歸自廣州見花辭漲海避雪到羅浮是物闗兵氣何時免客愁年年霜露隔不過五湖秋黄生曰五六本屬結意却作中聨矯變異常入喬口漠漠舊京逺遲遲歸路賖殘年傍水國落日對春華樹蜜早蜂亂江泥輕燕斜賈生骨巳朽悽惻近長沙江閣對雨有懷行營裴二端公南紀風濤壯隂晴屢不分野流行地日江入度山雲層閣憑雷殷長空靣水文雨來銅柱北應洗伏波軍千秋節有感二首自罷千秋節頻傷八月來先朝常宴㑹壯觀巳塵埃鳳紀編生日龍池塹刼灰湘川新涕淚秦樹逺樓臺寳鏡羣臣得金吾萬國迴衢尊不重飲白首獨餘哀御氣雲樓敞含風綵仗髙仙人張内樂王母獻宫桃羅襪紅蕖艷金羈白雪毛舞階銜壽酒走索背秋毫聖主他年貴邉心此日勞桂江流向北滿眼送波濤極哀樂之情包理亂之故妙有含蓄登舟將適漢陽春宅棄汝去秋帆催客歸庭蔬尚在眼浦浪己吹衣生理飄蕩拙有心遲暮違中原戎馬盛逺道素書稀塞雁與時集檣烏終嵗飛鹿門自此往永息漢隂機舟中夜雪有懷盧十四侍御弟朔風吹桂水朔雪夜紛紛暗度南樓月寒深北渚雲燭斜初近見舟重竟無聞不識山隂道聴鷄更憶君遂為咏雪粉本賦物如此乃能使氣格超勝黄生曰不摹雪之狀而寫雪之神此化工之筆樓上天地空搔首頻抽白玉簮皇輿三極北身事五湖南戀闕勞肝肺論材媿杞柟亂離難自救終是老湘潭浦起龍曰聲情激越送魏二十四司直充嶺南掌選崔郎中判官兼寄韋韶州選曹分五嶺使者歴三湘才美膺推薦君行佐紀綱佳聲期共逺雅節在周防明白山濤鑒嫌疑陸賈裝故人湖外少春日嶺南長憑報韶州牧新詩昨寄將忠告欵欵得古人贈言之義凡為使者當書紳佩之燕子來舟中作湖南為客動經春燕子銜泥兩度新舊入故園常識主如今社日逺㸔人可憐處處巢君室何異飄飄託此身暫語船檣還起去穿花落水益霑巾盧世㴶曰比物連類有身世無窮之感却又一字不説出讀之但覺滿紙是淚歸雁二首萬里衡陽雁今年又北歸雙雙瞻客上一一背人飛雲裏相呼疾沙邉自宿稀繫書元浪語愁寂故山薇欲雪違胡地先花别楚雲却過清渭影髙起洞庭羣塞北春隂暮江南日色曛傷弓流落羽行斷不堪聞楚調悽然深情無限小寒食舟中作佳辰强飯食猶寒隠几蕭條帶鶡冠春水船如天上坐老年花似霧中㸔娟娟戲蝶過閒幔片片輕鷗下急湍雲白山青萬餘里愁㸔直北是長安黄庭堅曰船如天上坐人似鏡中行船如天上坐魚似鏡中懸此沈雲卿詩也老杜此詩第三句乃祖述佺期語次句葢觸類而長之也顧宸曰詩眼謂公詩多本沈語無一字無來歴余謂少陵所以獨立千古者不在有所本也讀書破萬巻偶拈來即是耳詩三百篇豈必有所本哉清明此身飄泊苦西東右臂偏枯半耳聾寂寂繫舟雙下淚悠悠伏枕左書空十年蹴踘將雛逺萬里鞦韆習俗同旅雁上雲歸紫塞家人鑽火用青楓秦城樓閣煙花裏漢主山河錦繡中風水春來洞庭濶白蘋愁殺白頭翁風致自足氣亦逸宕何可妄加訾議發潭州夜醉長沙酒曉行湘水春岸花飛送客檣燕語留人賈傳才未有褚公書絶倫髙名前後事迴首一傷神楊慎丹鉛録以此頷聨為賈島逸句所本然在杜集亦尋常句耳郊島輩非無警句而氣體寒餒以視李杜大家真類蟲吟草間矣聞惠二過東溪特一送惠子白駒瘦歸溪惟病身皇天無老眼空谷滯斯人崖蜜松花熟山杯竹葉新柴門了無事黄綺未稱臣洪芻曰劉路左車言嘗收得唐人雜編詩册有老杜送惠二歸故居詩即此也舟泛洞庭蛟室圍青草龍堆擁白沙䕶江盤古木迎櫂舞神鵶破浪南風正收颿畏日斜雲山千萬疊底處上仙槎一氣湧出筆筆老健非子美不能辦也王直方曰此老杜過洞庭湖詩也潘淳云元豐中有人得此詩刻於洞庭湖中不載名氏以示山谷曰子美作也今蜀本己收入遣憂亂離知又甚消息苦難真受諫無今日臨危憶古人紛紛乗白馬攘攘著黄巾隋氏留宫室焚燒何太頻吳曽曰唐顧陶大中丙子嵗編唐詩類選載此詩世所傳本杜集皆無之巴西聞收宫闕送班司馬入京聞道收宗廟鳴鑾自陜歸傾都㸔黄屋正殿引朱衣劍外春天逺巴西勅使稀念君經世亂匹馬向王畿鄭繼之曰詩之妙處正在不必寫到真説到盡而其欲寫欲説者自宛然可想斯得風人之義此詩有不真不盡之興矣去蜀五載客蜀郡一年居梓州如何闗塞阻轉作瀟湘遊世事己黄髪殘生隨白鷗安危大臣在不必淚長流錢謙益曰二篇朝奉大夫員安宇所收御選唐宋詩醇巻十八
