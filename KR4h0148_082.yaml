front:
  text: 欽定四庫全書御選唐宋詩醇巻四十
  hash: sha256:1ae09551407a814c421ffcf07ff6f2667ab5562aa8c14ba5c365ce3023474ee4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_082-1a, image: WYG1448/WYG1448-0779a.png}
body:
  text: 眉山蘇軾詩九目錄次韻穆父尚書侍祠郊丘瞻望天光退而相慶引滿醉吟郊祀慶成詩僕所藏仇池石希代之寳也王晉卿以小詩借觀意在於奪不敢不借然以此詩先之晉卿示詩欲奪海石錢穆父王仲至蔣頴叔皆次韻穆至二公以為不可許獨頴叔不然今日頴叔見訪親覩此石之妙遂悔前語僕以謂晉卿豈可終閉不予者若能以韓幹二散馬易之者盖可許也復次前韻欲以石易畫晉卿難之穆父欲兼取二物頴叔欲焚畫碎石乃復次前韻并解二詩之意生日劉景文以古畫松鶴為夀且貺佳篇次韻為謝程徳孺惠海中柏石兼辱佳篇輙復和謝送蔣頴叔帥熈河次韻吴傳正枯木歌送范中濟經畧侍郎分韻賦詩得先字且贈以魚枕杯四馬箠一以元戎十乗以先啟行為韻書晁說之考牧圖後七年九月自廣陵召還復館於浴室東堂八年六月乞㑹稽將去汶公乞詩乃復用前韻三首東府雨中别子由書丹元子所示李太白真次韻滕大夫雪浪石鶴歎子由生日以檀香觀音像及新合印香銀篆槃為夀一首過髙郵寄孫君孚慈湖夾阻風五首錄四首過廬山下壺中九華詩秧馬歌八月七日初入贑過惶恐灘鬱孤臺廉泉塵外亭天竺寺月華寺碧落洞峽山寺舟行至清逺縣見顧秀才極談惠州風物之美廣州蒲澗寺浴日亭游羅浮山一首示兒子過十月二日初到惠州白水山佛跡巖十一月二十六日松風亭下梅花盛開新釀桂酒江郊正月二十四日與兒子過賴仙芝王原秀才僧曇潁行全道士何宗一同遊羅浮道院及栖禪精舎過作詩和其韻寄邁迨一首贈王子直秀才遊博羅香積寺連雨漲江二首四月十一日初食荔支六月十二日酒醒步月理髪而寢荔支歎
