  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_097-1a, image: WYG1448/WYG1448-0925a.png}
body:
  text: 山陰陸遊詩六春遊春風堤上草萋萋草軟沙平護馬蹄似蓋微雲才障日如絲細雨不成泥千秋觀裏逢新燕九里山前聽午雞追憶舊遊愁滿眼綵船曾繫畫橋西三月二十日兒輩出謁孤坐北窗園林春已空陂巷雨新足泥深黃犢健桑老紫椹熟豐年逋負少村舍壓酒肉微風吹醉醒起和飯牛曲朴直有味西村亂山深處小桃源往歲求漿憶叩門高柳簇橋初轉馬數家臨水自成村茂林風送幽禽語壞壁苔侵醉墨痕一首清詩記今夕細雲新月耿黃昏湖塘晚眺緑樹暗村墟青山繞草廬奉祠神禹舊馳道曓秦餘浦色沉煙網畦聲入雨鉏清秋又如許幽憤若為攄病起間無事時來古渡頭煙中賣魚市月下采蓮舟帆鼓娥江晚菱歌姥廟秋長吟無傑句聊以散吾愁氣體高妙在盛中之間秋夜老病睡眠少如斯秋夜何長庚未配月織女己斜河莎徑蟲吟苦柴門葉落多誰知窮寧戚不作飯牛歌漁父千錢買一舟百錢買兩槳朝看潮水落暮看潮水長持魚換鹽酪縣郭時下上亦或得濁醪不復計瓦盎浩歌忘遠近醉夢墮莾蒼元真不可逢悠然寄遐想梅市梅市柯山小繫船開篷驚起醉中眠橋橫風柳荒寒外月墮煙鐘縹渺邊客思况經孤驛路詩情又入早秋天如今老病知何恨判斷江山六十年清和宛轉可謂物理俱美情致兼深矣盧世㴶曰是雲林寫景郭西鵲下川原黑船行浦溆空橋燈搖水影樓角散天風野眺飛埃外漁歌冷翠中不須嘲病翼要是脫樊籠柳橋晚眺小浦聞魚躍橫林待鶴歸間雲不成雨故傍碧山飛有手揮目送之趣秋社雨餘殘日照庭槐社鼓鼕鼕賽廟回又見神盤分肉至不堪沙雁帶寒來書因忌作間終日酒為治聾醉一杯記取鏡湖無限景蘋花零落蓼花開村舍生理嗟彌薄吾居久未完蝶飛窗紙碎龜坼壁泥乾小雨牛欄濕微霜碓舍寒晚禾蟲獨少鄰里共相寬原注今年晚禾苦蟲蛀豫鄉獨免潘問竒曰生創不肯蹈襲一字秋日雜詠菰蒲風起暮蕭蕭煙斂林踈見斷橋白蟹鰶魚初上市輕舟無數去乘潮竹枝遺調小立紅樹園廬晚碧花籬落秋荒陂船護鴨斷岸笛呼牛酒賤村村醉山寒寺寺幽聊須岸烏幘小立埭西頭秋晚湖上已過西成賽廟期家家下麥不容遲夕陽遍野人歸後秋水生灘鷺集時靈藥不治懷抱惡好詩空益鬢毛衰從來未識蘇司業愁絶西風滿酒旗結句善於運化有縹眇之韻雨後至近村夜雨曉方止朝雲猶作陰山餘一寸碧溪長半篙深卧泛白鷗渚行穿黃葉林老農能共語真率會人心題嚴州王秀才山水枕屏我行天下路幾何三巴小益山最多翠崖青嶂高嵯峨紅棧如帶縈巖阿下有駭浪千盤渦一跌性命委蛟鼉日馳三百一烏騾雪壓披氊泥滿鞾驛亭沃酒醉臉酡長笛腰鼓雜巴歌大散關上方橫戈豈料世變如翻波東歸輕舟下江沱回首歲月悲蹉跎壯君落筆寫岷嶓意匠自到非身過偉哉千仞天相摩谷裏人家藏緑蘿使我恍然越關河熟視粉墨頻摩挲鏗然徹耳煥然奪目意匠自到非身過尤有妙理追憶征西幕中舊事小獵南山雪未消繡旗斜卷玉驄驕不如意事常千萬空想先鋒宿渭橋昨夜王師戍隴回遺民日夜望行臺不論夾道壺漿滿洛筍河魴次第來原注在南鄭時關中將吏有獻此二物者解嘲一壑棲遲久多生習氣消行藏無愧怍夢覺兩逍遙倩鶴傳春信疏泉洗藥苗晚來幽興極乘月過西橋讀史民間斗米兩三錢萬里耕桑罷戍邊常使屏風寫無逸應無烽火照甘泉保泰持盈之指借明皇發之不落言詮自近風雅遣興家住城南剡曲傍門前山色蘸湖光三朝執戟悲年往二頃扶犂樂歲穰名姓已隨身共隱文辭終與道相妨子孫勉守東臯業小甑吳粳底樣香方回曰五六議論最妙送子龍赴吉州掾我老汝遠行知汝非得已駕言當送汝揮涕不能止人誰樂離别坐貧至於此汝行犯胥濤次第過彭蠡波橫吞舟魚林嘯獨腳鬼野飯何店炊孤棹何岸檥判司比唐時猶幸免笞箠庭參亦何辱負職乃可恥汝為吉州吏但飲吉州水一錢亦分明誰能肆讒毁聚俸嫁阿惜擇士教元禮我食可自營勿用念甘旨衣穿聽露肘履破從見指出門雖被嘲歸舍却睡美益公名位重凛若喬嶽峙汝以通家故或許望燕几得見已足榮切勿有所啓又若楊誠齋清介世莫比一聞俗人言三日歸洗耳汝但問起居餘事勿挂齒希周有世好敬叔乃鄉里豈惟能文辭實亦堅操履相從勉講學事業在積纍仁義本何常蹈之則君子汝去三年歸我儻未即死江中有鯉魚頻寄書一紙以韻語作訓詞真情極切自然成文朴茂渾堅大家本領正月五日出遊久作間人不慣愁新春天氣更清柔未為遼海千年别且繼斜川五日遊細栁拂頭穿野徑落梅黏袖上漁舟此身定去神仙近倚遍江南賣酒樓初春雜興水長鷗初泛山寒茗未芽深林聞杜鼓落日照漁家渡遠呼船久橋傾取路斜客愁慵遠眺不是怯風沙方回曰八句皆佳而二四尤古逺老病倦遊陟偶尋溪友期殘氷擁魚笱新暖入桑枝山崦巨然畫煙村摩詰詩何人為收拾愧我不能竒杜叔高秀才雨雪中相過留一宿而别誦此詩送之久客方知行路難關山無際水漫漫風吹欲倒孤城遠雪落如篩野寺寒暮挈衣囊投土室晨沽村酒挂驢鞍文章一字無人識胸次徒勞萬卷蟠用篩字新異可喜村居書喜紅橋梅市曉山橫白塔樊江春水生花氣襲人知驟暖鵲聲穿樹喜新晴坊場酒賤貧猶醉原野泥深老亦耕最喜先期官賦足經年無吏叩柴荆别嚴和之器之魂逝已難招尚有和之慰寂寥今夜月明空歎息想君孤棹泊溪橋舟中作晤語無人與遣愁出門聊復弄輕舟山穿煙雨參差出水赴陂塘散漫流隔葉雌雄鳴谷鳥傍林子母過吳牛數家清絶如圗畫炊黍何妨得小留盧世㴶曰寫景間雅夏初湖村雜題嫩日輕風夏未深曲廊倚杖得間吟地偏草茂無人迹一對茭雞下緑陰書直舍壁道山西下路杳杳歷重廊地寂聞傳漏簾踈有斷香渠清水馬健屋老瓦松長欲出重欹枕無何覔故鄉方回曰水馬瓦松詩人罕用此聨可喜謝韓實之直閣送燈玉作華星綴絳繩樓臺交映暮天澄東都父老今誰在腸斷當時諫浙燈盧世㴶曰詩自謝燈意别有在張完臣曰無限感慨觸物而流蘇軾諫浙燈劄子伏見中使傳宣下府市司買浙燈四千餘盞有司具實直以聞陛下又令減價收買見已盡數拘收禁止私買以須上令臣始聞之驚愕不信咨嗟纍日竊為陛下惜此舉動也直舍獨坐思成都錦城花絮送吳船屈指東歸又幾年羣玉峰頭花老矣百花潭上夢依然青衫尚記稱狂客白髮寧知作老仙所恨酒腸非復昔間遊空負杖頭錢出城東並江而歸上車容假寐出郭當間遊遠笛臨風起高帆到岸收人歸花市路客醉酒家樓徑就東園卧孤燈欲話愁立春後十二日命駕至郊外戲書觸目宫雲縹眇漏聲遲夢裏華胥却自疑春淺風光先盎盎時平節物共熙熙畫簾不捲聞人語玉勒徐行避酒旗閲盡輩流身獨健恍如隨計入都時河橋晚歸曲巷連新市層樓近小橋青簾猶滴雨緑浦恰通潮簾影晴方見笙聲冷未調斜陽覔歸路偏愛玉驄驕筆墨間有香氣似初唐人佳製後寓嘆貂蟬未心出兜鍪要是蒼鷹憶下韝彭澤徑歸端為酒輕舟已老豈須侯千年精衛心平海三日於菟氣食牛會與高人期物外摩挲銅狄灞城秋吳喬曰此當有後進妄生長短如韓君在夷門也與兒輩泛舟遊西湖一日間陰晴屢易逢著園林即欵扉酌泉鬻筍欲忘歸楊花正與人爭路鳩語還催雨點衣古寺題名那復在後生識面自應稀傷心六十餘年事雙塔依然在翠微寫景最工著語一何娟妙秋思烏桕微丹菊漸開天高風送雁聲哀詩情也似并刀快剪得秋光入卷來小徑登東山繚行自西北至溪上原注是夕子聿置酒行穿犖確度谽谺小立風中客袖斜衰草雙雙點飛蝶長空一一送棲鴉荻洲薄暮收魚網茆舍初寒響緯車誰道老人多感慨未妨尊酒樂年華感憤形勝崤潼在英豪趙魏多精兵連六郡要地控三河慷慨鴻門會悲傷易水歌幾人懷此志送老一漁蓑野興掃盡紅塵閉是非舍傍好在舊苔磯壺中春色松肪酒江上秋風槲葉衣一片共知雲偶出千年誰識鶴重歸勿言野外無供給雪後連山藥草肥五六情事恰合幽居春晚老廢讎書病廢詩晝間惟與睡相宜未尋內史流觴地又近龎公上塜時花發遊蜂喧院落筍長馴鹿入藩籬石帆山下春如許野老來招不用辭盧世㴶曰三四從上轉下機軸一貫閔雨歲秋固多雨每恨不及時黃塵蔽赤日苗稿已不遲踏車聲如雷力盡真何為天豈不念民雲族風散之窮民守稼泣便恐化棘茨妻子不望活所懼尊老飢我願上天仁顧哀民語悲鞭龍起風霆尚繼豐年詩詞旨深厚書事北征談笑取關河盟府何人策戰多掃盡煙塵歸鐵馬剪空荆棘出銅駝史臣歷紀平戎策壯士遙傳入塞歌自笑書生無寸效十年枉是枕雕戈明日復理夢中意作白盡髭鬚兩脥紅頽然自以放名翁客從謝事歸時散詩到無人愛處工高挂蒲帆上黃鶴獨吹銅笛過垂虹間人浪迹由來事那計猿驚蕙帳空劉克莊曰近歲詩人雜博者堆隊仗空踈者窘才料出竒者費搜索縛律者少變化惟放翁記問足以貫通力量足以驅使才思足以發越氣魄足以陵暴南渡而下故當為一大宗末年詩云客從謝事歸時散詩到無人愛處工又云外物不移方是學俗人猶愛未為詩則皮毛落盡矣舍南野步枯蔓絡荆籬幽花映荻扉馴麞驚不起歸鶴倦猶飛野色連收網邊愁入搗衣壯圗空自笑事事與心違寫入邊愁一句便覺情景混融通體靈妙出遊山有籃輿步有舟放翁身健得間遊羊牛點點日將夕蒲栁蕭蕭天正秋細雨僧歸雲外寺踈燈人語酒家樓歸途更愛湖橋月獨倚闌干為小留山行山光秀可餐溪水清可啜白雲映空碧突起若積雪我行溪山間靈府為澄徹崚嶒崖角立蟠屈路九折黃楊與冬青鬱鬱自成列其根貫石罅橫逆相糾結上捫雕鶻巢下歷豺虎穴流泉不可見鏘然響環玦出山日已暮林火遠明滅小憩得樵家題詩記幽絶不失子美家法感昔白帝城邊鶯亂啼憶騎瘦馬踏春泥老來感舊多悽愴孤夢時時到瀼西風雲晝晦夜遂大雪大風從北來洶洶十萬軍草木盡偃仆道路暝不分山澤氣上騰天受之為雲山雲如馬牛水雲如魚黿朝暗翳白日暮重壓厚坤高城岌欲動我屋何足掀兒怖牀下伏婢恐堅閉門老翁兩耳瞶無地著戚欣夜艾不知雪但覺手足皸布衾冷似鐵燒粳作微溫豈不思一飲流塵暗空樽已矣可奈何凍死向孤村竒崛夢華山古松偃蹇谷谽谺太華峰前野老家久客未歸丹竈冷碧桃八十一番花道室簭遇風山第六爻翛然盡謝俗間交謀生舊買雲三頃託宿新分鶴半巢露下丹芽生藥壠月明金粉落松梢眉間喜動君知否借得丹經手自抄鏗然清響殊有仙靈之氣倚樓曲曲闌干縹眇間哦詩本欲破除間無端又起天涯感消墨生綃數點山石帆夏日短棹飄然信所之茶園漁市到無時風從蘋末蕭蕭起月過花陰故故遲蓴菜煮羮吳舊俗竹枝度曲楚遺辭頗聞項里楊梅熟鄰曲相招莫後期乙丑夏秋之交小舟早夜往來湖中戲成絶句橫林渺渺夜生煙野水茫茫遠拍天菱唱一聲驚夢斷始知身在釣魚船有聲有情逈然高唱娥江道上月三更垣屋參差閉月明倚柂賦詩無傑思斷腸分付棹歌聲懷舊身是人間一斷蓬半生南北任秋風琴書昔作天涯客蓑笠今成澤畔翁夢破江亭山驛外詩成燈影雨聲中不須強覔前人比道似香山實不同王世貞論詩以樂天放翁為廣大教主為其情事景物之悉備也此老情事頗近子美其意中亦欲與浣花老叟相視而笑故其自道如此春雨春陰易成雨客病不驚寒又與梅花别無因一倚欄梨花開向春殘不恨遲緑楊窣地最相宜征西幕府煎茶地一幅邊鸞畫折枝原注宣司靜鎮堂屏上有邊鸞梨花盧世㴶曰梨花詩至此又是一種結搆雜感春晚晴還雨村深醉復醒溪添半篙緑山可一窗青藥品隨長鑱花名記小屏間身幸無事吟嘯送餘齡可字雖出唐人自成佳句出遊歸鞍上口占渺渺煙波飛槳去迢迢桑野策驢還寄懷楚水吳山外得意唐詩晉帖間每惜好春如我老誰能長日伴人間世間自是無兼得勛業元非造物慳初夏間居川雲漠漠雨冥冥濁酒間傾不滿瓶蠶簇尚寒憂繭薄稻陂初滿喜秧青王師護塞方屯甲親詔憂民已放丁病起自憐猶健在不須求應少微星琢句工穩而氣格不傷地僻地僻臨湍瀨門幽長緑苔客書疑誤達僧刺愧虛來清露蘋花坼斜陽燕子回自憐猶有恨佳日對空罍何其風秀耒陽令曾君寄禾譜農器譜二書求詩歐陽公譜西都花蔡公亦記北苑茶農功最大置不録如棄六藝崇百家曽侯奮筆補多稼儋州讀罷深咨嗟一篇秧馬傳海內農器名數方萌芽令君繼之筆何健古今一一辨等差我今八十歸抱耒兩編入手喜莫涯神農之學未可廢坐使末俗慙浮華文獻通考陳氏曰禾譜五卷宣德郎溫陵曽安止移忠撰東坡所謂賦秧馬歌也謂禾譜文既溫雅事亦詳實惜其不譜農器故以此歌附之農器譜三卷續二卷耒陽令曽之謹撰安止之姪孫也追述東坡作歌之意為此編周益公為之序陸務觀亦作詩題其後夏末野興半世天涯倦遠遊還鄉不減旅人愁數聲相應鳩呼雨一片初飛葉報秋山塢風煙僧院路河梁燈火酒家樓絶知雪鬢宜簔笠分付貂蟬與黑頭訪山家捨舟步上若耶溪壽櫟修藤路欲迷僧院倚山馴栗鼠野塘灘水下茭雞草侵古路迢迢遠雲傍行人故故低薄暮但尋遺毳去山家正在鶴巢西寄隱士乳竇寒猶滴巖扉夜不扃竒書窺鳥迹靈藥得人形浩浩天風積冥冥海氣清儻逢王內史更為乞黃庭較少陵押形字更新春前六日作夜枕夢回春雨聲曉窗日出春鳥鳴典衣沽酒莫辭醉自有梅花為解酲贑士曽興宗字光祖以其居篔簹谷圗來求詩高人心虛萬物宗家世常以仕易農買山本愛坡上竹手種己偃巖前松瀑泉三伏凛氷雪谷聲十里酣笙鏞了知自是一丘壑不與金精為附庸原注地與金精山青牛峽為鄰磊砢多竒宫商悉諧第六句蓋取諸坡仙者夏日雜題午夢初回理舊琴竹爐重炷海南沉茅簷三日蕭蕭雨又展芭蕉數尺陰西村晚歸小屋花垂盡平隄草次迷日長鶯語久風定絮飛低子響聞碁院舟橫傍釣溪歸途不知處依約埭東西古今得意句難得一聨悉稱暗牖懸珠網不如空梁落燕泥傍水見寒花不如出關逢落葉也田藝衡詩談云爾如此詩風定絮飛低五字亦豈易得雨晴旱暵常思雨沉陰却喜晴放船蓮蕩遠岸幘竹風清淮浦戎初遁興州盜甫平為邦要持重恐復議銷兵秋夜落葉鳴遙夜啼螿送暮秋不知何許笛故作此時愁青海三年戍黃旗萬里侯何如石帆下煙雨釣滄洲風格遒上故應突過錢郎纍日濃雲作雪不成遂有春意釀雪經旬竟不成一霜却作十分晴雲歸岫穴千峰立暖入郊原萬耦耕葛葉離離豐歲候梅花眷眷故人情道傍孤店新醅熟己有幽禽一兩聲野望偶携一小豎徙倚望南山船笛為誰怨溪雲如我間洲長歸雁下天逈暮鴉還安得一竿云終年煙水間春晴常年春日少春晴拂面今朝暖吹輕水閣家家橫小舫園亭處處聽新鶯桃花不管詩人老菖葉空催野叟耕自笑此生餘幾許銅駝荆棘尚關情恩封渭南伯唐詩人趙嘏為渭南尉當時謂之趙渭南後來將以豫為陸渭南乎戲作長句老向人間久倦遊君恩乞與渭川秋虛名定作陳驚座好句真慙趙倚樓棧豆十年霑病馬煙波萬里著浮鷗就封他日輕裘去應過三峰處處留盧世㴶曰欲遜欲任兩意俱有山行山鳥啼孤戍煙蕪入廢亭隄成陂水白雨細稻秧青草市少行旅叢祠多乞靈最憐投宿處微火暮晶熒初夏書感春與人俱老花隨夢已空遊蜂黏落蕊輕燕接飛蟲桑悴知蠶起牲肥賽麥豐為農當自力相戒勿匆匆諸詩皆莫年之作老氣縱橫而格律彌細對酒作飲酒豪如卷白波遣愁難似塞黃河多聞自解為身纍後死空令見事多未試神仙餐玉法且賡壯士入關歌此心不道無人識雪鬢蕭蕭奈老何頃歲從戎南鄭屢往來興鳯間暇日追懷舊遊有賦昔戍蠶叢北頻行鳯集南烽傳戎壘密驛遠客程貪春盡花猶坼雲低雨半含種畬多菽粟藝木雜松柟婦汲惟陶器民居半草菴風煙迷棧閣雷霆起湫潭城郭秦風近村墟蜀語參快心逢曠野刮目望浮嵐考古時興感無詩日每慚嘉陵最堪憶迎馬栁毿毿方回曰放翁詩出於曽茶山而不專用西江格有晚唐有中唐亦有盛唐此篇雖陳杜沈宋亦不過如此流麗綿密異夢山中有異夢重鎧奮雕戈敷水西通渭潼關北控河凄涼鳴趙瑟慷慨和燕歌此事終當在無如老死何夜坐小飲零落槐花已滿溝江湖又見一畨秋氷輪有轍凌空上銀漢無聲接地流丹荔甘寒勞遠致玉醅醇洌喜新篘移床坐對西南電好雨心知不待求雜感十首之二吕釣渭水濱説築傅巖野雖曰古盛時得士蓋亦寡天將啓治亂人才有用舍向非萬牛力孰與成大厦洙泗日已遠儒術日已喪學者稱孔墨為國雜伯王書生幸有聞力薄不能倡默默世俗間汝職無乃曠詞旨宏深雖筆意微斂却有大篇氣象仲秋書事斷雲歸岫雨初收茅舍蕭條古渡頭短褐老人垂九十松枯石瘦不禁秋秋日徙倚門外久之舍前煙水似瀟湘白首歸來愛故鄉五畝山園鬱桑柘數椽茅屋映菰蔣翻翻小繖船歸郭渺渺長歌月滿塘却掩柴荆了無事篆盤重點已殘香聞新雁有感新雁南來片影孤冷雲深處宿菰蘆不知湘水巴陵路曽記漁陽上谷無如此寓感亦匪夷所思小園獨酌橫林搖落弄微丹深院蕭條作小寒秋氣已高殊可喜老懷多感自無歡鹿初離母斑猶淺橘乍經霜味尚酸小酌一巵幽興足豈須落佩與頽冠古意千金募戰士萬里築長城何時青冢月却照漢家營夜泊武昌城江流千丈清寧為雁奴死不作鶴媒生湖上尋梅鏡湖渺渺煙波白不與人間通地脈騎龍古仙絶火食慣住空山齧氷雪東皇高之置度外正似人中巢許輩萬木僵死我獨存本來長生非返魂小雪湖上尋梅時短帽亂插皆繁枝路人看者竊相語此老胸中常有詩歸來青燈耿窗扉心鏡忽入造化機墨池水淺筆鋒燥笑拂吳箋作飛草仗氣愛竒遂成異境方回取梅花詩十五篇殊不逮此湖山坡陀度小嶺軒豁見平湖但醉梅花下民間酒可沽原注花徑小嶺故堞無遺迹蕭然數十家茶煙映山起酒斾傍隄斜原注古城雪晴欲出而路濘未通戲作欲覔溪頭路春泥不可行歸來小窗下袖手看新晴春日雜興行人陌上思悠悠十里斜陽古渡頭一片落花無覔處只教芳草管間愁蘭亭道上湖上青山古會稽斷雲漠漠雨淒淒籃輿晚過偏門市滿路春泥聞竹雞箭箙弓韜小獵回壯心自笑未低摧前身家近盤閶路曽看吳王射雉來藴藉不失唐人風調初夏雜興隱趣與誰論深居湖上村避蘭寧改路惜筍不開園庭草饒生意溪沙記漲痕愁來時淺酌隨事有雞豚山行過僧菴不入垣屋參差竹塢深舊題名處懶重尋茶爐煙起知高興碁子聲踈識苦心淡日暉暉孤市散殘雲漠漠半川陰長吟未斷清愁起已見橫林宿暮禽方回曰詩極高勝尤有工夫針線如老杜所謂裁縫滅盡針線迹也殘雲一聨及末句結乃結煞山行一假餘意前輩詩例如此須合别有擺脫老杜縛雞行山谷水仙花皆然夏日六言醉面貪承夕露釣竿喜近秋風借問孤舟何處深入芙渠浦中溪漲清風拂面月落繁星滿天數隻船橫浦口一聲笛起山前夏夜泛溪至南莊復回湖桑歸不求竒骨可封侯但喜枯腸不貯愁數點殘燈沽酒市一聲柔櫓採菱舟元知澤國偏宜夜己就天公探借秋歸過三更風露重紗巾􅓑覺髮颼飀郊行凄風吹雨過江城緩䇿羸驂並水行古路初驚秋葉墮荒郊已放候蟲鳴壯心耿耿人誰識往事悠悠恨未平斜日半竿羌笛怨西陵寂寞又潮聲結有神韻文章文章本天成妙手偶得之粹然無疵瑕豈復須人為君看古彛器巧拙兩無施漢最近先秦固已殊淳漓胡部何為者豪竹雜哀絲后夔不復作千載誰與期深識妙解非淺人所能與遊常言詩欲工而工亦非詩之極鍛錬之久乃失本指斫削之甚反傷元氣觀其所言其自命可知矣李東陽謂宋人之詩但一字一句對偶雕琢之工而天真興致未可與道者不知能識此意否楊大鶴曰放翁詩至萬首然翁又言文章本天成妙手偶得之自然無疵瑕豈復須人為自言間為長謡短章楚調唐律酬答風月煙雨之態度非為娛耳目遣暇日而已此豈粘頭綴尾朝鐫夕琢必待月久歲深以多作為能者哉思蜀西遊陳迹浩無窮回首真同一夢中栁拂驛牆思鳯集鼓喧市里憶蠶叢故人丘壟秋蕪碧舊隱園林夕照紅自閔未能忘感慨浩歌彈劍送飛鴻江村江村連夜有飛霜柿正丹時橘半黃轉枕却尋驚斷夢撥爐偶見爇殘香醫無絶藝空三易死與浮生已兩忘拈得一書還懶看卧聽孫子誦琅琅陳訏曰放翁一生精力盡於七律故全集所載最多最佳古詩少有鬆處然至其精彩發露自斑駁可愛示兒死去元知萬事空但悲不見九州同王師北定中原日家祭無忘告乃翁祖應世曰放翁易簀嘉定中國弱已極而尚作此想其齎志可悲矣褚人穫曰示兒一絶有三呼渡河之意周之麟曰觀於家祭無忘之語千秋而下亦為長慟此其用心與子美何以異哉御選唐宋詩醇卷四十七
