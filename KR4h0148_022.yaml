  text: 欽定四庫全書御選唐宋詩醇卷十
  hash: sha256:046586b2082d6283cfff278cb3de2769da695ebf7eec5375a44fa2cf5e216dc6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_022-1a, image: WYG1448/WYG1448-0227a.png}
body:
  text: 襄陽杜甫詩二目録喜晴述懷一首送樊二十三侍御赴漢中判官送從弟亞赴安西判官彭衙行北征得舍弟消息玉華宫九成宫羌村洗兵馬留花門李鄠縣丈人胡馬行義鶻畫鶻行瘦馬行新安吏潼關吏石壕吏新婚别垂老别無家别遣興三首幽人佳人赤谷西崦人家西枝村尋置草堂地夜宿贊公土室夢李白二首遣興遣興前出塞九首後出塞五首萬丈潭兩當縣吳十侍御江上宅發秦州鐵堂峽鹽井寒硤法鏡寺青陽峽龍門鎮石龕
  hash: sha256:48a6619a5157659139a29dc361e1fa44bc00c31a9eec0fc983e221ab076d38f7
