  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_031-1a, image: WYG1448/WYG1448-0313c.png}
body:
  text: 襄陽杜甫詩六臘日臘日常年暖尚遙今年臘日凍全消侵陵雪色還萱草漏泄春光有栁條縱酒欲謀良夜醉還家初散紫宸朝口脂面藥隨恩澤翠管銀罌下九霄趙大綱曰唐以大寒後辰日為臘紫宸殿退朝口號戶外昭容紫袖垂雙瞻御座引朝儀香飄合殿春風轉花覆千官淑景移晝漏希聞髙閣報天顔有喜近臣知宫中每出歸東省會送夔龍集鳯池可備唐朝典故詩亦委蛇有風度劉會孟曰從容富麗六句有意外意曲江二首一片花飛減却春風飄萬點正愁人且看欲盡花經眼莫厭傷多酒入唇江上小堂巢翡翠苑邉髙塜卧麒麟細推物理須行樂何用浮名絆此身朝回日日典春衣每日江頭盡醉歸酒債尋常行處有人生七十古來稀穿花蛺蝶深深見點水蜻蜓欵欵飛傳語風光共流轉暫時相賞莫相違葉夢得曰深深字若無穿字欵欵字若無點字亦無以見其精微然讀之渾然全似未嘗用力所以不礙氣格超勝使晚唐人為之便涉魚躍練川拋玊尺鶯穿絲栁織金梭矣張綖曰二詩以仕不得志有感於暮春而作王士正曰宣政等作何共舂容華藻遊賞詩乃又跌宕不羈如此蓋各有體也曲江對酒苑外江頭坐不歸水精宫殿轉霏微桃花細逐楊花落黃鳥時兼白鳥飛縱飲久判人共棄懶朝真與世相違吏情更覺滄洲逺老大悲傷未拂衣頷聫寫一時偶然之景遂為後賢粉本然丹鉛録所引黃庭堅句風致自佳若梅堯臣李若水兩聫則優劣判然矣曲江對雨城上春雲覆苑牆江亭晚色靜年芳林花著雨燕脂落水荇牽風翠帶長龍武新軍深駐輦芙蓉别殿漫焚香何時詔此金錢會暫醉佳人錦瑟傍離亂初復追思極盛悄然悲慨無限深情後四句一氣滚出仍望有承平之樂語偏濃至氣自空蒼此中晚所望而不及者也若甫之繫念明皇誠有其意然金錢之詔當在肅宗説詩固宜善會耳黃生曰公感玄宗知遇詩中每每見之五六指南內之事蓋隱之也本詩人之忠厚法宣聖之微詞豈古今抽黃嫓白之士所敢望哉仇兆鰲曰杜審言詩綰霧青條弱牽風紫蔓長即此頷聫所自出也又寄語洛城風日道明年春色倍還人即傳語風光二句所自出也公嘗云詩是吾家事信乎祖孫繼述詩學乃其家學也奉和賈至舍人早朝大明宫原注舍人先世嘗掌絲綸五夜漏聲催曉箭九重春色醉仙桃旌旗日暖龍蛇動宫殿風微燕雀髙朝罷香煙擕滿袖詩成殊玊在揮毫欲知世掌絲綸美池上於今有鳯毛蘇軾曰旌旗日暖一聫此七言中之偉麗者也宣政殿退朝晚出左掖天門日射黃金榜春殿晴曛赤羽旗宫草微微承委珮爐煙細細駐遊絲雲近蓬萊常五色雪殘鳷鵲亦多時侍臣緩步歸青瑣退食從容出每遲浦起龍曰金和玊節之篇題省中院壁掖垣竹埤梧十尋洞門對霤常隂隂落花遊絲白日靜鳴鳩乳燕青春深腐儒衰晚謬通籍退食遲回違寸心衮職曽無一字補許身愧比雙南金明朝有封事數問夜如何參觀之可得其意春宿左省花隱掖垣暮啾啾棲鳥過星臨萬户動月傍九霄多不寢聽金鑰因風想玉珂明朝有封事數問夜如何胡應麟曰杜詩五律結句之妙者如明朝有封事數問夜如何經過自愛惜取次莫論兵親朋滿天地兵甲少來書安危大臣在不必淚長流無由覩雄略大樹日蕭蕭語皆矯健振徑絶非錚錚細響沈德潛曰三四即景名句而注釋家謂民勞則星動月屬隂象指女子小人以峭刻深心測詩人敦厚之旨一何可笑送翰林張司馬南海勒碑冠冕通南極文章落上台詔從三殿去碑到百蠻開野館濃花發春帆細雨來不知滄海上天遣幾時回王士正曰頷聫冠冕頰聫纎穠此用筆之妙晚出左掖晝刻傳呼淺春旗簇仗齊退朝花底散歸院栁邉迷樓雪融城濕宫雲去殿低避人焚諫草騎馬欲雞棲劉會孟曰諫草不欲人知此事君當然之體結語讀之數過欵欵忠實送賈閣老出汝州西掖梧桐樹空留一院隂艱難歸故里去住損春心宫殿青門隔雲山紫邏深人生五馬貴莫受二毛侵去住損春心五字可謂藴藉黃生曰起處用卷阿詩意而無其迹送鄭十八虔貶台州司户傷其臨老陷賊之故闕為靣别情見於詩鄭公樗散鬢成絲酒後常稱老畫師萬里傷心嚴譴日百年垂死中興時蒼惶已就長途往邂逅無端出餞遲便與先生應永訣九重泉路盡交期盧世㴶曰清空一氣萬轉千回純是淚點都無墨痕沈德潛曰屈折赴題清空如話别是一種風格端午日賜衣宫衣亦有名端午被恩榮細葛含風軟香羅疊雪輕自天題處濕當暑著來清意內稱長短終身荷聖情奉贈王中允維中允聲名久如今契濶深共傳收庾信不比得陳琳一病緣明主三年獨此心窮愁應有作試誦白頭吟為中允表明心迹極有斟酌舊唐書維官給事中扈從不及為賊所得服藥取痢詐稱瘖病祿山迎置洛陽拘於普施寺迫以偽署賊平定陷賊官罪維以凝碧詩聞於朝肅宗特宥之責授太子中允奉陪鄭駙馬韋曲二首韋曲花無賴家家惱殺人緑樽雖盡日白髮好禁春石角鈎衣破藤枝刺眼新何時占叢竹頭戴小烏巾野寺垂楊裏春畦亂水間美花多映竹好鳥不歸山城郭終何事風塵豈駐顔誰能共公子薄暮欲俱還王嗣奭曰抑揚頓挫極生動之致至德二載甫自京金光門出問道歸鳯翔乾元初從左拾遺移華州掾與親故别因出此門有悲往事此道昔歸順西郊胡正繁至今殘破膽應有未招魂近得歸京邑移官豈至尊無才日衰老駐馬望千門詞意婉曲昔之忠欵今之眷戀皆見怨而不怒忠厚之道顧宸曰公疏救房琯詔三司推問以張鎬力救敕放就列次年與房琯嚴武俱貶坐琯黨也此公事君交友生平出處之大節曰移官豈至尊不敢歸怨於君也王維詩云執政方持法明君無此心與此同意所謂詩可以怨也寄髙三十五詹事適安穩髙詹事兵戈久索居時來如宦達嵗晚莫情疏天上多鴻雁池中足鯉魚相看過半百不寄一行書路逢襄陽楊少府入城戲呈楊員外綰原注甫赴華州日許寄員外茯苓寄語楊員外山寒少茯苓歸來稍暄暖當為斸青冥翻動神仙窟封題鳥獸形兼將老藤杖扶汝醉初醒頸聫竒致押韻尤穩題鄭縣亭子鄭縣亭子澗之濵户牖慿髙發興新雲斷嶽蓮臨大路天晴宫栁暗長春巢邉野雀羣欺燕花底山蜂逺趂人更欲題詩滿青竹晚來幽獨恐傷神仇兆鰲曰中四寫景先賦後比五六喻意所以自傷幽獨也望嶽西嶽崚嶒竦處尊諸峰羅立如兒孫安得仙人九節杖拄到玊女洗頭盆車箱入谷無歸路箭栝通天有一門稍待西風涼冷後髙尋白帝問真源遂無一字猶人蒼老渾徑行神如空行氣如虹昔元好問論秦觀春雨詩曰拈出退之山石句始知渠是女郎詩詩人不識大家氣象爭柔鬬葩氣萎體瘵誦此寧不變色至日遣興奉寄北省舊閣老兩院故人二首去嵗兹辰捧御床五更三點入鵷行欲知趨走傷心地正想氛氲滿眼香無路從容陪語笑有時顛倒著衣裳何人錯憶窮愁日愁日愁隨一線長憶昨逍遙供奉班去年今日侍龍顔麒麟不動爐煙上孔雀徐開扇影還玊几由來天北極朱衣只在殿中間孤城此日堪腸斷愁對寒雲雪滿山得弟消息近有平隂信遙憐舍弟存側身千里道寄食一家村烽舉新酣戰啼垂舊血痕不知臨老日招得幾人魂憶弟且喜河南定不問鄴城圍百戰今誰在三年望汝歸故園花自發春日鳥還飛斷絶人煙久東西消息稀二詩意真語苦未有篤於君父而薄於手足者甫之過人豈徒詩乎仇兆鰲曰花發鳥飛即濺淚傷心之意秦州雜詩二十首滿目悲生事因人作逺遊遲回度隴怯浩蕩及關愁水落魚龍夜山空鳥鼠秋西征問烽火心折此淹留意極哀頓氣則渾含自足領起諸篇姚寬曰水經魚龍以秋日為夜又魚龍水名鳥鼠山名蓋兩句而合三事也秦州城北寺勝迹隗囂宫苔蘚山門古丹青野殿空月明垂葉露雲逐渡溪風清渭無情極愁時獨向東州圖領同谷驛道出流沙降虜兼千帳居人有萬家馬驕珠汗落胡舞白題斜年少臨洮子西來亦自誇鼓角緣邉郡川原欲夜時秋聽殷地發風散入雲悲抱葉寒蟬靜歸山獨鳥遲萬方聲一概吾道竟何之五六入喻筆意幽細結極悲涼南使宜天馬由來萬匹強浮雲連陳沒秋草遍山長聞説真龍種仍殘老驌驦哀鳴思戰鬬逈立向蒼蒼沈德潛曰伏櫪長鳴隱然自寓朱鶴齡曰按通鑑是年春三月九節度之師潰於鄴城戰馬萬匹惟存三千此詩浮雲連陳沒正其事也秦州乃出西域之道故感天馬事而賦之城上胡笳奏山邉漢節歸防河赴滄海奉詔發金微士苦形骸黑旌疏鳥獸稀那聞往來戍恨解鄴城圍莽莽萬重山孤城山谷間無風雲出塞不夜月臨關屬國歸何晚樓蘭斬未還煙塵獨長望衰颯正摧顔氣調蒼深吳昌祺曰如雕鶚盤空雄健自喜沈德潛曰無風不夜奇景偶然寫出或以為地名不但穿鑿亦令杜詩無味聞道尋源使從天此路回牽牛去幾許宛馬至今來一望幽燕隔何時郡國開東征健兒盡羌笛暮吹哀今日明人眼臨池好驛亭叢篁低地碧高栁半天青稠疊多幽事喧呼閲使星老夫如有此不異在郊坰雲氣接崑崙涔涔塞雨繁羌童看渭水使客向河源煙火軍中幕牛羊嶺上村所居秋草淨正閉小逢門蕭蕭古塞冷漠漠秋雲低黃鵠翅垂雨蒼鷹飢啄泥薊門誰自北漢將獨征西不意書生耳臨衰厭鼓鞞浦起龍曰蒼蒼莽莽以古為律此前多言世亂此後多為身謀此乃前後關鍵也山頭南郭寺水號北流泉老樹空庭得清渠一邑傳秋花危石底晚景卧鐘邉俯仰悲身世溪風為颯然楊德周曰秦州詩憂憤悱惻都非文人伎倆即歸山獨鳥遲老樹空庭得二語亦令人閣筆傳道東柯谷深藏數十家對門藤蓋瓦映竹水穿沙瘦地翻宜粟陽坡可種瓜船人近相報但恐失桃花趙汸曰起用傳道二字則以下景物皆是未至谷中先述所聞末方言泛舟往遊恐如桃源之迷路也王知彰曰工部棄官寓東柯谷姪佐之居萬古仇池穴潛通小有天神魚人不見福地語真傳近接西南境長懷十九泉何時一茅屋送老白雲邉朱鶴齡曰前聞東柯谷之勝而欲卜居此述仇池穴之勝而欲卜居也觀卒章讀記憶仇池則前六句皆是引記中語浦起龍曰前後三篇皆言東柯此以仇池隔斷章法變化未暇泛滄海悠悠兵馬間塞門風落木客舍雨連山阮籍行多興龎公隱不還東柯遂疏懶休鑷鬢毛斑東柯好崖谷不與衆峯羣落日邀雙鳥晴天養片雲野人矜險絶水竹會平分採藥吾將老兒童未遣聞邉秋隂易久不復辨晨光簷雨亂淋幔山雲低度牆鸕鷀窺淺井蚯蚓上深堂車馬何蕭索門前百草長地僻秋將盡山髙客未歸塞雲多斷續邉日少光輝警急烽常報傳聞檄屢飛西戎外甥國何得忤天威鳯林戈未息魚海路常難候火雲烽峻懸軍幕井乾風連西極動月過北庭寒故老思飛將何時議築壇此與上篇全指吐蕃注家所引未的唐堯真自聖野老復何知曬藥能無婦應門幸有兒藏書聞禹穴讀記憶仇池為報鴛行舊鷦鷯在一枝題曰雜詩所感非一事其作非一時蓋甫棄官遊秦情非得已身世之感一寓於詩即事命意觸景成文或繫於國或繫於已要以達其性情則一然其遇彌困而思則彌深其心益苦而言則益工縱出橫飛涵今茹古昔人謂其秦州以後律法尤精蓋所遇有以激發之也學者求其本源之所在而參時世以觀之庶有以窺其籓籬耳劉克莊曰唐人遊邉之作數十篇中間有三數篇一篇問有一二聫可采若此二十篇山川城郭之異土地風氣所宜開卷一覽盡在是矣網山詩云杜陵詩卷是圖經信然月夜憶舍弟戍鼓斷人行邉秋一雁聲露從今夜白月是故鄉明有弟皆分散無家問死生寄書長不達况乃未休兵王彥輔曰子美善用故事及常語多顛倒用之語峻而體健如露從今夜白一聫之類是也吳昌祺曰月是故鄉明勝隔千里兮共明月宿贊公房原注京中大雲寺主謫此安置杖錫何來此秋風已颯然雨荒深院菊霜倒半池蓮放逐寧違性虛空不離禪相逢成夜宿隴月向人圓東樓萬里流沙道西征過此門但添新戰骨不返舊征魂樓角凌風迥城隂帶水昏傳聲看驛使送節向河源亦目前語耳征戰之苦言之何其慘也雨晴天外秋雲薄從西萬里風今朝好晴景久雨不妨農塞栁行踈翠山梨結小紅胡笳樓上發一雁入髙空寓目一縣蒲萄熟秋山苜蓿多關雲常帶雨塞水不成河羌女輕烽燧胡兒制駱駝自傷遲暮眼喪亂飽經過朱鶴齡曰當與州圖領同谷一首參看關塞無阻羌胡雜居乃世變之深可慮者公故感而歎之未幾秦隴果為吐蕃所陷山寺野寺殘僧少山園細路髙麝香眠石竹鸚鵡啄金桃亂石通人過懸崖置屋牢上方重閣晚百里見秋毫遣懷愁眼看霜露寒城菊自花天風隨斷栁客淚墮清笳水淨樓隂直山昏塞日斜夜來歸鳥盡啼殺後棲鴉風景不殊舉目有山河之異結以比語豁出不嫌於盡顧宸曰末語即上林無限樹不借一枝棲之意蓋歎卜居無地也天河常時任顯晦秋至最分明縱被微雲掩終能永夜清含星動雙闕伴月落邉城牛女年年渡何曽風浪生此與初月詩確有寄託用意不即不離窅然而深如以為但咏本題又失之矣洪仲曰天河初月二詩皆暗寫題意不露題字仇兆鰲曰此直咏天河而寓意在言外頷聫似為小人讒妒而發初月光細弦欲上影斜輪未安微升古塞外已隱暮雲端河漢不改色關山空自寒庭前有白露暗滿菊花圑黃庭堅曰王原叔説此詩為肅宗而作張逺曰句句有一初字意搗衣亦知戍不返秋至拭清砧已近苦寒月况經長别心寧辭搗尉倦一寄塞垣深用盡閨中力君聽空外音鏗然清響亭臯葉下隴首雲飛故當遜其真至張逺曰王灣詩風響傳聲不到君即此末句意但藴藉不如耳沈德潛曰通首代戍婦之詞一氣旋折全以神行促織促織甚微細哀音何動人草根吟不穩床下夜相親久客得無淚故妻難及晨悲絲與急管感激異天真以下六詩全用比興風詩之草木昆蟲離騷之美人香草此物此志爾螢火幸因腐草出敢近太陽飛未足臨書卷時能點客衣隨風隔幔小帶雨傍林微十月清霜重飄零何處歸仇兆鰲曰黃鶴注謂指李輔國輩以宦者近君而撓政也按腐草喻刑餘之人太陽乃人君之象比義顯然此輩直置身無地矣蒹葭摧折不自守秋風吹若何暫時花戴雪幾處葉沉波體弱春苗早叢長夜露多江湖後搖落亦恐嵗蹉跎苦竹青冥亦自守軟弱強扶持味苦夏蟲避叢卑春鳥疑軒墀曽不重剪伐欲無辭幸近幽人屋霜根結在兹王嗣奭曰前章不自守言遭時之窮此章亦自守見保身之哲讀二詩知公去就之間善於審處也仇兆鰲曰蒹葭傷賢人之失志者苦竹嘉君子之避世者除架束薪已零落瓠葉轉蕭踈幸結白花了寧辭青蔓除秋蟲聲不去暮雀意何如寒事今牢落人生亦有初廢畦秋蔬擁霜露豈敢惜凋殘暮景數枝葉天風吹汝寒緑沾泥滓盡香與嵗時闌生意如春昨悲君白玉盤君門萬里之感於小物發之此自為寫照也浦起龍曰前篇除字説得和平此章廢字寫得感慨夕烽夕烽來不近每日報平安塞上傳光小雲邉落點殘照秦通警急過隴自艱難聞道蓬萊殿千門立馬看儼然有宗社安危之慮乃心王室不覺流露其後吐蕃卒犯長安知甫深思逺慮矣送遠帶甲滿天地胡為君逺行親朋盡一哭鞍馬去孤城草木嵗月晚關河霜雪清别離已昨日因見古人情黃生曰起二句寫得萬難分手接聫更作一幅關河送别圖頓覺班馬悲鳴風雲變色使人設身其地亦自黯然魂消所謂古人情者即古别離之情也觀兵北庭送壯士貔虎數尤多精鋭舊無敵邉隅今若何妖氛擁白馬元帥待雕戈莫守鄴城下斬鯨遼海波朱鶴齡曰是時九節度圍相州李光弼與諸將議曰思明得魏州而按兵不動此欲以精鋭掩吾不備也請與朔方兵同逼魏州彼懲嘉山之敗必不敢輕出曠日引久則鄴城必拔矣魚朝恩不可而止公詩末句正與光弼意合言當直搗幽燕傾思明之巢穴不當老師鄴城之下也天末懷李白涼風起天末君子意如何鴻雁幾時到江湖秋水多文章憎命達魑魅喜人過應共寃魂語投詩贈汨羅悲歌慷慨一氣卷舒李杜交好其詩特地精神浦起龍曰五六直櫽括天問招魂兩篇空囊翠柏苦猶食晨霞髙可餐世人共鹵莽吾道屬艱難不爨井晨凍無衣床夜寒囊空恐羞澀留得一錢看病馬乘爾亦已久天寒關塞深塵中老盡力嵗晚病傷心毛骨豈殊衆馴良猶至今物微意不淺感動一沉吟直書見意無復營構此為老境蕃劍致此自僻逺又非珠玉裝如何有奇怪每夜吐光芒虎氣必騰上龍身寧久藏風塵苦未息持汝奉明王不妨朴直自有氣魄銅瓶亂後碧井廢時清瑶殿深銅瓶未失水百丈有哀音側想美人意應悲寒甃沈蛟龍半缺落猶得折黃金唐汝詢曰張籍楚妃怨梧桐葉落黃金井橫架轆轤牽素綆美人初起天未明手拂銀瓶秋水冷讀籍詩杜義自明黃生曰感物傷時沈鬱頓挫觀安西兵過赴關中待命二首四鎮富精鋭摧鋒皆絶倫還聞獻士卒足以靜風塵老馬夜知道蒼鷹飢著人臨危經久戰用急始如神奇兵不在衆萬馬救中原談笑無河北心肝奉至尊孤雲隨殺氣飛鳥避轅門竟日留歡樂城池未覺喧野望清秋望不極迢遞起曽隂逺水兼天淨孤城隱霧深葉稀風更落山迥日初沉獨鶴歸何晚昏鴉已滿林秋日阮隱居致薤三十束隱者柴門內畦蔬繞舍秋盈筐承露薤不待致書求束此青芻色圓齊玉筯頭衰年關鬲冷味暖併無憂秦州見敕目薛三璩授司議郎畢四曜除監察與二子有故逺喜遷官兼述索居凡三十韻大雅何寥濶斯人尚典型交期余潦倒材力爾精靈二子聲同日諸生困一經文章開突奧遷擢潤朝廷舊好何由展新詩更憶聽别來頭併白相見眼終青伊昔貧皆甚同憂心不寧栖遑分半菽浩蕩逐流萍俗態猶猜忌妖氛忽杳冥獨慙投漢閣俱議哭秦庭還蜀祗無補囚梁亦固扃華彛相混合宇宙一羶腥帝力收三統天威總四溟舊都俄望幸清廟肅惟馨雜種雖髙壘長驅甚建瓴焚香淑景殿漲水望雲亭法駕初還日羣公若會星宫臣仍點染柱史正零丁官忝趨棲鳯朝回歎聚螢喚人看騕裊不嫁惜娉婷掘劔知埋獄提刀見發硎侏儒應共飽漁父忌偏醒旅泊窮清渭長吟望濁涇羽書還似急烽火未全停師老資殘冦戎生及近坰忠臣辭憤激烈士涕飄零上將盈邉鄙元勳溢鼎銘仰思調玊燭誰定握青萍隴俗輕鸚鵡原情類鶺鴒秋風動關塞髙卧想儀形排律長篇創自老杜其義緒宏深波瀾老成非後人所及若徒觀其排比鋪陳則元好問所謂舍連城而識碔玞者也篇中萍字重用蓋義迥不同故耳寄嶽州賈司馬六丈巴州嚴八使君兩閣老五十韻衡嶽啼猿裏巴州鳥道邉故人俱不利謫宦兩悠然開闢乾坤正榮枯雨露偏長沙才子逺釣瀨客星懸憶昨趨行殿殷憂捧御筵討胡愁李廣奉使待張騫無復雲臺仗虛修水戰船蒼茫城七十流落劔三千畫角吹秦晉旄頭俯澗瀍小儒輕董卓有識笑苻堅浪作禽填海那將血射天萬方思助順一鼓氣無前隂散陳倉北晴熏太白巔亂麻尸積衛破竹勢臨燕法駕還雙闕王師下八川此時霑奉引佳氣拂周旋貔虎開金甲麒麟受玊鞭侍臣諳入仗廄馬解登仙花動朱樓雪城凝碧樹煙衣冠心慘愴故老淚潺湲哭廟悲風急朝正霽景鮮月分梁漢米春得水衡錢內蘂繁於纈宫莎軟勝綿恩榮同拜手出入最隨肩晚著華堂醉寒重繡被眠轡齊兼秉燭書枉滿懷箋每覺升元輔深期列大賢秉鈞方咫尺鎩翮再聫翩禁掖朋從改微班性命全青蒲甘受戮白髮竟誰憐弟子貧原憲諸生老服虔師資謙未達鄉黨敬何先舊好腸堪斷新愁眼欲穿翠乾危棧竹紅膩小湖蓮賈筆論孤憤嚴詩賦幾篇定知深意苦莫使衆人傳貝錦無停織朱絲有斷絃浦鷗防碎首霜鶻不空拳地僻昏炎瘴山稠隘石泉且將棊度日應用酒為年典郡終微眇治中實棄捐安排求傲吏比興展歸田去去才難得蒼蒼理又玄古人稱逝矣吾道卜終焉隴外翻投迹漁陽復控弦笑為妻子纍甘與嵗時遷親故行稀少兵戈動接聨他鄉饒夢寐失侣自迍邅多病加淹泊長吟阻靜便如公盡雄俊志在必騰騫間架分明線鎖靈動長律之善則也李因篤曰敘事整贍用意深苦章法秩然五十韻無一失所如左馬大篇文字精神到底寄張十二山人彪三十韻獨卧嵩陽客三違潁水春艱難隨老母慘淡向時人謝氏尋山屐陶公漉酒巾羣凶彌宇宙此物在風塵厯下辭薑被關西得孟鄰早通交契密晚接道流新靜者心多妙先生藝絶倫草書何太苦詩興不無神曹植休前輩張芝更後身數篇吟可老一字買堪貧將恐曽防冦深潛託所親寧聞倚門夕盡力潔飱晨疏懶為名誤驅馳喪我真索居猶寂寞相遇益悲辛流轉依邉徼逢迎念席珍時來故舊少亂後别離頻世祖修髙廟文公賞從臣商山猶入楚渭水不離秦存想青龍祕騎行白鹿馴耕巖非谷口結草即河濵肘後符應驗囊中藥未陳旅懷殊不愜良覿渺無因自古皆悲恨浮生有屈伸此邦今尚武何處且依仁鼓角凌天籟關山倚月輪官場羅鎮磧賊火近洮岷蕭瑟論兵地蒼茫鬬將辰大軍多處所餘孽尚紛綸髙興知籠鳥斯文起獲麟窮秋正搖落回首望松筠寄李十二白二十韻昔年有狂客號爾謫仙人筆落驚風雨詩成泣鬼神聲名從此大汨沒一朝伸文彩承殊渥流傳必絶倫龍舟移棹晚獸錦奪袍新白日來深殿青雲滿後塵乞歸優詔許遇我宿心親未負幽棲志兼全寵辱身劇談憐野逸嗜酒見天真醉舞梁園夜行歌泗水春才髙心不展道屈善無鄰處士禰衡俊諸生原憲貧稻粱求未足薏苡謗何頻五嶺炎蒸地三危放逐臣幾年遭鵩鳥獨立向麒麟蘇武先還漢黃公豈事秦楚筵辭醴日梁獄上書辰已用當時法誰將此義陳老吟秋月下病起暮江濵莫怪恩波隔乘槎與問津筆落驚風雨白實不愧斯言詩成泣鬼神甫詩乃可當之孟綮曰杜贈白二十韻備敘白事讀其文盡得其故迹杜逢祿山之亂流離隴蜀畢陳於詩推見至隱殆無遺事故當時號為詩史王嗣奭曰此詩分明為李白作傳其生平履厯備矣如未負幽棲志兼全寵辱身及楚筵辭醴梁獄上書等句皆刻意辨明與一病緣明主三年獨此心相同御選唐宋詩醇卷十四
