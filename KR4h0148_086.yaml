  text: 欽定四庫全書御選唐宋詩醇卷四十二
  hash: sha256:64ece58aa8f54786627e3c223cab90606a0ebfcd7873334438c1b24fc503c586
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_086-1a, image: WYG1448/WYG1448-0825a.png}
body:
  text: 山隂陸遊詩一目録寄酬曾學士學宛陵先生體比得書云所寓廣教僧舍有陸子泉每對之輒奉懷送曾學士赴行在新夏感事留題雲門草堂度浮橋至南臺還縣航海東陽道中送七兄赴揚州帥幕以石芥送劉韶美禮部劉比釀酒徑甚因以為戲寄張真父舍人病中簡仲彌性唐克明蘇訓直晚泊慈姥磯下夜宿陽山磯將曉大雨北風甚徑俄頃行三百餘里遂扺雁翅浦送全州趙都曹病中作醉中歌上已臨川道中隨意逰山西村雨霽出逰書事上虞逆旅見舊題嵗月感懷題十八學士圖夜聞松聲有感十二月一日宿楓橋雨中泊趙屯有感秋風重陽沙頭移船將離江陵滄灘松滋小酌晚泊松滋渡口繫舟下牢溪逰三遊洞二十八韻秋風亭拜冦萊公遺像聞猿瞿唐行踏磧鄉中每以寒食立夏之間省墳客夔適逢此時悽然感懷風雨中望峽口諸山竒甚戲作短歌晚晴聞角有感畏虎鄰水延福寺早行大安病酒留半日王守復來招不往送酒解酲因小飲江月館曉發金牛山南行和高子長參議道中次韻張季長題龍洞太息閬中作逰錦屏山謁少陵祠堂歸次漢中境土南沮水道中長木夜行抵金堆市赴成都泛舟自三泉至益昌謀以明年下三峽雪晴行益昌道中頗有春意劒門道中遇微雨劍門城北回望劍關諸峯青入雲漢感蜀亡事慨然有賦綿州魏城縣驛有羅江東詩云芳草有情皆礙馬好雲無處不遮樓戲用其韻東津東山綿州録參廳觀薑楚公畫鷹少陵為作詩者西郊尋梅海棠驛舍見故屏風畫海棠有感登荔枝樓凌雲醉歸作醉中感懷玻璃江送客至江上九月十六日夜夢駐軍河外遣使招降諸城覺而有作成都行初寒木山十月十日浮橋成以故事宴客凌雲觀大散關圖有感
