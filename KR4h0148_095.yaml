  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_095-1a, image: WYG1448/WYG1448-0906a.png}
body:
  text: 山陰陸游詩五散步有懷張漢州扶杖村東路秋來始此回寒鴉盤陳起野菊卧枝開憂國丹心折懷人雪鬢催房湖八千里那得尺書來將軍行將軍入奏平燕䇿持笏榻前親指畫天山熱海在目中下殿即日名烜赫馳出都門雪初霽直過黃河氷未坼繡旗方掠桑乾渡羽檄己入金臺陌勇士如鷹健欲飛孱王似何勞搦戎服押俘獻廟社正衙第賞頒詔册端門賜酺天下慶御觴尚恨滄溟迮從來文吏喜相輕聊遣濡毫書竹帛古别離孤城窮巷秋寂寂美人停梭夜歎息空園露濕荆棘枝荒蹊月照狐狸迹憶君去時兒在腹走如黃犢爺未識紫姑吉語元無據况慿瓦兆占歸日嫁來不省出門前魂夢何因識酒泉粉綿磨鏡不忍照女子盛時無十年詞意俱老絶去摸擬之迹而與古為化望夫石送君遠戍出河北男兒自以身許國不能彎弓騎惡馬欲隨君去何由得登山矯首西北雲形容雖變心猶存月明夜夜照淚痕鐵心石腸輸與君不煩刻劃而意已獨至古别離君北遊司并我南適熊湘邂逅淮陰市共飲官道傍丈夫各有懷窮達詎可量臨别一取醉浩歌神激揚勳業有際㑹風雲正蒼茫亂㸃劒鋒血苦寒芒屨霜死即萬鬼鄰生當致虞唐丹雞不須盟我非兒女腸構思深出語警不獨摩洗花之壘亦兼入青蓮之室偶懷小益南鄭之間悵然有賦西戍梁州鬢未絲嶓山漾水幾題詩劒分蒼石高皇迹原注嶓冢廟傍有高皇試劒石中分如截巖擁朱門老子祠原注三泉道上有老君洞景趣幽邃燒兔驛亭微雪夜騎驢棧路早梅時登臨不用頻悽斷未死安知無後期欲出遇雨東風吹雨惱遊人滿路新泥換細塵花睡柳眠春自懶誰知我更懶於春我更懶於春五字新鮮看鏡凋盡朱顏白盡頭神仙富貴兩悠悠胡塵遮斷陽關路空聽琵琶奏石州七十衰翁卧故山鏡中無復舊朱顏一聨輕甲流塵積不為君王戍玉關原注馬正惠公喜功名每曰幸未甚衰若有邊警願預征行得良馬數匹輕甲一聨足矣盧世㴶曰少陵勳業頻看鏡彼簡而饒此盡而暢夜分不寐起坐園中至旦凉氣蘇衰疾幽情入杖藜月驚孤鵲起天帶衆星西松菊今彭澤山川古㑹稽清吟殊未愜喔喔已晨雞頷聨對句似竒語道出正可一粲等閒言語變瑰竒殆謂是耶步至湖上寓小舟還舍病墮支離境閒尋漫浪遊湖平天鏡曉山峭石帆秋賖酒家家許看花處處留歸途倦扶杖却上釣魚舟箜篌遙寄季長少卿庭樹非不榮霜實萬葉枯朋友豈我棄漸遠勢自踈中夜起太息發篋覔舊書塵昏蠧食損行缺字欲無一讀色已變再讀涕淚濡卷書置篋中寧使飽蠧魚悶極有作貴已不如賤狂應又勝癡新寒壓酒夜微雨種花時堂下藤成架門邊枳作籬老人無日課有興即題詩三峽歌乾道庚寅豫始入蜀上下三峽屢矣後二十五年歸耕山陰偶讀梁簡文巴東三峽歌感之偶作十二巫山見九峰船頭彩翠滿秋空朝雲暮雨渾虛語一夜猿啼明月中我遊南賓春暮時蜀船曾繫掛猿枝雲迷江岸屈原塔花落空山夏禹祠取境清絶一洗陽臺慣語為巫山生色贈道流憶在長安爛漫遊大明宫闕與雲浮今朝偶上慈恩塔北望芒芒禾黍秋原注唐含元殿與慈恩塔南北相直贈道流而及此蓋自性情流出者三杯兀兀復騰騰服氣燒丹總不能借問生涯在何許孤舟風雨伴漁燈艾如張錦膺繡羽名山雞清泉可飲林可栖稻梁滿野棄不啄雖有竒禍無階梯東村西村煙雨晚蕭艾離離林薄淺翩然一下駭機發汝雖知悔安能免漢家天子南山下萬騎合圍窮日夜犬牙膺爪死不辭觸機折頸吁可悲寓意深至意凡三折李賀作不能及也郊行夜歸書觸目老翁病起厭端居隨意東西不問途霜野草枯鷹欲下江天雲濕雁相呼空垣破竈逃租屋青帽紅燈賣酒壚未畏還家踏泥潦園丁持炬小兒扶嵗暮感懷我家釋耒起遠自東封前詩書守素業蟬聨二百年長老日零落念之心惕然每恐後生輩或為利欲遷我少亦知學蹭蹬及華顛訟過豈不力壽非金石堅我壯已早衰晨鏡每惆悵藥物姑自持耆老曷敢望造物有乘除貧悴博無恙歸鄉更多感朋舊盡凋喪客來多避席謂我丈人行此意詎敢忘報子以直諒士生始志學固為聖人徒人人可稷卨世世皆唐虞仰事與俯育治道無絶殊孔孟之所傳世俗顧謂迂申韓尚刻薄老莊競虛無爾車非不良盍行九軌途在昔祖宗時風俗極粹美人才兼南北議論忘彼此誰令各植黨更仆而迭起中更夷狄禍此中猶未已臣不難負君生者固賣死儻築太平基請自厚俗始學有根柢故體製肅括意指宏深大家風力非徒事吟咏者流也文集論選用西北士大夫劄子天聖以前多取北人南方士大夫沈抑者多仁宗照知其弊公聽並觀兼收博采無南北之異及紹聖崇寧間取南方人更多而北方士大夫復有沈抑之歎陳瓘獨見其弊昌言於朝曰重南輕北分裂有萌嗚呼瓘之言天下之至言也山園雜詠殘春終日在林亭散髮披衣醉復醒科斗已成蛙閣閣櫻桃初結子青青魚遊滄海寧濡沫禽慕雕籠即翦翎薄晚東風吹小雨笑携長鑱伴畦丁意雖刻露語自新穎雨夜書感宦遊四十年歸逐桑榆暖皇恩念黎老一官猶置散春殘桃李盡風雨閉空館有懷無與陳萬事付酒碗近代固多賢吾意終不滿可憐杜拾遺冒死明房琯慷慨詎非奇經綸恨才短羣胡穴中原令人歎微管以古喻今當為張浚而發本傳云言者論游力說張浚用兵免歸則浚之罷游未必不為之言故以甫之救琯自比浚之與琯僨事如一富平再敗與陳陶青坂何以異詩深歎其才短固不誣也春晚雜興池靣萍初紫牆頭杏已青携兒撐小艇留客坐孤亭相法無侯骨生年直酒星正須遺萬事莫遣片時醒方回曰留客坐孤亭雖非竒句却極有味五六亦新異夜歸踈鐘渡水來素月依林上煙火認茅廬故倚船篷望妙語似王融江臯曲三月十一日郊行到處人家可乞漿槐陰巷陌午風凉水陂漫漫新秧緑山壠離離大麥黃父子力耕春漸老婦姑共績夜猶長堯民擊壤雖難繼芹美懷君未敢忘路傍曲凄凉路傍曲朱門人不知秋街槐葉落正是斷腸時秋夜燈欲殘時酒半消斷砧踈雨共無憀老來萬事渾非昔惟有詩情似灞橋舍北晚眺紅樹青林帶暮煙並橋常有賣漁船樊川詩句營丘畫盡在先生拄杖邊自然入畫初冬感懷落葉掃還積斷鴻飛更鳴羸軀得霜健老眼向書明水瘦河聲壯萁枯馬力生竟為農父死白首負功名聞雁霜高木葉空月落天宇黑哀哀斷行雁來自關塞北江湖稻梁少念汝安得食蘆深洲渚冷嵗晚霰雪逼不知重雲外何處避畢弋我窮思遠征羡汝有羽翼意入風騷格逼漢魏與杜陵相當真乃不復多讓枕上偶成放臣不復望修門身寄江頭黃葉村酒渴喜聞踈雨滴夢回愁對一燈昏河潼形勝寧終棄周漢規模要細論自恨不如雲際雁南來猶得過中原舍北閒望作六字絶句潘嶽一篇秋興李成八幅寒林舍北偶然倚杖盡見古人用心善畫似真以對面取之用意微妙雨夜有懷張季長少卿放翁雖老未忘情獨卧山村每自驚鼎鼎百年如電速寥寥一笑抵河清梅初破藟行江路燈欲成花聽雨聲正用此時思劇飲故交零落愴餘生潘問竒曰河清如此用形容殊苦客言來自上臯道中以其語作一絶日曬霜融作淺泥酒家却在斷橋西五陵今代無豪傑獨卧茅簷聽午雞殘臘殘臘無多日吾生又一年林塘明夕照墟塔淡春煙山色危欄角梅花緑酒邊嵗時元自好老病獨悽然懷舊翠崖紅棧鬱參差小益初程景最竒誰向毫端收拾得李將軍畫少陵詩張完臣曰又是一蜀道佳話幽居初夏湖山勝處放翁家槐柳陰中野徑斜水滿有時觀下鷺草深無處不鳴蛙籜龍己過頭番筍木筆猶開第一花歎息老來交舊盡睡餘誰共午甌茶寫得幽字意出潘問竒曰頸聨對句更勝晨起齒豁不可補髮脫無由栽清晨明鏡中老色蒼然來餘年亦自惜未忍付酒杯抽架取我書危坐闔復開萬世見唐堯䕫龍獲親陪寥寥三千年氣象挽可回豈以七尺軀顧受世俗衰道在無不可廊廟均蒿萊約㫖植義真力彌滿清晨十字亦有蒼然之氣六月二十四日夜分夢范至能李知幾尤延之同集江亭諸公請豫賦詩記江湖之樂詩成而覺忘數字而已露箬霜筠織短蓬飄然來往淡煙中偶經菱市尋溪友却㨂蘋汀下釣筒白菡蓞香初過雨紅蜻蜓弱不禁風吳中近事君知否團扇家家畫放翁風流自賞夢中亦應得意五六調新采麗淺薄者議其未穩真可一噱題韓運鹽竹隱堂絶句塵埃車馬日駸駸誰解從君一散襟待我清秋有閒日抱琴來寫萬龍吟舟中詠落景餘清暉輕橈弄溪渚之句蓋孟浩然耶溪泛舟詩也因以其句為韻賦詩獨鶴還故鄉巋然但城郭出門無與遊所至苦寂寞褁飯事幽討此計殊不惡薄暮宿漁家蒼煙帶墟落維舟入谷口信步造異境隔籬雞犬聲滿地梧楸影瓦甑炊香稻石泉汲新井人間苦逼仄愛此須臾景老圃髮如霜見客能廢鋤與坐使之年自云八十餘老身六朝民草舍數世居力守遠祖言一字不學書沿溪得茅店酒旗出柴荆杖頭錢已空一醉何由成主人語鄭重手把甕面清勸我姑小留溪魚亦可烹秦皇酒甕邊古有釣魚磯我來必竟日時挈雙鯉歸白鷺真可人常先孤棹飛高詠江練句令人憶元暉鏡湖三百里風止鏡面平持以照吾心俗塵安得生散髮鷗鷺間萬事秋毫輕誰能拂東絹寫我孤舟橫朝發雲根寺暮宿煙際橋冷螢濕不飛潛魚驚自跳菱船歌裊裊狄浦風蕭蕭平明宿鳥起我亦理歸橈古寺照滄波老木閟雲洞輕舟不搖楫正用一風送汲井漱甘液掃榻寓幽夢所恨山未深城笳聽三弄禹穴探斷簡樵風泛清溪倒影森松桂避船散鳬鷖座中有異境十里青玻瓈高塔忽招人湖邊日未低溪行已清秋還舍尚殘暑天公為解圍簾櫳過踈雨青蔬喜小摘紅粒亦新杵一飽坐北軒蘋花泣煙渚作者詩以萬計閒適之什往往出之率易亦復數見不鮮沙中金屑每苦難披十詩直舉胸情清真古淡妙處在神味之間不可以貌求之秋夜紀懷北斗垂莽蒼明河浮太清風林一葉下露草百蟲鳴病入新凉減詩從半睡成還思散關路炬火驛前迎方回曰中四句語意至工舍北搖落景物殊佳偶作屋角成金字溪流作縠紋斜通小橋路半掩夕陽門孤艇衝煙過踈鐘隔塢聞杜門非獨病實自厭紛紛方回曰放翁此題凡五首所謂筆端有口新冬景物搜抉無遺屋角成金字本出北史斛律金傳以對溪流作縠紋亦竒夜坐杳杳霜鐘十里聲娟娟江月半窗明陳編欲絶猶堪讀微火相依更有情九曲煙雲新散吏原注時方被命再領武夷祠祿百年鉛槧老諸生頽然待旦君無笑尚勝聞雞賦早行原注溫岐詩云雞聲茅店月人迹板橋霜蓋唐人早行絶唱也隴頭水隴頭十月天雨霜壯士夜挽緑沉槍卧聞隴水思故鄉三更起坐淚數行我語壯士勉自彊男兒墮地志四方裹尸馬革固其常豈若婦女不下堂生逢和親最可傷歲輦金絮輸胡羌夜視太白收光芒報國欲死無戰場有古直悲涼之氣書志往年出都門誓墓志已决况今蒲柳姿俯仰及大耋妻孥厭寒餓鄰里笑迂拙悲歌行拾穗幽憤卧齧雪千歲埋松根陰風蕩空穴肝心獨不化凝結變金鐵鑄為上方劔釁以佞臣血匣藏武庫中出參髦頭列三尺粲星辰萬里靜妖孽君看此神竒醜虜何足滅幻想竒文不可磨滅書憤白髮蕭蕭卧澤中祇慿天地鍳孤忠厄窮蘇武餐氊久憂憤張巡嚼齒空細雨春蕪上林苑頽垣夜月洛陽宮壯心未與年俱老死去猶能作鬼雄方回曰悲壯感慨不當徒以虛語視之鏡裏流年兩鬢殘寸心自許尚如丹衰遲罷試戎衣窄悲憤猶爭寶劒寒遠戍十年臨的博壯圗萬里戰臯蘭關河自古無窮事誰料如今袖手看小舟遊西涇度西岡而歸小雨重三後餘寒百五前聊乘瓜蔓水閒泛木蘭船雪暗梨千樹煙迷柳一川西岡夕陽路不到又經年穩中帶秀此境正不易到王復禮曰較太白梨花千樹雪楊柳萬條煙似勝一籌但水衡記以五月為瓜蔓水此屬一時誤用春行九日春陰一日晴强扶衰病此閒行猩紅帶露海棠濕鴨緑平隄湖水明原注杜子美曉看紅濕處花重錦官城李太白蜀日紅且明用濕字明字可謂奪造化之功世未有拈出者酒賤柳陰逢醉卧土肥稻壟看深耕山翁莫道渾無用解與明時說太平方回曰引少陵太白謂奪造化之功却是世未有拈出者前輩用功如此閒身炊煙漠漠閉柴荆聊用閒身答太平重碧飛觴心未老硬黃臨帖眼猶明吳蠶滿箔含桃熟壠麥登車搏黍鳴補劓息心今有地問君何處用虛名舍北行飯書觸目落雁昏鴉集遠洲青林紅樹擁平疇意行舍北三義路閒看橋西一片秋小婦破煙撐去艇丫童橫笛喚歸牛形容野景無餘思自怪癡頑不解愁盧世㴶曰先寫景而後入事句句宛肖雪夜感舊江月亭前樺燭香龍門閣上䭾聲長亂山古驛經三折小市孤城宿兩當晚嵗猶思事鞍馬當時那信老耕桑緑沉金鎖俱塵委雪灑寒燈淚數行調極清和頷聨斫句工緻可愛吳喬曰放翁壯時有志經世故有晚嵗猶思事鞍馬當時那信老耕桑之句雜感志士山棲恨不深人知已是負初心不須先說嚴光輩直自巢由錯到今故舊書來訪死生時聞剝啄叩柴荆自嗟不及東家老至死無人識姓名蘭南巖路最近飯已時散策香來知有蘭遽求乃弗獲生世本幽谷豈願為世娛無心託階庭當門任君鋤為幽人寫照寓意深遠作者别調感舊夜涉南沮水朝過小益城梯山天一握度棧土微平雨近秦雲暗霜高隴月明至今孤夢裏喝馬有遺聲原注喝馬皆七字韻語聞之悲愴動人凛凛隆中相臨戎遂不還塵埃出師表草棘定軍山壯氣河潼外雄名管樂間登堂拜遺像千載愧吾顏我思杜陵叟處處有遺踪錦里瞻祠柏綿州弔海棕蹉跎悲櫪驥感會失雲龍生世後斯士吾將安所從游久居蜀地於孔明子美企想獨深二詩渾成老健蓋程形賦音與其人相稱也露坐原注立秋前五日旋削甘瓜進酒巵斷雲漠漠斗離離北臨積水風來壯東恨長林月上遲秋近不堪聞急杵夜凉已復怯輕絺天孫老抱河梁恨豈獨人生事可悲新秋殘暑無多日幽居近小江酒醒中夜起松月入山窗秋風昨夜來聲滿梧桐樹故人渺天末此夕誰與度妙語得自直尋亦清晨登隴首明月照積雪之比秋夕露坐作銀河半落露華清斗南闌干斗北明冉冉方悲老將至纎纎又歎月初生酒牀細滴香浮瓮衣杵相聞聲滿城萬卷讀書無用處却將耕稼報升平感秋秋色關河外秋聲天地間壯士感此時朝鏡凋朱顏一身寄空谷萬里夢天山噫嗚怒眥裂憤激悲涕澘古來真龍駒未必置天間長松倒澗壑委棄同蓁菅得志未可測談笑濟時艱凛然出師表一字不可删新凉菰首初離水薑芽淺漬糟粳香等炊玉韭美勝炮羔露下殘蕪濕風生萬木號從今更何事痛飲讀離騷豐歲豐嵗歡聲動四鄰深秋景氣粲如春羊腔酒擔爭迎婦鼉鼓龍船共賽神處處喜晴過甲子家家築屋趁庚申老翁欲伴鄉閭醉先辦長衫紫領巾㸃綴嫵媚煞有風致小舟過吉澤效王右丞澤國霜露晚孤村煙火微本去官道遠自然人迹稀木落山盡出鐘鳴僧獨歸漁家閒似我未夕閉柴扉不必似王自饒清致文集跋王右丞集余年十七八時讀摩詰詩最熟今永晝再取讀之如見舊師友恨間濶之久也秋晴見天際飛鴻有感新晴天宇色正青羣鴻高賽在冥冥兒童相呼共仰視我亦扶杖來中庭豐年到處稻梁滿胡不暫下栖沙汀應須江海寄曠快肯為霜雪嗟飄零書生可笑不自喜憔悴久翦籠中翎鷗波萬里每愧杜鶴化千載知非丁風前哀號漫激烈月下孤影常竛竮詩成欲寫復懶去誦似溪友聲泠泠遣調流麗曲盡心手之妙戊午重九朋舊相望天一涯登高結伴只鄰家秋風自欲吹紗帽衰鬢何曾泥菊花藥市神仙思益部糕盤節物記京華自憐病後歡悰薄小醉歸來日未斜舟中柂邊潮水落還生篷底寒燈滅復明約束長年牢繫纜報人風雨有鼉鳴不必有寄即事自佳蕭蕭風雨小江秋不是愁人亦合愁忽聽踈鐘知寺近笑尋沙路上牛頭冬日感興十韻霧雨天昏曀陂湖地阻深蔽空鴉作陳暗路棘成林有客風埃裏頻年老病侵夢魂來二豎相法缺三壬舊憤開孤劍新愁感斷砧唐衢惟痛哭莊舄正悲吟瘦跨秋門馬寒生夜店衾但思全舊璧敢冀訪遺簪樓上蒼茫眼燈前破碎心長謠傾濁酒慷慨壓層陰菴中晨起書觸目暉暉初日上簾鈎漠漠清寒透衲裘雪棘並棲雙鵲瞑金環斜絆一猿愁廉宣卧壑松楠老王子穿林水石幽戲事自憐除未盡此生行欲散風漚原注唐希鴉畫鵲易元吉畫猿廉宣仲老木王仲信水石皆菴中所挂小軸設色妍麗似晚唐人佳句春日小園雜賦市塵不到放翁家繞麥穿桑野徑斜夜雨長深三尺水曉寒留得一分花悶從鄰舍分春瓮閒就僧窗試露芽自此年光應更好日驅秧馬聽繅車夜雨一聨鬆秀可愛沈園城上斜陽畫角哀沈園非復舊池臺傷心橋下春波緑曽是驚鴻照影來張完臣曰寫得幽豔動人夢斷香消四十年沈園柳老不吹綿此身行作稽山土猶弔遺踪一泫然張完臣曰又深一步其痛愈深紹興郡刻本題下注此放翁憶其前妻作也妻以失歡於姑被遣後於沈園見之未幾下世翁再遊此地追感賦詩凄苦不忍多讀讀晉書諸公日飫萬錢厨人乳蒸豚玉食無誰信秋風雒城裏有人歸棹為蓴鱸不著議論而指意躍然咏史上乘春晴自雲門歸三山乍行春野眼增明漸減春衣體倍輕人賣山茶先穀雨鴉隨墦祭過清明柳塘水滿雙鳬戲稻隴泥深一犢行晚到三橋泛舟去掩關不復畏重城夜聞姑惡湖橋東西斜月明高城漏鼓傳三更釣船夜過掠沙際蒲葦蕭蕭姑惡聲湖橋南北煙雨昏兩岸人家早閉門不知姑惡何所恨時時一聲能斷魂天地大矣汝至微滄波本自無危機秋菰有米亦可飽哀哀如此將安歸讀前輩詩文有感我無前輩千鈞筆造物爭功謝不能己分文章歸委靡可憐意氣尚慿陵鸞旗廣殿晨排仗鐵馬黃河夜踏氷此事要須推大手蟬嘶分付與吳僧巧構形似之言要非詣力所臻不能道來親切乃爾讀隱逸傳終南處士入都門少室山人補諫垣畢竟只供千載笑石封三品鶴乘軒不以議論傷格律比勘亦自允協秋陰淡日披朝霧輕雲結暮陰菰蒲溪路暗松竹草堂深妙墨雙鈎帖竒聲百衲琴古人端未遠一笑會吾心秋懷皇天本無心萬物各有時飛鴻何預人南翔每如期仰看霜露墜俯歎草木衰英英籬下菊秀色獨滿枝豈無一樽酒相與斟酌之耋老天所佚行歌復何疑改朔甫再宿月見西南隅纎纎一銀鈎挂空疑有無我行青楓岸遠水浮雙鳬新寒入短衣感此風霜初頗欲呼小艇東村行芋區衣薄且言歸煙火望吾廬閒淡有味秋思日落江城聞搗衣長空杳杳雁南飛桑枝空後醅初熟豆莢成時兔正肥徂歲背人常冉冉老懷感物倍依依平生許國今何有且擬梁鴻賦五噫冬晴與子坦子聿遊湖上海山山下百餘家垣屋參差一帶斜我欲往尋疑路斷試沿流水覔桃花齊中弄筆偶書示子聿左右琴樽靜不譁放翁新作老生涯焚香細讀斜川集候火親烹顧渚茶書為半酣差近古詩雖苦思未名家一窗殘日呼愁起裊裊江城咽暮笳少陵云語不驚人死不休放翁云詩雖苦思未名家文人之豪故自各有著力處今人未涉其境而漫以雕琢直率置之可乎祖應世曰放翁七律無一字效顰四唐而獨開蹊徑别有一天何嘗寄人籬下陳訏曰昔蘇長公教人作詩曰字字覔竒險節節纍枝葉又曰法度法前軌後山亦云要當攻石堅勿作搏沙散放翁詩至萬首疑其無復持擇而改詩錬句每形篇什數公之於詩亦列子之御風而行靈均之桂舟玉車也而其言顧如此夢中作遊山絶句霜風吹帽江村路小蹇迢迢委轡行忽到雲山幽絶處穿林啼鳥不知名北望感懷榮河溫洛帝王州七十年來禾黍秋大事竟為朋黨誤遺民空歎歲時遒乾坤恨入新豐酒霜露寒侵季子裘食粟本同天下責孤臣敢獨廢深憂有名論非尋常所及人日東園歲首未入春風氣已稍和我睡意慵起如此鳴禽何駕言之東園落梅亦己多江南無堅氷緑池生微波挹彼蒲萄醅酌我鸚鵡螺雖無絲與竹倚樹自高歌矯首東南望稽山鬱嵯峨兒曹幸力穡老子得婆娑枕上作山雨蕭蕭過沙泉咽咽流夢中無遠道醉裏失孤愁貧賣相如騎寒思季子裘兒童報新霽裹飯出閒遊夢中無遠道五字亦未經人道游又有句云夢移鄉國近則更竒矣長干行裙腰緑如草衫色石榴花十二學彈箏十三學琵琶寧嫁與商人夫婦各天涯朝朝問水神夜夜夢三巴聘金雖如山不願入侯家鄣袖庭花下東風吹鬢斜小橋漠漠輕陰隱隱雷石榴半落㸃莓苔小橋西北闌干角獨岸綸巾待雨來觀畫山水古北安西志未酬人間隨處送悠悠騎驢白帝城邊雨挂席黃陵廟外秋大網截江魚可膾高樓臨路酒如油老來無復當年快聊對丹青作卧遊示友道向虛中得文從實處工凌空一鶚上赴海百川東氣骨真當勉規模不必同人生易衰老君等勿匆匆十月十月霜侵季子裘吾詩又送一年秋風回斷續聞樵唱木落參差見寺樓久已浮雲看富貴固應華屋等山丘江邊海際多幽致擬跨青騾處處遊集中有木落寺樓高之句與此頷聨各有佳致梅花春信今年早江頭昨夜寒已教清徹骨更向月中看對酒戲詠淺傾西國蒲萄酒小嚼南州豆蔻花更拂烏絲寫新句此翁可惜老天涯盧世㴶曰雋麗不可名狀先少師宣和初有贈朝公以道詩云奴愛才如蕭穎士婢知詩似鄭康成朝公大愛賞今逸全篇偶讀朝公文集泣而足之士不逢時勇退耕閉門自號景迂生遠聞佳士輒心許老見異書猶眼明奴愛才如蕭頴士婢知詩似鄭康成早孤遇事偏多感欲續殘章涕已傾追感往事諸公可歎善謀身誤國當時豈一秦不望夷吾出江左新亭對泣亦無人千年而後如聞嘆息之聲善謀身一言尤中庸臣病根潘問竒曰此詩雖缺含蓄然亦可知南渡後雖周伯仁亦難得文集跋吕侍講嵗時雜記年運而往士大夫安於江左求新亭對泣者正未易得撫卷纍欷御選唐宋詩醇卷四十六
