body:
  text: 太原白居易詩二目錄新樂府七德舞海漫漫立部伎上陽白髪人新豐折臂翁司天臺捕蝗昆明春城鹽州道州民蠻子朝驃國樂縛戎人驪宫髙百鍊鏡青石西涼伎八駿圖澗底松牡丹芳紅線毯杜陵叟賣炭翁陰山道鹽商婦杏為梁紫毫筆隋堤栁秦吉了采詩官
