body:
  text: 襄陽杜甫詩九目録移居䕫州郭宿江邉閣西閣口號呈元二十一西閣閣夜瀼西寒望入宅暮春題瀼西新賃草屋秋野五首課小豎鉏斫舍北果林枝蔓荒穢净訖移牀自瀼西荆扉且移居東屯茅屋東屯月夜暫往白帝復還東屯刈稻了咏懷上白帝城上白帝城武侯廟八陳圖謁先主廟灔澦堆灔澦白帝白帝城最髙樓諸葛廟峽口二首天池瞿塘兩崖䕫州歌偶題秋興八首詠懷古跡五首諸將五首秋日䕫府詠懷奉寄鄭監審李賔客之芳一百韻贈李八祕書别三十韻解悶復愁承聞河北諸道節度入朝歡喜口號洞房宿昔能畫鬭雞鸚鵡歷歷驪山提封
