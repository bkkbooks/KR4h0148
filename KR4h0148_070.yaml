front:
  text: 欽定四庫全書御選唐宋詩醇巻三十四
  hash: sha256:ab831d28c2ff3dfc2fe6976f5326593d2f454b48944e29dcb43567999cad5991
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_070-1a, image: WYG1448/WYG1448-0647a.png}
body:
  text: 眉山蘓軾詩三目録韓子華石淙莊立秋日禱雨宿靈隱寺同周徐二令病中遊祖塔院栢堂與述古自有美堂乘月夜歸有美堂暴雨登玲瓏山宿九仙山宿海㑹寺徑山道中次韻答周長官兼贈蘓寺丞初自徑山歸述古召飲介亭以病先起九日尋臻闍棃遂泛小舟至勤師院二首録一首九日舟中望見有美堂上魯少卿飲以詩戲之二首録一首次韻周長官壽星院同餞魯少卿寶山新開徑和錢安道寄惠建茶夜至永樂文長老院文時臥病退院除夜野宿常州城外二首古纒頭曲惠山謁錢道人烹小龍團登絶頂望太湖虎丘寺常潤道中有懷錢塘寄述古五首録一首金山寺與桞子玉飲大醉臥寶覺禪榻夜分方醒書其壁大風留金山兩日遊鶴林招隱二首無錫道中賦水車過永樂文長老己卒聽僧昭素琴僧惠勤初罷僧職遊靈隱髙峰塔新城陳氏園次鼂補之韻與毛令方尉遊西菩提寺二首聽賢師琴除夜病中贈叚屯田喬太守見和復次韻答之二公再和亦再答之雪後書北臺壁二首次韻章傳道喜雨惜花送春和子由西齋寄劉孝叔懷西湖寄鼂美叔同年祭常山囘小獵和文與可洋川園池三十首録七首湖橋橫湖蓼嶼待月臺過谿亭篔簹谷寒蘆港寄題刁景純藏春塢寄黎眉州次韻周邠寄鴈蕩山圖二首和鼂同年九日見寄送喬施州董儲郎中嘗知眉州與先人遊過安丘訪其故居見其子希甫留詩屋壁
