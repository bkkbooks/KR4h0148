  text: 昌黎韓愈詩二目録赴江陵途中寄贈王二十補闕李十一拾遺李二十六員外翰林三學士此日足可惜一首贈張籍歸彭城醉贈張祕書送惠師送靈師縣齊有懷陪杜侍御逰湘西兩寺獨宿有題一首因獻楊常侍嶽陽樓别竇司直送文暢師北逰答張徹
