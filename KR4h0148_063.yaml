  text: 欽定四庫全書御選唐宋詩醇卷三十
  hash: sha256:614261749786cb0085fc655b10f7192ae47c7e61c0d884055dd23f9d556f9dc1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0148_WYG_063-1a, image: WYG1448/WYG1448-0575c.png}
body:
  text: 昌黎韓愈詩四陸渾山火和皇甫是用其韻皇甫補官古賁渾時當玄冬澤乾源山狂谷很相吐吞風怒不休何軒軒擺磨出火以自燔有聲夜中驚莫原天跳地踔顛乾坤赫赫上照窮崖垠截然高周燒四垣神焦鬼爛無逃門三光弛隳不復暾虎熊麋豬逮猴猿水龍鼉龜魚與黿鴉鴟雕鷹雉鵠鵾燖炮煨􅠉孰飛奔祝融告休酌卑尊錯陳齊玫闢華園芙蓉披猖塞鮮繁千鐘萬鼓咽耳喧攢雜啾嚄沸篪塤彤幢絳旃紫纛幡炎官熱屬朱冠禈髹其肉皮通䏶臀頽胸垤腹車掀轅緹顔韎股豹兩鞬霞車虹靷日轂轓丹蕤縓蓋緋翻㠾紅帷赤幕羅脤膰􅎺池波風肉陵屯谽呀巨壑頗黎盆豆登五山瀛四樽熙熙釂酬笑語言雷公擘山海水翻齒牙嚼齧舌腭反電光䃸磹頳目䁔頊冥收威避玄根斥棄輿馬背厥孫縮身潛喘拳肩跟君臣相憐加愛恩命黑螭偵焚其元天關悠悠不可援夢通上帝血面論側身欲進叱於閽帝賜九河湔涕痕又詔巫陽反其魂徐命之前問何寃火行於冬古所存我如禁之絶其飱女丁婦壬傳世婚一朝結讐奈後昆時行當反慎藏蹲視桃著花可小騫月及申酉利復怨助汝五龍從九鯤溺厥邑囚之崑崙皇甫作詩止睡昏辭誇出真遂上焚要余和增怪又煩雖欲悔舌不可捫只是咏野燒耳寫得如此天動地岋憑空結撰心花怒生韓醇曰詳此詩始則言火勢之盛次則言祝融之御火其下則水火相尅相濟之説也樊汝霖曰從公學文者多矣惟李習之得公之正皇甫持正得公之竒持正嘗語人曰書之文不竒易可謂竒矣豈礙理傷聖乎如龍戰于野其血玄黃見豕負塗載鬼一車突如其來如焚如死如棄如何等語也今此詩黑螭五龍九鵾等語其與易龍戰於野何異筆墨間録曰無逸云鴉鴟雕鷹雉鵠鵾句正柏梁體後山作七言詩上東坡襲此體劉石齡曰公詩根柢全在經傳如易説卦離為火其於人也為大腹故於炎官熱屬以頽胸垤腹擬諸其形容非臆説也又彤幢紫纛日轂霞車虹靷豹鞬電光頳目等字亦從為日為電為甲胄為戈兵句化出造語極竒必有依據以理考索無不可解者世儒於此篇每以怪異目之且以不可解置之吁此亦未深求其故耳豈真不可解哉中山詩話曰唐詩賡和有次韻先後無易有依韻同在一韻有用韻用彼韻不必次韓吏部和皇甫陸渾山火是也今人多不曉洪興祖曰丁火也壬水也火女也水男也丁女而為婦於壬故曰女丁婦壬一作夫丁婦壬亦通夫丁者壬也言壬為丁夫也婦壬者丁也言丁為壬婦也朱子曰按丁為陽中之隂壬為隂中之陽故言女之丁者為婦於壬以見水火之相配今術家亦言丁與壬合洪氏二説皆是苦寒四時各平分一氣不可兼隆寒奪春序顓頊固不亷太昊弛維綱畏避但守謙遂令黃泉下萌牙夭勾尖草木不復抽百味失苦甜凶飈攪宇宙鋩刃甚割砭日月雖云尊不能活烏蟾羲和送日出恇怯頻窺覘炎帝持祝融呵噓不相炎而我當此時恩光何由沾肌膚生鱗甲衣被如刀鐮氣寒鼻莫嗅血凍指不拈濁醪沸入喉口角如銜箝將持匕箸食觸指如排籖侵罏不覺暖熾炭屢己添探湯無所益何况纊與縑虎豹僵穴中蛟螭死幽潛熒惑喪躔次六龍冰脫髯芒碭大包內生類恐盡殱啾啾忩間雀不知己微纎舉頭仰天鳴所願晷刻淹不如彈射死却得親炮燖鸞皇茍不存爾固不在占其餘蠢動儔俱死誰恩嫌伊我稱最靈不能女覆苫悲哀激憤歎五藏難安恬中霄倚牆立淫淚何漸漸天王哀無辜惠我下顧瞻褰流去耳纊調和進梅鹽賢能日登御黜彼傲與憸生風吹死氣豁達如褰簾懸乳零落墮晨光入前簷雪霜頓銷釋土脈膏且黏豈徒蘭蕙榮施及艾與蒹日萼行鑠鑠風條坐襜襜天乎茍其能吾死意亦厭鋭思鑱刻字帶刀鋒不數晉人危語了語結意與少陵吾廬獨破受凍死亦足正同王伯大曰此詩意蓋有所諷德宗貞元十九年春公為四門博士作某氏曰按舊唐書韋渠牟傳自陸贄免相後德宗不復委成宰相廟堂備員行文書而已所狎而取信者裴延齡李齊運王紹李實韋執誼洎渠牟等皆權傾相府姦欺多端此詩所以諷也胡渭曰唐書五行志貞元十九年三月大雪豈即所謂苦寒耶和虞部盧四酬翰林錢七赤藤杖歌赤藤為杖世未窺臺郎始攜自滇池滇王掃宮避使者跪進再拜語嗢咿繩橋拄過免傾墮性命造次蒙扶持途經百國皆莫識君臣聚觀逐旌麾共傳滇神出水獻赤龍拔鬚血淋漓又云羲和操火鞭暝到西極睡所遺幾重包裹自題署不以珍怪誇荒夷歸來捧贈同舍子浮光照手欲把疑空堂晝眠倚牖户飛電著壁搜蛟螭南宫清深禁闈密唱和有類吹塤篪妍辭麗句不可繼見寄聊且慰分司沈德潛曰赤龍羲和云云此種竒傑昌黎獨造送湖南李正字歸長沙入楚深洞庭值秋晚人隨鴻雁少江共蒹葭逺厯厯余所經悠悠子當返孤遊懷耿介旅宿夢婉娩風土稍殊音魚蝦日異飯親交俱在此誰與同息偃風神綿邈絶似韋柳是昌黎集中變調唯南溪三首近之沈德潛曰昌黎五言難得此清遠之格寄盧同玉川先生洛城裏破屋數間而已矣一奴長鬚不裹頭一婢赤腳老無齒辛勤奉養十餘人上有慈親下妻子先生結髮憎俗徒閉門不出動一紀至令鄰僧乞米送僕忝縣尹能不恥俸錢供給公私餘時致薄少助祭祀勸參留守謁大尹言語才及輒掩耳水北山人得名聲去年去作幕下士水南山人又繼往鞍馬僕從塞閭里少室山人索價髙兩以諫官徴不起彼皆刺口論世事有力未免遭驅使先生事業不可量惟用法律自繩己春秋五傳束高閣獨抱遺經究終始往年弄筆嘲同異怪辭驚衆謗不己近來自説尋坦塗猶上虛空跨緑駬去嵗生兒名添丁意令與國充耘耔國家丁口連四海豈無農夫親耒耜先生抱才終大用宰相未許終不仕假如不在陳力列立言垂範亦足恃苗裔當蒙十世宥豈謂貽厥無基址故知忠孝生天性潔身亂倫安足擬昨晚長鬚來下狀隔牆惡少惡難似每騎屋山下窺闞渾舍驚怕走折趾憑依婚媾欺官吏不信令行能禁止先生受屈未曾語忽此來告良有以嗟我身為赤縣令操權不用欲何俟立召賊曹呼伍伯盡取鼠輩尸諸市先生又遣長鬚來如此處置非所喜况又時當長養節都邑未可猛政理先生固是余所畏度量不敢窺涯涘放縱是誰之過歟效尤戮僕愧前史買羊沽酒謝不敏偶逢明月曜桃李先生有意許降臨更疑長鬚致雙鯉玉川垂老尚依時宰致罹甘露之難其人固非高隱退之何以傾倒乃爾觀詩中所敘特與鄰人搆訟而以情面聽其起滅耳却寫得壁立千仭有執鞭欣慕之意乃知唐時處士類能作聲價如此隱居詩話曰退之李花詩云夜領張徹投盧同乘雲共到玉皇家長姬香御四羅列縞裙練帨無等差及贈盧同詩曰買羊沽酒謝不敏偶逢明月曜桃李即此時也李渤石洪溫造為處士純盜虛名韓愈雖與之逰而多侮薄之所謂水北山人得名聲去年去作幕下士水南山人又繼往鞍馬僕從塞閭里少室山人索價高兩以諫官徴不起彼皆刺口論世事有力未免遭驅使夫為處士乃刺口論世事希聲名願驅使又要索高價似玉飾僕御以誇閭里此何等人也其侮薄之甚矣班固云春秋五傳謂左丘明公羊高穀梁赤鄒氏夾氏又云鄒氏無書夾氏未有書而韓愈贈盧同詩云春秋五傳束高閣獨抱遺編究終始不知此二傳果何等書彥周詩話曰玉川子春秋傳僕家舊有之今亡矣辭簡而逺得聖人之意為多後世有深於經而見盧傳者當知退之不妄許人也酬司門盧四兄雲夫院長望秋作長安雨洗新秋出極目寒鏡開塵函終南曉望踏龍尾倚天更覺青巉巉自知短淺無所補從事久此穿朝衫歸來得便即逰覽暫似壯馬脫重銜曲江荷花蓋十里江湖生目思莫緘樂逰下矚無逺近緑槐萍合不可芟白首寓居誰借問平地寸步扄雲巖雲夫吾兄有狂氣嗜好與俗殊酸鹹日來省我不肻去論詩説賦相喃喃望秋一章己驚絶猶言低抑避謗讒若使乘酣騁雄怪造化何以當鐫劖嗟我小生值強伴怯膽變勇神明鑒馳坑跨谷終未悔為利而止真貪饞髙揖羣公謝名譽逺追甫白感至諴樓頭完月不共宿其奈就缺行攕攕誰氏子非癡非狂誰氏子去入王屋稱道士白頭老母遮門啼挽斷衫袖留不止翠眉新婦年二十載送還家哭穿市或云欲學吹鳯笙所慕靈妃嫓蕭史又云時俗輕尋常力行險怪取貴仕神仙雖然有傳説知者盡知其妄矣聖君賢相安可欺乾死窮山竟何俟嗚呼余心誠豈弟願往教誨究終始罰一勸百政之經不從而誅未晚耳誰其友親能哀憐寫吾此詩持送似原注曰吕氏子炅見李素墓志本集河南少尹李素墓志曰素拜河南少尹行大尹事吕氏子炅棄其妻著道士衣冠謝母曰當學仙王屋山去數月復出間詣公公立之府門外使吏卒脫道士服給冠帶送付其母送無本師歸范陽無本於為文身大不及膽吾嘗示之難勇往無不敢蛟龍弄角牙造次欲手攬衆鬼囚大幽下覷襲玄窞天陽熙四海注視首不頷鯨鵬相摩窣兩舉快一噉夫豈能必然固已謝黯黮狂詞肆滂葩低昂見舒慘姦窮怪變得往往造平淡蜂蟬碎錦纈緑池披菡萏芝英擢荒蓁孤翮起連菼家住幽都逺未識氣先感來尋吾何能無殊嗜昌歜始見洛陽春桃枝綴紅糝遂來長安里時卦轉習坎老懶無鬬心久不事鉛槧欲以金帛酬舉室常顑頷念當委我去雪霜刻以憯獰飈攪空衢天地與頓撼勉率吐歌詩慰女别後覽奬賞之中諷喻深遠正不獨為浪山説法也身大不及膽妙於翻用俞瑒曰凡昌黎先生論文諸作極有關係其中次第俱從親身厯過故能言其甘苦親切乃耳如此詩云無本於為文身大不及膽吾嘗示之難勇往無不敢作詩入手須要膽力全在勇往上見其造詣之高又云姦窮怪變得往往造平淡得於能變之後所謂漸近自然也此境夫豈易到公之指點來學者深矣微矣石鼓歌張生手持石鼓文勸我試作石鼓歌少陵無人謫仙死才薄將奈石鼓何周綱陵遲四海沸宣王憤起揮天戈大開明堂受朝賀諸侯劍珮鳴相磨搜於岐陽騁雄俊萬里禽獸皆遮羅鐫功勒成告萬世鑿石作鼓隳嵯峨從臣才藝咸第一揀選撰刻留山阿雨淋日炙野火燎鬼神守護煩撝呵公從何處得紙本毫髮盡備無差訛辭嚴義密讀難曉字體不類𨽻與科年深豈免有缺畫快劍斫斷生蛟鼉鸞翔鳯翥衆仙下珊瑚碧樹交枝柯金繩鐵索鎖紐壯古鼎躍水龍騰梭陋儒編詩不收入二雅褊迫無委蛇孔子西行不到秦掎托星宿遺羲娥嗟余好古生苦晚對此涕淚雙滂沱憶昔初蒙博士徴其年始改稱元和故人從軍在右輔為我量度掘臼科濯冠沐浴告祭酒如此至寶存豈多氊包席裹可立致十鼓秖載數駱駝薦諸太廟比郜鼎光價豈止百倍過聖恩若許留太學諸生講解得切磋觀經鴻都尚填咽坐見舉國來奔波剜苔剔蘚露節角安置妥帖平不頗大厦深簷與蓋覆經厯久遠期無他中朝大官老於事詎肻感激徒媕婀牧童敲火牛礪角誰復著手為摩挲日銷月鑠就埋沒六年西顧空吟哦羲之俗書趂姿媚數紙尚可博白鵝繼周八代爭戰罷無人收拾理則那方今太平日無事柄仕儒術崇邱軻安能以此上論列願借辨口如懸河石鼓之歌止於此嗚呼吾意其蹉跎典重瑰竒良足鑄之金而磨之石後半旁皇珍惜更見懷古情深厥後石鼓升沈不一竟得依聖人之居其文與六籍並垂永世則退之請留太學之説實有力焉此詩亦不為空作矣容齋隨筆曰文士為文有矜夸過實雖韓文公不能免如石鼓歌極道宣王之事偉矣至云孔子西行不到秦掎托星宿遺羲娥陋儒編詩不收入二雅褊迫無委蛇是謂三百篇皆如星宿獨此詩如日月也二雅褊迫之語尤非所宜言今世所傳石鼓之詞尚在豈能出吉日車攻之右安知非經聖人所刪乎困學紀聞曰致堂云韓退之賦石鼓曰孔子西行不到秦故不見録孔子編詩豈必身厯而後及哉信斯言也車鄰駟鐵胡為而收之也集古録曰石鼓久在岐陽初不見稱於前世至唐人始盛稱之而韋應物以為周文王之鼓至宣王刻詩韓退之直以為宣王之鼓在今鳯翔孔子廟中鼓有十先時散棄於野鄭餘慶始置之於廟而亡其一皇祐四年向傅師求於民間得之十鼓乃足其文可見者四百六十五磨滅不可識者過半然其可疑者三退之好古不妄者豫姑取以為信耳至於字畫亦非史籀不能作也麈史曰右軍書多不講偏旁此退之所謂羲之俗書趂姿媚者也蔡寬夫詩話曰退之石鼓歌云羲之俗書趂姿媚數紙尚可博白鵝觀此語便知退之非留意於書者今洛中尚有石刻題名信不甚工石鼓文音訓曰初在陳倉野中唐鄭餘慶始遷之鳯翔宋大觀中徙開封靖康末金人取之以歸於燕元皇慶癸丑始置大成至聖文宣王廟門之左右沈德潛曰陋儒指當時采風者言二雅不載孔子無從采取也𨽻書風俗通行别於古篆故云俗書無貶右軍意題炭谷湫祠堂萬生都陽明幽暗鬼所寰嗟龍獨何智出入人鬼間不知誰為助若執造化關厭處平地水巢居插天山列峰若攢指石盂仰環環巨靈高其捧保此一掬慳森沈固含蓄本以儲隂姦魚鱉蒙擁護羣嬉傲天頑翾翾棲託禽飛飛一何間祠堂像侔真擢玉紆煙鬟羣怪儼伺候恩威在其顔我來日正中悚惕思先還寄立尺寸地敢言來塗艱吁無吹毛刃血此牛蹄殷至今乘水旱鼓舞寡與鰥林叢鎮冥冥窮年無由刪妍英雜豔實星瑣黃朱班石級皆險滑顛躋莫牽攀尨區雛衆碎付與宿已頒棄去可奈何吾其死茅菅感時託諷不覺義形於色秋懷已發其端此更淋漓盡致按唐書王叔文傳順宗不能聽政深居施幄坐以牛昭容宦人李忠言侍側羣臣奏事從帷中可其奏大扺叔文因伾伾因忠言忠言因昭容更相依仗又王伾傳叔文入止翰林而伾至柿林院見牛昭容等此詩擢玉紆煙鬟云云蓋借澄源以喻昭容也某氏曰按宋敏求長安志云炭谷在萬年縣南六十里又云澄源夫人湫廟在終南山炭谷公南山詩有云因緣窺其湫即此湫龍所居也胡渭曰公詠南山云拘官計日月欲進不可又因緣窺其湫凝湛閟隂嘼此為四門博士時事也時天晦大雪淚目若蒙瞀此赴陽山過藍田時事也昨來逢清霽宿願欣始副此江陵入至藍田時事也題炭谷湫詩蓋貞元十九年京師旱祈雨湫祠公往觀焉故曰因緣窺其湫因緣謂以事行非特逰也篇中饒有諷刺時德宗幸臣李齊運李實韋執誼等與王叔文交通亂政滋甚故公因所見以起興湫龍澄源喻幸臣魚鱉禽鳥及羣怪喻黨人也秋懷欲罾寒蛟而是詩恨不血此牛蹄剛腸疾惡情見乎辭劉柳泄言羣小側目陽山之謫所自來矣上疏云乎哉聽潁師彈琴昵昵兒女語恩怨相爾汝劃然變軒昂勇士赴敵場浮雲柳絮無根蒂天地濶遠隨飛揚喧啾百鳥羣忽見孤鳯凰躋攀分寸不可上失勢一落千丈強嗟余有兩耳未省聽絲篁自聞潁師彈起坐在一旁推手遽止之濕衣淚滂滂潁乎爾誠能無以冰炭置我腸寫琴聲之妙實為得髓繁休伯稱車子柳子厚志筝師皆不能及永叔善琴乃用此為譏議耶躋攀二語千古詩文妙訣西清詩話曰六一居士嘗問東坡琴詩孰優坡答以退之聽潁師琴公曰此秖是琵琶耳吳僧義海以琴名世或以六一語問海海曰歐陽公一代英偉然斯語誤矣昵昵兒女語恩怨相爾汝言輕柔細屑真情出見也劃然變軒昂勇士赴敵場精神餘謹聳觀聽也浮雲柳絮無根蒂天地闊逺隨飛揚縱橫變態浩乎不失自然也喧啾百鳥羣忽見孤鳯凰又見潁孤絶不同流俗下俚聲也躋攀分寸不可上失勢一落千丈強起伏抑揚不主故常也皆指下絲聲妙處惟琴為然琵琶格上聲烏能爾耶退之深得其趣未易譏評也彥周詩話曰退之聽潁師琴詩云浮雲柳絮無根蒂天地闊遠隨飛揚此泛聲也謂輕非絲重非木也喧啾百鳥羣忽見孤鳯凰泛聲中寄指聲也躋攀分寸不可上吟繹聲也失勢一落千丈強順下聲也善琴者云此數聲最難工自文忠公與東坡論此詩作聽琵琶之後後生隨例云云故論之少為退之雪寃調張籍李杜文章在光焰萬丈長不知羣兒愚那用故謗傷蚍蜉撼大樹可笑不自量伊我生其後舉頸遙相望夜夢多見之晝思反微茫徒觀斧鑿痕不矚治水航想當施手時巨刃磨天揚垠崖劃崩豁乾坤擺雷硠惟此兩夫子家居率荒涼帝欲長吟哦故遣起且僵翦翎送籠中使看百鳥翔平生千萬篇金薤垂琳琅仙官敕六丁雷電下取將流落人間者太山一豪芒我願生兩翅捕逐出八荒精誠忽交通百怪入我腸刺手拔鯨牙舉瓢酌天漿騰身跨汗漫不著織女襄顧語地上友經營無太忙乞君飛霞珮與我髙頡頏此示籍以詩派正宗言已所手追心慕惟有李杜雖不可幾及亦必升天入地以求之籍有志於此當相與為後先也其景仰之誠直欲上通孔夢其運量之大不減逺績禹功所以推崇李杜者至矣魏仲舉曰退之有取於李杜如薦士醉留東野望秋石鼓等詩每致意焉然未若此詩之專美也雪浪齋日記曰退之參李杜透機關處於調張籍詩見之自我願生兩翅捕逐出八荒以下至乞君飛霞珮與我髙頡頏此領會語也從退之言詩者多而獨許籍者以有見處可以傳衣耳竹坡詩話曰元微之作李杜優劣論謂太白不能窺杜甫之藩籬况堂奧乎唐人未嘗有此論而稹始為之至退之云李杜文章在光焰萬丈長不知羣兒愚那用故謗傷則不復為優劣矣洪慶善作韓文辨證著魏道輔之言謂退之此詩為微之作也微之雖不當自作優劣然指稹為愚兒豈退之之意乎盧郎中雲夫寄示送盤谷子詩兩章歌以和之昔尋李願向盤谷正見高崖巨壁爭開張是時新晴天井溢誰把長劍倚大行衝風吹破落天外飛雨白日灑洛陽東蹈燕川食曠野有饋木蕨芽滿筐馬頭溪深不可厲借車載過水入箱平沙緑浪榜方口鴈鴨飛起穿垂楊窮探極覽頗恣橫物外日月本不忙歸來辛苦欲誰為坐令再往之計墮眇芒閉門長安三日雪推書撲筆歌慨慷旁無壯士遣屬和遠憶盧老詩顛狂開緘忽覩送歸作字向紙上皆軒昂又知李侯竟不顧方冬獨入崔嵬藏我今進退幾時決十年蠢蠢隨朝行家請官供不報答無異雀鼠偷太倉行抽手版付丞相不待彈劾還耕桑字向紙上皆軒昂正是此篇評語髙咏數畨令人增長意氣漁隱叢話曰東坡云歐陽文忠言晉無文章惟陶淵明歸去來一篇而已余亦謂唐無文章唯韓退之送李願歸盤谷序一篇而己平生欲效此作一文每執筆輒罷因自笑曰不若且放教退之獨步退之尋常詩自謂不逮李杜至於昔尋李願向盤谷一篇獨不減子美病中贈張十八中虛得暴下避冷卧北窗不踏曉鼓朝安眠聽逢逢籍也處閭里抱能未施邦文章自娛戲金石日擊撞龍文百斛鼎筆力可獨扛談舌久不掉非君亮誰雙扶几導之言曲節初摐摐半塗喜開鑿派别失大江吾欲盈其氣不令見麾幢牛羊滿田野解斾束空杠傾樽與斟酌四壁堆罌缸玄帷隔雪風照爐釘明釭夜闌縱捭闔侈口疏眉厖勢侔髙陽翁坐約齊橫降連日挾所有形軀頓胮肛將歸乃徐謂子言得無哤回軍與角逐斫樹收窮龎雌聲吐款要酒壺綴羊腔君乃崑崙渠籍乃嶺頭瀧譬如蟻垤微詎可陵崆㟅幸願終賜之斬拔枿與樁從此識歸處東流水淙淙此篇當就用韻處玩其苦心巧思大略以軍事進退為比皆就韻之所近而詞義乃各得其儕如前有高陽一喻而後之窮龎乃以類從不為強押凡解斾回軍約降吐款前後俱一線穿成於此見長篇險韻定須慘淡經營不可恃才鹵莽也按顧嗣立謂諸家舊注不無舛錯如病中贈張十八云龍文百斛鼎孫汝聽不知出自班孟堅寶鼎詩而漫引史記秦武王與孟説舉龍文之鼎此其訛謬更甚嗣立但見史記秦本紀有王與孟説舉鼎事而無龍文字面遂疑其訛謬而改注之不知秦武王與孟説舉龍文赤鼎自在趙世家中詩本用此孫注或欠詳晰而於義未為失也若不引舉鼎而泛引寶鼎於下句力扛何涉舊注固時有舛錯此則改注反成訛謬特為正之韓醇曰公始也扶機導籍使之言且匿其麾幢解斾束杠而示之弱籍乃縱其捭闔如酈生之下齊既連日挾其所有其後軀病語哤乃為公敗是猶孫臏之收龎涓也籍既為公所敗乃自以為嶺頭之瀧不足以方崑崙之渠蟻垤之微不足以陵崆㟅之山願終受教於公而公於是導其所歸也寄崔二十六立之西城員外丞心迹兩屈竒往嵗戰詞賦不將勢力隨下驢入省門左右驚紛披傲兀坐試席深叢見孤羆文如翻水成初不用意為四座各低面不敢捩眼窺升階揖侍郎歸舍日未攲佳句喧衆口考官敢瑕疵連年收科第若摘頷底髭回首卿相位通途無他岐豈論校書郎袍笏光參差童稚見稱説祝身得如斯儕輩妒且熱喘如竹筒吹老婦願嫁女約不論財資老翁不量分纍月笞其兒攪攪爭附託無人角雄雌由來人間事翻覆不可知安有巢中鷇插翅飛天陲駒麛著爪牙猛虎借與皮汝頭有韁繫汝腳有索縻陷身泥溝間誰復稟指撝不脫吏部選可見偶與竒又作朝士貶得非命所施客居京城中十日營一炊逼迫走巴蠻恩愛座上離昨來漢水頭始得完孤羇桁挂新衣裳盎棄食殘縻茍無飢寒苦那用分高卑憐我還好古宦途同險巇每旬遺我書竟嵗無差池新篇奚其思風幡肆逶迤又論諸毛功劈水看蛟螭雷電生睒眻角鬛相撑披屬我感窮景抱華不能摛倡來和相報愧歎俾我疵又寄百尺綵緋紅相盛衰巧能喻其誠深淺抽肝脾開展放我側方餐涕垂匙朋交日凋謝存者逐利移子寧獨迷誤綴綴意益彌舉頭庭樹豁狂飈卷寒曦迢遞山水隔何由應塤篪别來就十年君馬記騧驪長女當及事誰助出帨縭諸男皆秀朗幾能守家規文字鋭氣在輝輝見旌麾摧腸與戚容能復持酒巵我雖未耋老髮秃骨力羸所餘十九齒飄颻盡浮危玄花著兩眼視物隔褷褵燕席謝不詣遊鞍懸莫騎敦敦憑書案譬彼鳥黏黐且吾聞之師不以物自隳孤豚眠糞壤不慕太廟犧君看一時人幾輩先騰馳過半黑頭死隂蟲食枯胔歡華不滿眼咎責塞兩儀觀名計之利詎足相陪禆仁者恥貪冒受祿量所宜無能食國惠豈異哀癃罷久欲辭謝去休令衆睢睢况又嬰疹疾寧保軀不資不能前死罷內實慙神祇舊籍在東都茅屋枳棘籬還歸非無指灞渭揚春澌生兮耕吾疆死也埋吾陂文書自傳道不仗史筆垂夫子固吾黨新恩釋銜羈去來伊洛上相待安罛箄我有雙飲􅊦其銀得朱提黃金塗物象雕鐫妙工倕乃令千里鯨么麼微螽斯猶能爭明月擺掉出渺瀰野草花葉細不辨薋菉葹綿綿相紏結狀似還城陴四隅芙蓉樹擢豔皆猗猗鯨以興君身失所逢百罹月以喻夫道僶俯勵莫虧草木明覆載妍醜齊榮萎願君恆御之行止雜燧觽異日期對舉當如合分支敘崔如小傳敘自如尺牘雜沓覼縷似破碎而實渾成其詞意懇款下筆不能自休可想見交誼之厚隱居詩話曰詩惡蹈襲古人之意亦有襲而愈工若出於已者蓋思之愈精則造語愈深也魏人章疏云福不盈眥禍將溢世韓愈則曰歡華不滿眼咎責塞兩儀蓋工於前也李光地曰前敘崔之登第謫官中道與崔唱酬之事而因訊其安候後乃自述其志而欲與崔偕隱末方及其所以報崔之貽者與前巧喻其誠相應御選唐宋詩醇卷三十
